body:
  text: 古今律厯考卷三十三明邢雲路撰律呂五律呂候氣後漢志載律可以相傳者惟候氣而已天效以景地效以響即律也隂陽和則景至律氣應則灰除是故天子常以日冬夏至御前殿合八能之士陳八音聽樂均度晷景候鐘律權土灰放隂陽冬至陽氣應則樂均清景長極黄鐘通土灰輕而衡仰夏至隂氣應則樂均濁景短極蕤賔通土灰重而衡低進退於先後五日之中八能各以候狀聞太史封上效則和否則占其法閉室布縵使不通風案律加灰氣至灰去其爲氣所動者其灰散人及風動者其灰聚殿中用玉律十二惟二至乃候靈臺用竹律六十候如其厯隋志載後齊神武霸府田曹叅軍信都芳深有巧思能以管候氣仰觀雲色嘗與人對語即指天曰孟春之氣至矣人徃驗管而飛灰已應每月所候言皆無爽又為輪扇二十四埋地中以測二十四氣每一氣感則一扇自動他扇自住與管灰相應若符契焉隋開皇九年平陳後髙祖遣毛爽及蔡子元于普明等以候節氣依古於三重密室之内以木為按十有二具每取律呂之管隨十二辰位置于按上而以土埋之上平於地中實葭莩之灰以輕緹素覆律口每其月氣至與律冥符則灰飛衝素散出于外而氣應有早晚灰飛有多少或初入月其氣即應或至中下旬間氣始應者或灰飛出三五夜而盡或終月纔飛少許者髙祖異之以問牛𢎞牛𢎞對曰灰飛半出為和氣吹灰全出為猛氣吹灰不能出為衰氣吹和氣應者其政平猛氣應者其臣縱衰氣應者其君暴髙祖駮之曰臣縱君暴其政不平非日别而月異也今十二月於一嵗之内應用不同安得暴君縱臣若斯之甚也𢎞不能對令爽等草定其法爽因稽諸故實以著于篇名曰律譜其畧謂漢世制律互有得失至魏代杜夔制律候氣灰悉不飛晉光禄大夫荀朂得古銅管校夔所制長古四分方知不調事由其誤乃依周禮更造古尺用之定管聲韻始調左晉之後漸又訛謬至梁武帝時猶有汲冢玉律宋蒼梧時鑚為横吹然其長短厚薄大體具存臣先人栖成學筭祖暅問律於何承天沈研三紀頗達其妙後為太常丞典司樂職乃取玉管及宋太史尺並以聞奏詔付大匠依様制管自斯以後律又飛灰侯景之亂臣兄喜於太樂得之後陳宣帝詣荆州為質俄遇梁元帝敗喜沒於周適欲上聞陳武帝立遂以十二管衍為六十律私候氣序並有徵應至太建乃與均鐘器合考之淮南子曰水勝故夏至濕火勝故冬至燥燥故灰輕濕故灰重許魯齋云蔡西山所述月令章句蔡邕説也如邕所云則是為十二月肆布室内十二辰若其月氣至則辰之管灰飛而管空管斜埋地下入地處庳出地處髙故曰内庳外髙黄鐘埋於子位上頭向南蕤賔埋於午位上頭向北夾鐘埋於卯位上頭向西南吕埋於酉位上頭向東其餘八律亦各依其辰位又律書云以宜陽金門山竹為管以河内葭莩為灰熊氏云灰實律管覆以羅縠氣至則吹灰動縠又長樂陳氏曰候氣之法造室三重各啓門為門之位外之以子中之以午内復以子所謂九閉之中也蓋布緹縵室中上圓下方依辰埋管使其端與地齊而以薄紗覆之中秋白露降採葭莩為灰加管端以候氣為氣所動者灰散為物所動者灰聚蔡元定律呂新書載其升降之數以十二律之分釐毫絲忽定升灰之分釐毫絲忽韓苑洛志樂亦主其説以上諸家之論詳哉其言之矣以余論之後漢志載律制莫能辨其相傳惟候氣曰相傳則必古法也古法不知傳自何代考候氣之法不見經典而緯書有之天子常以日冬夏至合八能之士聽樂度晷權灰候占之説緯書之文也緯書乃後人偽為之未可盡信後漢志乃載閉室布縵案律飛灰之法使果如其法各律各從辰位皆應氣而灰飛也豈不神妙抑如芳深觀雲動扇與灰合契毛爽氣至灰符與其父兄管尺飛灰皆應及蔡氏所載升降之數如其分釐毫絲忽不爽也豈不如神然何乃開皇候氣或初入月應或中下旬應或灰飛三五夜盡或終月纔飛少許牛𢎞三説隋帝難之而無以應耶曰此正其候氣之不足憑也蓋冬至一陽生古人於此候氣驗其陽氣上升則有之嗣是一陽既升氣騰而上無日不飛豈有必待一氣之變所埋管灰始升寸内數分之理又豈有一處按方並埋十二管而某氣至止某管飛灰之理且均一室也子位埋九寸之管則黄鐘飛餘十一管皆不飛此室假北移數武則子不可為午乎然則黄鐘之飛灰又變而為蕤賔不飛之灰乎則何以應焉即觀開皇之應不一其日或三五夜盡或終月纔飛少許者可知也終月纔飛少許則灰且不飛矣况應律管之絲忽及升灰數之絲忽哉絲忽之數誰見之而誰量之耶縱曰應矣如冬至陽在下故用九寸大寒至小滿陽漸升管漸短其説猶通若夏至後則陽氣下降管宜漸長也乃大暑較夏至漸短至小雪寒極陽氣深入地中而管卻止四寸六分耶小雪用四寸六分短管即可接灰而上過此一節乃陽氣又突然濳入深地須用九寸長管方得飛灰耶夫豈升降消息漸次之常也此不通之論不俟言之畢而明者况地有南北燥濕不同南方冬月地猶生物北方地寒正月地猶凍二三尺以寒冬子月加九寸之管豈能下通故曰候氣之不足憑也若淮南子燥濕輕重之説亦無稽之談耳然則芳深扇動灰飛及毛氏父子候氣之驗皆非歟嘻我知之矣扇之動灰之飛皆機也機通其竅人鼓其機扇動灰飛時刻不爽暗作假事以欺人主猶如巧術之製木人應期而捧時銅人如候而鳴鐘從古有之其機猶是也歴代欺以傳欺至今欽天監官詣順天府用機械造假灰候氣於立春等節以告人曰灰飛矣以入告曰灰飛矣将誰欺欺天乎審度周禮典瑞璧羨以起度玉人璧羨度尺好三寸以為度易緯通卦驗以十馬尾為一分淮南子曰秋分蔈定蔈定而禾熟律之數十二故十二蔈而當一粟十二粟而當一寸説苑曰度量權衡以粟生之一粟為一分十分為一寸孫子筭術曰蠶所吐絲為忽十忽為絲十絲為毫十毫為釐十釐為分十分為寸漢前志曰度本起黄鐘之長以子榖秬黍中者一黍之廣度之九十分黄鐘之長一為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣隋志有十五等尺一周尺乃王莽時劉歆銅斛尺後漢光武建武銅尺晉荀朂律尺為晉前尺祖冲之所傳銅尺晉武帝泰始九年中書監荀朂校太樂八音不和始知為後漢至魏尺長於古尺四分有餘朂乃依周禮制尺所謂古尺依古尺更鑄銅律呂以調聲韻以尺量古器與本銘尺寸無差又汲郡盜發魏襄王冢得古周時玉律及鐘磬與新律聲韻闇同于時郡國或得漢時故鐘吹新律命之皆應梁武鐘律緯云祖冲之所傳銅尺其銘曰晉泰始十年中書考古器揆校今尺長四分半所校古法有七品一曰姑洗玉律二曰小呂玉律三曰西京銅望臬四曰金錯望臬五曰銅斛六曰古錢七曰建武銅尺姑洗微强西京望臬微弱其餘與此尺同此尺者朂新尺也今尺者杜夔尺也按此尺出於汲冢之律與劉歆之斛最為近古蓋漢去古未遠古之律度量權衡猶在也故班氏所志無諸家異同之論王莽之制作雖不足據然律度量衡當不敢變於古也自董卓之亂而樂律散亡故杜夔之律圍徑差小而尺因以長荀朂雖定此尺然其樂聲髙急不知當時律之圍徑又果何如後周以玉斗生律玉斗之容受似為近古然當時以斗制律圍徑不及三分其尺遂長於此尺一寸五分八釐則皆由律圍徑之誤也若司馬公所傳此尺出於王莽之法錢蓋丁度所奏高若訥所定者雖其年代乆遠輪郭不無消毁然其大約近之二晉田父玉尺即梁法尺實比晉前尺一尺七釐世説稱有田父於野地中得周時玉尺便是天下正尺荀朂試以校已所造金石絲竹皆短校一米梁武帝有玉律一口簫餘定七枚夾鐘有昔題刻迺制為尺以相叅驗以新尺制為四器名曰通此兩尺近同三梁表尺實比晉前尺一尺二分二釐有竒蕭吉云出於司馬法梁朝刻其度於影表以測影此即祖暅所筭造銅圭影大業中用以調律四漢官尺始平掘地所得實比晉前尺一尺三分七毫蕭吉云漢章帝時零陵文學史奚景於冷道縣舜廟下得玉律度為尺傅暢晉諸公讃云荀朂新造鐘律時人並稱其精密惟陳留阮咸譏其聲髙後始平掘地得古銅尺歳久欲腐以校荀朂今尺短校四分時人以咸為神觧此兩尺長短近同五魏尺杜夔所用調律實比晉前尺一尺四分七釐按劉徽九章註云此尺長於王莽斛尺四分五釐然即其斛分以二千龠約之知其律止容七百二十分六釐有竒則其徑為三分三釐弱其斛分數與王莽斛分雖不同而其容受多寡相去未懸遠也六晉後尺實比晉前尺一尺六分二釐蕭吉云晉氏江東所用七後魏前尺實比晉前尺一尺二寸七釐八中尺實比晉前尺一尺二寸一分一釐九後尺實比晉前尺一尺二寸八分一釐此後魏初及東西分國後周未用玉尺之前雜用此等尺十東後魏尺實比晉前尺一尺五寸八毫魏史律厯志云公孫崇永平中更造新尺以一黍之長累為寸法太常卿劉芳受詔脩樂以秬黍中者一黍之廣即為一分乆之不決十一蔡邕銅龠尺實比晉前尺一尺一寸五分八釐從上相承有銅龠一以銀錯題其銘祖孝孫云相承傳是蔡邕銅龠後周武帝保定中詔遣盧景宣長孫紹遠斛斯徵等累黍造尺從横不定後因脩倉掘地得古玉斗以為正器據斗造律度量衡因用此尺大赦改元天和百司行用終於大象之末其律與蔡邕古龠同按銅龠玉斗二者當是古之嘉量當時據斗造尺但以容受乘除求之然自魏而下論律者多惑於三分之徑今以隋志所載玉斗容受析之為一十一萬八百分有竒一斗計二百龠以二百約之得五百五十四分有竒為一龠之分以筭法攻之其徑不及三分故其尺律遂長十二宋氏尺實比晉前尺一尺六分四釐開皇初調鐘律尺及平陳後調鐘律水尺此宋代人間所用尺傳入齊梁陳以制樂制與晉後尺及梁時俗尺劉曜儀尺略相依近其後宣帝時達奚震及牛𢎞等議今之鐵尺是太祖遣尚書故蘇綽所造當時檢勘用為前周之尺驗其長短與宋尺符同即以調鐘律并用均田度地十三開皇十年萬寳常所造律呂水尺實比晉前尺一尺一寸八分六釐與祖孝孫相近然亦皆徑三分法十四雜尺實比晉前尺一尺五分十五梁朝俗間尺實比晉前尺一尺七分一釐以上十五等尺諸代不同多由於累黍及圍徑之誤也五代王朴尺比漢前尺一尺二分宋和峴用景表石尺比漢前尺一尺六分李照布帛尺比漢前尺一尺三寸五分阮逸胡瑗尺横累一百黍與景表尺同鄧保信尺縱累百黍短於大府尺九分大晟樂尺徽宗指三節為三寸長於王朴尺二寸一分又考古物之有分寸明著史籍可以酬驗者惟有法錢周之圜法半兩重八銖漢初四銖其文亦曰半兩孝武之世行五銖下洎隋朝多以五銖為號既厯代尺度屢改故小大輕重鮮有同者劉歆制銅斛之世所鑄有錯刀大泉五十王莽天鳳間改鑄貨布貨錢之類唐會要武徳間行開元通寳錢徑八分以為得中六典大泉錯刀貨布貨錢小大輕重不皆中度宋以景表尺較漢錢尺并大泉錯刀等類厯代沿革不一固若斯也右審度諸説不同而各有辨焉昔夏禹以身為度通志曰夏禹十寸為尺成湯十二寸為尺武王八寸為尺又周家十寸八寸皆為尺以十寸之尺起度則十尺為丈十丈為引以八寸之尺起度則八尺為尋倍尋為常且古稱丈夫謂人長丈也周禮則謂人長八尺夫厯代之尺既不同而周之十寸八寸皆為尺然則所謂以身為度者或長丈或長八尺八尺即丈代度不同故也故黄鐘之數九其寸而為律十其寸而為尺即古云長九寸長八寸十分一之類尺異而律同也漢志不知乃欲加黄鐘一寸為尺誤矣典瑞璧羨度尺好三寸以為度鄭司農云羨徑也好璧孔也爾雅曰肉倍好謂之璧鄭康成曰羨不圓之貎延其袤一尺而廣狹焉疏言引爾雅欲見此璧好三寸好即孔也兩畔肉各三寸兩畔共六寸是肉倍好也六寸三寸共九寸為璧之徑是乃九分之寸九九八十一分正合黄鐘九其寸之律若十其寸為尺則為十寸之尺為徑長尺故曰度尺所謂以為度也非謂以好之三寸為度也先鄭釋羨為徑是後鄭釋羨為延非康成謂羨不圓延其袤一尺而廣狹焉者盖以璧應圜九寸減廣一寸以益上下之袤一寸則上下一尺廣八寸狹為八寸此説非也淮南言蔈者禾之芒十二蔈當一粟十二粟當一寸説苑言一粟為一分夫五榖不同不知當時所指之粟為何粟易緯以十馬尾為分與孫子論寸分釐毫絲忽皆近是漢志度黍之訛則余於議律長短圍徑數章辨之詳矣若隋志十五等尺及五代王朴以後諸尺累代各殊或失之長或失之短間雖有合古者第其式多不存真偽何從而辨至於法錢等物其輕重大小且不同亦安得據此以辨尺耶余故云古尺不一莫辨真偽無已則惟以黍約之而已古稱子榖秬黍中者子北方北方黑謂黑黍也秬之言大謂大黍也取上黨之秬黍酌千二百黍之數實之而復以人聲正之如余議律長短圍徑章術以得黄鐘之管黄鐘定則十二律皆定而度量衡一以貫之矣盖三物一禀於律度量衡有不同而律則無不同故虞書曰同律度量衡律先於度正謂此也論五度所起則十纎為㣲十㣲為忽十忽為絲十絲為毫十毫為釐五度正數則十釐為分十分為寸十寸為尺十尺為丈十丈為引是嘉量周禮冬官考工記㮚氏為量金有六齊六分其金而鍚居一謂之鐘鼎之齊㮚氏為量改煎金鍚則不耗不耗然後權之權之然後準之準之然後量之量之以為鬴深尺内方尺而圜其外其實一鬴其臋一寸其實一豆其耳三寸其實一升重一鈞其聲中黄鐘之宮其銘曰時文思索允臻其極嘉量既成以觀四國永啟厥後兹器惟則左傳晏子曰齊舊四量豆區釡鐘鄭註云四升曰豆四豆曰區四區曰鬴各自其四以登於鬴鬴六斗四升也鬴十則鐘六十四斗也鬴方尺積千寸比於今粟米法少二升八十一分升之二十二考工記曰庾實二鬴論語曰與之釜與之庾儀禮曰十斗曰斛十六斗曰籔十籔曰秉註云今文籔為逾逾即庾也小爾雅曰鐘二謂之秉秉十六斛陳氏三量五豆為區五區為釡十釡為鐘管子曰釡鏂之數不得為侈弇孔子家語曰黄帝設五量曰區曰釡曰庾曰鐘曰秉此五者量之大者也曰圭曰撮曰合曰升曰斗此五者量之小者也孫子筭術曰六粟為圭十圭為抄十抄為撮十撮為勺十勺為合應劭曰圭者自然之形隂陽之始四圭為撮孟康曰六十四黍為圭漢志曰量者龠合升斗斛所以量多少也本起於黄鐘之龠用度數審其容以子榖秬黍中者千有二百實其龠以井水准其槩合龠為合十合為升十升為斗十斗為斛而五嘉量矣其法用銅方尺而圓其外旁有庣焉其上為斛其下為斗左耳為升右耳為合龠其状似爵以縻爵禄上三下二參天兩地圜而函方左一右二隂陽之象也其圜象規其重二鈞備氣物之數各萬有一千五百二十聲中黄鐘之宮始於黄鐘而反覆焉其斛銘曰律嘉量斛方尺而圓其外庣旁九釐五毫羃百六十二寸深尺積一千六百二十寸容十斗祖冲之以圓率考此斛當徑一尺四寸三分六釐一毫九抄二忽庣旁一分九毫有奇劉歆庣旁少一釐四毫有奇魏陳留景元四年劉徽註九章商功曰當今大司農斛圓徑一尺三寸五分五釐深一尺積一千四百四十一寸十分之三王莽銅斛於今尺為深九寸五分五釐徑一尺三寸六分八釐七毫以徽術計之於今斛為容九斗七升四合有奇此魏斛大而尺長王莽斛小而尺短也梁陳依古齊以古升五升為一斗後周武帝晉國造倉獲古玉斗改制銅律累黍積龠與衡度無差惟為銅升徑七寸一分深二寸八分重七斤八兩今若以數計之玉升積玉尺一百一十寸八分有奇斛積一千一百八十五分七釐三毫九抄又甄鸞筭術云玉升一升得官斗一升三合四勺此玊升大而官斗小也以數計之甄鸞所據後周官斗積玉尺九十七寸有奇斛積九百七十七寸有奇後周玉斗并副金錯銅斗及建徳六年金錯題銅斗實銅以秬黍定量以玉秤權之一斗之實皆重六斤十三兩隋開皇以古斗三升為一升大業初復依古斗唐六典量容千二百黍為龠二龠為合十合為升十升為斗三斗為大斗十斗為斛宋范鎮論周鬴方尺者八寸之尺深尺者十寸之尺且創為圓分之説謂圓分一當方分四分之三陳暘樂書所載斛圖盖范鎮之斛也右嘉量之説詳矣夷考周禮㮚氏之量正也嗣是代度不同量亦各異如一斛也而有容九斗七升者十斗者有魏斛大尺長王莽斛小尺短者有五升為斗者有玉升大官斗小者有積與重不同者諸如此類更相是非然不知代制不同豈能齊一况其式不存真偽莫辨無已亦惟以黍約管定尺即尺求斛守㮚氏之術而量正矣盖㮚氏嘉量鬴方尺深尺外圓函方以句股求弦術句十寸自之得百寸股十寸自之得百寸相併二百寸開方除之得弦一尺四寸一分四釐二毫一絲三忽五㣲六纎為鬴之内徑以徑取周秘法三一二六乘之得四尺四寸二分八毫三絲一忽五㣲六纎為鬴之内周周自之得一十九尺五寸四分三釐七毫五絲一忽六㣲七纎以周取圍秘法十三而一得一百五十寸三分三釐六毫五絲五忽一㣲三纎為鬴之面幕以深十寸乘之得一千五百三寸三分六釐五毫五絲一忽三㣲為鬴之積實是也鬴重一鈞三十斤叩之聲中黄鐘之宮考㮚氏言金者銅也銅加錫謂之齊煎至不耗權以眡其輕重之齊準以眡其髙下之平量以眡其多寡之均然後以之為鬴平正應準並無侈弇若陳氏圖状如酒尊則有侈弇不端正矣非是范鎮謂周鬴方尺者八寸之尺深尺者十寸之尺方八寸圓其外庣其旁則羃一百三寸六分八釐深十寸則積一千三十六寸八分與漢斛同蔡元定信之亦非是若所謂周家八寸十寸皆為尺者或别有所用而非一物兩用也至鎮圓分之説又以圓其外為唇陳𤾉所載圖者蔡元定深非之以為自古筭法無圓分則誠當矣周公之鬴重三十斤聲中黄鐘之宫銘曰嘉量啟後惟則至精也若王莽之斛重倍之而亦云中黄鐘之宫豈理也哉且於尺外之庣添九釐五毫以容十斗至取法上三下二左一右二之象使一耳偏大一耳偏小皆屬鑿妄聖人制器方圓均齊豈有庣偏即管子云無侈弇併唐斛左右耳與臋之皆方可知其無庣偏大小之説也若鄭𤣥方尺千寸之説則止就方内言而於圓容遺之矣歴代量之參差者勿論大都漢量其制小唐量其制大以秬黍考之古量當唐十分之三頗與六典合則其善也詳論五量所起則六十黍為圭四圭為撮十撮為合十合為升十升為斗此孔子所云黄帝五量之小也五量正數則四豆為區五區為釡倍釡為庾五庾為鐘倍鐘為秉此孔子所云黄帝五量之大也前漢志曰量多少者不失圭撮則圭撮乃數之始也應劭曰四圭為撮許氏説文亦曰撮四圭也孟康曰六十四黍為圭若以六十四黍為圭一撮凡二百五十六黍以一龠千二百黍求之則一龠為四撮六十八分太之零則何以成數然則一龠宜五撮凡二百四十黍撮四圭圭六十黍為當孟康六十四黍之圭或用黍之稍小者未可知也五撮為龠得千二百黍即黄鐘一龠之數龠必以井水准其槩者惟水為平也倍龠十撮為合容二千四百黍為兩龠之實所謂合龠為合劉歆以龠斛為五量誤矣十合為升二萬四千黍為二十龠十升為斗二十四萬黍為二百龠若孫子以六粟為圭以至十勺為合夫圭以六粟則太少勺以六萬粟則太多無一可者摠不經之妄談耳晏子以四升為豆各自其四以登於釡釡十則鐘考管子云齊西之粟釡百泉則鏂二十也齊東之粟釡十泉則鏂二泉也夫釡粟百錢而區二十錢釡粟十錢而區二錢則五區為釡明甚非四區為鬴也以考工記庾實二鬴論語與之釡庾儀禮十斗為斛十六斗為籔十籔為秉註籔即逾即庾小爾雅鐘二為秉凡十六斛諸説合觀之所謂二鐘為秉秉十六斛則鐘乃八斛也所謂十斗為斛十釡為鐘則鐘乃八十斗釡乃八斗也所謂十六斗為籔即庾實二鬴則鬴亦八斗也五量所起圭撮合升斗五量正數區釡庾鐘秉此皆自千二百黍黄鐘之一龠上下衍之下至圭之六十黍上至秉之三萬二千龠為數之切近精實無遁情者豈容私意於其間哉乃若晏子所謂各自其四以登於鬴者盖四升為豆四豆十六升為區固以四而登五區為釡釡乃八斗十釡為鐘鐘乃八斛二四為八亦以四而登晏子之言意或如此其陳氏三量則每量各加四分之一五豆為區區乃二十升五區為釡釡乃百升十釡為鐘鐘乃百斗比舊為多故晏子曰鐘乃大矣鄭註六斗四升為釡或康成時釡用六斗四升非周制也范鎮則謂周以八寸尺為量八八六十四故容六斗四升直臆説耳論語註釡六斗四升乃襲鄭氏之舊説亦誤權衡虞書曰在璿璣玉衡夏書曰有典有則貽厥子孫闗石和鈞王府則有周禮冬官考工記玉人之事駔琮七寸鼻寸有半寸天子以為權國語單穆公曰先王之制禮也大不出鈞重不過石律度量衡於是乎生小大器用於是乎出故聖人慎之孔子曰謹權量四方之政行焉孟子曰權然後知輕重月令仲春仲秋日夜分則平權衡正均石小爾雅曰斤十謂之衡衡有半謂之秤秤二謂之均均四謂之石石四謂之鼓應劭曰十黍為絫十絫為銖説文曰錙六銖也又謂之分王肅云八兩為錙淮南子曰十二粟而當一分十二分而當一銖十二銖而當半兩衡有左右因倍之故二十四銖為一兩天有四時以成一嵗因而四之四四十六故十六兩為一斤三月而為一時三十日為一月故三十斤為一鈞四時而為嵗故四鈞為石漢前志曰衡權者衡平也權重也衡所以任權而均物平輕重也本起於黄鐘之重一龠容千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石五權謹矣五權之制圜而環之令肉倍好周旋無端終而復始無窮已也權與物均而生衡衡運生規規圜生矩矩方生繩繩直生凖凖正則衡平而鈞衡矣是為五則備于鈞器以為大範凡律度量衡用銅者名自名也所以同天下齊風俗也銅為物之至精不為燥濕寒暑變其節不為風雨暴露改其行介然有常有似於士君子之行是以用銅也趙書石勒得圓石状如水碓其銘曰律權石重四鈞同律度量衡有辛氏造續咸議是王莽時物後魏并州人獻古銅權一枚其銘曰律權石重四鈞黄帝初祖徳市于虞虞帝始祖徳市于辛此亦王莽所制也隋開皇中以古斗三升為一升以古稱三斤為一斤以一尺二寸為一尺大業中依復古法唐貞觀時叶律郎張文收定樂鑄銅律三百五十六銅斛二銅秤二銅甌十四秤尺一斛左右耳與臋皆正方積十而登以至於斛乃累黍所定與古玉斗相符後以宋常用度量校之尺當六之五衡量皆三之一宋太宗詔劉承珪制法物取秬黍廣十黍為寸從大樂黄鐘之尺因度尺而求釐自積黍而取絫然後以分而推忽為定數之端忽萬為分絲則千毫則百釐則十轉以十倍自一萬忽至十萬忽倍之則為一錢十黍為絫百黍為銖一兩合二十四銖為二千四百黍之重二銖四絫為錢二絫四黍為分一絫二黍重五釐六黍重二釐五毫三黍重一釐二毫五絲則黍絫之數成矣由黍絫而齊其斤石不可得而增損其則用銅而鏤文以識其輕重新制既定奸弊無所措中外以為便右權衡之制其説詳矣盖自有天圓地方即有規矩權衡之象權以生衡其為衡也在天為斗魁之柄助佐天樞璿璣近挹天權絜開陽揺光斟酌建指以齊七政故曰玉衡厯代以來帝王聖賢皆以權衡為重鈞與石乃五權之最重者故夏后貽厥子孫以為典則周禮玉琮七寸鼻一寸五分以為權故有鼻也以組繫之故曰駔琮月令春秋二仲晝夜各五十刻乾度均平故於此二時平正權衡即舜察玉衡法天齊政之義也小爾雅應劭説文之數皆是錙銖小數未應懸逺王肅註八兩非淮南子以十二粟當一分十二分當一銖十二銖當半兩半兩即一龠也龠凡千二百黍以淮南之粟計之一銖得一百四十四粟一龠得一千七百二十八粟多黍五百二十八矣想粟較黍小之故至銖兩而上以至鈞石則其數悉協矣權周用玉漢用銅其形如環體為肉孔為好外徑九寸内徑三寸重三十斤與嘉量同但王莽所造假帝王以欺後隋唐宋各有制有三為一者一之二為一者當六之五三之一者皆無的據可考然宋制纎悉之數則悉合符是為宻也論五權所起則權起於黍秬黍一粒也十黍為絫即累十累為銖六銖為錙又謂之分四錙為兩量黄鐘兩龠二千四百黍之重五權正數則十六兩為斤一兩二千四百黍為一合一斤凡一升六合黍之重十斤為衡三衡為鈞四鈞為石四石為鼔量七石六斗八升黍之重是也鄭世子考羊頭山秬黍以時制等則秤之百粒得二分五釐積至兩龠二千四百粒重六錢則今之六錢為古一兩以約度量今之八寸即古一尺今之三斗即古一斛度以八為率量以三為率權以六為率故也古今律厯考卷三十三
