body:
  text: 古今律厯考卷七十一明邢雲路撰厯原五厯原紀五星麗天平立差之原各八段測紀木星木星盈縮平立差測星以積晷為度置各段日下所測積差度分各以段日而一得泛平差各以次段泛平差較之為泛平較各以次段泛平較較之為泛立較蓋以較之較較較較故也置一段泛平較內減一段泛立較為平立較平立較較較餘三十二秒九十一微九十九纖為初段泛平較以加初段泛平差得一十分八十九秒七十微為定差元史秒定萬置初段泛平較三十二秒九十一微九十九纖內減泛立較之半三秒一十二微一十一纖餘二十九秒七十九微八十八纖以一段日一十一日五十刻而一得二秒五十九微一十二纖為平差置泛立差之半三秒一十二微一十一纖以一段日而一再而一得二微三十六纖為立差得木星盈縮平立差之原紀火星火星盈初縮末平立差積日積差泛平差泛平較泛立較泛平較前多後少應加泛立較取一段下泛平較六分一三九八四七二九六八七五加泛立較一十三秒一九七九二一八七五得六分二七一八二六五一五六二五為初日下泛平較置一段泛平差八十二分二十秒六五七三四八四三七五加初日下泛平較六分二七一八二六五一五六二五得八十八分四十七秒八十四微為盈初縮末定差置初日下泛平較六分二七一八二六五一五六二五加泛立較之半六秒五九八九六九三七五得六分三三七八一六一二五為實以一段下積日而一得八十三秒一十一微八十九纖為盈初縮末平差置泛立較之半六秒五九八九六九三七五以一段日七日六十二刻五十分而一再而一得一十一微三十五纖為盈初縮末立差火星縮初盈末平立差積日積差泛平差泛平較泛立較取泛立較均停者三十九秒五八二一三七五以較一段下泛平較一十三秒二六四六八三一二五餘二十六秒三一七三六二五為較較較較較較加一段下泛平差二十九分七一三一二六九三七五得二十九分九十七秒六十三微為縮初盈末定差置較較較二十六秒三一七三六二五以一段日一十五日二十五刻而一得一秒七二五七二五為較較較魄再置泛立較之半一十九秒七九一六八七五以一段日而一得一秒二九七七七五為較較較體魄體合而為一得三秒二微三十五纖為縮初盈末平差置泛立較之半一十九秒七九一六八七五以一段日而一再而一得八微五十一纖為縮初盈末立差得火星盈縮平立差之原紀土星盈縮平立差土星盈縮平立差積日積差泛平較置一段泛平較五十八秒四三三二五較泛立較七秒四八五三五餘五十秒九一七九七五為平立較以加一段泛平差一十四分六三六九二二五得一十五分一十四秒六十一微為盈定差置平立較五十秒九一七九七五內減泛立較之半三秒七四二六七五餘四十七秒一七五三以一段日一十一日五十刻而一得四秒一十微二十二纖為盈平差置泛立較之半三秒七四二六七五以一段日而一再而一得二微八十三纖為盈立差土星縮平立差積日同盈積差泛平差泛平較泛立較置一段泛平較三十秒五二七三二五較泛立較八秒七五四九五餘二十一秒七七二三七五為平立較以加一段泛平差一十分七九九七七六二五得一十一分一秒七十五微為縮定差置平立較二十一秒七七二三七五內減泛立較之半四秒三七七四七五餘一十七秒三九四九以一段日一十一日五十刻而一得一秒五十一微二十六纖為縮平差置泛立較之半四秒三七七四七五以一段日而一再而一得三微三十一纖為縮立差得土星盈縮平立差之原紀金星金星盈縮平立差積日同土積差泛平差泛平較泛立較以一段下泛平較泛立較較之所餘一秒八六八一七五為平立較以加一段泛平差三分四九六八一八二五得三分五十一秒五十五微為定差置平立較一秒八六八一七五以泛立較之半一秒八六四七二五較之餘三十四纖半以一段日一十一日五十刻而一得三纖為平差置泛立較之半一秒八六四七二五以一段日而一再而一得一微四十一纖為立差得金星盈縮平立差之原紀水星水星盈縮平立差積日同金積差泛平差泛平較泛立較術同金星求得定差三分八十七秒七十微平差二十一微六十五纖立差一微四十一纖得水星盈縮平立差之原右木星秒二十七微一十四纖本二秒五十九微一十二纖總一十分八十九秒七十微火星盈初秒八十六微五四三七五本八十三秒一一八九總八十八分四七八四縮初秒一秒二九七七五本三秒二三五總二十九分九七六二土星盈秒三十二微五四五本四秒一二二總一十五分一四六一縮秒三十八微六五本一秒五一二六總一十一分一七五金星秒一十六微二一五本三纖總三分五一五五水星秒一十六微二一五本二十一微六五總三分八七七三者即平立定三差秒者標本者根總者幹也五星各以段次因秒木土金水四星併本惟火星較本各以積日而積五星皆較總又各以積日乘之得各實測之度分秒其五星積日者是周日各以度率而一得每嵗三百六十五度二十五分太各以四分而一得一象限木土金水四星就此為象限惟火星半象限減象限為盈初縮末限加象限為縮初盈末限故度命為日者為各取盈縮厯之便而設其實幾日之日乃幾度也古今律厯考卷七十一
