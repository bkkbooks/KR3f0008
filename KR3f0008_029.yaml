body:
  text: 古今律厯考卷二十九明邢雲路撰律呂一律呂黃鐘黃鐘長九寸空圍九分積七百二十九分天數終於九為陽之成黃鐘陽聲之始也故其管長九寸其內空圍容九分其積實十百二十九分是為律本而十二律由是損益度量衡於是受法焉算術置一分圍容九分以九寸之每寸九分共八十一分乘之得共圍積實七百二十九分依古圓田法三分益一蓋以九分三分之每一分得三分益一得一十二分以開方除之得三分四釐六毫強為實徑之數強者不盡二毫八絲四忽若仍求圓積之數以徑三分四釐六毫自乘之得一十一分九釐七毫一絲六忽加以不盡之二毫八絲四忽得一十二分以管長八十一分乘之得九百七十二分為方積四分取三為圓積得七百二十九分蔡季通以管長九十分乘一十二分得一千八十分為方積四分取三為圓積得八百一十分非也蓋九分為寸釐毫絲皆用九無用十之理故長九寸以分九之得八十一分再以釐九之得七百二十九釐長八十一分以空容九分九之得積七百二十九分始終無八百一十分之數且空圍與徑之分皆九釐之分若以十釐之分十分之寸乘之則圍之橫分長而長之豎分短計短九之一也立方上下四旁皆均若上下短九之一則不方何以成數然則黃鐘之積斷乎為七百二十九分明矣然謂以十為尺者約九為十而為尺約十為九而律其實一也又徑圍之密律詳見厯原黃鐘之實子一黃鐘之律一而己丑三為絲法寅九為寸數卯二十七為毫法辰八十一為分數已二百四十三為釐法午七百二十九為釐數未二千一百八十七為分法申六千五百六十一為毫數酉一萬九千六百八十三為寸法戌五萬九千四十九為絲數亥一十七萬七千一百四十七黃鐘之實黃鐘之律以三厯十三辰所得之數在子寅辰午申戌六陽辰為黃鐘寸分釐毫絲之數子為黃鐘之律寅為九寸辰為八十一分午為七百二十九釐申為六千五百六十一毫戌為五萬九千四十九絲在亥酉未巳卯丑六隂辰為黃鐘寸分釐毫絲之法亥為黃鐘之實酉之一萬九千六百八十三為寸未之二千一百八十七為分巳之二百四十三為釐卯之二十七為毫丑之三為絲其寸分釐毫絲之法皆用九數故九絲為毫九毫為釐九釐為分九分為寸為黃鐘蓋子一為黃鐘之律三其一則丑為三三其三則寅為九三其九則卯為二十七三其二十七則辰為八十一三其八十一則巳為二百四十三三其二百四十三則午為七百二十九三其七百二十九則未為二千一百八十七三其二千一百八十七則申為六千五百六十一三其六千五百六十一則酉為一萬九千六百八十三三其一萬九千六百八十三則戌為五萬九千四十九三其五萬九千四十九則亥為一十七萬七千一百四十七以是數為黃鐘之實而定管之短長以三為絲故有五萬九千四十九絲以二十七為毫故有六千五百六十一毫以二百四十三為釐故有七百二十九釐以二千一百八十七為分故有八十一分以一萬九千六百八十三為寸故有九寸合而觀之積絲毫釐分之長為寸皆九合絲毫釐分寸之數皆一十七萬七千一百四十七在陽辰順而左行為數在隂辰逆而右行為法也黃鐘生十一律子一分一為九寸丑三分二一為三寸寅九分八一為一寸卯二十七分十六三為一寸一為三分辰八十一分六十四九為一寸一為一分巳二百四十三分一百二十八二十七為一寸三為一分一為三釐午七百二十九分五百一十二八十一為一寸九為一分一為一釐未二千一百八十七分一千二十四二百四十三為一寸二十七為一分三為一釐一為三毫申六千五百六十一分四千九十六七百二十九為一寸八十一為一分九為一釐一為一毫酉一萬九千六百八十三分八千一百九十二二千一百八十七為一寸二百四十三為一分二十七為一釐三為一毫一為三絲戌五萬九千四十九分三萬二千七百六十八六千五百六十一為一寸七百二十九為一分八十一為一釐九為一毫一為一絲亥一十七萬七千一百四十七分六萬五千五百三十六一萬九千六百八十三為一寸二千一百八十七為一分二百四十三為一釐二十七為一毫三為一絲一為三忽按黃鐘生十一律子寅辰午申戌六陽辰皆下生丑卯巳未酉亥六隂辰皆上生其上以三厯十二辰者皆黃鐘之全數其下隂數以倍者倍其實三分本律而損其一也陽數以四者四其實三分本律而益其一也六陽辰當位自得六隂辰則居其衝其林鐘南呂應鐘三呂在隂無所增損其大呂夾鐘仲呂三呂在陽則用倍數方與十二月之氣相應蓋隂之從陽自然之理也曰子一分者數起子得一也丑三分二者三其法為三分兩其實為二也寅九分八者三其法為九分四其實為八也以下生者倍其實以上生者四其實也其法以子析為三分每分五萬九千四十九丑於三分之中得其二為十一萬八千九十八積六寸為林鐘此黃鐘之實三分損一下生林鐘也以子一析為九分每分得一萬九千六百八十三寅於九分之中得其八為十五萬七千四百六十四積八寸為太蔟此林鐘之實三分益一上生太蔟也自卯而下倣此其詳子一分一為九寸為黃鐘之律也三其一則丑為三分倍其一為二分一為三寸二為六寸為林鐘之律也三其三則寅為九分四其二為八分一為一寸八為八寸為太蔟之律也三其九則卯為二十七分倍其八為十六分三為一寸以十五為五寸餘一為三分共五寸三分為南呂之律也三其二十七則辰為八十一分四其十六為六十四分九為一寸以六十三為七寸餘一為一分共七寸一分為姑洗之律也三其八十一則巳為二百四十三分倍其六十四為一百二十八分二十七為一寸以一百八為四寸餘二十三為一分以十八為六分餘二一為三釐二為六釐共四寸六分六釐為應鐘之律也三其二百四十三則午為七百二十九分四其一百二十八為五百一十二分八十一為一寸以四百八十六為六寸餘二十六九為一分以十八為二分餘八一為一釐八為八釐共六寸二分八釐為蕤賔之律也三其七百二十九則未為二千一百八十七倍其五百一十二為一千二十四二百四十三為一寸以九百七十二為四寸餘五十二以二十七為一分餘二十五三為一釐以二十四為八釐餘一一為三毫共四寸一分八釐三毫止得大呂半律之數因居丑在陽倍之以一千二十四倍為二千四十八計得八寸三分七釐六毫為大呂之律也三其二千一百八十七則申為六千五百六十一四其一千二十四為四千九十六七百二十九為一寸以三千六百四十五為五寸餘四百五十一以八十一為一分以四百五為五分餘四十六九為一釐以四十五為五釐餘一為一毫共五寸五分五釐一毫為夷則之律也三其六千五百六十一則酉為一萬九千六百八十三倍其四千九十六為八千一百九十二二千一百八十七為一寸以六千五百六十一為三寸餘一千六百三十一二百四十三為一分以一千四百五十八為六分餘一百七十三二十七為一釐以一百六十二為六釐餘一十一三為一毫以九為三毫餘二一為三絲二為六絲共三寸六分六釐三毫六絲止得夾鐘半律之數因居卯在陽倍之以八千一百九十二倍為一萬六千三百八十四計得七寸四分三釐七毫三絲為夾鐘之律也三其一萬九千六百八十三則戍為五萬九千四十九四其八千一百九十二為三萬二千七百六十八六千五百六十一為一寸以二萬六千二百四十四為四寸餘六千五百二十四七百二十九為一分以五千八百三十二為八分餘六百九十二八十一為一釐以六百四十八為八釐餘四十四九為一毫以三十六為四毫餘八一為一絲八為八絲共四寸八分八釐四毫八絲為無射之律也三其五萬九千四十九則亥為一十七萬七千一百四十七倍其三萬二千七百六十八為六萬五千五百三十六一萬九千六百八十三為一寸以五萬九千四十九為三寸餘六千四百八十七二千一百八十七為一分以四千三百七十四為二分餘二千一百一十三二百四十三為一釐以一千九百四十四為八釐餘一百六十九二十七為一毫以一百六十二為六毫餘七三為一絲六為二絲餘一一為三忽共三寸二分八釐六毫二絲三忽止得仲呂半律之數因居巳在陽倍之以六萬五千五百三十六倍為十三萬一千七十二計得六寸五分八釐三毫四絲六忽餘二不盡為仲呂之律也其曰以三厯十二辰皆黃鐘之全數者蓋子一分則一為九寸是黃鐘之全數丑三分二則一為三寸三為九寸亦是黃鐘九寸之全數三分取其二故林鐘得六寸寅九分八則一為一寸九為九寸亦是黃鐘九寸之全數九分取其八故太蔟得八寸曰隂數以倍陽數以四者蓋黃鐘九寸下生則倍其實為一尺八寸以三分之每分六寸而得其一為林鐘即三分黃鐘九寸而損其一者也林鐘六寸上生則四其實為二尺四寸以三分之每分八寸而得其一為太蔟即三分林鐘六寸而益其一者也餘放此其候氣之法六陽辰當位自得子居子而寅居寅也六隂辰則居其衝丑則居未而卯則居酉也其林鐘在未南呂在酉應鐘在亥為隂原無半數故無所增損其大呂在丑夾鐘在卯仲呂在巳為陽吹之則用半數方其聲和也候氣之法乖舛詳見後十二律之實子黃鐘十七萬七千一百四十七全九寸半無丑林鐘十一萬八千九十八全六寸半三寸不用寅太蔟十五萬七千四百六十四全八寸半四寸卯南呂十萬四千九百七十六全五寸三分半二寸六分不用辰姑洗十三萬九千九百六十八全七寸一分半三寸五分巳應鐘九萬三千三百一十二全四寸六分六釐半二寸三分三釐不用午蕤賔十二萬四千四百一十六全六寸二分八釐半三寸一分四釐未大呂十六萬五千八百八十八全八寸三分七釐六毫半四寸一分八釐三毫申夷則十一萬五百九十二全五寸五分五釐一毫半二寸七分二釐五毫酉夾鐘十四萬七千四百五十六全七寸四分三釐七毫三絲半三寸六分六釐三毫六絲戌無射九萬八千三百四全四寸八分八釐四毫八絲半二寸四分四釐二毫四絲亥仲呂十三萬一千七十二全六寸五分八釐三毫四絲六忽餘二算半三寸二分八釐六毫二絲三忽黃鐘全九寸者以一萬九千六百八十三為一寸積十七萬七千一百四十七為九寸也半無者黃鐘至尊不為他律所役損益不及故不用半也林鐘於十七萬七千一百四十七內三分損一損五萬九千四十九則為十一萬八千九十八太蔟於十一萬八千九十八內三分益一益三萬九千三百六十六則為十五萬七千四百六十四南呂於十五萬七千四百六十四內三分損一損五萬二千四百八十八則為十萬四千九百七十六姑洗於十萬四千九百七十六內三分益一益三萬四千九百九十二則為十三萬九千九百六十八應鐘於十三萬九千九百六十八內三分損一損四萬六千六百五十六則為九萬三千三百一十二蕤賔於九萬三千三百一十二內三分益一益三萬一千一百四則為十二萬四千四百一十六蕤賔而後大呂當未應三分損其一也若損一止得大呂之半數因在陽倍之故以大呂於十二萬四千四百一十六內三分損一損四萬一千四百七十二為八萬二千九百四十四之數倍之則為十六為五千八百八十八夷則於十六萬五千八百八十八內三分損一損五萬五千二百九十六則為十一萬五百九十二夾鐘於十一萬五百九十二內三分益一益三萬六千八百六十四則為十四萬七千四百五十六無射於十四萬七千四百五十六內三分損一損四萬九千一百五十二則為九萬八千三百四仲呂於九萬八千三百四內三分益一益三萬二千七百六十八則為十三萬一千七十二夫黃鐘生十一律陽皆下生倍其實而損隂皆上生四其實而益蕤賔以後陽反四上生益而隂反倍下生損何也蓋從子至亥黃鐘太蔟姑洗陽之陽也林鐘南呂應鐘隂之隂也陽生隂退故律生呂言下生呂生律言上生蕤賔夷則無射隂之陽也大呂夾鐘仲呂陽之隂也隂升陽退故律生呂言上生呂生律言下生故鄭氏重上生法所以為不易之論而真西山失載其説不能不令人疑耳推前律半律法如姑洗十三萬九千九百六十八以一萬九千六百八十三為一寸二千一百八十七為一分除十三萬七千七百八十一為七寸餘二千一百八十七為一分故姑洗全七寸一分以十三萬九千九百六十八半之為六萬九千九百八十四除五萬九千四十九為三寸餘一萬九百三十五為五分故姑洗半三寸五分餘倣此凡律用半者以上律短而下律長故下律用半以成宮商角徵羽之五聲林鐘南呂應鐘三律受役於陽律依序而下乃自為上律而上律更無短者故不用半以相生之不及也按十二律之實約以寸法則黃鐘林鐘太蔟得全寸約以分法則南呂姑洗得全分約以釐法則應鐘蕤賔得全釐約以毫法則大呂夷則得全毫約以絲法則夾鐘無射得全絲至仲呂之實十三萬一千七十二以三分之不盡二算其數不行此律之所以止於十二也變律六黃鐘十七萬四千七百六十二小分四百八十六全八寸七分八釐一毫六絲二忽不用半四寸三分八釐五毫三絲一忽前正律至仲呂之實十三萬一千七十二以三分之不盡二算其數既不可行當有以通之律當變者有六故置一而六三之蓋自子之一而至午之六以三厯之得七百二十九以七百二十九乘仲呂之十三萬一千七十二共九千五百五十五萬一千四百八十八以三分之每分得三千一百八十五萬四百九十六三分益一共一萬二千七百四十萬一千九百八十四復以七百二十九歸之每黃鐘之一當七百二十九為黃鐘之十七萬四千七百六十二不盡零小分四百八十六為三分一之二蓋以七百二十九為一小分三分之每分得二百四十三則四百八十六為二百四十三者二乃三分一之二也以寸法計之十五萬七千四百六十四得寸者八以分法計之一萬五千三百九得分者七以釐法計之一千九百四十四得釐者八以毫法計之二十七得毫者一以絲法計之一十八得絲者六以忽法計之小分四百八十六一為三忽三分一之二為二忽得忽者二此全數也半數得八萬七千三百八十一小分二百四十三以寸分釐毫絲忽法計之得四寸三分八釐五毫三絲一忽全數不用者黃鐘君象也受役之律無長於此諸律不得而役之故虛其正而不用所用即再生之變者就再生之變又缺其半所謂缺其半者蓋若大呂為宮黃鐘為變宮時黃鐘管最長所以只得用其半其餘宮亦倣此林鐘十一萬六千五百八小分三百二十四全五寸八分二釐四毫一絲一忽三初半二寸八分五釐六毫五絲六初以黃鐘之一萬二千七百四十萬一千九百八十四三分之每分四千二百四十六萬七千三百二十八三分損一為八千四百九十三萬四千六百五十六以七百二十九歸之為下生林鐘之十一萬六千五百八零小分三百二十四以寸分釐毫絲法計之得全五寸八分二釐四毫一絲小分三百二十四以二百四十三為一忽餘八十一以二十七為一初為三初半之為五萬八千二百五十四小分一百六十二以法計之得半二寸八分五釐六毫五絲餘一百六十二為六初太蔟十五萬五千三百四十四小分四百三十二全七寸八分二毫四絲四忽七初不用半三寸八分四釐五毫六絲六忽八初以林鐘之八千四百九十三萬四千六百五十六三分之每分二千八百三十一萬一千五百五十二三分益一為一萬一千三百二十四萬六千二百八以七百二十九歸之為上生太蔟之十五萬五千三百四十四零小分四百三十二以法計之得全七寸八分二毫四絲三忽餘小分四百三十二除二百四十三為一忽共前為四忽餘一百八十九為七初半之為七萬七千六百七十二小分二百一十六以法計之得半三寸八分四釐五毫六絲六忽餘二百一十六為八初南呂十萬三千五百六十三小分四十五全五寸二分三釐一毫六絲一初六秒半二寸五分六釐七絲五忽一初三秒以太蔟之一萬一千三百二十四萬六千二百八三分之每分三千七百七十四萬八千七百三十六三分損一為七千五百四十九萬七千四百七十二以七百二十九歸之為下生南呂之十萬三千五百六十三零小分四十五以法計之得全五寸二分三釐一毫六絲餘小分四十五除二十七為一初餘十八三為一秒為六秒半之為五萬一千七百八十一小分五百二十二零五以法計之得半二寸五分六釐七絲三忽餘五百二十二零五除四百八十六為二忽共前五忽餘三十六零五除二十七為一初餘九零五除九為三秒不盡舊本四忽五初三秒今多六初姑洗十三萬八千八十四小分六十全七寸一釐二毫二絲二初二秒不用半三寸四分五釐一毫一絲一初一秒以南呂之七千五百四十九萬七千四百七十二三分之每分二千五百一十六萬五千八百二十四三分益一為一萬六十六萬三千二百九十六以七百二十九歸之為上生姑洗之十三萬八千八十四零小分六十以法計之得全七寸一釐二毫二絲餘小分六十除五十四為二初餘六為二秒舊本一初二秒今多一初半之為六萬九千四十二小分三十以法計之得半三寸四分五釐一毫一絲餘小分三十除二十七為一初餘三為一秒應鐘九萬二千五十六小分四十全四寸六分七毫四絲三忽一初四秒餘一算半二寸三分三毫六絲六忽六秒強不用以姑洗之一萬六十六萬三千二百九十六三分之每分三千三百五十五萬四千四百三十二三分損一為六千七百一十萬八千八百六十四以七百二十九歸之為下生應鐘之九萬二千五十六零小分四十以法計之得全四寸六分七毫四絲三忽餘小分四十除二十七為一初餘十三除十二為四秒不盡半之為四萬六千二十八小分二十以法計之得半二寸三分三毫六絲六忽餘小分二十除十八為六秒不盡變律者在正律之位而非正律之聲也律所以變者其故有三其一黃鐘至尊為君不為他律所役其十二律各自為宮以生五聲二變共七聲黃鐘林鐘太蔟南呂姑洗應鐘六律則能具足如黃鐘為宮則林鐘為徴太蔟為商南呂為羽姑洗為角應鐘為變宮蕤賔為變徵林鐘為宮則太蔟為徵南呂為商姑洗為羽應鐘為角蕤賔為變宮大呂為變徵十二律中自能具足五聲二變各得其正矣至蕤賔大呂夷則夾鐘無射仲呂六律則取黃鐘林鐘太蔟南呂姑洗應鐘六律之聲少下不和故有變律變律者其聲近正而少高於正律也蓋蕤賔為宮則未免反取黃鐘為變徵大呂為宮則未免反取黃鐘林鐘為變宮變徵黃鐘既變其次所生之律若仍本律則長不成曲亦當變焉如黃鐘為商則林鐘之羽太蔟之角南呂之變宮姑洗之變徵皆隨而變黃鐘為角則林鐘之變宮太蔟之變徵皆隨而變臣之從君理固然也其二黃鐘林鐘太蔟南呂姑洗應鐘上六律長蕤賔大呂夷則夾鐘無射仲呂下六律短以上律役下律則或正或半通而和以下律役上律則或正或半戾而不和故以上律役下律以下律役下律皆不必變惟以下律役上律則必變其上律使少短而與下律通也其三相生之法至仲呂而窮使不再生六律則上律不能遍七聲之用下律亦無由而通故以六三之乘仲呂之實三分益一復變而再生黃鐘之宮因再生故不及黃鐘九寸之舊數止得八寸有竒其下相因而生五律亦各於舊為減皆數之自然也太蔟姑洗之全不用者其律長相生所不及也應鐘之半不用者數之窮也故律止於六至應鐘而窮也蓋應鐘之實六千七百一十萬八千八百六十四以三分之每分二千二百三十六萬九千六百二十一餘一又不盡一算數又不可行此變律之所以止於六也古今律厯考卷二十九
