body:
  text: 古今律厯考卷十三明邢雲路撰歴代五歴代考晉書晉書云傳稱黃帝使伶倫自大夏之西崑崙之隂取竹之嶰谷斷兩節間長三寸九分而吹之以為黄鐘之宫又云黃帝作律以玉為管長尺周禮太師掌六律六呂以辯隂陽之聲及景王問律於泠州鳩其對六律六間甚悉至呂不韋言黃鐘之宮律之本也上下相生三分損益後代之言音律者多宗此說洎司馬遷作律書九三之為黃鐘之法參之十二辰為黃鐘之實實如法得黄鐘之律九寸上下相生隂陽得所班固律與馬遷同元帝時京房則作六十律嚴嵩傳之莫能為準蓋古典及今音家所用六十律者無施於樂惟以五聲十二律還相為宮之法制六孔十二笛有一定調故諸絃歌皆從笛為正於遷固所生分寸數皆倍焉餘則竝同斯則泠州鳩所謂六間之道賛助之法也已上諸說其論樂詳矣獨其所云黃帝以三寸九分為黃鐘則呂覽之誤文未可信也蓋冬至一陽來復根株黃泉之下其管必長其氣乃動故其音渾渾然濁泠州鳩於黃鐘名之為一謂為宣養六氣九德也曰宣養則初出尚微養之而已由是第之乃二曰太蔟謂為賛陽出滯然後次之姑洗至應鐘而極以漸宣布散越和展秀利其釋名各異焉若黃鐘遽短而清則泠州鳩何以始名宣養次乃出滯卒方散利耶夫亦焉有宣養之初即輕清而散利之後反重濁耶故管子曰宮聲如牛鳴窖中正狀其濁也况黃鐘九寸上下相生三分損益其數乃符若黃鐘三寸九分則宜用何術歩算也泠州鳩管子去古未遠相傳必眞而晉人誤信三寸九分之說使後之疑者遂縁此生議其無謂甚矣晉書又云黃帝作律以玉為管長尺曰尺則與九寸相近與三寸九分懸絶既而魏晉製律則皆遵黃鐘九寸之法無異術夫一人也忽然曰黃帝黃鐘三寸九分又忽然曰黄帝黃鐘長尺又忽然背黃帝仍用九寸為黃鐘何言行之不相顧也晉書論劉歆造三統厯以說左傳辯而非實班固惑之采以為志是編訢改行四分七十餘年儀式乃備非蓋三統四分其失均也漢靈帝光和中命㑹稽東部尉劉洪同蔡邕共修律厯漢厯三統四分皆四分之一餘分太强劉洪始覺冬至後天乃減歲餘更以五百八十九為紀法百四十五為斗分考冬至日日在斗二十二度又創制日行遲速兼考月行隂陽交錯於黃道表裏日行黃道於赤道宿度復進有退作乾象厯鄭𤣥受其法加以註釋司馬彪因之以繼班史云詳其術乾象演紀上元己丑以來至建安十一年積七千三百七十八年得丙戌歲以五百八十九年為紀法乃三十一章之年也計二百六十一年差一日一紀差二日二十五刻有奇以減一紀五百八十九年所積四分度之一之日一百四十七日二十五刻餘一百四十五日為斗分以紀法乘三百六十五日得二十一萬四千九百八十五日加斗分一百四十五日共得二十一萬五千一百三十日為周天以紀法而一得三百六十五日二十四刻六十一分八十秒為歲實以紀月七千二百八十五歸周天得二十九日五十三刻五分四十秒為朔實以周日法五千九百六十九除厯周天一十六萬四千四百六十六得二十七日五十五刻三十三分五十九秒為轉終以日周七千八百七十四歸周天得二十七日三十二刻一十五分六十四秒為交終交終較授時多十刻九十分計十年多十四日距交逺以課虧蝕不效矣乾象木星周三百九十八日八十八刻一分火星周七百七十九日四十八刻四十八分土星周三百七十八日八刻金星周五百八十四日二刻一十四分水星周一百一十五日八十八刻二十九分各有不同查五星歴代各不同總之皆未得其精即授時亦然所以至今五星多有乖失必也觀象儀度另立差法乃得其眞固有待而為也洪以五歸周天為通法以五歸紀月為日法以日法除通法得朔實則日法通法所宜用也然日法宜千四百五十七而厯四百五十七少千通法宜四萬三千二十八而厯四萬三千二十六少二又周天宜二十一萬五千一百三十而厯二十一萬五千一百四十多十章月宜二百三十五而厯二百四十五多十何也我知其故矣日法少千周天多十章月多十皆史書誤刻也即後推五星日法千四百五十七周天二十一萬五千一百三十章月二百三十五皆正知前誤刻非洪之差也至於通法宜餘八而卻六者以紀月除周天數尚少以推月策之分秒為眞至於五歸其數多則月策之分秒積實而上不無稍多故洪去其二亦權宜之術耳不則以紀月歸周天得二十九日五十三刻五分四十秒以五歸之紀月歸五歸之周天得二十九日五十三刻一十九分一十四秒較前分多矣故減通法之二為是也大都三統四分皆不知斗分之太多洪覺而減之漢厯無日月盈縮遲疾洪仰觀黃赤表裏隂陽交錯創立盈縮損益之數以合天歩雖其分數不無少差然以千古不明之竅自洪始發之使後人循此推測漸詣其精如晦始明如夢斯醒則洪之功大矣所惜者第於漢歴之先大餘後小餘滿法上加歲月一换其𤨏屑之狀仍舊貫未霍然釐去之為缺也魏文帝黃初中韓翊以為乾象減斗分太過造黃初厯以四千八百八十三為紀法千二百五十為斗分其所校厯更相是非無時而決徐岳議韓翊用洪法小益斗分至於日蝕有不盡效夫以黃初二年六月二十七日戊辰加時未日蝕乾象術加時申半强於消息就加未黃初以為加辛强乾象後天一辰半强為近黃初二辰半為遠消息與天近今以授時考之是年七月戊辰朔未時日蝕非六月二十七日查晉志二年七月十五日癸未月食則初一己巳此之戊辰乃六月二十九晦或九字誤為七也岳議三年正月丙寅朔加時申十一月二十九日庚寅晦加時申皆食黃初乾象各遠近異授時則正月丙寅朔午十二月庚申朔未非正月丙寅之申亦非十一月庚寅晦也蓋二厯交終疎所以課日不效其所歩五星尤疎魏尚書郎楊偉表稱漢厯疏闊臣考驗天路更建宻厯以大呂之月為歲首以建子之月為厯初漢武改元太初因名太初厯今改元景初宜曰景初厯臣之所建景初厯法數則約要施用則近宻治之則省功學之則易知雖復使研桑心算𨽻首運籌重黎司晷羲和察景以考天路歩驗日月究極精微盡術數之極者皆未能並臣如此之妙也是以累代厯數皆疏而不宻自黃帝以來常改革不巳壬辰元以來至景初元年丁巳歲四千四十六算止此元以天正建子黃鐘之月為厯初元首之歲夜半甲子朔旦冬至詳其術演紀上元壬辰以來至景初元年積四千四十六年得丁巳歲以萬一千五十八為一元乃六紀之年也以千八百四十三為一紀乃九十七章之年也計三百二十年有奇差一日一紀差五日七十五刻以減一紀千八百四十三年所積四分度之一之日四百六十七日七十五刻餘四百五十五日為斗分以紀法乘三百六十五日得六十七萬二千六百九十五日加斗分四百五十五日共得六十七萬三千一百五十日為周天以紀法而一得三百六十五日二十四刻六十八分八十秒為歲實以一紀之月二萬二千七百九十五月歸周天得二十九日五十三刻五分九十八秒為朔實五歸周天得十三萬四千六百三十為通數五歸紀月得四千五百五十九為日法若以日法歸通數亦得朔實以紀法併一紀之月得二萬四千六百三十八為月周以日法除通周十二萬五千六百二十一得二十七日五十五刻四十五分五秒爲轉終以月周除周天得二十七日三十二刻一十六分一十七秒為交終以較授時亦計十年多十四日其課蝕不效同景初木星周三百九十八日八十四刻七十九分火星周七百八十日八十三刻三十三分土星周三百七十八日九刻六十三分金星周五百八十四日八刻八十六分水星周一百一十五日七十八刻六分是五星較各厯分數亦各不同以待更而後定者夫楊偉謂漢厯疏闊自稱厯宻雖重黎羲和復出皆未能如己之妙則宜有奇籌宻布度越前人也乃其術盡皆劉洪之故法特别立一名耳漫改斗分反增歲餘以布諸法亦何益也偉以日道表裏交㑹遲疾添於紀首而不知洪之盈縮遲疾進退損益已有之矣其月食表裏所在則即洪之黃道去極也至於以建丑為正改其年三月為孟夏四月尤屬無謂三年帝崩乃復用夏正其劉氏在蜀仍漢四分厯吳常侍王蕃以洪術精妙制儀象故孫氏用乾象厯至吳亡晉武帝泰始元年因魏之景初厯改名泰始厯然即一厯也大都黃初已後改作厯術皆斟酌乾象所減斗分朔餘月行隂陽遲疾以求折衷洪術為後代推歩之師表云晉劉智推三百年斗厯改憲以為四分法三百年減一日以百五十為度法三十七為斗分皆屬浮說杜預著春秋長厯謂天行不一宜改憲以從乃作乾度厯其術合日行四分數而微增月術用三百年改憲之意以較古厯日蝕微勝然而四分之法三百年改憲之說非通論也至穆帝永和八年王朔之造通厯以甲子為上元積九萬七千年以四千八百八十三為紀法千三百五為斗分施行亦不協後秦姚興時當孝武太元九年甲申歲天水姜岌造三紀甲子元厯其畧言春秋日蝕與殷厯魯厯皆不應服䖍解傳用太極上元太極上元乃漢三統厯難施於春秋襄公二十七年十一月朔日蝕應在此月非再失閏劉歆厯日蝕多在二日因附五行傳著朓昃之說不曰厯失天而反寃天也杜預論所傅七厯非時王之術爲是皆斗分疏也斗分殷四分一三統一千五百三十九分之三百八十五乾象五百八十九分之一百四十五景初一千八百四十三分之四百五十五殷斗分麤故不施於今乾象斗分細故不通於古景初斗分雖在麤細之中而日之所在乃差四度課蝕不效今治新厯以二千四百五十一分之六百五為斗分日在斗十七度以考春秋三十六蝕正朔者二十五蝕二日者二蝕改者二誤者五春秋至今一千餘歲蝕多在朔豈三百歲斗厯改憲者乎甲子上元以來至魯隱元年己未歲凡八萬二千七百三十六至晉孝武太元九年甲申歲凡八萬三千八百四十一算乃作三紀厯斯岌所言皆是足破前古之疑獨其所考春秋日蝕尚有蝕二日者二以授時考之則皆朔也蓋岌已得其十之七八至授時則益精耳姜岌三紀厯以一百二十九章之歲二千四百五十一為紀法以三紀之歲七千三百五十三為元法三紀為元故曰三紀厯岌定以三百一十六年有奇差一日一紀差七日七十五刻以減一紀二千四百五十一年所積四分度之一之日六百一十二日七十五刻餘六百五日為斗分以紀法乘三百六十五日得八十九萬四千六百一十五日加斗分六百五日共得八十九萬五千二百二十日為周天以紀法而一得三百六十五日二十四刻六十八分三十八秒為歲實以百二十九章乘章月二百三十五得三萬三百一十五為紀月以紀月歸周天得二十九日五十三刻五分九十五秒為朔實五歸紀月得六千六十三為日法五歸周天得一十七萬九千四十四為通數以日法除通數亦得朔實以日法除通周十六萬七千六十三得二十七日五十五刻四十五分一十秒為轉終以月周三萬二千七百六十六除周天得二十七日三十二刻一十六分一十三秒為交終且紀月周天自足用矣焉用五歸相仍不易不知其何故也岌之厯較前爲詳而交終之多則與景初同於五星亦未見考正其最切者則以月蝕檢日宿度所在為厯術者宗焉又著渾天論以歩日於黄道駁前儒之失竝得其中獨柰何其厯未見之施行也五歸紀月周天之類有何取義不過亂其端緒使人莫測厯家専務此術後來者益多甚有千萬其乘除者古今律厯考巻十三
