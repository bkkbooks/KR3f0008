body:
  text: 古今律厯考卷四十四明邢雲路撰厯法九厯去太陰躔度詳推授時推朔後平交日置交終分內減天正經朔交泛全分為朔後平交日分如推次月於推得朔後平交日分內纍減交差二日三一八三六九得各次月朔後平交日分如不及減加交終為月重交月朔後平交日分次復纍減交差得各月朔後平交日分推平交距後度置朔後平交日全分以月平行分一十三度三六八七五乘之得數為平交距後度分如推次月者於平交距後度分內纍減月平交差三十度九九三六九五五六八七五得各次月平交距後度分如不及減加入交終度三百六十三度七九三四一九六為重交月平交距後度分次復纍減月平交差分得各月平交距後度分推平交入轉遲疾厯置經朔下遲厯疾厯全分內加入朔後平交日分為平交入轉遲疾厯日分如遇滿轉中已上者內減去轉中分是遲厯為疾厯疾厯為遲厯推限數并平交入限遲疾厯置平交入轉遲疾厯全分以一十二限二十分為法乘之得限數置平交入轉遲疾厯限數下遲疾厯日率減之為實以損益捷法乘之得數加減遲疾度全分得平交入限遲疾度分推平交加減定差置平交入限遲疾度以限下遲疾捷法乘之遲為加差疾為減差推經朔加時中積日置經朔下盈縮厯全分盈厯者就為加時中積如是縮厯者加入半嵗周為經朔加時中積遇重交月以本月經朔加時中積注於重交月下如推次月以加時中積纍加朔䇿為各經朔加時分滿歲周去之為加時中積分推正交距冬至加時黃道積度置經朔加時中積分內加平交距後度為正交距冬至加時黃道積度滿嵗周去之如推各次月者於正交距冬至加時黃道積度全分內纍減月平交朔差一度四十六分三一二如不及減者加歲周減之推至重交月本月減月平較差一度四十四分九八為重交月次復纍減月平交朔差如在半嵗周已下者為冬至後半嵗周已上者為夏至後推正交月離黃道宿次度分置各月正交距冬至加時黃道積度加嵗前天正冬至加時黃道宿次全分滿黃道宿次積度鈐減之得各正交月離黃道宿次度分推各嵗前冬至日躔赤道宿次置各中積加周應滿周天鈐去之得各歲前冬至日躔赤道宿次分赤道宿次相接積度鈐推各嵗前冬至日躔黃道宿次置各歲前冬至赤道宿次度分以初日下赤道度率而一得各歲前冬至日躔黃道宿次分黃道宿次相接積度鈐推平交日辰置經朔全分加朔後平交日辰全分得平交日辰滿六十日去之如推次月者置平交日辰全分纍加交終二十七萬二一二二二四滿六十日去之餘為次月平交日辰如遇重交與閏月一同加之推正交日辰置各平交日辰全分以平交加減定差加減之命甲子算外得正交日辰依發斂求之得時刻推其年二至二分各四正赤道宿次度分置冬至赤道宿度分如推春分夏至秋分纍加象限九十一度三一六二五滿赤道宿次積度鈐減之各得四正赤道宿次推定限日視定朔日辰某甲子數至首太陰宿次正交日辰某甲子算得各定限日期如定朔是丙寅正交是庚午者乃定限初五日也他倣此推黃道正交在二至後初末限度分置首太陰各正交距冬至加時黃道積度全分如在半歲周已下者就為冬至後如在半嵗周已上者於內減去半歲周餘為夏至後如夏至後限度分在象限已下者為初限已上者半歲周內減去夏至後全分為末限如推各次月初末限度分者視初限則纍減月平交朔差一度四十六分三一二餘為次月初限如不及減者加半歲周減之末限則纍加月平交朔差全分為次月末限遇閏月加減亦然惟重交月以重交月內加減月平交朔較差一度四十四分九八得為重交月初末限度推定差度分置初末限度分以象極總差一分六十秒五五乘之得定差度分如推次月定差度者如是初限則纍減末限則纍加極平差二十三分四九二得次月定差度閏月亦然惟重交月及初末限交處只依首位推之得後仍用極平差分或加或減之推距差度分置極差一十四度六十六分內減去定差度分得各距差度分如推次月者以初加末減極平差分得次月也其重交月仍置重交月差度依前首加減推定限度分置各定差度全分為實以定極總差一分六十三秒七一乘之得數視黃道正交二至初末限度如在冬至後者以減九十八度為定限度如在夏至後者加入九十八度為定限度推月與赤道正交宿度視黃道正交二至後初末限度分如在冬至後者是初限置距差度分內加春分下四正赤道宿度是末限以距差度分減春分下四正赤道宿次全分餘為月與赤道正交宿度如春分下四正赤道宿次度分少不及減者加春分四正赤道宿次前一宿本度分減之如在夏至後者是初限以距差度分減秋分下四正赤道宿次全分餘為月與赤道正交宿度如不及減依前加而減之是末限置距差度分內加秋分下四正赤道宿次全分得月與赤道正交宿度又如冬至後初限春分內加其距差度夏至後末限秋分內加其距差度如滿宿本度分去之餘得月與赤道正交宿度若加後不滿各宿本度分者其宿仍舊推定朔弦望日定甲子與相距日置各月定朔定弦定望各全分大餘命甲子算外得某日辰為定甲子以定朔弦望日次段大餘內減本段大餘得相距日推定盈縮厯日并二至後初末限日置各月朔與弦望下盈縮厯全分各以加減差加減之得定盈縮厯分二至後初末限日視定盈縮全分如是盈厯在八十八日九九二二五已下為初限已上反減半歲周為末限如是縮厯在九十三日七一二二五以下為初限已上反減半嵗周為末限推定朔弦望加時中積度并盈縮定差度置盈縮厯全分如是盈厯在朔下為盈積度在上弦者加氣象限在望下者加半嵗周在下弦者加三象限共得定朔弦望加時中積度如是縮厯在朔下者加半嵗周在上弦者加三象限在望下者就為積度在下弦者加象限共為定朔弦望加時中積度加後滿周天去之置各盈縮初末限全分以大餘積日下加分以初末日小餘乘之得數加其下積度即得盈縮定差度分推黃道加時定積度置定朔弦望加時中積度全分以盈縮定差度全分盈加縮減之即得各黃道加時定積度分如滿周天去之推赤道加時積度并赤道加時宿次置各黃道加時定積度全分如滿周天象限去之為至後如滿二象限去之為至後如滿三象限去之為分後在至後者以赤道加時積度減之至後大餘以元減乘之得數以至後積度全分加之又加入元減去或一二三象限全分得赤道加時積度分如在分後者置赤道加時積度以分後積度全分減之以元減乘之得數內加入分後積度及加元減去各象限全分共為推得赤道加時積度分求赤道加時宿次度者置赤道加時積度全分內加入其年嵗前冬至赤道宿次全分共得如滿赤道宿次積度鈐內各宿次及減積度全分去之餘為次宿度分即得赤道加時宿次度分推赤道宿次積度鈐推正半中交後積度并初末限度與月道赤道定差度正半中交後積度分者置各赤道加時宿次全分內加入同月道內本宿前一宿月與赤道正交後宿積度全分共得正半中交後積度初末限度分者視各正半中交後積度全分如在半象限四十五度六五五三以下者即為初限度分如在半象限以上者以減象限九十一度三一六餘為末限度分月道赤道定差度分者置各月弦望朔下初末限全分以減正交定限度全分為實復用初末限全分為法乘之得數視正半中交後積度是正交中交者為加差是前後二段半交為減差推正半中交加時積度并定朔弦望月道宿次度正半中交加時積度分者置各正半中交後積度全分以各月道赤道定差度全分加減之得各正半中交加時積度分其正半中交正者仍正半者仍半中者仍中定朔弦望月道宿次度分者置各正半中交加時積度全分視正交如遇初末限度交換之年其月道宿次必超一十四宿不用如不在交換之年只以月道內視其各正半中交後宿次前一宿下月道積度全分減之餘得定朔弦望月道宿次如遇當減宿次是首位重宿者減次位正交下宿度分宿前一宿者是各赤道加時宿次之前一宿也今推得宿次是角者仍為角亢仍為亢其推得度或多少不過一度惟井斗二宿有差三四度者如所減宿次是角者餘為亢宿度分餘同此例如遇重半為正交月用者乃中間欠一正交此為半半相接而不及減者加入其月活象限減之其重半交凡入正交後或半或中交而不及減者皆加氣象限減之如中交接正交乃欠半交此中正相接而不及減者加活象限全分及前後段半交後宿次前一宿下月道積度全分然後減之餘為正交凡正交不及減者加活象限減之太陰九道正半中交變化加減氣活二象限之圖或遇同月重半者次段半交數少不及減者加氣象限全分減之若中間欠一正交者加活象限減之如遇同月重半次段半交數太多前段半交數太少不必加即減之或遇隔月半重者氣象活象限皆不必加即減之餘為相距度分推夜半入轉日分及遲疾轉定度與加時入轉度夜半入轉日分者置各月經朔弦望下遲疾厯全分以加減差加減之以減其下定朔弦望小餘全分餘得夜半入轉日分小餘如是遲厯加入轉中一十三日七七七三如遇定朔小餘分多不及減者遲疾皆加轉終減之遲疾轉定度分者視夜半入轉日大餘日下轉定度全分為遲疾轉定度分遲疾轉定度立成鈐入轉轉定度分加時入轉度分者置定朔弦望日小餘全分以遲疾轉定度乘之得加時入轉度分推夜半入轉積度分并夜半月道宿次度分夜半入轉積度分者置各正半中交加時積度全分內減去加時入轉度全分餘為夜半入轉積度分其正半中交正者仍正半者仍半中者仍中如不及減或加氣象限或加活象限然後減之是正者為半前半者為中中者為半後半者為正凡及減者皆不變夜半月道宿次度分者置夜半入轉度全分以定朔弦望月道宿次是某宿與各正半中交後某宿前之宿下挨及減之月道積度全分減之餘為夜半月道宿次度分凡及減者即得本宿如角得角亢得亢也如不及減者加後減之得前宿也如是亢者得角是角者得軫若遇當減之宿是月道首位重宿者加入重宿首一位下全數是也凡加氣或加活後減月道積度加後滿氣象限去之如夜半入轉積度分少不及減月道積度分者其元加氣加氣減之元加活加活減之推晨入轉日并晨分及晨入轉度晨入轉者置各夜半入轉日全分視定盈縮厯日大餘下晨分加之共得晨入轉日晨轉度分者置遲疾轉定度全分以晨分乘之得晨轉度分推晨入轉積度并晨宿次度晨入轉積度分者置各夜半入轉積度全分加入晨轉度全分為晨入轉積度分晨宿次度分者置晨入轉積度全分減去月道內正半中交後宿次視夜半月道宿次同宿下或前後宿下月道積度全分減之餘為晨宿次度分推昏入轉日并昏分及昏轉度昏入轉日者置夜半入轉日全分視定盈縮厯日大餘下昏分加之為昏入轉日昏轉度分者置遲疾轉定度全分以昏分乘之為昏轉度分推昏入轉積度分并昏宿次度分昏入轉積度分者置夜半入轉積度全分內加入昏轉度分為昏入轉積度分如後滿氣象限去之昏宿次度分者置昏入轉積度全分減去月道內正半中交後宿次視夜半月道宿次同宿下前後宿下月道積度全分減之餘得昏宿次度分如遇當減宿次是月道首位重宿者只減次正交下月道積度分推晨昏宿次度分置各定朔弦望月道宿次度分依相距度各晨昏加減定差度分加減之即得各晨昏宿次度分如不及者即加月道前一宿次全分減之餘為前宿也推相距度并轉積度相距度分者置各次段昏入轉積度全分內加氣象限減昏入轉積度全分餘為朔與上弦推得相距度分轉積度分者朔與上弦用昏望與下弦用晨置各晨昏若干日內減去前段晨與昏若干日餘得相距日如不及減加入二十八日減之如相距日是六日者在前一行如七日者在中一行如八日在後一行如遇晨昏各相減餘八日相距日七日乃多一日在後行轉積度內減去轉定度極差一十四度七一五四餘為晨昏日下轉積度分又加減定差法以各定朔弦望日下小餘全分相減各晨昏分餘以其各遲疾轉定度乘之得定差視晨昏分多如定朔弦望日下小餘分為加差少為減差又相距度分法視正半中交加時積度如是正交或半交變為正交者置月道下活象限全分內加入次段正半中交加時積度全分減去正半中交加時積度全分以次段定差加減之次視本段定差是加差者減之是減差者加之朔與上弦者用昏分加減定差望與下弦者用晨分加減定差晨昏相距日轉積度分立成鈐推加減差以相距度分相減轉積度分餘以相距日除之為加減差分如相距度多為加差轉積度多為減差推赤道正交後積度置赤道十二宮次宿度內各辰下宿次全分內加本辰下宿次前一宿月與赤道正交後宿次積度分共得赤道正交後積度分次辰下者纍加十二宮率三十度四三八一共為各次辰下赤道正交後積度分如滿氣象去之變為前段半交十二宫界赤道宿次度分此元至元辛巳宮界今推宮界見日躔下推初末限度視赤道正交後積度全分如在半象限四十五度六五五三已下為初限度分如在半象限已上者用以去減氣象限餘得末限度分推定差度置定限度全分內減去末限全分餘以初末限全分乘之得定差視在正交與中交已後者為加差在前後二段半交已後為減差推月道積度置赤道正交積度全分內加減定差分得月道積度分推宮界宿次度置各月道積度全分內減去太隂月道本宿次前一宿次月道積度全分餘得各辰次下宮界宿次度分古今律厯考卷四十四
