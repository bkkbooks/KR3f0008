body:
  text: 古今律厯考卷三十九明邢雲路撰厯法四厯法太陽躔度詳推授時推各歲前冬至日躔赤道宿次分置各中積命為度以刻為分加周應起虛六度滿周天鈐去之得各歲前冬至日躔赤道宿次分赤道度虛八度九十五分危十五度四十分室十七度一十分壁八度六十分奎十六度六十分婁十一度八十分胃十五度六十分昴十一度三十分畢十七度四十分觜初度五分參十一度一十分井三十三度三十分鬼二度二十分柳十三度三十分星六度三十分張十七度二十五分翼十八度七十五分軫十七度三十分角十二度一十分亢九度二十分氐十六度三十分房五度六十分心六度五十分尾十九度一十分箕十度四十分斗二十五度二十分牛七度二十分女十一度三十五分推各歲前冬至日躔黃道宿次分置各歲前冬至赤道宿次度分以初日下赤道度率而一得各歲前冬至日躔黃道宿次分黃道度箕九度五十九分斗二十三度四十七分牛六度九十分女十一度十二分虛九度七十五秒危十五度九十五分室十八度三十二分壁九度三十四分奎十七度八十七分婁十二度三十六分胃十五度八十一分昴十一度八分畢十六度五十分觜初度五分參十度二十八分井三十一度三分鬼二度十一分柳十三度星六度三十一分張十七度七十九分翼二十度九分軫十八度七十五分角十二度八十七分亢九度五十六分氐十六度四十分房五度八十四分心六度二十七分尾十七度九十五分推黃赤道及定象限度分以推得天正赤道宿次減天正黃道宿次餘為黃赤道差與次年黃赤道差相減餘一十二秒以四而一得三秒加入周天象限內共得九十一度三一九二五為定象限度分若黃赤道差相減餘一十一秒以四而一得二秒七十五微加入歲周象限內共得九十一度三十一分九亦為其年定象限度分以後纍加不同即將二年之差三秒併入二秒七十五微得數半之為二秒八十七微半加入歲周象限共得九十一度三一九一二五為定象限度分纍加之自與各年原推加時黃道積度合推四正定氣日以原推得冬夏二至日及刻分秒即冬夏二正定氣冬至加盈初縮末限滿紀法去之為春正定氣夏至加縮初盈末限滿紀法去之為秋正定氣又法春分日及刻分秒減盈縮度差餘為春正定氣秋分日及刻分秒加盈縮度差得為秋正定氣如求次年四正定氣就與本年四正定氣內各加歲餘即次年四正定氣各以甲子算外得四正日期推相距日以本段定氣大餘減次段定氣大餘加六十日得相距日如次段日不及減者加六十日減之再加六十日為相距日相距多則九十三四日少則八十八九日推四正加時日躔黃道積度以天正冬至加時黃道全分纍加定象限度分各得四正加時黃道積度加一次得春正二次夏正三次秋正再加即次年冬正推四正加時減分各以四正定氣小餘以四正初日行度乘之即得加時減分如天正冬至初日行度一度五一八五以乘冬至小餘得冬正加時減分春正距夏正如是九十三日者行度度九九九七三九十四日者行度一度各以行度乘春正小餘得春正加時減分如夏至初日行度度九五一五一六以乘夏至小餘得夏正加時減分秋正距次年冬正如是八十八日者行度一度五五八十九日者行度一度各以行度乘秋正小餘得秋正加時減分次年冬正加時減分如本年冬正求之即得推夜半積度以四正加時黃道積度全分於內減去各正加時減分餘為各正夜半日度推四正夜半宿次置夜半黃道度全分以黃道度去之不滿黃道度者即入宿次推相距度以冬正夜半積度減春正夜半積度餘為冬正距春正度以春正夜半積度減夏正夜半積度餘為春正距夏正度以夏正夜半積度減秋正夜半積度餘為夏正距秋正度以秋正夜半積度減次年冬正夜半積度餘為秋正距次年冬正度如不及減加周天減之推日差以相距度與相距日下行定度減之餘以相距日而一得日差如相距度內減去行定度者為加差行定度內減去相距度者為減差四正相距日及行定度分秋正距冬至冬至距春正八十八日行定度九十度四九三五八十九日行定度九十一度四一四四一春正距夏至夏至距秋正九十三日行定度九十度五九九九十四日行定度九十一度五九八七推每日晨前夜半日度以冬夏二至夜半日度宿次全分自二至初日下行度順次加之即得每日夜半日度及分秒及加減日差如滿黃道本宿度及分秒去之餘入次宿度如是加行度一次則加減日差一次滿黃道本宿度去之即得夜半日度如是春秋二正各以相距日下行度加之亦加減日差滿黃道本宿度去之得每日夜半日度日躔黃道入十二次宮界度推日躔黃道入十二次時刻以入次宿度及分秒以其日晨前夜半日度宿次減之餘為實以其日行定度而一得數以發斂法收之即入次時刻行定度者是原減入次得夜半日度與次日夜半日度相減餘而得古今律厯考卷三十九
