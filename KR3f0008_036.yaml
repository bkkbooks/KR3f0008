body:
  text: 古今律厯考卷三十六明邢雲路撰厯法一厯法授時厯步氣朔距至元辛巳為元其諸應等數隨時推測不用為元歲實三百六十五日二十四刻二十五分百年上長一下消一朔實二十九日五十三刻五分九十三秒氣策一十五日二十一刻八十四分三十七秒五十微弦策七日三十八刻二十六分四十八秒二十五微望策一十四日七十六刻五十二分九十六秒五十微通餘五日二十四刻二十五分通閏十日八十七刻五十三分八十四秒月閏九十刻六十二分八十二秒氣盈二十一刻八十四分三十七秒五十微朔虛四十六刻九十四分七秒沒限七十八刻一十五分六十二秒五十微盈策九日六十六刻九十五分二十八秒虛策二日九十一刻四分二十二秒土王策一十二日一十七刻四十七分五十秒候策五日七刻二十八分一十二秒五十微宿策一日五十三刻五分九十三秒氣應五十五日六刻閏應二十日二十刻五十分旬周六十日亦名紀法推天正冬至置所求距算以歲實乘之為中積加氣應為通積滿旬周去之不盡以日周約之為日不滿為分其日命甲子算外即所求天正冬至日辰及分如徑求次年者冬至加通餘滿旬周去之即得如上考者以氣應減中積滿旬周去之不盡以减旬周餘同上求次氣置天正冬至分以氣策纍加之其日滿紀法去之命如前各得次氣日及分秒推天正閏餘置中積加閏應為閏積滿朔實去之不盡為閏餘視閏餘分如在以通閏去朔實一十八日六十五刻五十二分九秒已上者其年有閏已下者無如徑求次年者閏餘加通閏滿朔實去之即得定閏者以月閏纍去餘分以次得閏某月推天正經朔置通積減閏餘滿旬周去之不盡以日周約之為日不滿為分即所求天正經朔日及分秒又置冬至減閏餘不及減者加紀法減之亦得上考者以閏應減中積滿朔實去之不盡以減朔實為閏餘以日周約之為日不滿為分以減冬至日及分不及減者加紀法減之命如上求弦望及次朔置天正經朔日及分秒以弦策纍加之其日滿紀法去之各得弦望及次朔日及分秒氣盈朔虛氣策之餘數為氣盈三十日減朔實為朔虛沒日置十六日減氣策為沒限視有沒之恆氣分秒恆氣小餘如在沒限以上為有沒之氣以半月十五日乘之用減氣策餘滿氣盈而一為日併入恆氣日命為沒日即今盈日滅日視有滅之朔分秒經朔小餘如在朔虛以下為有滅之朔以一月三十日乘之滿朔虛而一為日併入經朔日命為滅日即今虛日土王用事日置歲實以五行而一得七十三日四刻八十五分是每行所王之數土居四季以四而一得每季土王十八日二十六刻二十一分二十五秒以減正氣三十日四十三刻六十八分七十五秒餘一十二日一十七刻四十七分五十秒為土王策以加四季節各大小餘分秒內滿紀去之得土王用事日辰二氣為正氣一氣為恆氣月閏通閏以一月二氣盈加朔盈得月閏以十二月乘之得通閏候策置歲實以七十二候而一即得各分氣候氣候正月立春正月節雨水正月中東風解凍蟄蟲始振魚陟負冰獺祭魚候鴈北草木萌動二月驚蟄二月節春分二月中桃始華倉鶊鳴鷹化為鳩𤣥鳥至雷乃發聲始電三月清明三月節榖雨三月中桐始華田鼠化為鴽虹始見萍始生鳴鳩拂其羽戴勝降于桑四月立夏四月節小滿四月中螻蟈鳴蚯蚓出王瓜生苦菜秀靡草死麥秋至五月芒種五月節夏至五月中螳螂生鵙始鳴反舌無聲鹿角解蜩始鳴半夏生六月小暑六月節大暑六月中溫風至蟋蟀居壁鷹始摰腐草為螢土潤溽暑大雨時行七月立秋七月節處暑七月中涼風至白露降寒蟬鳴鷹乃祭鳥天地始肅禾乃登八月白露八月節秋分八月中鴻鴈來𤣥鳥歸羣鳥養羞雷始收聲蟄蟲坯户水始涸九月寒露九月節霜降九月中鴻鴈來賓雀入大水為蛤菊有黃華豺乃祭獸草木黃落蟄蟲咸俯十月立冬十月節小雪十月中水始冰地始凍雉入大水為蜃虹藏不見天氣上升地氣下降閉塞而成冬十一月大雪十一月節冬至十一月中鶡鴠不鳴虎始交荔挺出蚯蚓結麋角解水泉動十二月小寒十二月節大寒十二月中鴈北鄉鵲始巢雉雊雞乳征鳥厲疾水澤腹堅中氣去經朔置天正閏餘命之得冬至去經朔以月閏纍加之各得中氣去經朔滿朔策去之乃全置閏然俟定朔無中氣者裁之發斂加時置所求分秒以十二乘之為時餘以十二歸之為刻此發斂法也一法以日下十數加二為時進五為初刻不進五為正刻進五者進子正刻初後之半時也不進者以正對正之整時也以十下刻數減二為刻缺千為子正缺百為正初與發斂法合直宿朔實減二十八日為宿策置通積減閏餘以二十八日纍去之命虛宿算外得直宿分以宿策纍加之得各月直宿各以加減差加減之得各月定直宿建日建除滿平定執破危成收開閉終而復始交節後各以月支為建故節日與上日同名納音置先天甲己子午九乙庚丑未八丙辛寅申七丁壬卯酉六戊癸辰戌五己亥四之數以大衍用數四十有九減之餘以五行生數水火木金土遞數之至某行以所生為納音如求甲子乙丑納音金置甲與子各九乙與丑各八共三十四以減四十九餘十五以五行遞數得土土生金為納音是也餘倣此步日躔周天分三百六十五萬二千五百七十五分周天三百六十五度二十五分七十五秒半周天一百八十二度六十二分八十七秒半天周象限九十一度三十一分四十三秒太歲差一分五十秒黃道歲差一分三十八杪周應三百一十五萬一千七十五分半歲周一百八十二日六十二刻一十二分半歲周象限九十一日三十一刻六分少盈初縮末限八十八日九十刻九十二分少縮初盈末限九十三日七十一刻二十分少盈縮度差二日四一四推天正經朔弦望入盈縮厯置半嵗周以閏餘日及分減之即得天正經朔入縮厯冬至後盈夏至後縮以弦策纍加之各得弦望及次朔入盈縮厯日及分秒滿半歲周去之即交盈縮求盈縮差視入厯盈者在盈初縮末限已下為初限已上反減半歲周餘為末限縮者在縮初盈末限已下為初限已上反減半歲周餘為末限其盈初縮末者置立差三十一以初末限乘之加平差二萬四千六百又以初末限乘之用減定差五百一十三萬三千二百餘再以初末限乘之滿億為度不滿退除為分秒縮初盈末者置立差二十七以初末限乘之加平差二萬二千一百又以初末限乘之用減定差四百八十七萬六百餘再以初末限乘之滿億為度不滿退除為分秒即所求盈縮差又術置入限分以其日盈縮分乘之萬約為分以加其下盈縮積萬約為度不滿為分秒亦得所求盈縮差赤道宿度角十二度一十分亢九度二十分氐十六度三十分房五度六十分心六度五十分尾十九度一十分箕十度四十分右東方七宿七十九度二十分斗二十五度二十分牛七度二十分女十一度三十五分虛八度九十五分太危十五度四十分室十七度一十分壁八度六十分右北方七宿九十三度八十分太奎十六度六十分婁十一度八十分胃十五度六十分昴十一度三十分畢十七度四十分觜初度五分參十一度一十分右西方七宿八十三度八十五分井三十三度三十分鬼二度二十分栁十三度三十分星六度三十分張十七度二十五分翼十八度七十五分軫十七度三十分右南方七宿一百八度四十分推冬至赤道日度置中積以加周應為通積滿周天分去之不盡以日周約之為度不滿退約為分秒命起赤道虛宿六度外去之至不滿宿即所求天正冬至加時日躔赤道宿度及分秒上考者以周應減中積滿周天去之不盡以減周天餘以日周約之為度餘同上如當時有宿度者止依當時宿度命之求四正赤道日度置天正冬至加時赤道日度纍加象限滿赤道宿次去之各得春夏秋正日所在宿度及分秒求四正赤道宿積度置四正赤道宿全度以四正赤道日度及分減之餘為距後度以赤道宿度纍加之各得四正後赤道宿積度及分黃赤道率推黃道宿度置四正後赤道宿積度以其赤道積度減之餘以黃道率乘之如赤道率而一所得以加黃道積度為二十八宿黃道積度以前宿黃道積度減之為其宿黃道度及分其秒就近為分黃道宿度角十二度八十七分亢九度五十六分氐十六度四十分房五度四十八分心六度三十七分尾十七度九十五分箕九度五十九分右東方七宿七十八度二十二分斗二十三度四十七分牛六度九十分女十一度一十二分虛九度分太危十五度九十五分室十八度三十二分壁九度三十四分右北方七宿九十四度一十分太奎十七度八十七分婁十二度三十六分胃十五度八十一分昴十一度八分畢十六度五十分觜初度五分參十度二十八分右西方七宿八十三度九十五分井三十一度三分鬼二度一十一分栁十三度星六度三十一分張十七度七十九分翼二十度九分軫十八度七十五分右南方七宿一百九度八分右黃道宿度依今厯所測赤道准冬至歲差所在算定以憑推步若上下考驗據歲差每移一度依術推變各得當時宿度推冬至加時黃道日度置天正冬至加時赤道日度以其赤道積度減之餘以黃道率乘之如赤道率而一所得以加黃道積度即所求年天正冬至加時黃道日度及分秒求四正加時黃道日度置所求年冬至日躔黃赤道差與次年黃赤道差相減餘四而一所得加象限為四正定象度置冬至加時黃道日度以四正定象度纍加之滿黃道宿次去之各得四正定氣加時黃道宿度及分求四正晨前夜半日度置四正恆氣日及分秒冬夏二至盈縮之端以恆為定以盈縮差命為日分盈減縮加之即為四正定氣日及分置日下分以其日行度乘之如日周而一所得以減四正加時黃道日度各得四正定氣晨前夜半日度及分秒求四正後每日晨前夜半黃道日度以四正定氣日距後正定氣日為相距日以四正定氣晨前夜半日度距後正定氣晨前夜半日度為相距度纍計相距日之行定度與相距度相減餘如相距日而一為日差相距度多為加相距度少為減以加減四正每日行度率為每日行定度纍加四正晨前夜半黃道日度滿宿次去之為每日晨前夜半黃道日度及分秒求每日午中黃道日度置其日行定度半之以加其日晨前夜半黃道日度得午中黃道日度及分秒求每日午中黃道積度以二至加時黃道日度距所求日午中黃道日度為二至後黃道積度及分秒求每日午中赤道日度置所求日午中黃道積度滿象限去之餘為分後內減黃道積度以赤道率乘之如黃道率而一所得以加赤道積度及所去象限為所求赤道積度及分秒以二至赤道日度加而命之即每日午中赤道日度及分秒黃道十二次宿度危十二度六十四分九十一秒入娵訾之次辰在亥奎一度七十三分六十三秒入降婁之次辰在戌胃三度七十四分五十六秒入大梁之次辰在酉畢六度八十八分五秒入實沈之次辰在申井八度三十四分九十四秒入鶉首之次辰在未栁三度八十六分八十秒入鶉火之次辰在午張十五度二十六分六秒入鶉尾之次辰在巳軫十度七分九十七秒入夀星之次辰在辰氐一度一十四分五十二秒入大火之次辰在卯尾三度一分一十五秒入析木之次辰在寅斗二度七十六分八十五秒入星紀之次辰在丑女二度六分三十八秒入𤣥枵之次辰在子求入十二次時刻各置入次宿度及分秒以其日晨前夜半日度減之餘以日周乘之為實以其日行定度為法實如法而一所得依法斂加時求之即入次時刻古今律厯考卷三十六
