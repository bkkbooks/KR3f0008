body:
  text: 古今律厯考卷四十七明邢雲路撰厯法十二厯法刻漏詳推授時元史論晝夜刻日出為晝日入為夜晝夜一周共為百刻以十二辰分之毎辰得八刻三分刻之一無間南北所在皆同晝短則夜長夜短則晝長此自然之理也春秋二分日當赤道出入晝夜正等各五十刻自春分以及夏至日入赤道内去極浸近夜短而晝長自秋分以及冬至日出赤道外去極浸逺晝短而夜長以地中揆之長不過六十刻短不過四十刻地中以南夏至去日出入之所為逺其長有不及六十刻者冬至去日出入之所為近其短有不止四十刻者地中以北夏至去日出入之所為近其長有不止六十刻者冬至去日出入之所為逺其短有不及四十刻者今京師冬至日出辰初二刻日入申正二刻故晝刻三十八夜刻六十二夏至日出寅正二刻日入戌初二刻故晝刻六十二夜刻三十八蓋地有南北極有高下日出入有早晏所以不同耳今授時厯晝夜刻一以京師為正其各所實測高下俱各不同四海測驗凡二十七所東極髙麗西至滇地南踰朱崖北盡鐵勒南海北極出地一十五度夏至景在表南長一尺一寸六分晝五十四刻夜四十六刻衡嶽北極出地二十五度夏至日在表端無景晝五十六刻夜四十四刻嶽臺北極出地三十五度夏至晷景長一尺四寸八分晝六十刻夜四十刻和林北極出地四十五度夏至晷景長三尺二寸四分晝六十四刻夜三十六刻鐵勒北極出地五十五度夏至晷景長五尺一分書七十刻夜三十刻北海北極出地六十五度夏至晷景長六尺七寸八分晝八十二刻夜一十八刻大都北極出地四十度太强夏至晷景長一丈一尺七寸晝六十二刻夜三十八刻上都北極出地四十三度少北京北極出地四十二度强益都北極出地三十七度少登州北極出地三十八度少高麗北極出地三十八度少西京北極出地四十度少太原北極出地三十八度少安西府北極出地三十四度半强興元北極出地三十三度半强成都北極出地三十一度半强西涼州北極出地四十度强東平北極出地三十五度太大名北極出地三十六度南京北極出地三十四度太强河南府陽城北極出地三十四度太弱揚州北極出地三十三度鄂州北極出地三十一度半吉州北極出地二十六度半雷州北極出地二十度太瓊州北極出地一十九度太授時大都實測日出入并晝夜漏刻大都即今順天觀𧰼臺厯家測晷準諸漏刻而晷漏則隨地勢南北辰極高下為異元人都燕其授時厯七曜出沒之早晚四時晝夜之永短皆準大都為筭今我朝之順天府即元大都也今欽天監所用推步厯術皆元大都測驗之法也國初都金陵故大統厯日出入之時刻及晝夜之消長自南京測驗改從南京晷漏夏至晝冬至夜皆五十九刻冬至晝夏至夜皆四十一刻若元大都授時晷漏則夏至晝冬至夜皆六十二刻冬至晝夏至夜皆三十八刻較之南京相差三刻有竒以此推步七政何以相符今欽天監推日月五星厯率諸術悉因元大都所測舊法而乃獨用金陵晷漏則余不知其可也且元統改厯之時従南監觀象臺測驗日晷則扵日晷改之其扵七政諸法率悉仍其舊兩相牴牾又何惑乎後之人以北術步南漏貿貿焉莫知所適從也則昏迷扵天象統實俑之耳古今律厯考卷四十七
