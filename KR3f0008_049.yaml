body:
  text: 古今律厯考卷四十九明邢雲路撰厯法十四厯法萬厯二十四年丙申嵗閏八月朔日食厯大統求中積置嵗周三百六十五萬二千四百二十五分以至元辛巳所距積年三百一十六年減一算乘之得一十一億五千百五十一萬三千八百七十五分為中積分求通積置中積分加氣應五十五萬六百分得一十一億五千一百六萬四千四百七十五分為通積分求冬至置通積分以滿紀法六十萬累去之至不滿之數餘二十六萬四千四百七十五分為冬至分命一萬起乙丑得庚寅日千以下數以發斂法一分二十秒乘之得五千三百七十分命一千起丑得巳時百以下數以發斂法一分二十秒歸除之得三百分因在五百以下為正刻得正三刻庚寅日巳時正三刻冬至求閏餘置中積分加閏應二十萬二千五十分得一十一億五千百七十一萬五千九百二十五分以月策二十九萬五千三百五九三累去之得二十萬四千百二十一分七十二秒為閏餘分是年在一十八萬六千五百五十二分九秒之上有閏求經朔置冬至分減去閏餘分餘六萬四五三二八為經朔分求太陽盈縮置半嵗周一百八十二萬六二一二五減去閏餘分得一百六十二萬二一九七八為縮末厯分求太隂遲疾置中積分加轉應一十三萬二五減去閏餘分得一十一億五千百四十四萬五八二八以滿轉二十七萬五五四六累去之餘三萬五五八二八為疾厯分求交泛置中積分一十一億五千百五十一萬三千八百七十五分加交應二十六萬三八八共得一十一億五千百七十七萬四二六三減去閏餘分二十萬四千百二十一分七十二秒餘一十一億五千百五十七萬千二百四十一分二十八秒以滿交終二十七萬二千一百二二二四累去之得三萬七四一五六為交泛分求閏八月經朔置朔實二十九萬五千三百五九三以十二月至閏八月共十月因之得二百九十五萬三五九三加天正經朔六萬四五三二八共得三百一萬三千五百一二五八以滿紀法六十萬去之得一萬三千五百一十二分五十八秒為閏八月經朔求盈縮厯置朔實以十月乘之得二百九十五萬三五九三減去天正閏餘二十萬四千百二十一分七十二秒餘二百七十四萬九千三七五八減去半嵗周一百八十二萬六二一二五餘九十二萬二八二五八為縮初厯求盈縮加分置本限九十二限減一折半得四十五限半仍以本限九十二乘之得四千一百八十六限與一百六十二乘之得六十七萬八一三二另置四萬四三六二以本限九十二乘之得四百八分一三四併前六十七分八一三二得四百七十五分九四三六另置初日四百八十四萬八四七三減四百七十五分九四三六餘八分九三七為加分求縮積度置二十七分以九十二日因之得二千四百八十四分加二萬二千一百分共得二萬四五八四又以限九十二因之得二百二十六分一七二八却置四百八十七萬六分内減之餘二百六十萬八八七二再以九十二因之得二萬四一六二二四為縮積度求縮差置縮厯九十二日二八二五八減去大餘九十二日剰小餘二千八百二十五分八以前所求得縮加分八分九三七乘之得二萬五一五三六六乃二分五一五三六六加入積度内共得二度四四一三為縮差求遲疾厯置轉終捷章一萬九七五九九三以十月乘之得一十九萬七五九九三内加天正十一月所得疾厯三萬五五八二八共得二十三萬三一七五八減去轉中一十三萬七七七三餘九萬五三三四五八為遲厯求遲厯限置遲厯九萬五三三四五八以至限分一十二限二十乘之得一百一十六限因過八十三為遲末限求日率置一百一十六限以八百二十分八秒乘之得九日五一二九為日率求損分置一百六十七限減去一百一十六限餘五十一限為遲末限却以遲末限五十一限減一折半得二十五限又以五十一限乘之得一千二百七十五限以一十九微半因之得二分四八六二五另置五秒八十一微半以五十一限因之得二分九六五六五併前二分四八六二五内共得五分四五一九為損分定積却置一十一分八秒一五七五内減去定積餘五分六二九六七五為損分求遲末厯遲行度置一度二七一減損分定積五分四五一九餘一度一五二六為遲行度求遲積度置三秒二十五微積為實却另置一百六十八限内減所得一百一十六限餘下五十二限為法乘實得一分六九内加二分八十一秒共得四分五十秒再以五十二限乘之得二百三十四分為定積却置定差一千一百一十一分内減之餘八百七十七分再以五十二限乘之得四度五十六分四為遲積度求遲差置遲厯九萬五三三四五八内減日率九日五一二九餘二百五分五八以損分五分六二九六七五乘之得一千一百五十七分三四八五八六五却以率法八百二十分歸除之得一分四一一四七却在遲四度五十六分四内減之得四度五十四分六十二秒八十五微為遲差求加減差置遲差四度五四六二八五内減去縮差二度四四一三餘二度一四五八七二以率法八百二十分乘之得一千七百五十九分六一五四以遲行度一度一五二六而一得一千五百二十六分六四為加差求定朔置經朔一萬三五一二五八加加差一千五百二六六四得一萬五千三九二二為定朔求合朔時刻置定朔一萬起乙丑餘以發斂法一分二十秒乘之得六千百四十七分六四命一千起丑筭外得午千下缺百為正初刻即乙丑日午正初刻合朔求交泛置交終捷章二萬三一八三六九以十月因之得二十三萬一八三六九併入天正交泛三萬七四一五六共得二十六萬九二四七四六為交泛求定入遲厯置遲厯九日五三三四五八併入加差一千五百二六六四共得九日六八六一二二為定入遲厯求定入遲限置定入遲厯以至限一十二限二十分乘之得一百一十八限有餘不用止用一百一十八限為定入遲限求遲行度並定限行度置末限一百六十七限内減一百一十八限餘四十九限為遲末限減一折半得二十四限以本限四十九限因之得一千一百七十六限又以一十九微半乘之得二分二九三一另置五秒八十一半以末限四十九限乘之得二分八四九三五併前二分二九三一共得五分一四二四五為併積却用遲初度一度二十分七十一秒内減去併積餘一度一十五分五十七秒為遲行度内減去率法八分二十秒餘一度七三七為定限行度求日出分置縮初厯九十二日減一折半得四十五日半以九十二日乗之得四千一百八十六日為積日又置縮初厯九十二日減去五十三日餘三十九日以消法六微八乘之得二秒三七一二為消法却置定法一十二秒二九二八内減消法餘九秒九二一六為定法分却置秒積六秒以縮初厯九十二日乗之得五分五十二秒為秒積又置所求定法九秒九二一六以積日四千一百八十六日乗之得四百一十五分三一八一七六為定積仍置定積分四百一十五分三十一秒内加秒積分五分五十二秒共得四百二十分八十三秒為併積却置夏至初日二千百六十八分三十秒内加併積四百二十分八十三秒共得二千四百八十九分一十三秒為日出分求日入分置一萬分減日出分二千四百八十九分一十三秒餘七千五百一十分八十七秒為日入分求半晝分置日入分七千五百一十分八十七秒減去半日五千分餘二千五百一十分八十七秒為半晝分求天正赤道度置赤道捷章一分五十秒以積年三百一十五年乘之得四度七十二分五十秒却置十度内減四度七十二分五十秒餘五度二十七分五十秒得天正箕宿赤道度求天正黄道度置赤道度箕五度二七五内減去赤道積度四度三四四五餘九十三分五以度率一度乘之得九十三度五以度率一度八四九而一得八十五分七十六秒加入積度四度共得四度八五七六為天正黄道箕宿四度八十五分七十六秒此大統誤以五度為箕度用辨見厯議求交常度置交泛分二十六日九二四七四六以月平行度一十三度三六八七五乘之得三百五十九度九五一九八為交常度求交定度置交常度三百五十九度九五一九八内減縮差二度四四一三餘三百五十七度五四九七八五為交定度求日食在正中交視其交定度在三百四十二度以上為正交度求中前後分置定朔小餘五千百三十九分二二減半日周五千分餘三十九分二二為中後分求時差分置半日周五千分減中後分三十九分二二餘四千九百六十分七八還以中後分三十九分二二乘之得一十九萬四五六一七九一六以九千六百而一得二十分二六六八為時差分求食甚定分置定朔小餘五千百三十九分二二加時差分二十分二六六八共得五千百五十九分四八六八為食甚定分求距午分置中後分三十九分二二加時差分二十分二六六八共得五十九分四八六八為距午定分求食甚入縮厯置原得縮初厯九十二日二八二五八加定朔大餘一日及食甚定分五千百五十九分四八六八共得九十三日七八八四五六六八内減經朔大小餘全分一日三五一二五八餘九十二日四三七一九八六八為食甚入縮厯求食甚入縮厯加分置九十二限減一折半得四十五日半以本限九十二日乘之得四千一百八十六日又以一百六十二分乘之得六十七分八一三二另置四萬四三六二以本限縮厯九十二為法乘之得四百八分一三四併入前六十七分八一三二共得四百七十五分九四三六為併積另置四百八十四萬八四七三内減併積餘八分九三七為食甚入縮厯加分求食甚入縮厯積度置立差二十七分以本限九十二日乘之得二千四百八十四分内加入二萬二千一百分共得二萬四五八四再以本限九十二乘之得二百二十六分一七二八却置四百八十七萬六分内減之餘二百六十萬八八七二再以九十二乘之得二萬四一六二二四為食甚入縮厯積度求食甚入縮厯差度置前食甚入縮厯九十二日四三七一九八去其大餘止用小餘四千三百七一九八以食甚入縮厯加分乗之得三分八九二六七九加入食甚入縮厯積度内得二度四五五一為食甚入縮厯差度求食甚入縮厯行定度置食甚入縮厯全分九十二日四三七一九八内減去食甚入縮差二度四五五一餘九十度三六六四七為食甚入縮厯行定度求南北泛差置食甚入縮行定度九十度三六六四七自相乘之得八千一百六度五九七八三二六九以定法一千八百七十除之得四度三三五七九却置四度四六内減之餘度一二四九二一為南北泛差求南北定差置南北泛差度一二四九二一以距午分五十九分四八六八乘之得七百四十三分一一五五四二八以半晝分二千五百一八七而一得二十九秒五九五九為定積另置泛差度一二四九二一内減定積二十九秒五九五九餘度一二一九六二為南北定差求東西泛差置半嵗周天一百八十二度六二一二五内減去食甚入縮厯行定度九十度三六六四七餘九十二度五八四六三以食甚入縮厯行定度乘之得八千三百三十六度七二一七九四六一四以一千八百七十除之得四度四五七七五七為東西泛差求東西定差置東西泛差四度四五七七五七以距午分五十九分四八六八乘之得二百六十五度一七七六九九一七六以二千五百而一得度一六七一為東西定差求正交定限度置三百五十七度六四内加南北定差度一二一九六二共得三百五十七度七六一九六二減去東西定差度一六七一餘三百五十七度六五五八九一為正交定限度求日食入隂陽及交前後度置正交定限度三百五十七度六五五八九一内減交定三百五十七度五四九七八五餘度一六一六為食入隂厯交前求日食分秒置黄道北隂道八度内減隂厯交前度度一六一六餘七度八九三八九四以隂八千而一得九分八十六秒七十三微為日食分秒求定用分置日食度下二十分減日食分九分八六七三餘一十分一三二七又以日食分九分八六七三乘之得九十九分九八二三九八一以平方開之得九分九九九一以五十七度四十分乘之得五百七十三分九四八三四以定限行度一度七三七而一得五百三十四分五五一八為定用分求初虧分置食甚定分五千五十九分四八六八内減定用分五百三十四分五五一八餘四千五百二十四分九三五為初虧分得巳正三刻初虧求食甚分即前推得食甚定分五千五十九分四八六八得午正初刻食甚求復圎分置食甚定分五千五十九分四八六八内加定用分五百三十四分五五一八共得五千五百九十四分三八六為復圎分得未初一刻復圎求黄道定積度置食甚入縮厯行定度九十度三六六四七内加半嵗周一百八十二度六二一二五得二百七十二度六五七八九七再加天正黄道度箕宿四度八五七六共得二百七十七度五一五四九七為黄道定度求日躔黄道宿次置黄道定度二百七十七度五一五四九七内減張宿二百五十七度八十八分七十五秒餘一十九度六二七九九七為翼宿一十九度六十二分七十九秒求日食方位視日食八分以上隂厯初虧正西復圎正東推得萬厯二十四年丙申嵗閏八月初一日乙丑朔日食九分八十六秒初虧巳正三刻正西食甚午正初刻復圎未初一刻正東食甚日躔黄道翼宿一十九度六十二分七十九秒右依大統法推若余改定諸術則日食之分數與此異古今律厯考卷四十九
