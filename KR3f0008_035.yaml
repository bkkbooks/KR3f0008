body:
  text: 古今律厯考卷三十五明邢雲路撰律呂七律呂聲音名義五聲者一曰宫宫者中也取中和之義屬土中央音其性圓而居中聲出於脾合口通音重而尊雄雄洪洪然二曰商商者張也取開張之義屬金七月音其性方而成器聲出於肺開口吐聲張而明鏘鏘倉倉然三曰角角者觸也取觸動之義屬木正月音其性直而崇髙聲出於肝張牙湧吻輕而易制喔喔確確然四曰徵徵者止也取止盛之義屬火四月音其性明而辨物聲出於心齒合吻開泛而不流倚倚巇巇然五曰羽羽者舒也取舒育之義屬水十月音其性潤而澤物聲出於腎齒開吻聚渙散而抑詡詡吁吁然故宫動脾而和正聖商動肺而和正義角動肝而和正仁徵動心而和正禮羽動腎而和正智宫為君調則政和國安亂則荒其國危商為臣調則刑法不作威令行亂則陂其官壊角為人調則四民安亂則憂其人怨徵為事調則百事理亂則哀其績隳羽為物調則庻物備亂則危其財匱八音者樂器曰金曰石曰土曰革曰絲曰木曰匏曰竹八音八卦之音各有風乾之音石其風不周坎之音革其風廣莫艮之音匏其風融震之音竹其風明庶巽之音木其風清明離之音絲其風景坤之音上其風凉兑之音金其風閶闔金之器鐘也大鐘曰鏞其餘鎛錞鉦鐸之類石之器磬也以玉為之土之器塤也燒土為之缶類革之器鼔鞉之屬以桴擊之絲之器琴瑟筑箏琵琶空侯之類皆是木之器柷敔也以止樂之終舂杵為相及拍板亦其類也匏之器笙也竽也古以匏為之後易以木列管匏内施簧管端吹笙則簧鼓也竹之器簫管箎籥笛之類以和律呂笳角篳篥亦其屬則其聲悲此八音之大較也自昔唐虞教冑子依聲和律以諧八音其來尚矣大都樂有五聲被之八音竹與匏土其口吹絲其指彈皆與歌相為用也金石革木節樂而已然八音之數惟絲為自然其七音皆倚此而起數至於竹管則六律六呂用以和鳴度量權衡為萬事之根本聖人所尤重也五聲之清濁髙下不同然必用律以齊之如作黄鐘宫調則衆音之聲皆用黄鐘為節作太蔟商調則衆音之聲皆用太蔟為節然後清濁髙下自齊一而不亂是為律和聲故謂之調八音中絲竹匏土聲器相合固用金石革木以節樂而金與石又在成始成終之先後焉故曰金聲而玊振之大成之條理備矣樂器樂懸與夫樂章歌舞雜歌舞曲清散部妓四方四夷之類載在杜氏通典及文獻通考與大明集禮其雅俗不一繁簡具備是在治律者簡擇而去取之耳兹不詳録律原聲樂自天作樂由陽來至和之發也其治心也徳成而後知樂其治人也功成而後作樂至和之極也盖優柔平中徳之盛也天下化中治之至也是謂道配天地古之極也故天地有自然之律人聲有自然之和天籟氣機相為動盪如五聲八音清濁髙下出乎口入乎耳自有一定中和條貫惟聖人為能察之故曰既竭耳力焉繼之以六律正五音不可勝用也昔黄帝命伶倫作律呂從有以至未有以得細若氣㣲若聲因神而存之以定黄鐘為律本迨周衰樂廢孔子反魯正樂而得其所謂翕如純如皦如繹如以至於成也則豈非以天聰之盡哉故古聖人之為鐘律者率皆以耳齊其聲以樂為和人聲設也樂生於心斯發於聲人心慘則聲哀人心舒則聲和然人心復因聲之哀和亦感而舒慘則韓娥曼聲哀哭一里愁悲曼聲長歌衆皆喜忭斯之謂矣是故喜怒哀樂四者隨物感動播於形氣叶律呂諧五聲而謂之為樂聲和樂作而喜怒哀樂皆中其節是為致中和天地位焉萬物育焉天且不違而况人乎朱子亦曰音律氣也人亦氣也故相闗又曰天人無間正此之謂矣此審聲知樂為治律大原聖人復起無以易也器夫審聲為治律大原尚矣而人之聲寄於器器即律也唐禮樂志曰聲無形而樂有器古之作樂者知夫器之必有敝而聲不可言傳懼夫器失而聲遂亡也乃多為之法以著之故始求聲者以律而造律者以黍自一黍之廣積而為分寸一黍之多積而為龠合一黍之重積而為銖兩此造律之本也故為之長短之法而著之於度為之多少之法而著之於量為之輕重之法而著之於權衡是三物者亦必有時而敝則又總其法而著之於數使其分寸龠合銖兩皆起於黄鐘然後律度量衡相用為表裏使得律者可以制度量衡因度量衡亦可以制律不幸而皆亡則推其法數而制之用其長短多少輕重以相叅考四者既同而聲必至聲至而後樂可作矣夫物用於有形而必敝聲藏於無形而不竭以有數之法求無形之聲其法具存無作則已茍有作者雖去聖人於千萬嵗後無不得焉此古之君子知物之終始而憂世之慮深其多為之法而丁寧纖悉可謂至矣宋司馬光曰夫所謂律者果何如哉嚮使古之律存則吹其聲而知聲度其長而知度審其容而知量校其輕重而知權衡今古律已亡矣非黍無以見度非度無以見律律不生於度與黍将何從生耶夫度量衡所以佐律而存法也古人所為制四器者以相參校以為三者雖亡茍其一存則三者從可推也又謂後世器或壊亡故載之於書形之於物夫黍者自然之物有常不變者也故於此寓法焉今四器皆亡不取於黍将安取之凡物之度其長短則謂之度量其多少則謂之量稱其輕重則謂之權衡然量有虚實衡有低昻皆易差而難精等之不若因度求律之為審也非謂太古以來律必生於度也特以近世古律不存故返從度法求之耳斯二者之言皆是也求聲器古樂既亡欲求聲器者宜何施而可亦惟依法以千二百黍求長九寸空圍九分之管使其和也則已如有不和必其黍之顆與管之分未當也則惟本吾之平其心易其器徐聽人聲之髙下上下考之以求其中聲盖人之聲無古今一也以聲考律以律定器九寸之管千二百黍之實乃可以意定而神解何則古尺之分寸與黍之大小不可考矣即今上黨之黍有最大者次者不一想古初所用安知為最大次大者哉又安知其律之分寸視後代何尺為當哉但以人聲察之以耳聰審之以九寸千二百約之且即斯可以度尺數與黍顆或宜用黍最大者次大者千二百可當長九寸空圍九分之積恍然有得即可頃刻而决也夫古聖賢自無生有制為器數原從人聲出之今有其器數而猶不能審聲以還其本原也則吾不知其可矣故程子曰黄鐘之聲亦不難定世自有知音者将上下聲考之既得正便将黍以實其管看管實得幾粒然後推而定法可也張子曰律呂有可求之理徳性淳厚者必能知之朱子曰樂之為教今無師授當立一樂學使士大夫習之必有精通者出三説皆探本之論也三分損益圍三徑一之辯宋書云三分損益上下相生此其大略猶厯言斗分四之一耳斯言誠是也盖由三分損益分寸而下以布之釐毫絲忽微細其數至於不可行乃其管則何以量絲忽哉古人治律第約管之九寸以千二百黍實之與人聲和為黄鐘大率三分損益以生十二律如是而已即使后䕫周公師曠同時制律豈能必律尺之毫忽皆相似耶厯代尺度㣲有不同亦其常耳故三分損益猶厯言斗分四之一為大略若宻布厯分則斗分四之一猶有畸零多寡異數也古律言黄鐘長九寸圍九分徑三分圍三徑一亦自其大率言之若布宻率則圍三徑一猶有奇也古人言其槩而後人發其詳正以相成而不以相害諸儒乃辯如聚訟咸詆三分損益圍三徑一為非是不知由其大率布至毫釐摠之不出於三分損益圍三徑一之外乃所以發明其三分損益圍三徑一之精義也不觀之易乎孔子繫易但曰三百六十當期之日亦是大略言之若宻布則以氣率期為三百六十五日有奇以朔率期為三百五十四日有奇無害其為三百六十也然則古人論律為三分損益圍三徑一庸何傷今學人一有所得而槩詆古人立論之非然則孔子之論易亦非耶是故拘古人大略之言而不推見至隱以致律厯之失所也固不可茍有所得正以發古人未發之實而乃詆古人為非是也亦不可厯為律原班固志律厯曰推厯生律是其言若謂律出於厯矣乃其論厯則又以律起厯謂諸厯法皆本於黄鐘又若厯出於律者何也余曰律出於厯是而厯出於律非也盖黄鐘之數與厯無闗漢人求厯不得欲神其事故援黄鐘以附之其法以黄鐘之管長九寸寸九分相乘得九九八十一數為日法以日法乘諸厯而仍以日法歸之若諸厯數一乘於律者斯乃朝三暮四之術掩耳盗鈴之計僅可塗時人耳目難以逃大目照也假第令黄鐘果可以制厯則漢厯即宜宻合何乃疎闊太甚至一跬步不可行不将為黄鐘寃耶然吾獨謂律出於厯者則有説焉盖黄鐘一陽之動也冬至陽生無所取之取之日耳日南至景極長一測之而即得即此為黄鐘也從日至之分秒厯期實之始終十二而一律呂定位寧有晷刻之爽耶又何必望雲候氣以求杳冥不定之黄鐘也此厯為律原非厯出於律也句股宻率顧應祥筭術載古法併劉徽祖冲之之術如問黄鐘之管空容九分其圍徑各若干以古法圍三徑一術求之得幾答曰圍一十分三釐九毫二絲徑三分四釐六毫四絲術曰置九分三歸四因得十二為圓法以圓法十二乘九得一百八平方開之得圍以三歸圍得徑以魏劉徽術求之得幾答曰圍一十分六釐三毫二絲徑三分三釐八毫六絲術曰徽之周法一百五十七徑法五十以周法一百五十七倍之得三百一十四為積法以因黄鐘之九得二千八百二十六以徑法五十折半為二十五除之得一百一十三四平方開之得圍以徑法五十因之得五百三十一六以周法一百五十七除圍得徑以宋祖冲之術求之得幾答曰圍一十分六釐三毫六絲徑三分三釐八毫四絲術曰冲之之周法二十二徑法七以周法二十二四之得八十八為積法以因黄鐘之九得七百九十二以徑法七歸之得一百一十三一四二八平方開之得圍以徑法七因之得七十四四五以周法二十二除圍得徑以今真宻率求之得幾答曰圍一十分八釐一毫六絲六忽有奇徑三分四釐六毫二忽有奇術曰以周取圓法十三乘黄鐘之九得一百一十七平方開之得周以徑取圓法三一二六除周得徑按古法圍三徑一用三歸四因法為疎盖筭術徑一不止圍三是矣徽冲之二術近宻然既變三歸四因之法而乃暗用四因四歸以加倍折半藏其術猶朝三暮四之説也盖亦以意約之未以實布之也今定宻布之法周取圍不止用四四猶有奇徑取圍不止用三三猶有奇盖以周圍之實數量之以句股之宻率筭之自大至細毫無一爽故圍一十分八釐一毫六絲六忽有奇徑三分四釐六毫二忽有奇為真的以徑取圓法乘徑得周周自之以周取圓法而一得九還原即容九分乃九立方分為黄鐘之面幕以每寸之九分乘之得八十一分又以九寸乘之得七百二十九分為黄鐘九寸之積實即是以容黍管九寸凡千二百黍以九寸除千二百黍得每寸一百三十三黍三分黍之一以九分除一百三十三黍三分黍之一得每分十四黍八一四八不盡即面幕每分容九立方分以九立方分除十四黍八一四八不盡得每一立方分容一黍六四六九不盡即七百二十九分之一也由一黍之容累因之還得千二百黍此黄鐘之原也古今律厯考卷三十五
