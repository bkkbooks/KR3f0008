body:
  text: 古今律厯考巻十四明邢雲路撰歴代六歴代考宋書宋書論京房增律引伸中呂上生執始下生至於南事為六十律竟復不合彌益其疎劉歆三統厯疏闊揚雄心惑其説采為太𤣥班固謂之最密著於漢志為不知而妄言其説皆是宋髙祖頗好厯數太子率更令何承天私撰新法元嘉二十年上表云月盈則蝕必當其衝以月推日則躔次可知堯典仲夏星火今季夏火中堯仲秋星虚今季秋虚中爾來二千七百餘年所差二十七八度則堯冬至日在須女十度左右也漢太初冬至在牽牛初漢四分及魏景初同在斗二十一臣以月蝕檢之則景初之冬至應在斗十七又以土圭測景考校二至差三日有餘然則今之冬至在斗干三四矣詔令以月蝕檢土圭測悉如承天所上奏二十二年普用元嘉厯詔可元嘉厯以上元庚辰至元嘉二十年癸未五千七百三年算外以一百九十二章積三千六百四十八年為元法以三十二章積六百八年為紀法以紀月七千五百二十十得一七百五十二為日法以紀法除通數二萬二千二百七得三百六十五日二十四刻六七一為歲實以日法除通數得二十九日五十三刻五分八五為朔實以日法除通周二萬七百二十一得二十七日五十五刻四五二一為轉終以月周四千六十四除周天十一萬一千三十五得二十七日三十二刻一六四為交終五星木周日三百九十八日八十七刻二五火周日七百七十九日七十五刻九二土周日三百七十八日七刻九七金周日五百八十三日九十五刻七三水周日一百一十五日八十六刻九八各有不同是厯較前頗宻其測晷漏刻綽有規則祖冲之字文遠范陽遒人也稽古有機思始元嘉中用何承天所製厯比古十一家為宻冲之以為尚疎乃更造新法上表言之世祖孝武帝令朝士善厯者難之不能屈其術以舊章法十九歲七閏經二百年輒差一日乃改章法三百九十一年有一百四十四閏推上元甲子至宋大明七年癸卯五萬一千九百三十九算外元法五十九萬二千三百六十五乃十五紀之年也紀法三萬九千四百九十一乃一百一章之年也章歲三百九十一章閏一百四十四蓋三百九十一年有一百四十四閏故以是定章歲章閏章月四千八百三十六蓋一章三百九十一年每年十二月凡四千六百九十二月加一百四十四閏月共四千八百三十六月故以是定章月周天一千四百四十二萬三千八百四日是一紀之日也日法三千九百三十九者以一百一乘章月得四十八萬八千四百三十六以一百二十四而一得三千九百三十九為日法也月法一十一萬六千三百二十一者以一百二十四除周天得數為月法也以紀法除周天得三百六十五日二十四刻二八一四為歲實以日法除月法得二十九日五十三刻五分九一為朔實以通法二萬六千三百七十七除通周七十二萬六千八百一十得二十七日五十五刻四六八七為轉終以通法除㑹周七十一萬七千七百七十七得二十七日二十一刻二二三為交終五星木周日三百九十八日八十九刻二九火周日七百八十日三刻七土周日三百七十八日六刻九四金周日五百八十三日九十三刻八水周日一百一十五日八十七刻九六各有不同已前交終疎至冲之始宻已後諸厯雖立法各異率皆從大明厯出則冲之之長也柰何中郎將戴法興反覆數千言辯冲之非是悉屬乖謬蓋其時法興佞倖為世祖所寵天下畏其權無敢異議論者皆附之唯中書舍人巢尚之是冲之之術執據宜用上欲用冲之新法時大明八年也故須明年改元因此改厯未及施行而宫車晏駕矣至梁天監初子暅之更修之於是始行焉宋何承天祖冲之立嵗差法損嵗餘益天周以正日躔尤為卓絶魏書魏肅宗孝明帝神龜初集張龍祥等九家厯合為一厯以李業興為主改元正光名正光厯正光三年冬十一月頒行之以壬子元至正光三年積十六萬七千七百五十算外得壬寅嵗以五百五年為章嵗以十九章而一凡二十六章五七九以七閏因之應閏一百六十八月為章閏以加於嵗中五百五年每年十二月凡六千六十月内共六千二百四十六月為章月十二章六千六十年為一蔀十蔀六萬六百為一紀二紀十二萬一千二百為一統三統三十六萬三千六百為一元而大餘盡斗分者四分度之一為二十五刻一蔀六千六十年計一千五百一十五日為古斗分業興覺氣不及天度以一百五十九年半差一日六千六十年當差三十八日以減古斗分餘一千四百七十七日為斗分以加於六千六十年每年三百六十五日計二百二十一萬一千九百日内共得二百二十一萬三千三百七十七日為周天分以六千六十年而一得三百六十五日二十四刻三七二九為歲實一蔀六千六十年計十二章以乘章月得七萬四千九百五十二即蔀月定為日法以月取日故曰日法以日法除周天得二十九日五十三刻五九二九為朔實以日法除通周得二十七日五十五刻四五一四為轉終置蔀月加蔀法得周月八萬一千一十二加一蔀三百一十九章共得八萬一千三百三十一為交周以除周天得二十七日二十一刻四四三二魏史缺交終今補此五星木周日三百九十八日七十八刻八七火周日七百七十九日八十四刻二九土周日三百七十八日五刻六二金周日五百八十三日八十五刻水周日一百一十五日八十七刻一六魏厯大都踵宋厯為之亦近密東魏孝靜帝興和二年李業興以壬子厯氣朔稍違改造興和厯以上元甲子以來積二十九萬三千九百九十七算至興和二年得庚申歲以一百一萬一千六百為元法三統之數也三十三萬七千二百為統法二紀之數也十六萬八千六百為紀法十蔀之數也一萬六千八百六十為蔀法又名度法三十章歲之數也五百六十二為章歲以十九歸章歲凡二十九章五七八以七閏因之得二百七為章閏以每年十二月乘章歲得六千七百四十四為章中加章閏二百七共得六千九百五十一為章月以三十乘章月得二十萬八千五百三十為日法即蔀月以四千一百一十七為斗分以度法乘歲日三百六十五得六百一十五萬三千九百加斗分共得六百一十五萬八千一十七為周天以度法除之得三百六十五日二十四刻四一八七為歲實以日法除周天得二十九日五十三刻六四為朔實以日法除通周五百七十四萬五千九百四十一得二十七日五十五刻四五五為轉終置蔀月加蔀法得二十二萬五千三百九十為月周加一蔀每十九年一章凡八百八十七章共得二十二萬六千二百七十七為交周以除周天得二十七日二十一刻四五六為交終以歩五星以蔀法除星率即五精數各得周日以蔀除木精數六百七十二萬二千八百八十八得木周日三百九十八日七十四刻七八除火精數一千三百一十四萬九千八十三得火周日七百七十九日八十九刻八一除土精數六百三十七萬四千六十一得土周日三百七十八日五刻八一除金精數九百八十四萬三千八百八十二得金周日五百八十三日八十六刻除水精數一百九十五萬三千七百一十七得水周日一百一十五日八十七刻八八較正光厯稍異隋書北齊文宣帝天保元年散騎侍郎宋景業依握誠圗及元命包言齊受籙之期應六百七十六以為章作天保厯以上元甲子積十一萬五百二十六年至天保元年得庚午章歲六百七十六度法二萬三千六百六十斗分五千七百八十七以度法乘歲日得八百六十三萬五千九百加斗分共八百六十四萬一千六百八十七為周天以度法除之得三百六十五日二十四刻四五九為歲實以十九歸章歲凡三十五章五七九以七因之凡二百四十九閏為章閏以十二月乘章歲得八千一百一十二加章閏共八千三百六十一為章月以三十五乘章月得二十九萬二千六百三十五為紀月以紀月除周天得二十九日五十三刻五九九為朔實以月周三十一萬三千六百二十除周天得二十七日五十五刻四六四二為轉終以交周三十一萬七千五百六十六除周天得二十七日二十一刻二二五五為交終此其數也至後主武平七年董峻鄭元偉立議非之乃上甲寅元厯以二萬二千三百三十八為蔀五千四百六十一為斗分又劉孝孫以百一十九為章八千四十七為紀張孟賔以六百一十九為章四萬八千九百為紀九百四十八為日法萬四千九百四十五為斗分是年六月戊申朔太陽虧劉孝孫言食於卯時張孟賔言食於寅時鄭元偉董峻言食於辰時宋景業言食於巳時至日食乃於卯寅之間其言皆不能中爭端未定遂屬國亡此史論也以授時推是食在卯正合天時則孝孫孟賔為近鄭董亦近景業為疎矣大都五代諸厯家俱踵元嘉大明故法改換章蔀斗分妄自各立門户爭相妒競以塗人耳目如是而已西魏入關尚興李業興正光厯後周明帝詔有司造周歴頗謬及武帝天和元年甄鸞造天和厯上元甲寅至天和元年景戌積八十七萬五千七百九十二算外章歲三百九十一蔀法二萬三千四百六十日法二十九萬一百六十斗分五千七百三十一以蔀法乘之得周天以日法而一得月策周天八百五十六萬八千六百三十一歲實三百六十五日二十四刻四二月策二十九日五十三刻七一參用推歩終於宣徳元年而變周静帝大象元年太史上士馮顯更造大象厯上元景寅至大象元年己亥積四萬一千五百五十四算日法五萬三千五百六十三亦名蔀㑹法章歲四百四十八斗分三千一百六十七蔀法一萬二千九百九十二乃二十九章歲之數也歩得周天四百七十四萬五千二百四十七蔀閏四千七百八十六蔀月一十六萬六百九十歲實三百六十五日二十四刻三七朔實二十九日五十三刻四分四三馮顯自以為參校精密而不知氣多朔少所差逺矣隋髙祖初行禪代之事欲以符命曜於天下道士張賔揣知上意自云洞曉星厯盛言代謝之徵由是大被知遇命造新厯賔乃依何承天法微加增損作開皇厯其要以上元甲子己巳已來至開皇四年甲辰四百一十二萬九千一算上蔀法一十萬二千九百六十乃二十四章歳也章歳四百二十九者蓋每章十九以二十二章乘之得四百一十八再加十一共四百二十九年為章歲章月五千三百六者蓋二十二章凡五千一百七十月又十一年一百三十六月共五千三百六月為章月通月五百三十七萬二千二百九者蓋周天三千七百六十萬五千四百六十三以七歸之得五百三十七萬二千二百九為通月日法一十八萬一千九百二十者蓋以二十四乘章月得一十二萬七千三百四十四以十因之得一百二十七萬三千四百四十為蔀月以七而一得一十八萬一千九百二十為日法置斗分二萬五千六十三以蔀法而一得二十四刻三四二四為歲餘以加於每年三百六十五内共得三百六十五日二十四刻三四二四為歲實以日法除通月得二十九日五十三刻六一二爲朔實賔厯既行劉孝孫與冀州秀才劉焯並稱其失所駮有六條及以古交食并測景辯其是非互有短長如聚訟然殊不知張賔止依元嘉舊法微加增損安得無差即孝孫等議厯亦止就舊法辯論總之於盈縮遲疾之竅未得其眞雖辯萬言何益煬帝大業四年太史令張胄𤣥作大業厯自甲子元至大業四年戊辰百四十二萬七千六百四十四年算外章歲四百一十乃二十一章併一十一年也章閏一百五十一章月五千七十一度法四萬二千六百四十乃一百四章之歲度月五十二萬七千三百八十四乃一百四章之月度月法四百六十一以除度月得一千一百四十四為日法歲分一千五百五十七萬三千九百六十三以度月法除之得三萬三千七百八十三為月法斗分一萬三百六十三即歲餘交周五十七萬二千三百一十四周通七萬二百九周法二千五百四十八以度法除歲分得三百六十五日二十四刻三三四為歲實以日法除月法得二十九日五十三刻五九四為朔實以周法除周通得二十七日五十五刻四五五二為轉終以交周除歲分得二十七日二十一刻二二六九為交終以度法除五星周數各得周日度法除木數一千七百萬八千三百三十四分得三百九十八日八十八刻二為木星周日除火數三千三百二十五萬六千二十六得七百七十九日九十二刻五五為火星周日除土數一千六百一十二萬一千七百六十七得三百七十八日九刻一為土星周日除金數二千四百八十九萬八千四百一十七得五百八十三日九十二刻一五為金星周日除水數四百九十四萬一千九十八得一百一十八日八十七刻九四為水星周日大業厯大抵學祖冲之之法而小變其說耳開皇二十年太史令袁充表曰京房有言太平日行上道升平行次道霸代行下道蓋日去極近則景短而日長去極遠則景長而日短今自隋興晝日漸長開皇元年冬至之景長一丈二尺七十二分自爾漸短至十七年短於舊三寸七分矣上臨朝謂百官曰日長之慶天之佑也今當改元宜取此意乃改明年為仁壽元年因以厯事付皇太子勇東宫劉焯以太子新立修增其書名曰皇極厯駮正胄𤣥之短太子頗嘉之至仁夀四年焯短胄𤣥於皇太子云胄𤣥時不從子半晨前别為後日七曜愆序凡五百三十六條𤣥前擬獻但因人成事非其實錄焯作於前𤣥獻於後且孝孫因焯胄𤣥後附孝孫厯術之文又皆是孝孫所作則元本偷竊事甚分明焯又造厯家同異名曰稽極大業元年帝知焯下其書與胄𤣥參校𤣥駮焯厯歳率月率者平朔之章歳章月也以平朔之率而求定朔非是云云互相駮難是非不決焯罷歸四年太史奏日食無效帝召焯欲行其厯胄𤣥排之又㑹焯死厯竟不行術士咸稱其妙故録其術云甲子元距仁夀四年甲子積一百萬八千八百四十算歳率六百七十六乃三十五章併一十一年也月率八千三百六十一乃歳率之月也周率二十四萬六千九百五三一一五朔日法一千二百四十二朔實三萬六千六百七十七終法二千二百六十三終實六萬二千三百六十五以朔日法乘二十七得三萬三千五百三十四加交餘二百六十三共得三萬三千七百九十七為交實以歲率除周率得三百六十五日二十四刻四五四三為歲周以朔日法除朔實得二十九日五十三刻五九五八為月策以終法除終實得二十七日五十五刻四五七三為轉終以朔日法除交實得二十七日二十一刻一七五五為交終以度法四萬六千六百四十四除周天數一千七百三萬七千七十六得三百六十五度二十五分七十六秒為周天度以度法除各五星周數得各周日除木數千八百六十萬五千四百六十八得木周日三百九十八日八十八刻二三除火數三千六百三十七萬七千五百九十五得火周日七百七十九日八十九刻八七除土數千七百六十三萬五千五百九十四得土周日三百七十八日八刻九二除金數二千七百二十三萬六千二百八得金周日五百八十三日九十一刻六六除水數五百四十萬五千六得水周日一百一十五日八十七刻七八大都焯與胄𤣥之厯皆踵舊法為之無甚奇異焯第因𤣥竊已成術反肆駁噬故不平而鳴也焯謂𤣥不從晨前子半别為後日夫子半為後日亘古所同胡𤣥之不察也𤣥謂焯不宜以平朔之章歲章月求定朔不知焯以章月歩平朔非定朔也至歩定朔别有消息耳若焯之差則坐氣大朔小所以行之不久而氣與天違此之故也至於袁充表奏文帝引京房言日行三道及景長景短之說甚為悖謬蓋日行去極南北有定並無因世治亂改行上下之理地中以八尺立表冬至之景一丈三尺有奇縱是日冬至加時在子亥之遠所差進退止在寸内分數即冬至前後一日之晷差亦止在寸分以内故也則又安得有後短於前至三寸七分之多耶噫嘻我知其故矣隋人歩厯不精氣策未善冬至或差二三日則其景宜乎有三寸七分之差也而乃妄附太平祥稱仁壽舛矣卒之歴年三十傳國二世然則景長之效夀耶不耶古今律厯考巻十四
