body:
  text: 古今律厯考卷一明邢雲路撰經一周易考象曰澤中有火革君子以治厯明時水火相息為革澤中有火二性相息勢必變革夫不有克何以生不有革何以因君子觀革之象知天地乃革之大者也所以治厯明時蓋天地革斯四時成而其數最難明也自羲和以後二宫失次七元無紀春秋有食晦之譏漢世昧歲差之理唐宋以來其法漸宻至元授時乃益親焉自元至今又三百餘年消息之法頓亡厯理之原盡失斯時也正澤火當革之時也昔漢厯凡五變唐厯凡八改宋厯凡十六改使厯可仍舊何樂改作然而天運難齊人力未至不容不改也杜預云治厯者當順天以求合非為合以驗天正謂是耳且古厯甚疎漢時尚不知歲差至漢末劉洪始覺冬至後天乃減歲餘併創月行遲疾法作乾象厯魏文帝時韓翊作黃初厯始課日食晉姜岌始以月蝕衝檢日度宋何承天作元嘉厯始以日行盈縮推定小餘祖冲之作大明厯始取至前後日測晷景北周時馬顯作丙寅元厯始推定交蝕之小餘隋張冑𤣥作大業厯始立五星入氣加減法劉焯作皇極厯始推黃道月道術立躔度凖四序升降唐僧一行作大衍厯歩日躔始宻近周世宗時王朴作欽天厯始變五星法使遲疾留行舒急有漸宋初用應天厯繼改乾元等厯逮靖康間凡百六十餘年而厯八改南渡後統元等厯凡百餘年而厯又八改蓋宋厯未精自相紊亂故愈改而愈不效也元承用金厯至至元郭守敬乃測驗周至改作始精作授時厯然非謂授時之法遂一成不易可歲歲無改也觀守敬之言曰以至元十八年歲次辛巳為立元上考往古下驗將來周歲消長皆距立元為算其諸應等數隨時推測不用為元曰諸應不用為元者正欲後人隨時改革也豈惟後人即守敬自改之矣至元十七年守敬作授時厯定閏應二千萬一千八百五十分轉應一十三萬一千九百四分交應二十六萬一百八十七分八十六秒此載在元史可考也至至元三十一年甲午纔十四年耳而守敬復測天道見其少差乃於閏應加二百分於轉應減一千六百九十九分於交應加二百一十四秒踰十四年即改三應至今疇人用之獨柰何後人一無所改乎隨時變易乃謂之革及今不革謂澤火之義何隆慶間監官周相不云乎謂自至元辛巳為厯元至今己巳二百八十九年年遠數盈天度漸差失今不考所差必甚夫相達者也其言良是而柰何今之司厯者不味其言耶即今月離經甲午更訂猶稱宻近至日躔遭元統銷没遂差至踰時其若五星之度應則自累代來因革失眞皆所當亟正也律厯配六十四卦乾律中仲呂音徵厯為小滿四月中中卦辟乾次候靡草死居震之六五坤律中應鐘音羽厯為小雪十月中中卦辟坤次候天氣上騰地氣下降居兌之九五屯律中黃鐘大呂音羽厯為冬至十一月中末卦侯屯内小寒十二月節始卦侯屯外冬至末候水泉動小寒初候鴈北鄉居坎之初六九二蒙律中太蔟音角厯為立春正月節中卦大夫蒙次候蟄蟲始振居坎之六四需律中太蔟夾鍾音角厯為雨水正月中末卦侯需内驚蟄二月節始卦侯需外雨水末候草木萌動驚蟄初候桃始華居坎之九五上六訟律中姑洗音角厯為清明三月節中卦大夫訟次候田鼠化為鴽居震之六二師律中仲呂音徵厯為立夏四月節中卦大夫師次候蚯蚓出居震之九四比律中仲呂音徵厯為立夏四月節末卦卿比末候王瓜生居震之九四小畜律中仲呂音徵厯為小滿四月中始卦公小畜初候苦菜秀居震之六五履律中林鍾音徵厯為大暑六月中始卦公履初候腐草化為螢居離之九三泰律中太蔟音角厯為雨水正月中中卦辟泰次候鴻鴈來居坎之九五否律中夷則音商厯為處暑七月中中卦辟否次候天地始肅居離之六五同人律中夷則音商厯為立秋七月節末卦卿同人末候寒蟬鳴居離之九四大有律中仲呂蕤賔音徵厯為小滿四月中末卦侯大有内芒種五月節始卦侯大有外小滿末候麥秋至芒種初候螳螂生居震之六五上六謙律中大呂音羽厯為小寒十二月節中卦大夫謙次候鵲始巢居坎之九二豫律中夾鐘姑洗音角厯為春分二月中末卦侯豫内清明三月節始卦侯豫外春分末候始電清明初候桐始華居震之初九六二隨律中夾鐘音角厯為驚蟄二月節中卦大夫隨次候倉庚鳴居坎之上六蠱律中姑洗音角厯為清明三月節末卦卿蠱末候虹始見居震之六二臨律中大呂音羽厯為大寒十二月中中卦辟臨次候鷙鳥厲疾居坎之六三觀律中南呂音商厯為秋分八月中中卦辟觀次候蟄虫坏户居兌之初九噬嗑律中應鐘音羽厯為立冬十月節末卦卿噬嗑末候雉入大水為蜃居兌之九四賁律中南呂音商厯為秋分八月中始卦公賁初候雷乃收聲居兌之初九剝律中無射音商厯為霜降九月中中卦辟剝次候草木黃落居兌之六三復律中黃鐘音羽厯為冬至十一月中中卦辟復次候麋角解居坎之初六无妄律中無射音商厯為寒露九月節中卦大夫无妄次候雀入大水爲蛤居兌之九二大畜律中南呂音商厯為白露八月節末卦卿大畜末候羣鳥養羞居離之上九頥律中黃鐘音羽厯為大雪十一月節末卦卿頥末候荔挺出居兌之上六大過律中應鐘音羽厯為小雪十月中始卦公大過初候虹藏不見居兌之九五坎律中黃鐘大呂太蔟夾鐘音羽角厯為冬至小寒大寒立春雨水驚蟄卦由冬至之中孚以至驚蟄之晉候由冬至之蚯蚓結以至驚蟄之鷹化為鳩蓋坎為正四卦之北其六爻居月中節之在北方者也離律中蕤賔林鐘夷則南呂音徵商厯為夏至小暑大暑立秋處暑白露卦由夏至之咸以至白露之大畜候由夏至之鹿角解以至白露之羣鳥養羞蓋離為正四卦之南其六爻居月中節之在南方者也咸律中蕤賔音徵厯為夏至五月中始卦公咸初候鹿角解居離之初九恒律中黃鐘音宮厯為大暑六月中末卦侯恒内立秋七月節始卦侯恒外大暑末候大雨時行立秋初候涼風至居離之九三九四遯律中林鐘音徵厯為大暑六月中中卦辟遯次候土潤溽暑居離之九三大壯律中夾鐘音角厯為春分二月中中卦辟大壯次候雷乃發聲居震之初九晉律中夾鐘音角厯為驚蟄二月節末卦卿晉末候鷹化為鳩居坎之上六明夷律中無射音商厯為寒露九月節末卦卿明夷末候菊有黃華居兌之九二家人律中蕤賔音徵厯為芒種五月節中卦大夫家人次候鵙始鳴居震之上六暌律中大呂音羽厯為小寒十二月節末卦卿暌末候雉雊居坎之九二蹇律中黃鐘音羽厯為大雪十一月節中卦大夫蹇次候虎始交居兌之上六解律中夾鐘音角厯為春分二月中始卦公解初候𤣥鳥至居震之初九損律中夷則音商厯為處暑七月中始卦公損初候鷹乃祭鳥居離之六五益律中太蔟音角厯為立春正月節末卦卿益末候魚上冰居坎之六四夬律中姑洗音角厯為穀雨三月中中卦辟夬次候鳴鳩拂其羽居震之六三姤律中㽔賔音徵厯為夏至五月中中卦辟姤次候蜩始鳴居離之初九萃律中南呂音商厯為白露八月節中卦大夫萃次候𤣥鳥歸居離之上九升律中大呂音羽厯為大寒十二月中始卦公升初候雞乳居坎之六三困律中無射音商厯為霜降九月中始卦公困初候豺乃祭獸居兌之六三井律中蕤賔音徵厯為芒種五月節末卦卿井末候反舌無聲居震之上六革律中姑洗音角厯為穀雨三月中始卦公革初候萍始生居震之六三鼎律中蕤賔林鐘音徵厯為夏至五月中末卦侯鼎内小暑六月節始卦侯鼎外夏至末候半夏生小暑初候温風至居離之初九六二震律中夾鐘姑洗仲呂蕤賔音角徵厯為春分清明穀雨立夏小滿芒種卦由春分之公解以至芒種之卿井候由春分之𤣥鳥至以至芒種之反舌無聲蓋震爲正四卦之東其六爻居月中節之在東方者也艮律中無射應鐘音商羽厯為霜降九月中末卦侯艮内立冬十月節始卦侯艮外霜降末候蟄蟲咸俯立冬初候水始冰居兌之六三九四漸律中太蔟音角厯為雨水正月中始卦公漸初候獺祭魚居坎之九五歸妹律中南呂無射音商厯為秋分八月中末卦侯歸妹内寒露九月節始卦侯歸妹外秋分末候水始涸寒露初候鴻鴈來賔居兌之初九九二豐律中林鐘音徵厯為小暑六月節中卦大夫豐次候蟋蟀居壁居離之六二旅律中姑洗仲呂音角徵厯為穀雨三月中末卦侯旅内立夏四月節始卦侯旅外穀雨末候戴勝降于桑立夏初候螻蟈鳴居震之六三九四巽律中夷則南呂音商厯為處暑七月中末卦侯巽内白露八月節始卦侯巽外處暑末候禾乃登白露初候鴻鴈來居離之六五上九兌律中南呂無射應鐘黃鐘音商羽厯為秋分寒露霜降立冬小雪大雪卦由秋分之公賁以至大雪之卿頥候由秋分之雷乃收聲以至大雪之荔挺出蓋兌為正四卦之西其六爻居月中節之在西方者也渙律中林鐘音徵厯為小暑六月節末卦卿渙末候鷹乃學習居離之六二節律中夷則音商厯為立秋七月節中卦大夫節次候白露降居離之九四中孚律中黃鐘音羽厯為冬至十一月中始卦公中孚初候蚯蚓結居坎之初六小過律中大呂太蔟音羽角厯為大寒十二月中末卦侯小過内立春正月節始卦侯小過外大寒末候水澤腹堅立春初候東風解凍居坎之六三六四既濟律中應鐘音羽厯為立冬十月節中卦大夫既濟次候地始凍居兌之九四未濟律中應鐘黃鐘音羽厯為小雪十月中末卦侯未濟内大雪十一月節始卦侯未濟外小雪末候閉塞而成冬大雪初候鶡旦不鳴居兌之九五上六右六十四卦配五聲十二律符合亡論已至其以卦配候起自中孚每卦六日七分及所配公辟侯大夫卿之數其原出於孟氏章句京房又以卦爻配直一朞之日以附易緯之文用占災𤯝吉凶至於觀隂陽之變則錯亂而不明以後乾象天保各有因革亦皆不經其於厯數之差率則毫無關係自後魏來始載於厯經相沿厯唐宋至今不變至至元庚辰郭守敬造授時厯始刪去刪之誠是也其法大都自冬至初候起中孚而坎離震兌各主其一方其餘六十卦以一年分之蓋以一朞三百六十五日二十四刻有奇除離坎震兌各主一方外以六十卦分一朞之數每卦得六日八刻七分有奇為卦策半之得三日四刻三分半有奇為貞䇿置冬至大小餘命之為公中孚卦以卦策六日八刻七分有奇加之為辟復卦又以貞策三日四刻三分半有奇加之得九日一十三刻有奇為侯屯内卦又加一貞䇿得一十二日一十七刻四分有奇為侯屯外卦又加一卦䇿得一十八日二十六刻一分有奇為大夫謙卦又加一卦䇿得二十四日三十四刻八分有奇為卿睽卦再加一卦䇿得三十日四十三刻五分有奇為公升卦是冬至一月三十日四十三刻半有奇交大寒十二月中每一月分五卦也一年十二月皆然然一月固分五卦而以冬至一陽生論之則一月總謂之復卦惟復之前原有中孚一卦居六日八刻七分有竒踰六日而後乃七日也七日方交復卦故曰七日來復此其術也於厯法何預焉焦延壽曰得我道以亡身者京生也京房以易卦殺身身且不保於道何居天一地二天三地四天五地六天七地八天九地十此仲尼言天地隂陽自然奇偶之數即河圖數也天也者隂陽對待之體一至十者隂陽流行之序然獨陽不生獨隂不成故生於天者成於地生於地者成於天天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生土地十成之其位一六居北二七居南三八居東四九居西五十居中為河圖之數也以配律厯一六水為北方七宿其音羽二七火為南方七宿其音徵三八木為東方七宿其音角四九金為西方七宿其音商五十土為中央大衍之數其音宫故唐厯志云大衍為天地之樞如環之無端蓋律厯之大紀也天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也天數五一三五七九五奇也地數五二四六八十五偶也天地之數各五位五位相配以合五行天一與地六相得合為水地二與天七相得合為火天三與地八相得合為木地四與天九相得合為金天五與地十相得合為土天數二十有五五奇之積也地數三十五偶之積也天地之數合二十五三十凡五十有五乾鑿度所云天地合和數正謂此也隂陽五行八卦六爻皆變化也隂陽五行之屈伸往來八卦六爻之吉凶休咎皆鬼神也變化以數成鬼神以數行聖人衍易揲蓍使人知趨吉避凶以前民用此所以成變化而行鬼神也大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閏五嵗再閏故再扐而後掛大傳云天生神物聖人則之神物謂蓍也五十者大衍之蓍數也衍演也天地之數五十有五而大衍之數五十者以五行五數為衍母以十數為衍子數備於五極於十故以五大衍之以母衍子而各極其數以至於十為五十也其用四十有九者虚其一以象太極也蓋數始於一如辰不動如君無為故虛一不用而萬變出焉王弼曰不用而用以之通非數而數以之成斯易之太極也太極生兩儀故分而為二蓋以兩手中分四十九䇿左手分天右手分地以象兩儀也五十除一者無一也四十有九掛一者有一也易變為一是也故以右手於左分天數之中取其一䇿懸掛於左手之小指間所以象人而配天地是象三才揲數也奇所揲四數之餘也扐指間也以四數左手分天之䇿而歸其餘數或一或二或三或四於左手三四指間象四時者以四數也象閏者歸餘於終也又以四數右手分地之策而歸其餘數於左手二三指間是為一變筮法一揲不五則九得五者三所謂竒也得九者一所謂偶也再揲不四則八得四者二所謂奇也得八者二所謂偶也八九為多四五為少三少得老陽之數九三多得老隂之數六兩多一少得少陽之數七兩少一多得少隂之數八五歲再閏者五歲之間再積日而成月故蓍者凡有再扐然後别起一掛也畢中和言三揲皆掛正再閏後掛之義凡十九年七閏爲一章五歲再閏略舉其凡也衞元嵩元包論曰混茫既判天地闢矣天地既闢三統分矣三統既分四時序矣四時既序閏斯生矣正閏相生數無窮矣此之謂也乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之數也策者蓍之莖數曲禮所謂策為筮是也揲蓍之法通計三變之餘去其初掛之一凡四為竒凡八為偶積而數之則為六七八九蓋餘三竒則九而其揲亦九策亦四九三十六謂其三揲掛扐通十三策而見存三十六策為老陽爻也餘二奇一偶則八而其揲亦八策亦四八三十二謂其三揲掛扐通十七策而見存三十二策為少隂爻也餘二偶一奇則七而其揲亦七策亦四七二十八謂其三揲掛扐通二十一策而見存二十八策為少陽爻也餘三偶則六而其揲亦六策亦四六二十四謂其三揲掛扐通二十五策而見存二十四策為老隂爻也大傳所謂乾坤二篇之䇿正以其掛扐之外見存蓍數而為言耳陽爻六乾老陽一爻三十六策計六爻凡二百一十有六隂爻六坤老隂一爻二十四策計六爻凡百四十有四合二百一十有六一百四十有四凡三百有六十曰當期之日者每月三十日合十二月為三百六十也厯法以氣言之則三百六十六日以朔言之則三百五十四日今舉氣盈朔虚之中數而言故曰三百有六十也蓋掛扐之數象月之閏過揲之數象嵗之周總過揲以成四時即一期也然少陽之策一爻二十八六爻則一百六十八少隂之策一爻三十二六爻則一百九十二二少之合亦三百六十此獨以老陽老隂言者以易用九六不用七八也何也九六有象七八無象也以卦則六子之卦七八隱於其中而無象也以畫則六子皆乾坤之畫而六子無畫也惟乾坤有用九用六之道諸卦得奇者皆用乾之九得偶者皆用坤之六終無用七用八之道故曰九六有象七八無象也二篇者易上下經六十四卦也每卦六爻六十四卦共三百八十四爻隂陽各半陽爻一百九十二以陽爻三十六乗之得六千九百一十二隂爻一百九十二以隂爻二十四乗之得四千六百八合六千九百一十二四千六百八共得萬有一千五百二十當萬物之數也萬物之數固不盡於此但取象於萬若云自一而萬當萬物之數耳若少陽一百九十二以二十八乗之得五千三百七十六少隂一百九十二以三十二乗之得六千一百四十四合之亦萬有一千五百二十也是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣顯道神德行是故可與酬酢可與祐神矣四營者四次經營也分二一營也掛一二營也揲四三營也歸奇四營也易變易也尚未成爻成卦故止謂成一變易也如是者三變成一爻一爻得兩儀之畫二爻得四象之畫三爻得八卦之畫至於積七十二營凡十有八變則六爻見而得六十四卦之一矣然方其三十六營而九變也已得三畫而天地山澤雷風水火八卦之名已立此内卦之貞八卦而小成也自是引進而往伸之又九變三十六營以成三畫再得小成之卦一則外卦之悔亦備内外成卦是謂大成也如是然後觀其爻之變與不變而觸逢事類以增長之如乾則推其為圜為君為父之類以定吉凶悔吝一卦變六十四卦六十四卦變四千九十六卦天下所能之事法象皆盡人之趨吉避凶向悔背吝者其道皆不越此故曰天下之能事畢矣惟易理備天下之能事故可以顯明無為之道而神靈其德行之事是故可與酬酢應對萬物之求蓋筮受命如饗吉凶悔吝取決不爽也可與佑助神化之功蓋神不自見待易道方見即謂以易助神可也道在天德行在人在天者幽顯道闡幽也在人者顯神德行微顯也酬酢其在人者即祐助其在天者皆易之神也故關朗曰神也者易之靈也靈應冥契不思而得强名曰神故易之神在乎道而所神在人夫是易也顯道祐神何物不有厯固在其中矣然謂之曰象四時象閏曰當期之日象者象其竒耦當者當其成數也至於氣朔之分秒陟降消長一而不一則在人隨時測驗以更正之正其數即神乎易也漢史不知遂以大衍大率之數牽强凑合以步氣朔而謂厯數諸率皆出於此則非矣古今律厯考巻一
