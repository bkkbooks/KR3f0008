body:
  text: 古今律厯考卷四十三明邢雲路撰厯法八厯法授時萬厯己亥嵗日躔厯距元積年三百一十八中積一十一萬六千一百四十七日一刻九十六分有消長中命日曰度為星度冬至四十二日七刻九六丙午丑初二刻閏餘二十三日四十刻二三三一經朔一十八日六十七刻六六六九推冬至赤道日度置中積加周應三百一十五度一十分七五得一十一萬六千四百六十二度一十二分七十一秒滿周天去之餘三百一十度一十四分六十七秒命起赤道虚宿六度外去之得冬至日躔赤道箕五度三分九十二秒虚宿六度外至尾末共三百五度一七五冬至黄道日度置冬至赤道度以初日下赤道率而一得日躔黄道箕四度六十三分八十秒黄赤道差置前赤道度減黄道度餘四十分一十二秒為黄赤道差次年冬至赤道日度置前冬至餘數三百一十度一四六七再加嵗周以虚宿六度外去之得次年冬至日躔赤道箕五度二分三十六秒次年冬至黄道日度及黄赤道差命如前得次年冬至日躔赤道箕四度六二三六相減餘四十分為次年黄赤道差定象限度置本年嵗前黄赤道差減次年黄赤道差餘一十二秒以四象而一得三秒加入周象限九十一度三一五五内得九十一度三一八五為定象限度分四正定氣置本年嵗前冬至四十二日七刻九十六分即為冬正定氣加盈初縮末限八十八日九九一五得一百三十日九八八七五滿紀法去之餘一十日九八八七五為春正定氣加縮初盈末限九十三日七一一九五得一百四日七七去紀餘四十四日七七為夏正定氣加縮初盈末限得一百三十八日四一二六五去紀餘一十八日四一二六五為秋正定氣再加盈初縮末限得一百七日三二一八去紀餘四十七日三二一八為次年冬正定氣四正相距日置春正定氣一百三十日減嵗前冬正定氣四十二日餘八十八日是冬正距春正八十八日置夏正定氣一百四日減春正定氣一十日餘九十四日是春正距夏正九十四日置秋正定氣一百三十八日減夏正定氣四十四日餘九十四日是夏正距秋正九十四日置次年冬正定氣一百七日減秋正定氣一十八日餘八十九日是本年秋正距次年冬正八十九日四正黄道日度置嵗前黄道日度箕四度六三八加其年定象限度九十一度三一八五得九十五度九四八八五為春正黄道日度累加定象限各命如鈐得一百八十七度二五九七為夏正度得二百七十八度五七五五為秋正度得三百六十九度八八一四為次年冬正度滿周天三百六十五度二五七八去之餘四度六二三六即前所推次年冬至日躔箕四度六十二分三十六秒四正加時減分置冬正定氣小餘七刻九十六分以冬至初日下行度一度五一八五乘之得八分三六六為冬至加時減分置春正定氣小餘九十八刻八七五以相距九十四日用九十三日下行度初度九九九十三乘之得九十八分八四五六為春正加時減分置夏正定氣小餘七十刻七以夏至初日下行度初度九五一五一六乘之得六十六分六七三七為夏正加時減分置秋正定氣小餘四十一刻二六五以相距八十九日用八十八日下行度一度五五乘之得四十一分二八五八為秋正加時減分置次年冬正定氣小餘三十二刻一八以冬至初日下行度一度五一八五乘之得三十三分八二三九為次年冬至加時減分四正夜半日度置冬至加時黄道箕四度六十三分八十秒減去冬至加時減分八分三六六六餘四度五五四三三四依黄道宿次去之即為冬至夜半日度置春正加時黄道日度九十五度九四八八五減去加時減分九十八分八四五六餘九十四度九六三九四為春正夜半日度置夏正加時黄道日度一百八十七度二五九七減去加時減分六十六分六七二七餘一百八十六度五九二九七三為夏正夜半日度置秋正加時黄道日度二百七十八度五七五五減去加時減分四十一分二八五八餘二百七十八度一五七六為秋正夜半日度置次年冬至加時黄道箕四度六二三六減去加時減分三十三分八二三九餘四度二八五三六一為次年冬至夜半日度二十八宿赤道變黄道度置箕宿十度四十分減去己亥嵗前冬至箕五度三分九十二秒餘五度三十六分八秒是至後赤道積度以減赤道四度下積度四度三四四五餘一度一六三以黄道率一度乘之以赤道率一度八四九而一得數加黄道四度共得四度九十三分六十七秒是冬至後箕宿黄道積度赤道宿度赤道積度四正距後赤道積度斗二十五度二二十五度二三十度五六八牛七度二三十二度四三十七度七六八女十一度三五四十三度七五四十九度一一八虚八度九五七八五十二度七七八五十八度六八六危十五度四六十八度一七八七十三度四六八六室十七度一八十五度二七八九十度五六八六壁八度六九十三度八六七八九十九度一六八六春正後減嵗周象限九十一度三一五五餘七度八五八五奎十六度六一百一十度四七八二十四度四五八五婁十一度八一百二十二度二七八三十六度二五八五胃十五度六一百三十七度八七八五十一度八五八五昴十一度三一百四十九度一七八六十三度一五八五畢十七度四一百六十六度五七八八十度五五八五觜初度五一百六十六度五五七八八十度六八五參十一度十一百七十七度六五七八九十一度七八五夏至後減嵗周象限九十一度三一五五餘三十九分七四五井三十三度三二百一十度九五七八三十三度六九七五鬼二度二二百一十三度一五七八三十五度八九七五桞十三度三二百二十六度四五七八四十九度一九七五星六度三二百三十二度七五七八五十五度四九七五張十七度二五二百五十度七八七