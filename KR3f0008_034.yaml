body:
  text: 古今律厯考卷三十四明邢雲路撰律呂六律呂歷代樂論古帝王之樂第有其名多不可考惟陳舜之後韶樂在焉陳公子完奔齊故孔子適齊聞韶三月不知肉味曰不圖為樂之至於斯美之甚也於武王之大武則以為未盡善其告賔牟賈曰樂者象成者也總干而山立武王之事也發揚蹈厲太公之志也武亂皆坐周召之治也總干持盾山立正立象武王威立以待諸侯太公志在鷹揚武亂武之治也皆坐以象人無事周公作勺又有房中之樂以歌后妃之德王出入則令奏王夏尸出入則令奏肆夏牲出入則令奏昭夏凡日月蝕四鎮五嶽崩大傀異災諸侯薨令去樂大札大凶大災大臣死凡國之大憂令弛懸凡建國禁其淫聲過聲凶聲慢聲勺酌同勺祖道也傀怪也淫鄭衛過失節凶亡國聲慢桑間類師曠曰吾歌北風又歌南風南風不競多死聲楚必無功北風者夾鐘無射以北南風者姑洗南呂以南南律氣不至故死聲多也濮水之上地有桑間者亡國之音於此水出也當紂時使師延作靡靡之樂已而自沉於濮水後衛靈公將之晉舍濮水之上夜半聞鼓琴之聲問左右皆對曰不聞乃召師涓聽而寫之至晉見平公公享之靈公令師涓坐師曠之旁援琴鼓未終師曠曰此亡國之聲昔師延所作也與紂為靡靡之樂武王伐紂師延東走自投濮水之中故聞此聲必於濮水之上聞之也魏文侯問於子夏曰吾端冕而聽古樂則唯恐卧聽鄭衛之音則不知倦何也子夏對曰今夫古樂進旅退旅和正以廣弦匏笙簧會守拊鼓始奏以文復亂以武治亂以相訊疾以雅君子於是語於是道古修身及家平均天下此古樂之發也旅猶俱也俱進俱退齊一也文鼓也武金也相即拊也雅亦樂器名今夫新樂進俯退俯姦聲以濫溺而不止及優侏儒獶雜子女不知父子樂終不可以語不可以道古此新樂之發也俯猶曲也不齊一也獶獮猴言舞者如獮猴戲亂男女之尊卑古者天地順而四時當民有德而五榖昌疾疢不作而無妖祥此之為大當然後聖人作為父子君臣以為紀綱紀綱既正天下大定天下大定然後正六律和五聲弦歌詩頌此之謂德音德音之謂樂詩云莫其德音其德克明克明克類克長克君王此大邦克順克俾比於文王其德靡悔既受帝祉施於孫子此之謂也德正應和曰莫俾當為比今君之所好者其溺音乎鄭音好濫淫志宋音燕女溺志衛音趣數煩志齊音敖辟喬志此四者皆淫於色而害於德是以祭祀弗用也燕安也趣數讀為促速煩勞也聖人作為鞉鼓椌楬塤箎然後鐘磬竽瑟以和之鐘聲鏗鏗以立號號以立武君子聽鐘聲則思武臣石聲磬磬以立辨辨以致死君子聽磬聲則思死封疆之臣絲聲哀哀以立亷廉以立志君子聽琴瑟之聲則思志義之臣竹聲濫濫以立會會以聚衆君子聽竽笙簫管之聲則思畜聚之臣鼓鼙之聲歡歡以立動動以進衆君子聽鼓鼙之聲則思將帥之臣君子之聽音非聽其鏗鏘而已也彼亦有所合之也秦始皇平天下六代廟樂唯韶武存焉二十六年改周大武曰五行房中曰夀人衣服同五行樂之色二世尤以鄭衛之音為娛漢興樂家有制氏魯人善樂以雅樂聲律世世在太樂官但能紀其鏗鏘鼓舞而不能言其義故髙祖時叔孫通因秦樂人制宗廟樂大祝迎神於廟門奏嘉至嘉善也善神之至猶古降神之樂也皇帝入廟門奏永至以為行步之節猶古采薺肆夏也乾豆上奏登歌乾豆脯羞之屬獨上歌不以管弦亂人聲欲在位者遍聞之猶古清廟之歌也登歌再終下奏休成之樂美神明既饗也休成叔孫通作皇帝就廟東廂坐定奏永安之樂美禮已成也又有房中祠樂髙祖唐山夫人所作也周有房中樂至秦名曰夀人凡樂樂其所生禮不忘本髙祖樂楚聲故房中樂楚聲也又作昭容樂禮容樂昭容者猶古之昭夏也主出武德舞禮容者主出文始五行舞大抵皆因奏舊事孝惠二年使樂府令夏侯寬備其簫管更名曰安世樂孝景元年詔髙皇帝廟奏武德文始五行之舞孝文廟奏昭武文始五行之舞孝武廟奏盛德文始四時五行之舞武德舞者髙祖四年作以象天下樂已行武以除亂也文始舞者曰本舜韶舞也髙祖六年更名曰文始以示不相襲也五行舞者本周舞也秦始皇二十六年更名曰五行也四時舞者孝文所作以示天下之安和也蓋樂已所自作明有制也樂先王之樂明有法也孝景采武德以為昭德以尊太宗廟至孝宣采昭德舞為盛德以尊世宗廟武帝定郊祀之禮乃立樂府采詩夜誦有趙代秦楚之謳以李延年為協律都尉雜舉司馬相如等數十人造為詩賦略論律呂以合八音之調作十九章之歌以正月上辛用事甘泉圜丘使童男女七十人俱歌以昏時祠至明或白黃帝使素女鼓五十弦琴瑟悲帝禁不止破其瑟為二十五弦益召歌兒作二十五弦及空侯瑟自此起是時河間獻王有雅才以為治道非禮樂不成與毛生等共采周官及諸子言樂事者以著樂記因獻所集雅樂天子下大樂官常存肄之嵗時以備數然不常御常御及郊廟皆非雅聲然詩樂施於後嗣猶得有所祖述元帝多材藝善鼓琴瑟吹洞簫自度曲被歌聲窮極窈眇成帝時謁者常山王禹世受河間樂能説其義其弟子宋􅀢等上書言之事下公卿議復寢是時鄭聲尤甚黃門名倡富顯於世貴戚五侯外戚之家淫侈過度至與人主爭女樂哀帝即位疾之乃下詔罷鄭衛聲然百姓漸漬日久又不制雅樂以相變豪富吏民沉湎自若陵夷壞於王莽也光武平隴蜀得公孫述瞽師郊廟樂器法物始備乃增廣郊祀樂奏青陽朱明西皓玄冥及雲翹育命舞其後登封泰山北郊及祀明堂用樂皆如南郊明帝永平間博士曹充上言漢再受命宜興禮樂引尚書璇璣鈐曰有帝漢出德洽作樂名豫乃詔改大樂官曰大豫樂自是樂凡四品一曰大豫樂郊廟上陵諸食舉之二曰周頌雅樂辟雍饗射六宗社稷用之三曰黃門鼓吹樂天子宴樂羣臣用之四曰短簫鐃歌樂軍中用之東平王蒼議以為漢制舊典宗廟各奏其樂不皆相襲以明功德髙皇武德舞孝文昭德舞孝武盛德舞光武受命中興撥亂反正樂名宜曰大武舞章帝於明帝廟用武德舞建初五年始行十二月迎氣樂立春之日迎春於東郊歌青陽八佾舞雲翹之舞立夏迎南郊歌朱明八佾舞雲翹之舞先立秋十八日迎黃靈於中兆歌朱明八佾舞雲翹育命之舞立秋之日迎秋於西郊歌西皓八佾舞育命之舞立冬之日迎冬於北郊歌玄冥八佾舞育命之舞魏武帝平荆州獲杜夔善八音常為漢雅樂郎創定雅樂復先代古樂時左延年等妙善鄭聲被寵惟夔好古存正漢樂舞名各改易其名明帝太和初詔凡音樂以舞為主自黃帝雲門至於周大武皆太廟舞名所司之官皆曰太樂後漢依讖改為大子樂宜改復舊晉武帝時荀朂以杜夔所制律呂乖錯依古尺作新律呂以調聲韻亦各改易舞名懷帝永嘉之末伶官樂器皆沒於劉石至江左初立宗廟自造新聲宋武帝時撰立新歌舞名至廢帝樂殘亡率用雜伎梁裴子野宋略曰先王作樂崇德以格神人通天下之至和節羣生之流放故天子至於士庶未嘗去其樂而無非僻之心以及周道衰微日失其序亂代先之以忿怒亡國從之以哀思獶雜子女蕩目淫心充庭廣奏則以魚龍靡慢為環瑋會同饗覲則以吳趨楚舞為妖妍纖羅霧縠侈其衣疏金鏤玉砥其器在上班賜寵臣羣下從風而靡王侯將相歌伎填室鴻商富賈舞女成羣競相誇大互有爭奪如恐不及莫為禁令傷風敗俗莫不在此梁武帝素善音律自制四器名之為通以定雅樂既而篤敬佛法又制善哉大樂大勸天道仙道神王龍王滅過惡除愛水斷苦輪等十篇名為正樂皆述佛法又有法樂童子伎童子倚歌梵唄設無遮大會則為之其後臺成淪沒樂府不修風雅咸盡矣陳初用梁樂大建中改元嘉中所用齊樂盡以韶為名及後主嗣位沉荒於酒宫女習北方簫鼓謂之代北酒酣則奏之又於清樂中造黃鸝留及玉樹後庭花金叉兩臂垂等曲與幸臣制其歌詞綺艷相髙極於輕蕩男女唱和其音甚哀後魏宣武已後愛異方之樂洎於遷都屈茨琵琶五絃箜篌􅵰鼓銅跋打沙羅鏗鏘鏜鎝洪心駭耳新靡絶麗全似吟哭聽之者無不悽愴此音所由源出西域諸天諸佛韻調婁羅畨語直置難解況復被之土木是以感其聲者莫不奢淫躁競舉止輕飈或踊或躍乍動乍息蹻腳彈指撼頭弄目情發於中不能自止論樂豈須鐘鼓但問風化淺深雖此逺聲足敗華俗非唯人情感動衣服亦隨之以變長衫戅帽闊帶小鞾自號驚緊爭入時代婦女衣髻亦尚危側蓋驚危者勢不久安此兆先見何以能立形貌如此心亦隨之亡國之音亦由浮競豈唯哀細獨表衰微操弦執籥雖出瞽師易俗移風實在時政隋文帝開皇二年沛國公鄭譯考尋樂府皆有宮商角徵羽變宮變徵七聲之名初周武帝時有龜兹人曰蘇袛婆從突厥皇后入國善琵琶聽其所奏一均之中間有七聲因而問之答云父在西域稱為知音代相傳習調有七種以其七調勘校七聲冥若符合一曰婆陀力華言平聲即宮聲也二曰雞識華言長聲即南吕聲也三曰沙識華言質直聲即角聲也四曰沙侯加濫華言應聲即變徵聲也五曰沙臘華言應聲即徵聲也六曰般贍華言五聲即羽聲也七曰侯利􅝍華言斛牛聲即變宫聲也譯因習而彈之始得七聲之正然其就此七調又有五旦之名旦作七調以華言譯之旦者則謂之均也其聲亦應黃鐘太蔟南呂姑洗五均以外七律更無調聲遂因其所捻琵琶弦柱相飲為均推演其聲更立七均合成二以應十二律律有七音音立一調故成七調十二律合八十四旋轉相交盡皆和合至是譯以其書宣示朝廷并立議正之有萬寶常者妙達鐘律遍解六音常與人方食論及聲調時無樂器因取前食器及雜物以箸扣之品其髙下宫商畢備諧於絲竹文帝後召見問鄭譯所定音樂可否對曰此亡國之音豈陛下之所宜聞遂極言樂聲哀怨淫放非雅正之音請以水尺為律以調樂器上從之遂造諸樂器其聲率下於譯調二律并撰六樂譜十四卷論八音旋相為宫之法改絲移柱之變為八十四調百四十四律變化終於千八聲時人以周禮有旋宫之義自漢魏以來知音者皆不能通見寶常時創其事皆哂之至是試令為之應手成曲無所凝滯見者莫不嗟異於是損益樂器不可勝紀其聲雅淡不為時所好何妥舊以學問推為儒首帝素不悅學不知樂妥又恥已宿儒不逮譯等欲沮壞其事乃立議非之是時競為異議各立朋黨是非之理紛然淆亂或欲各令修造待成擇其善者而從之妥恐樂成善惡易見乃請張樂試之遂先説曰黃鐘者以象人君之德及奏黃鐘之調帝曰洋洋和雅甚與我會妥因陳用黃鐘一宫不假餘律帝大悅班賜妥等修樂者自是譯等議寢初萬寶常聽太常所奏樂泫然而泣人問其故對曰樂淫厲而哀天下不久相殺當時四海全盛聞其言皆謂不然大業末其言卒驗而寶常貧困無人贍遺飢餒將死取其所著書焚之曰何用此為見者於火中探得數卷見行於世煬帝奢淫太樂倡優猱雜哀管淫絃皆髙齊之舊曲也帝將幸江都有樂人王令言妙達音律令言之子常從於户外彈琵琶作翻安公子曲令言時臥室聞之大驚蹶然而起變色急呼其子歔欷流涕曰汝慎無從行帝必不返此曲宫聲往而不返宫君也吾所以知之帝竟被弒於江都唐太宗貞觀初合考隋氏所傳南北之樂梁陳盡吳楚之聲周齊皆異域之音乃命太常卿祖孝孫正宫調起居郎吕才習音韻協律郎張文收考律吕平其散漫為之折𠂻周享諸神樂多以夏為名宋以永為名梁以雅為名後周亦以夏為名隋氏因之今國家以和為名旋宫之樂久喪纍代皆黃鐘一均變極七音則五鐘廢而不擊謂之啞鐘祖孝孫始為旋宮之法曰大樂與天地同和者也造十二和以法天之成數號大唐雅樂樂合四十八曲八十四調至開元中又造三和共十五和又製三大武辨其曲度分始終之序焉玄宗時河西節度使楊敬忠獻霓裳羽衣曲十二遍凡曲終必遽唯霓裳羽衣曲將畢引聲益緩帝浸喜神仙之事詔道士司馬承禎製玄真道曲大羅天曲紫清上聖道曲初隋有法曲其音清而近雅其器有鐃鈸鐘磬幢簫琵琶圓體修頸而小號曰秦漢子蓋絃鼗之遺製出於塞北傳為秦漢所作玄宗酷愛法曲選坐部伎子弟三百教於梨園聲有誤者帝必覺而正之號皇帝梨園弟子宫女數百亦為梨園弟子居宜春北院梨園法部更置小部音聲三十餘人帝幸驪山楊貴妃生日命小部張樂長生殿因奏新曲未有名會南方進荔枝因名曰荔枝香帝又好羯鼓而寧王善吹橫笛達官大臣慕之皆善言音律帝常言羯鼓八音之領袖諸樂不可方也蓋本北方之樂其音太簇一均其聲焦殺特異衆樂開元二十四年升北部於堂上而天寶樂曲皆以邊地名若涼州伊州甘州之類後又詔道法曲與北部新聲合作明年安祿山反涼州伊州甘州皆陷吐蕃開元八年瀛州司法參軍趙慎言論郊廟用樂表曰祭天地宗廟樂合用商音又周禮三處大祭俱無商調鄭玄云此無商調祭尚柔商堅剛也以臣愚知斯義不當但商音金也周德木也金能剋木作者去之今皇唐土王即殊周室五音損益須逐便宜豈可將木德之儀施土德之用其三祭並請加商調去角調宋太祖皇帝受命以竇儼兼太常儼奏改周樂文舞崇德之舞為文德之舞武舞象成之舞為武功之舞改樂章十二順為十二安蓋取治世之音安以樂之義建隆初用王朴樂上謂其聲髙近於哀思詔和峴考兩京表尺令下一律仁宗時以王朴所造律準命館職李照考定照言王朴律準視古樂髙五律視禁坊北部樂髙二律昔軒轅氏命伶倫截竹為律復令神瞽協其中聲然後聲應鳴而管之參差亦如鳳翅其樂傳之敻古不刋之法也願聽臣依神瞽律法試鑄編鐘一簴可使度量權衡協和詔許之照又言十二律聲已備餘四清聲乃鄭衛之樂可去諫議韓琦等言照所造樂不依古法率以意為律詔下其議而晏殊等言李照新樂比舊樂下三律乃詔太常雅樂悉仍舊制照所造勿復施用神宗元豐三年詔劉几范鎮楊傑詳定大樂初傑言大樂之失一曰歌不永言聲不依永律不和聲蓋金聲舂容失之則重石聲溫潤失之則輕土聲函胡失之則下竹聲清越失之則髙絲聲纖微失之則細革聲隆大失之則洪匏聲叢雜失之則長木聲無餘失之則短惟人稟中和之氣而有中和之聲八音律吕皆以人聲為度言雖永不可以逾其聲今歌者或詠一言而濫及數律或章句已闋而樂音未終所謂歌不永言也請節其煩聲以一聲歌一言且詩言人志詠以為歌五聲隨歌是為依永律呂叶奏是謂和聲先儒以為依人音而制樂託樂器以寫音樂本效人非效樂者也今祭祀樂章並隨月律聲不依永以永依聲律不和聲以聲和律非古制也二曰八音不諧鐘磬缺四清聲虞樂九成以簫為主商樂和平以磬為依周樂合奏以金為首鐘磬簫者衆樂之所宗則天子之樂用八鐘磬簫衆樂之本乃倍之為十六且十二者律之本聲而四者應聲也本聲重大為君父應聲輕清為臣子故其四聲曰清聲或曰子聲也李照議樂始不用四清聲是有本而無應也八音何從而諧哉帝乃下鎮几參定鎮作筆尺等欲圖上之而几之議律主於人聲不以尺度求合其樂大抵即李照之舊而加四清聲遂奏成第加恩賚而鎮謝曰此劉几樂也臣何預焉鎮又言八音無匏土二音笙竽以水斗攢竹而以匏褁之是無匏音也塤器以水為之是無土音也不報然是時樂參之以六壬遁甲亦無謂李太常周舞節論曰凡樂之音本於天凡舞之容本於音周樂之音雲門起羽故一舞在羽屬水其數一二舞在角屬木其數三十舞在宮屬土其數五咸池起徵故一舞在徵屬火其數二二舞在商屬金其數四是故羽之舞也其容水角之舞也其容木宫之舞也其容土徵之舞也其容火商之舞也其容金一舞之足舉右示欲用武也舉左示欲興文也雲門初舞兩手一橫示一統也咸池初舞手足兩沖合乎火之數也木舞之手有曲直從木之性也足有橫直八從木之象也八分左右從木之類也宫舞兩手對襟尊宮於中五仰取諸陽五俯取諸隂徵舞手足沖天火性之炎上左沖右沖得火之生數商舞必歸於日躔太白不宜逺於太陽作圖圈以四指示不敢出乎四十度外過四十則為晝見過六十則為經天自古作樂忌商凌宮周人尤避之為是故耳至舞咸池隂調不得已而用之亦不敢不為之防聖人防微杜漸之意深矣六陽辰之舞由子而三進由午而三退六隂辰之舞由丑而三進由未而三退干進則戚退戚進則干退更番而迭出也翟進則籥退籥進則翟退因時而損益也是故武舞三進而三退取乎六伐止齊之義焉文舞三進而三退取乎六爻變動之理焉武舞有進而有退此節制之兵所以萬全而取勝文舞有進而有退此文質之濟所以時中而無敝戚顧右耳中原既平屯兵以守乎西關也戚顧於胸天下既定入而輔衛乎王宮也翟顧左耳用文以達乎四聰也翟顧於目用文以明乎四目也夫樂以象成故凡以武功定天下後以文德致太平者舞皆先武而後文中間飾以節奏所以發揚祖宗功德合天欲後人世守之勿替又曰武舞在先文舞在後武舞左執干右執戚未開舞時戚內干外文舞左執籥右執翟未開舞時籥內翟外武舞遇陽辰則左其手足遇隂辰則右其手足文舞遇陽辰則右其手足遇隂辰則左其手足武德隂陽之正文德隂陽之濟文以濟武陽中有隂隂中有陽是物相雜武皆用右文皆用左商舞武皆以戚向日躔文皆以翟向日躔不論辰之隂陽而分左右如十一月日躔丑十二月日躔子之類各考其所躔之方以戚翟向而舞之其餘非應五音之舞武皆以干同左足前向合陽辰之氣而戚同右足後向應之如子一陽之辰也干近左足護左戚垂後股指右寅二陽之辰也干漸逺前足護左戚近後足指右辰三陽之辰也干極前開護左戚極後離足指右午四陽之辰也干極前護右戚小前近身開右指左申五陽之辰也干稍退近身護右戚又前開右顧耳戌六陽之辰也干又退開右至身戚又前向左顧胸以戚同右足前向合隂辰之氣而干隨身橫向應之如丑一隂之辰也戚近右足伐左干近身護左巳三隂之辰也戚極逺右足伐左干極逺身護左未四隂之辰也戚極逺右足伐右干極逺身護右酉五隂之辰也戚漸近右足伐右干漸近身護右亥六隂之辰也戚近右足伐右干近身護右文舞則以右手之翟合陽隂之氣而籥隨之伹干言護翟言執其形豎以左手之籥合隂辰之氣而翟隨之但戚言伐籥言舉其形平蓋武舞其容勇文舞其容雅是之分耳金太宗取汴得宋樂器改宋大晟樂為太和取天地同和之義金亡入元改名大成然宋大晟樂即方士魏漢津之所造取徽宗指寸為律者朱子所謂崇宣之季姦諛之會黥涅之餘不足以語天地之和指漢津而言也國朝斟酌樂制分祀合祀樂章樂四等曰九奏圜丘方澤祈榖大饗用之曰八奏神祗壇太嵗壇先農髙媒用之曰七奏朝日夕月太社稷歷代帝王廟用之曰六奏宗廟時祭祫禘帝社稷用之樂有歌有舞歌堂上舞堂下舞皆八佾佾有文有武其樂曰中和韶樂曰堂下樂曰丹陛樂曰侑食樂曰大樂其雅樂備八音五聲十二律九奏萬舞之節俗樂有百戲隊舞謳歌之承應祭祀用雅樂太常領之協律郎司樂考協之凡樂淫聲過聲凶聲慢聲若舞失節者皆有糾禁而朝會燕享兼俗樂祗應奉鸞司掌之其樂章有清海宇本太初等曲皆近質無爾雅之辭但其器章雖製而未嘗纍黍驗律見今太常雅樂及天下學宮所謂大成樂者蓋漢津之餘也至其百戲隊舞承應亦元聲之遺耳右考古歷代樂論或興或廢淫雅不同大都古樂漸亡厥初猶未甚也暴秦雖燔樂經燔其文耳乃其樂之器數節奏猶存也曰五行曰夀人即周之大武房中即二世娛鄭衛其聲固淫乎其宮商律呂豈遽相逺以故漢興世世在太樂者皆記其鏗鏘鼓舞時故述作文武猶古降神等樂而河間與毛生諸雅材類能采著存肄之奈何厯漢迄唐陵夷一壞於新莽獶雜再壞於劉宋梵唄番聲大羅法曲與金叉梨園輩又相率而溷亂之輕蕩吟哭驚緊焦殺靡所不至大都漢唐創業之初稍興雅正而後遂凌弛亡當也其間龜兹之七聲雖涉哀怨尚可為七均之證若何妥以黃鐘一宮佞人主則餘律幾廢其去亂正之音亦不能以寸耳宋興製樂初亦可觀嗣是諸儒持議紛如聚訟如去清聲缺匏土等類皆舛也至李太常周舞論一出則有合於文武隂陽之節而古樂之儀賴之以存矣宋而金而元率用漢津之樂已不合古而元專尚雜劇隊戲其樂章則盡易古詩歌為詞曲蓋古樂澌滅幾無餘矣我明興制禮作樂卓越千古可謂極治而獨古樂尚未盡復故崔銑之言曰今中原敝俗未之能革者俗樂其尤也然則及時反正固在今日也夫古今律厯考卷三十四
