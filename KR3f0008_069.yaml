body:
  text: 古今律厯考卷六十九明邢雲路撰厯原三厯原求黃赤道弧矢勾股割圓差率度周天徑一百二十一度七十五分少少不用半徑六十度八十七分半又黃赤道大弦又立勾股弦黃赤道內外半弧背二十四度所測就整黃赤道弧矢四度八十四分八十二秒黃赤道大勾二十三度八十分七十秒黃赤道大股五十六度二分六十八秒又為立股如問半弧背一度下黃赤道矢度若干答曰八十二秒微以下不用術曰置半弧背一度自之得一度為半弧背冪置周天徑一百二十一度太自之得一萬四千八百二十三度六分二十五秒為徑冪又為上廉置二冪相乘得一萬四千八百二十三度六二五為正實置徑冪一萬四千八百二十三度六二五以周徑一百二十一度太乘之得一百八十萬四千七百七度八十五分九十三秒七五為益從方置半弧背一度倍之得二度以周徑乘之得二百四十三度五十分為下廉初商八十秒置初商八十秒乘上廉一萬四千八百二十三度六二五得一百一十八度五八四五以減益從方一百八十萬四千七百七度八五九三七五餘一百八十萬四千五百八十九度二七四八七五為從方置初商八十秒自之得六十四微以減下廉餘二百四十三度四九九九三六以八十秒乘之得一度九四七九九九四八八為從廉併從方共得一百八十萬四千五百九十一度二二二八七四四八八為下法除正實餘實三百八十六度三十三分二七一七四九六置秒自之得微者蓋八十秒自之原得六十四分以萬定分定萬秒為分算得微也餘同次商二秒置初商八十秒倍之得一分六十秒加次商二秒得一分六十二秒乘上廉一萬四千八百二十三度六二五得二百四十度一三三六一二五以減益從方餘一百八十萬四千四百六十七度七二五七六二五為從方置初次商八十二秒自之得六十七微加初商八十秒自之之數得一秒三十一微以減下亷二百四十三度五十分餘二百四十三度四九九八六九以前所得一分六十二秒乘之得三度九十四分四六九七八七七八為從亷併從方共得一百八十萬四千四百七十一度六十七分四六三七七八為下法除餘實又餘實二十五度四三八三不足一秒不用下同是求得矢度八十二秒即授時厯元所謂立天元一也問黃道半弧背一度下赤道積度若干答曰一度八分六十五秒術曰置半徑六十度八十七分五十秒又為黃赤道大弦內減矢度八十二秒餘六十度八六六八為黃赤道小弦置黃赤道小弦以黃赤道大股五十六度二分六十八秒乘之得三千四百一十度一七二三二四以黃赤道大弦六十度八七五而一得五十六度一分九十二秒為黃赤道小股又為赤道小勾置矢度八十二秒自之得六十七微以周天徑一百二十一度太而一得五十五纖為黃道半背弦差微以下不用下同置黃道半弧背一度內減黃道半背弦差餘為黃道半弧弦今黃道半背弦差在微以下所以不減即為黃道半弧弦置黃道半弧弦一度自之得一度為弦冪置黃赤道小股五十六度一分九二自之得三千一百三十八度一十五分七六八六四為股冪置二冪相併得三千一百三十九度一五七六八六四以平方法開之得五十六度二分八一為赤道小弦弧中以至黃道小勾股隅置黃道半弧弦一度以黃赤道大弦乘之得六十度八七五以赤道小弦五十六度二八一而一得一度八分六十五秒為赤道半弧弦置黃赤道小股五十六度一九二又為赤道橫小勾以乘黃赤道大弦六十度八七五得三千四百一十度一六八八以赤道小弦五十六度二分八一而一得六十度八十六分五十三秒為赤道橫大勾置半徑六十度八七五內減赤道橫大勾六十度八六五三餘九十七秒為赤道橫弧矢置赤道橫弧矢九十七秒自之得九十四微九以周天徑而一得七十七纖為赤道背弦差置赤道半弧弦一度八分六十五秒內加赤道背弦差為赤道積度今赤道背弦差在微以下不加即為赤道積度是求得赤道積度一度八分六十五秒問半弧背二度下黃赤道矢度若干答曰三分二十八秒術曰置半弧背二度自之得四度為半弧背冪置周天徑一百二十一度太自之得一萬四千八百二十三度六二五為徑冪又為上廉置二冪相乘得五萬九千二百九十二度二五為正實置徑冪一萬四千八百二十三度六二五以周天徑一百二十一度太乘之得一百八十萬四千七百七度八五九三七五為益從方置半弧背倍之得四度以周天徑一百二十一度太乘之得四百八十七度為下廉初商三分置初商三分乘上廉一萬四千八百二十三度六二五得四百四十四度六九一八七五以減益從方一百八十萬四千七百七度八五九三七五餘一百八十萬四千二百六十三度一六七五為從方置初商三分自之得九秒以減下廉四百八十七度餘四百八十六度九九九一以初商三分乘之得一十四度六九九七三為從廉併從方共得一百八十萬四千二百七十七度七十七分七四七三為下法除正實餘實五千一百六十三度九一六六七五八一次商二十秒置初商三分倍之加次商二十秒得六分二十秒乘上廉一萬四千八百二十三度六二五得九百一十九度二九八七五以減益從方一百八十萬四千七百七度八五九三七五餘一百八十萬三千七百八十八度八十二分九十五秒為從方置初次商三分二十秒自之得一十秒二四加初商三分自之之數得一十九秒二四以減下廉四百八十七度餘四百八十六度九九八七六以前所得六分二十秒乘之得三十度一九三八八七一二為從廉併從方共得一百八十萬三千八百一十九度二三三八七一二為下法除餘實又餘實一千五百五十六度二七八六二九五又商八秒置初次商三分二十秒倍之