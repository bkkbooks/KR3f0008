body:
  text: 古今律厯考卷五十四明邢雲路撰厯法十九厯法金星合伏前合伏五百二十二日三五二後合伏六十一日八一七四中星六十六度五四三二盈初厯六十八日九一五九加分一分五三二三二積度一度九四七五二一六加差一度九六一六七定積六十三日七七八四六七定日四十五日八五八六七加時定星七十度四五一三四入月數八十七日一八七九八月數二入正月入月已來日二十八日一一九六一二正月經朔一十七日七三八四五五順減差一度九四三五晨前夜半定星六十九度三五七二七正月己酉日夜半金星度危九度二六九七是日戌正二刻金星含伏危一十度三十六分三十八秒夕疾初中積一百日八一七四中星一百一十六度四三二盈厯一百一十六日五五五九盈末厯六十六日七二八五加分一分六四四四五四積度一度九一四七二九九六加差一度九一五九二七定積一百二日七三三三二七定日二十四日八一二九二七加時定星一百一十九度八七五五四入月數一百二十六日一三五六五八月數四入三月入月已來日八日一三二八六三月經朔一十六日七九九六四一順減差一度二八三五二晨前夜半定星一百一十八度八四六七二三月戊子日夜半金星度奎一十五度一四八二二是日戌初三刻金星夕疾初奎一十六度一十六分五十五秒夕疾末中積一百五十二日八一七四中星一百八十一度五四三二盈厯一百七十九日五九五九盈末厯三日三二八五加分三分五一二六二積度一十分五四二六六六加差度一十分六五七九定積一百五十二日九二三九七九定日一十五日三五七九加時定星一百八十一度七五六三五八入月數一百七十六日三二六三一月數五入四月入閏四月朔日入月已來日二十八日六七三三四五四月經朔四十六日三三二三四順減差四十四秒九一晨前夜半定星一百八十一度七五一八六七閏四月朔日己卯夜半金星度參四度三八四三是日子正初刻金星夕疾末參四度三十八分八十八秒夕次疾初中積二百一日八一七四中星二百四十二度五四三二縮初厯五十五日六七七一五加分二分二一二二一八積度一度六九八八四五五減差一度七一三八二五定積二百日七九一五定日二日一五八七五加時定星二百三十九度一一五五五入月數二百二十一日七九二八一月數七入五月入月已來日十六日七六七三三五月經朔四十五日三九一四二順減差一十九分六五六晨前夜半定星二百三十八度一九四九四五月丙寅日夜半金星度星五度一三一九是日寅初三刻金星次疾初星五度三十二分八十秒夕次疾末中積二百四十三日八一七四中星二百九十二度七九二二縮厯一百四日三七一五縮末厯七十八日五九一六加分九十秒八三六二積度二度七二七八九一六減差二度七八一六三定積二百四十一日七三九二三七定日四十三日八一八八三七加時定星二百八十八度六三六八七四入月數二百六十五日一四一五六八月數八入六月入月已來日二十八日八九六八二四六月經朔一十四日九二二一三順減差九十四分九八五一晨前夜半定星二百八十七度六八七二三六月丁未日夜半金星度軫九度七九五是日戌初二刻金星夕次疾末軫十度六十五分九十三秒夕遲初中積二百八十二日八一七四中星三百三十五度二九三二縮厯一百四十四日九三七一五縮末厯三十七日六九一六加分二分九二三九六積度一度二二九二七三二減差一度二五一三一九定積二百八十一日五六六八一定日二十三日六四五六八一加時定星三百三十二度七九五六二入月數三百四日九六八四一二月數十入八月入月已來日九日六六二四八二八月經朔一十三日九八三一九九順減差六十五分八五九四六晨前夜半定星三百三十二度一三一九六七八月丁亥日夜半金星度氐一十二度九七四四六七是日申初二刻金星夕遲初氐一十三度六十二分八十九秒夕遲末中積三百一十五日八一七四中星三百六十二度二九三二縮厯一百七十日九二七一五縮末厯一十一日七一六加分三分四五九四五四積度三十八分四八二四六減差三十分九七九定積三百一十五日五八三二一定日五十七日五八七九二一加時定星三百六十一度六七五四二入月數三百三十八日九一六五二月數十一入九月入月已來日一十四日七四一二九九月經朔四十三日五一三七九二順減差三十六分四五一一晨前夜半定星三百六十一度三六五九七三九月辛酉日夜半金星度尾十四度三是日亥初初刻金星夕遲末尾十三度九十三分九十八秒夕留中積三百三十一日八一七四中星三百六十六度五四三二縮厯一百七十五日一七一五縮末厯七日六一一六加分三分四九一六二六積度二十四分五五九九九減差二十六分六九五四定積三百三十一日五五四四六定日一十三日六三四六加時定星箕宿度七十六分一七八二入月數三百五十四日九五二七七七月數十二入十月入月已來日五十八刻五六六一十月經朔一十三日四四三八五順減差三十九分六二八晨前夜半定星三十七分一一五四十月朔丁丑日夜半金星度箕初度三十七分一一五四是日申初初刻金星夕留箕初度七十六分一十七秒夕退中積三百三十六日八一七四定積三百三十六日五五四四六定日一十八日六三四六入月數三百五十九日九五二七七七月數十二入十月入月已來日五日五八五六六一十月壬午日申初初刻金星夕退箕初度七十六分一十七秒夕退伏中積三百四十七日七六八七中星三百六十二度