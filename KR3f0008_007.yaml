body:
  text: 古今律厯考卷七明邢雲路撰經七禮記考周禮附月令孟春之月日在營室昏參中旦尾中其日甲乙其帝大皥其神句芒其音角律中大蔟其數八是月也東風解凍蟄蟲始振魚上冰獺祭魚鴻雁來草木萌動是月也乃命太史守典奉法司天日月星辰之行宿離不貸毋失經紀以初為常此秦始皇時吕不韋集諸儒著十二月紀名曰吕氏春秋篇首皆有月令言每月政令所行也月用夏正夏正孟春建寅之月日月㑹於營室之辰營室即室宿在亥宫娵訾之次蓋天有十二辰一嵗周天十二㑹也漢三統厯推立春日在危十六度正月中日在室十四度昏時參星在南方之中旦則尾星在南方之中月令昏明中星皆大略而言不與厯同但一月之內有中者即得載之記昏明中星者人君南面而聽天下視時候以授民事也其日為東方之甲陽乙隂木其帝大皥宓戲氏以木德王句芒乃少皥氏子曰重曾為木正之官此二人生時木王主春立德立功死後春祀則祀大皥句芒角音屬木律謂候氣之管以銅為之中猶應也大蔟者孟春之寅律大蔟林鍾之所生三分益一長八寸律管入地氣至而灰飛古為應也五音十二律詳見别簡天三生木地八成之但言八者舉成數也通卦驗云立春條風至氷解條風即東風也漢時以驚蟄為正月中雨水為二月節至前漢之末劉歆作三統始改雨水為正月中驚蟄為二月節蓋蟄蟲正月始振振動也二月乃驚耳夏小正魚陟負氷謂魚遊升於水上近氷而負氷即上氷也此時魚肥美獺將食之先以祭也來自南而北也是月天氣下降地氣上騰天地和同交泰故草木萌生發動於其時農事將興之候也夫月令天所命也王者繼天行事乃命太史守六典奉八法在人為六典八法在天為七政日循星以進退月應日以死生二十八宿衆星為經金木水火土五星為緯周天十二辰次其行皆有一定之度所謂經紀也宿謂宿之於此離謂離之於彼貸忒同或宿或離進退遲速無有愆忒是在司天者推步之毋失經紀以初為常初猶故初所謂茍求其故日至可坐致是也其日躔中星詳見後篇仲春之月日在奎昏弧中旦建星中其日甲乙其帝大皥其神句芒其音角律中夾鐘其數八是月也桃始華倉庚鳴鷹化為鳩𤣥鳥至雷乃發聲始電是月也日夜分仲春建卯之月日在奎宿戌宫降婁之次弧在輿鬼南建星在斗上餘月昏旦中星皆舉二十八宿此云弧與建者以弧星近井建星近斗井斗度多星廣不可的指故舉弧建以定昏旦之中夾鐘卯律夷則所生三分益一長七寸二千一百八十七分寸之千七十五倉庚驪黃也鳩布谷也驚蟄之日桃始華又五日倉庚鳴又五日鷹化為鳩蓋五日為一候三候為一氣六候成月六氣成時故一歲二十四氣有七十二候鷹好殺而擊以秋鼠好貪而出以夜皆隂類也鳩鴽皆陽類也卯辰者陽之中故仲春則鷹化為鳩季春則田鼠化為鴽蓋隂為陽所化物理如此爵乳子而集以春雉求雌而雊以朝皆陽類也蛤蜃皆隂類也戌亥者隂之極也故季秋則爵入大水為蛤孟冬則雉入大水為蜃蓋陽為隂所化物理如此草腐則幽之類也螢則明之類也季夏則腐草為螢蓋離之明極於此故也是皆化而已於鷹鼠言化於腐草爵雉則直言為何哉蓋因形移易曰化鷹之為鳩鼠之為鴽皆因形移易而已故言化腐草則植物也螢則動物也爵雉飛物也蛤蜃濳物也植物為動飛物為潛則不特因形移易矣而化固不足以言之故皆直言為而已𤣥鳥燕也燕以施生來巢人堂宇而乳嫁娶之象也人以其至為祠禖之候季冬雷在地下則雉應而雊孟春動於地上則蟄應而振至此聲乃動於天之下其聲發揚也以雷出有漸故言乃電陽光也陽微則光不見是月陽氣漸盛以擊於隂其光乃見故云始電陽生於子終於午至卯而中分隂生於午終於子至酉而中分故陽中春分隂中秋分晝夜各五十刻為日夜分季春之月日在胃昏七星中旦牽牛中其日甲乙其帝大皥其神句芒其音角律中姑洗其數八是月也桐始華田鼠化為鴽虹始見萍始生鳴鳩拂其羽戴勝降于桑是月也命國難九門磔攘以畢春氣季春建辰之月日在胃宿酉宫大梁之次七星星宿也姑洗辰律南呂所生三分益一長七寸九分寸之一鴽鶉䳺之屬螮蝀謂之虹雄曰虹雌曰霓雄謂明盛者雌謂暗微者萍水上浮蓱也鳴鳩飛以羽拍其身戴勝織紝之鳥是時恆在桑言降者重之若自天而下也為蠶事之候難所以難隂慝而驅之也難之事方相氏帥百𨽻而時難聚衆戲劇以盛其喜樂之氣則足以勝隂慝九門路門應門雉門庫門臯門城門近郊門逺郊門關門是也裂牲謂之磔除禍謂之攘天氣左轉故斗建左行為陽氣日月右行日月比天為隂隂氣右行也此月初日在胃月中從胃歷昴昴有大陵積尸之氣主死尸氣佚則厲鬼隨之而行故命方相索室中驅疫鬼以逐之又磔牲以攘於四方之神所以畢止春之厲氣也必於九門者欲隂慝之出爾孟夏之月日在畢昏翼中旦婺女中其日丙丁其帝炎帝其神祝融其音徴律中中呂其數七是月也螻蟈鳴蚯蚓出王瓜生苦菜秀靡草死麥秋至孟夏建巳之月日在畢宿申宫實沈之次婺女即女宿其日南方丙陽火丁隂火炎帝大庭氏即神農也以火德王顓頊之子名黎為火官徴屬火仲呂已律無射所生三分益一長六寸萬九千六百八十三分寸之萬二千九百七十四地二生火天七成之故其數七螻蟈蛙也隂而伏乘陽而鳴蚯蚓隂而屈乘陽而伸王瓜萆挈本草作菝葜王瓜色赤感火之色而生苦菜味苦感火之味而成靡草葶藶之屬靡細也隂類陽盛則死秋百榖成熟之期此於時雖夏於麥則秋也仲夏之月日在東井昏亢中旦危中其日丙丁其帝炎帝其神祝融其音徴律中蕤賓其數七是月也螳螂生鵙始鳴反舌無聲鹿角解蟬始鳴半夏生是月也日長至隂陽爭死生分仲夏建午之月日在東井即井宿未宫鶉首之次蕤賓午律應鐘所生三分益一長六寸八十一分寸之二十六螳螂一名不􅀈鵙博勞也反舌百舌鳥解脫也半夏藥名居夏之半而生故名半夏諸物皆感一隂生而然也至極也夏至日長之極晝六十刻陽盡午中一陰欲起此陰陽爭辨之際也分半也陰氣欲起故物半死半生季夏之月日在栁昏火中旦奎中其日丙丁其帝炎帝其神祝融其音徴律中林鐘其數七是月也溫風始至蟋蟀居壁鷹乃學習腐草為螢土潤溽暑大雨時行季夏建未之月日在栁宿午宫鶉火之次火大火心宿也林鐘未律黃鐘所生三分去一長六寸溫風暑熱之風也蟋蟀生於土中此時羽翼稍成未能逺飛但居其壁至七月方在野也蟋蟀今之促織鷹感陰氣乃有殺心學習搏擊之事螢火夜飛腹下如火光曰即照仲春鷹化為鳩仲秋鳩化為鷹故言化腐草為螢螢不復為腐草故不言化潤溽塗溼也蔡傳謂暑濕大雨為東井之所主也以仲夏日在東井乎而季夏則在栁矣况嵗久以後日漸西星漸東仲夏亦不在東井則東井所主之說何為也中央土其日戊巳其帝黃帝其神后土其音宫律中黃鐘之宫其數五土寄旺於四時各十八日共七十二日厯所謂土王用事是也則木火金水亦各七十二日土寄旺於辰戌丑未而未月在金火之間又居一歲之中故特揭一令於此以成五行之序焉其日戊陽土巳隂土居十干之中黃帝軒轅氏黃精之君也顓頊氏之子黎為土官句龍初為后土後祀以為社乃黎以火官兼后土焉宫屬土最尊君象也故配之中央黃鐘本十一月律而黃鐘之宫於諸宫為長與中央土聲相應土旺於四時宫亦冠於十二律非如他律以配氣言也天五生土地十成之四時皆舉成數此獨舉生數者四時無土不成而土以生為本也孟秋之月日在翼昏建星中旦畢中其日庚辛其帝少皥其神蓐收其音商律中夷則其數九是月也涼風至白露降寒蟬鳴鷹乃祭烏天地始肅農乃登榖孟秋建申之月日在翼宿已宮鶉尾之次其日庚陽金辛隂金少皡金天氏以金德王少皥之子名該為金官商屬金夷則申律大呂所生三分去一長五寸七百二十九分寸之四百五十一地四生金天九成之故其數九寒蟬寒蜩也似蟬而小鷹欲食鳥之時先殺鳥而不食似人之食不即食而祭先代為食之人也仲秋之月日在角昏牽牛中旦觜觽中其日庚辛其帝少皥其神蓐收其音商律中南呂其數九是月也鴻鴈來𤣥鳥歸羣鳥養羞雷始收聲蟄蟲壞户水始涸是月也日夜分天子乃難以逹秋氣仲秋建酉之月日在角宿辰宮夀星之次觜觽即觜宿也南呂酉律太蔟所生三分去一長五寸三分寸之一鴻鴈來自北而來南也𤣥鳥歸春來而秋去也羞食也養羞藏之以備冬月之食也蟄蟲壞益其户使通明處稍小至寒乃墐塞之也秋氣返故水涸秋分書夜各五十刻此難難陽氣也陽暑至此不衰害亦及人蓋陽氣左行此月斗建在酉酉是昴畢本位畢亦得大陵積尸之氣於是仲秋亦難明堂曰仲秋九門磔攘以發陳氣禦止疾疫是也季春命國難以畢春氣此獨言天子者此難陽氣陽者君象故諸侯以下不得難也退暑氣以逹涼氣曰逹季秋之月日在房昏虛中旦栁中其日庚辛其帝少皡其神蓐收其音商律中無射其數九是月也鴻鴈來賓爵入大水為蛤鞠有黃華豺乃祭獸草木黃落蟄蟲咸俯季秋建戌之月日在房宿卯宫大火之次無射戌律夾鐘所生三分去一長四寸六千五百六十一分寸之六千五百二十四鴈以仲秋先至者為主季秋後至者為賓爵為蛤飛物化為潛物也鞠即菊菊色不一而獨言黃者秋令在金黃為正色也祭獸者禽獸初得則殺而祭之於天也孟冬之月日在尾昏危中旦七星中其日壬癸其帝顓頊其神𤣥冥其音羽律中應鐘其數六是月也水始冰地始凍雉入大水為蜃虹藏不見天氣上騰地氣下降閉塞而成冬孟冬建亥之月日在尾宿寅宫析木之次其日北方壬陽水癸隂水顓頊髙陽氏以水德王少皥之子曰修曰熙相代為水官羽屬水應鐘亥律姑洗所生三分去一長四寸二十七分寸之二十天一生水地六成之故其數六蜃大蛤門户可閉閉之窗牖可塞塞之仲冬之月日在斗昏東壁中旦軫中其日壬癸其帝顓頊其神𤣥冥其音羽律中黃鐘其數六是月也鶡旦不鳴虎始交荔挺出蚯蚓結麋角解水泉動是月也日短至隂陽爭諸生蕩仲冬建子之月日在斗宿丑宫星紀之次東壁即壁宿黃鐘子律律之始也長九寸鶡旦夜鳴求旦之鳥也夜鳴隂類也求旦以求陽陽生得所求矣故不鳴虎隂物則亦感陽生而交合荔挺香草結猶屈也蚯蚓出穴屈首下向陽氣氣動則宛而上首解脫也水者天一之所生陽生而動也冬至日短之極晝四十刻陽欲起故爭諸生者萬物之生機也蕩動也季冬之月日在婺女昏婁中旦氐中其日壬癸其帝顓頊其神𤣥冥其音羽律中大呂其數六是月也鴈北鄉鵲始巢雉雊雞乳征鳥厲疾水澤腹堅是月也命有司大難旁磔出土牛以送寒氣是月也日窮于次月窮于紀星回于天數將幾終歲且更始季冬建丑之月日在女宿子宫𤣥枵之次大呂丑律蕤賓所生三分益一長八寸二百四十三分寸之百四鴈北鄉有早有晚早則此月晚則二月雊鳴也征鳥鷹隼之屬以其善擊故曰征厲猛疾迅也腹猶內也隂凝冰堅也季春惟國家之難仲秋惟天子之難此則下及庶人故云大難旁磔謂四方之門皆磔牲以攘隂氣不但九門而已月建丑丑為牛土能克水故出土牛以畢送寒氣牛善耕又勸民耕作之始此月難者隂氣右行是月日厯虛危司命二星在虛北司祿二星在司命北司危二星在司祿北司中二星在司危北此四司者鬼官之長又墳四星在危東南是虛危有四司墳墓之氣能為厲鬼將隨强隂出而害人故大難次舍也紀㑹也去年季冬日次於𤣥枵每月移次他辰至此一周窮盡還次於𤣥枵故曰日窮於次去年季冬月與日㑹於𤣥枵每月移㑹他辰至此一周窮盡還㑹於𤣥枵故曰月窮於紀二十八宿隨天而行每日雖周天一匝而早晚不同至於此月復其故處故曰星回於天去年季冬至今年季冬三百五十四日未滿三百六十五日不為正終故曰數將幾於終終則復始則歲且更始而明春之事起矣厯法天日漸移歲久日躔之次不同而那窮之事各異亦百世可知也案秦始皇十二年呂不韋死則呂不韋作月令在始皇初年也其云日躔及昏旦中星依秦厯推之秦厯與漢初厯最疏則日躔與昏旦中星安必其無少差且古人之定宮分距星代各不同若古厯之參差無論已惟以授時上考之合月令十之七八其一二稍殊者亦不越幾度內大都昏旦中俱在南或少偏少偏猶之南也始皇十年入甲子今以至元十八年辛巳歲上距始皇甲子歲推得積年一千五百一十七年中積五十五萬四千百七十五日一十四刻八十分天正冬至癸未日九十一刻二十分天正赤道斗二十度七分九十五秒天正加時黃道斗一十八度六十一分六十八秒黃赤道差一度四十六分二十六秒冬正定氣一十九日九十一刻二十分距春正八十九日春正定氣四十八日八十二刻一十六分距夏正九十四日夏正定氣二十二日五十三刻四十分距秋正九十四日秋正定氣五十六日二十四刻六十四分距冬正八十九日次年冬正定氣二十五日一十五刻六十分距春正八十九日次年春正定氣五十四日六分次年赤道斗二十度六分六十秒天正加時黃道斗十八度六十分四十二秒黃赤道差一度四十六分一十七秒定象限度九十一度三十一分三十秒春正加時黃道積度一百九度九十二分九十九秒夏正加時黃道積度二百一度二十四分二十九秒秋正加時黃道積度二百九十二度五十五分六十秒冬正加時減分九十五分八十五秒春正加時減分八十二分八十六秒秋正加時減分二十四分六十四秒次年冬正加時減分一十六分三十九秒本年四正夜半日度黃道積度冬正夜半日度斗十七度六十五分八十三秒春正夜半日度積度一百九度一十分一十三秒夏正夜半日度積度二百度七十三分四十八秒秋正夜半日度積度二百九十二度三十分九十六秒次年冬正夜半日度斗十八度四十四分二秒始皇帝十年甲子嵗天正冬至即冬正癸未日九十一刻夜半日度斗十七度午中黃道斗十八度午中赤道斗十九度距中度八十四度昏正中壁十度旦正中角四度小寒己亥日一十三刻夜半日度女四度午中黃道女四度午中赤道女五度距中八十五度昏正中胃一度旦正中氐十度大寒甲寅日三十四刻夜半日度虛八度午中黃道危初度午中赤道危一度距中八十七度昏正中昴四度旦正中心三度立春己巳日五十六刻夜半日度黃道危十五度午中黃道危十五度午中赤道室一度距中九十度昏正中畢十一度旦正中尾九度雨水甲申日七十八刻夜半日度室十四度午中黃道室十四度午中赤道室十六度距中九十四度昏正中井一度旦正中箕一度驚蟄庚子日夜半日度奎二度午中黃道奎三度午中赤道奎五度距中九十六度昏正中井十八度旦正中斗四度春分乙卯日二十二刻夜半日度婁初度午中黃道婁初度午中赤道婁初度距中一百二度昏正中栁初度旦正中斗二十度清明庚午日四十四刻夜半日度胃二度午中黃道胃三度午中赤道胃三度距中一百八度昏正中星五度旦正中牛七度榖雨乙酉日六十五刻夜半日度昴一度午中黃道昴二度午中赤道昴二度距中一百八度昏正中張十五度旦正中女十度立夏庚子日八十七刻夜半日度畢五度午中黃道畢五度午中赤道畢五度距中一百一十一度昏正中翼十六度旦正中危一度小滿丙辰日九刻夜半日度參四度午中黃道參四度午中赤道參三度距中一百一十四度昏正中軫十五度旦正中危十四度芒種辛未日三十一刻夜半日度井八度午中黃道井九度午中赤道井七度距中一百一十六度昏正中亢三度旦正中室十二度夏至丙戌日五十三刻夜半日度井二十二度午中黃道井二十三度午中赤道井二十三度距中一百一十六度昏正中氐十度旦正中奎十二度小暑辛丑日七十五刻夜半日度栁三度午中黃道栁四度午中赤道栁三度距中一百一十六度昏正中心三度旦正中婁五度大暑丙辰日九十七刻夜半日度星五度午中黃道星五度午中赤道星五度距中一百一十四度昏正中尾十度旦正中胃三度立秋壬申日一十八刻夜半日度張十三度午中黃道張十四度午中赤道張十五度距中一百一十一度昏正中斗四度旦正中昴九度處暑丁亥日四十刻夜半日度翼十一度午中黃道翼十一度午中赤道翼十三度距中一百八度昏正中斗十六度旦正中畢十六度白露壬寅日六十二刻夜半日度軫六度午中黃道軫六度午中赤道軫七度距中一百四度昏正中牛一度旦正中井五度秋分丁巳日八十四刻夜半日度角二度午中黃道角二度午中赤道角三度距中一百一度昏正中女三度旦正中井十一度寒露癸酉日六刻夜半日度亢五度午中黃道亢五度午中赤道亢五度距中九十七度昏正中虛三度旦正中栁四度霜降戊子日二十八刻夜半日度氐十度午中黃道氐十一度午中赤道氐十一度距中九十三度昏正中危四度旦正中張三度立冬癸卯日五十刻夜半日度心四度午中黃道心四度午中赤道心四度距中九十度昏正中室初度旦正中翼四度小雪戊午日七十一刻夜半日度尾十三度午中黃道尾十四度午中赤道尾十三度距中八十七度昏正中室十三度旦正中軫四度大雪癸