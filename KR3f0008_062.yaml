body:
  text: 古今律厯考卷六十二明邢雲路撰厯議三厯議治厯沿革甚矣厯之難言也治厯明時自黄帝堯舜與三代之盛王皆首重之周秦之間閏餘乖次嗣是以後遂失其傳漢劉歆造三統厯始立積年日法為推歩之準漢末劉洪造乾象厯始悟月行有遲速極差有五度餘晉姜岌造三紀厯始悟以月食衝檢日宿度所在宋何承天造元嘉厯始悟朔望弦皆定大小餘及測景定氣祖冲之造大明厯始悟太陽有嵗差之數極星去不動處一度餘北齊張子信始悟日月交道有表裏五星有遲疾留逆盈縮入氣加減隋劉焯造皇極厯始悟日非皆平行一度二至後有盈縮唐傅仁均造戊寅元厯頗采舊儀始用定制李淳風造麟徳厯以古厯章蔀元首分度不齊始為總法用進朔以避晦晨月見僧一行造大衍厯始以朔有四大三小定九服交食之異徐昻造宣明厯始悟日食有氣刻時三差宋周琮造明天厯始悟日月㑹合為朔併朔餘虚分為日法姚舜輔造紀元厯始悟食甚泛餘差數元至元庚辰郭守敬王恂創造簡儀髙表憑其所測實數考正者凡七事一曰冬至自丙子年立冬後依每日測到晷景逐日取對冬至前後日差同者為準得丁丑年冬至在戊戌日夜半後八刻半又定丁丑夏至在庚子日夜半後七十刻又定戊寅冬至在癸卯日夜半後三十三刻己卯冬至在戊申日夜半後五十七刻庚辰冬至在癸丑日夜半後八十一刻逺近相符前後應準二曰嵗餘自大明厯以来凡測景驗氣得冬至時刻真數者有六用以相距各得其時合用嵗餘考驗四年相符不差仍自宋大明壬寅年距至今日八百一十年每嵗合得三百六十五日二十四刻二十五分其二十五分為今厯嵗餘合用之數三曰日躔用至元丁丑四月癸酉望月食既推求日躔得冬至日躔赤道箕宿十度黄道箕宿九度有竒仍憑每日測到太陽躔度或憑星測月或憑月測日或憑金木二星度測日及月食衝驗冬至日躔立術推筭起自丁丑正月至己卯十二月凡三年共得一百二十四事皆躔於箕與日食相符四曰月離自丁丑以来至今憑每日測到逐時太隂行度推筭變從黄道求入轉極遲疾并平行得大明厯入轉後天又因考驗交食加大明厯三十刻與天道合五曰入交自丁丑五月以来憑每日測得太隂去極度比擬黄道去極度得月道交於黄道仍依日食法度推求皆有食分得入交時刻與大明厯所差不多六曰二十八宿距度自漢太初厯以来距度不同互有損益大明厯則於度下餘分附以太半少皆私意牽就未嘗實測其數今新儀皆細刻周天度分每度為三十六分以距線代管窺宿度餘分並依實測不以私意牽就七曰日出入晝夜刻大明厯日出入晝夜刻皆據汴京為準其刻數與大都不同今更以本方北極出地髙下黄道出入内外度立術推求每日日出入晝夜刻得夏至極長日出寅正二刻日入戌初二刻晝六十二刻夜三十八刻冬至極短日出辰初二刻日入申正二刻晝三十八刻夜六十二刻永為定式所創法凡五事一曰太陽盈縮用四正定氣立為升降限依立招差求得每日行分初末極差積度比古為密二曰月行遲疾古厯皆用二十八限今以萬分日之八百二十分為一限凡析為三百三十六限依垜疊招差求得轉分進退其遲疾度數逐時不同蓋前所未有三曰黄赤道差舊法以一百一度相減相乘今依筭術句股弧矢方圜斜直所容求到度率積差差率與天道實脗合四曰黄赤道内外度據累年實測内外極度二十三度九十分以圜容方直矢接句股為法求每日去極與所測相符五曰白道交周舊法黄道變推白道以斜求斜今用立渾比量得月與赤道正交距春秋二正黄赤道正交一十四度六十六分擬以為法推逐月每交二十八宿度分於理為盡總以日月實合時刻定晦而不用虚進法以躔離朓朒定交食其法視古皆宻而又悉去諸厯積年月日法之傅㑹者一本天道自然之數可以施之永久而無弊厯成上之賜名授時至今欽天監用之不敢更易焉然其中間有未善併缺焉者宜修改見後厯年甲子授時於古積年之法不用為是而厯代甲子積年之數所距至元庚辰為筭者則有可紀也立成如左第一甲子黄帝元年積三千九百七十七年第二甲子黄帝六十一年積三千九百一十七年第三甲子少昊二十一年積三千八百五十七年第四甲子少昊八十一年積三千七百九十七年第五甲子顓頊五十七年積三千七百三十七年第六甲子帝嚳三十九年積三千六百七十七年第七甲子帝堯二十一年積三千六百一十七年第八甲子帝舜九年積三千五百五十七年第九甲子夏禹八年積三千四百九十七年第十甲子仲康三年積三千四百三十七年第十一甲子寒浞十五年積三千三百七十七年第十二甲子帝槐四年積三千三百一十七年第十三甲子帝不降四年積三千二百五十七年第十四甲子帝扃五年積三千一百九十七年第十五甲子孔甲二十三年積三千一百三十七年第十六甲子桀二十二年積三千百七十七年第十七甲子太甲十七年積三千百一十七年第十八甲子太庚十五年積二千九百五十七年第十九甲子太戊二十一年積二千八百九十七年第二十甲子仲丁六年積二千八百三十七年第二十一甲子祖辛十年積二千七百七十七年第二十二甲子祖丁二十九年積二千七百一十七年第二十三甲子盤庚二十五年積二千六百五十七年第二十四甲子武丁八年積二千五百九十七年第二十五甲子祖甲二年積二千五百三十七年第二十六甲子武乙二年積二千四百七十七年第二十七甲子紂十八年積二千四百一十七年第二十八甲子康王二年積二千三百五十七年第二十九甲子昭王三十六年積二千二百九十七年第三十甲子穆王四十五年積二千二百三十七年第三十一甲子孝王十三年積二千一百七十七年第三十二甲子共王五年積二千一百一十七年第三十三甲子幽王五年積二千百五十七年第三十四甲子桓王三年積一千九百九十七年第三十五甲子惠王二十年積一千九百三十七年第三十六甲子定王十年積一千八百七十七年第三十七甲子景王八年積一千八百一十七年第三十八甲子敬王四十三年積一千七百五十七年第三十九甲子威烈王九年積一千六百九十七年第四十甲子顯王十二年積一千六百三十七年第四十一甲子赧王十八年積一千五百七十七年第四十二甲子秦始皇十年積一千五百一十七年第四十三甲子漢文帝三年積一千四百五十七年第四十四甲子武帝元狩六年積一千三百九十七年第四十五甲子宣帝五鳯元年積一千三百三十七年第四十六甲子平帝元始四年積一千二百七十七年第四十七甲子明帝永平七年積一千二百一十七年第四十八甲子安帝延光三年積一千一百五十七年第四十九甲子靈帝中平元年積一千百九十七年第五十甲子蜀后主延熈七年積一千百三十七年第五十一甲子晉惠帝永興元年積九百七十七年第五十二甲子哀帝興寜二年積九百一十七年第五十三甲子宋文帝元嘉元年積八百五十七年第五十四甲子齊武帝永明二年積七百九十七年第五十五甲子梁武帝大同十年積七百三十七年第五十六甲子隋文帝仁夀四年積六百七十七年第五十七甲子唐髙宗麟徳元年積六百一十七年第五十八甲子𤣥宗開元十二年積五百五十七年第五十九甲子徳宗興元元年積四百九十七年第六十甲子武帝㑹昌四年積四百三十七年第六十一甲子昭宗天祐元年積三百七十七年第六十二甲子宋太祖乾徳二年積三百一十七年第六十三甲子仁宗天聖二年積二百五十七年第六十四甲子神宗元豐七年積一百九十七年第六十五甲子髙宗紹興十四年積一百三十七年第六十六甲子寜宗嘉太四年積七十七年第六十七甲子宋理宗景定五年元世祖至元元年積一十七年至元十七年庚辰嵗冬至上下距筭為積第六十八甲子元泰定元年積四十四年第六十九甲子大明洪武十七年積一百四年第七十甲子正統九年積一百六十四年第七十一甲子𢎞治十七年積二百二十四年第七十二甲子嘉靖四十三年積二百八十四年右積年以至元十七年庚辰為距上推下推歩之自至元庚辰至萬厯己亥積三百一十八年以後每嵗增一筭古今律厯考卷六十二
