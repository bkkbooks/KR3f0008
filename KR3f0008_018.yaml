  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0008_WYG_018-1a, image: WYG0787/WYG0787-0196a.png}
body:
  text: 古今律厯考卷十八明邢雲路撰歷代十歷代考宋史宋初承五代王朴制律厯作律準以宣其聲太祖以雅樂聲髙詔有司考正太常寺和峴以西京銅望臬可校古法即司天臺影表銅臬下石尺是也及以朴所定尺比校短於石尺四分則聲樂之髙蓋由於此乃造新尺又以上黨羊頭山秬黍纍尺校律自此雅音和暢宋初用周顯德王朴欽天厯推驗稍疏乃詔司天監王處訥别造新厯賜名應天繼應天而作者曰乾元曰儀天曰崇天曰明天曰奉元曰觀天曰紀元逮靖康丙午百六十餘年而八改歷南渡後曰統元曰乾道曰淳熙曰㑹元曰統天曰開禧曰㑹天曰成天至德祐丙子又百五十年復八改大率謂七十九年差一度測北極率以千里差三度有奇古今測驗止於嶽臺而餘杭則東南相距二千餘里發斂晷刻豈能盡諧諸􅍓法具在惟奉元㑹天二法不存舊史以乾元儀天附應天後以乾道淳熙會元附統元開禧成天附統天初應天漸差太平興國六年太宗命冬官正吳昭素造乾元􅍓後以朔望有差咸平四年真宗命司天監史序造儀天􅍓宋史稱法有疏密數有煩簡雖條例稍殊而綱目一也遂以應天乾元儀天三􅍓合載於一冊建隆應天􅍓演紀上元甲子距建隆三年壬戌嵗積四百八十二萬五千五百五十八太平興國乾元􅍓上元甲子距太平興國六年辛巳嵗積三千五十四萬三千九百七十七咸平儀天􅍓上元甲子距咸平四年辛丑嵗積七十一萬六千四百九十七應天乾元二􅍓史載法率缺少亦有有法率而推之不合者故不必推二􅍓既因漸差改行儀天故推儀天􅍓儀天宗法一萬一百乃五百三十一章一十一年之數也嵗周分三十六萬八千八百九十七合率二十九萬八千二百五十九乾元數三百六十八萬九千八十八厯終分二十七萬八千三百一秒一百六十五交終分二十七萬四千八百四十三秒二千二百七十九以宗法除歲周分得三百六十五日二十四刻四五五四為歲實以宗法除合率得二十九日五十三刻五九四為朔實以宗法除乾元數得三百六十五度二十五分六十二秒以宗法除厯周得二十七日五十五刻四五五六為轉終以宗法除交終分得二十七日二十一刻二二步五星三厯俱參差以考驗不精之故不可為據亦不復推緣五緯不協所以至仁宗初星曜有差其云七十九年差一度非一定宜隨時改云千里差三度有奇亦非一定宜隨地改乃協乾興初儀天星曜有差厯官宋行古議改厯天聖元年成仁宗命曰崇天厯演紀上元甲子距天聖二年甲子積九千七百五十五萬六千三百四十樞法一萬五百九十歲周三百八十六萬七千九百四十朔實三十一萬二千七百二十九周天分三百八十六萬八千六十五轉周分二十九萬一千八百三秒五百九十四交終分二十八萬八千一百七十七秒四千二百七十七以樞法除嵗周得三百六十五日二十四刻四五七為嵗實以樞法除朔實得二十九日五十三刻五九四為月䇿以樞法除周天分得三百六十五度二十五分六十三秒為周天以樞法除轉周分得二十七日五十五刻四五八五為轉終以樞法除交終分得二十七日二十一刻二二二一為交終以步五星以樞法除星周率得周日木周率四百二十二萬四千五十八火八百二十五萬九千三百六十六土四百萬三千八百七十二金六百一十八萬三千五百九十九水一百二十二萬七千一百七十木周日三百九十八日八十七刻二三火七百七十九日九十二刻一三土三百七十八日八刻四金五百八十三日九十刻九二水一百一十五日八十八刻是􅍓行四十年後天五十四刻英宗即位殿中丞判司天監周琮言舊􅍓氣節加時後天半日五星之行差半次日食之候差十刻乃作新􅍓三年而成賜名明天厯演紀上元甲子距治平元年甲辰嵗積七十一萬一千七百六十算元法三萬九千是二千五十二章十二年之數即為日法以日法除嵗周一千四百二十四萬四千五百得三百六十五日二十四刻三五八九為嵗實以日法除朔實一百一十五萬一千六百九十三得二十九日五十三刻五九為朔實周天三百六十五度二十五分六十四秒轉終二十七日五十五刻四六以交周五十二萬三千四百六十除嵗周得二十七日二十一刻二二為交終以步五星以元法除終率得終日木終率一千五百五十五萬六千五百四火三千四十一萬七千五百三十六土一千四百七十四萬五千四百四十六金二千二百七十七萬二千一百九十六水四百五十一萬九千一百八十四木周日三百九十八日八十八刻四七火七百七十九日九十三刻六八土三百七十八日八刻三五金五百八十三日九十刻二四水一百一十五日八十七刻三九周琮論􅍓謂氣朔交食使三千年間若應準繩而有前有後有親有疏者即為中平之數取數多而不以小得為親密乃至言也神宗熙寧七年甲寅嵗衛朴造奉元􅍓行十八年至元祐壬申有差其術不存哲宗元祐七年皇居卿改造觀天􅍓演紀上元甲子距元祐七年壬申積五百九十四萬四千八百八算統法一萬二千三十乃六百三十三章三年之數也嵗周四百三十九萬三千八百八十朔實三十五萬五千二百五十三轉周分三十三萬一千四百八十二秒三百八十九交終分三十二萬七千三百六十一秒九千九百四十四以統法除嵗周得三百六十五日二十四刻三五五七為嵗實以統法除朔實得二十九日五十三刻五九為月策以統法除轉終分得二十七日五十五刻四六六一為轉終以統法除交終分得二十七日二十一刻二一三五為交終以步五星以統法除周率得周日木周率四百七十九萬八千五百二十六秒九十二火九百三十八萬二千五百六十秒七十六土四百五十四萬八千四百三十一秒八十五金七百二萬四千三百二十一秒三十四水一百三十九萬四千二秒七木周日三百九十八日八十八刻火七百七十九日九十三刻二土三百七十八日九刻七金五百八十三日九十刻三水一百一十五日八十七刻七一行至崇寧冬至差徽宗崇寧二年癸未嵗姚舜輔造占天􅍓行三年不效其術不存五年丙戌嵗復令姚舜輔改造紀元􅍓演紀上元庚辰至崇寧五年丙戌積二千八百六十一萬三千四百六十六算日法七千二百九十朞實二百六十六萬二千六百二十六朔實二十一萬五千二百七十八轉周分二十萬八百七十三秒九百九十交終分一十九萬八千三百七十七秒八百八十以日法除朞實得三百六十五日二十四刻三六二為嵗實以日法除朔實得二十九日五十三刻五九為月策以日法除轉周分得二十七日五十五刻四六八為轉終以日法除交終分得二十七日二十一刻二二二為交終以步五星以日法除星周率得周日木周率二百九十萬七千八百七十九秒六十四火五百六十八萬五千六百八十七秒六十四土二百七十五萬六千二百八十八秒七十八金四百二十五萬六千六百五十一秒四十三半水八十四萬四千七百三十八秒五木周日三百九十八日八十八刻六火七百七十九日九十二刻九六土三百七十八日九刻一六金五百八十三日九十刻二六水一百一十五日八十七刻六六崇寧元年方外之士自云王其姓面作璣衡之制七政運行曲盡其妙著為成書惜金人入冦儀象盡歸於金可惜也髙宋建炎元年即金天會五年金司天楊級始造大明厯然其所本不能詳究或曰因宋紀元厯而增損之也正隆間占候漸差乃命司天趙知微重修大明厯時孝宗淳熙七年金大定二十年也演紀上元甲子至大定二十年庚子八千八百六十三萬九千六百五十六年日法五千二百三十歲實一百九十一萬二百二十四分朔實一十五萬四千四百四十五分轉終分一十四萬四千一百一十秒六千六十六交終分一十四萬二千三百一十九秒九千三百六十八以日法歸歲實得三百六十五日二十四刻三五九四以日法歸朔實得二十九日五十三刻五九二以日法歸轉終得二十七日五十五刻四六二以日法歸交終得二十七日二十一刻二二二三木星周三百九十八日八十八刻火七百七十九日九十三刻一六土三百七十八日九刻三金五百八十三日九十刻一四水一百一十五日八十七刻六終金之世止用知微厯元初猶用之至授時始改宋太史候臺銅渾儀乃吏部勾當官韓公廉所製公亷通九章勾股法以推天度撰九章勾股測驗渾天書一卷貯之禁中後失其傳故世無知者金既取汴以輦致銅渾儀於燕汴至燕相去千餘里望筒取極星稍差移下四度才得之明昌六年龍擊渾儀摧落旋營緝之貞祐南渡遂委而去吁嗟神物之成敗數也自時厥後遂無制渾儀如公亷之精巧者勾股測驗法郭守敬之割員是其術也今可倣而行之遼史大明厯即劉宋祖冲之大明厯古今律厯考卷十八
