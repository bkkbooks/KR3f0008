body:
  text: 古今律厯考卷十二眀邢雲路撰厯代四厯代考後漢律厯志漢興北平侯張蒼首正律孝武置協律官元始中劉歆典領鐘律班固取以為志然率多古法也至元帝時郎中京房字君眀對言受學故小黄令焦延夀六十律相生之法以上生下皆三生二以下生上皆三生四陽下生隂隂上生陽終於中呂而十二律畢矣中呂上生執始執始下生去滅上下相生終於南事而六十律畢矣房謂竹聲不可調度乃作準定數以為六十律清濁之節無何京房坐棄市律與準皆廢夫古律五音十二律自帝舜言之後泠州鳩傳之管子發明之所由來舊矣京房乃於十二律之外自執始去滅至分鳥南事凡演為四十八律厥名厥義不知出何故實且每律統五統四統三不一亦有隔九相生者其三分損益不盡之算或棄或増乖戾無次抑又何也豈焦氏之法乎非耶焦延夀曰得我道以亡身者京生也焦氏𨼆身自保使道可亡身焦胡不亡乃焦氏逆知京必亡者知京所用非其道也房得焦氏之道而謬用其道觀其歩天不眀晦朔誤為朓昃妄附肅舒事應然則何譸不幻何假不作執始諸名準絃諸數皆京房鑿空之為也焦氏前知知足以殺其身而已矣其論候氣謂天子常以日冬夏至御前殿合八能之士陳八音聽樂均度晷景候鐘律效則和否則占引易緯云冬至人主不出宫寢兵從樂五日擊黄鐘之磬公卿大夫列士之意得則隂陽之晷如度數夏至之日如冬至之禮冬至之日樹八尺之表日中視其晷晷如度者其歲美人民和順晷不如度者則歲惡人民多譌言政令為之不平晷進則水晷退則旱進一尺則日食退一尺則月食月食則正臣下之行日食則正人主之道斯言非也候氣之法原出不經易緯乃後人所作偽書其說皆非是蓋冬至之景午景也如其度者乃午正初刻冬至也若前少後多為減差則冬至在午前前多後少為加差則冬至在午後無論午前午後但非午正初刻冬至者午景俱退而短殊無進而長之理冬至八尺表日晷退不過寸許亦無退一尺者至進分釐亦無况進一尺乎易緯並不知測晷為何事而鑿空妄言以欺人且附之以吉凶徵應載在史冊流傳至今幾何而不迷亂後人之耳目也太初三統厯行百餘年厯稱後天朔或在晦月見至元和失天益遠冬至日在斗二十一度而厯以為牽牛中星差天五度晦朔弦望差天一日先立春一日以折獄斷大刑於氣已迕而望平和厯時之義蓋亦遠矣章帝知其謬故召治厯編訢李梵改行四分以遵於堯以順孔聖奉天之文訢梵以十一月當先大諸臣謂當先小不知月之大小隨月而定豈有十一月先大先小之說四分與三統皆用斗分二十五刻其失則均惡在其為遵堯順孔奉天也賈逵論厯謂以太初厯考漢初盡太初元年日朔二十三事共十七得朔四得晦二得二日新厯七得朔十四得晦二得三日以太初厯考太初元年盡更始二年二十四事十四得朔十得晦新厯十六得朔七得二日一得晦以太初厯考建武元年盡永元元年二十三事五得朔十八得晦新厯十七得朔三得晦三得三日又以新厯考春秋二十四事失不中者二十三事天道參差不齊必有餘又有長短不可以等齊故保乾圗䜟云三百年斗厯改憲又謂黄道度日月弦望多近史官一以赤道度之不與日月同夫以三統四分治厯俱大半不得朔而以授時治春秋與漢厯則亡一之不朔則豈有天道長短不齊之理又何必三百年即一改耶黄赤道不同而系於一機以赤道變黄道百世可知者也永元霍融論厯謂漏刻率九日増減一刻不與天相應夫漏刻自今日午正初刻至明日午正初刻均分百刻定為的數而天日之行乃以刻定之均分十二時子午昏明隨日而驗則漏刻之中何必有增減之差與天不相應也延光論厯太初晦月見西方食不與天相應四分復謬不可施行謂三大二小皆疏遠其言俱是漢安邊韶論太初厯以乾鑿度八十一分日之四十三為日法四分厯以三百六十五度四分度之一為周天復得庚申著於圖讖其元則上統開闢其數則復古四分宜詔舉行不知乾坤鑿度有眞有贗庖犧先文軒轅演籕蒼頡所修者眞也周易附於後述孔子言者乃後人書之不得為先文贗也觀其載孔子之言曰厯以三百六十五日四分度之一為一歲七十六為一紀日法二十九日與八十一分日四十三以歩至坼當日者而易一大周一歲之周以卦用事六爻六日一日天王諸侯二日大夫三日卿四日三公五日辟六日宗廟而又歸於符録圖讖之說詳其術四分度之一四年積一日故云四分七十六乃四章歲為一紀名為蔀法積日二十九以八十一分除日之四十三得五十三刻八分六十四秒零以加於二十九日下共二十九日五十三刻八分六十四秒乃太初厯之朔實四章之月九百一十二及閏月二十八共九百四十為蔀積月以蔀法乘三百六十五日四分日之一得二萬七千七百五十九為蔀積日為一紀以二十乘蔀法得積歲千五百二十以二十乘蔀月得積月萬八千八百以二十乘蔀日得積日五十五萬五千一百八十為一蔀首更置一紀之蔀日以六十四乘之得積日百七十七萬六千五百七十六又以六十乘蔀首三十二得積蔀首百九十二以二十乘之得積紀三千八百四十紀又云紀數以七十六乘紀數得積歲二十九萬一千八百四十以三十二除之得九千一百二十周謂卦當歲者積歲每歲十二月并章月七得三百六十萬九千六百其中十萬七千五百二十月者閏也以三百八十四爻除前積月之數得九千四百周謂爻當月者以四分朔實二十九日五十三刻八分五十一秒乘積月得積日萬六百五十九萬四千五百六十日以萬一千五百二十坼除之得九千二百五十三周謂坼當日者而易一大周此其術皆四分厯之法也夫乾坤鑿度謂為孔子發明伏羲文王之道也使果出於孔子之口定為厯本則宜毫髪無差古今不易者然而四分之法其術甚疎以之制厯十失其九一跬歩不可行豈以羲文而有是道豈以孔子而為是言其為贗書眀甚或者即治四分厯諸人假作聖言以實巳偽未可知也至於卦氣圗䜟之說尤屬悖謬一日諸侯二日大夫取何名義後之厯家不知亦收之厯數贅矣孔子立言眀白簡易論語易傳不啻詳言何無一言及符錄圗䜟自此偽書一行章帝遂深信其說謂上統開闢復古四分合赤九㑹昌之䜟奏可施行豈知演紀上元復得庚申開闢之歲乃自下逆推演至厯元各厯家俱有之非其眞也堯咨羲和苐云朞三百有六旬有六日舉成數而言何嘗有四分度之一之說漢人遂定為二十五刻悖也甚矣熹平馮光陳晃論厯謂厯元不正故妖民叛冦益州盗賊相續為厯用甲寅為元而用庚申圖緯無以庚為元者蔡邕議光晃所據殷厯元也孝武用丁丑孝章用庚申宻於太初是新元效也二說皆非厯元乃自下逆推之數非其眞也於叛賊何豫丁丑庚申二者皆四分法新元亦不效漢人論本初元年天以十二月食厯以後年正月於是始差以法推質帝本初元年丙戌歲十二月不食次年桓帝建和元年丁亥歲正月辛亥朔卯時日食載在簡冊可考也以此例漢人論蝕之失日行北陸謂之冬西陸謂之春南陸謂之夏東陸謂之秋者蓋漢冬至日躔在斗右轉而牛而女以次周天今萬厯年日躔在箕去古未遠其行猶昔若久之則天日漸逺凡四陸皆可冬厯四時皆可北陸非一定也四分厯日發其端周而為歲然其景不復四周千四百六十一日而景復初是則日行之終以周除日得三百六十五日四分日之一為歲之日數日日行一度亦為天度日行十九周月行二百五十四周復㑹於端是則月行之終也以日周除月周得一歲周天之數以日一周減之餘十二十九分之七則月行過周及日行之數也為一歲之月以除一歲日為一月之數月之餘分積滿其法得一月月成則其歲月大四時推移故置十二中以定月位有朔而無中者為閏月中之始日節與中為二十四氣以除一歲日為一氣之日數也其分積而成日為没并歲氣之分如法為一歲没没分於終中中終於冬至冬至之分積如其法得一日四嵗而終月分成閏閏七而盡其嵗十九名之曰章章首分盡四之俱終名之曰蔀以一嵗日乘之為蔀日之數也以甲子命之二十而復其初是以二十蔀為紀紀嵗青龍未終三終歲後復青龍為元此其術也詳其術謂四分者二十五刻也周歲其景不復四周成一日無餘分則景復初仍子正初刻四為日法以四除千四百六十一得三百六十五日二十五刻為歲之日數亦為周天日日行一度與天度同日行十九周為一章名章法亦名章歲一章之月二百三十五加章歲共二百五十四乃月行二百五十四周亦云月㑹復㑹於端是為月行之終也以日周十九除月周二百五十四餘十三日十九分日之七再以十九歸其七共得十三度三十六分八十四秒二十分為月平行度以日一周減前十三餘十二日十九分日之七為一歲之月十二月以十二月除一歲之日三百六十五日二十五刻得三十日四十三刻七十五分為一月惟三十日故其月大以十二月乘三十日四十三刻七十五分即三百六十五日二十五刻一歲周天之數也十二中者十二中氣月無中氣則閏十二節十二中併為二十四氣以除一歲之日得一十五日二十一刻八十七分五十秒為一氣䇿若以日法四乘二十四氣得九十六以除周天一千四百六十一亦得氣䇿若先除十五日餘二十一為没數亦云没法倍没數得四十二為中法七因没法得一百四十七為章閏八因没法得一百六十八為日餘一歲之没成日餘二十五刻為一歲没四歳無餘分以十九年七閏共二百三十五為章月以四因章月得一千一十六為月周以三歸歲周三百六十五日二十五刻得一百二十一日七十五刻以四因之得四百八十七為通法以章月乘周天一千四百六十一得三十四萬三千三百三十五為大周置十九年共六千九百三十九日七十五刻以章月而一得二十九日五十三刻八分五十一秒為月䇿再置一章之月以月㑹二百五十四而一得二十七日三十二刻一十八分為交終以二十三食而復既為食法二十三置三九二十七以五因之得一百三十五為月數以二食法四十六乘章月得一千八十一為食數以蔀法乘月數得一萬二百六十為蔀㑹率以二十歸蔀㑹率得五百一十三為蔀㑹即二十七章之歲數故又曰歲數以日法因蔀㑹率得四萬一千四十為元㑹總計章法十九年章月二百三十五月章日六千九百三十九日七十五刻蔀法七十六年蔀月九百四十月蔀日二萬七千七百五十九日紀法一千五百二十年紀月一萬八千八百月紀日五十五萬五千一百八十日元法四千五百六十年元月五萬六千四百月元日一百六十六萬五千五百四十日蓋十九年為一章四章為一蔀二十蔀為一紀即八十章太初八十一章今八十章三紀為一元故曰歲首至也月首朔也至朔同日謂之章閏七而盡同在日首謂之蔀章首分盡四之俱終蔀終六旬謂之紀以甲子命之二十而復其初歲朔又復謂之元紀青龍未終三終歲復青龍甲寅其數詳矣然總之皆四分法也天日同度其元已差天正月大其說悖理氣朔交轉各有差盈縮遲疾各有率而四分不知一概以二十五刻齊之至於日食之數禀於盈縮與遲疾者而四分以食法食數取則何怪乎亡一之合也其失悉與太初同四分厯演紀上元章帝元和二年乙酉歲距元積年九千三百六十五以歲實三百六十五日二十五刻乘之得三百四十二萬五百六十六日二十五刻得庚寅卯正初刻冬至以授時上推是年冬至分二十三日五十九刻四十八分得丁亥未正一刻冬至四分厯較授時後天三日曰演紀云者以自立之法推求往古生數之始七政同度世代綿遠馴積其數至踰億萬後人厭其布算繁多互相推考斷截其數而增損日法以為得改憲之術此厯代積年日法所以不同也昔人謂建厯之本必先立元元正然後定日法法定然後度周天以定分至自黃帝立元用辛卯顓頊用乙卯虞用戊午夏用丙寅殷用甲寅周用丁巳魯用庚子漢初承秦用乙卯武帝用丁丑章帝用乙酉以上得庚申後諸厯轉相祖述共七十八家未有舍此而能成者使立元果眞積年日法果確以推天歩誰曰不可而乃非其然也四分之誤尤甚四分厯推木星周三百九十八日八十四刻五十九分火星周七百七十九日五十三刻二十三分土星周三百七十八日五刻九十四分金星周五百八十四日二刻四十一分水星周一百一十五日八十八刻一十三分以較授時木星少三刻四十一分火星少三十九刻六十七分土星少三刻二十二分金星多一十二刻一十五分水星多五十三分且四分厯與太初厯雖有遲疾無遲疾差度况無盈縮及盈縮差度止用一平朔歩筭所以五星伏見非失之先則失之後朔無盈縮遲疾則日食或失之先或失之後皆非也古今律厯考卷十二
