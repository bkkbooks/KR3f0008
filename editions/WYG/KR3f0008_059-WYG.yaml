body:
  text: 古今律厯考卷五十九明邢雲路撰厯法二十四厯法五星聚秦王子嬰初立即漢元年漢紀髙帝元年十月五星聚東井孟康曰嵗星先至四星從嵗星也後魏崔浩集諸厯家攷校漢元以來日月薄食五星行度并譏前史之失别為魏厯以示髙允允曰漢元年十月五星聚東井此乃厯術之淺事今譏漢史而不覺此謬恐後人之譏今猶今之譏古也浩曰所謬云何允曰按星傳太白辰星常附日而行十月日在尾箕昏没於申南而東井方出於寅北二星何得背日而行是史官欲神其事不復推之於理也浩曰天文欲為變者何所不可邪允曰此不可以空言争也宜更審之坐者咸恠之唯東宮少傅游雅曰髙君精於厯數當不虚也後嵗餘浩謂允曰先論本不經心及更考究果如君言五星乃以前三月聚東井非十月也衆乃歎服至趙宋紀太祖乾德五年三月五星聚於奎初竇儼善推歩星厯逆知吉凶與盧多遜楊徽之同在諫官儼甞謂之曰丁卯歳五星聚奎自此天下太平二拾遺見之儼不與也後卒如其言我朝洪武間五星並見於奎占者謂亦如宋建隆三年為文明之象有考者曰宋五星聚奎在乾德五年非建隆三年也古記載與論辯不同如此以余考之秦二世三年甲午八月子嬰立十月沛公至霸上子嬰降至正月改為漢髙帝元年秦以十月為歳首漢因之則是年甲午之十月巳屬為乙未之歳首十月初子嬰尚在位則雖秦王子嬰立之年即漢之元年亦可也五星聚井則實在乙未歳前天正以後之年以授時推乙未歳前天正中積五十四萬二千七百五十二日有竒天正冬至赤道日躔斗二十度以步至五月中旬木星入井見至次年丙申三月方出步乙未天正後之十月日在尾箕昏没於申南而東井方出於西北金水二星不得背而行是月木火土三星俱在東井金水不在東井及推前三月乃八月也八月日躔在井而土金水三星俱㑹在井惟火星在申酉間夫井居未而申酉間亦近未雖相去不逺然尚未至井也史載是年五星聚井必目覩之者崔浩又歩為八月聚井今以授時推八月乃火星猶隔一辰尚未至井則此必授時火星之周率少强之所致也周率少强則歩不及數以積筭上至漢初千有餘年之逺火星甫及申酉間而不能至未無惑其然耳然則髙允崔浩之言皆是也若及時測驗減火周之率以合天道則有待而為耳宋太祖時五星聚奎竇儼逆知其數在乾徳五年之丁卯為是洪武間占者謂為建隆三年非也以授時推是乾徳五年丁卯歳三月中旬五星皆聚在奎合夫授時歩漢聚井有火隔一宿之少差而於宋聚奎乃脗合不爽何以故以元至宋年數近而迄漢則厯年逺也今以詳布乾徳聚奎之厯具於左宋太祖乾徳四年丙寅歳距元至元辛巳三百一十五筭中積一十一萬五千五十一日四八二冬至二十三日五七八閏餘一十九日九一三三二八經朔三十六日六四六七二天正加時赤道斗四度二三五天正加時黄道斗三度八九三六金星後合三十四日九三八四盈厯五十一日四三八三火星後合三百四十五日一六四五盈厯三百日三九五五二三乾徳五年丁卯中積一十一萬四千六百八十六日二三九二冬至二十八日八二八閏餘一日二五八四二遲厯四日七五八經朔二十七日五六二三八天正加時赤道斗四度二一五八天正加時黄道斗三度八八一木星後合八十九日七六六盈厯三百五十七日八四九九七五縮末厯七日三五七七五減差度七八六九六八月數三入二月入月已來日一日五八六二七三二月經朔五十六日一五四一五九加時定日五十七日七四四三二加時定度一百二度三八九七三二二月二日辛酉酉初三刻木合伏壁八度三二二三推木星晨疾末中積一百三十四日五九二六中星一百一十三度一四六七盈厯日一六二七七五加差度一七六九五月數四入三月入月已來日一十七日七四六三四三加時定星奎九度四六七三九五三月經朔二十五日六八四七五二加時定日四十三日四三一九五順減差一十分三七一一十八日丙午與金星同度丁未日夜半奎九度三六三九八四三月十九日丁未木星晨疾末奎九度是日與火星同度推火星晨疾末中積四百七十三日一六四五中星八十五度二九六盈初厯二十日五八二加差十四度七四五三五六月數四入三月入月已來日五日八三一三加時定星壁五度六七八四五六加時定日三十一日四八七八五五順減差三十三分四四九八乙未日夜半壁五度三四四二三月七日乙未火星晨疾末壁五度十一日己亥奎初度九十四分六三二十八日丙辰火星與土星同度奎十五度土星後合一百六日九二一盈厯三百五日五五七五推土星晨疾中積一百二十七日三二一中星一百二十二度七九二縮末厯五十六日一六減差五度一二三九八月數四入三月入月已來日五日三三二一六五加時定星奎十三度九六八七二加時定日三十一日一六九一七順減差三分六六四八乙未日夜半奎十三度九三二四三月七日乙未土星晨疾十三度三月八日土星順行見奎十四度二十三日辛亥與金星同度二十八日丙辰與火星同度推金星晨疾初中積四百七十八日八四一中星九十一度六七四盈末厯八十一日九三五三五加差二度一四六二三月數三入二月入月已來日二十八日三六九四六三加時定星室十五度二九九加時定日二十四日五二三六二二順減差六十三分八六戊子日夜半室十四度三九九八四二月二十九日戊子金星晨疾初室十六度三月十一日己亥金星順行見奎初度二一四八三月十八日與木星同度三月二十三日辛亥金星與土星同度奎十五度水星後合一十四度六三一五盈厯二百二十四日六六九二推水星晨伏中積一百一十二日七五七五中星九十五度九六一縮末厯五十三日七三五五五減差一度六七一六月數三入二月入月已來日二十三日七五三九八一加時定星室十四度四八一二加時定日一十九日九八一四順減差一度五二九八九一二月二十四日癸未夜半室十二度五一九二一三月五日癸巳水星晨伏不見奎一度三二九一右水星按元史推誤推水星晨疾此以改應法推是中積一百一十七日七五七五中星一百八度三四七六縮末厯七十三日九四二減差二度一七八三二月數三入二月入月已來日二十七日二四五九二二加時定度一百一日八一二六四加時定星壁七度四五五一四加時定日二十三日三九八一順減差四十四分八五二月二十八日丁亥夜半壁七度六六四三月一日己丑順行見奎初度四八九八四三月十日順行見奎十四度與土星同度右步五星授時推水星合應差謬今依法改正用推乃得其真古今律厯考卷五十九
