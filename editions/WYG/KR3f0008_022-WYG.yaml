body:
  text: 古今律厯考卷二十二明邢雲路撰歴代日食三歴代日食厯後漢晉昭烈帝章武元年辛丑嵗即魏黄初二年六月戊辰晦日食七月交二十六日六一七月朔四日五五戊辰未時是七月戊辰朔未時日食非六月晦章武二年壬寅嵗即魏黄初三年正月丙寅朔日食十一月庚申晦日食正月交一十三日三一正月朔二日四五丙寅巳時十二月交一十三日九二十二月朔五十六日五六庚申未時是年正月丙寅朔巳時日食是至十二月則庚申日未時合朔申時食甚非十一月晦後主建興二年甲辰嵗即魏黄初五年十一月戊寅晦日食十一月交一十二日八二十一月朔一十五日四一巳時是十一月己卯朔巳時日食非十一月戊寅晦建興九年辛亥嵗即魏明帝太和五年十一月戊戌晦日食十二月交二十六日三五十二月朔三十四日三二戊戌辰時是十二月戊戌朔辰時日食非十一月晦文獻通考載次年正月戊辰朔日食見吴厯夫食限六月一交豈有十二月食正月復食之理吴誤建興十一年癸丑嵗即魏明帝青龍元年閏五月庚寅朔日食六月交一十三日六五六月朔二十六日四四巳時是六月庚寅朔巳時日食非閏五月朔蓋是年閏八月而厯官誤閏五月先天三其月非也延熈三年庚申嵗即魏少帝正始元年七月戊申朔日食七月交二十七日一八七月朔四十四日五一戊申午時是七月戊申朔午時日食延熙五年壬戌嵗即魏正始三年四月戊戌朔日食五月交二十六日八五月朔四日三三戊辰辰時是五月戊辰朔辰時日食非四月戊戌朔延熈六年癸亥嵗即魏正始四年五月丁丑朔日食既五月交二十六日六九五月朔五十八日四三壬戌巳時是五月壬戌朔巳時日食非丁丑朔延熈七年甲子嵗即魏正始五年四月丙辰朔日食五月交九刻五月朔五十二日四六丙辰午時是五月丙辰朔午時日食非四月朔蓋是年閏七月而厯官誤閏三月故以五月為四月也觀綱目書閏三月帝遣費禕救漢中則知誤閏三月矣延熈八年乙丑嵗即魏正始六年四月壬子朔日食推四月朔辛亥過食限不應食延熈八年十月戊申朔日食十月交一十四日六一十月朔四十四日八戊申午時是十月戊申朔午時日食延熈十年丁夘嵗即魏正始八年二月庚午朔日食綱目不言日三月交二十六日八三月朔六日六七庚午申時是三月庚午朔申時日食非二月朔葢是年閏三月而史官先置一閏故以三月為二月誤延熈十一年戊辰嵗即魏正始九年正月乙未朔日食二月交二十刻二月初日三十六刻甲子辰時推得是年正月朔不入交且以減差減至甲午日亥時合朔是不應食也以推二月甲子朔則交泛二十刻入食限經朔五十九刻以減差減至辰時日食乃是二月甲子朔日食非正月乙未朔也三國時干戈擾攘厯官失職任其妄步書之史冊而及見天變反曰日失行也不然何正月之交不入限合朔在亥者反載之為食而二月之交入食限合朔在巳者反遺之耶延熈十二年己巳嵗即魏嘉平元年二月己未朔日食推得二月朔不入交加時在戊午日亥時合朔與己未朔日食何闗厯官誤景耀二年己夘嵗即魏甘露四年七月戊子朔日食七月交五十四刻九六七月朔二十四日五八戊子未時是七月戊子朔未時日食景耀三年庚辰嵗即魏甘露五年正月乙酉朔日食正月交一十四日四正月朔二十一日五八乙酉未時是正月乙酉朔未時日食是年魏主曹髦五月被弑六月曹奐立方改元帝景元元年此正月仍屬髦甘露五年景耀四年辛巳嵗即魏景元二年五月丁未朔日食五月交二十六日六五五月朔四十三日七三丁未酉時是五月丁未朔酉時日食景耀五年壬午嵗即魏景元三年十一月己亥朔日食十一月交一十三日九六十一月朔三十五日四九己亥午時是十一月己亥朔午時日食晉武帝泰始二年丙戌嵗通鑑綱目六月晦十月朔文獻通考七月丙午晦十月丙午朔日食三月交一十七刻三月朔四十六日五四庚戌未時八月交一十四日八八月朔四十二日四五丙午巳時推得是年三月庚戌朔未時日食八月丙午朔巳時日食餘月俱不入食限綱目通考所載皆非也葢日食六月一交則豈有六七月晦食而十月朔即食之理泰始七年辛夘歳十月丁丑朔日食十月交二十六日三九十月朔一十三日三八丁丑巳時是十月丁丑朔巳時日食泰始八年壬辰歳十月辛未朔日食十月交二十七日十月朔七日六二辛未未時是十月辛未朔未時日食泰始九年癸巳嵗四月戊辰朔日食綱目又載七月朔日食四月交一十三日七四月朔四日五七戊辰未時是四月戊辰朔未時日食七月不入交綱目非泰始十年甲午歳正月乙未朔日食三月癸亥朔日食四月交一十四日三四月朔五十九日二八癸亥夘時是四月癸亥朔夘時日食非三月朔若正月朔則交泛才七日有竒不入食限不應食晉厯誤咸寧元年乙未嵗七月甲申晦日食八月交二十六日五八月朔二十日五三甲申午時是八月甲申朔午時日食非七月晦咸寧三年丁酉嵗正月丙子朔日食二月交一十三日八二月朔一十二日五三丙子午時是二月丙子朔午時日食非正月朔咸寜四年戊戌歳正月庚午朔日食正月交一十四日四二正月朔六日六四庚午申時是正月庚午朔申時日食太康四年癸夘嵗三月辛丑朔日食三月交二十六日七三三月朔三十七日三四辛丑辰時是三月辛丑朔辰時日食太康六年乙巳歳八月朔日食見綱目八月交一十四日六五八月朔二十二日四八丙戌午時推得是年八月丙戌朔午時日食通鑑綱目載之是晉史漏太康七年丙午嵗正月甲寅朔日食正月交二十六日二正月朔五十日三一甲寅辰時是正月甲寅朔辰時日食太康八年丁未嵗正月戊申朔日食正月交二十六日八五正月朔四日四九戊申午時是正月戊申朔午時日食太康九年戊申嵗正月壬申朔日食六月庚子朔日食閏十二月交二十六日八五閏十二月朔四十四日四七戊申午時六月交一十四日一五六月朔三十六日三四庚子辰時推得是年閏十二月戊申朔午時日食非正月壬申朔其六月庚子朔日食則是惠帝元康九年己未嵗十一月甲子朔日食十一月交一十四日五十一月朔度五甲子午時是十一月甲子朔午時日食永康元年庚申嵗正月己夘朔日食四月辛夘朔日食四月交二十六日九四月朔二十七日五六辛夘未時推得是年正月朔無己夘不入食限不應食四月辛夘朔未時日食是永寜元年辛酉嵗閏三月丙戌朔日食四月交二十六日七四月朔二十二日六七丙戌申時是四月丙戌朔申時日食非閏三月葢是年閏八月而晉厯誤閏三月故以四月朔為閏三月光熈元年丙寅嵗正月戊子朔日食七月乙酉朔日食十二月壬午朔日食正月交二十一刻正月朔二十四日三四戊子辰時七月交一十四日一二七月朔二十一日六六乙酉申時推得是年正月戊子朔辰時日食七月朔乙酉申時日食俱是推十二月朔無壬午不應食懐帝永嘉元年丁夘嵗十一月戊申朔日食十一月交二十六日三二十一月朔四十四日一一戊申丑正二刻推得是年十一月初一戊申日丑時合朔夜食夜食不書晉厯誤永嘉二年戊辰嵗正月丙子朔日食推得是正月初一丙午非丙子朔交泛止三日七十餘刻凡交必在十二三四日與二十六七日方入食限豈有三日交食之理况年前十一月既載食矣六月方一交今甫二月何以復交晉厯之矛盾如此永嘉六年壬戌嵗二月壬子朔日食二月交一十三日一三二月朔四十九日一六癸丑寅初四刻推得是年二月初一癸丑寅時合朔夜食夜食不書晉厯誤愍帝建興四年丙子嵗六月丁巳朔日食十二月甲申朔日食六月交二十七日一六六月朔五十三日五二丁巳午時十二月交一十三日八五十二月朔五十一日六乙夘未時推得是年六月丁巳朔午時日食十二月乙夘朔未時日食史載十二月甲申非建興五年即元帝建武元年丁丑嵗五月丙子日食十一月丙子日食綱目載十一月朔推是年五月十一月俱無丙子朔俱不入食限晉厯非然豈有五月朔丙子而十月朔猶丙子乎何不思之甚也元帝太興元年戊寅嵗四月丁丑朔日食四月交二十六日五四月朔一十三日二三丁丑夘時是四月丁丑朔夘時日食晉史合即是年戊寅四月丁丑朔之食合而前丁丑年五月十一月朔之無丙子之不入交而不食也明矣然不食史何以書厯官求天不得遂増減其朔遷就其閏重疊其丙子以姑存之冊後修史者不知遂兼取而收之耳明帝太寧三年乙酉嵗十一月癸巳朔日食十二月交二十六日二八十二月朔二十九日四六癸巳午時是十二月癸巳朔午時日食非十一月朔葢是年閏十二月晉厯不知豫閏一月故以十二月朔作十一月朔誤咸和二年丁亥嵗五月甲申朔日食五月交一十三日五九五月朔二十日五甲申午時是五月甲申朔午時日食咸和六年辛夘嵗三月壬戌朔日食三月交一十三日七三月朔二十八日五五壬辰未時是三月壬辰朔未時日食非壬戌朔咸和九年甲午嵗十月乙未朔日食綱目無推得是年十月朔無乙未亦不入食限史誤綱目無是咸康元年乙未嵗十月乙未朔推得是年十月朔不入交不應食咸康七年辛丑嵗二月甲子朔日食二月交二十六日七二月朔日五甲子午時是二月甲子朔午時日食咸康八年壬寅嵗正月乙未朔日食京都大雨郡國以聞推得是年正月朔己丑無乙未亦不入食限郡國以聞非蓋去年辛丑嵗正月朔乙未則今年正月朔己丑為是安得又有乙未穆帝永和二年丙午嵗四月己酉日食綱目載四月朔推得是年四月無己酉朔亦不入食限不惟四月無己酉朔一年並無己酉朔永和七年辛亥嵗正月丁酉日食綱目亦不書朔推得是年正月丁酉寅時合朔不應食永和八年壬子嵗正月辛夘日食綱目書朔正月交一十三日一七正月朔二十七日三辛夘辰時是正月辛夘朔辰時日食永和十二年丙辰嵗十月癸巳朔日食十月交一十三日九十月朔二十九日二二癸巳夘時是十月癸巳朔夘時日食升平四年庚申嵗八月辛丑朔日食既八月交一十四日一八月朔三十七日五辛丑午時是八月辛丑朔午時日食哀帝隆和元年壬戌嵗三月甲寅朔日食十二月戊午朔日食綱目無三月食六月交一十二日九一六月朔五十六日四庚申巳時十二月交二十六日八二十二月朔五十四三三戊午辰時推得是年三月壬辰朔無甲寅不入食限六月庚申朔巳時日食十二月戊午朔辰時日食綱目不載三月食是史載食非六月朔實食而晉史罔聞知尸厥官矣帝奕即廢海西公太和三年戊辰嵗三月丁巳朔日食三月交一十四日二四三月朔五十三日二六丁巳夘時是三月丁巳朔夘時日食太和五年庚午嵗七月癸酉朔日食七月交二十七日五七月朔九日三七癸酉巳時是七月癸酉朔巳時日食武帝寧康三年乙亥嵗十月癸酉朔日食十月交一十四日四七十月朔九日二六六癸酉夘時是十月癸酉朔夘時日食大元元年丙子歳十一月朔日食綱目有史無推得是年十一月朔不入交不食綱目非大元四年己夘嵗閏月己酉朔日食史有綱目無推得是年無閏月止十二月為己酉朔然不入交不應食大元六年辛巳嵗六月庚子朔日食六月交一十三日四八六月朔三十六日四二庚子巳時是六月庚子朔巳時日食大元九年甲申嵗十月辛亥朔日食十月交二十六日九十月朔四十七日二六辛亥夘時是十月辛亥朔夘時日食大元十七年壬辰嵗五月丁夘朔日食五月交二十六日一三五月朔三日六四丁夘申時是五月丁夘朔申時日食大元二十年乙未嵗三月庚辰朔日食三月交二十六日六三三月朔一十六日五庚辰午時是三月庚辰朔午時日食安帝隆安四年庚子嵗六月庚辰朔日食六月交一十四日五六月朔一十六日五庚辰午時是六月庚辰朔午時日食元興二年癸夘嵗四月癸巳朔日食推得是年四月朔壬子合朔在夜亥時不應食史誤義熈三年丁未嵗七月戊戌朔日食七月交三十七刻六七月朔三十七日三四戊戌辰時是七月戊戌朔辰時日食義熈十年甲寅嵗九月丁巳朔日食九月交一十四日六九月朔五十三日三八丁巳巳時是九月丁巳朔巳時日食義熈十一年即後魏神瑞二年乙夘嵗晉書七月辛亥晦日食魏書八月庚辰晦日食八月交一十四日五一八月朔四十七日四一辛亥巳時是八月辛亥朔巳時日食非七月辛亥晦亦非八月庚辰晦義熈十三年即魏太常二年丁巳嵗晉書正月甲戌朔日食魏書太常元年七月辛亥晦二年正月甲戌朔俱日食正月交二十六日七一正月朔一十日三甲戌辰時是正月甲戌朔辰時日食魏書二食皆非恭帝元熈元年即魏太常四年己未嵗十一月丁亥朔日食十一月交二十六日二二十一月朔二十三日七二丁亥酉時是十一月丁亥朔酉時日食後漢魏晉間百五十年史載日蝕七十九朔六十五晦七不言朔晦七則較之東西漢食晦者少矣葢由漢末劉洪覺冬至後天减其斗分又創立日月盈縮遲疾法由是氣朔漸得其正繼此厯官得以因仍斟酌為之故日食朔多晦少漸愈於兩漢也洪之有功於厯大矣古今律厯考卷二十二
