body:
  text: 古今律厯考卷二十三明邢雲路撰歴代日食四歴代日食厯五代宋少帝景平二年即文帝元嘉元年甲子嵗二月己夘朔日食綱目無二月交一十三日三二月朔二十九日一四癸巳寅時八月交二十六日九四八月朔二十五日二八己丑夘時推是年二月朔癸巳無己夘合朔在寅夜食不書綱目無是八月己丑朔卯時日食史却不書元嘉四年即魏始光四年丁卯嵗宋書癸卯朔日食魏書六月朔六月交二十六日四五六月朔三十九日七八癸卯酉時是六月癸夘朔酉時日食元嘉五年即魏神䴥元年戊辰嵗宋書五月壬辰朔日食十一月己丑朔日食魏書十一月乙未朔日食無五月推是年五月朔無壬辰十一月朔無己丑乙未皆不入交不應食元嘉六年己巳嵗五月朔日食十一月朔日食星晝見見綱目史無五月交四十五刻四七五月朔二十八日三壬辰辰時十一月交一十四日三六十一月朔二十五日四二己丑巳時推是年五月壬辰朔辰時日食十一月己丑朔巳時日食皆合即元嘉五年史所載五月壬辰十一月己丑之日食也此必宋史誤將六年之日食載之五年耳不然何日月皆合又何宋史五年之食皆不合而六年乃不載耶綱目載是年兩日食誠是而於五年乃亦載十一月朔日食則誤抄宋史之文也元嘉十二年即魏大延元年乙亥嵗魏書正月己未朔日食宋無正月交二十六日六七正月朔五十五日六九己未申時是正月己未朔申時日食魏書是宋史遺元嘉十五年即魏大延四年戊寅嵗魏書十一月乙夘朔日食宋無十一月交二十六日七九十一月朔三日三九丁夘午時是十一月丁夘朔午時日食魏書食是書乙夘非宋漏元嘉十七年即魏太平真君元年庚辰嵗四月戊午朔日食四月交一十四日一四月朔五十四日四八戊午午時是四月戊午朔午時日食元嘉十九年即魏太平真君三年壬午嵗宋書七月甲戌晦日食魏書八月甲戌晦日食九月交二十六日九九月朔一十日六一甲戌未時推是年九月甲戌朔日食非七月八月甲戌晦葢是年閏九月宋史不知而豫閏一月故以九月朔為七月晦非魏未閏是書八月晦則非元嘉二十二年即魏太平真君六年乙酉嵗魏書六月戊子朔日食宋史無推是年閏六月己丑朔子時夜食不書無戊子魏非宋無是元嘉二十三年即魏太平真君七年丙戌嵗六月癸未朔日食六月交二十七日二六月朔一十九日四六癸未午時是六月癸未朔午時日食元嘉二十六年即魏太平真君十年己丑嵗魏書四月丙申朔日食宋無四月交二十六日五二四月朔三十二日四三丙申巳時推是年四月丙申朔巳時日食魏是宋漏元嘉三十年即魏興安二年癸巳嵗七月辛丑朔日食閏七月交一十三日三四閏七月朔三十七日七一辛丑酉時是閏七月辛丑朔酉時日食非七月朔葢是年應閏七月而宋史於七月前先置一閏故以閏七月朔作七月朔非武帝孝建元年即魏興光元年甲午嵗七月丙申朔日食七月交一十三日九四七月朔三十二日四二丙申巳時是七月丙申朔巳時日食大明四年即魏和平元年庚子嵗魏書九月庚申朔日食宋無推是年九月無庚申朔亦不入食限魏非大明五年即魏和平二年辛丑嵗魏書二月壬子朔宋書九月甲寅朔日食九月交二十六刻九月朔五十日三二甲寅辰時推是年二月朔無壬子亦不入食限九月甲寅朔辰時日食宋是魏非明帝太始四年即魏獻帝皇興元年戊申嵗十月癸酉朔日食魏載己亥朔綱目無十月交一十三日七九十月朔九日三二癸酉辰時是十月癸酉朔辰時日食魏載己亥非綱目漏太始五年即魏皇興二年己酉嵗宋書十月丁夘朔日食魏書四月丙子十月癸酉朔日食綱目無四月四月交四十九刻四月朔六日三一九庚午辰時十月交一十四日四十月朔三日三七丁夘辰時推是年四月庚午朔辰時日食十月丁夘朔辰時日食宋漏四月魏書食是書丙子癸酉非綱目亦漏四月後廢帝元徽元年即魏延興三年癸丑嵗十二月癸夘朔日食十二月交二十六日一十二月朔三十九日四三癸夘巳時是十二月癸夘朔巳時日食魏書元年十二月癸夘非又書四年正月癸酉食夫三年十二月既食矣豈有次月復食之理順帝昇明元年即魏太和元年丁巳嵗魏書十月辛亥朔日食宋無十月交二十六日二二十月朔四十七日八九辛亥丑正一刻推是年十月辛亥朔丑正一刻合朔夜食不書宋無是魏非昇明二年即魏太和二年戊午嵗三月己酉朔日食九月乙巳朔日食魏載二月乙酉晦日食綱目無二三月三月交一十二日九二三月朔四十五日一九己酉寅時九月交二十六日八九月朔四十一日二乙巳夘時推得是年三月己酉日寅時夜食不書九月乙巳日夘時日食宋魏載二三月晦朔食俱非綱目正昇明三年即魏太和三年己未嵗三月癸夘朔日食三月交一十三日五三三月朔三十九日六四癸夘申時是三月癸夘朔申時日食齊髙帝建元二年庚申歳即魏太和四年九月甲午朔日食魏書七月庚申朔日食推七月九月俱不入交不應食建元三年辛酉嵗即魏太和五年七月己未朔日食魏書庚申七月交二十六日三四七月朔五十五日六八己未申時是七月己未朔申時日食魏書非武帝永明元年即魏太和七年癸亥嵗十二月乙巳朔日食十二月交一十四日二五十二月朔四十一日五六乙巳未時是十二月乙巳朔未時日食永明六年即魏太和十二年戊辰嵗魏書二月辛亥朔日食齊無推是年二月辛亥朔不入交不應食魏非齊無是永明八年即魏太和十四年庚午嵗魏書正月己巳朔日食齊與綱目無二月交二十七日一二月朔五日四己巳巳時推是年二月己巳朔巳時日食魏書不應閏而豫閏故以二月為正月齊與綱目漏永明九年即魏太和十五年辛未嵗魏書正月癸亥晦日食齊無推是年二月癸未朔亥時夜食不書齊無是永明十一年即魏太和十七年癸酉嵗魏書六月庚辰朔日食齊與綱目無六月交一十三日六月朔一十六日二九庚辰辰時是六月庚辰朔辰時日食齊與綱目漏廢帝隆昌元年即明帝建武元年亦魏太和十八年甲戌嵗五月甲戌朔日食五月交一十三日九九五月朔一十日三四甲戌辰時推是年五月甲戌朔辰時日食其十一月不入交不應食魏無是東昏侯永元二年即魏景明元年庚辰嵗魏書正月辛丑朔日食七月己亥朔日食齊與綱目無正月交一十三日正月朔三十七日六七辛丑申時七月交二十六日九七月朔三十五日二三己亥夘時是正月辛丑朔申時日食七月己亥朔夘時日食魏書是齊與綱目漏永元三年即魏景明二年辛巳嵗正月丙申朔日食魏載七月癸巳朔綱目無正月交一十三日六一正月朔三十二日二三丙申夘時七月交三十一刻七月朔二十九日二五癸巳辰時是正月丙申朔夘時日食七月癸巳朔辰時日食齊漏七月魏漏正月綱目俱漏梁武帝天監元年即魏景明三年壬午嵗七月丁巳朔日食綱目無六月交二十五日八六月朔五十三日八四丁巳戌時推得是年六月丁巳戌時合朔則酉末尚見其初虧也然非七月綱目漏天監五年即魏正始三年丙戌嵗三月丙寅朔日食魏無推是年三月不入交不應食魏無是天監七年即魏永平元年戊子嵗魏書八月壬子朔日食梁與綱目俱無八月交一十三日八八月朔四十八日三四九壬子辰時是八月壬子朔辰時日食梁與綱目漏天監八年即魏永平二年己丑嵗魏書八月丙午朔日食梁與綱目俱無八月交一十四日四八月朔四十二日七三丙午酉時是八月丙午朔酉時日食梁與綱目漏天監十年即魏永平四年辛夘嵗十二月壬戌朔日食十二月交四刻十二月朔五十九日四癸亥巳時是年十二月朔癸亥日巳時合朔日食非壬戌朔天監十一年即魏延長元年壬辰嵗魏書五月己未晦日食梁與綱目無六月交一十三日九五六月朔五十五日七三己未酉時是六月己未朔酉時日食非五月晦梁與綱目漏天監十二年即魏延長二年癸巳嵗魏書五月甲寅朔日食梁與綱目無五月交一十四日五六五月朔五十日三二甲寅辰時是五月甲寅朔辰時日食梁與綱目漏天監十五年即魏熈平元年丙申嵗三月戊辰朔日食既三月交一十四日三月朔四日三七戊辰巳時是三月戊辰朔辰時日食天監十八年即魏神龜二年己亥嵗魏書正月辛巳朔日食梁與綱目無正月交一十三日五六正月朔一十七日五九辛巳未時是正月辛巳朔未時日食梁與綱目漏普通元年即魏正光元年庚子嵗正月乙亥朔丙子日食魏書乙亥正月交一十四日一八正月朔一十二日二六丙子夘時推得是年正月丙子朔夘時日食非乙亥史載乙亥朔丙子日食得非史官步為乙亥而候乃丙子無柰兩存之耶魏亦非普通二年即魏正光二年辛丑嵗魏書五月丁酉朔日食梁與綱目無六月交二十六日三八六月朔三十三日六四丁酉申時是六月丁酉朔申時日食非五月朔梁與綱目漏盖魏厯不應閏而豫閏一月故以六月朔為五月朔非普通三年即魏正光三年壬寅嵗五月壬辰朔日食既魏書冬十一月己丑朔日食五月交二十六日九九五月朔二十八日三八壬辰辰時十一月交一十三日六九十一月朔二十五日二五己丑夘時是五月壬辰朔辰時日食十一月己丑朔夘時日食梁漏十一月普通四年癸夘嵗即魏正光四年十一月癸未朔日食十一月交一十四日二九十一月朔一十九日四二癸未巳時是十一月癸未朔巳時日食梁中大通元年即魏莊帝永安二年己酉嵗魏書十月己酉朔日食梁與綱目無推是年十月不入交不應食魏非中大通三年即魏節閔帝普泰元年辛亥歳魏書六月己亥朔日食梁與綱目無六月交一十四日五六月朔三十五日五己亥午時是六月己亥朔午時日食梁與綱目漏中大通四年即武帝永熈元年壬子嵗魏書十月辛酉朔日食梁與綱目無十月交二十六日七二十月朔五十七日二九辛酉夘時是十月辛酉朔卯時日食梁與綱目漏中大通五年即魏永熈二年癸丑嵗魏書四月己未朔日食梁與綱目無元史載有四月交一十三日四四月朔五十五日五己未午時是四月己未朔午時日食梁與綱目漏元授時厯載是日午時食與大明厯皆親何梁史之是遺也中大通六年即魏永熈三年甲寅嵗四月癸丑朔日食梁無綱目有四月交一十四日四月朔四十九日六五癸丑申時是四月癸丑朔申時日食梁漏大同四年即魏靜帝元象元年戊午嵗魏書正月辛酉朔日食梁書六月辛丑朔日食正月交一十四刻正月朔五十七日六二八辛酉申時推是年正月辛酉朔申時日食六月朔不入交不應食梁非大同六年即魏興和二年庚申嵗魏書閏五月丁丑朔日食綱目同梁無六月交二十六日九六月朔一十三日六五丁丑申時推是年六月丁丑朔申時日食非閏五月朔葢是年應閏六月而魏史預置一閏故以六月朔作閏五月朔梁漏綱目書閏五月亦非太清元年即魏武定五年丁夘嵗正月己亥朔日食正月交二十六日七正月朔三十五日五八己亥未時是正月己亥朔未時日食太清二年即魏武定六年戊辰嵗七月朔日食見綱目梁魏俱無七月交一十三日八七月朔二十六日三庚寅辰時是七月庚寅朔辰時日食綱目是梁魏漏陳武帝永定三年即周明帝武成元年己夘嵗五月丙辰朔日食周無綱目載是年閏四月周更定厯六月交三十一刻六月朔五十三日六丁巳未時推是年六月丁巳朔未時日食非五月丙辰朔葢是年閏六月而史閏四月故以六月朔作五月朔非周漏文帝天嘉二年即周武帝保定元年辛巳嵗周書四月丙子朔日食十月甲戌朔日食綱目同陳無四月交二十六日四四月朔一十二日七四丙子酉時十月交一十三日一十月朔九日七八癸酉酉時推是年四月丙子朔酉時日食十月癸酉朔酉時日食周載十月甲戌非陳漏天嘉三年即周保定二年壬午嵗九月戊辰朔日食周載壬辰朔九月交一十三日七九月朔四日三五戊辰辰時是九月戊辰朔辰時日食周載壬辰非天嘉四年即周保定三年癸未嵗周書三月乙丑朔日食陳無推是年三月乙丑朔丑時合朔夜食不書陳無是天嘉五年即周保定四年甲申嵗周書二月庚寅朔日食八月丁亥朔日食陳無推是年二月朔不入交不應食八月朔子時合朔夜食不書陳無是天嘉六年即周保定五年乙酉歳周書七月辛巳朔日食陳無綱目有推是年七月朔寅時合朔夜食不書陳無是綱目亦錄周書耳天康元年即周天和元年丙戌嵗周書正月己夘朔日食陳無綱目有正月交二十七日一正月朔一十五日四三己夘巳時是正月己夘朔巳時日食陳漏陳主伯宗光大元年即周天和二年丁亥嵗周書正月癸酉朔日食十一月戊戌朔日食陳無綱目有正月交五十四刻正月朔九日六二癸酉未時十一月交二十六日十一月朔三十三日七七丁酉酉時推是年正月癸酉朔未時日食合其十一月戊戌則以減差三十餘刻減至丁酉日酉正刻合朔尚見其初虧也陳漏光大二年即周天和三年己丑歲周書十一月壬辰朔日食陳無綱目有推是年十一月壬辰朔子正刻合朔夜食不書周與綱目非陳宣帝太建二年即周天和五年庚寅嵗周書十月辛巳朔日食陳無綱目有推是年十月辛巳朔巳過交合朔在寅正刻夜食不書載食非太建三年即周天和六年辛夘嵗九月庚子朔日食周載四月戊寅朔日食綱目有四月無九月四月交一十四日五七四月朔一十四日二一戊寅夘時九月交二十六日一九月朔四十二日二七丙午夘時推是年四月戊寅朔夘時日食九月丙午朔夘時日食周載四月戊寅是陳載九月食是云庚子非陳闕四月周闕九月綱目闕九月太建四年即周建徳元年壬辰嵗周書三月癸夘朔日食九月庚子朔日食綱目同陳無推是年三月癸夘朔子正刻合朔夜食九月經朔庚子則以減差五十刻減至己亥日亥初刻合朔夜食凡夜食不書周厯非陳無是綱目據周厯書亦非太建六年即周建徳三年甲午嵗二月壬辰朔日食二月交一十四日二月朔二十八日三九壬辰巳時是二月壬辰朔巳時日食是年陳厯周厯俱載二月壬辰朔日食而步與之合則知陳厯之精周厯之粗也葢陳厯無而周厯有者多不應食是足徵矣太建七年即周建徳四年乙未嵗周書二月丙戌朔日食十二月辛亥朔日食綱目同陳無十二月交一十二日七九十二月朔四十七日三九辛亥巳時推是年二月丙戌朔夜子合朔夜食不書其十二月辛亥朔巳時日食則是周與綱目多二月陳漏十二月太建八年即周建徳五年齊後主武平七年丙申嵗周書六月戊申朔日食隋志并元史及綱目載俱有陳無六月交二十六日八八六月朔四十四日二九戊申夘時推是年六月戊申朔夘時日食按隋志載齊後主武平七年六月戊申朔太陽虧劉孝孫言食於夘時張孟賔言食於寅時鄭元偉董峻言食於辰時宋景業言食於巳時至日食乃於夘寅之間今以授時推夘時日食則劉孝孫張孟賔為近而鄭元偉董峻亦近宋景業逺矣陳厯漏太建九年即周建徳六年丁酉歳周書十一月己亥朔日食陳無綱目書晦十二月交一十四日一九十二月朔三十五日四九己亥午時推是年十二月己亥朔午時日食非十一月朔亦非十一月晦陳漏太建十二年即周靜帝大象二年庚子歳周書十月甲寅朔日食陳無綱目不書日十月交一十三日六九十月朔四十九日七癸丑申時推是年十月癸丑朔申時日食非甲寅朔陳漏綱目不書日者想周日官步至甲寅食及候之乃癸丑食遂兩存之故綱目不書日陳後主至徳元年即隋文帝開皇三年癸夘嵗隋書二月己巳朔日食七月丁夘日食不書朔綱目書二月八月朔日食陳無二月交二十六日五二月朔六日二八庚午夘時八月交一十三日二八月朔二日四五丙寅巳時推是年二月庚午朔夘時日食非己巳朔八月丙寅朔巳時日食非七月丁夘朔綱目書是陳漏至徳二年即隋開皇四年甲辰嵗隋書正月甲子朔日食綱目同陳無正月交二十七日一正月朔七十七刻甲子酉時是正月甲子朔酉時日食陳漏至徳三年即隋開皇五年乙巳嵗陳書正月戊午朔日食隋無推是年正月戊午朔亥時合朔夜食不書陳誤陳禎明元年即隋開皇七年丁未嵗隋書五月乙亥朔日食綱目同陳無五月交一十三日三五月朔一十一日三五乙亥辰時是五月乙亥朔辰時日食陳漏隋文帝開皇十一年辛亥嵗二月辛巳晦日食推是年三月初一壬午日夜子合朔夜食不書隋載二月辛巳晦日食非開皇十二年壬子嵗七月壬申晦日食推是年七月朔甲辰八月朔甲戌無壬申俱不入食限不應食開皇十三年癸丑嵗七月戊辰晦日食推是年七月戊戌朔亥時合朔夜食不書八月戊辰朔過交不應食隋誤仁夀元年辛酉嵗二月乙夘朔日食二月交二十六日四二月朔五十一日六三乙夘申時是二月乙夘朔申時日食煬帝大業十二年丙子嵗五月丙戌朔日食既五月交二十六日九二五月朔二十二日六三丙戌申時是五月丙戌朔申時日食史稱自李延夀南北史不作後之閱史者遂以隋書上接晉書然隋書諸志南止及梁陳而不及宋齊北止及齊周而不及元魏近就帝紀中刷出所書日食類而載之南宋齊梁陳北魏周齊隋上承晉下接唐所載始備然其間年月又多有不合者其說誠是葢南宋何承天祖冲之制厯頗精後南北亂離疇人失業諸國所書彼此互異如周厯尤益疎則何怪乎年月之不合也今以法推諸日食其差者夜食居多亦有應食而史不書者其失可知矣古今律厯考卷二十三
