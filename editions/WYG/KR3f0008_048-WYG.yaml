body:
  text: 古今律厯考卷四十八明邢雲路撰厯法十三厯法交食詳推授時周天三百六十五度二五七五半周天一百八十二度六二八七五周天象限九十一度三一四三七五半嵗周一百八十二日六二一三五交終度三百六十三度七九三四一九交中度一百八十一度八九六七九五正交三百五十七度六四中交一百八十八度五前準一百六十六度三九六八後準一十五度五十分交差二日三一八三六九至限一十二限二十日周百刻半日周五十刻月平行度一十三度三六八七五日行分八分二十秒日食分二十分月食分三十分既食分一十五分陽厯限六度定法六十分隂厯限八度定法八十分月食限十三度五分定法八十七度定日月食限陽食入交空日五十七刻九五九二已下日月皆食食已上月食日不二十六日五刻三四已上日月皆食一十三日二刻六五已上日月皆食一十四日七十六刻五三已下日月皆食一十二日四十四刻六九二八已下日月皆不食已上月食隂食入交一日一十五刻九一八四已上日月皆不食已下月食日不食二十六日五刻三四已上日月皆食一十二日四十四刻已上月食一十四日七十六刻五三已下日月皆食又定朔小餘一十二刻半日不食八十七刻半日不食又定朔小餘七十刻月不食三十刻月不食各有食月之朔望日下數諸小餘止乎微惟交常度全收經朔望全分盈縮厯全分不用反減數盈縮差度全分遲疾厯全分限數遲疾差度全分加減差全分定朔望全分交泛全分累加交差即得各月朔交泛定入遲疾厯分遲疾厯全分内以其加減差加減之得為定入遲疾厯分定限定入遲疾厯全分以一十二度二十分乘之得為定限也定限行度定限下遲疾行度遲用遲疾用疾内減去日行分八分二十秒餘為定限行度半晝分元得盈縮初末厯大餘若干日下半盡分是也如有帶食者用其日之出入分若月食用晨昏分嵗前冬至加時黄道宿次度分日食厯交常度以月平行度乘交泛為交常度交定度以盈縮差度盈加縮減其交常度為交定度日食在正交中交限度視交定度如在七度已下三百四十二度已上為在正交如在一百七十五度已上二百二度已下為在中交中前後分視定朔小餘如在半日周五十刻已下者於半日周五十刻内減之餘為午前分如在半日周五十刻已上者減去半日周五十刻餘為午後分時差分置半日周内減午前午後分餘以元推午前午後分乗之得數九十六而一為時差分食甚定分以時差分加減定朔小餘午前減午後加為食甚定分距午定分午前午後分各加時差分為距午分食甚入盈縮厯以盈縮厯全分加定朔大餘及加食甚定分却減經朔大小餘分餘為食甚入盈縮厯定度分如月食者加望策如在二限已下為初已上減半嵗周為末盈縮差以食甚入盈縮初末厯乗立差加平差又以初末厯乗之以減定差餘再以初末厯乗之為盈縮差盈加縮減食甚入盈縮行定度以盈縮差加減食甚入盈縮厯得食甚入盈縮行定度南北泛差以食甚入盈縮行定度如在周天象限已下為初厯已上用減半嵗周為末厯或初或末自相乗以一千八百七十而一得數用減四度四十六分餘為南北泛差南北定差以南北泛差乗距午定分以半晝分而一餘減泛差為南北定差如泛差不及減者反減之應是加差作減差減差作加差盈初縮末正交為減差中交為加差縮初盈末正交為加差中交為減差東西泛差以半嵗周減食甚入盈縮厯定度餘以盈縮厯相乗以一千八百七十而一得為東西泛差東西定差以距午定分乗東西泛差以二千五百而一為南北定差如在東西泛差已下就為定差如在泛差已上倍泛差減之餘為定差盈厯正交中前為減差中後為加差中交中前為加差中後為減差縮厯正交中前為加差中後為減差中交中前為減差中後為加差日食入正交中交定限度置正交中交度分以東西南北差加減之得正交中交定限度分去交前後度視交定度若在正交定限度已下者以減正交定限度為隂厯交前已上者減去正交定限度為陽厯交後若在中交定限度已下者以減中交定限度為陽厯交前已上者減去中交定限度為隂厯交後日食分秒是陽厯去交前交後度減陽食限六度餘以定法六十分而一是隂厯去交前後度減隂食限八度餘以定法八十分而一各得日食分秒定用分置日食分二十分内減去推得日食分秒餘即以日食分秒乗之得數以平方開之又以五千七百四十乗之得數以定限行度而一得為定用分初虧食甚復圎分食甚定分即食甚分内減定用分為初虧分加定用分為復圎分各以發斂求之得三限辰刻日食起復方位食在陽厯起西南甚正南復東南在隂厯起西北甚正北復東北食八分以上起正西復正東日帶食所見分數視盈縮厯大餘下日出入分在初虧分已上食甚分已下是有帶食分食在晨刻者日出分與食甚分相減在昏刻者日入分與食甚分相減餘為帶食差日出分多内減去食甚分餘為已復光分食甚分多内減去日出分餘為見食分食甚分内減日入分餘為不見食甚分復圎分内減日入分餘不見復圎分皆為帶食差以日食分秒乗帶食差以定用分而一得數與日食分秒相減如帶食分是見食者餘為不見食分如是不見食者餘為見食分日入者不見食甚或不見復圎日未出者已食幾分已復光幾分食甚日躔黄道宿次置食甚入盈縮厯定度分加冬至黄道度分以黄道鈐累減之如不及減者即為食甚日躔黄道宿次減箕餘入斗減斗餘入牛他倣此如是縮厯加半嵗周減之月食厯交常交定度與日食同卯酉前後分視定望小餘在二十五刻巳下為卯前分已上以減半日五十刻餘為卯後分如在七十五已下減半日五十刻餘為酉前分已上以減日周百刻餘為酉後時差分以卯酉前後分以減日周百刻餘為時差分食甚定分以時差加入定望小餘為食甚定分望食甚入盈縮厯差行定度法與朔同月食入隂陽厯視交定度在交中一百八十一度八九六七九五已下為入陽厯已上者減去中交度為入隂厯去交前後度視隂陽厯在後準巳下為交後度巳上月不食如在前準已上用以減交中一百八十一度八九六七九五餘為交前度已下月不食月食分秒置月食限十三度五分内減去交前交後度分以定法八十七分而一為月食分秒如交前後度分多於月食限不及減者不食定用分置月食分三十分内減去推得月食分秒餘即以月食分秒乗之得數以平方開之又以四千九百二十乗之得數以定限行度而一得為定用分初虧食甚復圎分與日食同月食起復方位陽厯起東北甚正北復西北隂厯起東南甚正南圎西南食八分以上起正東復正西帶食與日食同既内既外分月食三十分半之為既食分視月食在十分已上去其十分餘為既分用以減既食十五分餘以既分乗之以平方開之以四千九百二十乗之以定限行度而一得為既内分以減定用分餘為既外分食既生光分以既内分減食甚分為食既分加食甚分為生光分更㸃視食甚入盈縮厯大餘下晨分倍之以五歸之為更法率以五歸更法為㸃法初虧食既食甚生光復圎分如在晨分已下有更㸃已上無更㸃昏分已上有更㸃已下無更㸃如是有更㸃若在夜半後者加晨分若在夜半前者減昏分以更率除之得更數如不滿更率餘以㸃率除之得㸃數命初更初㸃筭外各得更㸃食甚月離黄道宿次置食甚入盈縮厯分以黄道本宿度分累減之如不及減者即為食甚月離黄道宿次如是縮厯加半嵗周然後減之古今律厯考卷四十八
