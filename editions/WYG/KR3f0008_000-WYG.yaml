body:
  text: 古今律厯考天文算法類一推歩之屬提要臣等謹案古今律厯考明邢雲路撰雲路字士登安肅人萬厯庚辰進士官至陜西按察司副使是書詳於厯而畧於律七十二卷中言律者不過六卷亦罕所發明惟辨黄鍾三寸九分之非頗為精當而編在厯代日食之後步氣朔之前不知何意厯法六十六卷則自六經以下迄於明代大統厯一一考訂其論周改正即改月大抵本於張以寜春王正月考惟於書惟元祀十有二月則指為建丑之月謂商雖以丑為正而紀數之月仍以寅為首與春王正月考之説不同然均之改正而於周則云改月于殷則云不改月究不若張以寜説之為允也六十五卷中有駁授時厯八條駁大統厯七條其駁大統厯謂斗指析木日躔娵訾非天星分野之次乃月辰所臨之名而大統厯乃以天星次舎加為地盤月建殊襲趙縁督之誤又謂授時厯至元辛巳黄道躔度十二交宫界郭守敬所測至今三百餘年冬至日躔已退五度則宜新改日躔度數而大統厯乃用其十二宫界不合歲差又謂大統厯廢授時消長之法以至中節相差九刻葢雲路工於推算多創新術大統為當時見行之厯故辨之尤力又大統僅發授時消長一術其餘多所承襲故因而並及授時也梅文鼎勿菴厯算書記曰從黄俞邰借讀邢觀察古今律厯考驚其卷帙乏多然細考之則於古法殊畧所疏授時法意亦多未得其㫖又曰邢氏書但知有授時而姑援經史以張其説古厯之源流得失未能明也無論西術矣是文鼎于雲路此書葢有未滿然推步之學太抵因已具之法而更推未盡之奥前人智力之所窮正後人心思之所起故其術愈闡愈精後来居上雲路值厯學壊敝之時獨能起而攻其誤其識加人一等矣創始難工亦不必定以未宻議也乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀古今律厯考原序史稱帝王治天下以律厯為先儒者通天人至律厯而止大哉言乎何則律為大塊之竅人一嘘噏繇是厯為斡維之運人一作息繇是天且不違而况於人是故聖人寶焉然而律生於厯則厯其尤重也自重黎道䘮馬彪記誤末流轉乖全妙莫準絲棼輒騖如斯者衆匪天度之差殊考察異意故也余不敏蚤躭𨽻首晚益篤嗜以詧環籥役智為勞蓋嘗挈坤復之符劵權子母之遇在竊心計筴祘之有年矣因博訪當世求我黨類於山中得魏生焉生名文魁古之祖冲之陳得一其人也余乃相與校讎羣籍營於至當於凡厯之宏綱細目遡古迄今靡不根究其藴奥縷析其端倪壹切紕璺胥彌訂之亡爽焉然後起而上之當宁上嘉悅下庭議僉曰可㑹中涓愳而格不行余退歎曰使天不欲斯術之行則無庸畀吾人以斯術天既以斯術畀吾人非余任之而誰也夫道術公器也公器在我而不以公諸人將鬼神惡之矣余故因金明諸君子之請而彚集成編命諸剞劂儻因是晤言知命以鏡太清璧聨珠燦軌順階平庶㡬哉上律隂陽之變下存亭毒之功堯厯載光傳之勿壊傳曰四時行焉百物生焉則余與天復何憾邢雲路序
