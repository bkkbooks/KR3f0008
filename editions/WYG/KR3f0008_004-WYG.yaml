body:
  text: 古今律厯考卷四明邢雲路撰經四詩經考詩三百自孔子删之自天子以至于庶人莫不有詩古男年六十女年五十無子者官衣食之使採詩邑移於國國以聞於天子則詩之所係大矣詩被諸聲樂協十二律配十二辰如黄鐘為子之類是也故詩通於律厯定之方中作于楚宫揆之以日作于楚室爾雅云營室謂之定星北方宿也營室二星上一星為天子宫下一星為天廟有離宫六星兩兩相繫為天子别宫故置羽林軍四十五以衛之郄萌云將有土功占於營室明則國昌不明則鬼神不享定之方中羙衛文公也衛為狄所滅文公徙居楚邱始建城市而營宫室國人悅之故作此詩言十二月定星昏時在南方正中作此楚宫楚宫楚邱之宫也楚邱在濟河間周十二月建亥卽夏十月建亥小雪之中氣也揆度也謂度其景也公劉傳曰考於日景是也其術四角立柱而以水注地望其高下高下旣定其位乃平於所平之地中央樹八尺之臬以懸䋲正之又畫地為圓䂓朝識日景其端指西暮識日景其端指東兩端長短必與䂓齊測其端則東西正就其中屈之卽為南北盖日中則景短又於晝漏午時叅日中之短景以正南方夜漏子時幷窺北極以正北方此揆日之法也揆正四方作於楚室室亦宫也然營室十月昏中惟衛武時為然厯代以來室漸東移中星各異至今萬厯年以法推十一月中天正冬至日躔箕四度室星昏中以推至小雪十月中日躔房宿而女星昏中以較衛文時退天二十六度矣朱子謂十月可以營制宫室故謂之營室是若營室以十月得名者不知室乃宫室之星占營造則占室星非以十月名營室也若以十月名營室則今十月女昏中於室無預矣乆之天日漸移凢二十八宿十月皆可昏中一室星厯十二月皆可昏中此推歩之數萬世可知者也綢繆束薪三星在天今夕何夕見此良人子兮子兮如此良人何綢繆猶纒綿也三星心星大火東方蒼龍七宿之第五宿也晉國大亂婚姻失時詩人叙其婦語夫之詞曰方綢繆以束薪也而仰見三星之在天今夕不知何夕也而忽見良人之在此又曰子兮子兮其柰此良人何哉蓋喜幸之甚而不自勝之詞也心宿之象三星鼎立中大心天王前星太子後星庶子心星以三月昏見東方春秋時婚姻之禮自季秋盡於仲春三星尚未出也今三月昏心見東方過時矣過時方得婚故作是詩說者謂心為父子夫婦之星為合星嫁者之候又謂三月昏時大火星見使民出火是若以心星主嫁主火矣不知天日漸移心星東轉即如營室星自衛文公至今日躔退天二十六度久之則凡二十八宿皆可三月昏見東方一心星厯十二月皆可昏見東方也主嫁主火又何取焉七月流火九月授衣一之日觱發二之日栗烈無衣無褐何以卒歲三之日于耜四之日舉趾同我婦子饁彼南畆田畯至喜七月陳王業也周公陳豳風之詩見先公后稷公劉風化之所由欲成王知王業之艱難也七月夏正七月建申之月也火大火心星也流下也六月昏火星猶見於南方至七月昏則火下而西流矣知是将寒之漸至九月霜降蠶績功成故授人以冬衣使禦寒也一之日謂十一月建子一陽之月二之日謂十二月建丑二陽之月變月言日言是月之日也下文凡言日者倣此觱發風寒也栗烈氣寒也觱栗𦍑吹角九竅者栗至罅發將墜有戰栗象故以比寒寒而無衣無褐何以終歲乎故九月豫授衣也三之日謂次年正月建寅三陽之月四之日謂二月建卯四陽之月耜田器趾足也饁饋也田畯田大夫勸農之官也正月則徃修田器二月則舉足而耕其時少者在田老者率其婦子具食饋餉彼南畆中之耕作者田畯來至見其勤於農事則喜也月令季冬命農計耦耕事修耒耜孟春天子躬耕帝籍然則修治耒耜當以季冬舉足而耕當以孟春今言豳人以正月修耒二月始耕者豳戎狄之地晚寒故先一月也夏七月即周九月夏九月即周十一月一之日夏十一月即周正月二之日夏十二月即周二月周公陳詩乃用夏正者公劉居豳在夏后氏時故用夏正此詩朱子以為周公所作疑者以為豳人所作逺無所考亦不必辯五月斯螽動股六月莎雞振羽七月在野八月在宇九月在戸十月蟋蟀入我床下穹室熏鼠塞向墐戸嗟我婦子曰為改歲入此室處此皆夏正也斯螽蚣蝑也股似玳瑁五月中兩股相切揺動作聲聞數十歩是以股鳴也江東呼為蚱蜢莎雞一名天雞如蝗而斑色毛翅數重其翅正赤六月中飛而振迅其羽索索作聲是以翅鳴也幽州人謂之蒲錯自五月而隂生動股振羽氣使之然也月令季夏云蟋蟀居壁蟋蟀之蟲六月居壁中至七月從壁内出在野八月在宇下宇屋霤也九月在室户内至於十月則入我床下此皆将寒之漸故三蟲應節而變蟲且近人大寒将至穹窮室塞也向北出牖也墐塗也月令云孟冬之月命有司曰天氣上騰地氣下降閉塞而成冬則十月為閉塞之候故窮盡塞其室中之孔穴熏䑕令出其窟嚮牖屬北則塞之不塞南窻而塞北者禦北來寒風也庻人篳户乃荆竹織門以其荆竹通風故以泥塗之使寒氣不入豳人又吿妻子言已備寒之意曰我所以為此者為歲将改天既寒而事可已過此十月觱發栗烈當避寒氣入此室塞之室而居處之也呂東萊曰十月而曰改歲三正之通於民俗尚矣周特舉而迭用之耳朱子亦謂周厯夏商其未有天下之時固用夏商之正朔然其國僻逺無純臣之義又自有私記其時月者故三正皆曽用也故云十月改歲不知十月曰改歲者蓋時至冬歲事將改猶堯典稱冬為朔易之義蓋十月入寒一歲之女功已止不日觱發栗烈即過明春又更新歲矣况孟冬隂氣已極仲冬陽氣始萌為一陽之日又以陽氣肇始數也此改歲之說也若謂周先公改用子正私記其時月無純臣之義恐未必然且果以十月改歲則又何以二之日為卒歲耶春日遲遲卉木萋萋倉庚喈喈此出車之詩漢註謂西伯受命於商王因命南仲為將徃伐玁狁成功而歸述其所見春日之景也宋註周王命南仲非西伯說者遂謂周若以仲冬季冬為春何以見草木之榮倉庚之鳴因疑周不改夏正殊不知此文王時詩也書稱西伯戡黎詩稱伐崇伐宻則其伐玁狁又何疑焉漢去古未逺其說必有所據宋儒何故改之寅月草木萌動卯月倉庚鳴文王時尚未改周正建子則此景正是商之春月六月出征章乃四月建巳亦非未月正月繁霜我心憂傷正月夏之四月乃正陽之正非三正之正也此周大夫刺幽王也幽王用刑急酷以致傷害萬物故天降寒氣而使夏日多霜大夫有憂之曰我心憂傷也洪範曰急恒寒若正此咎徵之謂也四月建巳乃正陽之月純陽用事不宜有霜非正月建寅之正若正月建寅則固宜有霜不足憂矣昭公十七年夏六月甲戌朔日有食之左傳云祝史請所用幣平子禦之曰止也唯正月朔慝未作日有食之於是乎有伐鼓用幣其餘則否太史曰在此月也經書六月傳言正月太史謂之在此月是周之六月為正月也周之六月是夏之四月故知正月夏之四月也謂之正月者巳月以乾用事正純陽之月傳稱慝未作謂未有隂氣故此箋云純陽用事也建巳之正月建寅之正月皆去聲之正字至秦始皇時諱始皇名政始改去聲之正字為平聲至今猶訛呼之以厯推昭公十七年九月日食六月不應食則正月純陽之義亦無取十月之交朔日辛卯日有食之亦孔之醜彼月而微此日而微今此下民亦孔之哀十月之交大夫刺幽王也周之十月夏之八月也交㑹而交也十月朔日辛卯日月交㑹而食日君象月臣象以月掩日是隂侵陽臣侵君之象故為亦甚惡也㣲不明也彼月臣象容有被食而不明此日君象今反被食而不明君臣失道災害將起天下蒙毒故今此下民亦甚可哀矣厯法周天三百六十五度四分度之一日月皆右行於天日日行一度月日行十三度十九分度之七是月行疾日行遲二十七日有奇而月行天一周又二日追及與日㑹方㑹則月光都盡而為晦已㑹則月光復蘇而為朔毎月皆㑹而月或在日道表或在日道裏故不食日月之㑹東西同道南北同度則適當交道月掩日而日為之食日月相對則月光正滿而為望望而日月之對同度同道則月亢日而月為之食此之謂交食也交與㑹不同㑹但言其同度交則同度當交道也朱子謂王者修徳則日月雖或當食而月常避日故髙下參差不正相對所以當食不食蘇氏謂十月純隂純隂而食為隂壯之甚二説皆非也日月適當交道而食無當食避日之理古史載當食不食多推筭者之誤間有當食不食者百餘年或一見非月常避日也不正相對是不當交道所以不食耳周之十月乃夏之八月為建酉之月蘇氏以為十月純隂則建亥矣然非建亥也朱子亦謂十月以夏正言之為建亥之月不知以厯法推之十月之交是在周幽王六年乙丑正月建子至十月建酉為十月朔日辛卯日食周十月卽夏建酉之八月朱子與蘇氏俱作建亥盖未察厯數耳古之􅍓書亡矣後有周厯魯􅍓皆漢初為之其文無遲疾盈縮考是以漢世通儒未有以厯考此辛卯日食者今以授時法上推周幽王六年乙丑歲距至元辛巳二千五十七年中積七十五萬九百四十二日六十九刻冬至一十二日三十六刻丙子日辰時冬至以歩至十月建酉朔日定朔二十七日三十七刻辛卯日辰正四刻合朔交泛一十四日五十七刻入食限是日辰時日食梁太史令虞鄺唐僧一行亦歩得是日日食至有謂辛卯日支干俱隂為變者尤謬厯陽月而日支干俱陽皆食與隂一也哆兮侈兮成是南箕彼譛人者誰適與謀此巷伯刺幽王也寺人孟子遭讒被刑故作是詩也哆說文云張口也因物益大為侈南箕即箕星二為踵二為舌其踵狹而舌廣踵為足根適主也言箕星二踵哆然張口相去已若寛大因又侈之更益寛大而為舌故成是南箕其云踵狹而舌廣者踵對舌為狹耳以比讒人因寺人初有小嫌因而搆之益成其刑罪之禍故云彼讒譛人者誰主與謀而令至此乎安成劉氏曰箕星常見於南方故謂之南箕不知天日漸移以厯法推之箕星有時昏見南方亦有時昏見東南或西南或在地中如前室星心星之更歴十二辰無定在也非常見於南方也其曰南箕者箕在南對斗在北而為言耳維天有漢監亦有光跂彼織女終日七襄此大東之詩刺亂也東國困於役而傷於財譚大夫作是詩以告病焉漢天河監視也跂隅貌襄駕也謂更其肆也東國財力俱困上人不恤無所赴愬愬之於天而已言天有雲漢亦有其光而能監視我耶言有光不能照也織女雖終日七襄徒見其如是有何益耶言未見其織也織女三星鼎足在漢傍跂然如隅陳卓云織女乃天女主女功天有十二次經星一晝夜左旋一周而有餘則終一晝自卯至酉凢七時更其肆凢七辰故云七襄其云自卯至酉之七襄亦東國人時偶見織女從卯東出而言耳以厯推織女亦猶室心諸星之出無定時非常以卯東出也雖則七襄不成報章睆彼牽牛不以服箱東有啓明西有長庚有捄天畢載施之行睆明貌牽牛六星卽牛宿也主牛車犧牲道路闗梁之事爾雅謂河鼔為牽牛非是盖河鼓三星在牽牛北非牽牛也服駕也箱車箱也金星一名太白東方先日而出名曰啓明啓開也先開日之明也西方後日而入名曰長庚庚續也長續日之明也捄長貌天畢畢星也畢八星狀如掩之畢承上文言織女雖則七襄終日不能織成報我之文章不惟織女如睆彼牽牛不可以用於駕我之車箱啓明長庚亦未見其助日之光天畢亦未見其掩獸摠無實用但施之行列而已至是則天亦無若我何矣金星太白啓明長庚摠是一星鄭漁仲妄云啓明金星長庚水星金在日西故日將出則東見水在日東故日將没則西見殊不知水星或在日前或在日後亦猶夫金也但水星去日近耳金大而色白故曰太白日一年一周天金星附日而行亦一年一周天有遲疾留退合伏或在日前或在日後前後逺日各三十度蓋太白隂星出西則當伏西出東則當伏東不得專行劉向曰太白少隂不得專行故以己未為界不得經天而行李淳風曰經天者謂太白昏旦當午而見也當午經天其殃為大晝見與經天不同者晝見謂當晝而見猶未過午也經天則旦時當午而見逆行至未而不復昏時當午而見順行至巳而不復所以出東而入西出西而入東也至是則隂不附陽放恣甚矣故其殃大經天晝見乃金星失其常度非厯數自然之度是為變異乆之仍留退合伏附日而行合於厯數一年一周天百世不爽也維南有箕不可以簸揚維北有斗不可以挹酒漿維南有箕載翕其舌維北有斗西柄之掲箕斗二星名挹酌也翕引也舌下二星也箕卽巷伯之南箕箕星好風有簸揚之義南斗六星東四星為魁西二星為柄主爵禄亦酒漿之義言南箕不可以簸揚糠粃北斗不可以挹酌酒漿箕徒翕引其舌斗徒西掲其柄何嘗有所用乎盖譚人困於供億取資於地者皆已竭矣欲取於天又一無所得也南箕對北斗而言箕之東北與斗最近以東西言箕之十度末卽東接斗初度以南北言斗去極一百二十二度在赤道外三十一度箕去極一百二十三度在赤道外三十二度則南北止差一度故以南箕北斗對言之詩傳註謂箕斗二星以夏秋之間見於南方安成劉氏曰六七月間見於南方者指當時昏見為言也劉氏之說為是蓋箕斗二星亦猶室心諸星昏見不同古今各異以厯推之如今萬厯年間夏至昏角中秋分昏斗中各有不同耳四月維夏六月徂暑先祖匪人胡寧忍予四月刺幽王也此大夫遭亂自傷之詩徂往也從此適彼之辭東山云我徂東山小明云我征徂西皆從此往彼也周之四月建卯夏之二月也周之六月建巳夏之四月也言四月建卯為孟夏六月建巳為季夏自巳月而往為午月暑將至矣我先祖豈非人乎何忍使我遭此禍也人窮則反本窮則告親猶正月之篇怨父母之意毛註朱註皆以四月六月為夏正此刺周幽王之詩安得用夏正若以六月為建未未月正小暑大暑之時何言徃暑耶秋日凄凄百卉具腓亂離瘼矣奚其適歸凄凄凉風也腓動也承上言由夏而秋秋日凄凄則百草俱發動矣世道亂離瘼病我将何所適歸乎周七月建申為季秋月令七月凉風至天地始肅禾乃登正凄凄具腓之時也詩傳訓腓為病考易六二咸其腓正義曰腓足之腓腸也腓體動躁王廙云動於腓腸斯則行矣故言腓體動躁也並無訓病之説則季秋禾乃登百草俱發動何疑冬日烈烈飄風發發民莫不榖我獨何害烈烈寒也發發疾貌榖善也承上言由秋而冬冬日寒而且風人莫不善我獨何故遭此亂離之害天下莫不被害乃云民莫不善者據作詩者怨恨之言也周十二月建亥為季冬夏之十月也月令十月水始冰地始凍天氣上升地氣下降閉塞而成冬正烈烈發發之時明明上天照臨下土我征徂西至于艽野二月初吉載離寒暑心之憂矣其毒大苦念彼共人涕零如雨豈不懐歸畏此罪罟小明幽王大夫悔仕於亂世厭於勞役也征行徂徃也艽野地名逺荒之地也周二月建丑之月即夏之十二月非夏正建卯之月也初吉朔日離厯也共人僚友也罟網也言明明之上天照臨下土宜無幽不燭者而我今勞於行役我行往西方至於荒逺之地昔以二月朔日西行今則更歴寒暑矣尚未得歸我心之憂有如毒藥之苦念及靖共爾位之僚友至於涕零如雨我豈不思歸畏此刑罪羅網不敢歸爾昔我往矣日月方除曷云其還歲聿云莫念我獨兮我事孔庶心之憂矣憚我不暇念彼共人睠睠懐顧豈不懐歸畏此譴怒除除舊生新也孔甚庶衆憚勞也睠睠勤厚之意譴怒罪責也言我初往艽野日月方除舊更新之時曷時其還望得早歸也今乃歲已暮矣念我身獨而事衆心之憂愁勤勞不暇念彼共人眷眷懐顧我豈不思歸畏此罪責不敢歸爾日月方除如堯典平在朔易言丑月歲功将興正除舊更新之時自二月丑至十二月亥是歲聿云暮載厯寒暑矣若以二月為建卯安得有除舊更新之事昔我徃矣日月方奥曷云其還政事愈蹙歲聿云莫采蕭穫菽心之憂矣自詒伊戚念彼共人興言出宿豈不懐歸畏此反覆奥室之内也蹙急詒遺興起也反覆無常之意言昔我徃丑月寒時人方在奥室至今政事愈益蹙急歲聿云暮采蕭穫菽矣而尚不得歸念彼共人不能安寢夜而起宿於外我豈不思歸畏此反覆不常恐得罪爾傳註奥煖以為春温二月考韻奥隩同室之内也取藏之義堯典厥民隩言冬月氣寒而民聚於室之内也故奥為丑月况云穫菽菽豆也收豆正今之十月建亥周之十二月為歲暮也是知周正建子嗟嗟保介維莫之春亦又何求如何新畬於皇來牟將受厥明明昭上帝迄用康年命我衆人庤乃錢鎛奄觀銍艾此諸侯來朝成王遣戒勸農之詩也保介農官之副也暮春晚春畬三歲田也於皇歎美之詞來牟麥也明上帝之明賜也迄至也衆人甸徒也庤具也錢銚鎛鎒也錢以剗削镈鋤屬皆田器也奄久也銍穫禾短鎌也艾穫也歎息言爾農官今維暮春何求於民新畬所種牟麥之美將受天之明賜上帝明賜瑞麥至用豐年宜命甸徒具田器治新畬終久必觀銍穫牟麥也維暮之春乃周之季春建寅之月於夏為孟春朱子以為夏正建辰之三月且曰麥將熟也不知月令季冬命民修耒耜具田器孟春天子載耒耜措之保介之間若待建辰之三月方始勸農則晚矣漢鄭氏訓奄為久謂久必觀穫朱子訓奄為忽謂三月牟麥將熟乃以為建辰之三月然三月亦非麥熟時也周制諸侯朝用孟月三月亦非諸侯來朝之月則周正建子明矣古今律厯考卷四
