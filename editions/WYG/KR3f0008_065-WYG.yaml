body:
  text: 古今律厯考卷六十五明邢雲路撰厯議六厯議辯授時厯之失元史載郭守敬取劉宋祖沖之所測大明厯冬至前後晷景折取其中定為冬至以授時新厯所測冬至日減大明厯一十九刻二十分又云自大明壬寅距至元戊寅積日時以相距之年除之得每歳三百六十五度二十四分二十五秒比大明厯減去一十一秒定為授時歳餘今余以法推之殆非然也法推劉宋孝武帝大明五年辛丑冬祖沖之所測十月十日壬戌景長一丈七寸七分半十一月二十五日丁未一丈八寸一分太二十六日戊申一丈七寸五分强以壬戌戊申景相較餘二分二釐半為實以丁未戊申景相較餘六分五釐為法以法除實得三十四刻六十分以減距日四千六百刻餘四千五百六十五刻四十分折取其中加半日刻得二千三百三十二刻七十分命壬戌筭外得十一月三日乙酉夜半後三十二刻七十分辰初三刻冬至就以沖之紀法以除沖之周天得一嵗之實三百六十五日二十四刻二十八分一十四秒以大明壬寅距至元戊寅併測至庚辰共積八百一十九年乗之得二十九萬九千一百三十三日八十六刻四十六分六十六秒加乙酉三十二刻七十分共得二十九萬九千一百五十五日一十九刻餘滿紀去之餘五十五日一十九刻為至元辛巳嵗前己未夜半後一十九刻以郭守敬所測夜半後六刻較之止差一十三刻以沖之歲周與守敬嵗周相較差三分及取大明壬寅距至元辛巳八百一十九年積二十九萬九千一百三十四日以減沖之所測夜半後三十二刻七十分加太史所測夜半後六刻得二十九萬九千一百三十三日七十三刻三十分以相距積年八百一十九年而一得三百六十五日二十四刻二十六分五十三秒非二十四刻二十五分較之差一分五十三秒乃守敬云自劉宋祖沖之大明五年壬寅實測接算至今得歳實今算不合復查金大定時趙知㣲重修大明厯以金日法除歳實得一歳之策三百六十五日二十四分三十六秒實先授時一十一秒就以金大定二十年庚子歳距元至元十八年辛巳一百一年乘之積三萬六千八百八十九日六十刻三六加知㣲所測五日六十四刻六十四分共得三萬六千八百九十五日二十五刻滿紀去之餘五十五日二十五刻以較郭太史所測夜半後六刻先天一十九刻夫守敬用大定庚子距積一百一年之數推為歳實乃紀之史册云予自大明壬寅距積八百餘年之數所定者以為接祖沖之之法則是自相矛盾不惟欺人且自欺矣况諸事皆命於歳實歳實既改則月䇿轉終交終與五星周俱宜隨日而改可也守敬乃諸事俱仍舊貫一無所改遂使後之疇人尋源不得而愈逺愈差以至於今也授時求盈縮遲疾差立二術一術不拘整日半日畸零時刻以平立差三乗之為密一術則用加分損益積度乃以二日對減之餘乗時刻之零數則分秒有不合為疎也既有前三乗密術何故又立後術若以後術推加減差之分秒差以推合朔差以推日月食食甚定之分秒亦差而於食甚入盈縮行定度亦差則何以步日躔月離將使隂厯反陽陽厯反隂而交前後亦相反起復方位皆不效矣兹豈細故而何故重立後術遂使今之司天者不能筭三乗方之難而但從加分損益積度之易以致步厯不明則後術俑之耳元史載授時求南北東西定差先言隂陽二厯於南北定差云在盈初縮末者交前隂厯減陽厯加交後隂厯加陽厯減在縮初盈末者交前隂厯加陽厯減交後隂厯減陽厯加於東西定差云在盈中前者交前隂厯減陽厯加交後隂厯加陽厯減中後者交前隂厯加陽厯減交後隂厯減陽厯加在縮中前者交前隂厯加陽厯減交後隂厯減陽厯加中後者交前隂厯減陽厯加交後隂厯加陽厯減皆非也夫方求定差尚未有正交中交限度則隂陽厯去中前度從何而出則於何處加減之正法曰南北差盈初縮末正交減中交加縮初盈末正交加中交減東西差盈厯正交中前減中後加中交中前加中後減縮厯正交中前加中後減中交中前減中後加為是授時引李梵蘇統皆以月行當有遲疾不必在牽牛東井婁角之間乃由行道有逺近出入所生其言似是而非也盖月行髙低處在牽牛東井至婁角始平行者古時則然而乆之則漸移他宿如日躔漢時在斗而今退至箕所謂不必在牽牛東井婁角之間者此也若謂為月行當有遲疾由行道有逺近出入所生則非盖月行遲疾逺近出入所生乃月行一周天出入黄道内外寛狹所離之數在古時每周髙低處俱在牽牛東井間平行俱在婁角至年乆方漸移他宿耳故守敬引李蘇之言以證月行遲疾之理其説似是而非不可不辯日食為月所掩人以目視九服不同故有時差分月食行入暗虚異地所見皆同宜無時差故宋志應天等厯直以定望小餘為食甚定分而紀元厯則立時差金重修大明厯亦用之授時厯因而未革其謂月食視定望分在日周四分之一已下為卯前已上覆減半周為卯後在四分之三已下減去半周為酉前已上覆減日周為酉後以卯酉前後分自乗退二位如四百七十八而一為時差子前以減子後以加皆加減定望分此元史之文其説非也然授時時差之説固非而揆以密率則月亦有時差焉其時差者乃人處其偏日出入分早晚不一則人目所視去日月對衝之中心少頃方至微有差殊也故以日周減卯酉前後分餘數止在刻下分秒間為時差以加於定望為食甚定分然而有加無減者以日月相對相迎之故耳若異地則反是此月食無時差中之時差也元史載授時求月食既法以既内分與一十分相減相乗平方開之所得以五千七百四十乗之如定限行度而一為既内分非也盖日大月之半故日食定法二十分月食定法三十分三十分半之為十五分乃月食既分如月食十分已上者去其十分餘為既單分是月西邊與日西邊齊至日東邊所食之數為既單分也以既單分用減月食既分十五分餘復以單分乗之平方開之所得以四千九百二十乗之如定限行度而一為既内分用減定用為既外分為是若如授時云以既内分與一十分相減相乗夫未得數先安得有既内分一十分已過之數又與既分無預何以相減相乗為也且四十九刻二十分者乃以昏至曉夜六時因每時八刻二十分所得之數為夜定法也若五十七刻四十分者乃以曉至昏七時因毎時八刻二十分所得之數為晝定法也晝定法乃推日食所用者而守敬誤用以推月食定用分併食既分非其類矣今欽天監所用四十九刻二十分却是授時求五星盈縮差亦立三乗方及加分損益積度二術與日月同其加分損益積之失亦如之授時五星之數止録舊章並未測驗多所舛錯木星應稍親而餘四星俱差於火星縮初盈末立差以減作加土星應則差頗逺然行遲尚未覺至於水星合應止五十萬餘而誤用七十萬餘以致水星差至二十餘日當伏而見當見而伏顯然目覩其誰掩之欽天疇人相訝曰吾遵祖師法布算而何天之不我親也則吾不知之矣辯大統厯之失革象新書載十二月建斗綱所指正月指寅二月指卯以至十二月指丑謂之月建凡日月一嵗十二㑹故有十二次建子之月次名𤣥枵建丑之月次名星紀以至建亥之月次名娵訾十二分野即十二辰次所臨之地此趙縁督之言其説非也盖在天之星十二宮次舍子位𤣥枵丑位星紀與時令之月建無關論天星與月令如正月雨水後日躔娵訾斗指析木非天星分野之次為月辰所臨之名也况正月昏時斗杓指寅惟雨水後六日則然雨水後六日以前斗杓不指丑乎雨水後六日指寅惟今時則然乆之天星漸移計六十餘年差一度後五百餘年不轉而二月指丑乎然則五百年後謂二月建丑可乎不可乎夫曰月建者寅月寅日為建卯日為除之謂非正月斗柄建寅併寅月次名析木之謂也一寅厯十二月皆可指凡十二支每月皆可指此歲差之數運行不已者趙縁督不知而悮以天星之次舎加為地盤之月建欽天監不知而刻於天文星圖考略中世人遵欽天監者也覩斯圖而信之幾何而不眯亂人之耳目四正者歲周之四分也冬至即冬正夏至即夏正春分前三日為春正秋分後三日為秋正每正初日則黄赤道同度冬至初自下而上闊行漸狹至平交狹行漸闊至夏正夏至初自上而下闊行漸狹至平交狹行漸闊復至冬正而一周此其率也然春秋分前後三日為春秋正在順天偏北則然若陽城在天地之中則春秋分即春秋正矣元授時冬正初日在箕宿十度至今萬厯年退至箕宿五度以推天正赤道變黄道則惟宜以冬至初日下赤道率度一度八六五而一即得黄道度正以是日赤黄道同度為四正之一正也今大統推冬至初日認箕五度作至後五度遂乃用至後五度下率不及減以四度下率一度八四九減之若曰今日躔箕五度亦宜用五度率也則大謬不然矣夫日躔箕五度者乃三百餘年自箕十度退至箕五度也與冬至初度行至至後之五度何關如乆而日退於尾十九度亦將以尾十九度下之度率減之乎何悖戾不通如此之甚也夫以斯明白易曉者尚昧不知他何望焉授時厯至元辛巳黄道躔度十二交宮界守敬所測也至今三百餘年冬至日躔已退五度則宜另步日躔宮界另以赤道變黄道以合今時在天宮界從古厯家未有以三百年後仍用三百年前黄道者而何欽天監之茫然莫覺也考唐志云日躔宿度如郵傳之過宿度既差黄道隨而變矣元志云黄道宿度據歲差毎移一度依術推變嘉靖初樂頀掌監事上言厯經即歲差以推變黄道六十七年該推變一次本監失於推變頀又嘗語人云徃年在監未奉更正甚為遺憾頀有文集可考也胡大統不是之察也余以法推授時交宮界在赤道斗四度九二八一二五加至後箕宿四十分得四度四九二八一二五以減至後赤道率四度三四四五餘一十四分八三一二五以黄道率乗之以赤道率一度八四九而一得一十三分六十七秒加至後黄道四度共得四度一三六七為至後黄道交宮界度另置至後箕四十分以黄道率乗之以至後黄道初度下赤道一度八六五而一得三十六分八一以減至後黄道交宮界度餘三度七六八六為黄道斗宿交入丑宮星紀界度由此法推女二度六三八入子宮𤣥枵以次推至尾三度一一五入寅宮析木此授時十二宮界也復以前法推萬厯己亥歳交宮界度斗三度七九八五入丑宮星紀以次推女二度八九一入子𤣥枵以至尾二度九七九一入寅析木此己亥十二宮界也以己亥較授時入丑宮界差三百分矣今大統步今時之厯仍用授時日躔以致差謬如己亥一嵗十二宮有先天四五十刻者六七十刻者甚至秋正後太陽入辰宮授時步秋正後十日壬辰申初一刻入辰宮大統則步秋正後九日辛卯酉正三刻入辰宮先天八十餘刻隔一日矣然此猶就本率推之也如加消長所差尤多夫日躔乃厯家第一義今若此尚可以為厯乎元大都即今順天府授時大都測影夏至晝六十二刻夜三十八刻冬至晝夜刻反是我朝洪武初南京測影夏至晝五十九刻夜四十一刻冬至反是今欽天監以授時大都之厯法布洪武南京之刻漏冬夏二至各差三刻以故正統十四年厯冬夏至六十一刻想監官以漏記之覺其差而改者人駭以為異而不知為順天測影宜然之數也夫冬夏二至盈縮之始二至既差則分至以次皆差然則一朞之中盈縮損益有一日一時一刻之不參差者乎以是而頒行天下為民授時空使人夢中度日骨董也元史載至元十八年歲次辛巳為元上考徃古下驗將來皆距立元為算周歲消長百年各一其諸應等數隨時推測不用為元至明也辛巳至今三百餘年而大統止遵舊法一無測改元統且併其消長削去之以至中節相差九刻有竒兼以閏轉交三應雖經元甲午一改而猶未親密所當再正夫應一差則諸事俱差而以之步厯無一可者若差在旦暮間猶在本日若處夜當子半之交所差便隔一日如節氣差天一日則置閏差天一月閏差一月則時差一季時差一季則歲差一年其所係豈秒小哉且也恒氣既乖置閏失當將盈虚没滅建除滿平之類吉凶宜忌一切皆錯不可以為厯矣故守敬曰天有不齊之運而厯為一定之法所以既乆而不能不差既差則不可不改隆慶間監官周相亦曰今年逺數盈歲差天度失今不考所差必甚皆探本之論也大統厯氣朔差而年月日時分數俱差交宫差而七政四餘躔度俱差此其天人牴牾所關於三式之重二物之微者請得而備言之夫論太乙莫難於日計而日計壹稟於南至昔李淳風以積年日法演紀上元七政同㑹於子太乙諸神同在乾一宮自此而後散行於天七政各麗躔度太乙各入元局吉凶在焉考梁武帝天監三年甲申歲六月八日甲申帝召虞履樂茂言曰今日在太乙在八宮和徳為天目將外迫宮災輕無所畏也履茂退謂人曰外宮迫為外人迫也淳風步距積七億七百五十萬一千六十一日以紀除之入第五紀二十一日以授時推距積入紀二十二日乃六月朔丙子九日甲申非八日也是日太乙在八宮天目文昌在和徳主算三十二主大將在二宮主參將在六宮客目始擊在太蔟客算七客大將在七宮客參將在一宮計神在午乃文昌在太乙前外迫其禍大為是其推八日則日躔合朔之誤入局誤以推陽九百六十精等事皆誤此太乙之係於日至者也論遁甲亦稟於日至如萬厯己亥歲前冬至四十二日八刻求遁甲甲午符頭入局下元甲辰後二日丙午如用辛卯時求竒門以下元巽四宮步至甲申六宮乾以天心為直符開門為直使六宮起甲四宮見辛開門加巽離南得休坤西南得生為反吟六儀首戊加四宮蓬為丁竒芮為丙竒衝為乙竒以直符加兌順布艮東北乙竒會死門離正南丙竒㑹休門乾西北丁竒會杜門以直符加午順布太隂住坎六合住艮九地住離九天住坤掦兵於坤立營於離伏兵於坎退行於艮是也遁甲之起原於入局人不悟超神接氣之説而率以芒種大雪置閏則非矣盖九日之上有閏竒是冬至日去其元法十五日或一二三次或不及十五日無論上中下元餘九日以上至十五日其年有閏竒至閏竒之月必漏一局乃超神接氣自然之閏此竒門遁甲之係於日至者也論六壬亦稟於日至日至正然後日躔入宮正如萬厯己亥歳秋正後十日壬辰申初一刻日躔夀星之次入辰宮是日午時命占則宜仍用已將以巳加午順歩得戌壬酉戍卯辰寅卯為四課戌酉申為三傳初傳白虎中傳太常末傳𤣥武課名知一退茹斬關及取大統日躔先一日辛卯酉正三刻已入辰宮宜用辰時以辰加午順步得酉壬未酉寅辰子寅為四課寅子戌為三傳初傳六合中傳青龍末傳白虎課名元首間隔已將占乃疾病與武事九月應應而即沒辰將占則求財與文事起自正月没至九月其占原凶今反為吉占者見其不驗乃歸咎於術之不精不知為日躔之故此六壬之係於日至者也三式之外其要者又有星家占命堪輿家占隂陽氣朔差若立春值子半之交則子平人命年月日時四柱皆非矣日躔交宮差則太陽照命非太陽五星交宮差如大統之水星當伏而見當見而伏則五行生尅皆錯亂不準矣中節差則堪輿家所視擇年神方位及太陽到宮用以建都郡修城隍度陵寢開山放水一切天盤地盤之事皆不準矣又其要者譯天文書當今大法也盖以日躔之宮加所用之時視東方何宮何度出地平環上為主即用此宮安命定日以步田宅奴僕官禄相貌遷移福徳於上付之於七政四餘以視出地平環之宮何星為主又落何星及視各宮所落何星各主禍福如萬厯己亥歲秋正後十日壬辰午時用事是日申初一刻日躔夀星午時仍用巳將以巳加午順布地平環上是寅即以寅宫為主木星為命若以大統步之以辛卯日酉正三刻太陽已入辰宮以辰加午順布地平環上是丑以丑宮為主土星為命而六親俱差禍福無準矣不寧惟是即大統厯所載一切吉凶諸曜何者不準諸氣朔大統以氣朔後擇日日躔後定時今而氣朔失次干支易位也則吉凶其何適焉如立春隔日則年神方位俱差入氣九宫亦易躔離一乖則月中之角亢建除弦望没滅土王月忌離絶長短星四大良時之類皆非矣如隂盡之日兵家所忌謂晦也大統月晦暨月忌截諸吉日惟留祭祀破屋三五事至於没滅則大凶諸事不可用以類推之餘可知也且四大良時靈臺所重者如己亥嵗秋正後十日壬申申初一刻後日躔壽星之次宜用艮巽坤乾時申時已前仍屬鶉尾宜用甲丙庚壬時而臺厯則誤造辛卯酉正三刻後日已入辰宮用艮巽坤乾時則令人宜何從也諸如此類其應驗與否我不敢知然既載厯經則治術宜密矣昔鯀汨陳其五行以致􅃔倫攸斁天乃錫禹洪範九疇以叙􅃔倫一五行四五紀七稽疑稽用卜筮以決從違盖其慎也今國朝不用卜筮而朝賀之大典軍國之重事一切吉凶軍賓嘉之禮咸取決於靈臺靈臺每二月朔進上位厯七政厯月令厯壬遯厯又上吉日十二紙每月粘一紙於御屏是其任何專責何鉅也而今差謬若此則何以定天下之大業成天下之亹亹俾五行不汨五紀順軌彛倫攸叙耶夫葵心向日至子夜猶北拱知時莫如葵矣物固有之人亦宜然余向有一得獻之當宁欲正厯元以救其失而監官張應候等爭之謂已為無差且詆余為私習也曰私習者為庸人妄言天數者發而厯象授時之學正吾儒本業帝王不禁也五代萬分厯出於民間宋草澤布衣王學禮陳得一趙大猷等造厯上言厯官乃抵罪僉議召山林布衣造新厯從之草澤且然况有位乎且應候等爭言已與天道脗合交食準驗年愈逺而數愈真也使果如其説余曷樂於有言若等試一一如余所指以法布算果爾合否仰觀乾象果無愆否此可以口舌爭乎嗟嗟余憫重黎之道喪千歲之故失不得已而竭心力之窮補天人之闕非為私已也知我罪我吾何知亦付之天而已古今律厯考卷六十五
