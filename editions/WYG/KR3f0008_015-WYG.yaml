body:
  text: 古今律厯考卷十五明邢雲路撰歴代七歴代考唐書唐厯志云唐始終二百九十餘年而厯八改曰戊寅元厯麟徳甲子元厯開元大衍厯寳應五紀厯建中正元厯元和觀象厯長慶宣明厯景福崇𤣥厯止矣髙祖受禪初東都道士傅仁均治新厯合受命嵗名為戊寅元厯所可考騐者七曰唐以戊寅嵗甲子日登極厯元戊寅日起甲子如漢太初一也冬至日短星昴合堯典二也周幽王六年十月辛夘朔入蝕限合於詩三也魯僖公五年壬子冬至合春秋命厯序四也月有三大三小則日蝕常在朔月蝕常在望五也命辰起子半命度起虚六符隂陽之始六也立遲疾定朔則月行晦不東見朔不西朓七也髙祖詔司厯起二年用之擢仁均員外散騎侍郎三年正月望及二月八月朔當蝕比不效六年詔郎中祖孝孫博士王孝通考其得失未定九年復詔大理卿崔善為較定善為所改凡數十條初仁均以武徳元年為厯始七政皆有加減至是復用上元積算其周天度即古赤道也貞觀初值太史李淳風又上疏論十有八事復詔善為課二家得失其七條改從淳風十四年太宗將祀南郊以十一月癸亥朔甲子冬至而淳風新衍以甲子合朔冬至乃上言古厯分日起於子半十一月當甲子合朔冬至太史令傅仁均以減餘稍多子初為朔遂差三刻司厯南宮子明太史令薛頥等言子初及半日月未離淳風之法符合國子祭酒孔穎逹等謂平朔行之自古春秋傳或失之前為晦日也雖癸亥日月相交明日甲子為朔可也從之仁均厯法祖述胄𤣥稍以劉孝孫舊議參之麟徳間仁均厯較淳風厯最疎然更相出入其有所中淳風亦不能逾之今所記者善為所較也戊寅厯上元戊寅至武徳九年丙戌積十六萬四千三百四十八算外章歳六百七十六亦名行分法乃三十五章併十一年之歳章閏二百四十九乃三十五章凡二百四十五閏及十一年四閏共之之數章月八千三百六十七乃一章歳凡八千一百一十二月及閏二百四十九共之之數度法氣法九千四百六十四乃十四章積度併歳度月法一十一萬七千五十四乃十四章歳之積月日法一萬三千六以九歸度月而得歳分三百四十五萬六千六百七十五者置三百六十五日四分度之一以氣法乘之得三百四十五萬六千七百二十六日以歳分減之減五十一日以氣法而一得每年減五十三分八八八以減三百六十五日四分度之一得三百六十五日二十四刻四六一一為歳周即以氣法除歳分得三百六十五日餘歳餘二千三百一十五再除得歳周也周分三百四十五萬六千八百四十五半者以度法乘周天度三百六十五得三百四十五萬四千三百六十加斗分二千四百八十五半得數為周分以度法歸之得三百六十五度二十六分二十五秒為天周也月法三十八萬四千七十五以九歸嵗分而得交㑹法一千二百七十四萬一千二百五十八半之得六百三十七萬六百二十九為交分法以三十六而一得三十五萬三千九百二十三日八十三刻為交實以日法除月法得二十九日五十三刻六一為朔實以厯法二萬八千九百六十八除厯周七十九萬八千二百得二十七日五十五刻四五四三為轉終以日法除交實得二十七日二十一刻二三五為交終以度法除五星率得各周日木率三百七十七萬五千二十三火七百三十八萬一千二百二十三土三百五十七萬八千二百四十六金五百五十二萬六千二百水百九萬六千六百八十三木周日三百九十八日八十八刻二四火七百七十九日九十二刻六二土三百七十八日九刻三金五百八十三日九十一刻一六水一百一十五日八十七刻九四厯志謂戊寅元厯冬至五十餘年差一度是時約八十年差一度非五十年也謂僖公壬子冬至推乃辛亥冬至非壬子也謂月有三大三小固多是而亦有不盡然者非一定也其云幽王六年十月辛夘朔日食及辰起子半度起虛六則皆是謂淳風推癸亥夜次日甲子冬至以子初及半日月未離雖癸亥相交可為甲子不知夜子初刻屬前日正刻屬後日界限分明毫不容假難以子初作次日也則不若仁均辰起子半之為是耳仁均滑州白馬人髙宗時戊寅厯漸差岐州雍人太史令李淳風作麟徳甲子元厯以古厯有章蔀元紀日分度分參差不齊乃為總法千三百四十以一之損益中晷術以考日至為渾儀表裏三重以測黄道初隋末劉焯造皇極厯其道未行淳風約之為法改作麟徳厯時以為宻麟徳元年甲子距上元甲子積二十六萬九千八百八十筭總法千三百四十乃七十章及十年之嵗數期實四十八萬九千四百二十八乃一總之日數常朔實三萬九千五百七十一以總法除朞實得三百六十五日二十四刻四七為嵗周以總法除常朔實得二十九日五十三刻五九七為月䇿置變周四十四萬三千七十七以十二除之得三萬六千九百二三八三三以總法而一得二十七日五十五刻四五四為轉終置遊交終率千九十三萬九千三百一十三以三歸之得三百六十四萬六千四百三十七六六以總法而一得二十七日二十一刻二二二一為交終以總法除五星各總率得各星周日總率木五十三萬四千四百八十三火百四萬五千八十土五十萬六千六百二十三金七十八萬四千四百四十九水十五萬五千二百七十八木周日三百九十八日八十六刻八火七百七十九日九十一刻四土三百七十八日七刻六八金五百八十三日九十一刻七一水一百一十五日八十七刻九一大端皆約皇極厯而㣲加増損之其一以總法則校之諸厯似為省要耳開元九年麟徳厯署日蝕比不效詔僧一行作新厯推大衍數立術以應之十五年草成而一行卒詔特進張說與厯官陳𤣥景等次為厯術七篇略例一篇厯議十篇表上之十七年頒行其大要著於篇者十二其一厯本議曰易天數五地數五五位相得而各有合所以成變化而行鬼神也天數始於一地數始於二合二始以位剛柔天數終於九地數終於十合二終以紀閏餘天數中於五地數中於六合二中以通律厯天有五音所以司日也地有六律所以司辰也參伍相周究於六十聖人以此見天地之心也自五以降為五行生數自六以徃為五材成數錯而乘之以生數衍成數位一六而退極五十而増極一六為爻位之統五十為大衍之母成數乘生數其筭六百為天中之積生數乘成數其筭亦六百為地中之積合千有二百以五十約之則四象周六爻也二十四約之則太極包四十九用也綜成數約中積皆五十綜生數約中積皆四十兼而為天地之數以五位取之復得二中之合矣蓍數之變九六各一乾坤之象也七八各三六子之象也故爻數通乎六十䇿數行乎二百四十是以大衍為天地之樞如環之無端盖律厯之大紀也夫數象㣲於三四而章於七八卦有三㣲䇿有四象故二㣲之合在始中之際焉蓍以七備卦以八周故二章之合在中終之際焉中極居五六間由闢闔之交而在章㣲之際者人神之極也天地中積千有二百揲之以四為爻率三百以十位乘之為二章之積三千以五材乘八象為二㣲之積四十兼章㣲之積則氣朔之分母也以三極參之倍六位除之凡七百六十是謂辰法而齊於代軌以十位乘之倍大衍除之凡三百四是謂刻法而齊於徳運半氣朔之母千五百二十得天地出符之數因而三之凡四千五百六十當七精返初之㑹也易始於三㣲而生一象四象成而後八卦章三變皆剛太陽之象三變皆柔太隂之象一剛二柔少陽之象一柔二剛少隂之象少陽之剛有始有壯有究少隂之柔有始有壯有究兼三才而兩之神明動乎其中故四十九象而大業之用周矣數之徳圓故紀之以三而變於七象之徳方故紀之以四而變於八人在天地中以閲盈虚之變則閏餘之初而氣朔所虚也以終合通大衍之母虧其地十凡九百四十為通數終合除之得中率四十九餘十九分之九終嵗之弦而斗分復初之朔也夫十九分之九盈九而虛十地於終極之際虧十而從天者所以逺疑陽之戰也乾盈九𨼆乎龍戰之中故不見其首坤虚十以導潛龍之氣故不見其成周日之朔分周嵗之閏分與一章之弦一蔀之月皆合於九百四十蓋取諸中率也一䇿之分十九而章法生一揲之分七十六而蔀法生一蔀之日二萬七千七百五十九以通數約之凡二十九日餘四百九十九而日月相及於朔此六爻之紀也以卦當嵗以爻當月以䇿當日凡三十二嵗而小終二百八十五小終而與卦運大終二百八十五則參伍二終之合也數象既合而遯行之變在乎其間矣所謂遯行者以爻率乘朔餘為十四萬九千七百以四十九用二十四象虛之復以爻率約之為四百九十八㣲分七十五太半則章㣲之中率也二十四象象有四十九蓍凡千一百七十六故虚遯之數七十三半氣朔之母以三極乘參伍以兩儀乘二十四變因而并之得千六百一十三為朔餘四揲氣朔之母以八氣九精遯其十七得七百四十三為氣餘嵗八萬九千七百七十三而氣朔㑹是謂章率嵗二億七千二百九十萬九千九百二十而無小餘合於夜半是謂蔀率嵗百六十三億七千四百五十九萬五千二百而大餘與嵗建俱終是謂元率此不易之道也䇿以紀日象以紀月故乾坤之䇿三百六十為日度之準乾坤之用四十九象為月弦之檢日之一度不盈全䇿月之一弦不盈全用故䇿餘萬五千九百四十三則十有二中所盈也用差萬七千一百二十四則十有二朔所虚也綜盈虚之數五歳而再閏中節相距皆當三五弦望相距皆當二七升降之應發斂之候皆紀之以䇿而從日者也表裏之行朓朒之變皆紀之以用而從月者也積筭曰演紀日法曰通法月氣曰中朔朔實曰揲法嵗分曰䇿實周天曰乾實餘分曰虚分氣䇿曰三元一元之䇿則天一遯行也月䇿曰四象一象之策則朔弦望相距也五行用事曰發斂候䇿曰天中卦䇿曰地中半卦曰貞悔旬周曰爻數小分母曰象統日行曰躔其差曰盈縮積盈縮曰先後古者平朔月朝見曰朒夕見曰朓今以日之所盈縮月之所遲疾損益之或進退其日以為定朔舒亟之度乃數使然躔離相錯偕以損益故同謂之朓朒月行曰離遲疾曰轉度母曰轉法遲疾有衰其變者勢也月逶迤馴屈行不中道進退遲速不率其常過中則為速不及中則為遲積遲謂之屈積速謂之伸陽執中以出令故曰先後隂含章以聼命故曰屈伸日不及中則損之過則益之月不及中則益之過則損之尊卑之用睽而及中之志同觀晷景之進退知軌道之升降軌與晷名舛而義合其差則水漏之所從也摠名曰軌漏中晷長短謂之陟降景長則夜短景短則夜長積其陟降謂之消息遊交曰交㑹交而周曰交終交終不及朔謂之朔差交中不及望謂之望差日道表曰陽厯其裏曰隂厯五星見伏周謂之終率以分從日謂之終日其差為進退其二中氣議三合朔四没滅五卦候六卦七日度八日躔盈縮九九道十晷漏中星十一日蝕十二五星諸議俱詳十六卷中古今律厯考巻十五
