body:
  text: 古今律厯考卷二十五明邢雲路撰歴代日食六歴代日食厯宋宋太祖建隆元年庚申嵗五月己亥朔日食五月交一十三日五五五月朔三十五日五七己亥未時是五月己亥朔未時日食建隆二年辛酉嵗四月癸巳朔日食四月交一十四日一五四月朔二十九日七癸巳申時是四月癸巳朔申時日食乾徳三年乙丑嵗二月壬寅朔日食驗天不食二月交一十四日二七二月朔三十七日四六壬寅午時推是年二月壬寅朔午時日食此當食不食之類議在總詳乾徳五年丁夘嵗六月戊午朔日食六月交二十七日六月朔五十四日六二戊午未時是六月戊午朔未時日食開寳元年戊辰嵗十二月己酉朔日食綱目無十二月交一十四日三八十二月朔四十五日六九己酉申時是十二月己酉朔申時日食綱目漏開寳三年庚午嵗四月辛未朔日食四月交二十六日五八四月朔七日五六辛未未時是四月辛未朔未時日食開寳四年辛未嵗十月癸亥朔日食十月交一十三日八九十月朔五十九日四五癸亥巳時是十月癸亥朔巳時日食開寳五年壬申嵗九月丁巳朔日食九月交一十四日五九月朔五十三日四二丁巳巳時是九月丁巳朔巳時日食開寳七年甲戌嵗二月庚辰朔日食二月交二十六日七二月朔二十六日三一庚辰辰時是二月庚辰朔辰時日食開寳八年乙亥嵗七月辛未朔日食七月交一十四日七月朔七日二八辛未夘時是七月辛未朔夘時日食太宗太平興國二年丁丑嵗十一月丁亥朔日食既十一月交二十六日八一十一月朔二十三日六七丁亥申時是十一月丁亥朔申時日食太平興國六年辛巳嵗九月乙未朔日食九月交二十六日九三九月朔三十一日二乙未寅時是九月乙未朔寅正刻日食則卯猶見其初虧太平興國七年壬午嵗三月癸巳朔日食十二月朔日食十二月見綱目史無三月交一十三日六二三月朔二十九日三二癸巳辰時推是年三月癸巳朔辰時日食十二月朔不入交不應食綱目非太平興國八年癸未嵗二月戊子朔日食推是年閏正月二月丁亥朔亥時夜食不書二月初二戊子日春分史載二月戊子朔日食非雍熙二年乙酉嵗十二月庚子朔日食十二月交一十三日七四十二月朔三十六日四九庚子午時是十二月庚子朔午時日食雍熈三年丙戌嵗六月戊戌朔日食六月交四十四刻六月朔三十四日二二戊戌寅時是六月戊戌朔寅正刻日食淳化二年辛夘嵗閏二月辛未朔日食閏二月交二十六日閏二月朔七日二六辛未夘時是閏二月辛未朔夘時日食淳化三年壬辰嵗二月乙丑朔日食二月交二十六日六六二月朔一日六七乙丑申時是二月乙丑朔申時日食淳化四年癸巳嵗二月己未朔日食八月朔日食八月食見綱目史無二月交六刻二二月朔五十五日七五己未酉時八月交一十三日九七八月朔五十二日六六丙辰申時是二月己未朔酉時日食八月丙辰朔申時日食史無八月漏淳化五年甲午嵗十二月戊寅朔日食是日陰雪不見與不食同羣臣稱賀十二月交二十六日一七十二月朔一十四日四戊寅巳時是十二月戊寅朔巳時日食陰雪不見在天未甞不食也烏得與不食同羣臣稱賀諂也真宗咸平元年戊戌嵗五月戊午朔日食十月丙戌朔日食五月交一十四日六九五月朔五十四日六九戊午申時十月交二十六日二八十月朔二十二日五六丙戌未時是五月戊午朔申時日食十月丙戌朔未時日食咸平二年己亥嵗九月庚辰朔日食九月交二十六日八九九月朔一十六日五三庚辰午時是九月庚辰朔午時日食咸平三年庚子嵗三月戊寅朔日食三月交一十三日五九三月朔一十四日八二戊寅戌時是三月戊寅朔戌初刻日食則酉猶見其虧咸平五年壬寅嵗七月甲午朔日食七月交二十六日四七月朔三十日六六甲午申時是七月甲午朔申時日食景德元年甲辰嵗十二月庚辰朔日食十二月交一十四日三一十二月朔一十六日四二庚辰巳時是十二月庚辰朔巳時日食景德三年丙午嵗五月壬寅朔日食雲陰不見五月交二十六日五五月朔三十八日一一壬寅丑時推是年五月壬寅朔丑正刻合朔夜食不書宋誤景德四年丁未嵗五月丙申朔日食十月甲午朔日食雲陰不見綱目無十月五月交二十七日一二五月朔三十二日六六丙申申時推是年五月丙申朔申時日食其十月甲午朔則寅初刻夜食不書綱目刪之是也大中祥符二年己酉嵗三月丙辰朔日食陰雨不見三月交二十六日三月朔五十二日六六丙辰申時是三月丙辰朔申時日食大中祥符五年壬子嵗八月丙申朔日食八月交一十四日五四八月朔三十二日五五丙申未時是八月丙申朔未時日食大中祥符六年癸丑嵗十二月戊午朔日食十二月交二十六日七四十二月朔五十四日三八戊午巳時是十二月戊午朔巳時日食大中祥符七年甲寅嵗十二月癸丑朔日食驗天不食綱目書司天監奏日食不應羣臣表賀十二月交一十四刻十二月朔四十九日三刻癸丑子時推是年十二月癸丑朔子時夜食不書司天監誤推在晝羣臣表賀非大中祥符八年乙夘嵗六月己酉朔日食六月交一十四日六月朔四十五日五己酉午時是六月己酉朔午時日食天禧三年己未嵗三月戊午朔日食三月交一十四日一六三月朔五十四日二戊午巳時是三月戊午朔巳時日食天禧五年辛酉嵗七月甲戌朔當食既測驗及四分止七月交二十六日九七七月朔一十日五甲戌午時是七月甲戌朔午時日食乾興元年壬戌嵗七月甲子朔日食幾盡七月交四十六刻七月朔四日八戊辰戌時推是年七月戊辰朔戌初刻日食則酉猶見其虧天正經朔得壬辰以步至七月戊辰合朔是嵗並無甲子朔史載七月甲子朔相差五日仁宗天聖二年甲子嵗五月丁亥朔日當食候之不食司天監奏日食不應中書奉表稱賀五月交二十六日四八五月朔二十三日四二丁亥巳時推是年五月丁亥朔巳時日食天聖四年丙寅嵗十月甲戌朔日食十月交一十四日三九十月朔九日三九癸酉巳時推是年十月癸酉朔巳時日食非甲戌朔天聖六年戊辰嵗三月丙申朔日食三月交二十六日五九三月朔三十二日二二丙申卯時是三月丙申朔夘時日食天聖七年己巳嵗八月丁亥朔日食八月交一十三日九八月朔二十三日二七丁亥夘時是八月丁亥朔夘時日食明道二年癸酉嵗六月甲午朔日食六月交一十四日六月朔三十日八二四甲午戌時是六月甲午朔戌時日食則酉時及見其虧景祐三年丙子嵗四月己酉朔日食殿中丞王立言是日日食二分半候之不食綱目無四月交一十三日五二四月朔四十五日二七己酉夘時推是年四月己酉朔夘時日食宋人候之不食然日食三分以下不救寶元元年戊寅嵗正月丙辰朔日食六分申一刻復綱目無推是年正月經朔戊戌無丙辰交泛十日不入食限史載食六分申一刻復非也綱目刪之是康定元年庚辰嵗正月丙辰朔日食正月交一十三日六三正月朔五十二日五五丙辰未時推是年十二月晦丙戌大寒閏十二月朔丁亥正月丙辰朔雨水是日未時日食合戊寅年六月日官楊惟德等言來嵗閏十二月則庚辰嵗正月朔日當食請移閏於庚辰則日食在前正月之晦帝曰閏所以正天時而授民事其可曲避乎不許至是知諫院富弼請罷宴徹樂就舘賜北使酒食執政不可弼曰萬一契丹行之豈不為朝廷羞既而聞契丹罷宴帝深悔之嗟乎日官所司何事而欲移臘於春易朔為晦謂欽天何執政之見亦猶之乎日官也慶厯二年壬午嵗六月壬申朔日食五分至酉六刻帶二分入濁不見六月交二十六日四四六月朔八日七六壬申酉時是六月壬申朔酉正刻日食帶食入地合慶厯三年癸未嵗五月丁夘朔日食五月交二十七日五月朔三日二一丁夘夘時是五月丁夘朔夘時日食慶厯四年甲申嵗十一月戊申朔日當食不食綱目無十一月交一十四日三五十一月朔五十四日六九戊午申時推是年十一月戊午朔申時日食宋厯誤推戊申朔夫戊午去戊申十日而以為日當食不食耶即此一事可證宋時當食不食有是與非之辨慶厯五年乙酉嵗四月丁亥朔日應食而雲晦不見四月交二十五日九五四月朔二十三日二一丁亥夘時是四月丁亥朔夘時日食慶厯六年丙戌嵗三月辛巳朔日食四分半申三刻復三月交二十六日五五三月朔一十七日五七辛巳未時是三月辛巳朔未時日食則申時復合皇祐元年己丑嵗正月甲午朔日食正月交二十六日正月朔三十日四八甲午午時是正月甲午朔午時日食皇祐四年壬辰嵗十一月壬寅朔日食食二分弱未正一刻復十一月交二十六日一七十一月朔三十八日五四壬寅午時是十一月壬寅朔午時日食則未時復合皇祐五年癸巳嵗十月丙申朔日食午正一刻食至四分半十月交二十六日七八十月朔三十二日五二丙申午時是十月丙申朔午時日食至和元年甲午嵗四月甲午朔日食九分餘缺於西南申正一刻甚四月交一十三日四八四月朔三十日七甲午申時是四月甲午朔未時日食則申時食甚合綱目書是日用牲於社按春秋莊公二十五年辛未朔日有食之鼓用牲於社傳曰諸侯用幣於社伐鼓於朝退而自省然則鼓用牲於社何以書譏不鼓於朝而鼓於社又用牲則非禮矣夫魯以諸侯之國用牲於社春秋譏之宋以天子行諸侯之禮奚取焉綱目揭而書之所以深譏之也嘉祐元年丙申嵗八月庚戌朔日食二分八月交二十六日二九八月朔四十六日六七庚戌申時是八月庚戌朔申時日食嘉祐三年戊戌嵗八月己亥朔日食三分半八月交二十九刻八月朔三十五日三二己亥辰時是八月己亥朔辰時日食嘉祐四年己亥嵗正月丙申朔日食食三分餘未初三刻復占曰受嵗而食王者惡之日官欲改戊戌年十二月閏以避之詔不許綱目書是日用牲於社正月交一十四日二正月朔三十二日五丙申午時是正月丙申朔午時日食則未時復合日官欲移閏以避之仁宗用牲於社下從諸侯之制君臣胥失之矣綱目書用牲於社譏之也嘉祐六年辛丑嵗六月壬子朔日食未初刻司天言當食六分食四分入雲而雨不見羣臣欲賀司馬光諫止之六月交二十七日六月朔四十八日五六壬子未時是六月壬子朔未時日食司天言當食六分及候之食四分入雲而雨不見何可賀之有而羣臣欲稱賀耶司馬光言京師不見四方必有見者且云食不滿分乃厯官術數不精當治其罪皆至言也英宗治平三年丙午嵗九月朔日食見綱目史無九月交一十四日四三九月朔四十八日五六壬子未時是九月壬子朔未時日食史漏神宗熈寧元年戊申嵗正月甲戌朔日食正月交二十六日八二正月朔一十日四九甲戌午時是正月甲戌朔午時日食熈寧二年己酉嵗七月乙丑朔日食太史言食八分陰雲不見七月交一十三日九四七月朔一日三四乙丑辰時是七月乙丑朔辰時日食熈寧六年癸丑嵗四月甲戌朔日食陰雲不見羣臣稱賀從之四月交一十四日四月朔十日二七甲戌夘時是四月甲戌朔夘時日食史載先是司天奏四月朔日當食帝自三月即避殿减膳降天下罪囚一等至是雲陰不見王安石等進賀以為盛德所感乞御殿復膳從之夫君方向善而引入於非安石之罪可勝誅哉熈寧八年乙夘嵗八月庚寅朔日食陰雲不見八月交二十六日八六八月朔二十六日四二庚寅巳時是八月庚寅朔巳時日食元豐元年戊午嵗六月癸夘朔太史言當食驗之不食綱目載食六月交二十六日三七六月朔三十九日二六癸夘夘時是六月癸夘朔夘時日食史云驗之不食而綱目載食想當時原食也元豐三年庚申嵗十一月己丑朔日食十一月交一十四日二八十一月朔二十五日三己丑辰時是十一月己丑朔辰時日食元豐四年辛酉嵗十一月癸未朔太史言日當食驗之不食十一月交一十四日八九推是年十一月朔交過食限不應食厯官誤推當食騐之不食是元豐五年壬戌嵗四月壬子朔日食陰雲不見推是年四月壬子朔寅時夜食不書史誤元豐六年癸亥嵗九月癸夘朔日食九月交一十三日七九九月朔三十九日三一癸夘辰時是九月癸夘朔辰時日食哲宗元祐二年丁夘嵗七月庚戌朔日食陰雲不見七月交一十三日九七月朔四十六日六五庚戌申時是七月庚戌日申時日食元祐六年辛未嵗五月己未朔日食五月交一十四日五月朔五十五日五八己未未時是五月己未朔未時日食紹聖元年甲戌嵗三月壬申朔日食三月交一十三日五二三月朔八日五七壬申未時是三月壬申朔未時日食紹聖二年乙亥嵗二月丁夘朔太史言日當食驗之不食二月交一十四日一三二月朔三日一五推是年二月丁夘寅初刻夜食不書太史誤推在晝驗天不食是紹聖四年丁丑嵗六月癸未朔日食雲陰不見推是年六月癸未朔寅初刻合朔夜食不書史誤元符三年庚辰嵗四月丁酉朔日食四月交二十六日四四月朔三十三日四七丁酉巳時是四月丁酉朔巳時日食徽宗建中靖國元年辛巳嵗四月辛夘朔日食陰雲不見四月交一十五日四六四月朔二十七日四一辛夘巳時是四月辛夘朔巳時日食崇寧五年丙戌嵗七月朔日當食不虧十二月朔日當食不虧羣臣稱賀見綱目七月交一十四日四七七月朔二十六日四九庚寅午時十二月交二十六日十二月朔五十四日五六戊午未時推是年七月庚寅朔午時日食十二月戊午朔未時日食綱目書不虧史俱不載大觀元年丁亥嵗十一月壬子朔日食綱目閏十月閏十一月交二十六日六七閏十一月朔四十八日五六壬子未時推是年閏十一月壬子朔未時日食蓋是年閏十一月壬子日午時合朔是日冬至宋厯誤閏十月大觀二年戊子嵗五月庚戌朔日食五月交一十三日三七五月朔四十六日五庚戌午時是五月庚戌朔午時日食大觀四年庚寅嵗九月丙寅朔日食九月交二十六日一八九月朔二日六六丙寅申時是九月丙寅朔申時日食政和三年癸巳嵗三月壬子朔日食三月交一十四日一三月朔四十八日五五壬子未時是三月壬子朔未時日食政和五年乙未嵗七月戊辰朔日食七月交二十六日九七月朔四日四八戊辰午時是七月戊辰朔午時日食重和元年戊戌嵗五月壬午朔日食五月交二十六日四五月朔一十八日六七壬午申時是五月壬午朔申時日食宣和元年即金太祖天輔三年己亥嵗四月丙子朔日食四月交二十七日四月朔一十二日七八丙子酉時是四月丙子朔酉時日食宣和二年即金天輔四年庚子嵗金書十月戊辰朔日食宋無十月交一十四日三二十月朔四日五五戊辰未時是十月戊辰朔未時日食宋漏宣和四年即金天輔六年壬寅嵗金書二月庚寅朔日食宋無二月交二十六日五二二月朔二十六日五五庚寅未時是二月庚寅朔未時日食宋漏宣和五年即金天輔七年癸夘嵗八月辛巳朔日食雲陰不見八月交一十三日八三八月朔一十七日二四辛巳夘時是八月辛巳朔夘時日食宋太祖至徽欽都汴京凡一百六十七年載諸日食其合者與誤者無論乃其當食不食者有十乾德三年二月大中祥符七年十二月天聖二年五月景祐三年四月慶厯四年十一月元豐元年六月四年十一月紹聖二年二月崇寧五年七月十二月皆當食驗天不食者也夫自厯代以來凡載當食不食者以法布筭率皆原不當食何宋以百六十餘年之間而遂有當食不食至十數之多也考僧一行日食議云開元十二年七月戊午朔十三年十二月庚戌朔俱推當食驗天不食以法推果然然則日之在天原有當食不食日月失行之致也然間一失行百分之一則有之不應如宋之太數也者反覆詳推乃有是與非之辨焉法推大中祥符七年十二月朔夜食紹聖二年二月朔夜食元豐四年十一月朔過交皆原不當食者也景祐三年四月史書食二分餘凡不及三分不救與不食同元豐元年六月朔史書未食而綱目載食想當時原食也崇寧五年七月朔十二月朔史俱不載而綱目有之想當時日官誤推不食既而見其食則諱而削之未可知也若慶厯四年十一月則以戊午食誤推戊申食相隔十日以為當食不食舛也甚矣惟乾德三年二月朔天聖二年五月朔則真當食不食為日度失行矣是其當食不食才二非真十也當食不食止二乃宋厯槩書十數若謂天數常乖可飾已誤布之短者然而日偶失行旋復其常以法布筭千載亡易也宋人步厯不精動稱天行無定或是已寃天或援天從已躱閃蓋藏載未必實當食不食動欲稱賀日暫入雲亦輒稱賀如夜食如過交亦曰驗天不食步乾興元年七月以戊辰推甲子相差五日步慶厯四年十月以戊午推戊申相差十日夫日且差而何有於時刻則其乾德三年二月天聖二年五月之二事或亦誤布未可知倘其誤步在夘辰候已不食及至當食之時在己午乃為雲雨掩蔽彼亦曰當食不食恐或有之耳何則宋日官工彌縫甚至於康定元年嘉祐四年兩正月朔兩露章以請欲移閏以避之是可為也孰不可為也古今律厯考卷二十五
