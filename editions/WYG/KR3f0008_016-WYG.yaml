body:
  text: 古今律厯考卷十六明邢雲路撰歴代八歴代考唐書僧一行者沙門夫慧禪師名一行也張姓初名遂魏州長樂人剡國公公謹之孫武功令檀之子少聰敏道士尹崇見而竒之曰此後生顔子也尋出家遍歴天下訪求異術至天台山國濟寺見寺前一院有流水一行立門屏聞院僧於庭中有布算聲而謂其徒曰今日當有弟子自逺來求吾法已合到門即除一算又謂曰門前水當西流弟子至矣一行返顧水果西流遂趨入拜求其法僧盡授之遂洞厯象隂陽推歩之學囘入嵩山髙宗詔之不起遁入荆州當陽山開元九年麟徳厯晷緯漸差課蝕不效宰相張說言之𤣥宗召見令造新厯遂與星官梁今瓉等造黄道游儀圗考校七曜行度準周易大衍之數别成一法撰開元大衍厯十五年草成一行卒年四十五賜諡曰大慧襌師歐陽修曰自太初至麟徳有二十三家與天雖近而未宻也至一行宻矣一行造厯上考黄顓夏商周魯五王一侯之遺式下集太初至於麟徳二十三家之衆議比其同異課其疎宻然其數一本於大衍今以唐厯志一一剖析之俾人易曉焉一行議厯本引易繫之文其意所主在乎五位相得而各有合之一言盖一行欲變諸家之法之名而一一附於大衍之數故取諸此曰天數始於一地數始於二合天地二始為三以位剛柔盖剛一柔二其數三也天數終於九地數終於十合天地二終為十九以紀閏餘終窮也易窮則變言閏亦日之窮餘故取以為義天數中於五地數中於六合天地二中為十一以通律厯天中五故有五音所以司日盖以宫商角徵羽之五音配於甲乙丙丁戊己庚辛壬癸之十干後代乾鑿度云日十干者五音是也地中六故有六律所以司辰盖以陽律六隂律六配於子丑寅夘辰巳午未申酉戌亥之十二支後代乾鑿度云辰十二者六律是也此合二中以通律厯也然曰五六為二中九十為二終即班固志五六天地之中十九年為章嵗合天地終數得閏法之說也曰五音司日六律司辰即楊子雲聲生於日律生於辰之說也此其於諸家之說同也參伍相周者參三也伍五也以二中之五與六互相因之五六因三十六五因三十共究於六十聖人以此見天地之心天地之心即天地之中也故劉羲叟曰一行以天地之中數作大衍厯最精宻正謂此也自五以降五四三二一為五行生數自六以徃六七八九十為五材成數錯而乘之以生數衍成數者相衍相乘也位一六而退極五十而増極者盖中極位居五六間自六五退而四三二而退至生數之一自五六増而七八九而増至成數之十一退極一増極皆由中之五六兩分之故以二中見天地之心一六為爻位之統者一生而六成之一與六合自一至六則二三四五在其中爻始於一終於六故以一六為爻位之統五十為大衍之母者五生而十成之五與十合自五至十則六七八九在其中六為太隂七為少陽八為少隂九為老陽乾坤六子皆自五十之數衍之中五衍母次十衍子故以五十為大衍之母六七八九十共積之得四十為成數一二三四五共積之得十五為生數以四十成數乘十五生數共得筭六百為天中之積以十五生數乘四十成數共得筭亦六百為地中之積即錯而乘之也天中六百與地中六百合之得一千二百置一千二百以大衍之數五十約而歸之得二十四則四象之四周於六爻盖四六二十四也仍置一千二百以四象周六爻之二十四約而歸之得五十則太極之一虚而不用包乎其用四十有九之數也綜成數之四十約歸中積之六百天數地數皆十五綜生數之十五約歸中積之六百天數地數皆四十兼十五與四十合為五十五天數二十五地數三十共為天地之數五十有五置天地之數五十有五以中五衍母之五位取而歸之得十一則復得二中之合矣盖天之中數五地之中數六為十一聖人合二中以見天地之心也蓍數之變九六各一者老陽之九一老隂之六一九與六為十五老陽乾為父老隂坤為母乾坤之象也七八各三者少陽之七三三七二十一少隂之八三三八二十四二十一合二十四共得四十五乃三少陽震長男坎中男艮少男三少隂巽長女離中女兌少女六子之象也故爻數通乎六十盖合乾坤之象十五六子之象四十五共六十也䇿數行乎二百四十盖以四象乘六十得二百四十也是以大衍為天地之樞如環之無端一行取以為律厯之大紀也夫數象㣲於三四㣲者少而尚㣲也章於七八章者多而漸章也卦有三㣲謂三候成氣䇿有四象謂隂陽老少三㣲四象合而為七揔之為二㣲之合所謂㣲於三四也天一在始地六在中三四在一與六間故二㣲之合在始中之際焉蓍以七備謂七七四十九䇿其數七卦以八周謂八八六十四卦其數八七備八周合而為十五總之為二章之合所謂章於七八也天五在中地十在終七八在五與十間故二章之合在中終之際焉中極居五六間謂天陽數奇一三五七九五在其中地隂數偶二四六八十六在其中天地之中數前乎㣲則闔後乎章則闢二㣲之合七二章之合十五五六合十一在㣲之七與章之十五間乃天地中和之數往來屈伸此為樞機以通神眀以前民用率由於此故曰由闢闔之交而在章㣲之際者人神之極也天中之積地中之積合之千有二百以四數揲而歸之得三百為爻率三百以天地十位之數十乗爻率三百得三千為二章之積三千以五材之數五乘八象之數八得四十為二微之積四十兼二章之積三千與二㣲之積四十共三千四十是謂通法又為日法則日之氣策與月之朔策之分母也置氣朔之母三千四十以三極之數三叅之叅者三因也三因得九千一百二十以六位之數六倍而為十二除前九千一百二十得七百六十是謂辰法而齊於代軌仍置通法三千四十以十位之數十乘之得三萬四百以大衍之數五十倍而為一百除前三萬四百得三百有四是謂刻法而齊於徳運於氣朔之母三千四十分五而半之得一千五百二十得天地出符之數於一千五百二十因而三因之得四千五百六十當七精返初之㑹考緯稱入元三百四歳為徳運七百六十嵗為代軌千五百二十嵗為天地出符四千五百六十嵗為七精返初是也易始於三㣲而生一象謂三㣲成著得一象也隂陽老少之四象成而後乾兌離震巽坎艮坤之八卦章三變皆陽剛太陽之象三變皆隂柔太隂之象一陽剛二隂柔少陽之象一隂柔二陽剛少隂之象少陽之剛有始有壯有究少隂之柔有始有壯有究始壯究皆謂三畫也自下而上始而壯而究也乾鑿度所謂物有始有壯有究故三畫而成乾是也兼三才而兩之則成六畫六爻既備神明動乎其中故大衍四十有九之用象數明備而大業之用周矣數之徳圎天圎圎一徑三故紀之以三陽以七為用故三而變於七從竒也象之徳方地方方一函四故紀之以四隂以八為用故四而變於八從偶也人在天地中以閲象數竒偶氣盈朔虚之變則有揲䇿歸扐以成閏餘而氣朔所虚日月嵗功所成也天數終於九地數終於十合而為十九謂之終合以終合之數十九通大衍之母通者乘也大衍之母五十也以十九乘五十得九百五十虧者減也地十者地數終於十也以九百五十之數減其一十凡得九百四十為通數以終合十九除通數得中率四十九餘十九分之九盖四十九下隔位餘九不盡故曰四十九餘十九分之九是終嵗之弦而斗分復初之朔乃推日月章蔀之法也夫十九分之九盈九而虚十者即前以十九除四十九下不盡之九數故曰盈九虧其地一十之數故曰虚十也地於終極之際虧十而從天所以逺疑陽之戰者盖坤地終於十為極數隂盛之極與陽偕矣隂疑於陽必戰故上六龍戰於野其血𤣥黄言天地皆傷也今地於極數虧去其十以從天則疑陽之戰可逺矣乾盈九不用則所盈之九𨼆乎坤盡上六龍戰爻中和而不戰九為龍首故不見其首坤虚一不用則所虚之十從於乾始初九潛龍爻中以導其氣坤順從天故不見其成周日之朔分周嵗之閏分與一章之弦一蔀之月皆合於九百四十盖取諸中率者謂諸術即前所謂中嵗之弦而斗分復初之朔者皆以九百四十為通數以終合除通數得中率四十九盖取諸此也一䇿之分十九而章法生者十九年七閏為一章也一揲之分七十六而蔀法生者一章十九年四章共七十六年故曰七十六而蔀法生四章為一蔀也一蔀之日二萬七千七百五十九者一章十九年凡二百三十五月以朔實二十九日五十三刻五分九十二秒一十㣲不盡乗之得六千九百三十九日六八九一不盡為一章之日以四章因之得二萬七千七百五十八不盡収而為五十九是為一蔀之日也以通數約之凡二十九日餘四百九十九而日月相及於朔為六爻之紀者盖四章凡九百四十月一行呼為通數以通數約而歸前一蔀之日得二十九日餘數四百九十九其日下餘數四百九十九仍以九百四十歸之得五十三刻五分九十二杪一十㣲不盡為朔餘共之即前朔實是日月相及於朔從揲策六爻所得之紀也以卦當嵗者積蔀首一百九十二紀一紀一千五百二十嵗得積嵗二十九萬一千八百四十以三十二卦除之得九千一百二十周盖三十二嵗為一周此為卦當嵗也以爻當月者一紀一萬八千八百月得積月三百六十萬九千六百以三百八十四爻除之得九千四百二十周盖三百八十四月為一周此謂爻當月也以䇿當日者一紀五十五萬五千一百八十日得積日一萬六百五十九萬四千五百六十以一萬一千五百二十坼除之得九千二百五十三周盖一萬一千五百二十日為一周此謂䇿當日也凡三十二嵗而小終二百八十五小終而與卦運大終二百八十五則參伍二終之合者終周也三十二嵗為一小周即一小終置三十二以二百八十五乘之得九千一百二十周乃二百八十五小終即前以卦當嵗一卦運大周之數也盖天地二數共終十九以參之三因十九得五十七以伍之五因五十七得二百八十五小終大終皆與二百三十五之數相合則參伍二終之合也數象既合而遯行之變在乎其間矣所謂遯行者以爻率三百乗朔餘四百九十九得一十四萬九千七百於一十四萬九千七百之中以四十九用二十四象共七十三數虚而減之餘一十四萬九千六百二十七數復以爻率三百約而歸之為四百九十八㣲以下分七十五六六不盡不盡即太半則章㣲之中率也二十四象象有四十九以二十四乘四十九為蓍一千一百七十六合二十四併四十九共七十三即前虚遯之數七十三也半其氣朔之母三千四十得一千五百二十參伍者一十五也以三極之三乘十五得四十五以兩儀乘二十四變得四十八因而併之者通前一千五百二十四十五四十八共得一千六百一十三為朔餘以通法三千四十歸之得五十三刻五分九十二秒一不盡即朔小餘也以揲之四數歸氣朔之母三千四十得七百六十於内遯而減去八氣之八九精之九共減十七得七百四十三為氣餘以通法三千四十歸之得二十四刻四十四分不盡即嵗小餘也以通法乘朔大餘二十九日得八萬八千一百六十併朔餘一千六百一十三共得嵗八萬九千七百七十三而氣朔㑹是謂章率又名揲法以通法乘章率得嵗二億七千二百九十萬九千九百二十而無小餘合於夜半是謂蔀率以六十因蔀率得嵗一百六十三億七千四百五十九萬五千二百以紀法除盡大餘與嵗建俱終是謂元率此不易之道也十九年為一章四章為一蔀二十蔀為一紀三紀為一元章法十九章月二百三十五蔀法七十六蔀月九百四十紀法一千五百二十紀月一萬八千八百元法四千五百六十元月五萬六千四百故至朔同日謂之章同在日首謂之蔀蔀終六旬謂之紀嵗朔又復謂之元一元四千五百六十年當七精返初之㑹也䇿以紀日象以紀月故乾坤之䇿三百六十自卦得之為日度之準乾坤之用四十九象自揲得之為月弦之檢日之一度不盈全䇿惟日度不盈全策故有中盈分置嵗實三百六十五日二十四刻四十四分以通法三千四十乘之得一百一十一萬三百四十三為䇿實另置嵗實大餘三百六十日以通法乘之得一百九萬四千四百分為嵗實大餘於䇿實内減去嵗實大餘得一萬五千九百四十三為䇿餘置䇿餘以十二月除之得一千三百二十八不盡為中盈分則十有二中所盈也月之一弦不盡全用惟月弦不盈全用故有用差置一月三十日以通法乘之得九萬一千二百為滅法内減去揲法八萬九千七百七十三得一千四百二十七為朔虚分置朔虚分以十二月乘之得一萬七千一百二十四為用差則十有二朔所虚也綜盈虚之數五嵗則再閏矣中節相距皆當三五一十五日有竒弦望相距皆當二七一十四日有竒升降之應發斂之候皆紀之以卦䇿而從日氣也表裏之行朓朒之變皆紀之以揲用而從月朔也積筭曰演紀者開元大衍厯演紀上元甲子距開元十二年積九千六百九十六萬一千七百四十筭也日法曰通法者即三千四十也月氣曰中朔者月中也朔實曰揲法者月䇿也嵗分曰策實者嵗周也周天曰乾實者置乾實一百一十一萬三百七十九七五以通法除之得周天三百六十五度二十五分六五為天周也餘分曰虚分者周天之虚分也氣䇿曰三元者置䇿實一百一十一萬三百四十三以二十四氣除之得四萬六千二百六十四再置十五日以通法乘之得四萬五千六百以減前數餘六百六十四加入十五日内為三元之䇿十五餘六百六十四若置嵗實三百六十五日二十四刻四十四不盡以二十四除之得一十五萬二一八五一六不盡為氣䇿也一元之䇿乃三元之䇿分而為三即五日有餘天中之候䇿遯甲以五十有餘為一元故曰天一遯行也月䇿曰四象者即四象之䇿二十九餘一千六百一十三也一象之䇿則二十九有餘以四象分之毎象七日有餘朔弦望相距也五行用事曰發斂者以發斂開闔法布五行也候䇿曰天中者置䇿實以七十二候除之得一萬五千四百二十一再以五日因通法得一萬五千二百以減前數餘二百二十一不盡加入五日内得五餘二百二十一秒為天中之䇿五餘二百二十一若以七十二除嵗周得數去大餘以通法乘小餘加入大餘亦得此歩七十二候之䇿也卦䇿曰地中者置䇿實以卦法六十除之得一萬八千五百五不盡再以六日因通法得一萬八千二百四以減前數餘二百六十五不盡加入六日内為地中之䇿六餘二百六十五若以六十除嵗周得數去大餘以通法乘小餘加入大餘亦得此歩六十卦之䇿也半卦曰貞悔者乃地中之䇿折半得三餘一百三十二不盡為貞悔之䇿此筭内卦外卦之䇿也其各䇿之下有秒者乃不盡之數如天中之䇿五餘二百二十一下有秒三十一秒法七十二即以秒法七十二筭之滿法則進上一䇿餘倣此旬周曰爻數者六十也小分毋曰象統者二十四也卦限者置䇿實以十二月除之得九萬二千五百二十八五八以減揲法八萬九千七百七十三餘二千七百五五五八為月閏置揲法減去月閏餘八萬七千一七不盡収而為八為卦限八萬七千一十八若置二中氣䇿三十日四三七三二減去月䇿二十九日五十三刻五九二一餘九十刻六四四以通法乘之得二千七百五五五八以減揲法八萬九千七百七十三亦得卦限謂之卦限者是再一月及揲法也歸餘之卦者置每嵗中積分累以揲法去之即今閏餘也以減中積為朔積以求天正經朔之䇿也嵗差三十六太者乃當時所測歳差每歳一分二十秒九六七一以通法乘之得三十六七五不盡也置乾實一百一十一萬三百七十九太太者七十五分也以減策實一百一十一萬三百四十三餘三十六七五為歳差即以通法歸乾實得周天三百六十五度二十五分六十四秒九十六㣲七一以減歳周三百六十五日二十四刻四十四分所餘一分二十秒九六七一即前每歳歳差之數也日行曰躔其差盈縮其積先後為日躔之度古用平朔即經朔無盈縮遲疾加減者以故月朔朝見曰朒夕見曰朓今以日之所盈縮月之所遲疾損益之進退其日以為定朔舒亟相錯偕以損益故同謂之朓朒也月行曰離其轉遲疾為月行之度以七十六為轉法滿轉法為度故曰度母列衰有變進加退減過中為速為伸不及中為遲為屈曰中者春秋分日行一度為中即其常也不率其常為過與不及則其南北逶迤屈行之數也陽曰先後以出令名隂曰屈伸以聽命名而損益之變生焉日不及中則損月則益日過中則益月則損即盈遲為加縮疾為減之義也凡日以赤道内為隂外為陽月以黄道内為隂外為陽隂陽厯之同異春秋分之加減皆從損益率來而黄赤之變分秒之差定矣在天道曰軌在圭景曰晷觀晷景之進退知軌道之升降而悉以水漏操其權盖漏以定辰分於昏明而晷景之陟降積晷之消息晝夜長短時刻屬焉則勾股之數使然也遊交即歩交㑹交終二十七餘六百四十五其周數也不及朔二餘九百六十七秒八千六百七十八為朔差日以通法歸餘得三十一刻八三七六加入二日即朔交差也不及望一餘四百八十三秒九千三百三十九即朔交半之之數為望交差也日道表曰陽厯即赤道外裏曰隂厯即赤道内也五星伏見周謂之終率即以歩終日之術以分從日謂之終日即終率所歩之日其差為進退則以損益率前後相減為進退積差以歩五星合伏之數也其二議中氣謂厯氣始於冬至稽其實取諸晷景也厯引春秋及累代南至併晦朔以殷周魯厯及麟徳等厯上下相較先後所差分數不一加減多少合此失彼考殷厯盖哀平間治甲寅元厯者託之非古也靈曜命厯序皆有甲寅元其所起乃在四分厯庚申元之後以開元十二年十一月陽城測景癸未極長以檢春秋及前代元嘉等冬至亦合此失彼先後天不一以為減閏餘減斗分之未善且麟徳厯已前實録所記乃依時厯書之非候景所得又比年候景所得長短不均由加時有早晏行度有盈縮晷景不等進退不齊皆古人所未達也其三議合朔謂日月合度謂之朔無所取之取之蝕也以殷周魯厯課春秋日蝕先後互失其偽可知春秋之蝕丘明即所聞以書仲尼因時史所記且列國赴告不一則厯術所書不齊長厯其日不在其月則改易閏餘以求合故閏月相距近則十餘月逺或七十餘月此杜預所甚謬也昔人考天事多不知定朔假蝕在二日而常朔之晨月見東方食在晦日則常朔之夕月見西方或以為朓朒變行或以為厯術踈闊遇常朔朝見則増朔餘夕見則減朔餘此紀厯所以屡遷也或又為月頻三大二小之説虞鄺曰所謂朔在㑹合茍躔次既同何患於頻大也日月相離何患於頻小也春秋不書朔者劉孝孫俱推得朔日乃議定朔為有司所抑不得行傅仁均始為定朔而曰晦不東見朔不西朓得昏明之限與定朔故也故麟徳厯有總法開元厯有通法故積嵗如月分之數而後閏餘皆盡其四議沒滅謂古以中氣所盈之日為沒沒分偕盡為滅開元以中分所盈為沒朔分所虚為滅終嵗沒分為䇿餘終嵗滅分為用差皆歸於揲易再扐而後掛也其五議卦候謂七十二候原於周公時訓月令自後魏始載於厯乃依易軌所傳不合經義今改從古其六議卦謂十二月卦出於孟氏章句京氏又以卦爻配朞之日用六日七分以附㑹緯文七日來復之說止於占災𤯝與吉凶善敗之事至於觀隂陽之變則錯亂而不明其七議日度謂古厯以天周為嵗終係星度於節氣故乆而益差虞喜覺之使天為天嵗為嵗乃立差以追其變以五十年退一度何承天以為太過乃倍其年而反不及皇極取中數為七十五年盖近之然未盡合也厯考春秋以來七政以漢唐以來諸家厯較之各有不同惟姜岌以月蝕衝知日度躔次遂正為後代治厯者宗何承天作元嘉厯以月蝕檢冬至在斗十七度又圭測差三日餘則天之南至在斗十三四度以開元考元嘉十年冬至日在斗十四度與承天所測合若皇極厯嵗差皆自黄道命之所差尤多是以開元厯皆自赤道推之乃以今有術從變黄道其八議日躔盈縮謂日躔盈縮當以二十四氣晷景考之而宻於加時其九議九道謂洪範傳云日有中道月有九行中道謂黄道也九行者青道二出黄道東朱道二出黄道南白道二出黄道西黒道二出黄道北日行西陸為春立春春分月東從青道日行南陸為夏立夏夏至月南從朱道日行東陸為秋立秋秋分月西從白道日行北陸為冬立冬冬至月北從黒道月行九道内為隂厯外為陽厯冬入隂厯夏入陽厯月行青道冬入陽厯夏入隂厯月行白道春入陽厯秋入隂厯月行朱道春入隂厯秋入陽厯月行黒道隂陽厯交在冬至夏至則月行青道白道所交則同而出入之行異故青道至春分之宿及其所衝皆在黄道正東白道至秋分之宿及其所衝皆在黄道正西若隂陽厯交在立春立秋則月循朱道黒道所交則同而出入之行異故朱道至立夏之宿及其所衝皆在黄道西南黒道至冬至之宿及其所衝皆在黄道東北若隂陽厯交在春分秋分之宿則月行朱道黒道所交則同而出入之行異故朱道至夏至之宿及其所衝皆在黄道正南黒道至冬至之宿及其所衝皆在黄道正北若隂陽厯交在立夏立冬則月循青道白道所交則同而出入之行異故青道至立春之宿及其所衝皆在黄道東南白道至立秋之宿及其所衝皆在黄道西北其大紀皆兼二道而實分主八節合於四正四維按隂陽厯中終之所交則月行正當黄道去交七日其行九十一度齊於一象之率而得八行之中八行與中道而九是謂九道凡八行正於春秋其去黄道六度則交在冬夏正於冬夏其去黄道六度則交在春秋日出入赤道二十四度月出入黄道六度相距則四分之一故於九道之變以四立為中交在二分増四分之一而與黄道度相半在二至減四分之一而與黄道度正均故推極其數引而伸之每氣移一候七十二候而九道究矣以朔交為交初望交為交中若交初在冬至初候而入隂厯則行青道又十三日有竒至交中得所衝之宿變入陽厯亦行青道若交初入陽厯則白道也故考交初所入而周天之度可知若望交在冬至初候則減十三日有竒視大雪初候隂陽厯而正其行也其說詳矣其十議晷漏中星謂日行有南北晷漏有長短二十四氣晷差徐疾不同者勾股使然也今推黄道去極與晷景漏刻昏距中星返覆相求旋相為中以合九服之變其十一議日蝕謂小雅十月之交朔日辛夘虞鄺推在幽王六年開元同且十月之交於厯當蝕詩人猶悼以為變然則古之太平日不蝕星不孛盖有之矣若過至其分月或變行而避之或五星潛在日下禦侮而救之或渉交數淺或在陽厯陽盛隂㣲則不食或得之休明而有小𤯝焉則天為之𨼆雖交而不蝕若四時之中分同道至相過交而有食則天道之常也凡日食必在交限其入限者不必盡蝕如開元十二年七月戊午朔於厯當蝕半强自交趾至朔方候之不食十三年十二月庚戌朔於厯當蝕太半時東封泰山還次梁宋間皇帝徹膳不舉樂不盖素服日亦不蝕時羣臣與八荒君長之來助祭者降物以需不可勝數皆奉夀稱慶肅然神服雖筭數乖舛不宜如此然後知徳之動天不俟終日矣若因開元二蝕曲變交限而從之則差者益多杜預云日月動物雖行度有大量不能不小有盈縮故雖有交㑹而不食者或有頻交而食者是也故循度則合於厯失行則合於占使日食而不可以常數求則無以課厯數之疎宻使日食而皆可以常數求亦何以占政教之休咎哉今以圎儀度日月之徑乃以月徑之半減入交初限一度半餘為闇虚半徑二徑相掩所減入限分數為斜射所差以得其數又日月交㑹自京師斜射而望之假中國食既則南方戴日之下所虧纔半月外反觀則交而不食故當歩九服日晷以定蝕分晨昏漏刻與地偕變則宇宙雖廣可以一術齊之矣其十二議五星謂嵗星自商周迄春秋之季率百二十餘年而超一次戰國後其行寖急至漢尚㣲差及哀平間餘勢乃盡更八十四年而超一次因以為常此其與餘星異也嵗星前後遲急率古今各有不同欲一術以求之則不可得大都五事感於下五緯變於上故王者失典刑之正則星辰為之亂行汨􅃔倫之序則天事為之無象當其亂行無象又可以厯紀齊乎故襄公二十八年嵗在星紀滛於𤣥枵至三十年八月始及娵訾之口越次而前二年守之晉永寧元年正月至閏月五星經天縱横無常永興二年四月丙子太白犯狼星失行在黄道南四十餘度永嘉三年正月庚子熒惑犯紫㣲皆天變所未有也終以二帝蒙塵天下大亂後魏神瑞二年十二月熒惑在瓠𤓰星中一夕忽亡不知所在崔浩以日辰推之曰庚午之夕辛未之朝天有隂雲熒惑之亡在此二日庚午未皆主秦辛為西夷今姚興據咸陽是熒惑入秦矣其後熒惑果出東井魏永平四年八月癸未熒惑在氐夕伏西方亦先期五十餘日雖時厯疎濶不宜若此夫日月所以著尊卑不易之象五星所以示政教從時之義故日月之失行也㣲而少五星之失行也著而多五星伏見之效皆係之於時而象之於政事㣲而象㣲事章而象章已示吉凶之象則又變行襲其常度不然皇天何以隂隲下民警悟人主哉近代筭者昧於象占者迷於數覩五星失行皆謂之厯舛雖七曜循􅁤猶或謂之天災終以數象相蒙兩喪其實故較厯必稽古今注記入氣均而行度齊上下相距反覆相求茍獨異於常則失行可知矣天竺厯以九執之情皆有所好惡遇其所好之星則趨之行疾捨之行遲亦此義也大衍厯演紀上元閼逢困敦甲子之嵗距開元十二年積九千六百九十六萬一千七百四十筭得甲子嵗通法三千四十乃一百六十章也䇿實百一十一萬三百四十二揲法八萬九千七百七十三轉終法六百七十萬一千二百七十九轉終日二十七餘千六百八十五秒七十九終數八億二千七百二十五萬一千三百二十二交終日二十七餘六百四十五秒千三百二十二以通法除䇿實得三百六十五日二十四刻四十四分七秒為嵗周以通法除揲法得二十九日五十三刻五分九十二秒為朔實以八十因通法得二十四萬三千二百以除轉終法得二十七日五十五刻四十六分一秒為轉終以通法除轉終日餘得數以加大餘亦得轉終以一百因通法得三十萬四千以除終數得二十七日二十一刻二二一一為交終以通法除交終日餘得數以加大餘亦得交終以歩五星嵗星終率百二十一萬二千五百七十九秒六熒惑終率二百三十七萬一千三秒八十六鎮星終率百一十四萬九千三百九十九秒九十八太白終率百七十七萬五千三十秒十二辰星終率三十五萬二千二百七十九秒七十二各以通法而一得木終日三百九十八日八十七刻四八火終日七百七十九日九十三刻五四土終日三百七十八日九刻二金終日五百八十三日八十九刻一四水終日一百一十五日八十八刻一四此僧一行大衍厯之所由作也自漢唐以來厯家惟一行最宻但不必一一附大衍耳盖厯原取象於大衍而非一一從大衍出也自後代乾坤鑿度出而謂厯出於大衍其載孔子言大衍日辰生厯律厯法四分度之一以卦爻䇿當嵗月日以歩章蔀紀元諸説皆非先天之文乃後人偽為之也何得援以為據使果可據則何至跬歩不可行夫厯莫疎於四分而猶以為孔子之言可乎則何可附也大都一行之厯原自測景觀象而得觀一行自言曰厯氣始於冬至稽其實取諸晷景也又曰日月合度謂之朔無所取之取之蝕也如嵗實乃測景所得者一行以通法乘嵗實為䇿實歸為氣積與四揲氣朔之母遯其八氣九精何關月䇿乃交蝕所得者一行以通法乘月䇿為揲法歸為􅃋積與半氣朔之母以三極乘參伍兩儀乘二十四變併之何預十九年七閏為一章一章二百三十五月四章為一蔀凡七十六年共計九百四十月以七十六年之九百四十月歸一蔀之日得月䇿與終合通大衍之母虧其地十以導潛龍之氣何渉二十五刻為半晝分至明也一行以通法乘二十五刻得七百六十為辰法且曰以三極參之倍六位除之其義何取滿十為日至明也一行以十除通法得三百四為刻法且曰以十位乘之倍大衍除之其義何居又以辰法齊於代軌刻法齊於徳運得天地出符之數七精返初之㑹此緯文也緯乃漢儒偽作謂為孔子語非其真也自有緯而落下閎始造太初厯以閏統元㑹得日法以五氣正餘凖大統俱屬􅆾謬漢厯皆依偽鑿度偽易緯以治厯以致終漢之世厯數不明一行達者而亦為是言他何望焉且各數以三千四十乘之復以三千四十歸之諸家日法胥同一轍則三千四十之數又何憑而出自章微之積耶故易曰大衍之數象四時象閏苐象之而已又曰乾坤之䇿三百六十當期之日厯三百六十有竒而止以三百六十當之亦取其象耳厯法之難正在竒數之分秒實窺測所得而非大衍所推也謂厯數合大衍之象則可謂厯數之分秒皆出於大衍則不可一行盡一一之數皆附於大衍亦大勞矣故章俊卿論大衍云一行倚大衍之數立推歩之法是一行求合於大衍非大衍合一行之數也且一行之十有二議發千古所未發詳且盡矣乃其中猶有一二可更訂者如中氣議一行厯引春秋以來南至以殷周厯并緯書及漢唐諸厯上下附合得此失彼然而不必然也春秋測驗不精書諸南至未必真的緯書與殷周六厯皆四分法不可為據漢唐以來日官所測晷率多遷就為之如祖冲之既失甲戌冬至以為加時太早便欲増小餘以附㑹之是也諸如此數何必一一與辯故授時厯云諸應随時測定不用元法是確論也一行於開元十二年十一月陽城測景癸未極長以授時歩開元十二年甲子嵗冬至一十九日八十九刻六十四分得癸未亥初二刻冬至脗合以斯驗授時之精逺考諸開元不􅍝乃實測之效矣沒滅議其數是苐不必歸之揲扐卦議既謂京房卦爻錯亂不明則公中孚之類削之可也而未削至授時始削之為當耳日度議一行厯引古今日度合此失彼然亦不必然也盖古今日度未必真的率有附㑹如中氣然則何必一一與辯其歩仲康五年癸巳嵗九月庚戌朔日蝕則非是辯在尚書簡中是蝕一行以為五年虞鄺以為元年授時歩乃六年考殷時又多外丙二年仲壬四年一以為有一以為無不同又有謂太史公歩帝王厯年多差訛者然則古厯年之某嵗某甲子其真否未可知也授時歩仲康六年丁夘嵗九月辛巳朔日食其餘前後十餘年之九月朔俱不入食限夫既歩入仲康年入食限矣則不必計其元年與五六年也九道議引洪範傳言日有中道月有九行是矣上考乾鑿度先文曰日行一度坤鑿度先文引制靈經曰天有九道斯鑿度先文乃上古真書非若後文之假託者乃知洪範傳文本於乾坤鑿度之先文也日蝕議謂月或變行避日或五星濳在日下救日或有徳天為之𨼆雖交不食此皆無慿之論也謂在陽道陽盛不食然陽道自有歩陽八度法安得信為不食謂四時分至同道交食為常然分至言其行之中非其遇之中也遇而交則周天之辰無處不可豈有以分至為常者耶謂入交不食開元年二事則誠如其言法推開元十二年甲子嵗七月朔五十四日三十刻交二十六日得戊午日辰時日食十三年乙丑嵗十二月朔四十六日六十三刻交十四日得庚戌日申時日食是為當食不食日月失行之致然此㡬百年才一二見其變也而非其常也過此則仍復其常可以歩之千萬年亾易者七政皆然不獨日也若一行謂徳之動天不俟終日則逢君好諛之惡非所以為訓也唐道士邢和璞嘗謂尹愔曰一行其聖人乎漢時落下閎造厯云後八百嵗當差一日必有聖人正之今年期畢矣而一行造大衍正其差謬則落下閎之言信矣非聖人而何然據一行嵗差以三十六太布乾實與䇿實得每嵗嵗差一分二十秒九㣲乃八十三年差一度而非八百年差一日也在開元八十三年差一日在授時六十六年差一日此黄赤冬至嵗差也而嵗差之外復有消長一機一行未及言之所以大衍厯不百年而即差以歩至今其差益逺然授時之所以精於大衍者則以消長之數得也今以大衍授時大統三厯試參考焉大衍厯演紀積九千六百九十六萬一千七百四十筭以䇿實一百一十一萬三百四十三乘積筭得一百七萬六千六百七億八千九百二十七萬六千八百二十為中積分以通法除之得三百五十四億一千四百七十三萬三千三百一十四日七四三四為積日以爻數六十累除之餘一十四日七十四刻三十四分為天正冬至分大餘一十四得戊寅日小餘七十四刻三十四分得酉初三刻冬至置中積分以揲法八萬九千七百七十三累去之不盡之數餘四萬九千一百七為歸餘之卦以通法歸之得一十六日一十五刻三十六分為閏餘分以閏餘減冬至不及減加六十日減之得五十八日壬戌日五十八刻九十八分為天正經朔分大衍嵗實是測晷所得者一行以通法因之為䇿實以通法歸之為嵗實也大衍朔周三百五十四日三十六刻七一不盡是觀象所得者一行以揲法去䇿實餘三萬三千六十七為歸餘之卦以減䇿實餘一百七萬七千二百七十六日以通法而一為朔周也大衍月䇿是朔周以十二月分之者一行以通法歸揲法為月䇿也大衍嵗實較授時嵗實止多一十九分大衍月䇿較授時月䇿止少九十㣲然則一行厯氣朔誠甚宻而所少者止消長一事耳以授時上推開元十二年甲子嵗冬至至元辛巳五百五十七年推得二十萬三千四百四十日三十五刻一十秒為中積分減氣應得數為通積滿旬周去之得數以減旬周得十四日戊寅日七十刻九十分較大衍差三刻四十四分以大統厯上推開元十二年冬至得十四日戊寅日九十八刻七十五分較大衍差二十四刻三十九分以大衍厯下推至元辛巳距元九千六百九十六萬二千二百九十七筭得中積一百七萬六千六百一十四億七百七十三萬七千八百七十一積日三百五十四億一千四百九十三萬六千七百五十五日八十七刻八十六分得冬至五十五日己未日八十七刻八十六分較授時差八十一刻八十八分夫大衍稱親宻矣何差至八十餘刻則以消長之法未具也古今律厯考卷十六
