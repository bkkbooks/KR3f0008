body:
  text: 古今律厯考巻九明邢雲路撰歴代一歴代考皇帝紀太昊伏羲氏繼天而王為百王先首徳始於木故為帝太昊作罔罟以田漁取羲牲故號庖犧氏作五運二十四氣以支干配十二辰六甲而天道周矣作荒樂歌扶徠詠罔罟以鎮天下之人命曰立基斵桐為琴繩絲為絃絃二十有七命曰離徽以合天人之和絙桑為三十六絃之瑟以修身理性反其天真而樂音自是興焉乾鑿度曰上古聖庖犧氏頤乾道浩大以天門為名乾訓健壯健不息日行一度鑿者開也聖人鑿開天路斷氣為二縁物成三天地之道不輪薄不息以啟三光變文為字變氣為易畫卦為象象成設位古文天字古地字風字山字水字火字雷字澤字乾為天門坤為人門巽為風門亦為地户艮為鬼㝠門庖犧氏畫四象立四隅以定羣物發生門而後立四正四正者定氣即分至四正氣一日月出沒二隂陽交爭三天地德四正月坎水日離火雷震木日月出入門日出震月入於震澤金兑日月徃來門月出澤日入於澤天數二十五地數三十天地合和數五十五所用法古四十九六而不用驅之六虚坤鑿度曰制靈經曰天有九道日月經厯之道坤有四㝠象化氣成乾坤在道日月相將山墳伏犧皇筞辭皇曰命子英居我潛龍之位主我隂陽甲厯咨於四方潛龍昊英氏進厯於君厯起甲寅皇乃鳩衆升傳敎臺咨告於民俾知甲厯日月歲時自兹始炎帝神農氏以火承木故為炎帝敎民耕農故號神農氏分八節以始農功作樂名扶持亦名下謀氣墳神農氏政典皇曰正天時時正惟四亂時不植氣正惟和氣亂作癘嗟爾有官咸若我辭黄帝有熊氏以土承火故為土德始垂衣裳有軒冕之服故號軒轅氏黄帝創受河圖設靈臺使羲和占日常儀占月鬼臾蓲占星伶倫造律呂大撓作甲子𨽻首作筭數容成綜此六術以考氣運定納音天以六節地以五制司天氣者六期為備終地紀者五歲為周五六合者三十歲七百二十氣為一紀六十歲千四百四十為一周於是有天地神祗物類之官是謂五官各司其序作盖天以象天形起消息察發斂以作調厯歲紀甲寅日起甲子是歲己酉朔旦日南至而獲神策寶鼎焉乃迎日推策造十六神厯置閏設蔀時惠而辰從律度量衡由是而成民以是能有信神以是能有明德民神異業敬而不凟故神降之嘉生民以物享災禍不生所求不匱命伶倫自大夏之西昆侖之隂取竹於嶰谿之谷以生空竅厚匀者斷兩節間吹之以為黄鐘之宫制十二筩以聽鳯凰之鳴其雄鳴六雌鳴亦六生六律六吕半之為清聲倍之為緩聲三分損益還相為宫以配十二月以立宮商角徴羽之聲作五鐘青曰大音赤曰重心黄曰灑池黒曰𨼆常白曰景鐘作咸池之樂以張於洞庭之野言其德象池水周遍也唐至德二年洞庭側有穿地得古鐘有古篆文黄帝時樂器形墳軒轅氏政典皇曰岐伯天師爾司日月星辰隂陽厯數爾正爾考無有差貸先時者殺不及時者殺爾惟戒哉少昊金天氏承土以金德王故號金天氏鳯鳥適至因以鳥紀官鳯鳥氏為厯正𤣥鳥氏司分伯趙氏司至青鳥氏司啓丹鳥氏司閉作大淵之樂以諧神人和上下顓頊高陽氏承金以水德王以少昊之四子重為木正曰勾芒該為金正曰蓐收修熈皆代為水正曰𤣥㝠又以炎帝之子勾龍為土正而帝之孫黎為火正曰祝融分治五方是為五官因少昊氏衰九黎亂德家為巫史民凟於祀乃命南正重勾芒司天以屬神北正黎祝融司地以屬民使復舊常無相侵凟是謂絶地天通始為儀制驗其盈虚升降制厯正以孟春是歲正月己丑朔旦立春五星會於營室是為厯宗命飛龍氏會八風之音作承靈之樂名曰六莖莖根也謂澤及根荄也帝嚳高辛氏承水以木德王式序三辰命咸黒作六英之樂六英言天地四時之英華也厯日月而迎送之帝堯陶唐氏承木以火德王因三苖服九黎之德二官咸廢厥職閏餘乖次孟陬殄滅攝提無紀厯數失序乃復育重黎之後羲氏和氏命作渾儀厯象日月星辰置閏成歲敬授人時名朞曰載年耆禪舜曰天之厯數在爾躬舜攝政在璿璣玉衡以齊七政取北斗第二星名璇第三星名璣第五星名衡之義即堯渾儀王蕃云渾天儀者羲和之舊器也協時月正日同律度量衡俱詳見尚書考中堯命䕫作大章之樂大章章之也謂帝德顯暴也重黎欲益求人舜曰一䕫足矣舜造五絃琴歌南風之詩九叙惟歌作箾韶九成之樂韶之言紹謂繼紹唐堯也是時十日並出堯使羿繳大風於青邱之澤上射十日此淮南子妄誕之言也羿人耳安能射日然天有數日則有之歴代日有二三或數者每書之史册皆其日光之映非真日也然旋復其常仍一日耳何也即厯數之推千歲日躔的有定度以斯知日之無二也帝舜有虞氏承堯以土德王讓天下於禹三王紀伯禹夏后氏承舜以金德王改載曰歲顓頊以來堯舜皆用寅正禹因之故稱夏后氏得人統孔子曰我欲觀夏道吾得夏時焉鄭康成云夏四時之書也其書存者有小正大戴禮有夏小正一篇盖戴德取以為正也其時正令善後世遵用之大禹聲為律以五音聽治作大夏樂夏大也言能大堯舜之德也仲康時辰弗集於房詳見尚書考中成湯革夏命承夏以水德王號曰商亦曰殷以建丑之月為歲首得地統改歲為祀作殷厯然殷雖改正其編年紀事則仍用夏時禱於桑林而雨歲則大熟作桑林之樂名大護護之言救謂去虐救民也周武王承殷以木德王因紂作滛樂䘮其甲子誅之乃以建子之月為歲首得天統改祀為年作周厯周建子則以子月為正月不用夏時矣吹律聽聲作大武樂象武功也周公作魯厯傳曰火出於夏為三月於商為四月於周為五月盖夏建寅三月而火出於辰五月而火中於午七月而火流於申十月而火伏於亥商周以次推之是矣然火出之候昔時則然而後不然也天星漸移厯周歲火皆可居則歲差易之非一定矣六厯者黄帝調厯顓帝厯夏厯殷厯周厯魯厯是為六厯後厯代十一更年五千加以太初三統厯為七厯漢末集七厯以考春秋夏周厯與漢藝文志所記不同故更名真夏厯真周厯夫既曰真則必有偽杜預作長厯謂周衰世亂學者莫得其真所傳古厯未必是時王之術也預以長厯驗春秋日食之數而知三統之最疎盖春秋日食三十六以三統推之止得一食之數姜岌又併夏厯真夏厯周厯真周厯得十三十四食之數其真夏厯真周厯止得一食之數與三統厯同豈其真者反不及非真者歟岌以七厯考古今交㑹信無其驗皆由斗分疎之所致宋書議周漢之際疇人喪業曲技競設圖緯實繁或借帝王以崇其大或假名聖賢以神其説是以讖記多虚桓譚知其矯妄古厯舛雜杜預疑其非真按五紀論黄帝厯有四法顓頊夏周竝有二術詭異紛然孰識其正顓頊厯元在乙卯而命厯序云在甲寅夏厯七曜西行特違衆法漢人以為後人所造殷厯日法九百四十而乾鑿度云殷厯以八十一為日法春秋書日食朔二十六其所據厯非周則魯以周厯檢之失二十五魯厯檢之失十三諸凡如此是尚可以為厯也乎大都六家之厯率皆六國及秦時漢初人所造六術斗分並同四分四分之法其分太多率皆後天以步朔日或差二日三日上不可檢於春秋下不驗於漢魏其非三代以前之厯明甚及考四分之法終漢之世皆同或者漢人欲實已四分之真故假作六厯以古附今未可知也不然豈有帝王制厯而一槩疎闊至此耶漢書稱武王元年一月戊午師渡于孟津明日己未冬至至庚申二月朔日也四日癸亥夜陳五日甲子昧爽而合以授時推武王元年己卯歲距元至元辛巳二千四百二年中積八十七萬七千三百一十八日二十四刻九十八分天正冬至五十六日八十一刻得庚申日戌初一刻冬至一月子月定朔二十九日九十四刻癸巳日亥時合朔以歩至二月丑月定朔五十九日五十七刻癸亥日未時合朔則二月一日癸亥二日甲子也以是知武王於一月二十六日戊午渡孟津二十七日己未二十八日庚申冬至大盡二月一日癸亥至商郊二日甲子伐商非己未冬至亦非二月庚申朔也盖漢厯斗分太多故推冬至差一日推朔差三日考太公六韜太公告武王曰律管十二其音有五宫商角徴羽也以天清浄無隂雲風雨夜半遣輕騎徃至敵人之壘去九百歩外徧持律管當耳大呼驚之有聲應管其來甚微角聲應管當以白虎徴聲應管當以𤣥武商聲應管當以朱雀羽聲應管當以勾陳五管聲盡不應者宫也當以青龍此五行之符佐勝之徴也微妙之音皆有外候敵人驚動則聽之聞枹鼓之音者角也見火光者徴也聞金鐵矛㦸之音者商也聞人嘯呼之音者羽也寂寞無聞者宫也此五音者聲色之符也由是觀之律音通於兵法周禮馮相氏掌十有二歲十有二月十有二辰十日二十有八星之位辨其叙事以㑹天位冬夏致日春秋致月以辨四時之叙保章氏掌天星以志星辰日月之變動以觀天下之遷辨其吉凶以星土辨九州之地所封封域皆有分星以觀妖祥以十有二歲之相觀天下之妖祥以五雲之物辨吉凶水旱降豐荒之祲象以十有二風察天地之和命乖别之妖祥凡此五物者以詔救政訪序事大司樂掌成均之灋以治建國之學政而合國之子弟焉凡有道者有德者使敎焉以樂德敎國子中和祗庸孝友以樂語教國子興道諷誦言語以樂舞敎國子舞雲門大巻大咸大㲈大夏大濩大武以六律六同五聲八音六舞大合樂以致鬼神示以和邦國以諧萬民以安賓客以悦逺人以作動物乃分樂而序之以祭以享以祀乃奏黄鍾歌大呂舞雲門以祀天神乃奏太蔟歌應鍾舞咸池以祭地示乃奏姑洗歌南呂舞大㲈以祀四望乃奏蕤賓歌函鍾舞大夏以祭山川乃奏夷則歌小呂舞大濩以享先妣乃奏無射歌夾鍾舞大武以享先祖凡六樂者文之以五聲播之以八音凡六樂者一變而致羽物及山川之示再變而致臝物及山林之示三變而致鱗物及邱陵之示四變而致毛物及墳衍之示五變而致介物及土示六變而致象物及天神凡樂圜鍾為宮黄鍾為角太蔟為徵姑洗為羽雷鼔雷鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜邱奏之若樂六變則天神皆降可得而禮矣凡樂函鍾為宮太蔟為角姑洗為徴南呂為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方邱奏之若樂八變則地示皆出可得而禮矣凡樂黄鍾為宮大呂為角太蔟為徴應鍾為羽路鼓路鼗隂竹之管龍門之琴瑟九德之歌九㲈之舞於宗廟中奏之若樂九變則人鬼可得而禮矣周公攝政四年以土圭之灋測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所會也隂陽之所和也然則百物阜安乃建王國焉制其畿方千里而封樹之此就四方測景以求地中也南近日則景短而暑北逺日則景長而寒東近海故景夕多風西近山故景朝多隂故必求南北之中而復求東西之中然後當東西南北各九十一度之中春秋分晝夜各五十刻夏至日在嵩高之南十二度南戴日下表南表北皆無景在今之交廣周公於洛陽天地之中立八尺之表以測夏至日景尺有五寸測冬至日景一丈三尺有竒乃建王國於中故曰南望三塗北望嶽鄙顧瞻有河粤瞻洛伊是也後之測日景者取則焉漢書稱武王即位十一年周公攝政五年正月丁巳朔旦冬至殷厯以為六年戊午以授時推周公攝政五年乃六年庚寅歲前天正距元至元辛巳二千三百九十一年中積八十七萬三千三百日三十一刻六十八分天正冬至五十四日七十四刻四十三分得戊午日未初三刻冬至日躔牛宿四度為是殷厯謂六年前天正戊午冬至同漢厯推丁巳亦猶推武王元年冬至之先天一日也若以大統推是年甲子卯初三刻冬至日躔女三度則相差六其日在天違六度餘失益逺矣按國語虢公告周宣王曰䢉祥晨正日月底於天廟註䢉祥房星晨正謂立春之日晨中於午位也䢉事之候故曰䢉祥底至也天廟營室謂孟春之月日月會於營室也考孟春䢉祥晨正日月會於營室周宣時則然久之天日漸移十二月皆可䢉祥辰正日月皆可會於營室非一定也如今萬厯年間孟春日月會於尾昏畢中旦房中去周宣一千五百餘年退天二十六度有竒矣周幽王六年十月之交日食詳見詩經考中春秋日食三十六并厯數俱詳見春秋考中單子過陳歸告周定王曰辰角見而雨畢天根見而水涸本見而草木節解駟見而隕霜火見而清風戒寒故先王之敎曰雨畢而除道水涸而成梁草木節解而備藏隕霜而冬裘具清風至而修城郭宮室故夏令曰九月除道十月成梁其時儆曰營室之中土功其始今陳國火朝覿矣而道路若塞是廢先王之敎也其能久乎九年楚子入陳註辰角角星建戌之初朝見東方寒露節雨氣畢也天根氐亢之間也雨畢後五日天根朝見秋水始涸本氐也寒露後十日氐見草木之枝節皆理解也天駟房星建戌之中房見霜始降火心星火見霜降之後清風至所以戒人為寒備也故九月雨畢而除道十月水涸而成梁季秋節解農事備藏將冬隕霜冬裘具火見之後建亥之初修城郭宫室建亥小雪之中營室定星昏正於午土功乃興今陳國十月心星辰見於晨而道茀不可行是廢先王之敎也考時至事起若單子所云諸令惟周宣時為然久之各異與上䢉祥晨正日月底於天廟同景王將鑄無射問律於泠州鳩對曰律所以立均出度也均均鐘木長七尺有弦繫之以均鐘度鐘大小清濁也古之神瞽考中聲而量之以制神瞽古樂正知天道者死而為樂祖祭於瞽宗謂之神瞽度律均鐘百官軌儀度律呂之長短以平其鐘立百事之道法故律度量衡於是乎生紀之以三天地人平之以六六律成於十二十二律呂天之道也天之大數不過十二夫六中之色也故名之曰黄鐘十一月曰黄鐘乾初九也六者天地之中天有六母地有五子十一而天地畢矣而六為中黄鐘管長九寸九之為八十一故黄鐘之數立焉黄中之色也鐘之言陽氣鐘聚於下也所以宣養六氣九德也六氣隂陽風雨晦明九德水火金木土榖正德利用厚生十一月陽復於下物始萌於五聲為宫含元處中所以徧養六氣九德由是第之次也二曰太蔟所以金奏贊陽岀滯也正月曰太蔟乾九二也管長八寸太蔟言陽氣太蔟達於上也太蔟正聲為商金奏佐陽發出滯伏也三曰姑洗所以脩潔百物考神納賓也三月曰姑洗乾九三也管長七寸一分姑潔洗濯考合也於正聲為角是月百物脩潔故用之宗廟合致神人用之享宴可以納賓四曰蕤賓所以安靖神人獻酬交酢也五月曰蕤賓乾九四也管長六寸三分蕤委蕤柔貌言隂氣委蕤於下陽氣盛長於上有似賓主故用宗廟賓客以安静神人行酬酢也酬勸酢報也五曰夷則所以詠歌九則平民無貳也七月曰夷則乾九五也管長五寸六分夷平則法也言萬物既成可法則也故可以詠歌九功之則成民之志使無疑貳六曰無射所以宣布哲人之令德示民軌儀也九月曰無射乾上九也管長四寸八分宣徧軌道儀法也九月陽氣收藏萬物無射見者故可以徧布前哲之令德示民道法為之六間以揚沈伏而黜散越也六間六呂在陽律之間沈滯越揚也呂隂呂所以侶間陽律成其功𤼵揚滯伏之氣而去散越者也元間大呂助宣物也十二月曰大呂坤六四也管長八寸四分隂繫於陽以黄鐘為主故曰元間以助陽宣物也天氣始於黄鐘萌而赤地受之於大呂牙而白成黄鐘之功也二間夾鐘出四隙之細也二月曰夾鐘坤六五也管長七寸四分隙間也四隙四時之間氣微細者春為陽中萬物始生故夾鐘出四時之微氣三間中呂宣中氣也四月曰中呂坤上六也管長六寸六分陽氣起于中至四月宣散於外純乾用事故曰正月正月正陽之月也四間林鐘和展百事俾莫不任肅純恪也六月曰林鐘坤初六也管長六寸林衆鐘聚也於正聲為徴展審肅速純大恪敬也言時務和審莫不任其職事速其功大敬其職也五間南呂贊陽秀也八月曰南呂坤六二也管長五寸三分於正聲為羽南任也隂任陽事助陽秀發六間應鐘均利器用俾應復也十月曰應鐘坤六三也管長四寸七分應隂應陽用事萬物鐘聚均利百官器用皆應其禮復其常也律呂不易無姦物也故先王貴之王曰七律者何周有七音黄鐘為宮太蔟為商姑洗為角林鐘為徴南呂為羽應鐘為變宮蕤賓為變徴對曰昔武王伐殷歲在鶉火鶉火周分野武王伐殷東行時殷之十一月戊子於夏為十月是時歲星在張張鶉火也月在天駟天駟房星也謂戊子日月宿房日在析木之津津天漢也析木其間為漢津謂戊子日日宿箕辰在斗柄辰日月之會斗柄斗前也謂戊子後五日得周正月癸巳朔於殷為十二月夏為十一月是日月合辰斗柄前星在天黿星辰星也天黿次名一曰𤣥枵為天黿謂周正月朔辰星在須女伏天黿之首武王發行二十六日戊午渡孟津距戊子三十一日二十八日庚申冬至二月一日癸亥二日甲子伐商星與日辰之位皆在北維星辰星辰星在須女日在析木辰在斗柄皆在北維北維北方水位也顓頊之所建也帝嚳受之顓頊帝嚳所代也帝嚳周之先祖后稷所出也顓頊水德之王立於北方帝嚳木德故受之於水今周亦木德當受殷之水猶帝嚳之受顓頊也我姬氏出自天黿姬氏周姓天黿即𤣥枵齊之分野也周之皇妣王季之母大姜者逢伯陵之後齊女也故言出於天黿又曰有星出於須女姜氏任氏實守其祀及析木者有建星及牽牛焉析木日辰所在建星在牽牛前謂從辰星所在須女天黿之首至析木之分歴建星及牽牛皆水宿言得水類也則我皇妣大姜之姪伯陵之後逢公之所馮神也皇居也生曰母死曰妣大姜大王之妃王季之母姜女也女子謂昆弟之子男女皆曰姪伯陵大姜之祖有逢伯陵也逢公伯陵之後大姜之姪殷之諸侯封於齊地齊地屬天黿故祀天黿死而配食為其神主故云馮馮依也言天黿乃皇妣家之所馮依非但合於水木相承而已歲之所在則我有周之分野也歲星在鶉火鶉火周之分野歲星所在利以伐人月之所在辰馬䢉祥也辰馬謂房心星也心星所在大辰之次為天駟駟馬也故曰辰馬言月在房合於䢉神也祥猶象也房星晨正而䢉氏起故謂之䢉祥我太祖后稷之所經緯也稷播百榖故䢉祥后稷之所經緯也晉語曰辰以成善后稷是相王欲合是五位三所而用之五位歲月日星辰也三所逢公所馮神周分野所在后稷所經緯也自鶉及駟七列也鶉鶉火之分駟天駟在房歲月之所在從張至房七列合七宿謂張翼軫角亢氐房之位南北之揆七同也七同合七律也揆度也歲在鶉火午辰星在天黿子鶉火周分野天黿及辰水星周所出自午至子其度七同也凡神人以數合之以聲昭之凡合神人之樂以數合之謂取其七以聲昭之用律調音數合聲和然後可同也同謂神人相應故以七同其數而以律和其聲於是乎有七律七同其數謂七列七同七律也律和其聲律有隂陽正變之聲王以二月癸亥夜陳未畢而雨二月一日癸亥至牧野夜陳師未畢而雨以夷則之上宫畢之以夷則為宫聲以聽軍聲陽氣在上故曰上宫當辰辰在戍上故長夷則之上宫名之曰羽長謂先用之也辰時也辰日月之會斗柄也當初陳之時周二月昏斗建丑而斗柄在戌上下臨其時名其樂為羽羽翼其衆也所以藩屏民則也羽之義取藩蔽民使中法則王以黄鐘之下宫布戎於牧之野夜陳之晨旦甲子昧爽黄鐘在下故曰下宫故謂之厲所以厲六師也名北樂為厲所以厲六軍之衆也以大蔟之下宫布令於商昭顯文德底紂之多辠文文王也底致也既殺紂入商之都發號施令以昭明文王之德致紂之多辠太蔟所以贊陽出滯盖謂釋箕子囚㪚鹿臺之財發鉅橋之粟也太蔟在下故曰下宫故謂之宣所以宣三王之德也三王大王王季文王反及嬴内以無射之上宫布憲施舍於百姓嬴内地名憲法也施施惠舍舍辠也無射所以宣布哲人之令德示民軌儀無射在上故曰上宫故謂之嬴亂所以優柔容民也亂治也伐商之歲日月辰所在亦惟其時則然久亦各異與䢉祥晨正同晉文公在翟十二年行過五鹿乞食於野人野人舉塊以與之公怒將鞭之子犯曰天賜也民以土服又何求焉天事必象十有二年必獲此土歲在壽星及鶉尾其有此土乎歲在壽星謂得塊之歲魯僖十六年後十一年歲在鶉尾必有此五鹿地魯僖二十七年歲在鶉尾二十八年歲復在壽星晉文公伐衛天以命矣復於壽星必獲諸侯歲復在壽星謂魯僖二十八年是歲四月文公敗楚師合諸侯於踐土五月獻俘於王王策命為侯天之道也天之大數不過于二董因迎晉文公於河公問焉曰吾其濟乎對曰歲在大梁將集天行元年始受實沈之星也歲在大梁謂魯僖二十三年言公得成天道也公以辰出晉祖唐叔所以封也而以參入晉星也元年謂文公即位之年魯僖二十四年歲星去大梁在實沈之次受受於大梁也實沈之虚晉人是居所以興也今君當之無不濟矣君之行也歲在大火大火閼伯之星也是謂大辰君行謂魯僖五年重耳出奔時歲在大火大火大辰也晉唐叔封時歲在大火且以辰出而以參入皆晉祥也參在實沈而天之大紀也濟且秉成必霸諸侯關尹子七釜篇曰人之一呼一吸日行四十萬里非也周天三百六十五度有竒每度千餘里此厯代以表之勾股測天所得者乃謂一呼吸日行四十萬里乎或謂關令尹喜所撰九篇為人所假托者誠然王充論衡言魯襄公與韓戰戰酣日暮公援戈而揮之日為之反三舍又言燕太子丹朝於秦不得去從秦王求歸秦王執留之與之誓曰使日再中乃得歸當此之時天地祐之日為再中此言皆虚也日度運行數有一定雖聖神不能挽之魯襄燕丹豈能揮挽或謂王充論衡八十五篇二十餘萬言鄙誕者多誠然列子曰共工氏與顓頊氏争為帝怒觸不周山天柱折地維缺故天傾西北日月星辰就焉地不滿東南百川水潦歸焉女媧氏煉五色石以補天荒唐無稽之言不足辯也列子湯問篇云孔子東遊見二小兒辯鬬問其故一小兒曰我以日始出時去人近而日中時遠也一小兒曰我以日出時逺而日中時近一小兒曰日初出時大如車葢及日中時如盤盂此不為遠者小而近者大乎一小兒曰日初出滄滄涼涼及其中如探湯此不為近者熱而遠者涼乎孔子不能決兩小兒笑曰孰謂汝多知乎此列子寓言淺之乎其為見也豈以孔子而不能辯此耶夫日初出大海氣之映也與日入同日中之小則精光四散若見其小也猶人之視燭遠見大而近見小者然若日初出涼者日方自地出熱未盛也日中氣熾而熱至日是更燠則熱之積也何異之與有以渾儀測之日徑一度周天三百六十五度有竒以四分之得九十一度有竒是日徑一度無大小也以春秋分之中論日去地九十一度有竒日中午與出卯没酉皆同無遠近也此璣衡可窺之數以歩氣朔萬世不易者列子不知天數而鑿空妄言以誣宣聖其與叔孫武叔毁仲尼之日月何殊楚辭曰攝提貞于孟陬兮惟庚寅吾以降言斗柄指寅為正月也鶡冠子亦云斗柄東指天下皆春斗柄南指天下皆夏斗柄西指天下皆秋斗柄北指天下皆冬柄運於上事立於下此聖人究道之情究道之法也殊不知正月指寅周時則然而後亦各異矣前漢天文志謂古厯五星之推亡逆行者至甘氏石氏經以熒惑太白為有逆行夫厯者正行也古人有言天下太平五星循度亡有逆行日不食朔月不食望立八尺之表夏至景長尺五寸八分冬至景長丈三尺一寸四分春秋分景長七尺三寸六分若南北失節晷過而長為常寒退而短為常燠一曰晷長為旱奢為扶扶者邪臣進而正臣疎鄭氏曰扶當為蟠影形奢大也皆非也五星俱有逆行何止熒惑太白豈有太平無逆行之理日食為朔月食為望豈有日月不食朔望之理如冬夏至適當午正初刻則晷無長短其餘各有長短乃時差之數也與寒燠邪正何關春秋二百四十二年日食三十六前漢二百一十二年日食五十三其間二百九十三年史傳止書日食者凡七盖戰國擾攘秦兼天下史失其官不書於冊也自貞定王二十六年至赧王十四年六書食而無月日秦莊襄三年書四月食而無日以法推之其食多不合置之可也秦始皇采齊人鄒衍論終始五德之運以為周得火德秦代周從所不勝定為水德以十月為歲首朝賀皆自十月朔色尚黒數以六為紀法尚刻以為合五德之數仍用顓帝厯然每遇閏年則閏九月謂之後九月秦年雖用十月為首而時序則從夏令觀史所書曰元年冬十月盖年前十月也夫曰歲首者取陽生之義也冬至建子一陽生得天統蔡邕曰冬至陽氣起君道長故賀夏至隂氣起君道衰故不賀若十二月建丑二陽生得地統正月建寅三陽生得人統皆陽月也故三代逓用之十月建亥乃純隂之月而秦用為正其於三統之義奚取焉閏以歸餘何月不可閏而俱附之九月尤屬悖謬秦王子嬰初立即漢元年十月五星聚于東井孟康曰歳星先至四星從歳星也魏高允校漢厯謂太白辰星常附日而行十月日在尾箕昏没於申南而東井方出於寅北二里何得背日而行高允之言是也古今律厯考巻九
