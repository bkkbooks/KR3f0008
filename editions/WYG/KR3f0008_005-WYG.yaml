  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0008_WYG_005-1a, image: WYG0787/WYG0787-0052a.png}
body:
  text: 古今律厯考卷五明邢雲路撰經五春秋考隱公元年春王正月周平王四十九年己未即魯隱公元年也諸侯奉天子正朔必用天子之年其國史紀政則自用其年加周王於正月大一統也周以建子為歲首冬十一月建子即春正月蓋併時與月俱改之矣以厯數上考周之春正月即夏之冬十一月春二月即冬十二月以推十二月皆然胡氏謂以夏時冠周月引孔子告顔淵行夏之時為證程伊川謂假天時以立義朱子謂天時不可改引尚書秋大熟未穫為酉戌之月以證周未改月皆非也夫孔子之告顔淵乃斟酌四代之禮樂無不可者蓋孔子之私言也春秋魯國紀事之書也孔子之事莫大於春秋天子未改月而孔子假以夏時冠天子之月有是理乎尚書秋大熟乃周季秋九月建申即夏孟秋七月七月正禾熟未穫之時又何疑焉近世周文安又謂魯史紀年必始於冬十一月所以遵周正朔孔子春秋則始於春王正月所以垂法後世其於春秋以事繋日以日繋月以月繋時以時繋年之法舛錯殊甚矣以厯法推春秋日食皆周正建子之數且如春秋屢書春正月日南至若用夏正豈有正月冬至乎經書二月無氷若用夏正正月東風解凍况二月驚蟄舟楫可通矣何以書無氷也經書秋大水無麥苗夏正之秋安得有麥苗經書十月雨雪十月殞霜殺菽夏正十月安得有菽夏正之冬正霜雪之候而何以爲災則豈非周十月夏八月乎三年春王二月己巳日有食之隱公三年春三月朔己巳日食此書二月日食杜預曰是二月朔不書朔史失之榖梁曰言日不言朔食晦日也公羊曰某月某日朔日有食之者食正朔也其或日或不日或失之前朔在前也或失之後朔在後也謂己巳爲朔二日食也姜岌曰似失一閏朱子曰王者修德則日雖當食月常避日故髙下參差不正相合所以當食不食若國無政則當食必食爲非常之變故春秋日食必書張氏洽曰於厯應食入限者不必盡食月或變行以避之或五星濳在日下禦侮以救之或在陽厯陽盛隂微則不食或德之休明而有小𤯝焉則天爲之隱雖交而不食皆非也蓋隱公三年春二月朔日日不食己巳乃三月建寅月之朔日即夏之正月朔日也春秋時魯厯不正三月朔日己巳誤推爲二月晦日見其晦日食也史官遂不敢書朔然亦非二月朔也姜岌校春秋日食謂是歲二月己亥朔無己巳三月己巳朔去交分入食限爲是然閏在歲前冬十二月建亥之月其謂似失一閏則非唐大衍厯元授時厯推之皆是歲三月己巳朔日食既食在朔則穀梁食晦日公羊食朔二日之說皆非古厯載當食不食者多推筭之誤即間有失行者八分才一乆之旋復其常也朱子謂髙下參差不正相合高下不合正是不當交道故不食則豈有日之行應食入限月却變行避日之事無德則食有德則不食固非至於張氏論五星濳在日下禦侮以救之日在陽厯陽盛隂微則不食又云天爲之隱無論不經之甚且并其五星行度併日在隂陽厯不知爲何事也此亦筆之於經傳中幾何而不誤後學耶以授時上推隱公三年辛酉歲距至元十八年辛巳積年二千年中積七十三萬四百八十九日天正冬至六日六刻閏餘二十九日四十八刻經朔三十六日五十七刻歲前閏十二月是歲辛酉正月朔日庚午冬至即夏正建子之十一月也以推至二月朔己亥非己巳不入食限推至三月朔五日三十二刻合朔在春三月朔日己巳辰時周之春三月即夏之正月建寅也交泛二十六日六十六刻加時在晝去交分入食限是己巳日辰時日有食之春秋時誤書三月己巳爲二月遂因而誤書三月庚戌天王崩四月辛邜尹氏卒八月庚辰宋公和卒以法推之四月庚戌三月無庚戌五月辛邜四月無辛卯九月庚辰八月無庚辰是年因一誤書而遂三誤其書皆疑以成訛也至次年隱公四年書春二月戊申衛州吁弑其君完則正矣法推四年春二月有戊申九年春三月癸酉大雨震電庚辰大雨雪震雷也電雷光也左傳謂夏之正月微陽始出未可雷電爲非時穀梁謂八日之間再有雨雪大變故謹而日之公羊謂月令二月雷乃發聲正月雷電爲不時劉向云雷未可以出電未可以見雷電既已出見則雪不當復降皆失節也雷電陽也雨雪隂也雷出非其時者是陽不能閉隂隂氣縱逸而將爲害也法推隱公九年春三月無癸酉庚辰癸酉乃二月十日庚辰乃二月十七日春秋時厯法不精日官筭失一閏故以二月作三月既爲二月則是夏之十二月建丑之月非建寅之正月也十二月大寒東風尚未解凍去二月雷乃發聲始電之時更逺此時震電失節益甚矣若大雨雪則是十二月之常非變異也非變異則經不必書蓋由日官誤推二月爲三月故以雨雪爲寅月之變異而不知是月之爲丑月也甚至公羊遂信春秋志異而以雪爲盛隂爲桓將弑隱之象嗟嗟世豈有建丑月雪爲災異耶法推周桓王五年即魯隱公八年丙寅距元至元辛巳一千九百九十五筭中積七十二萬八千六百六十二日七十七刻三月朔六日五十三刻三月朔日庚午是月二十一日庚寅我入祊春秋書之是也閏五月朔三十五日一十二刻是閏五月朔日己亥蔡侯考父卒是月十三日辛亥宿男卒經書六月己亥蔡侯考父卒辛亥宿男卒是不知閏五月也以步至戊辰日四十六刻小滿戊辰即次月六月之朔日也周之六月乃夏之四月故六月爲小滿六月朔四日六十五刻是戊辰日春秋筭失一閏則自此以徃皆差一月矣春秋失閏五月故以夏六月作秋七月經書秋七月庚午宋公齊侯衞侯盟于瓦屋不知庚午之盟推是夏六月三日也經書九月辛夘公及莒人盟于浮來是九月乃八月也八月朔三日七十一刻八月丁夘朔推至二十五日辛夘是公及莒盟之日隱公九年丁夘中積七十二萬八千二百九十七日五十三刻三十分二月朔日九十刻是二月甲子朔步至初十日癸酉十七日庚辰經書三月癸酉大雨震電庚辰大雨雪即此二月初十之癸酉十七之庚辰因失八年五月之一閏故以二月作三月法推三月朔三十日四十三刻是甲午朔是月無癸酉庚辰以推周桓王七年戊辰即魯隱公十年中積七十二萬七千九百三十二日二十八刻六月朔五十三日三十九刻是朔日丁巳六日壬戌十五日辛未二十五日辛巳經書六月壬戌公敗宋師于菅辛未取郜辛巳取防此六月六日之壬戌十五日之辛未二十五日之辛巳無不合者則是春秋時日官自八年失五月一閏以後俱差一月差至九年三月以後日官覺其不合方補一閏所以至十年六月仍合厯數復其常也經書十年冬十月壬午齊人鄭人入郕法推十月朔五十一日五十一刻朔日乙夘二十八日壬午爲齊鄭入郕之日允合則以補足一閏之故耳春秋時厯官不惟無盈縮遲疾考并其步朔亦踈所以二百四十二年間多有失閏月日既差以推交食有在晦者朔後者夜食者皆非也舉此一年之差餘可知矣桓公三年秋七月壬辰朔日有食之既此周桓王十一年魯桓公之三年也姜岌以爲是歲七月癸亥朔無壬辰亦失閏其八月壬辰朔去交分入食限大衍與姜岌合元史謂以今厯推之是歲八月壬辰朔加時在晝日食六分有竒夫元史所謂今厯者授時法也以授時推周桓王十一年壬申歲距至元十八年辛巳歲積一千九百八十九筭中積七十二萬六千四百七十一日一十一刻一十六分以步至七月癸亥朔不入食限八月定朔二十八日六十三刻是八月朔日壬辰申時合朔交泛二十七日加時在晝去交分入食限日食六分有竒經書七月日食乃春秋時不應閏而先閏以致誤八月爲七月然八月朔日食六分有竒亦非食既則有不同耳四年春正月公狩于郎周之正月夏之十一月建子之月也取獸於田曰狩狩冬獵也周禮中春教振旅遂以蒐中夏教茇舎遂以苗中秋教治兵遂以獮中冬教大閱遂以狩戎祀國之大事狩所以講大事也用民以訓軍旅所以示武取物以祭宗廟所以教孝周雖改正然田狩則從夏時十一月正夏之仲冬當狩之時故以春狩盖用冬狩之禮書時禮也禮諸侯田狩不過郊郎非國内之狩書于郎譏逺也即春行冬狩是周正建子之證若莊四年書冬公及齊人狩于禚是周之冬十二月夏之冬十月僖二十八年冬天王狩于河陽亦然周文安乃疑莊僖之狩爲秋非也哀十四年書春西狩獲麟是子丑之月亦爲冬狩五年秋大雩螽雩者旱請雨祭名雩之言吁也大旱則吁嗟以求雨凡祀啟蟄而郊龍見而雩始殺而嘗閉蟄而烝過則書龍見者周時建巳之月秋大雩書不時也成王尊周公賜魯重祭得郊禘大雩爲壇於南郊之旁雩五方上帝配以先帝盛樂皆作故曰魯之郊禘非禮也雩得雨書雩不得雨則書旱昭二十五年再雩則曰旱甚經書雩二十一書秋者七書七月者二書八月者四書九月者七書冬者一秋不雨雩之是也成七年書冬大雩穀梁云冬無雩也非也然周之十月今之八月若久不雨可無雩乎螽蜙蝑之屬蝗也長而青長角長股一生九十九子上書雩螽常因旱而生既旱又蝗故書以記災禮月令曰仲冬行春令則蝗蟲爲敗何氏曰煩擾之應劉歆曰貪虐取民則螽春秋書螽者十凡八皆應螽之時惟哀十二年十三年兩書十二月螽十二月今之十月不宜螽而螽則以失閏之故誤建戌月爲建亥月也左氏論之詳矣六年秋八月壬午大閱大閱簡車馬也外事用剛日兵外事故用壬午先王四時之田皆於農隙以講武三時所教其法皆略惟仲冬農事皆畢乃教大閱大修戰陣是周正建子之月夏之仲冬也今桓公秋之八月乃建未之月夏之六月盛夏煩暑而驅南畝之民大閱兵車祇以懼鄭忽畏齊人故也厲農不時甚矣故書八年春正月己夘烝夏五月丁丑烝春曰祀夏曰禴秋曰嘗冬曰烝烝冬祭也周雖改正而祭祀則用夏時周之正月夏之仲冬也左傳杜氏曰此夏之仲冬非爲過而書者爲五月復烝見凟也榖梁則謂烝冬事而春興之爲志不時非矣周之仲夏五月建辰乃夏之季春三月也桓公以春行冬祭爲非禮故追書正月烝以見其凟再書而一貶也若不書前一烝即似子月未烝辰月乃烝耳冬十月雨雪周之十月孟冬建酉夏之八月也建酉之月隂陽方中而寒氣先至未霜而雪爲隂侵陽之象若僖十年書冬大雨雪周之冬酉戌亥月也酉戌之月大雪非時雖建亥之月尚屬小雪亦非大雨雪之時故書髙氏以申月爲冬非也十有四年春正月無冰豳風曰二之日鑿冰冲冲三之日納于凌隂四之日其蚤獻羔祭韭凌人之職丑月鑿冰於山寅月藏於冰室夘月獻羔開冰先薦寢廟今子月沍寒燠而無冰記異也五行傳曰視之不明是謂不哲厥咎舒厥罰常燠是謂君不明政治舒緩縱夫人淫佚隂爲陽行之所致此年正月書無冰成元年二月書無冰襄二十八年書春無冰皆周之春夏之冬也秋八月壬申御廩災乙亥嘗御廩公所親耕以奉粢盛之倉也天火曰災嘗秋祭也公羊曰何以書記災也譏嘗也御廩災不如勿嘗而已矣穀梁曰未易災之餘而嘗也志不敬也左傳謂御廩雖災不害嘉穀祭不應廢則非矣周之八月建未夏之六月也秋嘗以建酉之月隂氣始殺嘉穀始熟取物成薦新爲義今夏之六月物未西成未可嘗也失其時也周官時享前期十日帥執事而卜日誓戒今壬申災距乙亥相間止二日正遇災而懼修省之時乃不改卜不誓戒災尚未易用火災之餘以祭宗廟則不敬也不如勿嘗而已矣十有七年冬十月朔日有食之左氏云不書日官失之穀梁曰言朔不言日食既朔也謂月二日食也大衍推在十一月朔交分入食限以授時推桓公十七年丙戌歲距元辛巳中積七十二萬一千三百五十七日六十九刻以步至十月朔不入食限十一月定朔六日五十九刻是十一月朔日庚午未時合朔交二十六日八十五分加時在書去交分入食限經書十月者乃春秋時不應閏而先閏以致誤十一月為十月史官見其不合也遂不書日榖梁謂食朔二日亦非莊公七年夏四月辛夘夜恒星不見夜中星隕如雨恒星列星即常見之經星也隕墜也言衆星流墜如雨之衆也經星沒衆星流其變大矣天星雖有時不見久之仍復其常雖隕乃氣之散非墜而無也天星有數若眞沒而隕何以從右至今並未少一星耶厯法推日月躔離今在某星度古在某星度千歲可坐致也秋大水無麥苗周之孟秋七月夏之五月也髙下有水災曰大水五月麥熟禾苗正發大水漂盡故書無記災也苗者五稼之通稱生曰苗秀曰禾至二十八年書冬大無麥禾酉戌亥月俱謂之冬冬正五穀通獲之時是年麥與諸禾一無所獲故冬書大無麥禾經㫖自明而傳謂有司㑹計歲入之多寡虚實然後知倉廩之竭非也八年春正月甲午治兵周禮中秋教治兵酉月也此以建子之春正月教治兵非其時矣莊公與陳蔡有事於鄰國師次于郎以俟陳人蔡人不至暴師露衆役乆不用則有失伍潰散之虞故復申明軍法以整齊之其志非善之也譏黷武也十有八年春王三月日有食之穀梁云不言日不言朔夜食也何以知其夜食也王者朝日蓋天子𤣥冕而朝日於東門之外日始出而有虧傷之處是以知其夜食也大衍推是歲三月不應食五月朔交分入食限以授時推莊公十八年乙巳歲距至元辛巳中積七十一萬四千四百一十八日四刻以步至三月朔不入食限既不入食限則夜亦不食春秋推三月食見其不食遂疑不書日穀梁以爲夜食則鑿矣法推是歲五月定朔四十八日六十五刻是五月朔壬子日申時合朔交一十三日五十一刻八十分加時在晝去交分入食限元史云蓋誤五爲三也二十有三年夏公如齊觀社諸侯非享覲不踰竟社者諸侯祭土示之常事未聞鄰國之君徃觀之者齊因祭社蒐軍實誇示威衆聚人觀之莊公乃越竟如齊觀社穀梁以是行爲尸女尸主也以觀社爲辭主爲女徃爾蓋盛其車華其服以炫惑婦人之聚觀者而蠱其心要其從已也故書以譏之祭社在夏仲春建夘二月周之夏四月也二十有五年夏六月辛未朔日有食之鼓用牲于社鼔伐鼓也鼓有聲救日伐鼓舉陽事以鼓聲壓隂氣也左氏云非常也唯正月之朔慝未作日有食之於是乎用幣于社伐鼓于朝言夏之四月建巳純陽爲正陽之月其五月隂慝之氣尚未作日食則鼔餘則否此周之六月夏之四月也以長厯推之辛未實七月由置閏失所不應閏而閏誤以七月爲六月實非正陽常鼔之月故傳云非常也夫謂置閏失所固是謂唯正陽伐鼓則非夏書記季秋月朔辰弗集于房瞽奏鼔豈必正陽之月哉蓋禮諸侯用幣于社伐鼓于朝退而自責社乃上公之神故用幣以請救于上公牲則祭祀之事書鼔用牲于社譏其不鼓于朝而鼓于社又用牲皆非禮也若公羊謂用牲爲責求乎隂之道社爲土地之主月爲土地之精上繋于天而犯日故鳴鼓而攻之以脅其本又謂社爲日光所闇恐人犯之以朱絲營衛之則鑿矣大衍推是歲辛未朔交分入食限以授時推莊公二十五年壬子歲距至元辛巳中積七十一萬一千八百六十日八十九刻以步至六月朔不入食限七月定朔七日六十一刻是七月朔日辛未未時合朔加時在晝交二十七日四刻去交分入食限則左傳註疏謂長厯推辛未爲七月朔春秋時不應閏而先閏誤書七月爲六月是也二十有六年冬十有二月癸亥朔日有食之以授時推是歲癸丑十二月定朔五十九日三十八刻癸亥朔巳時合朔交一十四日三十五刻入食限合二十有九年冬十有二月城諸及防諸防皆邑名左傳云書時也凡土功龍見而畢務戒事也火見而致用水昏正而栽日至而畢謂周十一月夏之九月龍星角亢晨見東方三務始畢戒民以土功事周十二月初夏之十月初大火心星次角亢之後而晨見東方則致築作之物周十二月中夏之十月中北方水星七宿中之定星昏見於南方正中於是樹板幹而興作日南至周之正月夏之十一月也冬至微陽始動故土功息今以十二月城邑故云書時也穀梁云可城也范氏註凡城皆譏今云可者謂冬可用耳不謂無譏吳氏曰年前冬築郿大饑告糴今春新延廐又城諸防豈不爲譏范吳之說爲得之厯推星漸東移晨見昏中各異乆之龍火厯十二月皆可晨見東方定厯十二月皆可昏中非一定也若日至而畢則古今一致三十年秋九月庚午朔日有食之鼓用牲于社書鼔用牲于社譏失禮如二十五年也以授時推是嵗丁巳九月朔不入食限十月朔六日五十七刻庚午朔日未時合朔交泛一十四日四十六刻入食限大衍同蓋春秋不應閏而先閏一月誤以十月為九月也僖公二年冬十月不雨三年春王正月不雨夏四月不雨六月雨左傳註疏云一時不雨則書首月皆竟時不雨次月不雨不復書也故四月不雨五月不雨不復書六月得雨乃書之此由不雨日乆方始追叙其事每時一書也穀梁曰不雨者勤雨也一時言不雨閔雨也閔兩者有志乎民者也雨云者喜雨也喜雨者有志乎民者也僖公賢君也因旱退辟正殿飭過求已循省百官放佞臣郭都等理寃獄四百餘人精誠感天不雩而得㴻雨故冬不雨而書春不雨而書夏不雨而書以志勤六月雨而書以志喜若文公不知勤民則自十有二月不雨至于秋七月而書自正月不雨至于秋七月而書以著其慢也夫僖公之六月夏之四月建巳之月也巳月得雨猶可耕種若用夏正則六月乃建未之月厯三時不雨未月方雨則春不耕夏不種爲災大矣何杜氏云不曰旱不爲災也諸儒猶謂周正不建子耶五年春左傳五年春王正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也凡分至啟閉必書雲物爲備故也註䟽謂辛亥朔月一日也南至冬至也不曰冬至而曰南至周改十一月爲春也天子班朔諸侯受而藏之於太祖廟每月朔告廟受而行之天子有靈臺諸侯有觀臺臺上構屋可以逺觀望也公既視朔遂以其日往登觀臺以望雲物之氣色書其所見是禮也周禮保章氏以五雲之物辯吉㓙水旱降豐荒之祲象故觀凡春秋分冬夏至立春立夏爲啓立秋立冬爲閉用此八節之日必登臺書雲物察妖祥逆爲之備也視朔者月朔之禮也登臺者日至之禮也此朔即是至日故視朔而遂登臺也步厯之始以朔旦冬至爲首至十九年七閏復得朔旦冬至爲一章是先閏十二月月半已得正月節故此正月朔日南至也然春秋厯法不精推筭誤矣以授時推周惠王二十二年即魯僖公五年丙寅歲距元至元辛巳一千九百三十五年中積七十萬六千七百四十七日九十一刻四十分天正冬至辛亥一十四刻閏餘二十七日九十七刻經朔一十九日一十七刻是歲正月壬午日合朔三十日辛亥日南至二月經朔四十八日七十刻壬子日合朔三月經朔一十八日二十三刻壬午日合朔閏三月經朔四十七日七十六刻辛亥日合朔是三月方閏也春秋時不宜閏而先閏十二月遂以正月爲閏十二月以正月三十之辛亥日南至誤推後天一日爲閏月後正月朔之辛亥日南至乃以二月朔壬子推爲正月二日且二月朔原是壬子春秋既以辛亥晦推爲朔此朔幸不遇日食若遇日食則在朔二日故春秋時日食日官見其不合也遂不敢書朔而公羊亦疑其爲朔二日或晦日然實非朔二日與晦日也蓋春秋厯官不知僖公五年三月方置閏故以不閏作閏以後月作前月以晦作朔也元史謂僖公五年正月辛亥朔旦冬至授時得辛亥與天合謂辛亥與天合則可謂正月朔旦與天合則不可亦守敬忽而未察耳是嵗九月日食何允合則以春秋十二月閏授時三月閏均之已閏所以合也夫朔旦南至爲厯閏一章之首朔爲告廟班令之期至日爲書雲物察妖祥之備所係匪輕此而俱差日官謂何叵柰後之疇人猶安於差且認爲無差而泄泄然也秋九月戊申朔日有食之元史無是年日食春秋有之蓋守敬遺之也以授時推僖公五年丙寅距元辛巳中積七十萬六千七百四十七日九十一刻四十分步至九月定朔四十四日五十七刻是戊申日未時合朔交泛二十六日八十九刻八十五分入食限允合冬晉人執虞公左傳晉侯假道於虞以伐虢公問於卜偃曰吾其濟乎對曰克之公曰何時對曰童謡云丙之晨龍尾伏辰均服振振取虢之旂鶉之賁賁天䇿焞焞火中成軍虢公其奔其九月十月之交乎丙子旦日在尾月在䇿鶉火中必是時也冬十二月丙子朔晉滅虢遂襲虞滅之執虞公註疏謂徒歌無樂謂之謡乙亥日夜半合朔在尾十四度尾辰合朔故龍尾伏而不見至丙子晨旦日行四分度之一月行三度有餘日在尾星月在天䇿傅說星栁星張之鶉火星在南方正中是時上下均同戎服振振而盛取虢國之旌旂鶉火星賁賁可見天䇿在日東近日焞焞無光此鶉火中之時軍功成虢公奔在九月十月晦朔之交其云九月十月謂夏九月十月也云冬十二月則夏十月也以授時推僖公五年丙寅距元辛巳中積七十萬六千七百四十七日九十一刻步至周十一月即夏九月丁未日合朔是月大月三十丙子步周十二月即夏十月定朔一十三日二刻丁丑日子時合朔日躔尾一十三度九十八分曉中星翼八度四十分在鶉尾左傳謂丙子旦今推丁丑旦昔推鶉火中今推鶉尾中似微不同然鶉尾即近鶉火晉人用兵破敵自丙子破至丁丑皆可揚兵豈在一時固不害其爲同也若夏九月十月之交即周十一月十二月之交卜偃周人何以言夏正想周雖改正而周人相沿或猶以夏時論事不然何以上文云童謠十月朔丙子旦奔虢公下文即繼云冬十二月丙子朔晉滅虢是知十二月之丙子即十月之丙子也十有二年春王三月庚午日有食之杜氏云不書朔官失之姜氏云三月朔不應食五月庚午朔入食限大衍同以授時推是年癸酉距元辛巳中積七十萬四千一百九十一日二十分步至三月不食五月定朔六日五十六刻是庚午日未時合朔交泛二十六日五十一刻入食限元史云蓋五誤爲三也十有五年夏五月日有食之左氏云不書朔與日官失之范氏云夜食大衍推四月癸丑朔入食限以授時推是年丙子距元辛巳中積七十萬三千九十五日四十七刻步至四月定朔四十九日九十三刻是癸丑日亥時合朔交泛一日一十三刻一十六分乃入月食限非日食也即入日食限而食於亥時夜食亦不救况兩月皆不入交乎郭守敬筭入食限亦不明言加時在晝夜皆非也十有六年春王正月戊申朔隕石于宋五邵子云星在地則爲石在天則爲星宋襄公不德致有隕石之異聞其隕視之石數之五也以厯數推僖公十六年丁丑歲距元辛巳一千九百二十四年中積七十萬二千七百三十日二十二刻天正冬至四十四日八十三刻天正閏餘二十九日五十刻天正經朔一十五日三十三刻合朔戊寅日是嵗嵗前應閏十二月步至正月經朔四十四日八十六刻戊申日合朔即是日八十三刻天正冬至是春王正月戊申朔日南至三十有三年冬十有二月隕霜不殺草李梅實周之十二月夏之十月也十月霜宜殺草而不殺李梅宜剥落反花而再實皆冬煖之咎徴也以授時推僖公三十三年甲午距元辛巳一千九百七年中積六十九萬六千五百二十一日七刻步至三月經朔五日三十四刻己巳日合朔是月十三日辛巳二十五日癸巳四月經朔三十四日八十八刻己亥日合朔是月無辛巳癸巳經書四月辛巳晉人及姜戎敗秦師于殽癸巳葬晉文公乃三月之辛巳癸巳也盖由三十二年癸巳應置閏而失閏故差一月至十二月經朔三十一日一十二刻以縮疾減之甲午日合朔至十二日乙巳是月十九日得中氣則乙巳正十二月公薨于小寢之日也長厯推為十一月十二日乙巳謂是月經書十二月公至自齊乙巳公薨于小寢隕霜不殺草李梅實晉人陳人鄭人伐許以上四事皆差則非矣春秋忽然而四月差又忽然而十二月不差其矛盾類如此古今律厯考卷五
