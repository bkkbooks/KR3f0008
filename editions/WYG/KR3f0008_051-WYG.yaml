body:
  text: 古今律厯考卷五十一明邢雲路撰厯法十六厯法五星萬厯己亥一授時年減一筭積年三百十九中積一十一萬六千一百四十七日一刻九十六分中星度一十一萬六千一百四十七度一分九十六秒冬至四十二日七刻九十六分閏餘二十三日四十刻二十三分三十一秒天正經朔一十八日六十七刻七十二分六十九秒天正日躔赤道度箕五度一十三分四十六秒天正日躔加時黄道度箕四度七十二分五十八秒木星合伏前合伏一百九十日九十一刻二十二分後合伏二百七日九十六刻七十八分中星二百一十二度六十九分三十六秒盈厯一百一十日四十六刻三十九分五十二秒盈末厯七十二日一十六刻四十七分九十七秒加分三分四十一秒八二七六積度五度六十二分一十六秒九六六四加差五度六十二分七十三秒二九定積二百一十三日五十九刻五十一分二十九秒定日一十五日六十七刻四十七分二十九秒加時定星二百一十八度三十二分九秒二八入月數二百三十六日九十九刻七十四分八秒月數八入六月入月以來日初日七十五刻二十七分一十六秒六月經朔一十四日九十二刻二十分一十三秒順減差度一十五分五十一秒八七晨前夜半定星二百一十八度一十六分五十秒五一六月己卯日夜半木星度井三十度五十一分八十二秒是日申正初刻木星合伏井三十度六十七分五十四秒晨疾初中積二百二十四日八二七八中星二百一十一度八二七八盈厯一百一十三日三九三九五二盈末厯六十九日二三四七九八加分三分八七五三積度五度五九九七八加差五度五一七九七七定積二百三十日三四五七七七定日三十二日四二五三七七加時定星二百二十二度七一五七六入月數二百五十三日七四八一月數八入六月入月已來日一十七日五三三六四順減差九分三五八三晨前夜半定星二百二十一度九七七九九三六月丙申日夜半木星度柳一度一十九分四秒是日已正初刻木星晨疾初柳一度二十八分八十秒晨疾末中積二百五十二日八二七八中星二百一十七度九三七八盈厯一百一十八日三三九五二盈末厯六十四日五九四七九七加分四分六八八積度五度二九四六四加差五度三二一四七七定積二百五十八日一四九二七七定日初日二十二刻八八七七加時定星二百二十七度九八五七七入月數二百八十一日五五一六八月數九入七月入月已來日一十五日七七六二七一七月經朔四十四日四五二六六順減差八分九三二九晨前夜半定星二百二十七度八九五七四八七月甲子日夜半木星度柳七度一八二是日卯初二刻木星晨疾末柳七度一十九分九十五秒晨遲初中積二百八十日八二七八中星二百二十三度四四七八盈厯一百二十二日二二三七五二盈末厯六十日三九九二二一加分五分一七一積度五度九五六八加差五度一一六二四八定積二百八十五日九四四八八定日二十八日二三六四八加時定星二百三十三度二八九四四八入月數三百九日三四六三七九月數十入八月入月已來日一十四日四四四九八月經朔一十三日九八三一九九順減差四十四秒三六晨前夜半定星二百三十三度二八五四一二十六日壬辰夜半木星度柳十二度四九七九是日子正二刻木星晨遲初柳十二度五十分二十三秒晨遲末中積三百八日八二七八中星二百二十七度七五七八盈厯一百二十五日五二三九五二盈末厯五十七日一四七九七加分五分五七六二積度四度九三二三五三加差四度九三八一九七定積三百一十三日七六五九九七定日五十五日八四五五九七加時定星二百三十七度四二一七九七入月數三百三十七日一六八三二八月數十一入九月入月已來日一十二日三三一八五九月經朔四十三日五十一刻三七九二順減差一十分一四七一晨前夜半定星二百三十七度三二三二五九月已未日夜半木星度星三度五三二八是日戌正一刻木星晨遲末星三度六十三分四十二二秒晨留中積三百三十六日八二七八中星二百二十九度六六七八盈厯一百二十七日六一一四五二盈末厯五十五日一七二九七加分五分八三九八積度四度八一六八六七加差四度八一七八七七定積三百四十一日六四五六七七定日二十三日七二五三七七加時定星二百三十九度二一一四七七入月數三百六十五日四八八月數十二入十月入月已來日一十日六八八九二十月經朔一十三日四四三八五順減差八分七四五晨前夜半定星二百三十九度一二四四三二十月十一日丁亥夜半木星度星五度三三六九是日酉初一刻晨留星五度四十二分六十七秒晨退中積三百六十日八二七八定積三百六十五日六四五六七七定日四十七日七二五二七七入月數三百八十九日四八八月數十三入十一月入月已來日五日一五二九九十一月經朔四十二日五七四九七八十一月辛亥日酉初一刻木星晨退星五度四十二分六十七秒夕退定日三十四日三一七五五四加時定星二百三十四度三四三五四入月數四百三十五日六四二八五月數十四入十二月入月已來日二十二日二一一九八三十二月經朔一十二日一五五七一退加差五分八八晨前夜半定星二百三十四度三九四三一二十二月戊戌日夜半木星退入星初度六六八是日辰初二刻木星夕退入星初度五十五分六十秒夕留中積四百五十三日九八七八中星二百一十九度九五三盈厯一百二十七日六一一四五二盈末厯五十五日一七二九七加差四度八一七八七七定積四百五十八日八五六七七定日二十日八八五二七七加