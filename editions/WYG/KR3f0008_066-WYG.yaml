  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0008_WYG_066-1a, image: WYG0787/WYG0787-0693a.png}
body:
  text: 古今律厯考卷六十六明邢雲路撰厯理一厯理二曜測一年之日得歲實測一月之日得月䇿以二十四氣除歲實得一氣之䇿以四除月䇿得弦策倍弦策為望策三因弦策為下弦策三歸氣策為候策三十日内減月䇿十六日内減氣䇿為盈虚策月策除歲實十二次餘為通閏四除歲實為氣象限四除周天度為天周象除歲實半之為半歲周象限加減極差二日四一四為盈縮初末度以四時因五行得二十除歲周得土王用事策以四季正氣加之得土王用事日月策減二十八宿為宿䇿置所測歲實以距元乗之為中積加所測氣應為通積滿紀法去之為冬至中積加閏應滿月策去之為閏餘通積減閏餘滿紀法去之為經朔累加月策得各月經朔中積加所測轉應減閏餘滿轉終去之為疾厯如過轉中去轉中為遲厯累加月策累去轉終及轉中得各朔入轉半嵗周減閏餘為盈縮厯減後即為縮厯累加月策為各月盈縮厯如滿半嵗周減半嵗周是盈交縮縮交盈如盈縮厯滿盈縮初末限以減半歲周為盈縮末限累加月策得各盈縮厯中積加所測交應減閏餘滿交終去之為交泛累加月策累減交終得各月交泛以交終與月策相減餘半之為交後限以後限減交終為交前限半交終為交中即中限交中減後限為中前限加後限為中後限如交泛逢限則日月食視有食之月置經朔以盈縮遲疾二厯定加減二差以加減經朔為定朔以加減差加減遲疾厯為定入遲疾厯以至限一十二限二十乗之為定入遲疾限以法推之得行度内減八分二十秒為定限行度以月行平度乗交泛得交常度以盈縮差加減之為交定度如在七度已下三百四十二度已上日食在正交一百七十五度已上二百二度已下日食在中交半日五十刻内減定朔小餘分為午前分定朔小餘分内減半日五十刻餘為午後分以午前午後較半日五十刻餘以午前午後乗之以九十六刻而一得時差分午前減午後加加減定朔小餘分為食甚分午前午後加時差分為距午分以盈縮厯加定朔日及食甚分秒以減經朔日及分秒餘為食甚入盈縮厯以法推得盈縮行定度在象限已下為初限已上反減半歲周為末限或初或末自乗之以一千八百七十而一以減四度四十六分為南北泛差以距午分乗之以半晝分而一以減泛差為定差如泛差不及減者反減之應加作減差應減作加差在盈初縮末者正交為減差中交為加差縮初盈末反是定度無論初末限俱減半嵗周餘還以初末限乗之以千八百七十而一為東西泛差以距午分乗之以日周四之一而一如在泛差已下就為定差已上較泛差為東西定差盈厯午前縮厯午後正交為減差中交為加差縮厯午前盈厯午後正交為加差中交為減差正交三百五十七度六十四分或中交一百八十八度五分加減南北東西定差為定限度視交定度在正交已下者對減之為隂厯交前度已上者對減為陽厯交後度在中交已下者對減之為陽厯交前度已上者對減為隂厯交後度置隂八度陽六度内減交前或交後度餘以隂八十陽六十而一得日食分秒以日食既初虧至復圓定為二十分以減日食分秒餘以日食分秒乗之以平方開之以定法五十七刻七十分乗之以定限行度而一為定用分於食甚分減定用為初虧分加定用為復圓分月離陽道初虧西南食甚正南復圓東南月離隂道初虧西北食甚正北復圓東北日食八分已上初虧正西復圓正東日未出先虧未食甚復圓已入地謂之帶食如在昏刻者日入分與食甚分相減在晨刻者日出分與食甚分相減為帶食差以日食分秒乗之以定用分而一以減日食分秒在晨者為見食分在昏者為不見食甚或不見復圓分以盈縮行定度為黄道定度盈就為定度縮加半歲周加天正黄道以黄道鈐去之餘為食甚日躔黄道宿次以入朔交泛加望策即入望交泛經朔加望策即經望盈縮遲疾各加望策盈縮滿盈縮二限減半歲周遲疾滿轉中去之各以法推之得加減差以加減經望為定望以加減差加減遲疾厯為定入遲疾厯以法推得行度以減八分二十秒為定限行度交常交定度如日食法視日出日入晨分昏分之數又視卯酉前後定望小餘刻分在二十五刻已下為卯前已上減半日五十刻為卯後七十五刻已下減半日五十刻為酉前已上減日周百刻為酉後以百刻減卯酉前後分餘以百刻而一定為時差定望分加時差分為食甚定分交定度與中交度一百八十一度八十九分六十七秒較中交餘為陽厯交定餘為隂厯隂陽厯在後准十五度五十分已下為交後度在前准一百六十六度三十九分六十七秒已上為交前度置月食定度十三度五分減交前後度以八十七刻而一得月食分秒以月食既甚初虧至復圓定為三十分以減月食分秒餘以月食分秒乗之以平方開之以定法四十九刻二十分乗之以定限行度而一為定用分食甚減定用為初虧加定用為復圓此月食十分已下之率也如食十分已上者去十分以單分乗十五分餘以月食分秒乗之以平方開之以四十九刻二十分乗之以定限行度而一為既内分定用分減既内分為既外分食甚分減既内分為食既分加既内分為生光分食甚離陽道者初虧東北食甚正北復圓西北隂道者初虧東南食甚正南復圓西南食八分已上初虧正東復圓正西月未出地日未入地先虧或食既以食甚分與日入分相較餘為帶食差見食分月未食甚日已出地月已入地以食甚分與日出分相較餘為帶食差不見食分食既生光復圓亦然以月食分乗帶食差以定用分而一在晨為不見食分在昏為見食分以減月食分秒餘在晨為見食分在昏為不見食分食既生光亦然晨未食既先入地日已出不見食既未食甚先入地日已出不見食甚未生光先入地日已出不見生光未復圓先入地日已出不見復圓日未入地月未出已食若干分以盈縮定度為黄道定度縮厯就為定度盈厯加半嵗周加天正黄道以黄道鈐去之餘為月離黄道宿次此其數也求其理歲周者今歲日冬至所在之宿來歲復於端也月策者日月所㑹之期同宿同度謂之朔盖月行二十七日五十五刻有竒一周天又行二日弱凡二十九日五十三刻有竒追及於日也日自卑而漸髙曰盈盈過半曰末末至最髙自髙而漸卑曰縮縮過半曰末末至最卑縮而復盈也盈縮皆有平立差平者東西經行立者上下斜徃月亦如是也月行平分者遲疾之初髙卑者遲疾之末與日異也日有刻分十二時時有八刻二十分有竒故月以八百二十分為定率也日食時有差如食在午位其差少是人以目正視之也食在午前日在東月追及先期掩盡未合朔即食甚是人之目力自西視之故見其先時非日果先也食在午後日在東月後追雖對尚露合朔後方食甚是人之目力自東視之故見其後時非日果後也用九十六收者一時八刻十二時九十六刻也食甚加時差為距午者自食時至午時之數也南北東西泛差者泛然差也定差者得定數也正交者所起之端中交者居其衝也隂陽二厯黄道内外也黄道内為隂外為陽也在交道前食曰交前交道後食曰交後也隂陽二厯言月不言日也黄道内狹而長外闊而短故有隂八陽六之論也日食十分就日體也其六曜各有行分皆就日也隂八度陽六度隂定法八十陽定法六十皆謂十分之説也定用二十分者日食初虧至食甚十分食甚至復圓十分也二十分内減日食分秒仍以日食分秒乗之者就食體也平方開之得食體之方面也五十七刻四十分乗之者晨昏相距之數也定限行度而一者月度之數減者至初加者至復中分也月在陽道自西南追日故初虧西南復圓東南月在隂道自西北追日故初虧西北復圓東北食八分已上則當交道之中故虧正西復正東也月食言卯酉前後者昏距曉也止言中交不言正交者日所沖也不及中交者月在黄道外故曰陽過中交者月在黄道内故曰隂也後准者過交後之餘數前准者月未至交在交之前也月食十五分者自初虧至食甚也定三十分者自食甚至復圓也皆就日體之説也減而乗之平方開之復以四十九刻二十分乗之者昏距曉之數也月食十分已上謂之既去其十分以單分減十五分以食分乗之平方開之帶縱之術也食甚月當心值日當心食既月西輪齊日西輪生光月東輪齊日東輪忽焉光露而月復生也晨分倍者即昏距晨之夜刻也五歸更又五歸㸃盖以虧既甚生復之數在昏刻者於中減此五事餘以率去之即更㸃也此五夜中星各以時定也五星四餘之數前厯法説之詳矣其理則五星周率即周日也自前合距後合之日也中星度即平度也各以合伏遲疾留退之平度累加減之各得中星度也限度即入盈縮厯度也各以合伏遲疾留退限度累加之至後合得周日入厯度也是一周之日所積之度也以所積之日歸周日得度率度率者是一度平轄日數也以度率乗天周為厯率厯率者是天周之度轄天周之日也故以度率取厯率入盈縮厯也盈縮之數與日行一也合應者以前伏後見於其所積之日折取其中即星日周度合伏之期也以此定為合應也厯應者是合伏之日去冬至分之數也平立之差雖加減不同與日行亦一也四餘則大統以度率除一度為日行分累歸宿度為周積紫氣積一萬二百二十七日一十七刻九十二分月孛三千二百三十一日九十六刻八十四分羅㬋計都六千七百九十三日四十四刻三十二分以合天周不協若以度率乗周天度得紫氣積一萬二百二十七日二十一刻月孛三千二百三十一日九十七刻八十分羅㬋計都六千七百九十三日四十六刻三十六分方為正法是其理也古今律厯考卷六十六
