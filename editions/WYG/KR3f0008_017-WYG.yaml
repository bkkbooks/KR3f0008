front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0008_WYG_017-1a, image: WYG0787/WYG0787-0190a.png}
body:
  text: 古今律厯考卷十七明邢雲路撰歴代九歴代考唐書肅宗時山人韓頴上言大衍厯或誤帝令增益其術每節增二日作至徳厯代宗即位以至徳厯不與天合詔司天郭獻之復用麟徳元紀増損遲疾交㑹諸差以寫大衍舊術帝為製序題曰五紀厯演紀上元甲子距寶應元年壬寅積二十六萬九千九百七十八算通法千三百四十策實四十八萬九千四百二十八揲法三萬九千五百七十一乾實四十八萬九千四百四十二秒七十轉終分百三十六萬六千一百五十六交終分三億六千四百六十四萬三千七百六十七以通法除策實得三百六十五日二十四刻四七七六為歳實以通法除揲法得二十九日五十三刻五九七為朔實以通法除乾實得三百六十五度二十五分五十三秒為周天以三十七乘通法得四萬九千五百八十以除轉終分得二十七日五十五刻四五七為轉終以萬因通法得一億三千四百萬以除交終分得二十七日二十一刻二二二一為交終以歩五星各以通法除終率得終日木終率五十三萬四千四百八十二秒三十六火百四萬五千八十八秒八十三土五十萬六千六百二十三秒二十九金七十八萬二千四百四十九秒九水十五萬五千二百七十八秒六十六木終日三百九十八日八十六刻七四火七百七十九日九十一刻七土三百七十八日七刻七金五百八十三日九十一刻七二水一百一十五日八十七刻九五五紀通法卽麟徳總法䇿實卽麟徳朞實揲法卽麟徳常朔實麟徳以十二乘總法得數以除變周得轉終五紀則以三十七乘通法得數以除轉終分得轉終麟徳以三因摠法得數以除遊交終率得交終五紀則以萬因通法得數以除交終分得交終其實一也其中稍有增減者不過遷就畸零小異之數耳所以一時偶與天合而久之復差也徳宗時五紀厯加時稍後天詔司天徐承嗣與夏官楊景風等雜麟徳大衍之㫖治新厯建中四年厯成名曰正元五年施行㑹朱泚之亂改元興元演紀上元甲子距建中五年甲子歳積四十萬二千九百算以五十七章十二年為通法通法千九十五䇿實三十九萬九千九百四十三揲法三萬二千三百三十六乾實三十九萬九千九百五十五歳差十二轉終分三億一百七十二萬一百三十二交終分二億九千七百九十七萬三千八百一十五以通法除䇿實得三百六十五日二十四刻四七五四為歳實以通法除揲法得二十九日五十三刻五九三為朔實以通法除乾實得三百六十五日二十五刻五十七分以周歳除周天得歳差十二以一萬因通法除轉終分得二十七日五十五刻四三五為轉終以一萬因通法除交終分得二十七日二十一刻二二二為交終以歩五星各以通法除終率得周日木終率四十三萬六千七百六十秒四火八十五萬四千七秒七十九土四十一萬三千九百九十四秒六十三金六十三萬九千三百八十九秒二十八水十二萬六千八百八十八秒四半木周日三百九十八日八十六刻七六火七百七十九日九十一刻五七土三百七十八日七刻七二金五百八十三日九十一刻七一水一百一十五日八十七刻九四摠之皆五紀舊術也憲宗卽位司天徐昂上新􅍓名曰觀象起元和二年用之測驗不合故有司無傳者至穆宗立以為累世纉緒必更􅍓紀乃詔日官改撰􅍓術名曰宣明其氣朔發歛日躔月離皆因大衍舊術改易其名謂通法曰綂法策實曰章嵗揲法曰章月起長慶二年敬宗至於僖宗皆遵用之訖景福元年長慶宣明􅍓演紀上元甲子至長慶二年壬寅積七百七萬一百三十八筭外統法八千四百章嵗三百六萬八千五十五章月二十四萬八千五十七􅍓周二十三萬一千四百五十八秒十九交率二十二萬八千五百八十二秒六千五百一十二以統法除章嵗得三百六十五日二十四刻四六四二為嵗實以統法除章月得二十九萬五十三刻五九五為朔實以通法除􅍓周得二十七日五十五刻四五四六為轉終以統法除交率得二十七日二十一刻二二二為交終以歩五星以統法除各周率得周日木周率三百三十五萬五百四十秒八十三火六百五十五萬一千二百九十五秒二十六土三百一十七萬五千八百七十九秒七十九金四百九十萬四千八百四十五秒八十五水九十七萬三千三百九十秒二十五木周日三百九十八日八十七刻三八火七百七十九日九十一刻六一土三百七十八日八刻九金五百八十三日九十一刻二水一百一十五日八十七刻九七論者謂大衍後法制簡易合望密近無能出其右者然摠之不出大衍法也穆宗以為累世纘緒必更􅍓紀其言則非使􅍓課不效宜更也則更之若果精宻舊貫豈不可仍何必改作易世更紀之說非通論也昭宗時宣明􅍓漸差詔太子少詹事邊岡治新􅍓其法皆大衍之舊餘雖不同亦殊塗而至者起景福二年頒用至唐終名崇𤣥􅍓演紀上元甲子距景福元年壬子積五千三百九十四萬七千三百八通法萬三千五百乃七百一十章十年之嵗也嵗實四百九十三萬八百一朔實三十九萬八千六百六十三周天分四百九十三萬九百六十一秒二十四轉周分三十七萬一千九百八十六秒九十七交終分三十六萬七千三百六十四秒九十七以通法除嵗實得三百六十五日二十四刻四五一八卽嵗實以通法除朔實得二十九日五十三刻五九三卽朔實以通法除周天分得三百六十五度二十五分六三卽周天以通法除轉周分得二十七日五十五刻四五九卽轉終以通法除交終分得二十七日二十一刻二二二卽交終以歩五星以通法除各星終率得各星周日木終率五百三十八萬四千九百六十二秒十一火千五十二萬八千九百一十六秒九十一土五百一十萬四千秒五十四金七百八十八萬二千六百四十八秒七十六水百五十六萬四千三百七十八秒九十七木周日三百九十八日八十八刻六火七百七十九日九十一刻九七土三百七十八日八刻四金五百八十三日九十刻水一百一十五日八十七刻九九岡用筭巧能立術簡捷雖仍大衍而皆變其名如策實曰嵗實揲法曰朔實乾實曰周天分之類明白使人易曉較之閉藏閃鑠者不同是可尚也其治晷度準陽城日晷前後消息加減得宜九服中晷各於其地立表候之在陽城之南之北者各有距差以加減陽城二至中晷九服所在各於其地置水漏以定漏率各以陽城二至晷漏母除之得加時黃道日躔交道有差其術甚善今大統􅍓用北京之筭策布南京之晷度極差各異刻數不諧且不言九服晷漏之變為何如胥失之矣唐興二百八十年間厯遂八改查其氣朔轉交四事皆不甚相逺則何至動輙差也乃其大而消長之術未立細而加時之分未精所以朝後天夕先天彼減此加非多則少如聚訟然而又偏争妬勝謬亂其術如一積年也忽變而度忽變而日又忽變而紀或以三因或十二乘或三十七乘或又變而萬因或倍或歸諸如此胥改頭換面惟恐變之不幻暪之不嚴使人望如鬼魅不可測識後人尋緒不得便目司天為神聖厯數為絶學也而豈知其無他竒乎疇人推測多疵而又加以氣朔間有失行出於籌祘之外則益難捉摸也惟授時加時入細消長近親庶㡬效天其間畸零長短之數再一悉心測驗及時更正之則完羙矣五代史五代初用唐厯後諸家晉有調元厯周有明元厯萬分厯蜀有永昌厯正象厯南唐有齊政厯皆行之未久法故不傳惟周世宗欽天􅍓差勝乃端明殿學士王朴所造朴制律􅍓作律準以宣其聲其􅍓以隂三陽二化成之數得諸法演紀上元甲子距周世宗顯徳三年丙辰嵗七千二十九萬八千四百五十二筭以七千二百為統法卽日法嵗率二百六十二萬九千七百六十軌率二百六十二萬九千八百四十四朔率二十一萬二千六百二十離率一十九萬八千三百九十三交率一十九萬五千九百二十七以統法除嵗率得三百六十五日二十四刻四四四為嵗周以統法除軌率得三百六十五度二十五分六十一秒為周天以統法除朔率得二十九日五十三刻五五為朔實以統法除離率得二十七日五十五刻四五八為轉終以統法除交率得二十七日二十一刻二二八為交終以歩五星各以統法除周率得周日木周率二百八十七萬一千九百七十六火五百六十一萬五千四百二十二土二百七十二萬二千一百七十六金四百二十萬四千一百四十三水八十三萬四千三百三十五木周日三百九十八日八十八刻五五火七百七十九日九十一刻九七土三百七十八日八刻金五百八十三日九十刻八七水一百一十五日八十七刻九八大抵皆前人之術也而乃援闗朗易傳以立言觀其言曰立天之道曰隂與陽隂陽各有數合則化成陽之䇿三十六隂之䇿二十四奇偶相命兩陽三隂同得七十二何則隂陽之數合七十二者化成之數也化成則謂之五行之數五因之得朞數過之者謂之氣盈不及者謂之朔虚故以七十二為經法經者常用之法也百者數之節也隨法進退不失舊位謂之通法故以通法進經法二位得七千二百為統法朴意謂隂二十四三之為七十二陽三十六二之為七十二又十之為七百二十百之為七千二百皆闗子明易傳所出也夫黄鐘曰八十一大衍曰三千四十已屬牽附而朴陡出此數若曰自太極隂陽五行來也果爾以推天歩之分秒宜永乆勿壊胡乃行五年即先天耶空令陰陽無準太極負寃耳古今律厯考卷十七
