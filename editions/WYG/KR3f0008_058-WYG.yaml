body:
  text: 古今律厯考卷五十八明邢雲路撰厯法二十三厯法四餘躔度萬厯乙亥嵗授時積年三百一十八年中積一十一萬六千一百四十七日一刻九十六分有消長冬至四十二日七刻九十六分閏餘二十三日四十刻二十三分三十一秒紫氣順行入各宿初度以元至元辛巳至後䇿加中積得一十一萬七千四百三日五四二以周日一萬二百二十七日一七九二累除之餘為本年至後䇿以減畢積日分四千九百六十四日八五九二餘為周後䇿至後策四千九百四日五七八畢周後策六十日二八八四觜初度初度積日四十二日三六八丙午入月數八十三日六九七三一月數二入正月入月已來日二十四日六二九五四五正月經朔一十七日七三八四五五正月丙午日辰正三刻紫氣度觜初度觜初度四十二日三六八正月二十五日丙午辰正三刻參初度四十三日七六八二十六日丁未酉正一刻九度四十三日六八七月六日丁未月孛順行入各宿初度以元至元辛巳至後策加中積得一十一萬八千五百三十一日一二八八以周日三千二百三十一日九六八四累除之餘為本年至後策以減張積日分二千二百八十一日九五八餘為周後策至後策二千一百八十日二六六四張周後策一百一日六三九四翼初度初度積日二十三日七一九丁亥入月數一百二十五日四一七三一月數四入三月入月已來日六日九一九三五九三月經朔一十六日七九九六四一三月丁亥日酉初一刻月孛度翼初度翼初度二十三日七一九三月八日丁亥酉初一刻一度三十二日五六七四九二十七日丙申一度十六日二七二一八二月六日庚辰羅㬋逆行入各宿末度以元至元辛巳至後䇿加中積得一十一萬七千八百二十七日八七九八以周日六千七百九十三日四四三二累除之餘為本年至後策以減星積日分二千四百四十五日二二四七餘為周後策至後策二千三百三十九日三四五四星周後策一百五日八七九三柳末度末度積日二十七日九五八九辛卯入月數一百二十九日二八一六三一月數四入三月入月已來日一十一日一五九二五九三月經朔一十六日七九九六四一三月辛卯日夜子初初刻羅㬋度栁十三度栁十三度二十七日九五八九三月十二日辛卯夜子初初刻十二度同日計都逆行入各宿末度以羅㬋策二千三百三十九日三四五四加半周積得為本年計都至後策以減虚積日分餘為周後策至後策五千七百三十六日六七虚周後策一百七日三三三七女末度末度積日二十九日四一三三癸巳入月數一百三十日七三六三一月數四入三月入月已來日一十二日六一三六五九三月經朔同羅㬋三月癸巳日巳初三刻計都度女十一度女十一度二十九日四一三三三月十四日癸巳巳初三刻推四餘至後策置推得中積分加各餘氣立成内距元至後策就用其各餘氣周積累去之餘為推得各餘至後策推四餘周後策置推得各餘至後策用以挨至僅及減各餘立成内初末度積日分餘為推得各餘周後策又以視上年躔於各何宿次挨減之如遇推得各至後策餘一日者用以減各宿次度之零分下日及分餘為推得周後策又如至後策去挨僅及減之初末積日分如是紫孛所減之宿是尾者得箕如是羅㬋計都所減之宿是心得房也推四餘入各宿次初末度積日及分置推得周後策加冬至分滿紀法去之餘為推得入各宿次初末度積日分如是紫氣與月孛順行入各宿次之初度元挨及減之宿是尾者餘入箕宿初度積日及分如是羅㬋與計都逆行入各宿次之末度元挨及減之宿是心者餘入房宿末度積日及分就其各大餘命甲子筭外得日辰也就将各餘氣度率全分累加之得為各宿逐度初末及分如紫孛得各宿之初度者加至其宿末度位上視其宿之第二格零分下若干日及分加之方交入次宿初度分秒也如羅計得各宿之末度者先加其本宿第二格零分下若干日及分為次度下分秒也然後用各度率累加之得為各宿逐度下初末度積日及分也加至方交次宿末度位上視其宿之零分下若干日及分加之次復以其度率累加之也若遇空分只加度率推四餘入初末度積日在何月并入月已來日數置推得周後策加閏餘分用其月數鈐内挨及減之數減就視原減之數是一號者其月數得一為十二月也其減餘之若干日就為推得入月已來日數又視其大餘日若干日得某月中某日月數鈐右卽月策累加之數四餘立成鈐紫氣入箕宿初度二十八年有奇一周天辛巳為元至後策一千二百五十六日五二二四周積一萬千二百二十七日一十七刻九十二分度率二十八日日行三分五七一四二九紫氣取入宮定積數凡取入宮置各氣定積數内減冬至後策餘交入次日時刻餘倣此斗三千三百七十四日一五一入丑女二一千一百七十六日六八三二入子月孛入箕宿初度八年十月有竒一周天辛巳為元至後策二千三百八十四日一九二周積三千二百三十一日九十六刻八十四分度率八日八四八四九二日行一十一分三一三六月孛取入宮定積數羅㬋入尾宿末度十八年七月有竒一周天入辛巳為元至後策一千六百八十日八六二計都入尾宿末度十八年七月有竒一周天入辛巳為元至後策五千百七十七日五八一八周積六千七百九十三日四十四刻三十二分巳下羅計用同半周積三千三百九十六日七十二刻一十六分度率一十八日五九九一七七六日行五分三七六六二黄道宿次宿度零分并日巳下全日分各宿入末度積日分羅㬋計都取入宮定積數計都取入宮於羅㬋定積日上加入半周積三千三百九十六日七二一六共得數内減去周後策餘為入某辰宮積日及分黄道交入十二次宮界宿次度分鈐推四餘入各宿次逐度積日及分視推得各餘交入某黄道宿次初末度若干日法如太陽交宮取之即得交宮時刻如紫氣月孛推得是箕宿者書箕初度若干日及分次一度二度順排至九度也如羅㬋計都推得是尾宿者書尾十七度若干日及分次十六度十五度逆排至初度也然後依元推得初末度相接處若干日及分以各度率累加之即得入逐度積日逐分加至各宿之初末相接處逆順皆以其宿零分下若干日及分加之方交入次宿度分又如遇相接處順行者置前宿末度加末度零分得次宿初度次加度率順行逆行者置其前宿初度加度率合次宿末度分就加末度全分為次度分推各餘交十二宮月日時刻視其各餘氣推得黄道宿次與其交宮十二次宮界宿名同度下入各宮定積全分内減去推得至後策餘為入某辰宮積日及分寄位加閏餘分以月數鈐挨及之數減之命為某月既定是何月於寄位加冬至分滿紀去之命甲子筭外得日辰刻如紫孛推得所入黄道宿次遇有氐宿者即置氐宿一度下入宫定積全分依上推得某甲子日辰時刻交入夘宮如羅計遇氐宿者却置前宮軫宿十度下入宫定積全分依前推得某甲子日辰某時刻退入辰宮是也推各餘周天置各餘周積以歲周除年數以月策除月以下數得幾年幾月日零一周天右四餘依大統法如推紫氣乃是用度率二十八日行一度法以二十八日除一度得三分五十七秒一十四微二十九纎為每日日行分以推宿度置宿度分以日行分而一得積日分累加至周天得周積分如紫氣推箕宿置箕宿九度五十九分以日行分三分五七一四二九而一得二百六十八日五十二分為箕積日分入牛初度自此以後以次累加步至尾十七度五十九分得一萬二百二十七日一十七刻九十二分為周天積日分却置積日以二十八年一周天而一得三百六十五度二十五分六十四秒即此以合周天三百六十五度二十五分七十五秒之數則少一十一秒矣若以度率二十八乗周天度三百六十五度二十五分七十五秒得周積一萬二百二十七日二十一刻方為正法盖大統以日行分末二十八纎五七有竒之數收而為九故日行分數積多以致天周之數少也計大統周積少三刻八非正法矣月孛羅㬋計都俱倣此古今律厯考卷五十八
