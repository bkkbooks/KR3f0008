body:
  text: 古今律厯考卷六十一明邢雲路撰厯議二厯議周天宿度在天二十八宿為度三百六十五度有竒非日躔無以校其度非列舍無以紀其度蓋天本無度因日行一度厯以紀之度從生焉此日月五星所由以出入於二十八舍者也然列舍相距度數厯代所測不同漢唐宋止用闚管或有未密元郭守敬測用二綫遂及分焉今厯因之校天為密若考往古則仍依當時宿度命之其時無宿度者壹準前人宿度惟推密率日躔無論古今並依今厯有分宿度為準前代宿度并至元所測今用之者並列於左度里之差考靈耀云周天三百六十五度四分度之一每度二千九百三十二里千四百六十一分里之三百四十八圓周一百七萬一千里以圍三徑一言之直徑三十五萬七千里此為二十八宿周圍直徑之數又二十八宿以外上下東西各有萬五千里是為四游之極謂之四表據四表之内并星宿内總有三十八萬七千里天徑中央正半之處則一十九萬三千五百里地在於中厚三萬里春分之時地正當中自此地漸漸而下至夏至地下游萬五千里地之上畔與天中平夏至之後地漸漸向上至秋分地正當天之中自此地漸漸而上至冬至上游萬五千里地之下畔與天中平自冬至後地漸漸而下地常升降於三萬里之中日中立竿測景以句股量之夏至立八尺表景一尺六寸表景千里而差一寸是則天上一寸地下千里是言本於周髀之文髀者股也以表為股相傳本伏羲氏立法自周公受之於大夫商髙周人志之故曰周髀考周禮日至之景尺有五寸謂之地中鄭衆説土圭之長尺有五寸以夏至之日立八尺之表其景與土圭等謂之地中今潁川陽城地也鄭𤣥云凡日景於地千里而差一寸景尺有五寸者南戴日下萬五千里也以此推之日當去其下地八萬里日邪射陽城則天徑之半也以句股法言之旁萬五千里句也立八極萬里股也従日邪射陽城弦也以句股求弦法入之得八萬一千三百九十四里天徑之半而地上去天之數也倍之得十六萬二千七百八十八里天徑之數也以周率乘之徑率約之得五十一萬三千六百八十七里周天之數也案宋元嘉十九年壬午使使往交州測影夏至之日影出表南三寸二分何承天遥取陽城夏至一尺五寸計陽城去交州路當萬里而影實差一尺八寸二分是六百里而差一寸也又梁大同中二至所測以八尺表率取之夏至當一尺一寸七分後魏信都芳注周髀四術稱永平元年戊子當梁天監之七年見洛陽測景又見公孫崇集諸朝士共觀秘書影同是夏至日其中影皆長一尺五寸八分以此推之金陵去洛南北略當千里而影差四寸則二百五十里而影差一寸也唐開元間命僧一行更造新厯遣太史監南宫説等於河南北平地測日晷及極星夏至日中立八尺之表同時候之陽城晷長一尺四寸八分弱夜視北極出地髙三十四度十分度之四浚儀岳臺晷長一尺五寸微强極髙三十四度八分南至朗州晷長一尺七寸七分極髙二十九度半北至蔚州晷長二尺二寸九分極髙四十度南北相距三千六百八十八里九十歩晷差一尺五寸三分極差十度半又南至交州晷出表南三寸三分八月海中南望老人星下衆星粲然皆古所未見大率去南極二十度以上皆見夫三千六百餘里晷差一尺五寸三分是約二百四十里差一寸以南北地里計南戴日下去嵩髙僅五千里在天則為十二度以此較之一度之廣四百餘里鄭𤣥等所謂千里而差一寸南戴日下萬五千里者非也又自漢至齊梁先儒談天者皆謂紐星即不動䖏惟祖暅之以儀測知不動䖏猶去紐星一度有餘自唐至宋又測紐星去不動處三度有餘南宋在臨安測紐星去極約有四度半元志但従三度之説葢紐星去極尚未有定説也唐開元間測浚儀岳臺北極出地三十四度八分宋志元志皆云三十五度或云三十五度弱大都北極出地四十度太强唐志云北極去地雖秒分微有盈縮難以目校大率三百五十餘里而差一度極之逺近既異則黄道軌景亦隨而變宋志沈括議云舊説謂今中國於地為東南當偏西北望極星置極不當正北又謂天常傾西北極星不得居中夫謂中國觀之天常北倚可也謂極星偏西則不然所謂東西南北者何從而得之豈不以日之所出者為東日之所入者為西乎古人候天自安南至浚儀纔六千里而北極差十五度稍北不巳庸詎知極星之不直人上也今南北纔五百里則北極輒差一度已上而東西南北數千里間日分之時候之日未嘗不出於卯半而入於酉半則又知天樞既中則日之所出者定為東日之所入者定為西天樞則常為北無疑矣以衡窺之日分之時以渾儀抵極星以候日之出沒則常在卯酉之半少北此殆放乎四海而同者何従而知中國之為東南也彼徒見中國東南皆際海而為是説也彼北極之出地六千里之間所差者已如是又安知其茫昧幾千萬里之外耶今直當據建邦之地人目之所及者裁以為法不足為法者宜置而勿議可也趙友欽曰地中有子午卯酉四向四向既正則輪盤二十四向皆正矣然而八方之地各有偏向若世所用指南針要亦可准試即偏地用之驗其所指者正午歟偏午歟使偏地而指偏午則二十四向皆隨偏午而定一向既差則餘向俱差矣曾三異因話録地螺或用子午正針或用子午丙壬間縫針天地南北之正當用子午或謂今江南地偏難用子午之正故以丙壬參之古者測日景於洛陽以其天地之中然外陽城之地少偏則難以正用矣至於廣雅則云天周六百一十萬餘里天去地一百一萬五千餘里淮南子論天去地五億萬里禹使大章豎亥歩自東極至西極南極至北極各二億三萬餘里又丘處機論北斗斡旋與星河在天皆不入地日亦不入地若日入地則與箕斗坼破人强稱星日入地者非是而楊升菴深信之夫自昔之論星度里差方向出入各有不同如此余據授時所測天度以句股密率較之得冬至日下去地二萬六千二百餘里夏至日下去地五萬九千二百餘里約千里差一度約天徑十二萬餘里天周三十七萬餘里是其數也縱授時所測或少有不的不過里數中小差於大約固不逺也如求其真則惟執句股之密率再於南北二三千里以準繩一量之即定矣然總不出千里上下差一度而諸論之異同可勿疑也若以測北辰則惟取璣衡正其北面即於紐星近處設管以目力圓轉求之晝夜一周於圓轉中自得不動之䖏出地度若干乃以正方案各於九服所在以景規之凡出入一規之交識以墨度以線屈其半以為中即所識與臬相當且其景最短則日南定矣極星正其北日景正其南将隨䖏各有子午卯酉之中而七政之出入因之指南針可勿用也至如沈括所疑人至偏北安知北極不直入人上不知人縦偏北北極直入人上然渾天斜倚之體自若日行之斜絡天腰與極星去赤黄道之數自若不見極南之夏至日景轉而之南乎景雖轉南而其日之自東北出西北沒自若耳此又不待辨而明者也大約地形原不過數萬里無數十萬里之説即元時北海測景夏至夜止二十刻不見地形之有涯耶人動稱西域去中國幾十萬里然印度寳瓶等十二宫與中華大略相同彼土人視正北亦在虚宿其歩厯月策止少四刻餘交終止多十刻餘以此見中西之逺不過萬餘里在天不過差十餘度非太懸絶也其云若逺者山川迂曲之故耳聞宣徳中有鄧老下西洋回為人言厯數國至極逺處仰視三光大小次第一切與中國不異是其證也夫天體至圓可以渾儀而測以此知其半覆地上半覆地下不出句股之率自得度里之周乃實際而非象㒺者若廣雅淮南所論天度皆荒逺不經之談而丘處機所論星日不入地則尚不識天渾日度為何狀而淺言夢言者也古今律厯考卷六十一
