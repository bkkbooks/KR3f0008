body:
  text: 古今律厯考卷六十八明邢雲路撰厯原二厯原紀日躔月離平立差之原紀日躔太陽冬至前後盈初縮末平立差六段所測積日盈初縮末八十八日九十一刻計六段測以六除之得每段積日一十四日八十二刻就整就整者以零少不能上也第一段積日一十四日八十二分分即刻第二段積日二十九日六十四分第三段積日四十四日四十六分第四段積日五十九日二十八分第五段積日七十四日一十分第六段積日八十八日九十二分六段所測積差分盈初縮末八十八日九十一刻以六段測每段下實測晷差若干為各段積差分如第一段積差七千五十八分二五乃是測晷至十四日八十二比初日所差之數餘倣此第一段積差七千五十八分二五第二段積差一萬二千九百七十六分三九二第三段積差一萬七千六百九十三分七四六二第四段積差二萬一千一百四十八分七三二八第五段積差二萬三千二百七十九分九九七第六段積差二萬四千二十六分一八四六段平差分乃平積差置第一段下積分七千五十八分二五七千為七十刻即以第一段積日一十四日八十二除之得四百七十六分二十五秒為第一段平差分四百為四刻是毎日平差置第二段下積分一萬二千九百七十六分三九二即以第二段積日二十九日六十四除之得四百三十七分八十秒為第二段平差分置第三段下積分一萬七千六百九十三分七四六二即以第三段積日四十四日四十六除之得三百九十七分九十七秒為第三段平差分置第四段下積分二萬一千一百四十八分七三二八即以第四段積日五十九日二十八除之得三百五十六分七十六秒為第四段平差分置第五段下積分二萬三千二百七十九分九九七即以第五段積日七十四日一十除之得三百一十四分一十七秒為第五段平差分置第六段下積分二萬四千二十六分一八四即以第六段積日八十八日九十二除之得二百七十分二十秒為第六段平差分各段一差置第一段平差分四百七十六分二十五秒與第二段平差分四百三十七分八十秒前後相減餘三十八分四十五秒為第一段一差乃初日至一十四日八十二刻共差之數置第二段平差分四百三十七分八十秒與第三段平差分三百九十七分九十七秒前後相減餘三十九分八十三秒為第二段一差乃第十四日八十二刻至第二十九日六十四刻共差之數置第三段平差分三百九十七分九十七秒與第四段平差分三百五十六分七十六秒前後相減餘四十一分二十一秒為第三段一差乃第二十九日六十四刻至第四十四日四十六刻共差之數置第四段平差分三百五十六分七十六秒與第五段平差分三百一十四分一十七秒前後相減餘四十二分五十九秒為第四段一差乃第四十四日四十六刻至第五十九日二十八刻共差之數置第五段平差分三百一十四分一十七秒與第六段平差分二百七十分二十秒前後相減餘四十三分九十七秒為第五段一差乃第五十九日二十八刻至第七十四日一十刻共差之數各段二差置第一段一差三十八分四十五秒與第二段一差三十九分八十三秒前後相減餘一分三十八秒為第一段二差置第二段一差與第三段一差四十一分二十一秒相減第三段一差與第四段一差四十二分五十九秒相減第四段一差與第五段一差四十三分九十七秒相減俱餘一分三十八秒為各段二差此乃是每日所差之數各段平差一差二差立成於後置第一段平差四百七十六分二十五秒為泛平積以第一段一差三十八分四十五秒加減第一段二差一分三十八秒前多後少加後多前少減今前少應於三十八分四十五秒内減一分三十八秒餘三十七分七秒為泛平積差另以二除第一段二差一分三十八秒即折半得六十九秒為泛立積差置泛平積四百七十六分二十五秒加減泛平差三十七分七秒前多後少加後多前少減今前多應於四百七十六分二十五秒内加三十七分七秒共積五百一十三分三十二秒為定平積即定差五百一十三萬三千二百數置泛平差三十七分七秒加減泛立差六十九秒前多後少加後多前少減今前少應於三十七分七秒内減六十九秒餘三十六分三十八秒為定平差置泛立差六十九秒以段日一十四日八十二除二次得三十一分有零不用為日立差分即微置定平差三十六分三十八秒以段日一十四日八十二除一次得二分四十六秒有零不用為日定平差萬定分置立差三十一分以六因之得一百八十六分為加分立差百定秒置平差二分四十六秒倍之得四分九十二秒再加加分立差一秒八十六微共得四分九十三秒八十六微為平立合差置定平積差五百一十三分三十二秒内減平差二分四十六秒再減立差三十一微餘五百一十分八十五秒六十九微為加分定差得盈初縮末平立差之原太陽夏至前後縮初盈末平立差六段所測積日縮初盈末九十三日七十一刻計六段測以六除之得每段積日一十五日六十二刻就整第一段積日一十五日六十二分第二段積日三十一日二十四分第三段積日四十六日八十六分第四段積日六十二日四十八分第五段積日七十八日一十分第六段積日九十三日七十二分六段所測積差分縮初盈末九十三日七十一刻以六段測每段下實測晷差各若干第一段積差七千百五十八分九九四第二段積差一萬二千九百七十八分六五八第三段積差一萬七千六九六六七九第四段積差二萬一千一百五七二九六第五段積差二萬三千二七八四八六第六段積差二萬四千一七六二四四六段平差分置第一段下積分七千百五十八分九九四即以第一段積日一十五日六十二除之得