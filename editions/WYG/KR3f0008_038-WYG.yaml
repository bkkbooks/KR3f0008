body:
  text: 古今律厯考卷三十八明邢雲路撰厯法三厯法歩五星授時厯度三百六十五度二十五分七十五秒厯中一百八十二度六十二分八十七秒半厯策一十五度二十一分九十秒六十二㣲半木星周率三百九十八萬八千八百分周日三百九十八日八十八分厯率四千三百三十一萬二千九百六十四分八十六秒半度率一十一萬八千五百八十二分合應一百一十七萬九千七百二十六分厯應一千八百九十九萬九千四百八十一分盈縮立差二百三十六加平差二萬五千九百一十二減定差一千八十九萬七千伏見一十三度火星周率七百七十九萬九千二百九十分周日七百七十九日九十二分九十秒厯率六百八十六萬九千五百八十分四十三秒度率一萬八千八百七分半合應五十六萬七千五百四十五分厯應五百四十七萬二千九百三十八分盈初縮末立差一千一百三十五減平差八十三萬一千一百八十九減定差八千八百四十七萬八千四百縮初盈末立差八百五十一減平差三萬二百三十五減定差二千九百九十七萬六千三百伏見一十九度土星周率三百七十八萬九百一十六分周日三百七十八日九分一十六秒厯率一億七百四十七萬八千八百四十五分六十六秒二五度率二十九萬四千二百五十五分合應一十七萬五千六百四十三分厯應五千二百二十四萬五百六十一分盈立差二百八十三加平差四萬一千二十二減定差一千五百一十四萬六千一百縮立差三百三十一加平差一萬五千一百二十六減定差一千一百一萬七千五百伏見一十八度金星周率五百八十三萬九千二十六分周日五百八十三日九十分二十六秒厯率三百六十五萬二千五百七十五分度率一萬合應五百七十一萬六千三百三十分厯應一十一萬九千六百三十九分盈縮立差一百四十一加平差三減定差三百五十一萬五千五百伏見一十度半水星周率一百一十五萬八千七百六十分周日一百一十五日八十七分六十秒厯率三百六十五萬二千五百七十五分度率一萬合應七十萬四百三十七分厯應二百五萬五千一百六十一分盈縮立差一百四十一加平差二千一百六十五減定差三百八十七萬七千晨伏夕見一十六度半夕伏晨見一十九度推天正冬至後五星平合及諸段中積中星置中積加合應以其星周率去之不盡為前合復減周率餘為後合以日周約之得其星天正冬至後平合中積中星命為日日中積命為度日中星以段日累加中積即諸段中積以度累加中星經退則減之即為諸段中星上考者中積内減合應滿周率去之不盡便為所求後合分推五星平合及諸段入歴各置中積加厯應及所求後合分滿厯率去之不盡如度率而一為度不滿退除為分秒即其星平合入厯度及分秒以諸段限度累加之即諸段入厯上考者中積内減厯應滿厯率去之不盡反減厯率餘加其年後合餘同上求盈縮差置入厯度及分秒在厯中已下為盈已上減去厯中餘為縮視盈縮厯在九十一度三十一分四十三秒太已下為初限已上用減厯中餘為末限其火星盈厯在六十度八十七分六十二秒半已下為初限已上用減厯中餘為末限縮厯在一百二十一度七十五分二十五秒已下為初限已上用減厯中餘為末限置各星立差以初末限乘之去加減平差得又以初末限乘之去加減定差再以初末限乘之滿億為度不滿退除為分秒即所求盈縮差又術置盈縮厯以厯策除之為策數不盡為策餘以其下損益率乘之厯策除之所得益加損減其下盈縮積亦為所求盈縮差求平合諸段定積各置其星其段中積以其盈縮差盈加縮減之即其段定積日及分秒以天正冬至日分加之滿紀法去之不滿命甲子筭外即得日辰求平合及諸段所在月日各置其段定積以天正閏日及分加之滿朔策除之為月數不盡為入月已來日數及分秒其月數命天正十一月筭外即其段入月經朔日數及分秒以日辰相距為所在定月日求平合及諸段加時定星各置其段中星以盈縮差盈加縮减之金星倍之水星三之即諸段定星以天正冬至加時黄道日度加而命之即其星其段加時所在宿度及分秒求諸段初日晨前夜半定星各以其段初行率乘其段加時分百約之乃順減退加其日加時定星即其段初日晨前夜半定星加命如前即得所求求諸段日率度率各以其段日辰距後段日辰為日率以其段夜半宿次與後段夜半宿次相減餘為度率求諸段平行分各置其段度率以其段日率除之即其段平行度及分秒求諸段増減差及日差以本段前後平行分相減為其段汎差倍而退位為増減差以加減其段平行分為初末日行分前多後少者加為初減為末前少後多者減為初加為末倍増減差為總差以日率減一除之為日差求前後伏遲退段増減差前伏者置後段初日行分加其日差之半為末日行分後伏者置前段末日行分加其日差之半為初日行分以減伏段平行分餘為増減差前遲者置前段末日行分倍其日差減之為初日行分後遲者置後段初日行分倍其日差減之為末日行分以遲段平行分減之餘為増減差前後近留之遲段木火上三星退行者六因平行分退一位為増減差金星前後退伏者三因平行分半而退位為増減差前退者置後段初日行分以其日差減之為末日行分後退者置前段末日行分以其日差減之為初日行分乃以本段平行分減之餘為增減差水星退行者半平行分為増減差皆以増減差加減平行分為初末日行分前多後少者加為初減為末前少後多者減為初加為末又倍増減差為總差以日率減一除之為日差求毎日晨前夜半星行宿次各置其段初日行分以日差累損益之後少則損之後多則益之為毎日行度及分秒乃順加退減滿宿次去之即毎日晨前夜半星行宿次求五星平合見伏入盈縮厯置其星其段定積日及分秒若滿歳周日及分秒去之餘在次年天正冬至後如在半歳周已下為入盈厯滿半歳周去之為入縮厯各在初限已下為初限已上反減半歳周餘為末限即得五星平合見伏入盈縮厯日及分秒求五星平合見伏行差各以其星其段初日星行分與其段初日太陽行分相減餘為行差若金水二星退行在退合者以其段初日星行分併其段初日太陽行分為行差内水星夕伏晨見者直以其段初日太陽行分為行差求五星定合定見定伏泛積木火土三星以平合晨見夕伏定積日便為定合伏見泛積日及分秒金水二星置其段盈縮差度及分秒水星倍之各以其段行差除之為日不滿退除為分秒在平合夕見晨伏者盈減縮加在退合夕伏晨見者盈加縮減各以加減定積為定合伏見泛積日及分秒求五星定合定積定星木火土三星各以平合行差除其段初日太陽盈縮積為距合差日不滿退除為分秒以太陽盈縮積減之為距合差度各置其星定合泛積以距合差日盈減縮加之為其星定合定積日及分秒以距合差度盈減縮加之為其星定合定星度及分秒金水二星順合退合者各以平合退合行差除其日太陽盈縮積為距合差日不滿退除為分秒順加退減太陽盈縮積為距合差度順合者盈加縮減其星定合泛積為其星定合定積日及分秒退合者以距合差日盈加縮減距合差度盈加縮減其星退定合泛積為其星退定合定積日及分秒命之為退定合定星度及分秒以天正冬至日及分秒加其星定合定積日及分秒滿旬周去之命甲子筭外即得定合日辰及分秒以天正冬至加時黄道日度及分秒加其星定合定星度及分秒滿黄道宿次去之即得定合所躔黄道宿度及分秒徑求五星合伏定日木火土三星以夜半黄道日度減其星夜半黄道宿次餘在其日太陽行分已下為其日伏合金水二星以其星夜半黄道宿次減夜半黄道日度餘在其日金水二星行分已下者為其日伏合行金水二星伏退合者視其日太陽夜半黄道宿次未到金水二星宿次又視次日太陽行過金水二星宿次金水二星退行過太陽宿次為其定合伏退定日求木火土三星定見伏定積日各置其星定見定伏泛積日及分秒晨加夕減九十一日三十一分六秒如在半歳周已下自相乘已上反減歳周餘亦自相乘滿七十五除之為分滿百為度不滿退除為秒以其星見伏度乘之一十五除之所得以其段行差除之為日不滿退除為分秒見加伏減泛積為其星定見伏定積日及分秒加命如前即得定見定伏日晨及分秒求金水二星定見伏定積日各以伏見日行差除其段初日太陽盈縮積為日不滿退除為分秒若夕見晨伏盈加縮減如晨見夕伏盈減縮加以加減其星定見定伏泛積日及分秒為常積如在半歳周已下為冬至後已上去之餘為夏至後各在九十一日三十一分六秒已下自相乘已上反減半歳周亦自相乘冬至後晨夏至後夕一十八而一為分冬至後夕夏至後晨七十五而一為分又以其星見伏度乘之一十五除之所得滿行差除之為日不滿退除為分秒加減常積為定積在晨見夕伏者冬至後加之夏至後減之夕見晨伏者冬至後減之夏至後加之為其星定見定伏定積日及分秒加命如前即得定見定伏日晨及分秒古今律厯考巻三十八
