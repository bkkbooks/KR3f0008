body:
  text: 古今律厯考卷十一明邢雲路撰歴代三歴代考前漢律厯志虞書云同律度量衡所以齊遠近立民信也自伏戲畫八卦卦由數起數紀於一協於十長於百大於千衍於萬書曰先其祘命本起於黄鐘之數始於一而三之三三積之厯十二辰之數十有七萬七千一百四十七而五數備矣其數以大衍之數五十其用四十有九成陽六爻得周流六虚之象天之中數五為聲地之中數六為律陽唱隂和始於子黄鐘終於亥應鐘黄鐘子為天統林鐘丑為地統太蔟寅為人統以黄鐘九寸之數應八十一章為黄鐘之實以林鐘六寸之數當期之日為林鐘之實以太蔟八寸之數應六十四卦為太蔟之實由是三統相通周流六虚列為十二而律呂和以審度嘉量權衡探􅄨索𨼆鉤深致遠莫不用焉此律厯之大較也然謂以律配厯則可而謂以律起厯厯數之分秒悉生於律則不可詳見别簡漢興張蒼用顓頊厯朔晦月見弦望滿虧多非是至武帝元封七年漢興百二歲矣太史令司馬遷等言厯紀廢壞宜改正朔詔曰黄帝合而不死上矣其以七年為元年復得前厯上元泰初四千六百一十七歲閼逢攝提格之歲中冬十一月甲子朔旦冬至日月在建星乃選治厯鄧平等唐都落下閎與焉都分天部而閎運筭轉厯其法以律起厯與鄧平所治同法一月之日二十九日八十一分日之四十三先藉半日名曰陽厯不藉名曰隂厯所謂陽厯者先朔月生隂厯者朔而後月廼生平曰陽厯朔皆先旦月生以朝諸侯王羣臣便宦者淳于陵渠覆太初厯晦朔弦望皆最宻日月如合璧五星如連珠遂用鄧平厯後元鳯三年張壽王争之以元鳯三年十一月朔旦冬至起雜候課疏宻治太初第一是非堅定至孝成世劉向子歆作三統厯究其微𣺌以説春秋推法宻要故述焉傳曰元善之長也共養三德為善三統合於一元故因元一而九三之以為法十一三之以為實實如法得一黄鐘初九律之首陽之變也因而六之以九為法得林鐘初六呂之首隂之變也皆參天兩地之法也上生六而倍之下生六而損之皆以九為法九六隂陽夫婦子母之道也律娶妻而呂生子天地之情也夫五六者天地之中和而民所受以生也故日有六甲辰有五子十一而天地之道畢言終而復始太極中央為黄鐘九九自乗八十一為日法為元元一也春秋二也三統三也四時四也合而為十成五體以五乗十大衍之數也而道據其一其餘四十九所當用也故蓍以為數以象兩兩之又以象三三之又以象四四之又歸竒象閏十九及所據一加之因以再扐兩之是為月法之實如日法得一則一月之日數也三辰交會是以能生吉凶成變化而行鬼神也并終數為十九易窮則變故為閏法參天九兩地十是為會數參天數二十五兩地數三十是為朔望之會以會數乗之則周於朔旦冬至是為會月九會而復元此聖王之重閏也以五位乗會數而朔旦冬至是為章月四分月法以其一乗章月是為中法參閏法為周至以乗月法以減中法而約之則六扐之數為一月之閏月其餘七分此中月相求之術也朔不得中是為閏月言隂陽雖交不得中不生故日法乗閏法是為統歲三統是為元歲元歲之閏隂陽災三統閏法易九戹曰初入元百六陽九次三百七十四隂九次四百八十陽九次七百二十隂七次七百二十陽七次六百隂五次六百陽五次四百八十隂三次四百八十陽三凡四千六百一十七歲與一元終經歲四千五百六十災歲五十七是以春秋曰舉正於中又曰閏月不告朔非禮也閏以正時故魯僖五年春王正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也至昭二十年二月己丑日南至失閏至在非其月梓慎望氛氣而弗正不履端於始也傳曰天有三辰地有五行故三辰合於三統日合於天統月合於地統斗合於人統五星合於五行故厯數三統天以甲子地以甲辰人以甲申三微之統既著而五行自青始其序亦如之隂陽比類交錯相成故九六之變登降於六體三微而成著三著而成象二象十有八變而成卦四營而成易為七十二參三統兩四時相乗之數也參之則得乾之策兩之則得坤之策以陽九九之為六百四十八以隂六六之為四百三十二凡一千八十隂陽各一卦之微筭策也八之為八千六百四十而八卦小成引而信之又八之為六萬九千一百二十天地再之為十三萬八千二百四十然後大成五星會終觸類而長之以乘章歲為二百六十二萬六千五百六十而與日月㑹三會為七百八十七萬九千六百八十而與三統會三統二千三百六十三萬九千四十而復於太極上元九章歲而六之為法太極上元為實實如法得一一隂一陽各萬一千五百二十當萬物氣體之數天下之能事畢矣此前漢厯之大較也詳其説謂黄帝合而不死合作也作厯得仙故不死曰復得上元四千六百一十七歲閼逢攝提之甲寅者謂是年復如上古甲寅朔旦冬至如後所謂二十七章之月得朔旦冬至與歲復之説非謂太初元年即甲寅盖是年乃丁丑也上元至太初元年為一元凡四千六百一十七歲乃劉攽註云十七歲當作十一歲非是中冬十一月朔旦冬至日月在建星者建在斗太初冬至在斗故云法以律起厯者乃黄鐘一龠長九寸寸九分以分乗寸積八十一數為日法也曰一月之日二十九日八十一分日之四十三者以日法八十一歸四十三得五十三刻八六四以加於大餘下共二十九日五十三刻八分六十四秒為一月之日即今月策也先藉半日名陽厯先朔月生者未朔月先出西方也不藉名隂厯朔後月廼生者朔後月方出西方也鄧平告君先朔月生以朝賀為便重陽為吉也元一而九三之以為法者自子一而後九辰至酉十以三統累乗之是謂九三之法得積萬九千六百八十三也十一三之以為實者自一而後十一辰至寅十二每以三累乘之是謂十一三之法得積十七萬七千一百四十七也實如法得一者以法除實為九寸之黄鐘也黄鐘六之以九為法者六九五十四得林鐘五十四也參天兩地者三三而九二三而六參兩之義也上生六而倍之下生六而損之者三分損益其一也律娶妻黄鐘陽娶林鐘隂呂生子林鐘隂生太蔟陽也日有六甲甲子甲寅甲辰甲午甲申甲戌也辰有五子甲子丙子戊子庚子壬子惟甲寅旬中無子故止五子也以五乗十得五十為大衍之數道據其一為太極虚一不用也止用四十有九以象兩儀兩之得九十八以象三才三之得二百九十四以象四時四之得一千一百七十六以歸竒象閏十九及所據一之太極共二十加之得一千一百九十六又以五歲再閏再扐兩之得二千三百九十二是為月法之實乃推大衍象得月法也如日法八十一得一為二十九日五十三刻八分六十四秒即前二十九日八十一分日之四十三所得之月策也并數終為十九盖天數終九地數終十并數十九為歸竒之閏法又名章歲也參天九三九二十七兩地十二十合四十七為會數參天數二十五得七十五兩地數三十得六十合一百三十五為朔望之會以會數乘朔望之會得六千三百四十五是為會月乃二十七章之月數得朔旦冬至日與嵗復也九㑹而復元者以九乗會月即三因統月得五萬七千一百五為元月謂四千六百一十七歲之月數積一百六十八萬六千三百六十日復得甲子朔旦冬至也以五位乗會數得二百三十五而朔旦冬至為章月四分月法得五百九十八為通法以通法乗章月得一十四萬五百三十為中法以三乗閏法得五十七為周至即三章之歲也以周至三乗月法得一十三萬六千三百四十四以減中法餘四千一百八十六是為一象之閏以統法而一得二日七十一刻九十九分七不盡是六氣六扐三月之閏其餘七分不盡再以三而一六扐之數得九十刻六十六分為一月之閏也以章月乗月法得五十六萬二千一百二十為周天即今歲實以三統乗四時得十二為歲中以章月加閏法得二百五十四為月周以三因會月得一萬九千三十五為統月以閏法乗歲中得二百二十八為章中以日法乗章中得一萬八千四百六十八為統中以三因統中得五萬五千四百四為元中以十乗元中得五十五萬四千四十以減周天餘八千八十為策餘以日法乗閏法得一千五百三十九為統法即統歲以三乗統法得四千六百一十七為元法即元歲也元歲之閏隂陽災盖以三統乗閏法得五十七為災歲初入元百六歲有戹者前元之餘氣也以隂九三百七十四減陽九四百八十為百六為陽九次以陽九百六減陽九四百八十為三百七十四為隂九次六八四百八為陽九次九八七百二為隂七次九八七百二為陽七次七八五百六八八六百四合一千二百易爻七八不變通其數各六百故曰次六百隂五次六百陽五次六八相乗為四百八為隂三又次陽三自百六次至四百八十凡四千六百一十七陽旱災隂水災經歲四千五百六十合災歲五十七與一元終由丁丑遡元歲四千六百一十七歲謂為得辛巳歲也三統天以甲子地以甲辰人以甲申自甲子歩厯年得三統元旦之朔日也三微一爻三著三爻二象六爻揲筮之法也參三統得九兩四時得八八九相乗得七十二為乾坤中數三之二百一十六得乾之策兩之一百四十四得坤之策以陽九爻九之為六百四十八以隂六爻六之得四百三十二併之凡一千八十以八卦八之為八千六百四十又八之為六萬九千一百二十以天地倍數再之為十三萬八千二百四十以乗章歲之十九為二百六十二萬六千五百六十以三會三之為七百八十七萬九千六百八十以三統三之為二千三百六十三萬九千四十而復會於太極上元以九章之歲一百七十一而六因之得一千二十六以除上元餘二萬三千四十為隂陽合數半之各萬一千五百二十為當萬物之數若皆符合矣然率多大謬不然者何也漢以四分度之一為斗分天數與日數齊而日無盈縮月無遲疾止用一平朔歩厯其上推上古朔旦冬至皆逆推得數非其真也以下歩即疎上可知已黄鐘之八十一自黄鐘之數耳於厯何關盖漢以八十一乗諸數而仍以八十一歸之諸數皆一轍也以歩晦朔常差一二日及見朔旦月出西方乃謬謂先藉半日名陽厯以為朝賀吉豈知是日為月三日也不直自欺且欺君矣張壽王雖不知厯然争之則是其推大衍謂以象厯則可謂厯之分秒出於大衍則不可率以大衍諸數碎砌其中以得月策二十九日五十三刻八分六十四秒使斯數果從大衍出也則易數通神可垂永久而柰何一亡效耶豈知月策之數是以交蝕取之非從大衍來也章月乃十九年二百二十八月及閏七月共二百三十五月豈五因會數所得通法即弦策中法即象限歲中即十二月會月是二十七章統月是八十一章之月元月是二百四十三章之月章中是十九章無閏之月統中是八十一章無閏之月元中是二百四十三章無閏之月統法是八十一章之年數元法是每歲十二月共五萬七千一百五月加閏一千七百一月積一百六十八萬六千三百五十九日二十五刻之數周天以測影取㑹數朔望之會與天地數不相蒙策餘是五日四分日之一以朔除氣為月閏何必用三章歲之周至乃漢厯不知皆以大衍數穿鑿附會之亦徒勞矣若夫陽九百六之年三統之厯以至復會上元之策皆非的數何則厯家布上元各不同以此知非的也考僖公五年丙寅冬至辛亥一十四刻閏餘二十七日九十七刻是月三十日辛亥日南至二月壬子日合朔非正月辛亥朔旦日南至盖春秋時誤閏十二月遂以正月為閏十二月以正月三十之辛亥日南至誤推後天一日為閏月後正月朔之辛亥日南至乃以二月朔壬子推為正月二日皆非也夫至既非朔矣僖公望雲於禮何居昭公二十年己卯歲冬至戊子八十三刻閏餘二十七日八十三刻經朔五十六日九十九刻是正月庚申日合朔越二十九日戊子日南至二月朔日己丑春秋誤歩固以尚未置閏之故梓慎之言是也詳見春秋考中大都漢厯天日同周氣朔無盈縮遲疾但以日法歸周天得六千九百三十九日七五三八六四二為積日章歲而一得歲實章月而一得月策統月除周天亦得月策以歩交轉日法乗月周得二萬五百七十四以歸周天得二十七日三二為交終轉終疎略殊甚則何怪乎亡一之合計推上元歲起甲戌日起甲子積一十四萬三千一百二十七筭以四千六百一十七為一元計三十一元以一千五百三十九分日之三百八十五為歲餘以八十一分日之四十三為朔餘推是歲丁丑十一月甲子朔夜半冬至詳其法太初元年距上元十四萬三千一百二十七筭積八百四億五千四百五十四萬九千二百四十以統法一千五百三十九而一得五千二百二十七萬七千一百六十日以紀法去之無餘分置前積數以月法二千三百九十二除之餘三千三百六十三萬四千八百四十五為月數以閏法十九而一得一百七十七萬二百二十五月無餘分故曰十一月甲子夜半冬至以授時法推太初元年距元辛巳積一千三百八十五年積日五十萬五千四百九十七日四十一刻以減氣應餘以紀法去之餘二日三十五刻九十三分以減紀法餘五十七日六十四刻命甲子筭外得辛酉日六十四刻是十一月二十九日申時冬至太初後天二日有餘授時閏餘二十七日四十七刻經朔三十日一十六刻十一月朔甲午歩至次月朔甲子然非冬至也太初既非至朔同日又非其月日時一謬百謬則上以歩文王四十二年十二月朔旦冬至以來下至元帝初元二年十一月癸亥朔旦諸冬至無一之不差也又以太初校授時辛巳置周天五十六萬二千一百二十以距積年乗之得七億七千七百九十七萬四千八十以統法一千五百三十九而一得五十萬五千五百六日二十二刻四十八分以紀法去之餘六日二十二刻四十八分命甲子筭外得庚午日二十二刻冬至太初校授時己未六刻後天一十一日一十六刻四十八分以太初校授時經朔閏餘二十六日四十二刻五十七分以冬至六十六日二二四八減之餘三十九日七十九刻九十分以授時經朔減之餘四日九十四刻四十分乃太初後天四日九十四刻四十分夫氣至差一十一日朔至差五日有數在焉鄧平劉歆其何説之辭三統五星厯按太初元年推木星統母以木三金四相乗為十二是為歲星小周小周乗巛坤字策一百四十四為一千七百二十八是為歲星歲數以歲中十二即一歲十二月乗歲數得二萬七百三十六為見中分以星行率一百四十五減歲數餘一千五百八十三為見中法即星見數以見中法除見中分得十三為積中餘一百五十七為中餘以歲閏七即十九年七閏因歲數得一萬二千九十六為見閏分以章歲十九乗中餘得二千九百八十三併見閏分得一萬五千七十九為月餘以章歲十九乗見中法得三萬七十七為見月法以元法四千六百一十七乗見中法得七百三十萬八千七百一十一為見中日法以統法一千五百三十九乗見中法得二百四十三萬六千二百三十七為見月日法積中即積月十三如是月餘滿見月法收之併積月下推金星以金四火二相乗為八又以火二乗之為十六而小復小復十六乗乾策二百一十六為三千四百五十六是為太白歲數以歲中乗歲數得四萬一千四百七十二為見中分以星行率一千二百九十五減歲數餘二千一百六十一為見中法以見中法除見中分得十九為積中餘四百一十三為中餘以歲閏因歲數得二萬四千一百九十二為見閏分以章歲乗中餘得七千八百四十七併見閏分得三萬二千三十九為月餘以章歲乗見中法得四萬一千五十九為見月法以晨為東數九乗歲數得三萬一千一百四并東九西七十六為法而一得一千九百四十四為金星晨見歲數以歲中十二乗之得二萬三千三百二十八為晨中分以見中法除晨中分得十為晨積中餘一千七百一十八為晨中餘以晨中分減見中分餘一萬八千一百四十四為夕中分以見中法除夕中分得八為夕積中餘八百五十六為夕中餘以歲周因晨見歲數得一萬三千六百八為晨閏分以章歲乗晨中餘得三萬二千六百四十二併晨閏分得四萬六千二百五十以見月法取之得一加前晨積中得十一為晨積月餘五千一百九十一為晨月餘以晨閏分減見閏分餘一萬三百八十四為夕閏分以章歲乗夕中餘得一萬六千二百六十四併夕閏分得二萬六千八百四十八不滿見月法為夕月餘夕積中八即積月以元法乗見中法得九百九十七萬七千三百三十七為見中日法以統法乗見中法得三百三十二萬五千七百七十九為見月日法推土星以土五木三相乗為十五合經緯即倍之為三十是為鎮星小周以小周乗坤策為四千三百二十是為鎮星歲數以歲中乗歲數得五萬一千八百四十為見中分以星行率一百四十五減歲數餘四千一百七十五為見中法以見中法除見中分得十二為積中餘一千七百四十為中餘以歲閏因歲數得三萬二百四十為見閏分以章歲乗見中法得七萬九千三百二十五為見月法以章歲乗中餘得三萬三千六十併見閏分得六萬三千三百不滿見月法即為月餘積月十二即積中以元法乗見中法得一千九百二十七萬五千九百七十五為見中日法以統法乗見中法得六百四十二萬五千三百二十五為見月日法推火星火經特成故二歲而過初過初者二歲一周天也自火二特成倍之至三十二倍六十四歲而小周以小周乗乾策則太陽大周為一萬三千八百二十四是為熒惑歲數以歲中乗歲數得一十六萬五千八百八十八為見中分以星行率七千三百五十五減歲數餘六千四百六十九為見中法以見中法取除見中分得一十五為積中餘四千一百六十三為中餘以歲閏因歲數得九萬六千七百六十八為見閏分以章歲乗見中法得一十二萬二千九百一十一為見月法以章歲乗中餘得七萬九千九十七併見閏分得一十七萬五千八百六十五以見月法取之得一加前積中得二十六為積月餘五萬二千九百五十四為月餘以元法乗見中法得二千九百八十六萬七千三百七十三為見中日法以統法乗見中法得九百九十五萬五千七百九十一為見月日法推水星水經特成故一歲而及初及初者歲一周天也自水一特成累加之至六十四而小復以小復乗坤策則太隂大周為九千二百一十六是為辰星歲數以歲中乗歲數得一十一萬五百九十二為見中分以見中法二萬九千四十一除見中分得三為積中餘二萬三千四百六十九為中餘以歲閏乗歲數得六萬四千五百一十二為見閏分以章歲乗見中法得五十五萬一千七百七十九為見月法以章歲乗中餘得四十四萬五千九百一十一併見閏分得五十一萬四百二十三為月餘不盈見月法故積月三以東九乗歲數得八萬二千九百四十四為實以東九西七併之得十六為法而一得五千一百八十四為晨歲數以歲中乗晨歲數得六萬二千二百八為晨中分以見中法除晨中分得二為晨積中餘四千一百二十六為晨中餘以晨中分減見中分餘四萬八千二百八十四為夕中分以見中法除夕中分得一為夕積中餘一萬九千三百四十三為夕中餘以閏法乗晨歲數得三萬六千二百八十八為晨閏分以章歲乗中餘得七萬八千三百九十四併晨閏分得一十一萬四千六百八十二不盈見月法為晨月餘晨積中即晨積月二以晨閏分減見閏分餘二萬八千二百二十四為夕閏分以積月三月餘五十一萬四百二十三減晨積月二月餘一十一萬四千六百八十二餘一為積月月餘三十九萬五千七百四十一為夕月餘以元法乗見中法得一億三千四百八萬二千二百九十七為見中日法以統法乘見中法得四千四百六十九萬四千九十九為見月日法五勝相乘生小周以乗乾坤之策為大周如金克木乘為木小周以乘坤策為大周也諸志並有小大周由入元之年不同也五星行星率乃其日行之數如木星行星三十三度三百三十三萬四千七百三十七分通其率故曰日行千七百二十八分度之百四十五故曰星行率一百四十五是也五星行星率其詳見前漢志中五星俱以三統三因各五星歲數以周天乗之得積日以各星見中日法而一得各星周日如木星三因木星歲數一千七百二十八得五千一百八十四以周天五十六萬二千一百二十乗之得二十九億一千四百三萬八十為木星積日以木星見中日法七百三十萬八千七百一十一而一得木星壹見三百九十八日五百一十六萬三千一百二分仍以見中日法再除日下五百一十六萬三千一百二分得七十刻六十四分三一不盡是為木星周日三百九十八日七十刻六十四分三十一秒不盡也金土火水四星倣此木星周日三百九十八日七十刻六十四分三一金星周日五百八十四日一十二刻九十八分二九土星周日三百七十七日九十三刻五十四分九七火星周日七百八十日五十三刻八十分五三水星周日一百一十五日九十一刻一分右五星所得見中日法以歩星周而設若見月日法則以歩月也然歩月之法不若徑以月策歩之為便見月日法不用可也以太初五星校授時木星每歲少授時一十七刻三十六分火星多授時六十刻九十分土星少授時一十五刻六十二分金星多授時二十二刻七十二分水星多授時三刻四十一分太初五星雖有伏見遲疾留逆而無盈縮則隨歩隨差何以上合天道大都前漢厯歩氣朔歩五緯率以大衍五行三統之數零收碎砌强合天數比至隨歩隨差隨差隨摭厯自厯天自天失天愈逺而總於大衍五行三統之數無豫也及查大衍諸數出周易鑿度四分之說乃後人偽為之漢人援以治厯以致氣朔淆亂數百年不明古議云由漢以來厯太初為第一余議云從古以來厯最疎者太初為第一古今律厯考卷十一
