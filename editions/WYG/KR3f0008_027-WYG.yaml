  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0008_WYG_027-1a, image: WYG0787/WYG0787-0312c.png}
body:
  text: 古今律厯考卷二十七明邢雲路撰厯代日食八厯代日食厯元元世祖至元十九年壬午嵗六月己丑朔日食七月戊午朔日食綱目同七月交九刻七月朔五十四日四五戊午巳時推是年六月朔無戊午交二十四日有竒不入食限不應食七月戊午朔交九刻入食限是日巳時日食合何元史重載六月朔食耶從古無比食之理郭守敬論之詳矣豈以守敬十八年方定授時而不辯此此必修史者誤書之也至元二十四年丁亥嵗十月戊午朔日食十月交一十四日七二十月朔五十四日六戊午未時是十月戊午朔未時日食至元二十六年己丑嵗三月庚辰朔日食三月交二十六日九二三月朔一十六日三九庚辰巳時是三月庚辰朔巳時日食至元二十七年庚寅嵗八月辛未朔日食八月交一十四日二三八月朔七日六三辛未申時是八月辛未朔申時日食至元二十九年壬辰嵗正月甲午朔日食正月交二十六日四三正月朔三十日五二甲午午時是正月甲午朔午時日食至元三十一年甲午嵗六月庚辰朔日食六月交一十四日三四六月朔一十六日三五庚辰辰時是六月庚辰朔辰時日食成宗大徳元年丁酉嵗四月朔日食見綱目史無四月交一十三日八五四月朔二十九日三癸巳辰時是四月癸巳朔辰時日食史漏大徳三年己亥嵗八月己酉朔日食太史奏日食不應八月交二十六日六六八月朔四十五日七五己酉巳時推是年八月己酉朔巳時日食元太史言是日巳時當食二分有奇至期不食衆懼保章正齊履謙曰當食不食在古有之矧巳時近午陽盛隂微故當食不食遂考唐開元以來當食不食凡十事以聞然三分以下不救大徳四年庚子嵗二月丁未朔日食二月交一十三日三六二月朔四十三日六七丁未申時是二月丁未朔申時日食大徳六年壬寅嵗六月癸亥朔日食太史院失於推算詔議其罪六月交二十六日一六六月朔五十九日七五癸亥酉時推是年六月癸亥朔酉時日食與天合元太史失於推算詔議其罪罪之宜也大徳七年癸夘嵗閏五月戊午朔日食閏五月交二十六日七七閏五月朔五十四日二九戊午夘時是閏五月戊午朔夘時日食大徳八年甲辰嵗五月癸未朔日食五月交一十七日五月朔四十八日五七壬子未時推是年五月朔壬子無癸未是日未時日食史誤書癸未仁宗皇慶元年壬子嵗六月乙丑朔日食六月交一十四日三一六月朔一日七一乙丑酉時是六月乙丑朔酉時日食延祐二年乙夘嵗四月戊寅朔日食四月交一十三日八一四月朔一十四日六戊寅未時是四月戊寅朔未時日食延祐五年戊午嵗二月癸巳朔日食二月交一十三日三二二月朔二十九日一癸巳子時推是年二月癸巳朔子時夜食不書元史誤夫以郭守敬方定授時厯稱最密今以授時推差至夜子不合查守敬卒於元祐三年卒才二年耳乃疇人習厯不熟遂爾誤布也延祐六年己未嵗二月丁亥朔日食二月交一十三日九三二月朔二十三日三五丁亥辰時是二月丁亥朔辰時日食延祐七年庚申嵗正月辛巳朔日食正月交一十四日五四正月朔一十七日四一辛巳巳時是正月辛巳朔巳時日食英宗至治元年辛酉嵗六月癸夘朔日食六月交二十六日七四六月朔三十九日五八癸夘未時是六月癸夘朔未時日食至治二年壬戌嵗十一月甲午朔日食十一月交一十四日十一月朔三十日六八甲午申時是十一月甲午朔申時日食泰定帝泰定四年丁夘嵗九月丙申朔日食九月交一十四日七七九月朔三十二日四八丙申午時是九月丙申朔午時日食文宗天厯二年己巳嵗七月丙辰朔日食七月交一十三日六六七月朔五十二日三七丙辰辰時是七月丙辰朔辰時日食至順二年辛未嵗八月甲辰朔日食十一月壬申朔日食八月交一十九日五十一月交二十六日四七十一月朔八日六四壬申申時推是年八月甲辰朔交泛一十九日有奇不入交不應食十一月壬申朔申時日食合夫日月凡六月一交無八月至十一月才隔三月兩交之理郭太史論之詳矣何史載之誤耶無乃疇人亂布失其真也順帝元統二年甲戌嵗四月戊午朔日食四月交一十四日三九四月朔五十四日三八戊午巳時是四月戊午朔巳時日食至元二年丙子嵗八月甲戌朔日食八月交二十七日一九八月朔一十日三九甲戌巳時是八月甲戌朔巳時日食至元三年丁丑嵗二月壬申朔日食二月交一十三日八九二月朔八日六八壬申申時是二月壬申朔申時日食至元四年戊寅嵗八月朔日食見綱目史無八月交一日二八月朔五十九日七一推是年八月朔過交不應食史不書食是綱目非至正二年壬午嵗八月朔日食十月朔日食見綱目八月交八日二十月交一十二日九十月朔三十五日五二己亥午時推是年八月朔交泛八日不入食限不應食十月己亥朔午時日食八月史無是綱目非十月綱目是史漏夫日月六月一交是年十月食是矣八月僅隔二月安得有食此綱目之誤載也至正三年癸未嵗四月丙申朔日食四月交二十六日八二四月朔三十二日三丙申辰時是四月丙申朔辰時日食至正四年甲申嵗九月丁亥朔日食九月交一十四日一二九月朔二十三日四五丁亥巳時是九月丁亥朔巳時日食至正五年乙酉嵗九月朔日食見綱目史無九月交一十四日七三九月朔一十八日八一戌時推是年九月戌初刻合朔日食則酉猶見其初虧至正六年丙戌嵗二月朔日食見綱目史無二月交二十六日三二二月朔四十六日六一庚戌午時是二月庚戌朔午時日食史漏至正七年丁亥嵗正月朔日食是日大寒而風朝官仆者數人見綱目史無正月交二十六日九三正月朔四十日四九甲辰巳時是正月甲辰朔巳時日食即綱目載是日大風寒朝官仆可見是日救日羣臣親覩其食矣何元史漏而不書耶至正八年戊子嵗七月朔日食見綱目史無七月交一十四日二四七月朔三十二日二四丙申夘時是七月丙申朔夘時日食史漏至正九年己丑嵗十一月朔日食見綱目史無十一月交二十六日四四十一月朔五十四日二戊午子時推是年十一月戊午朔子時夜食不書史無是綱目誤至正十年庚寅嵗十一月壬子朔日食十一月交二十七日十一月朔四十八日六三壬子申時是十一月壬子朔申時日食至正十一年辛夘嵗五月朔日食見綱目史無五月交一十三日七四五月朔四十五日一九己酉寅時推是年五月己酉朔寅正刻合朔日食則日出猶見其虧至正十二年壬辰嵗四月朔日食見綱目史無閏四月交一十四日五五閏四月朔三十九日七三癸夘酉時推是年閏四月癸夘朔酉初刻日食史漏綱目書四月亦非至正十三年癸巳嵗九月乙丑朔日食九月交二十六日五五九月朔一日三八乙丑巳時是九月乙丑朔巳時日食至正十四年甲午嵗三月癸亥朔日食三月交一十三日二五三月朔五十九日六四癸亥申時是三月癸亥朔申時日食至正十七年丁酉嵗正月朔日食見綱目史無正月交一十二日七五正月朔一十二日三九丙子巳時是正月丙子朔巳時日食史漏至正十八年戊戌嵗六月戊辰朔日食十二月乙丑朔日食六月交二十七日二七六月朔四日三六戊辰辰時十二月交一十三日九七十二月朔一日四三乙丑巳時是六月戊辰朔辰時日食十二月乙丑朔巳時日食至正二十年庚子嵗五月朔日食見綱目史無五月交二十六日一七五月朔二十三日一一丁亥丑時推是年五月丁亥朔丑正刻合朔夜食不書史無是綱目非夫既不食矣胡氏斷以為天完微弱陳友諒弑徐夀輝之應變不虛生義何取焉至正二十一年辛丑嵗四月辛巳朔日食四月交二十六日七八四月朔一十七日六八辛巳申時是四月辛巳朔申時日食至正二十四年甲辰嵗八月朔日食見綱目史無八月交一十二日九八八月朔二十八日三一壬辰辰時是八月壬辰朔辰時日食史漏至正二十六年丙午嵗七月辛巳朔日食七月交一十四日二七月朔一十七日五一辛巳午時是七月辛巳朔午時日食至正二十七年丁未嵗六月朔日食見綱目史無十二月癸夘朔日食見史綱目無六月交一十二日四九六月朔四十一日九七乙巳夜子初刻十二月交二十六日四十二月朔三十九日二五癸夘夘時推是年六月乙巳夜子合朔夜食不書史無是綱目非十二月癸夘朔夘時日食史書是綱目漏元初郭守敬造授時厯最近密傳之日官終元之世日官布算日食多漏者有非其日者甚至延祐五年二月朔之夜食至順二年八月朔之不入交亦誤書食以授時推乃正則豈守敬之誤皆疇人之不善用法也在昔且然况愈逺而愈失其真耶余自漢以來一一推厯代日食為考其果食與否以備證驗耳故但推其合朔在書時則不復詳其時差之分秒惟疑難者乃詳推焉古今律厯考卷二十七
