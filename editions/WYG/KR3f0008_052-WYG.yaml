body:
  text: 古今律厯考卷五十二明邢雲路撰厯法十七厯法火星合伏前合伏七百七十四日二八二一後合伏五日六四六九中星一十度三七二七縮厯一百三十八日四八七五八縮末厯四十四日一九九九一九加分二十七分六一一四二四積度一十三度五五七六減差一十三度一五二六定日三十四日六二一二九四加時定星三百六十二度四二四九九四入月數一十五日九四四二五入月已來日一十五日九四四二五順減差四十五分三五四四晨前夜半定星三百六十一度九七一四五十一月十七日戊戌夜半火星度尾一十四度六六三九是日未正三刻火星合伏尾十五度一十一分七十四秒晨疾初中積七十四日六四六九中星六十度三七二七盈厯二日三五八八三加分八十四分三四四二積度一度七三六四一一二四加差二度三九一五一定積七十六度六八六五一定日五十八日七六五六五一加時定星六十二度四一一八五一入月數一百日八八三八二月數三入二月入月已來日一十一日四九六六三二月經朔四十七日二六九四八順減差五十五分一二六八七二晨前夜半定星六十一度八六五八二己亥年二月十二日壬戌夜半火星度危一度七七七是日酉正一刻火星晨疾初危二度三十二分四十三秒晨疾末中積一百三十三日六四六九中星一百二度一七二七盈初厯四十一日二二八八三加分二十五分三五四二五八積度二十三度八六一一加差二十三度一四三九九五定積一百五十六日七九八九五定日一十八日八七四九五加時定星一百二十五度三一六六九五入月數一百八十日一九三二二六月數六入閏四月入月已來日三日九六六八閏四月經朔一十五日八六八二七入月定日一十八日八七四九五順減差六十分九三三九五晨前夜半定星一百二十四度七三五五八閏四月初四日壬午夜半火星度婁三度一三九八是日戌正二刻火星晨疾末婁三度七十四分九十一秒晨次疾初中積一百九十日六四六九中星一百四十一度二五二七盈厯七十七日五六八八三盈末厯一百五日五九九一九加分七分九四一四四積度二十四度九五七一三五加差二十四度九六一五八七定積二百一十五日六八四八七定日一十七日六八八八七加時定星一百六十六度二一四二八七入月數二百四十度一八一八月數八入六月入月已來日二日七六六七四六月經朔一十四日九二二一三入月定日一十七日六八八八七順減差四十六分一一二二九晨前夜半定星一百六十五度七五三二七五六月初四日辛巳夜半火星度畢四度九三五七是日申初初刻火星晨疾初畢五度三十九分六十七秒晨次疾末中積二百四十三日六四六九中星一百七十五度四一二七盈厯一百九日三三八三六盈末厯七十三日二八九九一八加分二十分六二八六八八積度二十度一八三三八七加差二十度二四三三六定積二百六十三日八九二六定日五日九六九八六加時定星一百九十五度六五六六入月數二百八十七日二九二五三七月數九入七月入月已來日二十一日五一七二七月經朔四十四日四五二六六入月定日五日九六九八六順減差六十分一七九七二晨前夜半定星一百九十五度五四二六二七月二十二日己巳夜半火星度井七度四六七是日夜子初一刻火星晨次疾末井八度八十五秒晨遲初中積二百九十日六四六九中星二百二度四五二七盈厯一百三十四日四八八八三盈末厯四十八日一三九九一九加分二十六分九三五八八積度一十四度一四四一加差一十四度一八一五五定積三百四日八三二四定日四十六日九一二加時定星二百一十六度六三八二入月數三百二十八日二三四七三一月數一十一入九月入月已來日三日三九八二八九月經朔四十三日五一三七九二入月定日四十六日九一二順減差四十八分三三六晨前夜半定星二百一十六度一五四八四九月四日庚戌夜半火星度井宿二十八度五七三四是日亥初三刻火星晨遲初井二十八度九十九分七秒晨遲末中積三百二十九日六四六九中星二百二十度一七二七盈厯一百五十日九六八八三盈末厯三十一日六五九九一八加分三十分六四九二二積度九度二五五六一六加差九度四五七五八四定積三百三十九日一四四八四定日二十一日一八四八四加時定星二百二十九度六三二八四入月數三百六十二日五六八一五月數一十二入十月入月已來日八日一三九六九九十月經朔一十三日四四三八五入月定日二十一日一八四八四順減差七分二四二九晨前夜半定星二百二十九度五五七八五五十月九日乙酉夜半火星度栁八度七七三是日丑正一刻火星晨遲末栁八度八十四分二十七秒晨留中積三百五十八日六四六九中星二百二十六度三七二七盈縮一百五十六日七三八八三盈末厯二十五日八八九九一九加分三十分九四六一六積度七度四三八七五加差七度七六五六八定積三百六十六日三五三四六八定日四十八日四三三六八加時定星二百三十四度七九二六八入月數三百八十九日七五五七九九月數一十三入十一月入月已來日五日八五八九十一月經朔四十二日五七四九七八入月定日四十八日四三三六八順減差一十六分四五六五晨前夜半定星二百三十三度九一四七三十一月七日壬子夜半火星度星初度一十二分七二是日巳正一刻火星晨留星初度二十九分一十七秒晨退中積三百六十六日六四六九定積三百七十四日三五四六八定日五十六日四三三六八入月數三百九十七日七五五七九九月數十三入十一月入月已來日一十三日八五八九入月定日五十六日四十三分三六八晨前夜半定星二百三十四度七九二六八十一月庚申日巳正一刻火星晨退星初度二十九分一十七秒夕退中積三百九十五日六一一四中星二百一十七度七一五九五盈厯一百六十三日二二八盈末厯一十九日四二六六六加分二十九分七六八一二六積度五度六四四七一八加差五度七七一七二九定積四百一日三八三一二九定日二十三日四六二七二九加時定星二百二十三度四八七六七九入月數四百二十四日七八五四六月數一十四入十二月入月已來日一十一日三五七一五八十二月經朔一十二日一五五七一入月定日二十三日四六二七二九退加差二十分三六晨前夜半定星二百二十三度六九一二七九十二月丁亥日夜半火星度栁二度九三七是日午初初刻火星夕退栁二度七十分一秒夕留中積四百二十四日五七五九中星二百九度五九二盈厯一百六十九日六六五三三盈末厯一十二日九六三四一九加分二十九分六一九五四四積度三度五六八三二二加差三度八五三六七八定積四百二十八日四二九五七八定日五十日五九一七八加時定星二百一十二度九一二八七八入月數四百五十一日八三一九九月數十五入次年正月入月已來日八日八七三一四庚子年正月經朔四十一日六三六一六四入月定日五十日五九一七八退加差二十二分四三八晨前夜半定星二百一十三度一三六九一六正月甲寅日夜半火星度井二十五度四八九四一六是日午正初刻火星夕留井二十五度二十六分五十三秒夕遲初中積四百三十二日五七五九定積四百三十六日四二九五七五定日五十八日五九一七八入月數四百五十九日八三一九九月數十五入正月入月已來日一十六日八七三入月定日五十八日五九一七八庚子年正月壬戌日午正初刻火星夕遲初井二十五度二十六分五十三秒夕遲末中積四百六十一日五七五九中星二百一十五度二五九二盈厯一百七十五日四三五三三盈末厯七日一九三四一九加分二十九分六六六五九四積度二度八六四四四加差二度一四三八二五定積四百六十三日七一九七二五定日二十五日七九九三二五加時定星二百一十七度四三二五入月數四百八十七日一二二五六月數十六入二月入月已來日一十四日六三二五六八二月經朔一十一日一六六七五七入月定日二十五日七九九三二五順減差三十分三七四三晨前夜半定星二百一十七度九九二八二二月己丑日夜半火星度井二十九度四五一七是日亥初初刻火星夕遲末井二十九度七十五分五十五秒夕次疾初中積五百日五七五九中星二百三十二度九七九二縮初厯九日二八六五八加分二十九分六三二四五六積度二度六七九五八減差二度七六四五六八定積四百九十七日九三二一九定日初日十刻九十八分一九加時定星二百三十度二一四六三二入月數五百二十一日三三二五五月數十七入三月入月已來日一十九日三一六四六九三月經朔四十日六九七三五入月定日六十日九八一九順減差六十五秒一八七三晨前夜半定星二百三十度八四四三月甲子日夜半火星度栁九度四二九是日子初正刻火星夕次疾初栁九度四二七一三二夕次疾末中積五百四十七日五七五九中星二百六十度一九二縮初厯三十四日四三六五八加分三十分九二九六積度一十度一七六九二減差一十度三一一七三二定積五百三十七日二六四一六七定日三十九日三四三七六七加時定星二百四十九度七七四六七入月數五百六十日六六六四九八月數十八入四月入月已來日二十九日一一五八二四四月經朔一十日二二七九四三入月定日三十九日三四三七六七順減差二十一分三一三五五四晨前夜半定星二百四十九度四九四三三一五月癸卯朔夜半火星度張九度三九六八三一是日辰正一刻火星夕次疾末張九度六十分九十九秒夕疾初中積六百日五七五九中星二百九十四度一七九二縮初厯六十六日二六五八加分二十二分七七三三八積度一十八度六五四八三減差一十八度七一七一二定積五百八十一日八七四一八八定日二十三日九五三七八八加時定星二百七十五度四七七四八七入月數六百五日二七六五一八月數二十入六月入月已來日一十四日六六四六五九六月經朔九日二八九一二九入月定日二十三日九五三七八八順減差六十三分九三七九六晨前夜半定星二百七十四度八三八四四九六月丁亥日夜半火星度翼一十六度九五九是日亥正三刻火星夕疾初翼一十七度五八九九夕疾末中積六百五十七日五七五九中星三百三十三度二五九二縮初厯一百二日五四六五八加分九分三五一八六積度二十四度六九五九五減差二十四度七四一七五四定積六百三十二日八三四一四二定日一十四日九一三七四二加時定星三百八度五一七四四五入月數六百五十六日二三六四七三月數二十二入八月入月已來日六日五六三四二七八月經朔八日三五三一五入月定日一十四日九一三七四二順減差六十三分九六一九晨前夜半定星三百七度八七七八二六八月戊寅夜半火星度角一十一度一五三二六是日亥初三刻火星夕疾末角一十一度七十八分九十九秒夕伏中積七百一十六日五七五九中星三百七十五度五九二縮厯一百四十一日四一六五八縮末厯四十一日二一二一六九加分二十五分三五四二五八積度二十三度八六一一減差二十三度一三九九四定積六百九十三日四三五九九六定