body:
  text: 古今律厯考卷六十七明邢雲路撰厯原一厯原句股測天北京立四丈表冬至日測得正午景長七丈九尺八寸五分以凖繩於正南二千里立四丈表同時測得景長七丈九尺二寸四分問日下去地若干里答曰二萬六千二百二十九里一百八十二歩北京立四丈表夏至日測得景長一丈一尺七寸一分正南二千里景長一丈一尺四寸四分問日下去地若干里答曰五萬九千二百五十九里九十三步術置表長四丈以步法五尺而一得八步二表相距二千里以里法三百六十步通之得七十二萬步以表長八步因之得五百七十六萬步以步法五尺因之得二千八百八十萬為積實以冬至南北二表景相較得六寸一分為法除積實得四千七百二十一萬三千一百一十三尺一寸一分為出地尺寸以步法五尺而一得九百四十四萬二千六百二十二步為日下去地步以里法三百六十步而一得二萬六千二百二十九里一百八十二步合問以簡儀測到冬至日南至地平二十六度四十六分五十秒為半弧背以立天元一求得矢度五度九十一分半置周天半徑截矢餘五十四度九十六分為股乃地心去戴日下之股以弦股别句術求得句二十六度一十七分六十六秒為日下至地度為半弧弦即冬至日出地度以夏至南北二表景相較得二寸七分為法除前積實得一億六百六十六萬六千六百六十六尺六寸六分以步法而一得二千一百三十三萬三千三百三十三步以里法而一得五萬九千二百五十九里九十三步合問以簡儀測到夏至日南至地平七十四度二十六分半為半弧背以立天元一求得矢度四十三度七十四分少置周天半徑截矢餘一十七度一十三分二十五秒為句乃地心去戴日下之句以句弦别股術求得股五十八度五十四分半為日下至地度為半弧弦即夏至日出地度此北京距南二千里所測之數也然九服所在天有低昂地有髙下時有四序須隨地隨時各以句股測算為凖測日置冬夏二至前後距所相對之日以圭表所測正午晷景日日識之計取甲子日期以相連或前或後二日之景相減為法仍以前後日之相對者各一日之景相減為實實如法而一冬至景前多後少為減差後多前少為加差夏至景前少後多為減差後少前多為加差皆加減相距日得數半之加半日刻命起日算外滿百刻為日餘以發斂收之為時刻及分假如元世祖至元十四年丁丑嵗冬至其年十一月十四日己亥景長七丈九尺四寸八分五釐五毫至二十一日丙午景長七丈九尺五寸四分一釐二十二日丁未景長七丈九尺四寸五分五釐以己亥丁未二日之景相較餘三分五毫為晷差進二位為實再以丙午丁未二日景相較餘八分六釐為法除實得三十五刻用減己亥距丁未八日是八十刻餘七百六十五刻折取其中加半日五十刻共得四百三十二刻半百約為日得四日餘以發斂收之得辰初三刻日命初起己亥日算外得癸夘日辰初三刻為丁丑嵗冬至若以甲子計之是三十九日三十二刻半就為此嵗氣應此取至前後四日景他倣此周琮論至前後日景差少不若取立冬立春二日之景以為去至日逺日差頗多易於推考為是然而古今所測冬夏至景分秒有不同者則各代尺分不同非景之故也測月其法大都與測日同然日測正午月則測月到天中自某日起至某日止以漏水記之以月行或最髙或最低前後距所相對之日圭表所測月到天中之晷以相連二日景相減為法仍以前後相對日景相減為實實如法而一最髙前少後多為減差前多後少為加差最低前多後少為減差前少後多為加差漏記積日起日至本日積若干刻加本日夜半後月到天心若干刻減起日夜半後月到天心若干刻實得若干刻各以加減差加減之得數半之命起日算外滿百刻為日以發斂收之為時刻及分為月到最髙或最低處以法布至月之遲疾毫無爽矣測歲實取前人所測實景所得冬至日時刻分秒計甲子算外得幾十幾日幾十幾刻分秒距今見測到天正冬至日時刻分秒共計幾十幾萬幾千幾百幾十幾日幾十幾刻分秒為實以相距積年為法而一得歲實假如元至元十七年庚辰歲冬十一月所測日景推得己未日夜半後六刻上取前劉宋大明五年辛丑冬十一月祖沖之所測日景推得十一月三日乙酉夜半後三十二刻六十九分為准以距至元庚辰積八百一十九年間共得二十九萬九千一百三十四日内加庚辰歲測到夜半後六刻内減去大明五年測到夜半後三十二刻六十九分餘二十九萬九千一百三十三日七十三刻三十一分為實以相距積年八百一十九而一得三百六十五日二十四刻二十六分五十三秒有竒為授時歲周測月策取古厯所測冬至日時刻真者距今日所測冬至日時刻為實另以相距積年若干乗每歲之閏法三分六十八秒二十八微得數定以十分為月得閏月若干月及分秒寄位以積年乗每歲十二月得若干月加寄位之閏月分共得數為法除前實得數為月策閏法者是一章十九年不及七閏祖沖之以二十章及十一年中該閏一百四十四月故曰章閏二十章及十一年共三百九十一年故曰章歲以章歲除章閏得一嵗之閏分故曰閏法至今厯家遵用之測轉終及轉應視月在天以大星距而測之識在某宿某度分秒日時刻數待二十六七日又測月在某宿某度分秒日時刻數一嵗之中十三周有竒十嵗之中一百三十二周有竒百嵗之中一千三百二十五周有竒千嵗之中約一萬三千二百五十五周取前人史載月凌犯某宿某星真者幾事累計之以前人所測月到日時刻分距今所測月到日時刻分共積幾十幾萬幾千幾百幾十幾日時刻分為實另置萬章之月周二百五十一萬八千四百七十二以十九萬除之得每嵗月周一十三周二五五一一七以相距積年若干年乗之得月周若干周為法以除前實得轉終以轉終初起之半處即轉應測交終置古厯所測冬至距今所測冬至積日為實另置萬章之中月與日道交二百五十五萬一百八十一交以十九萬除之得每嵗月交十三交四二二五二六以相距積年若干年乗之得月交若千交為法以除前實得交終測交泛及交應或日食或月食驗在某宿某度分秒距交道幾度分秒以月平行度而一得幾十幾刻分秒如交道在前為交後分加交道在後為交前分減皆加減交終或交中為交道所食之處得數即交泛分看是何月如求本年十一月朔交泛以距月月數因朔交差有閏加一得數以加本月朔交泛得十一月朔交泛就加此月閏餘為交應測經朔及閏應或日食或月食以漏計之至食甚刻分為實如是盈遲作減差以減實是縮疾作加差以加實如午前加時差午後減時差就為經朔分看是何月以距月月數因朔實有閏加一得數以加本月經朔滿紀去之得十一月經朔以減月中氣餘為閏餘即閏應古今律厯考卷六十七
