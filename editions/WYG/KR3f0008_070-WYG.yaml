body:
  text: 古今律厯考卷七十明邢雲路撰厯原四厯原求黄赤道度及率總數周天徑一百二十一度七十五分係圍三徑一半徑六十度八十七分半又黄赤道大弦又立勾股弦黄赤道内半弧背二十四度是日出入赤道内外度黄赤道矢四度八十四分八十二秒自弧矢割圓來又為勾股較黄赤道大句二十三度八十分七十秒是弦股求勾得黄赤道大股五十六度二分六十八秒又為立股是矢減大弦得又為勾股合問黄道去赤道内外二十四度似半弧背之狀得矢若干答曰四度八十四分八十二秒術用割圓法以半弧背自之為半弧背冪以周天徑自之為徑冪又為上廉以二冪相乘為正實徑冪乗徑為益從方半弧背倍之以徑乘之為下廉以初商四數乗上㢘以減益從方餘為從方以初商四自之以減下㢘餘以初商乗之為從㢘併從方為下法以除正實得初商四度餘實寄位又次商八十分加於初商四倍得八度之下為併法以乗上亷以減益從方餘為從方置初次商四八自之加初商四自之之數減下㢘餘乗併法為從亷併從方為下法以除餘實餘為次餘實又次商四分置初次商四度八十倍之加又次商四分為併法乗上㢘減益從方餘為從方置初次又次三商四八四自之加初次商自之之數以減下亷餘乗併法為從亷併從方為下法以除次餘實餘為再次餘實再次商八十秒加初次又次三商倍之之數為併法以乗上亷以減益從方餘為從方置初次又次再次三商四度八十四分八十秒自之加初次又次三商自之之數減下亷餘乗四商併法為從㢘併從方為下法除再次餘實再又次商二秒如前法取之得數合問他倣此此為三乘方法割圓式問半背二十四度矢四度八十四分八十二秒得半弧弦若干答曰二十三度八十分七十秒術以半徑為大弦自之得三千七百五度七六五六二五為弦冪以大股自之得三千一百三十九度二三一八二四為股冪二冪相較餘五百六十六度一九三七五平方開之合問又法以矢四度八四八二自之得二十三度五五四三二四為矢冪以周天徑一百二十一度太而一得半背弦差減半背餘為半弧弦合問他倣此推黄赤道立成積度度率等法術以黄道矢減周天半徑餘為黄赤道小弦以黄赤道大股乗之以黄赤道大弦而一為黄赤道小股以黄道背弦差減黄道度餘為黄道半弧弦黄道度即半弧背置黄道半弧弦自之黄赤道小股自之相併以平方開之得赤道小弦置半黄道半弧弦亦為赤道小股以半徑乗之半徑亦即赤道大弦以赤道小弦而一為赤道大股又為赤道半弧弦置黄道小股亦為赤道横勾以赤道大弦乗之以赤道小弦而一為赤道大句以減半徑餘為赤道横矢自之以周天徑而一得半背弦差減半弧背餘為半弧弦如冬至後半弧背四十四度問赤道半弧背若干答曰赤道半弧背四十六度三十分八十五秒即今所用黄赤道積度黄赤道差二度三十分八十五秒術曰先以立天元一求矢以前三乗方法求黄道半弧背四十四度下矢一十六度五六八二以減周天半徑餘四十四度三六八為黄赤道小弦又為股置赤道股即小弦四十四度三六八自之得一千九百六十三度九二五二六二四為股冪周天半徑自之得三千七百五度七六五六二五為弦冪二冪相較餘一千七百四十二度三九八七六以平方開之得四十一度七十四分五十三秒為黄道半弧弦以減半弧背四十四度餘二度二十五分四十七秒為背弦差又法矢十六度五六八二自之得二百七十四度五五二五一二四以周天徑而一得二度二十五分四十六秒半為背弦差置黄赤道大股五十六度二六八以黄赤道小弦四十四度三十分六八乗之得二千四百八十二度三十六分八二二二二四以黄赤道大弦六十度八七五而一得四十度七七八一為黄道小股置黄道半弧弦四十一度七四五四自之得一千七百四十二度六七八四七五六一一六為弦冪以黄道小股四十度七七八一自之得一千六百六十二度八五七五七四三九六一為股冪二冪相併得三千四百五度五三五八四七一七二六以平方開之得五十八度三十五分六十九秒為赤道小弦又法置黄道半弧弦即赤道小股四十一度七四五四以半周徑即赤道大弦六十度八七五乗之得二千五百四十一度二五一二二五為實以赤道小弦五十八度三五六九而一得四十三度五四六七為赤道半弧弦置大弦六十度八七五自之得三千七百五度七六五六二五為弦冪以小股四十三度五四六七自之得一千八百九十六度三一八二三八九為股冪二冪相較餘一千八百九度四四七三九四一一以平方開之得四十二度五三十七為赤道立股又名横句即弦股别勾法又法置赤道小股四十度七七八一以大弦六十度八七五乗之得二千四百八十二度三六六八三七五以小弦五十八度三五六九而一得四十二度五三七七為赤道立股置大弦減赤道立股餘十八度三三七三為矢置矢十八度三三十三自之得三百三十六度二五六一七一二九以周天徑一百二十一度十五而一得二度七六一八為半背弦差置半弧弦四十三度五四六七加半背弦差得四十六度三八五為赤道半背解曰黄道赤道半背若在冬夏二至後赤道即春秋二分黄道如分後四十四度是黄道半背四十六度三八五是赤道半背冬夏二至反是周天圓周半之是全弧背如是四分之一是半弧背即周天象限九十一度有竒自半背一度至九十一度皆用前推弧矢弦背法為句股接弧矢三乘㢘法割圓術北極出地四十度九十五分係所測二至黄赤道内外度二十三度九十分係所測二至黄赤道内外半弧弦二十三度七十一分為黄赤道九勾三斜二至出入差股十五度二十九分為三斜中股二至出入差半弧弦十九度八十七分即小弦二至出入差半弧背十九度九十六分一十四秒度差八十四分一十九秒冬至去極一百一十五度二十一分七十三秒夏至去極六十七度四十一分一十三秒求二至差股及出入差置所測北極出地四十度九十五分為半弧背以前割圓弧矢求弦法推得出地半弧弦三十九度二十六分為三大斜中股置測到二至黄赤道内外度二十三度九十分為半弧背以前法推内外半弧弦二十三度七十一分為黄赤道大句小斜以大句與周天半徑以句弦别股術得股較徑餘四度八十一分為二至出入矢夏至日南至地平七十四度二十六分五十秒為半弧背以前術求得日至地平五十八度四十五分為半弧弦以半徑六十度八十七分五十秒為大三斜置大三斜中段三十九度二十六分以二至内外半弧弦二十三度七十一分乘之得九百三十度八五四六以周天半徑六十度八七五而一得一十五度二十九分為小三斜中股置小三斜中股一十五度二九較日至地平半弧弦五十八度四十五分餘四十三度一十六分為大股置半徑六十度八七五減出入矢度四度八一餘五十六度六分半為大股弦以小股一十五度二九乗之得八百五十七度二三三八五以大股四十三度一六而一得一十九度八十七分為出入差半弧弦又為小弦是二至出入差半弧弦置二至出入差半弧弦以前法求之得出入半弧背一十九度九十六分一十四秒置二至出入差半弧背一十九度九六一四以黄赤道内外半弧弦二十三度七一而一得八十四分一十九秒為度差分去極距地日下之圖二至前後黄道距赤道内外度置半徑以減赤道小弦餘為赤道二弦差一云赤道矢置半徑減黄道矢餘為黄赤道弦一為立股若相近曰句以二至内外黄赤道半弧弦乗之以半徑六十度八七五而一得為黄赤道小弧弦即黄赤道内外半弧弦一云黄道小句置黄赤道小弧矢自之以周天圓徑而一為半背弦差以加黄赤道半背弧弦即為黄赤道内外半弧背推每日去極度分視其黄道赤道内外度在盈初縮末為加縮初盈末為減皆加減周天象限度各得日去極度及分秒如冬至後四十四日問日去極幾何日即度答曰去極一百八度六十二分三十二秒術置周天半徑六十度八七五以減赤道小弦五十八度三五六九餘二度五一八一為黄赤道弧之矢即内外矢置半徑六十度八七五以減半弧背四十四度下矢一十六度五六八二餘四十四度三六八為黄赤道小弦以二至出入内外半弧弦二十三度七一乗之以黄赤道大弦六十度八七五而一得一十七度二五六九為黄赤道小弧弦即黄赤道内外小弧弦如短者為立句或為卧弦置黄赤道小弧矢二度五一八一自之以周天徑一百二十一度七五而一得五分二十秒為弦差加小弧弦得一十七度三十分八九為内外度即黄赤道半弧背置周天象限九十一度三一四三如是在盈初縮末為加縮初盈末為減皆加減黄赤道内外度如冬至後四十四日是盈初應加内外度十七度三十分八十九秒共得一百八度六十二分五十二秒合前問前後每日皆倣此求每日太陽出入赤道去極度置所推每日晨前夜半太陽黄道積度如滿嵗周象已下為初限已上以減半嵗周為末限如積滿度率去之餘以内外差乗之百約之所得之數以減内外弧背率為内外度分内減漸近外加漸逺是加減象限即為所推得去極度及分秒冬至晝刻即夏至夜刻三十八刻一十六分夏至晝刻即冬至夜刻六十一刻八十四分昏明二十五刻推黄道每日晝夜刻術置黄赤道半弧弦以二至出入半弧背乗之得數以二至出入内外半弧弦而一為所求出入差半弧背又術置黄赤道内外半弧弦以度差八十四分一十九秒乗之為出入差半弧背置圓徑内減所求得内外二矢即赤道小弦差餘以三因加每日行度為日行百刻度置出入半弧背以百刻乘之得數以日行百刻度而一得數為出入差刻置昏明二十五刻加黄道在赤道内為加外為減皆加減出入差刻為半晝刻倍之為晝刻以日百刻較之餘為夜刻如冬至後四十四日問晝夜各幾刻答曰晝四十一刻七十二分半夜五十八刻二十七分半術置冬至後四十四日即度黄赤道内外半弧弦一十七度二五六九即黄赤道小弦以二至出入差半弧背一十九度九六一四乗之以二至黄赤道内外半弧弦二十三度七一而一得一十四度五十二分八十五秒為所求得出入差半弧背又術置黄赤道内外半弧弦以每日度差八十四分一九乘之為出入差半弧背置周天圓徑一百二十一度七五内減所求得黄赤道内外二矢五度三六四餘一百一十六度七一三八三因之加每日度一度得三百五十一刻一十四分一十四秒為日行百刻度置出入半弧背一十四度五二八五以日行百刻乘之得數以日行百刻度三百五十一刻一四一四而一得四刻一十三分七十五秒為日出入差刻置昏明二十五刻為準黄道在赤道外減内加皆加減出入差刻今應減出入差刻四刻一十三分七十五秒餘二十刻八十六分二十五秒為半晝刻分倍之得四十一刻七十二分半為晝刻置日之百刻減晝刻餘五十八刻二十七分五十秒為夜刻合前問推毎日晝夜刻日出入晨昏更㸃率更㸃所在時刻昏明五更中星見厯法古今律厯考卷七十
