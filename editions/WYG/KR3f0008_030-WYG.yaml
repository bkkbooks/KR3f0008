body:
  text: 古今律厯考卷三十明邢雲路撰律呂二律呂律生五聲宮聲八十一下生徴商聲七十二下生羽角聲六十四下生變宫徴聲五十四上生商羽聲四十八上生角黄鐘之數九九八十一以為宮是為五聲之本以宮之八十一數三分之每分二十七三分損一於八十一數損其二十七餘五十四下生徴故徴數五十四也徴三分益一七十二上生商商三分損一四十八下生羽羽三分益一六十四上生角是黄鐘為均用五聲之法以下十一辰辰各有五聲其為宫商之法亦如之故辰各有五聲是十二律之正聲也詳此是十一律皆可為宫盖置本律之實以九九因之三分損益以為五聲再以本律之實約之則宮固八十一商亦七十二角亦六十四徴亦五十四羽亦四十八也如應鐘為宮置本律應鐘之實九萬三千三百一十二以九九八十一乘之得七百五十五萬八千二百七十二為宮以九萬三千三百一十二約之為八十一三分宮損一得五百三萬八千八百四十八為徴以九萬三千三百一十二約之為五十四三分徴益一得六百七十一萬八千四百六十四為商以九萬三千三百一十二約之為七十二三分商損一得四百四十七萬八千九百七十六為羽以九萬三千三百一十二約之為四十八三分羽益一得五百九十七萬一千九百六十八為角以九萬三千三百一十二約之為六十四是也盖十二律生於黄鐘雖各長短不齊及其旋相為宮以生五聲二變皆約以八十一起數而五十四以後次之則八十四聲各有所歸矣然五聲至角其數六十四以三分之每分二十一不盡一筭數不可行此正聲所以止於五也通而變之角聲乃生變宮變徴以足五聲二變之數耳變聲二變宮聲四十二餘小分九分分之六羽後宮前上生變徵變徵聲五十六餘小分九分分之八角後徵前不生考國語周景王問於泠州鳩曰七律者何韋昭註曰周有七音黄鐘為宮太蔟為商姑洗為角林鐘為徵南呂為羽應鐘為變宮蕤賔為變徵然則五聲二變有自來矣盖五聲宮與商商與角徵與羽相去各一律至角與徵羽與宮相去乃二律以隔八相生之序言之如黃鐘為宮則相去一律而太蔟為商商相去一律而姑洗為角角相去二律始得林鐘之徵徵相去一律而南呂為羽南呂之羽距黃鐘之宮又相去二律焉相去一律則音節和相去二律則音節逺故角徵之間近徵收一聲比徵少下謂之變徵羽宮之間近宮收一聲少高於髙謂之變宮也五聲相生至於角位其數六十有四以三分之每分二十有一不盡一筭五聲之正至此而窮然旣不可行當有以通之聲之變者二故置一而兩三之置子之一而兩至寅以三厯之得九以九因角聲之實六十四得五百七十六以三分之每分一百九十二三分損一為三百八十四以九歸之為四十二下生變宮是姑洗生應鐘也餘六不用又以變宮之三百八十四三分之每分一百二十八三分益一為五百一十二以九歸之為五十六上生變徵是應鐘生蕤賔也餘八不用至變徵之數五百一十二以三分之又不盡二筭其數又不行此變聲所以止於二也變聲者所以濟五聲之不及宮比於宮徵比於徵雖有七聲其實五聲而已淮南子曰姑洗生應鐘比於正音故為和應鐘生蕤賔不比於正音故為謬曰謬則已難比於正故變聲非正不為調也旋宮八十四聲圖宮下生徵上生商下生羽上生角下生變宮上生變徵止一宮十一月黄正林正太正南正姑正應正㽔正二宮六月林正太正半南正姑正半應正蕤正半大正半三宮正月太正南正姑正應正蕤正大正半夷正四宮八月南正姑正半應正蕤正半大正半夷正半夾正半五宮三月姑正應正半蕤正大正半夷正夾正半無正六宮十月應正蕤正半大正半夷正半夾正半無正半仲正半七宮五月蕤正大正半夷正夾正半無正仲正半黄變半八宮十二月大正夷正夾正無正仲正黄變半林變九宮七月夷正夾正半無正仲正半黄變半林變半太變半十宮二月夾正無正仲正黄變半林變太變半南變十一宮九月無正仲正半黄變半林變半太變半南變半姑變半十二宮四月仲正黄變半林變太變半南變姑變半應變此言十二律還相為宮以次生五聲二變成八十四聲也律呂之數徃而不返惟黄鐘不為他律所役所用七聲皆正律無空積忽微盖黄鐘為宮則林鐘為徵太蔟為商南呂為羽姑洗為角應鐘為變宫蕤賔為變徵皆正無餘分也自林鐘而下則有半聲如太蔟為宮則以大呂為變宮大呂為宮則以黄鐘為變宮一半聲也姑洗為宮則以大呂為羽夾鐘為變宮夾鐘為宮則以黄鐘為羽太蔟為變宮二半聲也林鐘蕤賔四半聲南呂夷則五半聲應鐘無射六半聲自蕤賔而下則有變律如蕤賔為宮則以黄鐘變為變徵一變律也大呂為宮則以黄鐘變為變宮林鐘變為變徵二變律也夷則三變律夾鐘四變律無射五變律仲呂六變律半聲變律皆有空積忽微不得其正故黄鐘一均獨為聲氣之元也其序每一律役六律已徃者退方來者進如黄鐘為宮下生林鐘徵徵上生太蔟商商下生南呂羽羽上生姑洗角角下生應鐘變宮變宮上生蕤賔變徵一均旣畢黄鐘者退大呂者進林鍾為宮上生太蔟徵徵下生南呂商商上生姑洗羽羽下生應鐘角角上生蕤賔變宮變宮下生大呂變徵一均旣畢林鐘者退夷則者進自此以徃至於蕤賔則變黄鐘為變徵大呂則變黄鐘為變宮變林鐘為變徵以次夷則三變夾鐘四變無射五變至仲呂六變總之十二律各備七聲七聲各足十二律而後終焉然黄鐘為元十一律皆受法於黄鐘雖其管長短不齊及其用而為宮則一也宮數八十一則皆約以八十一起數三分損益以序生四聲二變有條而不紊者也以正言之黄鐘為宮置黄鐘本律之實十七萬七千一百四十七以宮八十一乘之得一千四百三十四萬八千九百七為宮數以本律之實約之為八十一為宮三分宮數每分四百七十八萬二千九百六十九三分損一得九百五十六萬五千九百三十八以本律之實約之為五十四為徵是為黄鐘之宮下生林鐘之徵置林鐘本律之實十一萬八千九十八以徵五十四乘之得六百三十七萬七千二百九十二為徵數三分徵數每分二百一十二萬五千七百六十四三分益一得八百五十萬三千五十六以本律之實約之為七十二為商是為林鐘之徵上生太蔟之商置太蔟本律之實十五萬七千四百六十四以商七十二乘之得一千一百三十三萬七千四百八為商數三分商數每分三百七十七萬九千一百三十六三分損一得七百五十五萬八千二百七十二以本律之實約之為四十八為羽是為太蔟之商下生南呂之羽置南呂本律之實十萬四千九百七十六以羽四十八乘之得五百三萬八千八百四十八為羽數三分羽數每分一百六十七萬九千六百一十六三分益一得六百七十一萬八千四百六十四以本律之實約之為六十四為角是為南呂之羽上生姑洗之角置姑洗本律之實十三萬九千九百六十八以角六十四乘之得八百九十五萬七千九百五十二為角數三分角數每分二百九十八萬五千九百八十四三分損一得五百九十七萬一千九百六十八以本律之實約之為四十二餘六不用為變宮是為姑洗之角下生應鐘之變宮置應鐘本律之實九萬三千三百一十二以變宮四十二乘之得三百九十一萬九千一百四為變宮數三分變宮數每分一百三十萬六千三百六十八三分益一得五百二十二萬五千四百七十二以本律之實約之為五十六為變徵是為應鐘之變宮上生蕤賔之變徴此正律皆全數也以正與正半言之如林鐘為宮置林鐘全數之實十一萬八千九十八以宫八十一乘之得九百五十六萬五千九百三十八為宫數以本律全數約之為八十一為宫三分宫數每分三百一十八萬八千六百四十六三分損一得六百三十七萬七千二百九十二以本律全數約之為五十四為徴是為林鐘全數之宮下生太蔟正半之徴置太蔟半數之實七萬八千七百三十二以徴五十四乘之得四百二十五萬一千五百二十八為徴數三分徴數每分一百四十一萬七千一百七十六三分益一得五百六十六萬八千七百四以本律半數約之為七十二為商是為太蔟正半之徴上生南呂全數之商置南呂全數之實十萬四千九百七十六以商七十二乘之得七百五十五萬八千二百七十二為商數三分商數每分二百五十一萬九千四百二十四三分損一得五百三萬八千八百四十八以本律全數約之為四十八為羽是為南呂全數之商下生姑洗正半之羽置姑洗半數之實六萬九千九百八十四以羽四十八乘之得三百三十五萬九千二百三十二為羽數三分羽數每分一百一十一萬九千七百四十四三分益一得四百四十七萬八千九百七十六以本律半數約之為六十四為角是姑洗半數之羽上生應鐘全數之角置應鐘全數之實九萬三千三百一十二以角六十四乘之得五百九十七萬一千九百六十八為角數三分角數每分一百九十九萬六百五十六三分損一得三百九十八萬一千三百一十二以本律全數約之為四十二為變宮是為應鐘全數之角下生蕤賔正半之變宮置蕤賔半數之實六萬二千二百八以變宮四十二乘之得二百六十一萬二千七百三十六為變宮數三分變宮數每分八十七萬九百一十二三分益一得三百四十八萬三千六百四十八以本律半數約之為五十六為變徵是為蕤賔正半之變宮上生大呂正半之變徵此正與正半之律也餘倣此以正與變與變半言之如夾鐘為宮置夾鐘全數之實十四萬七千四百五十六以宮八十一乘之得一千一百九十四萬三千九百三十六為宮數以本律全數約之為八十一為宮三分宮數每分三百九十八萬一千三百一十二三分損一得七百九十六萬二千六百二十四以本律全數約之為五十四為徵是為夾鐘全數之宮下生無射全數之徵置無射全數之實九萬八千三百四以徵五十四乘之得五百三十萬八千四百一十六為徵數三分徵數每分一百七十六萬九千四百七十二三分益一得七百七萬七千八百八十八以本律全數約之為七十二為商是為無射全數之徵上生仲呂全數之商置仲呂全數之實十三萬一千七十二以商七十二乘之得九百四十三萬七千一百八十四為商數三分商數每分三百一十四萬五千七百二十八三分損一得六百二十九萬一千四百五十六以本律全數約之為四十八為羽是為仲呂全數之商下生黄鐘變半之羽置黄鐘變半之實八萬七千三百八十一小分不用以羽四十八乘之得四百一十九萬四千二百八十八為羽數三分羽數每分一百三十九萬八千九十六三分益一得五百五十九萬二千三百八十四以本律半數約之為六十四為角是為黄鐘變半之羽上生林鐘變數之角置林鐘變數之實十一萬六千五百八以角六十四乘之得七百四十五萬六千五百一十二為角數三分角數每分二百四十八萬五千五百四三分損一得四百九十七萬一千八以本律全數約之為四十二為變宮是為林鐘變數之角下生太蔟變半之變宮置太蔟變半之實七萬七千六百七十二以變宮四十二乘之得三百二十六萬二千二百二十四為變宮數三分變宮數每分一百八萬七千四百八三分益一得四百三十四萬九千六百三十二以本律半數約之為五十六為變徵是為太蔟變半之變宮上生南呂變數之變徵此正與變與變半之律也餘倣此一法如夾鐘為宮置夾鐘全數十四萬七千四百五十六以法計之得全七寸四分三釐有奇三分全數每分四萬九千一百五十二三分損一得九萬八千三百四為無射計得全四寸八分八釐有奇是夾鐘全數之宮下生無射全數之徵置無射全數九萬八千三百四三分之每分三萬二千七百六十八三分益一得十三萬一千七十二為仲呂計得全六寸五分八釐有竒是無射全數之徵上生仲呂全數之商置仲呂全數十三萬一千七十二以變呂六三數乘之得九千五百五十五萬一千四百八十八三分損一所約之數八萬七千三百八十一為黄鐘變半計得半四寸三分八釐有竒是仲呂全數之商下生黄鐘變半之羽置黄鐘變半八萬七千三百八十一三分益一得十一萬六千五百八為林鐘變數計得全五寸八分二釐有竒是黄鐘變半之羽上生林鐘變數之角置林鐘變數十一萬六千五百八三分損一得七萬七千六百七十二為太蔟變半計得三寸八分四釐有竒是林鐘變數之角下生太蔟變半之變宮置太蔟變半七萬七千六百七十二三分益一得十萬三千五百六十三為南呂變數計得全五寸二分三釐有竒是太蔟變半之變宮上生南呂變數之變徵餘律倣此其數悉合夫十一律之皆可為宮也或有疑之者不知十一律之數各以八十一分之為宮而三分損益上下相生各得五聲二變之數自然之妙非人力之為也如應鐘四寸六分六釐律之最短者然既為宮則短中之君也由此三分損一下生蕤賔正半之徵則三寸一分四釐益一上生大呂正半之商則四寸一分八釐損一下生夷則正半之羽則二寸七分二釐益一上生夾鐘正半之角則三寸六分六釐損一下生無射正半之變宮則二寸四分四釐益一上生仲呂正半之變徵則三寸二分八釐凡所生四聲二變其數更無長於四寸六分六釐者則應鐘之為宮為君也何疑且其損益相生之數機括消息皆與黄鐘之正律合符也六十調圖宮商角變徴徵羽變宮黄鐘宮黄正太正姑正蕤正林正南正應正此黄鐘為宮黄鐘第一調也所謂黄鐘一均之備者也無射商無正黄變半太變半姑變半仲正半林變半南變半此黄鐘為商黄鐘第二調也夷則角夷正無正黄變半太變半夾正半仲正半林變半此黄鐘為角黄鐘第三調也仲呂徵仲正林變南變應變黄變半太變半姑變半此黄鐘為徵黄鐘第四調也夾鐘羽夾正仲正林變南變無正黄變半太變半此黄鐘為羽黄鐘第五調也上下宮商角徵羽者黄鐘得五聲所謂黄鐘一均之備者也左右宮商角徵羽者五聲盡黄鐘所謂黄鐘一調之備者也共五調此黄鐘一大調也下十一律同大呂宮大正夾正仲正林變夷正無正黄變半應鐘商應正大正半夾正半仲正半蕤正半夷正半無正半南呂角南正應正大正半夾正半姑正半蕤正半夷正半蕤賔徵蕤正夷正無正黄變半大正半夾正半仲正半姑洗羽姑正蕤正夷正無正應正大正半夾正半此大呂一大調也太蔟宮太正姑正蕤正夷正南正應正大正半黄鐘商黄正太正姑正蕤正林正南正應正無射角無正黄變半太變半姑變半仲正半林變半南變半林鐘徵林正南正應正大正半太正半姑正半蕤正半仲呂羽仲正林變南變應變黄變半太變半姑變半此太蔟一大調也夾鐘宮夾正仲正林變南變無正黄變半太變半大呂商大正夾正仲正林變夷正無正黄變半應鐘角應正大正半夾正半仲正半蕤正半夷正半無正半夷則徵夷正無正黄變半太變半夾正半仲正半林變半蕤賔羽蕤正夷正無正黄變半大正半夾正半仲正半此夾鐘一大調也姑洗宮姑正蕤正夷正無正應正大正半夾正半太蔟商太正姑正蕤正夷正南正應正大正半黄鐘角黄正太正姑正蕤正林正南正應正南呂徵南正應正大正半夾正半姑正半蕤正半夷正半林鐘羽林正南正應正大正半太正半姑正半蕤正半此姑洗一大調也仲呂宮仲正林變南變應變黄變半太變半姑變半夾鐘商夾正仲正林變南變無正黄變半太變半大呂角大正夾正仲正林變夷正無正黄變半無射徵無正黄變半太變半姑變半仲正半林變半南變半夷則羽夷正無正黄變半太變半夾正半仲正半林變半此仲呂一大調也蕤賔宮蕤正夷正無正黄變半大正半夾正半仲正半姑洗商姑正蕤正夷正無正應正大正半夾正半太蔟角太正姑正蕤正夷正南正應正大正半應鐘徵應正大正半夾正半仲正半蕤正半夷正半無正半南呂羽南正應正大正半夾正半姑正半蕤正半夷正半此蕤賔一大調也林鐘宮林正南正應正大正半太正半姑正半蕤正半仲呂商仲正林變南變應變黄變半太變半姑變半夾鐘角夾正仲正林變南變無正黄變半太變半黄鐘徵黄正太正姑正蕤正林正南正應正無射羽無正黄變半太變半姑變半仲正半林變半南變半此林鐘一大調也夷則宮夷正無正黄變半太變半夾正半仲正半林變半蕤賔商蕤正夷正無正黄變半大正半夾正半仲正半姑洗角姑正蕤正夷正無正應正太正半夾正半大呂徵大正夾正仲正林變夷正無正黄變半應鐘羽應正大正半夾正半仲正半蕤正半夷正半無正半此夷則一大調也南呂宮南正應正大正半夾正半姑正半蕤正半夷正半林鐘商林正南正應正大正半太正半姑正半蕤正半仲呂角仲正林變南變應變黄變半太變半姑變半太蔟徵太正姑正蕤正夷正南正應正大正半黄鐘羽黄正太正姑正蕤正林正南正應正此南呂一大調也無射宮無正黄變半太變半姑變半仲正半林變半南變半夷則商夷正無正黄變半太變半夾正半仲正半林變半蕤賔角蕤正夷正無正黄變半大正半夾正半仲正半夾鐘徵夾正仲正林變南變無正黄變半太變半大呂羽大正夾正仲正林變夷正無正黄變半此無射一大調也應鐘宮應正大正半夾正半仲正半蕤正半夷正半無正半南呂商南正應正大正半夾正半姑正半蕤正半夷正半林鐘角林正南正應正大正半太正半姑正半蕤正半姑洗徵姑正蕤正夷正無正應正太正半夾正半太蔟羽太正姑正蕤正夷正南正應正大正半此應鐘一大調也十二律旋相為宮五聲二變各具七聲共八十四聲以相生之序言之則曰宮曰徵曰商曰羽曰角曰變宮曰變徵以高下清濁言之則曰宮曰商曰角曰變徵曰徵曰羽曰變宮以律之長短為序也合七聲為一調合五調為一曲宮聲十二商聲十二角聲十二徵聲十二羽聲十二凡六十聲為六十調共四百二十聲其變宮十二在羽聲之後宮聲之前變徵十二在角聲之後徵聲之前宮不成宮徵不成徵凡二十四聲不可為調黄鐘宮至夾鐘羽並用黄鐘起調始於黄鐘終於黄鐘五調為一大調黄鐘畢曲大呂宮至姑洗羽並用大呂起調大呂畢曲以至應鐘皆然其正者以正律全聲應也正半者以正律半聲應也變者以變律全聲應也變半者以變律半聲應也旋相為宮若到應鐘為宮其聲最短而清則下四聲皆當低去所以有半聲亦謂之子聲近時所謂清聲是也盖樂律最忌下陵上應鐘為宮如用大呂為之商則是商聲高似宮聲為臣陵君用夾鐘為之角則是角聲髙似宮聲為民陵君徵羽亦然皆不可用遂乃用半律之清聲以應之也宮商角三十六調為陽徵羽二十四調為隂大調五律除調首中聲必有二陽二隂六十調皆同如陽律為宮而商角皆陽徵羽為隂隂律為宮而商角皆隂徵羽為隂故調成而隂陽備也候氣候氣之法為室三重户閉塗釁必周密布緹縵室中以木為按每律各一按内庳外高從其方位加律其上以葭灰實其端覆以緹素按厯而候之氣至則吹灰動素小動為氣和大動為君弱臣强専政之應不動為君嚴猛之應其升降之數陽候則陽律升多隂律升少隂候則隂律升多陽律升少在冬至則黄鐘九寸升五分一釐三毫大寒則大呂八寸三分七釐六毫升三分七釐六毫雨水則太蔟八寸升四分五釐一毫六絲春分則夾鐘七寸四分三釐七毫三絲升三分三釐七毫三絲穀雨則姑洗七寸一分升四分五毫四絲三忽小滿則仲呂六寸五分八釐三毫四絲六忽升三分三毫四絲六忽夏至則蕤賔六寸二分八釐升二分八釐大暑則林鐘六寸升三分三釐四毫處暑則夷則五寸五分五釐一毫升二分五釐五毫秋分則南呂五寸三分升三分四毫一絲霜降則無射四寸八分八釐四毫八絲升二分二釐四毫八絲小雪則應鐘四寸六分六釐升三分一毫一絲審度度者分寸尺丈引所以度長短也生於黄鐘之長以子穀秬黍中者九十枚度之一為一分十分為寸十寸為尺十尺為丈十丈為引嘉量量者龠合升斗斛所以量多少也生於黄鐘之容以子穀秬黍中者一千二百實其龠以井水准其概以度數審其容合龠為合十合為升十升為斗十斗為斛謹權衡權衡者銖兩斤鈞石所以權輕重也生於黄鐘之重以子穀秬黍中者一千二百實其龠百黍一銖一龠十二銖二十四銖為一兩十六兩為斤三十斤為鈞四鈞為石自黄鐘至此皆依古法布算其辨議在後古今律厯考卷三十
