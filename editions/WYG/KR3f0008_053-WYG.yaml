body:
  text: 古今律厯考卷五十三明邢雲路撰厯法十八厯法土星合伏前合伏九十日四六二七後合伏二百八十七日六二八九中星二百九十二度三五四七盈厯一百一十六日六三二六八六盈末厯六十五日九九六六四加分六分一二九七二五積度七度三三四五九六七五加差七度三九五六五二定積二百九十五日二四五五二定日三十七日一四一五二加時定星二百九十九度七五六五二入月數三百一十八日四二六八八三月數十入八月入月已來日二十三日一二九五三八月經朔一十三日九八三一九九順減差一分二四九八晨前夜半定星二百九十九度七三八一五四八月辛丑日夜半土星度角三度一六五四是日丑正二刻土星合伏井三度二三一五二晨疾中積三百八日二八九中星二百九十四度七五四七盈厯一百一十八日一二二六八六盈末厯六十四日五六六四加分六分三三二一三九積度七度二七一三七五三六加差七度三三四二定積三百一十五日三三二三二定日五十七日四一一九二加時定星三百二度五八一二入月數三百三十八日七三四六五一月數十一入九月入月已來日一十三日八九八一二八九月經朔四十三日五一三七九二順減差四分五三一一二晨前夜半定星三百二度一二八八九月辛酉日夜半土星度角五度二八五三是日巳初三刻土星晨疾角五度三十三分六秒晨次疾中積三百三十九日二八九中星二百九十八度一五四七盈厯一百二十日二三二六八六盈末厯六十二日三九六六四加分六分七一八七三積度七度一三九二二八八加差七度一六五七七一定積三百四十六日一九四六七一定日二十八日二七四二七一加時定星三百五度三二四七一入月數三百六十九日五九七二月數十二入十月入月已來日一十五日二二九八八七十月經朔一十三日四四三八五順減差二分七四二七晨前夜半定星三百五度二九三四四十月壬辰日夜半土星度角八度五六五五四四是日卯正二刻土星晨次疾角八度五十九分二十九秒晨遲中積三百六十八日二八九中星三百度九四七盈厯一百二十一日九四二六八六盈末厯六十日五八六六四加分七分七四八一五積度六度九九九五八八加差七度四一五定積三百七十五日六九九五定日五十七日一四九五五加時定星三百七度九四五七五入月數三百九十八日四七二二七一月數十三入十一月入月已來日一十四日五七四五七二十一月經朔四十二日五七四九七八順減差一分一九六四晨前夜半定星三百七度九三三七八六十一月辛酉夜半土星度角十一度二十分六二八六是日寅初四刻土星晨遲角十一度二十一分八十二秒晨留中積三百九十四日二八九中星三百二度四四盈厯一百二十二日七七二六八六盈末厯五十九日八五六六四加分七分二五八七三九積度六度九二七六一加差六度九八九一四定積四百一日一八四定日二十三日九七六四加時定星三百九度三九三一四入月數四百二十四日四二三七一月數十四入十二月入月已來日一十日九九二六九十二月經朔一十二日一五五七一順減差七十八秒一一晨前夜半定星三百九度三八五三二九十二月丁亥日夜半土星度角十二度六五七八是日丑初一刻土星晨留角十二度六十六分五十六秒晨退中積四百二十四日二八九定積四百三十一日一八四定日五十三日九七六四入月數四百五十四日四二三七一月數十五入庚子年正月入月已來日一十一日四六一四七六庚子正月經朔四十一日六三六一六四正月丁巳日丑初一刻土星晨退角十二度六十六分五十六秒夕退中積四百七十六日六七四七中星二百九十八度七七九二五盈厯一百二十三日五七二三六盈末厯五十九日五七一五一四加分七分二五八七三九積度六度九二七六一加差六度九六八四八五定積四百八十三日六四三一八五定日四十五日七二二七八五加時定星三百五度七四七七三五入月數五百七日四五五一六月數十七入三月入月已來日五日二五四三五三月經朔四十日六九七三五退加差七分二二七七晨前夜半定星三百五度一二一二三月己酉日夜半土星度角九度九三五是日酉初一刻土星夕退角九度二分一十二秒夕留中積五百二十九日三二五中星二百九十五度一五三八盈厯一百二十三日三四一七八六盈末厯五十九日二八六九六四加分七分二五八七三九積度六度九二七六一加差六度九四六五八三定積五百三十六日二六七八三定日三十八日三四六六八三加時定星三百二度一三八三入月數五百五十九日六六九四一四月數十八入四月入月已來日二十八日一一八七四四月經朔一十日二二七九四三退加差三分四六六八晨前夜半定星三百二度一三五五一四月壬寅日夜半土星度角五度四七五是日辰正一刻土星夕留角五度三十七分二十八秒夕遲中積五百五十九日三二五定積五百六十六日二六七八三定日八日三四六六八三入月數五百八十九日六六九四一四月數十九入五月入月已來日二十八日五八八一四七五月經朔三十九日七五八五三六六月壬申朔辰正一刻土星夕遲角五度三十七分二十八秒夕次疾中積五百八十五日三二五中星二百九十六度六五三八盈厯一百二十四日一七一七八六盈末厯五十八日四五六九六四加分七分四四九六五積度六度八五二五九九六加差六度八八七五三六定積五百九十二日二八三六定日三十四日二八七六三六加時定星三百三度五四一三三六入月數六百一十五日六一三六七月數二十入