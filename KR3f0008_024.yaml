body:
  text: 古今律厯考卷二十四明邢雲路撰歷代日食五歷代日食厯唐唐高祖武德元年戊寅嵗十月壬申朔日食推是年過交不應食武德四年辛巳八月丙戌朔日食八月交一十四日三八月朔二十二日二丙戌卯時是八月丙戌朔卯時日食武德六年癸未十二月壬寅朔日食綱目無十二月交二十七日一十二月朔三十八日六壬寅未時是十二月壬寅朔未時日食綱目漏武德九年丙戌嵗十月丙辰朔日食十月交二十六日六六十月朔五十二日四七丙辰午時是十月丙辰朔午時日食太宗貞觀元年丁亥嵗閏三月癸丑朔日食九月庚戌朔日食四月交一十三日三六四月朔四十九日六五癸丑申時九月交五刻九月朔四十六日四五庚戌巳時推是年四月癸丑朔申時日食九月庚戌朔巳時日食蓋是年閏五月而唐厯閏三月非貞觀二年戊子嵗三月戊申朔日食三月交一十三日九三月朔四十四日四戊申巳時是三月戊申朔巳時日食貞觀三年己丑嵗八月己巳朔日食八月交二十六日一六八月朔五日五五己巳未時是八月己巳朔未時日食貞觀四年庚寅嵗閏正月丁卯朔日食七月甲子朔日食綱目書年前閏十二月正月無閏正月交一十二日八閏正月朔三日二四丁卯卯時七月交二十六日七七月朔二十五刻甲子卯時是閏正月丁卯朔卯時日食七月甲子朔卯時日食綱目非貞觀六年壬辰嵗正月乙卯朔日食正月交一十四日正月朔五十一日六乙卯未時是正月乙卯朔未時日食貞觀八年甲午嵗五月辛未朔日食推是年五月辛未朔亥時合朔夜食不書史誤貞觀九年乙未嵗閏四月丙寅朔日食五月交二十八刻五月朔二日三丙寅辰時推是年五月丙寅朔辰時日食蓋是年應閏六月五月丙寅日合朔甲子日小滿四月中尚先朔二日則四月安得有閏貞觀十一年丁酉嵗三月丙戌朔日食三月交二十六日三三月朔二十二日二六丙戌卯時是三月丙戌朔卯時日食貞觀十二年戊戌嵗閏二月庚辰朔日食三月交二十七日三月朔一十六日七八庚辰酉時推是年三月庚辰酉時合朔日食非閏二月蓋是年三月晦己酉穀雨閏三月庚戌合朔四月朔己卯小滿則閏三月無中氣應閏三月也二月晦己卯春分三月庚辰合朔則二月安得有閏史誤貞觀十三年己亥嵗八月辛未朔日食八月交一十四日三八月朔七日六一辛未未時是八月辛未朔未時日食貞觀十七年癸卯嵗六月己卯朔日食六月交一十四日四二六月朔一十五日三一己卯辰時是六月己卯朔辰時日食貞觀十八年甲辰嵗十月辛丑朔日食十月交二十六日六二十月朔三十七日六四辛丑申時是十月辛丑朔申時日食貞觀二十年丙午嵗閏三月癸巳朔日食四月交一十三日九三四月朔二十九日六三癸巳申時推是年四月癸巳朔申時日食非閏三月朔蓋是年三月辛卯日穀雨四月癸巳日合朔四月辛酉晦小滿五月壬戌朔夏至則應閏四月也三月安得有閏史誤貞觀二十二年戊申嵗八月己酉朔日食八月交二十六日七四八月朔四十五日五九己酉未時是八月己酉朔未時日食高宗顯慶五年庚申嵗六月庚午朔日食六月交一十三日七八六月朔六日五一庚午午時是六月庚午朔午時日食龍朔元年辛酉嵗五月甲子晦日食綱目無六月交一十四日三九六月朔五十二刻甲子午時推是年六月甲子朔午時日食非五月晦綱目漏麟德二年乙丑嵗閏三月癸酉日食史不書朔四月交一十四日五四月朔九日四七癸酉午時推是年四月癸酉朔午時日食非閏三月癸酉是年閏五月三月無閏史不書朔食二日也史誤步閏三月又誤步食二日乾封二年丁卯嵗八月己酉朔日食八月交一十刻八月朔二十五日五二己丑午時推是年八月己丑朔午時日食非己酉朔想修史者誤書丑為酉耳總章二年己巳嵗六月戊申朔日食六月交二十六日二六月朔四十四日三戊申辰時是六月戊申朔辰時日食咸亨元年庚午嵗六月壬寅朔日食六月交二十六日八二六月朔三十八日四七壬寅午時是六月壬寅朔午時日食咸亨二年辛未嵗十一月甲午朔日食十一月交一十四日一二十一月朔三十日六一甲午未時是十一月甲午朔未時日食咸亨三年壬申嵗十一月戊子朔日食十一月交一十四日七三十一月朔二十四日六戊子未時是十一月戊子朔未時日食上元元年甲戌嵗三月辛亥朔日食三月交二十六日九三三月朔四十七日二一辛亥卯時是三月辛亥朔卯時日食永隆元年庚辰嵗十一月壬申朔日食十一月交二十六日五五十一月朔八日四二六壬申巳時是十一月壬申朔巳時日食開耀元年辛巳嵗十月丙寅朔日食十月交二十七日一六十月朔二日三五丙寅辰時是十月丙寅朔辰時日食永淳元年壬午嵗四月甲子朔日食十月庚申朔日食綱目無十月四月交一十三日八六四月朔二十六刻甲子卯時十月交五十五刻十月朔五十六日五庚申午時是四月甲子朔卯時日食十月庚申朔午時日食綱目漏十月中宗三年丙戌嵗即武后垂拱二年二月辛未朔日食二月交一十三日九七二月朔七日五八辛未未時是二月辛未朔未時日食漢唐祕史載是食於垂拱元年非中宗五年戊子嵗即武后垂拱四年六月丁亥朔日食六月交二十六日七八六月朔二十三日七七丁亥酉時是六月丁亥朔酉時日食中宗八年辛卯嵗即武后天授二年四月壬寅朔日食四月交二十六日二八四月朔三十八日二五壬寅卯時是四月壬寅朔卯時日食中宗九年壬辰嵗即武后如意又改長夀元年四月丙申朔日食綱目無四月交二十六日八九四月朔三十二日六九丙申申時是四月丙申朔申時日食綱目漏中宗十年癸巳嵗即武后長夀二年九月丁亥朔日食九月交一十四日二九月朔二十三日六一丁亥未時是九月丁亥朔未時日食中宗十一年即武后延載元年九月壬午朔日食推是年九月朔過交不應食中宗十二年乙未嵗即武后證聖又改萬嵗元年二月己酉朔日食二月交二十六日四二月朔四十五日五己酉午時是二月己酉朔午時日食中宗十七年庚子嵗即武后聖厯三年又改久視元年五月己酉朔日食五月交一十三日八二五月朔四十五日六三己酉申時是五月己酉朔申時日食中宗十九年壬寅嵗即武后長安二年九月乙丑朔日食不盡如鉤九月交二十六日六三九月朔一日六三乙丑申時是九月乙丑朔申時日食中宗二十年癸卯嵗即武后長安三年三月壬戌朔日食九月庚寅朔日食既三月交一十三日三三三月朔五十八日六一壬戌未時八月交二刻九八月朔五十六日一五庚申寅時推是年三月壬戌朔未時日食八月庚申朔寅時日食寅初刻食則卯初不見其虧矣然非九月亦非庚寅蓋是年應閏五月而唐厯未閏故以八月作九月中宗復位神龍三年即景龍元年丁未嵗六月丁卯朔日食十二月乙丑朔日食六月交二十六日三五六月朔三日五丁卯午時十二月交一十四日十二月朔一日三一乙丑辰時是六月丁卯朔午時日食十二月乙丑朔辰時日食玄宗先天元年壬子嵗九月丁卯朔日食九月交一十四日七七九月朔三日五七丁卯未時推是年九月丁卯日未時日食然交過刻餘雖食不多開元三年乙卯嵗七月庚辰朔日食七月交一十四日二八七月朔一十六日四三庚辰巳時是七月庚辰朔巳時日食開元七年己未嵗五月己丑朔日食五月交一十四日三九五月朔二十五日三三己丑辰時是五月己丑朔辰時日食開元九年辛酉嵗九月乙巳朔日食九月交二十七日二九月朔四十一日四九乙巳午時是九月乙巳朔午時日食開元十二年甲子嵗閏十二月丙辰朔日食十三年正月交一十三日四一十三年正月朔五十二日五三丙辰午時推開元十三年乙丑嵗正月丙辰朔午時日食非十二年閏十二月朔食蓋是年應閏正月而漢厯誤閏十二月法推十二月晦前甲寅日大寒正月丙辰日合朔則十二月安得有閏正月晦甲申雨水閏正月朔乙酉二月朔乙卯春分其閏正月明矣開元十七年己巳嵗十月戊午朔日食不盡如鉤十月交一十四日一三十月朔五十四日二九戊午卯時是十月戊午朔卯時日食開元二十年壬申嵗二月甲戌朔日食八月辛未朔日食二月交二十六日九四二月朔十日八甲戌戌時八月交一十三日六三八月朔七日六辛未未時推是年二月甲戌朔戌初刻合朔則酉末尚見其虧也八月辛未朔未時日食開元二十一年癸酉嵗七月乙丑朔日食七月交一十四日二四七月朔一日七六乙丑酉時是七月乙丑朔酉時日食開元二十二年甲戌嵗十二月戊子朔日食十二月交二十六日四四十二月朔二十四日四四八戊子巳時是十二月戊子朔巳時日食開元二十三年乙亥嵗閏十一月壬午朔日食綱目載閏十月朔閏十一月交二十七日閏十一月朔一十八日三六壬午辰時推是年十一月晦辛巳冬至閏十一月朔壬午十二月朔壬子大寒是閏十一月朔壬午辰時日食綱目載閏十月朔非開元二十六年戊寅嵗九月丙申朔日食九月交二十六日五六九月朔三十二日二六丙申卯時是九月丙申朔卯時日食開元二十八年庚辰嵗三月丁亥朔日食三月交一十三日八六三月朔二十三日五六丁亥未時是三月丁亥朔未時日食天寶元年壬午嵗七月癸卯朔日食七月交二十六日六七七月朔三十九日六二九癸卯申時是七月癸卯朔申時日食天寶五載丙戌嵗五月壬子朔日食五月交二十六日七九五月朔四十八日五四壬子未時是五月壬子朔未時日食天寶十三載甲午嵗六月乙丑朔日食不盡如鉤六月交一十三日七一六月朔一日五乙丑午時是六月乙丑朔午時日食肅宗至德元載丙申嵗十月辛巳朔日食既十月交二十六日五二十月朔一十七日六七辛巳申時是十月辛巳朔申時日食乾元二年己亥嵗二月月食既終綱目書月食止此二月交二十六日八八二月望四十八日九五是二月十五日壬子亥正刻合望月食上元二年辛丑嵗七月癸未朔日食既大星皆見七月交三刻五七月朔一十九日七二癸未酉時是七月癸未朔酉時日食代宗大厯三年戊申嵗三月乙巳朔日食三月交二十六日八七三月朔四十一日六一乙巳未時是三月乙巳朔未時日食大厯十年乙卯嵗十月辛酉朔日食十月交二十七日十月朔五十七日五辛酉午時是十月辛酉朔午時日食大厯十四年己未嵗七月戊辰朔日食十二月丙寅晦日食七月交刻二分七月朔四日八三二戊辰戌時十五年正月交一十三日九一十五年正月朔二日六一丙寅未時推大厯十四年七月戊辰朔戌初刻日食大厯十五年正月丙寅朔未時日食非十四年十二月晦德宗貞元二年丙寅嵗八月辛巳朔日食綱目不載是年食九月交一十三日五三九月朔二十三日五九丁亥未時推是年九月丁亥朔未時日食八月戊午朔無辛巳亦不入交不應食綱目不載是年食亦非貞元三年丁卯嵗八月朔日食見綱目史無八月交一十四日一二八月朔一十六日八七庚辰戌時推是年八月庚辰朔戌正刻合朔日入酉正刻不見其虧矣史無是貞元五年己巳嵗正月甲辰朔日食綱目無正月交二十六日三三正月朔四十日四四甲辰巳時是正月甲辰朔巳時日食綱目漏貞元八年壬申嵗十一月壬子朔日食十一月交二十六日四五十一月朔四十八日三五壬子辰時是十一月壬子朔辰時日食貞元十二年丙子嵗八月己未朔日食八月交二十六日五六八月朔五十五日五五己未未時是八月己未朔未時日食貞元十七年