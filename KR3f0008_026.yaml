body:
  text: 古今律厯考卷二十六明邢雲路撰厯代日食七厯代日食厯宋南渡髙宗建炎三年即金太宗天㑹七年己酉嵗九月丙午朔日食九月交二十六日七五九月朔四十二日四一丙午巳時是九月丙午朔巳時日食紹興五年即金天㑹十三年乙卯嵗正月乙巳朔日食金書丙午朔正月交一十四日一七正月朔四十一日四五乙巳巳正四刻合朔是正月乙巳朔巳正四刻食甚金書丙午非宋日官言虧在辰正常州布衣陳得一言虧在巳初今推巳正四刻食甚則虧在巳初得一為是紹興七年即金天㑹十五年丁巳嵗二月癸巳朔日食金無推是年二月交泛二十日不應食金無是紹興十三年即金皇統三年癸亥嵗十二月癸未朔日食霧雲不見秦檜率百官稱賀十二月交二十六日六十二月朔一十九日二二癸未卯時推是年十二月癸未朔卯時日食夫既食矣秦奸之賀何為哉史稱八年至十二年日食多在夜史官蒙蔽不書夫從古夜食不書安得謂史官蒙蔽此不知天之論也紹興十五年即金皇統五年乙丑嵗六月乙亥朔日食六月交一十三日九六月朔一十一日三八乙亥巳時是六月乙亥朔巳時日食紹興十七年即金皇統七年丁卯嵗十月辛卯朔日食金無十月交二十六日七十月朔二十七日七八辛卯酉正刻是十月辛卯朔酉正刻日食十月酉正刻日入矣雖見食不多紹興十八年即金皇統八年戊辰嵗四月戊子朔日食􅙨雲不見四月交一十三日四四月朔二十四日五三戊子午時是四月戊子朔午時日食紹興十九年即金皇統九年己巳嵗三月癸未朔日食隂雲不見三月交一十四日三月朔一十九日二一癸未卯時是三月癸未朔卯時日食紹興二十四年即金廢主亮真元二年甲戌嵗五月癸丑朔日食霒雲不見五月交二十六日三四五月朔四十九日二一癸丑卯時是五月癸丑朔卯時日食紹興二十五年即金真元三年乙亥嵗五月丁未朔日食霒雲不見五月交二十六日九五五月朔四十三日二二丁未卯時是五月丁未朔卯時日食紹興二十八年即金正隆三年戊寅嵗三月辛酉朔日食霒雲不見始降詔免賀猶宣付史館金候之不見三月交二十六日四五三月朔五十七日二二辛酉卯時是三月辛酉朔卯時日食雲隂免賀宣付史館是為得之紹興三十年即金正隆五年庚辰嵗八月丙午朔日食八月交一十四日三七八月朔四十二日四七丙午午時是八月丙午朔午時日食紹興三十一年即金正隆六年辛巳嵗正月甲戌朔日食太史言日當食而不食帝不受朝金無正月交二十五日九六正月朔一十日二一甲戌卯初三刻推是年正月甲戌朔卯初三刻合朔正月日出卯正三刻此猶未出也况交泛不及二十六日即食分數亦少則未明復圓矣金不書是太史上言日當食而不食占人君修德罪已察姦禮賢寬恩布德上動於天則有食而不食是說出何故典帝不受朝史官當知愧矣紹興三十二年即金世宗大定二年壬午嵗正月戊辰朔日食正月交二十六日五七正月朔四日五二戊辰午時是正月戊辰朔午時日食金伐鼓用幣凡遇日月虧食禁酒樂屠宰一日夫伐鼓用幣禮也宋用牲於社反不如金之有禮矣完顔世宗其亦賢乎孝宗隆興元年即金大定三年癸未嵗六月庚申朔日食六月交一十三日八七六月朔五十六日六九庚申申時是六月庚申朔申時日食隆興二年即金大定四年甲申嵗六月甲寅朔日食霒雲不見六月交一十四日四八六月朔五十日七甲寅申時是六月甲寅朔申時日食乾道三年即金大定七年丁亥嵗金書四月戊辰朔日食宋無金主避正殿減膳伐鼓應天門內百官各於本司庭立明復乃止四月交一十三日九九四月朔四日六七戊辰申時是四月戊辰朔申時日食宋漏金避殿減膳伐鼓於朝百官庭立禮也乾道五年即金大定九年己丑嵗八月甲申朔日食霒雲不見八月交二十六日八八月朔二十日四四甲申巳時是八月甲申朔巳時日食乾道九年即金大定十三年癸巳嵗五月壬辰朔日食霒雲不見五月交二十六日九五月朔二十八日五壬辰午時是五月壬辰朔午時日食淳熙元年即金大定十四年甲午嵗十一月甲申朔日食霒雲不見十一月交一十四日二二十一月朔二十日六二甲申未時是十一月甲申朔未時日食淳熙三年即金大定十六年丙申嵗三月丙午朔日食霒雲不見少選雲退微缺時有自北庭回者見食三月交二十六日四二三月朔四十二日四九丙午午時是三月丙午朔午時日食淳熙四年即金大定十七年丁酉嵗九月丁酉朔日食霒雲不見九月交一十三日七二九月朔三十三日一一丁酉丑時推是年九月丁酉朔丑時夜食不書淳熙十年即金大定二十三年癸卯嵗十一月壬戌朔日食十一月交二十六日六五十一月朔五十八日四二壬戌巳時是十一月壬戌朔巳時日食淳熙十五年即金大定二十八年戊申嵗八月甲子朔日食八月交一十六日八月朔四十九日甲子午時是八月甲子朔午時日食淳熙十六年即金大定二十九年己酉嵗二月辛酉朔日食霒雲不見二月交一十四日二月朔五十七日四四辛酉巳時是二月辛酉朔巳時日食寧宗慶元元年即金章宗明昌六年乙卯嵗三月丙戌朔日食三月交二十六日九九三月朔二十二日四九丙戌午時是三月丙戌朔午時日食慶元四年即金承安三年戊午嵗正月己亥朔日食霒雲不見綱目無正月交二十六日四九正月朔三十五日二五己亥卯時是正月己亥朔卯時日食綱目漏慶元五年即金承安四年己未嵗正月癸巳朔日食霒雲不見金與綱目無正月交二十七日一正月朔二十九日六四癸巳申時是正月癸巳朔申時日食金與綱目漏慶元六年即金承安五年庚申嵗六月乙酉朔日當食太史言夜食不見是日霒雲金史無金有十一月癸丑日食六月交一十四日四一六月朔二十一日一七乙酉寅時十一月交二十六日十一月朔四十九日四三癸丑巳時推是年六月乙酉朔寅正初刻合朔日食則日未出已復圓矣是日臨安霒雲不見金史不書食是其十一月癸丑朔巳時日食則金書是宋漏嘉泰二年即金太和二年壬戌嵗五月甲辰朔日食五月交一十三日三五月朔四十日四九甲辰午時是五月甲辰朔午時日食嘉泰三年即金太和三年癸亥嵗四月己亥朔日當食而太史局言日體圓明不見虧分凡言不見虧分者食不及一分也金史不書是食四月交一十三日九二四月朔三十五日一九己亥卯時推是年四月己亥朔寅正刻日食則日出將復圓少見其虧耳故宋史云不見虧分者不及一分也金史不書亦以虧少即今三分以下不救之意開禧二年即金泰和六年丙寅嵗二月壬子朔日當食太史言不見虧分二月交一十三日四二月朔四十八日七三壬子酉時是二月壬子朔酉時日食太史云不見虧分然金史書食想原食也嘉定二年即金主永濟大安元年己巳嵗金書十二月辛酉朔日食宋無推是年十二月庚申朔亥時夜食不書金非嘉定三年即金大安二年庚午嵗六月丁巳朔日食金無六月交二十三日六月朔五十三日二五丁巳卯時是六月丁巳朔卯時日食金漏嘉定四年即金大安三年辛未嵗十一月己酉朔日當食太史言不見虧分十一月交一十四日七五十一月朔四十五日四一己酉巳時推是年十一月己酉朔巳時日食是日不見虧分是為日度失行嘉定七年即金宣宗真祐二年甲戌嵗九月壬戌朔日食金書大星皆見九月交一十四日二九月朔五十八日四六壬戌午時是九月壬戌朔午時日食嘉定九年即金真祐四年丙子嵗二月甲申朔日食金又書閏七月壬午朔日食二月交二十六日四二月朔二十日六二甲申未時閏七月交一十三日一七閏七月朔一十八日二九壬午卯時推是年二月甲申朔未時日食閏七月壬午朔卯時日食宋漏閏七月嘉定十年即金興定元年丁丑嵗七月丙子朔日食七月交一十三日七七月朔一十二日四九丙子午時是七月丙子朔午時日食嘉定十一年即金興定二年戊寅嵗七月庚午朔日食一分其日正午或見或不見太史局言是為陽盛隂微日體不虧綱目無七月交一十四日三七月朔六日四九四庚午午時是七月庚午朔午時日食宋史云食一分一分不救嘉定十四年即金興定五年辛巳嵗五月甲申朔日食五月交一十三日八五月朔二十日二七甲申卯時是五月甲申朔卯時日食嘉定十六年即金元光二年癸未嵗九月庚子朔日食九月交二十六日六九月朔三十六日四七庚子午時是九月庚子朔午時日食理宗寶慶三年即金正大四年丁亥嵗六月戊申朔日食金無六月交二十六日八六月朔四十四日二九戊申卯時是六月戊申朔卯時日食金漏紹定元年即金正大五年戊子嵗六月壬寅朔日食金史無金有十二月庚子朔食六月交二十日六月朔三十八日五五壬寅未時十二月交一十四日一十二月朔三十六日六八庚子申時推是年六月壬寅朔未時日食十二月庚子朔申時日食金漏六月宋漏十二月紹定六年即金天興二年癸巳嵗九月壬寅朔日食霒雲不見金無九月交一十四日八三推是年九月朔過交不應食金史無是端平二年乙未嵗二月甲子朔日當食不虧二月交二十七日二月朔三十七日甲子辰時是二月甲子朔辰時日食嘉熙元年丁酉嵗十二月戊寅朔日食十二月交二十六日五十二月朔一十四日四八戊寅午時是十二月戊寅朔午時日食淳祐二年壬寅嵗九月庚辰朔日食九月交五刻九月朔一十六日五庚辰午時是九月庚辰朔午時日食淳祐三年癸卯嵗三月丁丑朔日食三月交一十三日九三月朔一十三日三九丁丑巳時是三月丁丑朔巳時日食淳祐五年乙巳嵗七月癸巳朔日食綱目無七月交二十六日七七月朔二十九日五九癸巳未時是七月癸巳朔未時日食綱目漏淳祐六年丙午嵗正月辛卯朔日食正月交一十三日四正月朔二十七日六辛卯未時是正月辛卯朔未時日食淳祐九年己酉嵗四月壬寅朔日食四月交二十六日八四月朔三十八日四二壬寅巳時是四月壬寅朔巳時日食淳祐十二年壬子嵗二月乙卯朔日食二月交二十六日三二月朔五十一日二二乙卯卯時是二月乙卯朔卯時日食寶祐元年癸丑嵗二月己酉朔日食二月交二十六日九九二月朔四十五日七五己酉酉時是二月己酉朔酉時日食景定元年庚申嵗三月戊辰朔日食三月交一十三日三三月朔四日六八戊辰未時是三月戊辰朔未時日食景定二年辛酉嵗即蒙古世祖中統二年三月壬戌朔日食元史同綱目載二月朔三月交一十三日九三月朔五十八日七三壬戌酉時是三月壬戌朔酉時日食綱目載二月朔誤度宗咸淳元年乙丑嵗即蒙古至元二年正月辛未朔日食正月交一十四日正月朔七日三三辛未辰時是正月辛未朔辰時日食咸淳三年丁卯嵗即蒙古至元四年五月丁亥朔日食五月交二十六日八五月朔二十三日七四丁亥酉時是五月丁亥朔酉時日食咸淳四年戊辰嵗即蒙古至元五年十月戊寅朔日食十月交一十四日一五十月朔一十四日五七戊寅未時是十月戊寅朔未時日食咸淳六年庚午嵗即蒙古至元七年三月庚子朔日食綱目載二月朔三月交二十六日三五三月朔三十六日五九庚子未時是三月庚子朔未時日食綱目載二月朔非咸淳七年辛未嵗即蒙古至元八年八月壬辰朔日食八月交一十三日六六八月朔二十八日三三壬辰辰時是八月壬辰朔辰時日食咸淳八年壬申嵗即元至元九年八月丙戌朔日食八月交一十四日二七八月朔二十二日三一丙戌辰時是八月丙戌朔辰時日食帝㬎德祐元年乙亥嵗即元至元十二年六月庚子朔日食既星見雞鶩皆歸六月交一十三日七七六月朔三十六日三八庚子巳時是六月庚子朔巳時日食端宗景炎二年丁丑嵗即元至元十四年十月丙辰朔日食十月交二十六日五八十月朔五十二日五四丙辰午時是十月丙辰朔午時日食髙宗時一月食紹興二年壬子嵗二月丙子月未當闕而闕體如食色黃白二月交二十七日一一二月望一十三日一三丙子夜寅時推是年二月十四日丙子夜寅時月食宋厯誤步日出後丁丑加時在晝及寅時已見其食也乃曰月未當闕而闕體如食色黃白以為月之變也不知月掩日而日食即以體相掩則純黑不見日衝月而月食但月行日道頓失其光不至純黑雖推月與推日同以相掩布分數而其色則異也從來月食雖黑未甚猶帶黃白其魄輪微顯誰不見之知之而宋司天欲飾已非乃歸咎於月不當闕而闕也可乎其曰體如食則可為誤步斷案宋南渡凡一百五十三年書日當食不食三紹興三十一年正月甲戌朔嘉定四年十一月己酉朔端平二年二月甲子朔推紹興夜食且不入交原不當食嘉定端平二事則當食不食也春秋以來千餘年至開元始有當食不食者二宋以三百二十年日當食不食汴京二見南渡又二見何其數也若果有之則三百年日度失行四矣抑恐半係日官誤步某時候已不食及期當食卻為雲蔽未可知也况靖康之變儀象𨽻首盡歸於金宋疇人步厯不精有之且臨安偏南人戴日近望日與中原不同或虧分少即不見其食也又况臨安隂雨十九雲蔽所不免乎古今律厯考卷二十六
