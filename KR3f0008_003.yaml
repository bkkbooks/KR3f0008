body:
  text: 古今律厯考卷三明邢雲路撰經三尚書考歲二月東巡守至于岱宗柴望秩于山川肆覲東后協時月正日同律度量衡諸侯為天子守土故稱守天子適諸侯曰巡守歲二月當巡守年之二月也舜既正月班瑞二月即行順春東巡春位在東故順春也人君順天道以行人事四時順令又各當其時之中故以仲月至岱宗夏五月至南嶽秋八月至西嶽冬十一月至北嶽皆順時之義舜時正月建寅此巡守四仲之月即二月卯五月午八月酉十一月子也岱始也宗長也萬物之始隂陽交代故泰山為五嶽之長舜以二月至於岱宗之嶽郊特牲云天子適四方先柴蓋祭時積柴加牲其上而燔之是燔柴為祭天告至也於東方境內名山大川則望而秩祭之秩者具牲幣祝號之次第如五嶽視三公四瀆視諸侯其餘視伯子男也蓋視其祭祀祭五嶽如祭三公之禮云覲見也柴望既畢遂以禮見東方諸國之君於此諸國協合其四時之氣節十二月之大小正其日之甲乙使之齊一均同天子告朔於邦國恐侯國不齊故以巡守而合和之即在璿璣之意也時月詳見咨羲和簡中日之甲乙有干有支世編云天皇氏制干支干幹也名曰母支枝也名曰子以定歲之所在十干曰閼逢為甲旃蒙為乙柔兆為丙強圉為丁著雍為戊屠維為巳上章為庚重光為辛玄黓為壬昭陽為癸十二支曰困敦為子赤奮若為丑攝提格為寅單閼為卯執徐為辰大荒落為巳敦牂為午協洽為未涒灘為申作噩為酉閹茂為戌大淵獻為亥邵子曰干陽也支隂也干十而支十二隂數中有陽陽數中有隂也律法制也律以截竹為管而度有丈尺量有斛斗衡有斤兩三者皆取法於律故曰法制漢書律􅍓志云度量衡出於黃鐘之律也律謂十二律黃鐘太蔟姑洗㽔賔夷則無射大呂夾鐘仲呂林鐘南呂應鐘也六為律六為呂凡十二管皆徑三分有奇空圍九分而黃鐘之長九寸大呂以下律呂相間以次而短至應鐘而極焉長者聲下而濁短者聲髙而清此律呂之大較也度者分寸尺丈引所以度長短也本起於黃鐘之管長容以子穀秬黍中者每寸容一百三十三黍三分黍之一九寸則容千二百黍十分為寸十寸為尺十尺為丈十丈為引而五度審矣量者籥合升斗斛所以量多少也本起於黃鐘之管容以子穀秬黍中者千二百實為一籥兩籥為合十合為升十升為斗十斗為斛而五量嘉矣衡者銖兩斤鈞石所以權輕重也本起於黃鐘之管容以子榖秬黍中者一籥容千二百黍百黍一銖一籥十二銖兩籥二十四銖為兩十六兩為斤三十斤為鈞四鈞為石而五權審矣權衡一物衡平也權重也稱謂之衡鎚謂之權所從言之異耳此黃鐘所以為萬事根本諸侯之國其有不一者則審而同之也時月日正朔所自出律度量衡制度所自始然律之十二又生於􅍓之十二律厯志云推􅍓成律故同律度量衡必先協時月正日帝曰夔命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和胄胤也繼胤父世者長子故以胄為長自天子至卿大夫之適子也周禮大司樂以樂德教國子中和祗庸孝友則樂最能感人舜命夔典樂以教胄子直者多嚴故令其正直而溫和寬者多緩故令其寬𢎞而莊栗輔其偏也剛強者必傲故令其剛而勿苛虐簡易者必傲故令其簡而勿傲慢防其失也心之所之謂之志心有所之必形於言故曰詩言志既形於言則必長言以歌之故曰歌永言既歌則必有高下清濁之殊故曰聲依永聲者宫商角徴羽也聲之長而濁者為宫以漸而清且短則為商為角為徴為羽也有聲必有律則以十二律和之陽六律隂六呂如黃鐘為宫則太蔟為商姑洗為角林鐘為徴南呂為羽蓋以三分損益隔八相生十二律旋相為宫所謂律和聲也周禮太師云播之以八音金石土革絲木匏竹金鐘鏄石磬土塤革鼓鼗絲琴瑟木柷敔匏笙竹管簫也以其聲律被之八音無不諧協各得倫理不相侵奪可以奏之朝廷薦之郊廟而神人以和矣大司樂云大合樂以致鬼神示以和邦國以諧萬民以安賔客以説遠人是神人和也律呂聲音之數詳見别簡百工惟時撫于五辰庶績其凝工官撫順凝成也五辰四時也木火金水旺於四時而土則寄旺於四季也臯陶言百官撫順五行之時則衆功皆成所撫順者即堯典敬授人時平秩東作之類是也禮運曰播五行於四時五行在地為物在天為時順其時而撫之則五物皆成其材而為人用矣故仲春斬陽木仲夏斬隂木所以撫木辰也季春出火季秋納火所以撫火辰也司空以時相阪隰所以撫土辰也秋為徒杠春逹溝渠所以撫水辰也書傳大全圗謂木辰配於春自立春至立夏九十一日八十分之二十五火配夏金配秋水配冬其數皆同八十分日之二十五者二十五以八十分之得三十一分二十五秒加於九十一日下以四時之四因之得三百六十五日二十五刻為一期之日土分旺於四時一時十八日有竒四時計七十三日五刻亦皆自其大槩言之耳授時厯則一時九十一日三十一刻六分二十五秒四時共三百六十五日二十四刻二十五分土王策三日四刻三十六分八十七秒五十微加入氣策一十五日二十一刻八十四分三十七秒五十微內共得一十八日二十六刻二十一分二十五秒為土寄旺於一時之數以四時之四因之共得七十三日四刻八十五分至今厯家遵用之郭守敬曰厯年距立元為算其諸應則隨時推測不用為元今距元年久正改憲時也若改而推測則歲實微有不同而諸數皆異矣惟時羲和顛覆厥德沈亂于酒畔官離次俶擾天紀遐棄厥司乃季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走羲和尸厥官罔聞知昏迷于天象以干先王之誅政典曰先時者殺無赦不及時者殺無赦此夏仲康命胤侯掌六師以征羲和也惟時羲和顛倒反覆其德沈冥昏亂于酒官以職言次以位言羲和畔其所治之職離其所居之位俶始擾亂遐逺也天紀謂天時厯數司所主也自堯命羲和厯象授時之後為羲和者世守其職未嘗紊亂至是始亂其天紀而逺棄其所主之事士文伯謂日月會次為辰集漢書作輯房宿名言日月會次不相和輯而掩蝕於房宿也日月會於月朔東西同度南北同道則月掩日而日為之食是時季秋月朔日食凡日食禮有救日之法天子伐鼓於社瞽目之樂官以祭天之雷鼓奏進而伐之瞽以其無目於音聲審也嗇夫主幣之官馳取幣以禮天神庶人在官者則奔走以供救日食之百役周禮庭氏云救日之弓矢蓋救日以太陽之弓以枉矢是救日必有多役庶人走供之車馬曰馳步曰走日食之變羣工促遽以助救日若此羲和為厯象之官尸居其位若無聞知昏迷于天象以干犯先王之誅其罪不可赦也故先王為政之典曰厯象授時氣朔不忒若布算一失氣朔先天時者殺無赦不及而後天時者殺無赦先後之差尚罪死無赦况廢官乎此仲康所以命胤侯征之也大都日月之食乃會於交道數有一定朱子注是章謂日月之行雖或當食而月常避日故其遲速高下必有參差而不正相對所以當食不食為王者修德所致又謂月食雖陽勝隂畢竟不好若隂有退避之意則不相敵而不成食皆非也蓋日月有遲速高下不正相對乃未當交道史載當食不食者多厯算之差縱日行失度間有當食不食乃幾百年有一非其常也則月豈有退避日遂不相敵而不成食乎唐大衍厯載太康十二年戊子歲冬至日在女十一度仲康五年癸巳歲季秋九月庚戌朔日蝕在房二度授時稱仲康五年癸巳距至元辛巳三千四百八年九月庚戌朔交泛二十六日五千四百二十一分入食限然以厯年考之太康元年癸巳至十二年甲辰非戊子也仲康元年壬戌五年丙寅非癸巳也其癸巳距至元辛巳積年九月庚戌朔交泛入食限之數步之固是然癸巳乃帝相十九年去仲康五年丙寅後二十七年矣今以法推仲康元年至十三年之九月朔惟六年九月朔入食限仲康六年丁卯距至元辛巳三千四百三十四年天正中積一百二十五萬四千二百五十四日四十二刻九月定朔一十七日四十二刻得辛巳日巳時合朔九月朔交泛一十四日七十五刻入食限其餘一十二年之九月朔俱不入食限當時羲和失職之年或是六年未可知也法推太康仲康年間天正日躔女七度非女十一度帝相十九年天正日躔女六度仲康五年九月朔日丁亥非庚戌也九月朔日躔氐末近房初古厯與今不同仲康時以氐末為房初亦未可知若以大統推太康仲康帝相年間天正日躔俱在虛七度其女七度則加於南庚陽甲盤庚年間相差七百餘年在天差十度餘矣所以大統太謬惟元祀十有二月乙丑唐虞曰載夏曰歲商曰祀周曰年一也元祀者太甲即位之元年十二月者商以丑月為正朔也乙丑日也不繫以朔者非朔日也商雖以十二月丑為正朔行事而紀數之月則仍以寅為首非若周之改子為正月也商惟以正朔行事故太甲三年亦以十二月朔奉嗣王歸于亳惟十有三年春大會于孟津十三年者文王受命之十三年也春者孟春建子之月即夏之十一月也泰誓篇序云惟十有一年武王伐殷又云一月戊午師渡孟津説者疑十有一年誤史記云九年觀兵十一年伐紂説者疑人臣無觀兵脅君之理九年十一年皆誤夫時世既逺記年之誤誠有之觀兵不見經傳其有無亦不足信苐考大戴禮云文王十五而生武王禮記文王世子云文王九十七而終武王九十三而終史稱文王受命九年武王在位七年又無逸稱文王享國五十年則文王為西伯至卒非止九年而已帝王世紀云文王即位四十二年文王更為受命之元年蓋是年虞芮質成歸周者四十餘國三分天下有其二以為受命之元年觀君奭篇云文王秉德聞于上帝惟時受有殷命朱子解為受有殷之天命良是大學云文王為人君止於仁夫諸侯雖不敢稱王然既受有殷之天命而為人君則自有年號初即位為元年至四十二年虞芮質成紂賜弓矢使西伯得專征伐乃改元又九年共在位五十年崩武成篇云我文考文王誕膺天命以撫方夏惟九年大統未集九年又四年為文王之十有三年即紂亡三十二年之終武王伐紂言十有三年者續文王受命之年明其卒父業故也是年春一月戊午是周改正建子之正月戊午日師渡孟津以伐紂也朱子不查而謂十三年為武王即位之十三年謂春為孟春建寅之月謂文王未改元武王非冒文王之元謂周不以建子之月為春又引詩周頌維暮之春以為建辰之三月皆非也朱子既謂武王即位十三年然武王未伐紂尚為臣也安得即位所即者王位乎侯位乎朱子許武王即位十三年而獨不許文王即位九年乎武王亦豈有即位十三年而猶稱我文考九年大統未集乎謂文王未改元不知古諸侯自於其國各有年號汲冡竹書魏惠王有後元年非改元乎且武王伐商徂征之時所過名山大川告於皇天輒曰惟有道曽孫周王發夫伐紂之前尚未勝紂即已自稱周王矣况文王虞芮質成之年已受紂賜弓矢使為西伯得專征伐諸侯皆附豈不得稱元年乎武王伐商之時業已稱周王則必不肯用商年號尚未殺紂又難稱武王元年其稱惟十有三年安得謂冒文王之元謂周不以建子之月為春殊不知武王勝商之後即改正朔以十一月建子之月為春王正月丑為二月寅為三月周之史官追稱記事即用當代正朔故書曰惟十有三年春一月師渡孟津夫復何疑諸儒紛紛之議徒令後人惑耳且如春秋稱周闕十五年正月朔旦冬至僖公五年正月朔旦冬至昭公二十年正月朔旦冬至夫世豈有正月冬至乎而猶謂周不以建子為正月耶漢律厯志稱武王即位九年崩又云武王即位十一年蓋以九年併周公攝政二年共為十一年是年正月朔旦冬至周公攝政且得稱武王即位十一年况武王伐商豈不可稱文王年號安得謂之冒周公之時稱正月冬至則建子為正又何疑焉况以厯數上推春秋日食三十餘次俱以建子為正月何諸儒不查也朱子謂毛詩維暮之春為建辰之三月又謂三月牟麥將熟何不查漢人原注漢注云周之季春於夏為孟春諸侯來朝遣之勸農治牟麥具田器久必多銍艾也漢注訓奄為久朱子訓奄為忽謂三月牟麥將熟乃以周三月為正月便是三月麥得熟乎朱子既稱周建寅為正月又何以注孟子云周七八月夏五六月耶此厯象授時所係恐誤後學故不得不詳辨之也惟戊午王次于河朔時甲子昧爽王朝至于商郊牧野注釋戊午是一月二十八日甲子二月四日也昧冥爽明也昧爽將明未明之時也正月二十八日戊午師逾孟津二月三日癸亥入商郊夜布陳未畢而雨雨止畢陳俟天休命次日四日甲子昧爽王乃至於商郊牧野即朝歌南郊外將戰于郊故至牧野也以授時推武王元年己卯歲建子之正月朔二十九日九十四刻癸巳日亥時合朔以步至建丑二月朔五十九日五十七刻癸亥日未時合朔則二月一日癸亥二月二日甲子也戊午乃朔前五日之二十六日非二十八日也是武王一月一日癸巳朝步自周東行非三日癸巳其壬辰之死魄乃前月之晦魄耳至二十六日戊午次河朔二月一日癸亥入商郊二月二日甲子昧爽至商郊伐紂漢厯志則稱二月朔日庚申四日癸亥五日甲子劉商王紂是與周厯又不同者何則古厯不正自六厯以來斗分皆四之一漢鄧平厯亦然故宋書論六厯率皆六國及秦人所造差至三日或二日上不可檢於春秋下不驗於漢魏雖復假稱帝王祗以惑人耳目至太初斗分太多過天一度又無盈縮遲疾故常以朔日月見西方晦日月見東方差亦至二三日以此步厯則晦朔甲乙安得無愆魄明生死焉能不舛則知古厯為誤授時為真也如其不然武王去春秋隱公才四百年耳授時去隱公二千年以步日食三十六皆不爽而以步四百年前即差不踰刻而奚至二三日之逺耶以此知授時為真周漢皆失之矣此論定則武成諸書所記旁死魄哉生明丙午朏等日皆四分之一之厯所步差至二三日者先後不合故皆不必置辨惟十有三祀王訪于箕子十有三年武王勝殷釋箕子之囚即四月以箕子歸鎬京訪問天道商曰祀箕子稱祀不忘本也存商之舊也此篇箕子所作箕子商人故記傳引此篇者皆云商書箕子嘗言商其淪喪我罔為臣僕今稱祀不稱年稱王訪箕子而不稱箕子見王稱王乃言而後箕子乃言不臣周之意也武王知箕子賢不可得而臣而其道則當師於是訪問天道箕子知天以是道畀之禹傳至於我不可使自我而絶以武王而不傳則天下無可傳者矣不臣周所以正萬世君臣之大法陳洪範所以傳萬世天人之大法洪範之五紀即七政厯也十有三祀即文王之十有三年蓋武王勝殷初歸尚未頒元年正朔商既亡箕子又難以稱紂年號故稱十有三祀也天道難明武王恐箕子不傳故急訪之洪範既陳武王即封箕子於朝鮮以遂其不臣之志或謂箕子走之朝鮮武王以朝鮮封之箕子既受封不得無臣禮故來朝因其朝而問洪範非也一五行一曰水二曰火三曰木四曰金五曰土五行志云聖人行其道而寶其真降及於殷箕子在父師之位而典之周既克殷以箕子歸周武王親虛已而問焉蓋洛出書戴九履一一點居北為一禹第初一曰五行箕子對武王演此五行之數天一生水地二生火天三生木地四生金天五生土五行之生序也唐孔氏曰萬物成形以微著為漸五行先後亦以微著為次水最微為一火漸著為二木形實為三金體固為四土質大為五亦其序也九疇先於初一五行先於水五行九疇之一水五行之一耳然天一所生五材所始胡可汨焉鯀湮洪水汨其一行而五行遂皆汨一疇既汨而九疇遂皆斁帝乃震怒禹乃嗣興然則有國者惕然思之凡土木之妄興鑄山煮海一切暴斂之虐政亦可以止矣其生成變化之數詳見别簡四五紀一曰歲二曰月三曰日四曰星辰五曰厯數紀者如綱之有紀天時所以相維者也此即帝堯命羲和所掌者詳見咨羲和簡中堯之􅍓象舜之在璿璣禹之敘疇武王之訪天道莫急於此也庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨星民象故衆民若星箕星好風畢星好雨日月之行各有常度日行黃道極南則為冬至極北則為夏至南北中近赤道則為春秋分月行九道黑道二出黃道北朱道二出黃道南白道二出黃道西青道二出黃道東周厯四時出入黃道內外逺去六度併黃道為九行也然厯數步分至之率則隨地南北各有不同焉箕四星像簸箕為簸揚鼓風之器故月行東北宿之則多風春秋緯云月離於箕則風揚沙是也畢八星像義網漉魚之器漉則水淋故月行西南宿之則多雨詩云月離於畢俾滂沱矣是也民情好惡猶夫星然上能同民好惡則風雨以時否則致異皆庶徴之事也秋大熟未穫秋乃周季秋建申九月即夏孟秋七月七月正禾熟未穫時朱子乃謂周未改正為酉戌月非戊辰王在新邑蒸祭歲在十有二月春祠夏禴秋嘗冬蒸蒸冬祭也周雖改正而祭祀則用夏時周十二月建亥之季冬即夏十月孟冬蒸宜用仲冬子月而亦有孟冬蒸者禮也古今律厯考卷三
