body:
  text: 古今律厯考卷三十二明邢雲路撰律吕四律吕辨黃鐘三寸九分之非古法黃鐘九寸而呂氏春秋乃曰黃帝命伶倫取竹斷兩節間長三寸九分而吹之為黃鐘之宫其後莆田李文利作律吕元聲遂亦謂黃鐘三寸九分最短其音清後人遂有信之者夫呂不韋在先秦若可信矣然考古黃鐘起於冬至為陽陽為九故九寸為宫八十一分以漸而短至羽四十八分自然之數也律以和人聲宫屬喉喉音濁故國語云大不踰宮細不過羽夫宮音之主也第以及羽管子云聽宫如牛鳴窖中言其濁至羽則如鳴鳥在樹言其清自然之聲也國語管仲不在不韋之前乎蓋黃鐘律之九寸為宫九九八十一分宮之八十一三分去一下生徴徴數五十四徴三分益一上生啇商數七十二商三分去一下生羽羽數四十八羽三分益一上生角角數六十四角屬木清濁中蓋木之聲清於土金之聲濁於水火之聲角聲亦清於宮商濁於徵羽故角聲屬木所以清濁中凡數多者濁少者清宮數八十一商數七十二徵數五十四羽數四十八角數六十四少於宮商多於徵羽故云清濁中尊者為濁卑者為清民則卑於君臣尊於事物則角乃民之象也聲之尊卑取象五行者宮主土土聲濁其數多故為君商主金金聲稍重其數稍多故為臣角主木木聲清濁中其數多少中故為民徵主火火聲稍輕其數稍少故為事羽主水水聲極輕其數最少故為物其自然之序如此爾雅與蔡雍俱云管長尺晉志載黃帝玉管長尺六孔為十二月音周語注及月令章句俱云黃鐘長九寸蓋審度以一尺而推律以九寸是約十為九其數一也况呂不韋六月紀又曰黃鐘生林鐘林鐘生太蔟太蔟生南呂三分損益上下相生以至於仲呂淮南子以黃鐘八十一分上下相生與呂氏同此其法即史記漢書黃鐘起於九寸八十一相生至於應鐘四寸六分四十二之數也夫呂氏既云三寸九分而又用九寸八十一之數以相生已自相抵牾矣若謂呂氏黃鐘原非九寸之數而用三寸九分為管依呂氏相生之法布之呂氏以黃鐘為上三分去一下生林鐘蓋以黃鐘之三寸九分損其一分之一寸三分以下生林鐘得二寸六分呂氏以林鐘為下三分益一上生太蔟蓋以林鐘之二寸六分益其一分之八分六釐六毫六絲六忽不盡以上生太蔟得三寸四分六釐六毫六絲六忽不盡以此俱如法上下相生太蔟損一寸一分五釐五毫五絲不盡下生南呂得二寸三分一釐一毫一絲一忽不盡南呂益七分七釐三絲七忽不盡上生姑洗得三寸八釐一毫四絲八忽不盡姑洗損一寸二釐七毫一絲六忽不盡下生應鐘得二寸五釐四毫三絲二忽不盡則自長至短之數也夫管所以吹也管而由三寸餘遞降至二寸餘之短吹之何以成聲以被之人聲和乎人聲之歌詠與金石絲竹諸音其髙下清濁有自然音調今槩以三寸二寸之管吹為尖亮急裂之聲以奏之宗廟明堂必無幸矣蓋不韋之書集門客為之其語多雜一面云三寸九分一面云損益相生則用古來九寸正法其用九寸正法則是而云三寸九分則非自言而自背之不自知其前後之相矛盾也晉書宋書以訛傳訛亦載三寸九分之說皆呂氏啓之矣故本朝何文定公讀律呂元聲議云李文利之法謂黃鐘律三寸九分最短蕤賓律九寸最長宮音最清羽音最濁與古法大相反非也蓋陽數九故黃鐘九寸若謂三寸九分則何所取義樂聲與人聲各有五音而人聲尤為自然喉為宮音舌為商音牙為角音齒為徵音唇為羽音此人聲之自然也喉為宫音豈非以其來之深長而濁乎故古法以長律之音為宮以配之唇為羽音豈非以其來之短淺而清乎故古法以短律之音為羽以配之今李氏乃謂宮音最清羽音最濁則與人聲之宮羽相反倫類之不通也李法謂數少者音清數多者音濁及論五音之數則謂宫音五十商音八十角音九十徵音七十羽音六十宫音五十最少謂數少音清可也商音次清數乃八十羽音最濁數乃六十又安在其少者清而多者濁乎若謂宫土音故數五十羽水音故數六十則商金音數何以反八十角木音數何以反九十乎土濁水清理不可易今乃謂土音清而水音濁何耶且既以宮為清而羽為濁矣及論樂調則又謂蕤賓為宮則夾鐘為羽又安在其宮清而羽濁乎其辨皆是三分損益上下相生呂氏春秋季夏六月紀曰黃鐘生林鐘林鐘生太蔟太蔟生南呂南呂生姑洗姑洗生應鐘應鐘生蕤賓蕤賓生大呂大呂生夷則夷則生夾鐘夾鐘生無射無射生仲呂三分所生益之一分以上生三分所生去其一分以下生黃鐘大呂太蔟夾鐘姑洗仲呂蕤賓為上林鐘夷則南呂無射應鐘為下淮南子曰黃鐘位子其數八十一主十一月下生林鐘林鐘之數五十四主六月上生太蔟太蔟之數七十二主正月下生南呂南呂之數四十八主八月上生姑洗姑洗之數六十四主三月下生應鐘應鐘之數四十二主十月上生㽔賓㽔賓之數五十六主五月上生大呂大呂之數七十六主十二月下生夷則夷則之數五十一主七月上生夾鐘夾鐘之數六十八主二月下生無射無射之數四十五主九月上生仲呂仲呂之數六十主四月極不生之二說者應鐘以前上下相生之數與遷固律志同而㽔賓以後與遷固不同蔡季通謂呂氏淮南上下相生雖大呂夾鐘用倍數則一然不過以數之多寡為生之上下律呂隂陽皆錯亂而無倫近鄭世子以呂氏淮南為是而不用三分損益隔八相生謂長律下生短律左旋隔八短律上生長律右旋隔六以勾股算術布之周而復始以余論之皆殊塗而同歸也夫三分損益自管子言之無以易矣呂氏淮南法由黃鐘至應鐘與遷固同勿論獨蕤賓以後之各異者蓋吕氏淮南以黃鐘至仲呂皆屬陽㽔賓至應鐘皆屬隂朱子亦主此說謂子黃鐘復卦一陽丑大呂臨卦二陽寅太蔟泰卦三陽卯夾鐘大壯卦四陽辰姑洗夬卦五陽已仲呂乾卦六陽午㽔賓姤卦一隂未林鐘遁卦二隂申夷則否卦三隂酉南呂觀卦四隂戌無射剝卦五隂亥應鐘坤卦六隂以此為隂陽故自蕤賓之數變下為上而上生大呂以隂生陽大呂變上為下而下生夷則以陽生隂相生以至於仲呂非錯亂無倫也遷固則謂從子自亥黃鐘太蔟姑洗陽之陽也林鐘南呂應鐘隂之隂也陽生隂退故律生呂言下生呂生律言上生蕤賓夷則無射隂之陽也大呂夾鐘仲呂陽之隂也隂升陽退故律生呂言上生呂生律言下生㽔賓而後因在陽倍之於數既倍故陽反四上生益而隂反倍下生損相生以至於仲呂與呂氏淮南其究竟一也蓋二說一以隂陽正位言一以隂陽易位言於理皆合總之於黃鐘之位子其數八十一主十一月相生至於仲呂位已其數六十主四月一無所異耳遷固左旋八八為伍以自黃鐘而下其相生固分上下而一以左旋順數併本位為隔八以相生鄭世子以下生左旋隔八上生右旋隔六以相生是其左旋之八仲呂可生黃鐘猶夫右旋之六仲呂可生黃鐘其數不同其歸一也故曰殊塗而同歸第鄭之說較遷固為簡約而其以勾股術布周而復始則獨優於往昔矣和聲漢前志曰黃鐘為宫則太蔟姑洗林鐘南呂皆以正聲應無有忽微不復與他律為役非黃鐘而他律雖當其月自宮者則其和應之律有空積忽微不得其正蔡氏謂黃鐘正聲其他變律半聲雖欲役之而不可得惟杜佑通典再生黃鐘之法為得之按杜佑通典曰十二律相生之法自黃鐘始三分損益下生林鐘林鐘上生太蔟太蔟下生南呂南呂上生姑洗姑洗下生應鐘應鐘上生㽔賓蕤賓上生大呂大呂下生夷則夷則上生夾鐘夾鐘下生無射無射上生仲呂此謂十二律長短相生一終於仲呂之法又制十二鐘以準十二律之正聲又鳬氏為鐘以律計自倍半以子聲比正聲則正聲為倍以正聲比子聲則子聲為半但先儒釋用倍聲有二義一義云半十二律正律為十二子聲之鐘二義云從於仲呂之管寸數以三分益一上生黃鐘以所得管之寸數然後半之以為子聲之鐘其為變正聲之法者以黃鐘之管正聲九寸子聲則四寸半又上下相生之法者以仲呂之管長六寸一萬九千六百八十三分寸之萬二千九百七十四上生黃鐘三分益一得八寸五萬九千四十九分寸之五萬一千八百九十六半之得四寸五萬九千四十九分寸之二萬五千九百四十八以為黃鐘又上下相生以至仲呂皆以相生所得之律寸數半之以為子聲之律故有正聲十二子聲十二以為二十四蔡氏云此說黃鐘九寸生十一律有十二子聲所謂正律正半律也又自仲呂上生黃鐘黃鐘八寸五萬九千四十九分寸之五萬一千八百九十六又生十一律亦有十二子聲即所謂變律變半律也正變及半凡四十八聲上下相生最得漢志所謂黃鐘不復為他律役之意與律書五聲大小次第之法但變律止於應鐘雖設而無所用則其實三十六聲而已其間陽律不用變聲而黃鐘又不用正半聲隂呂不用正半聲而應鐘又不用變半聲其實又二十八聲而已以余論之古傳十二律未聞有變律之說也杜佑云子聲者即所變之半律而謂有正聲十二子聲十二共二十四蔡氏則謂變律至於應鐘乃自仲呂上生黃鐘林鐘太蔟南呂姑洗應鐘為六變律夫考古六律六呂已自成音謂仲呂二數之不行而强演諸律皆贅疣也漢志謂他律不得其正而蔡氏既以杜佑再生黃鐘為得乃又云變律雖設而無所用六變且無所用十二子又焉用之既不得其正而又設之無用則亦覺多術為矣漢後志京房六十律黃鐘子黃鐘生林鐘未林鐘生太蔟寅太蔟生南呂酉南呂生姑洗辰姑洗生應鐘亥應鐘生蕤賓午㽔賓生大呂丑大呂生夷則申夷則生夾鐘卯夾鐘生無射戌無射生仲呂已仲呂生執始子執始生去滅未去滅生時息寅時息生結躬酉結躬生變虞辰變虞生遲內亥遲內生盛變午盛變生分否丑分否生解形申解形生開時卯開時生閉掩戌閉掩生南中巳南中生丙盛子丙盛生安度未安度生屈齊寅屈齊生歸期酉歸期生路時辰路時生未育亥未育生離宮午離宮生凌隂丑凌隂生去南申去南生族嘉卯族嘉生鄰齊戌鄰齊生內負巳內負生分動子分動生歸嘉未歸嘉生隨時寅隨時生未卯酉未卯生形始辰形始生遲時亥遲時生制時午制時生少出丑少出生分積申分積生爭南卯爭南生期保戌期保生物應巳物應生質未子質未生否與未否與生形晉寅形晉生惟汗酉惟汗生依行辰依行生包育亥包育生謙待未謙待生未知寅未知生白呂酉白呂生南授辰南授生分烏亥分烏生南事午蔡氏言京房覺仲呂不生黃鐘故仲呂再生别名執始轉生四十八律其三分損益不盡之算不容損益遂或棄之或增之以不盈寸者十之所得為分不盈分者十之所得為小分以其餘為强弱雖泛以該之而不知為幾何則其奇零無時而能盡又依行在辰上生包育編於黃鐘之次乃是隔九其黃鐘林鐘太蔟南呂姑洗每律統五律㽔賓應鐘每律統四律大呂夾鐘仲呂夷則無射每律統三律三五不同多寡不例宋何承天劉焯譏房之病蓋得其一二然承天與焯增林鐘已下十一律之分使至仲呂反生黃鐘還得十七萬七千一百四十七之數如此則是惟黃鐘一律成律他十一律皆不應其數至於杜佑胡瑗范蜀公等皆以意强為之法故通典則自南呂而下各自為法胡范則止用八百一十分而其因乘之法亦用十數故其餘算亦皆棄而不録終亦不可得而齊此則蔡氏之言皆是也且京房演六十律己為悖謬而宋錢樂之至又廣為三百六十祗欲附會三百六十當期之說而不知其愈失愈遠矣蓋三分損益演之無窮不特三百六十而已也而况京房之六十乎蔡季通律呂新書雖載黃鐘以下六變律而一則曰變律不得其正一則曰變律雖設而無所用其謂不正無用則誠是也故論律呂宜止依古十二律呂為正杜佑通典曰陳仲儒云調聲之體宫商宜濁徵羽宜清若依公孫崇止以十二律而云還相為宮清濁悉足非惟未練五調調器之法至於五聲次第自是不足何者黃鐘為聲氣之元其管最長故以黃鐘為宫太蔟為商林鐘為徵則一相順若均之八音猶須錯採衆聲配成其美若以應鐘為宮大呂為商㽔賓為徵則徵濁而宫清雖有其韻不成音曲若以無射為宮則十二律中惟得取仲呂為徵其商角羽竝無其韻若以仲呂為宮則十二律內全無所取何者仲呂為十二律之窮變律之首也依京房書仲吕為宫乃以去滅為商執始為徵然後成韻而崇乃以仲吕為宫猶用林鐘為商黃鐘為徵何由可諧蔡氏云仲儒所以攻公孫崇者當矣其論應鐘為宮大吕為商㽔賓為徵商徵皆濁於宮雖有其韻不成音曲又謂仲呂為宮則十二律內全無所取尤為的切然仲儒所主是京氏六十律不知依行為宫包育為徵果成音曲乎果有其韻乎蓋仲儒知仲呂之反生不可為黃鐘而不知變至於六則數窮不生雖或增或棄成就使然之數强生餘律亦無所用也夫杜佑引仲儒之說謂應鐘以下為宮不成音曲而蔡氏謂為京房不成音曲之律其言誠是而謂應鐘以下不可為宮則非也蓋律之所以名調者言其宮調羽調各自其宫羽起止而其實則一調皆備五音也但其調中之聲抑揚髙下有條不紊之為得耳如今之鼓琴者鼓宫調則多雄洪之聲而其中未必無清切者鼓羽調則多清切之聲而其中未必無雄洪者是也人聲之歌亦如之況十二律皆可為宮其曰宫音濁而餘音清者特自黃鐘之一調言之若旋相為宮則借清為宮清音即宮為本均之主而餘音清濁不同不妨命之為商角徵羽以次抑揚髙下不失其倫各成一調也猶夫易地亦然之意則何應鐘不可為宮之有此律之所以貴變通也周景王問七律泠州鳩對曰凡神人以數合之以聲昭之數合聲和然後可同也故以七同其數而以律和其聲於是乎有七律韋氏注七律黃鐘為宮太蔟為商姑洗為角林鐘為徵南呂為羽應鐘為變宫㽔賓為變徵是也春秋晏子曰先王之濟五味和五聲也聲亦如味五聲六律七音以相和也樂記曰聲相應故生變變成方謂之音比音而樂之謂之樂唐楊收謂二變亦曰比蓋比即變也七音古人謂之七始伏生以為出於舜世其名義最古漢律厯因載七始之說杜佑通典注則云殷以前但有五音周以來加文武二聲謂之七聲五聲為正二聲為變變者和也史記刺客傳髙漸離擊筑荆軻和而歌為變徵之聲士皆垂淚涕泣又前而歌曰風蕭蕭兮易水寒壯士一去兮不復還復為羽聲慷慨士皆瞋目髮盡上指冠蔡氏曰二變可以濟五音之所不及有五音而無二變亦不可以成樂也朱子曰律吕有十二然用時只使七斯則五聲二變其來遠其說詳矣蓋十二律各自為均而一均之中各備七音所謂宮商角徵羽及變宮變徵方成調也乃陳𤾉專用五聲而黜二變則失之矣周禮春官大司樂凡樂圜鐘為宫黃鐘為角太蔟為徵姑洗為羽雷鼓雷鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鐘為宫太蔟為角姑洗為徵南呂為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方邱奏之若樂八變則地示皆出可得而禮矣凡樂黃鐘為宮大呂為角太蔟為徵應鐘為羽路鼓路鼗隂竹之管龍門之琴瑟九德之歌九㲈之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣夫圜鐘乃夾鐘也夾鐘為宮則以仲呂為商林鐘為角無射為徵黃鐘為羽黃鐘為角則以夾鐘為徵仲呂為羽夷則為宮無射為商太蔟為徵則以姑洗為羽林鐘為宮南呂為商應鐘為角姑洗為羽亦以林鐘為宮南呂為商應鐘為角太蔟為徵函鐘乃林鐘也林鐘為宮則以南呂為商應鐘為角太蔟為徵姑洗為羽太蔟為角則以仲呂為徵林鐘為羽無射為宮黃鐘為商姑洗為徵則以蕤賓為羽南呂為宮應鐘為商大呂為角南呂為羽則以黃鐘為宮太蔟為商姑洗為角林鐘為徵黃鐘為宮則以太蔟為商姑洗為角林鐘為徵南呂為羽大呂為角則以姑洗為徵蕤賓為羽南呂為宮應鐘為商太蔟為徵則以姑洗為羽林鐘為宮南呂為商應鐘為角應鐘為羽則以太蔟為宮姑洗為商㽔賓為角南呂為徵圜鐘在卯帝出乎震黃鐘在子一陽來復太蔟姑洗夾列卯門故用以祀天從卯至申其數六故云六變也函鐘在未致養乎坤太蔟南呂同位聚妻南呂姑洗隔八生子故用以祭地從未至寅其數八故云八變也黃鐘大呂子與丑合太蔟應鐘寅與亥合北方四律幽隂之義故用以享鬼從子至申其數九故云九變也蔡氏曰此祭祀之樂不用商聲只有宮角徵羽四聲無變宮變徵蓋古人變宮變徵不為調也左氏傳曰中聲以降五降之後不容彈矣夫五降之後更有變宮變徵而曰不容彈者以二變之不可為調也朱子曰此降神之樂如黃鐘為宮大呂為角太蔟為徵應鐘為羽自是四樂各舉其一者而言之以大呂為角則南呂為宮太蔟為徵則林鐘為宮應鐘為羽則太蔟為宮以七聲推之合如此注家之說非也又曰所謂黃鐘宮大呂角這便是調如頭一聲是宮聲尾一聲亦是宮聲便是宮調其中按拍處五音依舊都用不只是全用宮是朱子之言是也蓋樂必具五音或謂周祭祀不用商調者避殷所尚也縱避殷所尚止不用商起調而非調中之無商聲也凡樂章起調畢曲為一調猶今時曲仙呂調越調之類如宮調起調畢曲用宮聲而中則五聲二變七音皆備故宋史樂志云正律之外有黃鐘大呂太蔟夾鐘之四清聲蓋自夷則至應鐘四律為均之時若盡用正聲則宮輕而商重緣宮聲以下不容更有濁聲一均之中宮弱商彊是謂陵僣故須用子聲乃得長短相叙自角而下亦循兹法故夷則為宮則黃鐘為角南呂為宮則大呂為角無射為宫則黃鐘為商太蔟為角應鐘為宮則大呂為商夾鐘為角蓋黃鐘大呂太蔟夾鐘正律俱長竝當用清聲如此則音律相諧而無所抗此四清之可用也夫四清且用則豈有調中不用商聲之理耶李照陳𤾉不知而黜四清徒欲壞古旋宫之法所謂不知音而不可與言樂者也然調亦有變者如宋玉曰客有歌於郢中者為陽春白雪引商刻羽雜以流徵荆軻歌變徴之聲又復為羽聲夫郢歌陽春白雪忽然而雜以商徵羽軻歌變徵復為羽聲斯調且有變也而况於音然則樂何可以執一論古今律厯考卷三十二
