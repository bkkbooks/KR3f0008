body:
  text: 古今律厯考卷二十一明邢雲路撰歷代日食二歷代日食厯東漢光武建武二年丙戌歲正月甲子朔日食正月交二十六日五一正月朔初日五十八刻甲子未時赤道危八度九五推得漢光武建武二年丙戌歲正月甲子朔未正初刻合朔日食在危八度宿度既合以後不復推又考古今注載光武建武元年乙酉歲即更始三年正月庚午朔日食以法推元年正月初一己巳日亥時合朔日食在夜夜食不書無乃漢史誤布應食及期見其不食也而遂削之耶建武三年丁亥歲五月乙卯晦日食六月交一十三日八二六月朔五十一日三六乙卯辰時是六月乙卯朔辰時日食非五月晦建武四年戊子歲五月乙卯晦日食見古今注推得是年六月庚戌朔入食限加時在夜丑無乙卯則古今注之載食非也厯推史無而古今注有者多不食其誤可知建武六年庚寅歲三月晦日食見漢祕史四月交一十三日三三四月朔五日四六己巳午時考漢唐祕史載建武六年三月晦日食大雨連月昔稼更生鼠巢樹上乃邪隂掩太陽之象夫漢唐祕史一書乃我太祖西宮命弟肅王等兄弟五王奉敕大索羣典編集成書其間事實多內府祕書出於史鑑之外者漢史古今注文獻通考通鑑綱目諸書俱不載是食而祕史有之余以法布算四月初一己巳朔去交分入食限巳時食甚與祕史合蓋四月朔即三月晦也緣漢史步厯乖次多以朔為晦耳且以斯日食淫雨邪隂掩陽之大變必當時大庭之上衆目所視載在祕册藏諸金匱歷代流傳至今者也何當時厯官既不能推乃見其食也而又恐彰已過隱之不書於史册可恨也夫建武六年九月丙寅晦日食史官不見郡以聞十月交初日二十月朔二日二四丙寅卯時初三刻推得十月丙寅朔卯初刻合朔食甚非九月丙寅晦是時日出卯正刻初刻食甚所以洛陽不見若郡之偏東者日出差早合朔亦早則食甚復圓之間正其所及見者然則郡以聞者其必偏東之郡乎建武七年辛卯歲三月癸亥晦日食四月交一十三日九四月朔五十九日四八癸亥午時是四月癸亥朔午時日食非三月晦建武十六年庚子歲三月辛丑晦日食四月交二十六日三六四月朔三十七日三辛丑辰時是四月辛丑朔辰時日食非三月晦建武十七年辛丑歲二月乙未晦日食三月交二十六日九七三月朔三十一日五七乙未未時是三月乙未未時日食非二月晦建武二十二年丙午歲五月乙未晦日食六月交一十四日三九六月朔三十一日四乙未巳時是六月乙未朔巳時日食非五月晦建武二十五年己酉歲三月戊申晦日食四月交一十三日九四月朔四十四日六九戊申申時是四月戊申朔申時日食非三月晦建武二十九年癸丑歲二月丁巳朔日食二月交一十四日一二月朔五十三日四二丁巳巳時是二月丁巳朔巳時日食建武三十一年乙卯歲五月癸酉晦日食六月交二十六日八六六月朔九日四癸酉巳時是六月癸酉朔巳時日食非五月晦中元元年丙辰嵗十一月甲子晦日食十二月交一十四日一三十二月朔日四十一刻甲子巳時是十二月甲子朔巳時日食非十一月晦明帝永平三年庚申歲八月壬申晦日食九月交一十四日二四九月朔八日五八壬申申時是九月壬申朔申時日食非八月晦永平四年辛酉歲八月丙寅時加未日食古今注載八月交一十四日八不入食限推不應食古今注載食非永平五年壬戌歲二月乙未晦日食京師候之不覺汝南五郡國三十一上古今注載史無三月交二十六日三月朔三十一日二六乙未卯時推得三月乙未朔卯時日食非二月晦古今注載河南郡上食是也永平六年癸亥歲六月庚辰晦日食時雒陽候者不見古今注載史無七月交二十二日四一不入食限推不宜食古今注載食非永平八年乙丑歲十月壬寅晦日食古今注云十二月十一月交二十六日五六十一月朔三十八日四四壬寅巳時是十一月壬寅朔巳時日食非十一月晦古今注云十二月亦非永平十三年庚午歲十月甲辰晦日食古今注云八月文獻通考云十一月晦十一月交四日一不入食限推不宜食蓋原無是食所以漢史古今注文獻通考各載不一永平十六年癸酉歲五月戊午晦日食閏六月交二十六日七九閏六月朔五十四日七二戊午酉時是閏六月戊午朔酉時日食非五月晦永平十八年乙亥歲十一月甲辰晦日食十二月交一十四日七十二月朔四十日四甲辰巳時是十二月甲辰朔巳時日食非十一月晦章帝建初五年庚辰歲二月庚辰朔日食二月交二十六日四一二月朔一十六日六庚辰未時是二月庚辰朔未時日食建初六年辛巳歲六月辛未晦日食八月交一十三日七一八月朔七日三三辛未辰時是八月辛未朔辰時日食非六月晦蓋是年應閏八月而漢厯誤先置一閏故差元和元年甲申嵗八月乙未晦日食史官不見他官以聞推無是食查通鑑綱目亦無是食章和元年丁亥歲八月乙未晦日食十月交二十六日六四十月朔三十一日六六乙未申時是十月乙未朔申時日食非八月晦蓋是年應閏正月而漢厯未閏故以九月晦為八月晦也查元和元年八九月之交無乙未亦不入食限而是年乙未之食適合漢史無章和元年食而通鑑綱目有之無乃章和之章字誤記為元和耶和帝永元二年庚寅歲二月壬午日食史官不見涿郡以聞漢史無晦朔祕史云晦二月交一十四日五五二月朔一十八日三三壬午辰時是二月壬午朔辰時日食祕史云晦非永元四年壬辰嵗六月戊戌朔日食閏六月交一十五刻閏六月朔三十四日五五戊戌未時是閏六月戊戌朔未時日食非六月朔蓋是年閏六月而漢厯不知也永元七年乙未歲四月辛亥朔日食四月交二十六日八六四月朔四十七日四六辛亥午時是四月辛亥朔午時日食永元十二年庚子歲七月辛亥朔日食八月交一十四日二八八月朔四十七日三六辛亥辰時是八月辛亥朔辰時日食非七月朔蓋是年八月方閏而漢史誤先置一閏故以八月為七月差矣永元十五年癸卯歲四月甲子晦日食閏五月交一十三日七九閏五月朔五十六刻未時是閏五月甲子朔未時日食非四月晦蓋是年應閏五月漢厯誤先置一閏故以閏五月朔作四月甲子晦差矣與永元庚子同安帝永初元年丁未歲三月二日癸酉日食祕史云三月晦通鑑綱目不書日古今注亦不書日三月經朔八日七六加差五十六刻五三月交一十三日九三月定朔九日三十三刻二得癸酉日辰初四刻合朔推得是年三月癸酉朔辰初四刻合朔日食非三月二日亦非三月晦蓋漢厯不知天日之差即以天度為日度於月止以章月步朔一經朔且未定安論盈縮與遲疾且是年三月之厯以經朔步之得八日壬申酉正一刻加以盈遲相併加差之五十餘刻遂至九日癸酉辰初四刻合朔食甚矣蓋經朔者論其泛行之度也盈縮遲疾者則日月由闊入狹由狹入闊南北運行平立積差參差不齊之數也漢人烏得而知之漢厯目為朔二日祕史目為晦古今注暨通鑑則不敢書日嗟嗟天道雖聞天眼未晣空令人左遮右掩迷亂而不敢定則何惑乎世遂視羲和為絶學噤不敢言畏不敢近而抑知日之食也人皆見之千歲之日可坐而致其如燭照數計示諸掌之易易也永初五年辛亥歲正月庚辰朔日食正月交一十四日二正月朔一十六日五一午時是正月庚辰朔午時日食永初七年癸丑歲四月丙申晦日食五月交二十六日八三五月朔三十二日七七丙申酉時是五月丙申朔酉時日食非四月晦元初元年甲寅歲三月日食一云五月晦日食漢史則不書食閏餘二十五日五閏三月四月交二十二刻四月朔二十七日三六辛卯辰時是四月辛卯朔辰時日食非三月日食亦非五月晦日食蓋是年閏三月而漢史不知想推以為前又推以為後不知閏在何月及見其食也遂訛記之既而恐彰已過遂復削之所以史無是食通鑑綱目則載三月日食而不書朔祕史則載五月晦日食皆循漢史訛記之舊也豈知閏在三月而四月朔實有是食乎元初元年十月戊子朔日食十月交一十四日一三十月朔二十四日五四戊子未時是十月戊子朔未時日食元初二年乙卯歲九月壬午晦日食十月交一十四日七四十月朔一十八日五三壬午午時是十月壬午朔午時日食非九月晦元初三年丙辰歲三月二日辛亥日食史官不見遼東以聞三月經朔四十六日六六庚戌申初三刻盈遲相併七度七六加差五十八刻三月交二十六日三三三月朔四十七日二四辛亥卯初三刻是三月初一日辛亥卯時初三刻合朔日食非三月二日也漢厯止以章月步朔罔知加減故朔失之前則晦失之後則二日矣豈知是月推經朔四十六日六十六刻得庚戌日申初三刻推定朔四十七日二十四刻則辛亥日卯初三刻也以盈遲相併之七度七十六分應加五十八刻加之則移庚戌之暮為辛亥之旦矣史官不見遼東以聞者天下日出分不同遼東偏東日出最早雒陽天中日出稍遲故是日卯初日出而食遼東僅及見之少頃復圓而雒陽日方出則不及見也此天運自然豈容假借者耶漢史書二日綱目不書日祕史書晦日胥失之即此一事足證漢厯之失元初四年丁巳歲二月乙亥朔日食史官不見七郡以聞二月交二十六日九四二月朔四十一日三八乙巳巳時是二月乙巳朔巳時日食非乙亥朔也蓋是年應閏十二月漢厯未閏誤以正月朔之乙亥作二月朔過此覺差方補一閏然乙亥之文則仍舊未改故也元初五年戊午歲八月丙申朔日食史官不見張掖以聞八月交一十四日二五八月朔三十二日六九丙申申正二刻是八月丙申朔申末合朔日食張掖聞之是也何乃史官不見乎想東京以申酉之時夕陽西下偶蔽於遊氣而不見張掖以極西見也元初六年己未歲十二月戊午朔日食幾盡地如昏狀十二月交二十六日四五十二月朔五十四日四五戊午巳時是十二月戊午朔巳時日食永寧元年庚申歲七月乙酉朔日食史官不見酒泉以聞六月交一十三日一五六月朔五十一日八乙卯戌初是六月乙卯朔戌時初刻合朔日食非七月乙酉朔也漢厯步朔無次常乖一閏以卯為酉與元初丁巳二月朔之以巳作亥同然史官不見酒泉以聞者酒泉地偏極西寅餞納日日入差遲以六月朔戌初刻食甚况在極西則日尚未入也由虧至甚豈不悉見若雒陽天中則日入差早或日暮重以遊氣無惑乎不見也此與元初三月朔遼東以聞之厯互相發明蓋日之出入隨地不同此二者極東極西早晚異焉明乎二厯千古之疑破矣延光三年甲子歲九月庚寅晦日食十月交二十七日一七十月朔五十六日三六庚申辰時是十月庚申朔辰時日食非九月庚寅晦延光四年乙丑歲三月戊午朔日食隴西酒泉朔方各以狀上史官不覺三月交一十三日八七三月朔六十五刻戊午申時是三月戊午朔申時日食隴西酒泉朔方各以狀上是也何史官不覺耶順帝永建二年丁卯歲七月甲戌朔日食八月交二十六日六八八月朔一十日六一甲戌未時是八月甲戌朔未時日食非七月甲戌朔漢厯誤陽嘉四年乙亥嵗閏月丁亥朔日食史官不見零陵以聞九月交一十三日六九月朔二十三日三五丁亥辰時是九月丁亥朔辰時日食非閏月丁亥朔也蓋是年閏餘不及閏限一十八日有竒不應閏至冬十二月方閏漢厯不知而預閏八月遂以九月丁亥朔為閏八月丁亥朔過此見其差也遂亦不敢書閏八月而但曰閏月茫無措矣是日食在辰刻非卯酉之難見也零陵以聞良是胡史官不見耶永和三年戊寅歲十二月戊戌朔日食史官不見會稽以聞十二月交二十七日二十二月朔三十四日四九戊戌午時是十二月初一戊戌日午時合朔食甚夫午時天中食甚人皆見之會稽以聞是也何史官昏迷不見耶永和五年庚寅歲五月己丑晦日食六月交一十四日三三六月朔二十五日三九己丑巳時是六月己丑朔巳時日食非五月晦永和六年辛巳歲九月辛亥晦日食十月交二十六日五三十月朔四十七日六二辛亥申時是十月辛亥朔申時日食非九月晦也按通鑑綱目載永和六年春閏正月鞏唐羌冦三輔燒園陵以法推是年閏餘二十三日八十六刻以減朔實餘五日六十六刻以月閏九十刻有竒去之應閏六月漢史不知而妄閏正月先天五其月矣閏且差至五月則何惑乎以十月冬為九月秋以朔日吉為晦日昧也傳曰歸餘於終事則不悖政典曰先時者殺無赦然則不治先時之罪欲冬之不秋吉之不昧事之不悖得乎桓帝建和元年丁亥嵗正月辛亥朔日食史官不見郡國以聞正月交一十三日九五正月朔四十七日二二辛亥卯初一刻是正月辛亥朔卯初刻日食史官不見郡國以聞者正月日出卯正而是食在卯初地之偏東者日出差早卯初及見其食洛陽天中食至卯正則將復圓不見其食也此之郡國以聞者其必偏東之郡國乎建和三年己丑歲四月丁卯晦日食六月交二十六日七六六月朔三日三五丁卯辰時是六月丁卯朔辰時日食非四月晦蓋是年六月方閏而漢史先閏故以六月朔為四月晦非元嘉二年壬辰歲七月二日庚辰日食史官不見廣陵以聞七月交八日二四不入食限七月朔一十五日五七己卯未時推是年七月一日己卯未時合朔二日庚辰朔交泛八日不入食限史官不見是廣陵以聞非永興二年甲午歲九月丁卯朔日食九月交一十四日一八九月朔三日三五丁卯辰時是九月丁卯朔辰時日食永壽三年丁酉歲閏四月庚辰晦日食史官不見郡國以聞七月交一十三日六八七月朔一十六日三七庚辰辰時是七月庚辰朔辰時日食非閏四月庚辰晦史官郡國皆非也何者蓋是年閏八月非閏四月推四五月晦朔之間俱無庚辰不入食限故也永壽三年丁酉歲十二月壬戌月蝕非其月十一月望交一十二日八三十一月望五十八日八五推得是年十一月十五日壬戌戌時正一刻合望月食非十二月壬戌月食非其月蓋漢厯於是年七月日食妄步閏四月故於十一月壬戌之月食茫無著落而但曰月食非其月也嗟嗟在天月食是其月若等步天非其月而反􅑲􅑲自是詆天曰非其月也可恨也夫延熹元年戊戌歲五月甲戌晦日食六月交一十四日二九六月朔一十日六八甲戌申時是六月甲戌朔申時日食非五月晦延熹八年乙巳歲正月辛巳月食非其月正月望交二十六日三六正月望一十八日二八壬午卯正三刻推得是年正月十五日辛巳夜至曉壬午卯正三刻合望月食甚正月望日出卯正二刻食甚在卯正三則初虧在寅末卯初也其食無疑何漢史不知而目為月食非其月耶延熹八年乙巳歲正月丙申晦日食二月交一十三日九一二月朔三十二日五七丙申未時是二月丙申朔未時日食非正月晦延熹九年丙午歲正月辛卯朔日食史官不見郡國以聞正月交一十四日五二正月朔二十七日三四辛卯卯初三刻推得是年正月辛卯朔卯初三刻食甚則復圓在辰也然正月初日出卯正二刻若偏東之地則日出差早洛陽天中則日出差遲所以史官不見而其郡國以聞者必偏東之郡國乎永康元年丁未歲五月壬子晦日食六月交二十六日七二六月朔四十八日六三壬子申時是六月壬子朔申時日食非五月晦靈帝建寧元年戊申歲五月丁未朔日食六月交日一十二刻六月朔四十三日四二丁未巳時是六月丁未朔巳時日食非五月朔蓋是年七月方閏而漢史豫閏故以六月朔為五月朔非建寧元年十月甲辰晦日食十一月交一十四日三十一月朔四十日五五甲辰未時是十一月甲辰朔未時日食非十月晦建寧二年己酉歲十月戊戌晦日食右扶風以聞十一月交一十四日六三十一月朔三十四日五六戊戌未時是十一月戊戌朔未時日食非十月晦右扶風以聞是也建寧三年庚戌歲三月丙寅晦日食梁相以聞四月交二十六日二三四月朔三日一七丁卯寅初三刻推四月丁卯朔寅正初刻日食四月日出卯初一刻寅正食甚則卯初尚未復圓地之偏東者日出差早猶及少見其虧然則梁相以聞者毋乃居東乎建寧四年辛亥歲三月辛酉朔日食閏三月交二十六日八三閏三月朔五十七日三四辛酉辰時是閏三月辛酉朔辰時日食非三月辛酉朔蓋漢史於未三月先置一閏故以閏三月為三月耳熹平二年癸丑歲十二月癸酉晦日食正月交二十六日三四正月朔一十日五三甲戌午時是熹平三年正月甲戌朔午時日食非二年十二月癸酉晦所關元旦日食其誤大熹平四年乙卯歲正月朔正月交二十六日九五正月朔五日二二己巳卯初一刻推得是年正月己巳朔卯時日食考漢史蔡雍上書曰熹平四年正月朔日體微傷羣臣服赤幘赴宫門之中無救乃各罷歸天有大異隱而不宣求御過是已事之甚者夫元旦日食變之最大者也伯喈親見日體微傷同羣臣服赤幘赴宫門以無救而罷歸乃漢之羲和尸厥官罔聞知則焉用羲和為法推是年正月己巳朔卯初一刻合朔食甚正月日出卯正二刻則伯喈所見日體微傷正食甚已過尚未復圓時也伯喈同羣臣欲救不得上書譏日官不報君臣泄泄其奈之何幸伯喈一疏昭在簡册使余千載而下得以援此證據按策步厯以正千古之謬則伯喈有功於厯大矣熹平六年丁巳歲十月癸丑朔日食趙相以聞十一月交二十六日四六十一月朔一十八日二九壬午辰時是十一月壬午朔辰時日食非十月癸丑朔必漢厯置閏遷就之過光和元年戊午歲二月辛亥朔日食推二月朔不入交無是食至五月朔方入交食在半夜漢史載二月朔日食不書宿度不言事應是必誤步是食及期候之不食遂削去宿度事應而猶存其名也光和元年十月丙子晦日食十一月交二十七日六十一月朔一十二日三九巳初一刻是十一月丙子朔巳時日食非十月晦蓋每歲六月一交即此十一月食而知前之交五月也其二月不食明矣考漢史本傳載盧植上書是日丙子食自巳過午陳八事以諫蔡雍對詔問云云觀此日食自巳過午當時羣臣所目覩者余步巳初一刻合朔食甚則復圓過午明矣以今考古千嵗可致他又何疑光和二年己未嵗四月甲戌朔日食五月交一十三日七六五月朔一十日五五甲戌未時是五月甲戌朔未時日食非四月甲戌朔蓋是年五月方閏漢史先閏誤以五月朔為四月朔光和四年辛酉歲九月庚寅朔日食九月交二十六日五七九月朔二十六日六三庚寅申時是九月庚寅朔申時日食中平三年丙寅歲五月壬辰晦日食六月交日八六月朔二十八日六九壬辰未時是六月壬辰朔未時日食非五月晦中平六年己巳歲四月丙午朔日食四月交二十六日八四月朔四十二日六三丙午申時是四月丙午朔申時日食獻帝初平四年癸酉歲正月甲寅朔日食正月交二十六日九一正月朔五十日五四五甲寅未正一刻推得是年正月甲寅朔未正一刻合朔日食考漢史載袁宏紀曰未蝕八刻太史令王立奏曰日晷過度無有變也於是朝臣皆賀帝密令尚書候正未晡一刻而食尚書賈翊奏曰立伺候不明疑誤上下大尉周忠職所典掌請皆治罪詔曰天道遠事驗難明且災異應政而至雖探道知幾焉能無失而欲歸咎史官益重朕之不德也弗從於是避正殿寢兵不聽事五日夫尚書候正未晡一刻而食是未初刻食起也余推未正初刻合朔則食甚在未正初之前復圓在未正刻之末正合袁宏所紀未蝕八刻與尚書所候之的期也以元旦日食大變而王立既不能推又奏云無變朝臣遂賀皆逢君之為也帝令尚書密候得實賈翊正言劾奏帝即引為已過避殿寢兵克謹天戒而於厯官特優容之咄咄王立周忠典掌謂何縱免胤侯之誅能不內愧於心乎興平元年甲戌歲六月乙巳晦日食七月交一十四日二二七月朔四十一日二八乙巳卯時是七月乙巳朔卯時日食非六月晦建安五年庚辰歲九月庚午朔日食九月交二十六日一四九月朔六日三四庚午辰時是九月庚午朔辰時日食建安六年辛巳歲十月癸未朔日食推是年無癸未朔三月十月皆不入食限閏二月八月入食限則皆夜食史載十月癸未朔食通鑑綱目載三月朔食皆非也建安十三年戊子歲十月癸未朔日食十月交一十四日七十月朔一十九日四一巳時是十月癸未朔巳時日食建安十五年庚寅歲二月乙巳朔日食二月交二十六日二七二月朔四十一日三一乙巳辰時是二月乙巳朔辰時日食建安十七年壬辰歲六月庚寅晦日食七月交一十四日一八七月朔二十六日五九八庚寅未時是七月庚寅朔未時日食非六月晦建安二十一年丙申歲五月己亥朔日食五月交一十四日三二五月朔三十五日三四己亥辰時是五月己亥朔辰時日食建安二十四年己亥歲二月壬子晦日食三月交一十三日八三月朔四十八日五九壬子未時是三月壬子朔未時日食非二月晦建安二十五年庚子嵗二月朔日食見通鑑綱目閏二月交一十四日四一閏二月朔四十三日二九三丁未辰時是閏二月丁未朔辰時日食非二月朔史漏凡漢中興十二世百九十六年史書日蝕七十二朔三十二晦二十七月二日三以法算之其晦與二日皆朔也蓋東漢日官步氣仍用四分度之一步朔仍用章月並無盈縮遲疾加減故其差忒猶之乎西漢也且終東漢之世二百年間日官步得兩月蝕非其月以為在天月之亂行與已所算不合有此兩異也故特記之而豈知兩月俱應蝕乃若等寃天而亂道也即熹平四年正月朔蔡雍親見日虧抗章上表而不報初平四年正月朔賈翊親候日食奏請治罪而不理夫以三朝大變朝臣公議而猶泄泄然若此蓋由漢室日官挾權太重且自知多漏難補故百計彌縫寃天以實已之短昧心拒衆罔上行私牢不可破耳古今律歷考卷二十一
