body:
  text: 古今律厯考卷五十明邢雲路撰厯法十五厯法萬厯三十三年乙巳嵗二月望月食厯授時推冬至置所求乙巳距元至元辛巳積三百二十五年減一筭以嵗實三百六十五日二十四刻二十五分乘之得一十一萬八千三百三十八日五十七刻為中積加氣應五十五日六刻得一十一萬八千三百九十三日六十三刻為通積滿旬周去之餘一十三日六十三刻為冬至推閏餘置中積加閏應二十日二五得一十一萬八千三百五十八日七十七刻五為閏積滿朔實去之餘一十五刻八二五六為天正閏餘即縮末厯推經朔置冬至減閏餘餘一十三日四十七刻一七四四為天正經朔推遲疾厯置中積加轉應一十三日二五得一十一萬八千三百五十一日五十九刻五減閏餘餘一十一萬八千三百五十一日四十三刻二二四四滿轉終去之餘四日四十二刻五二四四為天正入朔疾厯推交泛置中積加交應二十六日三八八得一十一萬八千三百六十四日六十刻八八減閏餘餘一十一萬八千三百六十四日四十五刻五四四滿交終去之餘一十八日四十八刻八三六八為天正入朔交泛推天正赤道宿度置嵗差一分五十秒以距元至元辛巳積三百二十五減一筭得四度八十六分以元授時測到箕十度内減之餘得箕宿五度一十四分為天正加時赤道度推天正黄道宿度置天正赤道宿度及分以初日下赤道率一度八六五而一得箕宿四度七十三分七八六九三為天正加時黄道度推二月經朔置天正經朔加三朔實八十八日五十九刻一七七九得一百二日六刻三五二三滿旬周去之餘四十二日六刻三五二三為二月經朔推二月盈厯置三朔實減閏餘餘八十八日四十三刻三五二三為二月入朔盈初厯推二月疾厯置天正疾厯加三朔轉差五日九十二刻七九七九得一十日三十五刻三二二三為二月入朔疾厯推二月朔交泛置三朔交差加天正朔交泛得二十五日四十四刻三四七五為二月朔交泛推二月望交泛置二月朔交泛加一望策一十四日七六五二九六五得四十日二八七七一五以減交終餘一十二日九九六五四七五為二月望交泛推二月經望置二月經朔加望策得五十六日八十二刻八八一九五為二月經望推盈縮厯置二月入朔盈厯加望策得一百三日一九八八一九五為二月入望盈厯以減半嵗周餘得七十九日四二二四三五為二月入望盈末厯推盈差此法較用加分積度為精置立差二十七以盈末厯乘之得二千一百四四四五六二三五加平差二萬二千一百得二萬四千二百四四四五六二三五又以盈末厯乘之得一百九十二萬五五四九六用減定差四百八十七萬六百餘二百九十四萬五五四再以盈末厯乘之得二度三十三分九三六為盈差推遲疾厯置二月入朔疾厯加望策減轉中餘一十一日三四一二一九五為二月入望遲厯推遲限置遲限以至限乘之得一百三十八限三六二八七七九為遲限推遲末限置總限減遲限餘二十九限七二一八二一為遲末限推遲差置立差三百二十五以遲末限乘之得九千六百五九五九一加平差二萬八千一百得三萬七千七百五九五九一又以遲末限乗之得一百一十二萬二千二百六一一四用減定差一千一百一十一萬餘九百九十八萬七千七百九三八八六再以遲末限乘之得二度九十六分八三九四八為遲差推加減差置遲差併盈差共得五度三十分七四二一八以八百二十乘之得四十三刻五二八五二八五六以一百三十八限下遲行度一度一八二三而一得三十六刻八一三二九為加差推定望置二月經望加加差得五十七日一十九刻六九二二七為定望推日出分視盈厯一百三日下日出分二十四刻八二日晨分二十一刻五八二推定入遲厯置入望遲厯加加差得一百一十七日九三二二七九為定入遲厯推定入遲限置定入遲厯以一十二限二十乗之得一百四十二限為定入遲限推定限行度置一百四十二限下遲行度一度一八六七減日行分八分二十秒餘一度一四七為定限行度推交常度置二月望交泛以月平行度一十三度三六八七五乘之得一百七十三度七四七五九四三九為交常度推交定度置交常度加二月入望盈差得一百七十六度八六六二四九九為交定度推卯前後分置定望小餘一十九刻六九二二七即為卯前分推時差分置日周百刻減卯前分餘數以度約之得八十分三七七三為時差分推食甚定分置定望小餘加時差分共得二十刻四九五三四七三為食甚定分推食甚入盈厯置食甚定分加盈厯全分一百三日一九八八一九五及加定望大餘五十七日得數減經望大小餘全分餘得一百三度五七四九五三四七為食甚入盈厯以半歳周減之餘得七十九日四六二九六五二為盈末厯推食甚入盈差置立差二十七以食甚入盈末厯乘之得二千一百三四二五加平差二萬二千一百得二萬四千二百三四二五又以盈末厯乘之得一百九十一萬五六二七七一用減定差四百八十七萬六百餘二百九十五萬四千九百七二二九再以盈末厯乘之得二度三十三分五七九六一五為食甚入盈差推食甚入盈厯行定度置食甚入盈厯全分加食甚入盈差共得一百五度九三七四九六二為食甚入盈厯行定度推月食入隂陽厯視交定度在交中一百八十一度八九六七下為陽厯今止一百七十六度八六六二四九九即為月食陽厯推交前後度置交中度全分減交定度餘五度八一七五一為陽厯交前度推月食分秒置一十三度五分内減陽厯交前度餘七度二三九九二四九九以定法八十七而一得八分三十二秒一七為月食分秒推定用分置月食分三十分以減月食分餘二十一分六七八三以月食分乗之得一百八十分四三九一一以平方開之得一十三分四三一三以四千九百二十乘之得六萬六千百八一九九六以定限行度而一得五刻九十八分一十九秒為定用分推初虧分置食甚定分減定用分餘一十四刻五一四一為初虧分得寅初二刻推食甚分置食甚定分二十刻四九五三即食甚分得寅正三刻推復圎分置食甚定分加定用分得二十六刻四七七二為復圎分得卯正一刻推食甚入盈日晨日出分視食甚入盈一百五日下日晨分二千一百四五一八日出分二千三百九五一八推更法置晨分倍之得四千二百九三六以五千歸之得八刻五八七二為更法推㸃法置更法以五百歸之得一刻七一六一四四為㸃法推初虧㸃法置初虧分加晨分得三十五刻九六五九以更法減之得五更以㸃法減之不及減為一㸃推食甚更㸃置食甚分加日晨分得四十一刻九四七一以更法減之得五更以㸃法減之得五㸃推復圎更㸃置復圎分加日晨分減在晝推食甚月離黄道宿度置食甚入盈厯行定度加半周天一百八十二度六二八七五又加冬至黄道度共得二百九十三度二十九分二秒八十六微以翼宿二百七十七度九七七五減之餘一十五度三一二七八六入軫宿推得萬厯三十三年乙巳嵗二月十六日庚申夜望月食八分三十二秒初虧寅初二刻五更一㸃正東食甚寅正三刻五更五㸃復圎卯正一刻在晝正西食甚月離黄道軫宿一十五度三十一分二十七秒右乃依授時法推若余改定諸術則月食之分數與此異前厯法已備而又詳此日月二食者叙為模範使學者循此便推筭也厯法雖改而步術則同依余改革諸術一是正之則定矣古今律厯考卷五十
