body:
  text: 古今律厯考卷二明邢雲路撰經二尚書考乃命羲和欽若昊天厯象日月星辰敬授人時古帝堯克明峻德化致雍和其道曷繇堯以治厯明時政之首務也乃命重黎之後羲氏和氏敬順昊天厯數以紀之象器以察之使日月星辰各得其所以此天時敬授於人焉昔少昊氏衰九黎亂德神人雜擾顓頊命南正重司天以屬神北正黎司地以屬人其後三苗復九黎之惡堯乃復育重黎之後羲承重和承黎掌天地之事日中星鳥之類即天事平秩東作之類即地事而四時分職在焉日謂日之甲乙躔有盈縮月謂月之大小離有遲疾二十八宿衆星麗天不動者為經金木水火土五星有遲速順逆者為緯辰以日月所㑹分周天之度為十二次也日行遲月行疾每月朔月行及日而與之㑹其必在周天二十八宿分之辰集㑹有時故謂之辰正月㑹亥辰為娵訾二月戌為降婁三月酉為大梁四月申為實沈五月未為鶉首六月午為鶉火七月巳為鶉尾八月辰為夀星九月卯為大火十月寅為析木十一月丑為星紀十二月子為𤣥枵是也然非一定古正月㑹亥在初旬至今雨水後方㑹亥久之則以漸後移矣厯象既明節候悉均乃成一嵗之厯敬授於人俾隨天時早晚以為人事耕穫之候焉其總為一嵗之厯其分有四時之異分命羲仲宅嵎夷曰暘谷寅賓出日平秩東作日中星鳥以殷仲春厥民析鳥獸孳尾分者分其職也帝堯於羲和之內分命其羲氏而字仲者令居嵎夷之地掌春天之政曰暘谷者日出於谷也據日所出謂之暘谷指其地名即稱嵎夷蓋官在國都而測候之所則在嵎夷東表之地嵎夷即今山東登州府寅敬平均秩序作起也於仲春方出之日如敬賔客而𨗳引之識其景也聖人重農事春在東方故曰東作蓋以節氣之早晚均序之以勸民興作也日中者春分之日漏以候之晝夜皆五十刻也舉晝以見夜故曰日中星鳥南方朱雀七宿井鬼栁星張翼軫是也未曰鶉首午曰鶉火巳曰鶉尾春分之昏鳥星畢見於南方也在天成象星作鳥形曲禮言軍陳象天之形前朱雀後𤣥武左青龍右白虎雀即鳥也武謂龜甲捍禦故變文𤣥武焉是天星有龍虎鳥龜之形東方成龍形西方成虎形皆南首而北尾南方成鳥形北方成龜形皆西首而東尾天道左旋日體右行故星見之方與四時相逆尚書考靈曜云主春者張昏中可以種榖主夏者火昏中可以種黍主秋者虛昏中可以種麥主冬者昴昏中可以收斂故曰敬授人時然古厯若斯久之星漸右移一鳥宿四時皆可昏中種榖如今萬厯年仲春昏中井初則將出鶉首而入實沈四時皆非一定在隨時耳殷中也仲春陽之中也析分也先時冬寒民聚於隩至是則分析而作事矣乳化曰孳交接曰尾鳥獸皆以尾交即物之生育其氣之和可驗也申命羲叔宅南交平秩南訛敬致日永星火以正仲夏厥民因鳥獸希革申重也帝堯又於羲氏之內重命其羲氏而字叔者令居南交之地掌夏天之政蔡注云南交南方交趾之地又陳氏曰南交下當有曰明都三字考交趾在雲南之南堯時未必屬中國曰明都三字亦無考證闕之可也訛化也謂夏月時物長盛所當變化之事也夏在南方故曰南訛敬致周禮所謂冬夏致日蓋以夏至之日中伺日而識其景如所謂日至之景尺有五寸謂之地中者也永長也日永晝六十刻也星火東方蒼龍七宿角亢氐房心尾箕是也心宿三星中曰大火左傳言火中火見詩稱七月流火皆指心星言火乃蒼龍之中星舉中則七星見可知此夏至昏之中星也夏至陽之極午為正陽之位以此正仲夏之氣也因析而又析也希革鳥獸毛羽希少而革易也分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虛以殷仲秋厥民夷鳥獸毛毨堯又分命其和氏而字仲者令居西方掌秋天之政徐廣云西天水郡之西縣也今屬陜西鞏昌府昧𡨕也日入於谷而天下冥故曰昧谷餞送納入也蓋以秋分之暮夕方入之日而識其景也西成秋月物成之時所當成就之事也秋在西方故曰西成宵夜也秋分之日晝夜亦皆五十刻舉夜以見日故曰宵中星虛北方𤣥武七宿斗牛女虛危室壁是也虛在𤣥武之中亦曰殷者秋分隂之中也夷平也暑退而人氣平也毨理也毛更生整理也申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬厥民隩鳥獸氄毛堯又申命其和氏而字叔者令居朔方掌冬天之政唐孔氏曰朔盡也李巡曰萬物盡於北方蘇而復生故北稱朔猶月之晦而有朔也幽暗都聚也北方幽暗故曰幽都今順天府昌平州有幽都山在察也易改也北方終其隂而始其陽既成今歲之終又慮來歲之始故謂之朔易始而終終而始此天地生生不窮之道人於此時除舊更新作來歲改易之事猶由朔日而改易也日短晝四十刻也星昴西方白虎七宿奎婁胃昴畢觜參是也昴在白虎之中亦曰正者冬至隂之極子為正隂之位也隩室之內也氣寒而民入於內也氄毛鳥獸皆生耎毳細毛以自溫也夫四時之日與星曰出日納日曰敬致曰日中日永宵中日短有地里之不同焉曰星鳥星火星虛星昴有古今之不同焉曰出日者即􅍓家之測日出分也曰納日者即􅍓家之測日入分也曰敬致者即夏至之測午景也不言冬者測冬至亦以晝影也日有分至而晝夜之刻係焉然各有地理之不同如堯都平陽北極出地三十五度有餘夏至晷長一尺五寸春秋分日出卯日入酉夏至日出寅日入戌冬至日出辰日入申其餘二十氣之日出入可類推焉春秋分晝夜各五十刻夏至晝六十刻冬至晝四十刻其餘二十氣之晝長短可類推焉此平陽也天地之中也嶽臺稍南去平陽不逺乃正值天地之中北極出地三十五度夏至以八尺表測晷景長一尺四寸八分日出寅正三刻日入戌初初刻晝六十刻冬至日出辰初初刻日入申正三刻晝四十刻與平陽同若南海在極南北極出地一十五度夏至日景在表南長一尺一寸六分夏至日出卯初二刻日入酉正二刻晝五十四刻冬至日出卯正二刻日入酉初二刻晝四十六刻北海在極北北極出地六十五度夏至晷景長六尺七寸八分夏至日出丑正初刻日入亥初三刻晝八十二刻冬至日出巳初三刻日入未正初刻晝一十八刻此極南極北也其餘九州四海俱各不同即冬夏至皆可以推春秋分至於元京即今之順天府也元世祖至元十七年太史郭守敬造授時厯測北極出地四十度太强冬至去極一百一十五度二十一分七十三秒夏至去極六十七度四十一分一十三秒冬至晝夏至夜三千八百一十五分九十二秒夏至晝冬至夜六千一百八十四分八秒夏至日出分一千九百七分九十六秒冬至日出分三千九十二分四秒用四丈表測夏至晷景長一丈一尺七寸有竒在八尺表則二尺三寸四分日出寅正二刻日入戌初二刻晝六十二刻冬至晷景長七丈九尺八寸有竒在八尺表則一丈五尺九寸六分日出辰初二刻日入申正二刻晝三十八刻元史云地中以南夏至去日出入之所為逺其長有不及六十刻者冬至去日出入之所為近其短有不止四十刻者地中以北夏至去日出入之所為近其長有不止六十刻者冬至去日出入之所為逺其短有不及四十刻者今京師夏至晝六十二夜三十八冬至晝三十八夜六十二蓋地有南北極有高下所以日之出入早晚不同今授時􅍓晝夜刻一以京師為正其各所實測北極高下又各不同此郭守敬之言何其示人以明悉也乃今之大統厯推夏至日出分二千六十八分三十秒推冬至日出分二千九百三十一分七十秒夏至日出寅正四刻日入戌初初刻晝五十九刻夜四十一刻冬至日出辰初初刻日入申正四刻晝四十一刻夜五十九刻夫今之京即元之京也授時夏至晝六十二而大統曰五十九授時冬至晝三十八而大統曰四十一各差至三刻矣想大統所測之景必非順天府之景也蓋偏北北極髙而夏晝長冬晝短偏南北極低而夏晝短冬晝長大統之刻或係國初洪武時南京所測之日出分未可知也昔郭太史作厯明示人以晝六十二刻夜三十八刻係京師晷刻與各處不同今大統不明言所測之景係何年係何人係何方海上所測係去極若干度亦不明言自國初至今厯年監官所測之日出分與授時合否而但抄寫立成自北京以頒之天下徒令人悶悶耳其堯典之中星有古今之不同者何也堯仲春星昏中而今則井昏中堯仲夏火昏中而今則角昏中堯仲秋虛昏中而今則斗昏中堯仲冬昴昏中而今則室昏中蓋天度有餘歲度不足天度外運而微闊日度內轉而稍狹天漸移而西歲漸移而東堯時日在女在子今在箕在寅日自子而移寅是天漸西而日漸東此所以不同也惟其所差至微前人未覺自堯時日躔女虛之交以後漸移至漢時猶未覺漢武帝時洛下閎作太初􅍓謂八百年後當差一度當有聖人定之至今猶神洛下閎能前知真聖人也殊不知帝堯時不過八十餘年差一度至今三千餘年減至六十餘年差一度八百年差一度之說何不情之甚耶逮漢末劉洪始覺冬至後天至晉虞喜乃以天為天歲為歲立差法以追其變約以五十年日退一度然失之過宋何承天倍增其數約以百年退一度又失之不及隋劉焯取二家中數以七十五年退一度唐僧一行推大衍􅍓以八十三年差一度各亦相近至郭守敬推冬至在箕十度斯為密近然守敬謂六十六年差一度亦非定法六十六年惟守敬之時為然而守敬之後則又在六十六年下矣試即今歲萬厯二十七年冬己亥歲上距至元十八年辛巳又上距堯元年甲辰推之堯元年甲辰至至元辛巳積三千六百三十八年以授時法推得女宿八度餘為堯元年天正日躔赤道度蓋女八度近虛止二度今時以距星論虛堯時女末未必非虛郭守敬所云堯時日在女虛之交謂此也若以大統厯法推堯元年冬至赤道日躔危一度其女八度則加於商之沃甲相去八百餘萬而在天違十三度有奇矣帝堯冬至日在女虛之交則昏中昴可推冬至昏中昴則春分昏中星夏至昏中火秋分昏中虛皆可推也至元辛巳至今萬厯二十七年己亥積三百一十九年授時推中積一十一萬六千一百四十七日一刻九十六分得箕宿五度一十三分四十六秒為天正赤道度箕宿四度七十二分八十二秒為天正黃道度是冬至日躔在箕也復以法推四仲昏之中星則冬至昏之中星在室宿一十三度春分昏之中星在井宿一十一度夏至昏之中星在角宿六度秋分昏之中星在斗宿四度若以大統推己亥歲前冬至赤道度得箕宿五度二十三分黃道度得四度八十一分則有不同矣授時推己亥歲前冬至餘四十二萬七九得丙午日丑初三刻大統則四十二萬一七五丙午日寅正初刻授時推春分一十三萬三九得己亥春二月丁丑日巳初一刻大統則一十三萬四八丁丑日午初二刻授時推夏至四十四萬七得戊申日申正三刻大統則四十四萬七九六戊申日戊初初刻授時推秋分一十六萬一得庚辰日子正一刻大統則一十六萬一六庚辰日丑正二刻此四仲皆差也以推雨水授時丙午亥正三大統丁未丑初初推小暑授時癸亥亥正初大統甲子子正一則皆當子半之交差一日矣總之二十四氣皆差也嗟嗟授時原多密合何大統竟棄之不用耶又法推洪武元年冬至日躔箕八度六十八分仍是六十六年差一度乃元統上言七十年差一度非也李德芳上言每百年上推長一日下推消一日其言消長固是而言各一日則非也至嘉靖初光祿少卿華湘上言堯冬至日在虛七度今冬至日在箕三度計差五十度然以法推堯冬至日在女八度嘉靖初退至箕六度至今萬厯年方退至箕五度自堯至嘉靖止退四十五度而湘云已退五十度今仍在箕五度而湘云嘉靖初已退至箕三度信如湘言自虛七度至箕三度以為退五十度也然以鈐步天虛七度至箕三度乃五十八度而亦非五十度豈不誤哉帝曰咨汝羲暨和朞三百有六旬有六日以閏月定四時成歲允釐百工庶績咸熙咨嗟暨與也匝四時曰朞王肅云朞四時是也十日為旬允信釐治工官庶衆績功咸皆熙廣也一朞凡三百有六旬有六日然氣朔不齊則置閏焉以定四時之氣節成一歲之厯象以此告時授事則能信治百官而衆功皆廣此帝堯命羲和而歎其善也夫古時真厯遭戰國及秦而亡漢存六厯雖詳於五紀之論皆秦漢之際假託所為不得正要但以梗概言之六厯與周髀及考靈曜乾鑿度諸緯皆然漢傳疏之蔡傳宗之固非堯厯亦非宋厯也其云周天三百六十五度四分度之一日行一度則一朞三百六十五日四分日之一經言三百六十有六日者王肅云四分日之一入於六日之內舉全數言故云三百六十六日也至解所以置閏之意亦據大率言之何則羲和厯法不傳故也天體至圓繞地左旋乃自子而丑而寅即自北而東轉而南為左旋日月右旋乃日月行不及天若右旋然蓋經星皆麗天即天體而日月不麗天各有行度今以蔡傳之所宗於漢傳疏者一一剖析之傳云天體三百六十五度四分度之一天行一日一周而過一度日行少遲一日亦一周而在天為不及一度積三百六十五日九百四十分日之二百三十五而與天㑹是一歲日行之數月行尤遲一日不及天十三度十九分度之七積二十九日九百四十分日之四百九十九而與日㑹十二㑹得全日三百四十八餘分之積又五千九百八十八如日法九百四十而一得六不盡三百四十八通計得日三百五十四九百四十分日之三百四十八是一歲月行之數夫曰四分度之一者一度以四分之每分二十五分共三百六十五度二十五分也曰九百四十分日之二百三十五者九百四十分乃周髀等術之日法置二百三十五以日法九百四十而一得二千五百分即四分日之一為二十五刻一朞共三百六十五日二十五刻為歲周若以日法乘歲周得三十四萬三千三百三十五算為朞總亦曰朞實也曰十三度十九分度之七者置一度七之以十九而一得三十六分八四二一不盡共十三度三十六分八四二一不盡為月不及天之平行度也曰二十九日九百四十分日之四百九十九與日㑹十二㑹得全日三百四十八餘分五千九百八十八如日法九百四十而一得六不盡三百四十八通計三百五十四九百四十分日之三百四十八者置四百九十九以九百四十而一得五千三百八五一不盡乃五十三刻有奇共前二十九日五十三刻八五一不盡為一㑹之月即今月䇿一歲十二月凡十二㑹以十二㑹乘二十九日得全日三百四十八日餘分四百九十九以十二㑹乘之得五千九百八十八以日法九百四十而一得六日不盡三百四十八通計得三百五十四日九百四十分日之三百四十八即置三百四十八以九百四十而一得三千七百二不盡乃三十七刻有竒每歲三百五十四日三十七刻二不盡也傳云歲有十二月月有三十日三百六十者一歲之常數也故日與天㑹而多五日九百四十分日之二百三十五為氣盈月與日㑹而少五日九百四十分日之五百九十二為朔虛合氣盈朔虛而閏生焉故一歲閏率則十日九百四十分日之八百二十七三歲一閏則三十二日九百四十分日之六百單一五歲再閏則五十四日九百四十分日之三百七十五十有九歲七閏則氣朔分齊是為一章夫曰多五日下九百四十分日之二百三十五者即四分日之一乃二十五刻為氣盈也曰少五日下九百四十分日之五百九十二者置五百九十二以九百四十而一得六千二百九十七分不盡即六十二刻九十七分不盡為朔虛也合而言之多五日少五日共十日多二百三十五少五百九十二共為日之八百二十七置八百二十七以九百四十而一得八千七百九十七分八六不盡即八十七刻九七八六不盡共十日八十七刻九七八六不盡是為一歲之閏率即今之通閏也曰三歲一閏三十二日九百四十分日之六百單一者置六百單一以九百四十而一得六百三十九分有奇加入三十二日內共三十二日六百三十九分有奇若以一歲閏率三因之亦得也曰五歲再閏五十四日九百四十分日之三百七十五者置三百七十五以九百四十而一得三百九十八分有竒加入五十四日內共五十四日三百九十八分有奇若以一歲閏率五因之亦得也曰十有九歲七閏氣朔分齊為一章者則二百六日七十一分有奇以十九年因一年之閏率所得也至是所積之二百六日七十一分有奇以月策二十九日五十三刻八五一除之皆盡則氣朔分齊是為一章矣月䇿者置歲實三百六十五日二十五刻以一章十九年乘之得六千九百三十九日七十五刻以十九年之二百二十八箇月併閏之七箇月共二百三十五數歸除之得一月之策二十九日五十三刻八五一不盡即前一㑹之月策也歲法者置月策二十九日五十三刻八五一不盡以十二月乘之得三百五十四日三七二一二即於日下之三七二一二以九百四十乘之共得三百五十四日三百四十八分也月法者置月策以日法乘之得二萬七千七百五十九分也歲餘法者置朞實以十二月而一得二萬八千六百一十一分二十五秒用減月法餘八百五十二分二十五秒以十二月乘之得一萬二百二十七分為歲餘法也通閏者置歲餘法以日法而一亦得即前閏率也一歲餘一萬二百二十七分二歲餘二萬四百五十四分三歲餘三萬六百八十一分四歲餘四萬九百八分五歲餘五萬一千一百三十五分六歲餘六萬一千三百六十二分七歲餘七萬一千五百八十九分八歲餘八萬一千八百一十六分九歲餘九萬二千四十三分十歲餘十萬二千二百七十分十一歲餘十一萬二千四百九十七分十二歲餘十二萬二千七百二十四分十三歲餘十三萬二千九百五十一分十四歲餘十四萬三千一百七十八分十五歲餘十五萬三千四百五分十六歲餘十六萬三千六百三十二分十七歲餘十七萬三千八百五十九分十八歲餘十八萬四千八十六分十九歲餘十九萬四千三百一十三分三歲一閏以三因歲餘法一萬二百二十七分得三萬六百八十一分以月法二萬七千七百五十九分減之復餘二千九百二十二分五歲再閏以五因歲餘法得五萬一千一百三十五分以減兩因月法五萬五千五百一十八分少四千三百八十三分八歲三閏以八因歲餘法得八萬一千八百一十六分以減三因月法八萬三千二百七十七分少一千四百六十一分十一歲四閏以十一乘歲餘法得十一萬二千四百九十七分以四因月法十一萬一千三十六分減之餘一千四百六十一分十四歲五閏以十四乘歲餘法得十四萬三千一百七十八分以五因月法十三萬八千七百九十五分減之餘四千三百八十三分十七歲六閏以十七乘歲餘法得十七萬三千八百五十九分以六因月法十六萬六千五百五十四分減之餘七千三百五分十九歲七閏以十九乘歲餘法得十九萬四千三百一十三分以七因月法十九萬四千三百一十三分減之減盡是七閏之外無餘分也十九年餘一百九十日一萬五千七百一十三分者是歲餘一十日日之八百二十七分以十九年乘之得一萬五千七百一十三分以加入十九年一百九十日內以日法歸除前一萬五千二位得十六日加入一百九十日內共得二百六日餘六百七十三分也若置滿法十九萬四千三百一十三分以日法歸之得二百六日七百一十五分九五七以七閏月歸之得月策亦無餘矣然必以十九歲而無餘分者十九年七閏為一章也積八十一章計一千五百三十九年內有五百六十七閏則盈虛之餘盡而復始矣十九年為一章二十七章為一㑹凡五百一十三年三㑹為一統乃八十一章凡一千五百三十九年三統為一元凡四千六百一十七年此古厯之大較也然古厯但云四分度之一四分日之一殊無天周歲周之差又無上下消長之法非的數也厯代以來至授時而始密授時厯天周三百六十五度二十五分七十五秒歲周三百六十五日二十四刻二十五分而日與天㑹月一日不及天一十三度三十六分八十七秒五十微積二十九日五十三刻五分九十三秒而與日㑹十二㑹通計得日三百五十四日三十六刻七十一分一十六秒是一歲月行之數日與天㑹而多五日二十四刻二十五分為氣盈月與日㑹而少五日六十三刻二十八分八十四秒為朔虛合氣盈朔虛共得十日八十七刻五十三分八十四秒為一歲閏率三歲一閏則三十二日六十二刻六十一分五十二秒五歲再閏則五十四日三十七刻六十九分二十秒十有九歲七閏則二百六日六十三刻二十二分九十六秒至今􅍓家遵用之蓋不用積年日法以實測得之也今去授時三百餘年矣其朞實之數自應推測改正而朔實交轉亦如之奈何猶然用勝國為元耶况消長法竟置之不用以推往古一無所合豈理也哉正月上日受終于文祖上日朔日也正月朔故云上日言一歲日之上也受終于文祖謂舜受堯終帝位之事于堯文德始祖之廟也堯舜皆以建寅為正月觀日中星鳥以殷仲春為卯月則正月建寅可知夏后氏因之至商乃建丑周乃建子孔子曰行夏之時夏時固遵唐虞者也在璿璣玉衡以齊七政在察也璿美玉也璣機也運轉者為璣持平者為衡以璿飾璣衡為橫簫以望天象亦玉為之漢世以來謂之渾天儀者是也七政日月五星也舜初攝位首察璣衡以齊七政蓋日月五星在天有常度其災祥與政事相應舜仰察天文觀七政之遲速順逆各由其道與否以審政事之得失何如即欽若之意也蔡雍天文志云言天體者有三一曰周髀二曰宣夜三曰渾天宣夜絶無師說周髀術數具在考驗天象多所違失惟渾天者近得其情今史所用候臺銅儀即其法也宣夜者惟漢郗萌記先師所傳云天本無質蒼蒼然也日月衆星自然浮生空虛之中其行其止皆順氣焉晉虞喜因宣夜之說於是有安天之論虞昺亦祖宣夜之說有穹天之論吳姚信又有昕天之論虞喜曰宣明也夜幽也幽明之數其術兼之故曰宣夜安天論謂天髙無窮地深不測天常安於上地居靜於下方則俱方圓則俱圓葛洪譏之曰茍辰宿不麗於天為無用便可言無何必復云有之而不動乎穹天論曰天形如笠而冒地之表浮而不沒者氣充其中也日繞辰極沒西還東不入地中也昕天論曰天若裹地如卵地何所依若無四維天何以立天經地行於水中日月星辰將不得其性是以有兩地之說下地上地之根也冬至天低近南故晝短夏至天起近北故晝長此皆不通之論也賀道養又謂宣夜為夏殷之法亦無所據周髀者即蓋天之說也髀股也股者表也周人志之故曰周髀其言天似覆盆中高而四邊下天左行日月旁轉右行隨天左轉如蟻行磨上磨左旋蟻右旋日近而見之為晝日遠而不見為夜又云天形如倚蓋極在天之中而今在人北故見以為倚蓋漢王仲任據蓋夭之說以駁渾儀謂天轉地下今掘地一丈輒有水天何得從中行乎是尤淺之乎論天者又傳周髀本於庖犧黃帝為蓋天者皆無憑也惟渾天為得之春秋文曜鈎云唐堯即位羲和立渾儀則渾儀之設其來遠矣舜之璣衡即渾儀也厯代相傳史官禁密學者不覩故宣蓋沸騰後乃遵用之王蕃渾天說曰天形似鳥卵天包地外猶卵裹黃如彈丸故曰渾天言其形體渾渾然也其術以為天半覆地上半在地下天居地上一百入十二度半强地下亦然北極出地三十六度南極入地亦三十六度而嵩高正當天之中極南五十五度當嵩髙之上又其南十二度為夏至之日道又其南二十四度為春秋分之日道又其南二十四度為冬至之日道南下去地三十一度而已是夏至日北去極六十七度春秋分去極九十一度冬至去極一百一十五度此其大率也其南北極持其兩端天與七政斜而回轉此必古有其法遭秦而滅漢唐以來其法漸密故前漢則有洛下閎渾天儀東漢則有張衡在吳則有王蕃在晋則有陸績在宋元嘉則有錢樂唐貞觀則有李淳風在開元則有梁令瓉皆作渾天儀而其中之最善者則張衡李淳風也張衡之儀以八尺圓體具天地之象有內規外規南極北極黃道赤道而轉之以漏水告之以靈臺又作靈憲以說其狀為可考也淳風之儀表裏三重一曰六合儀二曰三辰儀三曰四遊儀而其推驗之法本於黃道為可考也漢自張衡之外而洛下閎之儀亦有取焉漢太初洛下閎等造圓儀考厯度揚子雲論渾儀曰洛下閎營之鮮于妄人度之耿夀昌象之是也唐自李淳風之外而梁令瓉之儀亦有取焉唐志云梁令瓉以木為游儀僧一行是之乃共令瓉更鑄為銅儀注水激輪立人擊鐘鼓令其自轉機械皆藏匱中是也宋太平興國中張思訓之渾儀則有地軸地輪地足之異橫輪側輪斜輪之别此又踵一行之遺象也大中祥符間韓顯符之渾儀則有游規直規之分龍柱水臬之號此又本淳風之遺法也宋自靖康之亂儀象盡歸於金元初襲用金舊歲久漸疏世祖時郭守敬以司天儀本宋皇祐中汴京所造於大都測天規環不協比量南北極差四度有竒於是别創簡儀仰儀及方案窺几圭表景符諸儀各臻其妙謂以管窺天宿度餘分未得其的乃用二線推測於餘分纎微皆有可考蓋古人所未及又遣使四方測景凡二十七所東極高麗西至滇池南踰朱崖北至鐵勒以考驗之酌取中數蓋五年而厯成以察七政厯代以來其數不同郭守敬所定其日月行度已詳於堯咨羲和簡下木曰歲星周率三百九十八萬八千八百分􅍓率四千三百三十一萬二千九百六十四分八十六秒五十微火曰熒惑周率七百七十九萬九千二百九十分􅍓率六百八十六萬九千五百八十分四十三秒土曰鎮星周率三百七十八萬九百一十六分􅍓率一億七百四十七萬八千八百四十五分六十六秒二十五微金曰太白周率五百八十三萬九千二十六分􅍓率三百六十五萬二千五百七十五分水曰辰星周率一百一十五萬八千七百六十分􅍓率三百六十五萬二千五百七十五分五星各以應加中積段日而合伏遲疾留退各得其位此郭太史之術也其簡儀等儀與步七政術至今欽天監遵用之夫宣夜之謬勿論已蓋天不合以南方之度漸狹知渾非蓋也然天下地里南北不同即守敬測大都較汴京極差四度可知晷度冬夏亦不同即古有謂日景於地若千里差一寸者然各不同須測乃定王蕃謂嵩當天中然非天中乃中國地中從測影就晝夜五十刻得之也又考書傳大全圗載水星春見奎婁夏見東井等語又曰木星四仲年行三宿四孟四季行二宿又云火星常以十月入太微夫五星何常之有古今不同何宿不麗何必水春奎婁夏東井火豈十月常入太微况井宿三十餘度觜宿不及一度木安得分仲行三宿孟季二宿之異以此載之經典徒令人惑耳大都五星之行皆視日度以為之準日度正斯五緯正厯代以來測步五星各有不同皆從日度推之也自元至元辛巳距今三百餘年歲差不明日度未改則五緯之步安所適從必也察璣衡測圭晷先正日度之失而後以距日距星課五緯之差庶乎其不失矣固待其人而後行也古今律厯考卷二
