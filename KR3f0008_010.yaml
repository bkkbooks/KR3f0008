body:
  text: 古今律厯考卷十明邢雲路撰厯代二厯代考史記律書史云六律為萬事根本而於兵械尤所重卒歸於漢文之無議軍天下和樂言律本也又言律厯通五行八正之氣不周風居西北東東壁又東營室至危十月也律中應鐘其於十二子為亥廣莫風居北方東至虚至須女十一月律中黄鐘其於十二子為子十母為壬癸東至牽牛至建星在斗十二月律中大吕其於十二子為丑條風居東北南至箕為正月泰蔟為寅南至尾至心至房明庶風居東方二月夾鐘為卯為甲乙南至氐至亢至角三月姑洗辰清明風居東南維西至軫至翼四月仲吕已西至七星西至張星在張西史誤至注咮也栁鳥咮西近鬼五月蕤賔景風居南午丙丁西至弧狼在井涼風居西南維六月林鐘未北至伐參觜在參上七月夷則申北至濁濁謂之畢至留留即昴八月南呂酉閶闔風居西方庚辛北至胃至婁至奎九月無射戌各有名義焉皆古法也數則黄鐘既云八十一為宮又云八寸七分為宮既又云九寸為黄鐘之宮何自相悖也不知黄鐘之九寸乃九分之寸也九九八十一之九寸為是而八寸七分之説為非黄鐘且然它可知矣其損益相生法數正變之實詳見别簡史記厯書按史記厯書云在古厯作於孟春鷄三號鳴三號鳴寅時也謂黄帝調厯以前有上元太初厯等皆以寅為正及顓頊夏后氏亦然惟黄帝及殷周魯厯並以子為正秦用亥正漢興張蒼等雖明習厯論著不成今改夏正其更以元封七年為太初元年年名焉逢甲攝提格寅月名畢聚日得甲子十一月夜半朔旦冬至謂以夜半為旦正北十二無大餘無小餘無大餘無小餘焉逢攝提格太初元年十二大餘五十四小餘三百四十八大餘五小餘八何也太史公謂月名畢聚畢甲聚子甲子月也日得甲子十一月甲子日夜半甲子時冬至子日為冬至故云正北子位北也謂每歲行周天全度外餘四分度之一以十二辰分之則子年在子丑年在卯寅年在午卯年在酉也十二者歲有十二月若有閏則云十三也無大餘無小餘者甲子朔旦冬至滿甲子除盡朔旦以前無竒日分故無朔之大小餘也又云無大餘無小餘者謂冬至與朔同日時亦無竒日分故無氣之大小餘也曰焉逢攝提格太初元年大餘五十四者甲寅至乙卯十二月每月二十九日共三百四十八日日下餘分每年盈六日共合三百五十四日故云大餘五十四小餘三百四十八者每月二十九日下餘分四百九十九以歲十二乗之以日法九百四十而一盈六日餘三百四十八故每歲加小餘三百四十八為朔之餘也曰大餘五小餘八者以三十二歲之積日一萬一千六百八十八以日法三十二而一得三百六十五日八滿甲子去之餘五故曰大餘五餘八故曰小餘八為氣之餘也後倣此如端蒙單閼為太初二年乙卯歲大餘四十八小餘六百九十六者每歲大餘五十四倍之為一百八滿甲子去之餘四十八每歲小餘三百四十八倍之為六百九十六為朔之餘也大餘十小餘十六者每歲大餘五倍之為十每歲小餘八倍之為十六為氣之餘也如游兆執徐為太初三年丙辰歲大餘十二小餘六百三者謂丙辰前乙卯歲月十三有閏大餘於四十八内應加二十三共為七十一小餘每年三百四十八因有閏加四百九十九為八百四十七以加於六百九十六内共為一千五百四十三滿法九百四十收之盈一日加於大餘七十一内為七十二日滿甲子去之餘十二日仍餘六百三為小餘故曰大餘十二小餘六百三為朔之餘也大餘十五小餘二十四者大餘十加五為十五小餘十六加八為二十四為氣之餘也以歩氣甲寅至丁巳凡四年小餘每年二十五刻四年積百刻成一日故太初四年彊梧大荒落丁巳歲無小餘甲寅至丙子凡二十三年置歲餘五日二十五刻以積年二十三乗之得一百二十日七十五刻滿甲子去之無大餘仍餘七十五刻以日法三十二因之得二十四為小餘故昭帝始元五年距太初元年積二十三年游兆困敦丙子歲無大餘小餘二十四以斯歩至元帝建始四年祝犂大荒落之己巳歲莫不皆然此史記歩厯之大較也以授時推太初元年丁丑歲十一月壬子定朔分二十九日七十二刻得癸巳日酉時合朔冬至分五十七日六十四刻得十一月二十九日辛酉申時冬至史云甲寅年甲子月甲子日甲子時合朔冬至法推丁丑年壬子月癸巳日辛酉時合朔丁丑年壬子月辛酉日丙申時冬至固非至朔同日亦非其年月日時氣既非子則非正北史云氣朔俱無大小餘法推是月朔大餘二十九小餘七十二二十九日氣大餘五十七小餘六十四史云四年無大餘二十三年無小餘者以斗分之四分所累皆非也或解之曰史遷所謂以元封七年為太初元年者謂七年十一月朔旦冬至無餘分如上古甲寅年甲子月朔旦冬至為起厯之元非謂七年即甲寅也其以太初天漢太始征和以至六十年後建始各年號分配年名之下乃後人以此厯譜附入太史公厯述内非太史公自注也不然太史出於武帝時安能預知六十年後年號而先書於厯述年名之下哉此必後人増益之無疑也斯言誠是矣然漢太初元年十一月朔非子時氣非朔日非至朔同日無餘分以此為得上元則何以解焉班固志太初元年歲在丙子天正後丁丑今以史漢厯年附註於後史記漢書焉逢攝提格太初元年甲寅丁丑端蒙單閼二年乙卯戊寅游兆執徐三年丙辰己卯彊梧大荒落四年丁巳庚辰徒維敦牂天漢元年戊午辛巳祝犂協洽二年己未壬午商横涒灘三年庚申癸未昭陽作噩四年辛酉甲申横艾淹茂太始元年壬戌乙酉尚章大淵獻二年癸亥丙戌焉逢困敦三年甲子丁亥端蒙赤奮若四年乙丑戊子游兆攝提格征和元年丙寅己丑彊梧單閼三年丁卯庚寅徒維執徐三年戊辰辛卯祝犂大荒落四年己巳壬辰商横敦牂後元元年庚午癸巳昭陽協洽二年辛未甲午横艾涒灘始元元年壬申乙未尚章作噩二年癸酉丙申焉逢淹茂三年甲戌丁酉端蒙大淵獻四年乙亥戊戌游兆困敦五年丙子己亥彊梧赤奮若六年丁丑庚子徒維攝提格元鳯元年戊寅辛丑祝犂單閼二年己卯壬寅商横執徐三年庚辰癸卯昭陽大荒落四年辛巳甲辰横艾敦牂五年壬午乙巳尚章協洽六年癸未丙午焉逢涒灘元平元年甲申丁未端蒙作噩本始元年乙酉戊申游兆閹茂二年丙戌己酉彊梧大淵獻三年丁亥庚戌徒維困敦四年戊子辛亥祝犂赤奮若地節元年己丑壬子商横攝提格二年庚寅癸丑昭陽單閼三年辛卯甲寅横艾執徐四年壬辰乙卯尚章大荒落元康元年癸巳丙辰焉逢敦牂二年甲午丁巳端蒙協洽三年乙未戊午游兆涒灘四年丙申己未彊梧作噩神雀元年丁酉庚申徒維淹茂二年戊戌辛酉祝犂大淵獻三年己亥壬戌商横困敦四年庚子癸亥昭陽赤奮若五鳯元年辛丑甲子横艾攝提格二年壬寅乙丑尚章單閼三年癸卯丙寅焉逢執徐四年甲辰丁卯端蒙大荒落甘露元年乙巳戊辰游兆敦牂二年丙午己巳彊梧協洽三年丁未庚午徒維涒灘四年戊申辛未祝犂作噩黄龍元年己酉壬申商横淹茂初元元年庚戌癸酉昭陽大淵獻二年辛亥甲戌横艾困敦三年壬子乙亥尚章赤奮若四平癸丑丙子焉逢攝提格五年甲寅丁丑端蒙單閼永光元年乙卯戊寅游兆執徐二年丙辰己卯彊梧大荒落三年丁巳庚辰徒維敦牂四年戊午辛巳祝犂協洽五年己未壬午商横涒灘建昭元年庚申癸未昭陽作噩二年辛酉甲申横艾閹茂三年壬戌乙酉尚章大淵獻四年癸亥丙戌焉逢困敦五年甲子丁亥端蒙赤奮若竟寧元年乙丑戊子游兆攝提格建始元年丙寅己丑彊梧單閼二年丁卯庚寅徒維執徐三年戊辰辛卯祝犂大荒落四年己巳壬辰史記天官書云杓攜龍角衡殷南斗魁枕參首用昏建者杓夜半建者衡平旦建者魁斗為帝車運于中央臨制四鄉分隂陽建四時均五行移節度定諸紀皆繫於斗大角者其両旁各有三星鼎足句之曰攝提攝提者直斗杓所指以建時節故曰攝提格註云龍角東方宿為天三門攜連殷中也杓北斗之第七星衡第五星魁第一星言昏建用杓指寅夜半建用衡指寅平旦建用魁指寅也帝車乃大帝乗車無所不紀句曲提携也夫曰斗杓攜龍角直攝提以建時節而寅月之昏杓指寅方若以為定焉者以故日官定為斗分斗厯歴代因之多失其真不知昏杓指寅漢世則然嗣後天星漸移十二辰昏之杓皆可指非一定也又云織女天女孫也察日月之行以揆歲星順逆註謂晉灼云太歲在四仲則歲行三宿太歲在四孟四季則歲行二宿二八十六三四十二而行二十八宿十二歲而周天考周天宿井多至三十三度觜少不及一度歲星之歲行三度二度豈能盡合以故史記歩五緯之率竒零悉差史記封禪書云黄帝得寶鼎神策是歲己酉朔旦冬至得天之紀終而復始於是黄帝迎日推策後率二十歲復朔旦冬至凡二十推三百八十年黄帝僊登于天今上戊辰年得寶鼎其冬辛巳朔旦冬至與黄帝時等是日昧爽天子乃郊拜太乙壇其賛饗曰天始以寶鼎神策授皇帝朔而又朔終而復始皇帝敬拜見焉而衣上黄公卿言皇帝郊見是夜有美光及晝黄氣上燭天太史公祠官寛舒等曰神靈之休福祐兆祥宜因此地光域立大畤壇三歲天子一郊見其秋伐南越告太乙畫幡日月北斗登龍以象天一三星為大一鋒命曰靈旗為兵禱則太史奉以指所伐國次年南越平審如是則氣朔分齊莫神斯日兵家之勝筭協帝之靈筴也然以法歩元鼎五年己巳歲十一月定朔分一十五日八十刻得己卯日戌時合朔冬至分一十五日五十五刻得己卯日未時冬至氣朔同日乃己卯日其辛巳則月三日非冬至亦非朔也漢厯止用一斗分歩平朔而盈縮遲疾俱無所以晦朔常差二日此之類也漢厯云先藉半日名陽厯不藉名隂厯陽厯先朔月生隂厯朔後月生今以初三為朔是朔日月真可生矣彼昏不知則實併至與朔而同歩之三日也吁嗟歩厯之舛亡論已獨柰何漢武以此事天感黄氣之祥協平蠻之吉然則太乙之神非至朔同日亦可降祥而南旗之指即用月三日亦能效靈乎則不可得而解矣古今律厯考卷十
