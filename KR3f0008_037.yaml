body:
  text: 古今律厯考卷三十七明邢雲路撰厯法二厯法步月離授時轉終分二十七萬五千五百四十六分轉終二十七日五千五百四十六分轉中十三日七千七百七十三分初限八十四中限一百六十八周限三百三十六月平行十三度三十六分八十七秒半轉差一日九千七百五十九分九十三秒弦策七日三千八百二十六分四十八秒少上弦九十一度三十一分四十三秒太望一百八十二度六十二分八十七秒半下弦二百七十三度九十四分三十一秒少轉應一十三萬一千九百四分推天正經朔入轉置中積加轉應減閏餘滿轉終分去之不盡以日周約之為日不滿為分即天正經朔入轉日及分上考者中積內加所求閏餘減轉應滿轉終去之不盡以減轉終餘同上求弦望及次朔入轉置天正經朔入轉日及分以弦策纍加之滿轉終去之即弦望及次朔入轉日及分秒如徑求次朔以轉差加之求經朔弦望入遲疾厯各視入轉日及分秒在轉中已下為疾厯已上減去轉中為遲厯遲疾轉定及積度求遲疾差置遲疾厯日及分以十二限二十分乘之在初限已下為初限已上覆減中限餘為末限置立差三百二十五以初末限乘之加平差二萬八千一百又以初末限乘之用減定差一千一百一十一萬餘再以初末限乘之滿億為度不滿退除為分秒即遲疾差又術置遲疾厯日及分以遲疾厯日率減之餘以其下損益分乘之如八百二十而一益加損減其下遲疾度亦為所求遲疾差求朔弦望定日以經朔弦望盈縮差與遲疾差同名相從異名相消盈遲縮疾為同名盈疾縮遲為異名以八百二十乘之以所入遲疾限下行度除之即為加減差盈遲為加縮疾為減以加減經朔弦望日及分即定朔弦望日及分若定弦望分在日出分已下者退一日其日命甲子算外各得定朔弦望日辰定朔干名與後朔干同者其月大不同者其月小內無中氣者為閏月推定朔弦望加時日月宿度置經朔弦望入盈縮厯日及分以加減差加減之為定朔弦望入厯在盈便為中積在縮加半歲周為中積命日為度以盈縮差盈加縮減之為加時定積度以冬至加時日躔黃道宿度加而命之各得定朔弦望加時日度凡合朔加時日月同度便為定朔加時月度其弦望各以弦望度加定積為定弦望月行定積度依上加而命之各得定弦望加時黃道月度推定朔弦望加時赤道月度各置定朔弦望加時黃道月行定積度滿象限去之以其黃道積度減之餘以赤道率乘之如黃道率而一用加其下赤道積度及所去象限各為赤道加時定積度以冬至加時赤道日度加而命之各為定朔弦望加時赤道月度及分秒象限已下及半周去之為至後滿象限及三象去之為分後推朔後平交入轉遲疾厯置交終日及分內減經朔入交日及分為朔後平交日以加經朔入轉為朔後平交入轉在轉中已下為疾厯已上去之為遲厯求正交日辰置經朔加朔後平交日以遲疾厯依前求到遲疾差遲加疾減之為正交日及分其日命甲子算外即正交日辰推正交加時黃道月度置朔後平交日以月平行度乘之為距後度以加經朔中積為冬至距正交定積度以冬至日躔黃道宿度加而命之為正交加時月離黃道宿度及分秒求正交在二至後初末限置冬至距正交積度及分在半歲周已下為冬至後已上去之為夏至後其二至後在象限已下為初限已上減去半歲周為末限求定差距差定限度置初末限度以十四度六十六分乘之如象限而一為定差反減十四度六十六分餘為距差以二十四乘定差如十四度六十六分而一所得交在冬至後名減夏至後名加皆加減九十八度為定限度及分秒求四正赤道宿度置冬至加時赤道度命為冬至正度以象限纍加之各得春分夏至秋分正積度各命赤道宿次去之為四正赤道宿度及分秒求月離赤道正交宿度以距差加減春秋二正赤道宿度為月離赤道正交宿度及分秒冬至後初限加末限減視春正夏至後初限減末限加視秋正求正交後赤道宿積度入初末限各置春秋二正赤道所當宿全度及分以月離赤道正交宿度及分減之餘為正交後積度以赤道宿次纍加之滿象限去之為半交後又去之為中交後再去之為半交後視各交積度在半象已下為初限已上用減象限餘為末限求月離赤道正交後半交白道舊名九道出入赤道內外度及定差置各交定差度及分以二十五乘之如六十一而一所得視月離黃道正交在冬至後宿度為減夏至後宿度為加皆加減二十三度九十分為月離赤道後半交白道出入赤道內外度及分以周天六之一六十度八十七分六十二秒半除之為定差月離赤道正交後為外中交後為內求月離出入赤道內外白道去極度置每日月離赤道交後初末限用減象限餘為白道積用其積度減之餘以其差率乘之所得百約之以加其下積差為每日積差用減周天六之一餘以定差乘之為每日月離赤道內外度內減外加象限為每日月離白道去極度及分秒求每交月離白道積度及宿次置定限度與初末限相減相乘退位為分為定差正交中交後為加半交後為減以差加減正交後赤道積度為月離白道定積度以前宿白道定積度減之各得月離白道宿次及分推定朔弦望加時月離白道宿度各以月離赤道正交宿度距所求定朔弦望加時月離赤道宿度為正交後積度滿象限去之為半交後又去之為中交後再去之為半交後視交後積度在半象已下為初限已上用減象限為末限以初末限與定限度相減相乘退位為分分滿百為度為定差正交中交後為加半交後為減以差加減月離赤道正交後積度為定積度以正交宿度加之以其所當月離白道宿次去之各得定朔弦望加時月離白道宿度及分秒求定朔弦望加時及夜半晨昏入轉置經朔弦望入轉日及分以定朔弦望加減差加減之為定朔弦望加時入轉以定朔弦望日下分減之為夜半入轉以晨分加之為晨轉昏分加之為昏轉求夜半月度置定朔弦望日下分以其入轉日轉定度乘之萬約為加時轉度以減加時定積度餘為夜半定積度依前加而命之各得夜半月離宿度及分秒求晨昏月度置其日晨昏分以夜半入轉日轉定度乘之萬約為晨昏轉度各加夜半定積度為晨昏定積度加命如前各得晨昏月離宿度及分秒求每日晨昏月離白道宿次纍計相距日數轉定度為轉積度與定朔弦望晨昏宿次前後相距度相減餘以相距日數除之為日差距度多為加距度少為減以加減每日轉定度為行定度以纍加定朔弦望晨昏月度加命如前即每日晨昏月離白道宿次朔後用昏望後用晨朔望晨昏俱用步中星大都北極出地四十度太強冬至去極一百一十五度二十一分七十三秒夏至去極六十七度四十一分一十三秒冬至晝夏至夜三千八百一十五分九十二秒夏至晝冬至夜六千一百八十四分八秒昏明二百五十分黃道出入赤道內外去極度及半晝夜分求每日黃道出入赤道內外去極度置所求日晨前夜半黃道積度滿半歲周去之在象限已下為初限已上復減半歲周餘為入末限滿積度去之餘以其段內外差乘之百約之所得用減內外度為出入赤道內外度內減外加象限即所求去極度及分秒求每日半晝夜及日出入晨昏分置所求入初末限滿積度去之餘以晝夜差乘之百約之所得加減其段半晝夜分為所求日半晝夜分前多後少為減前少後多為加以半夜分便為日出分用減日周餘為日入分以昏明分減日出分餘為晨分加日入分為昏分求晝夜刻及日出入辰刻置半夜分倍之百約為夜刻以減百刻餘為晝刻以日出入分依發斂求之即得所求辰刻求更點率置晨分倍之五約為更率又五約更率為點率求更點所在辰刻置所求更點數以更點率乘之加其日昏分依發斂求之即得所求辰刻求距中度及更差度置半日周以其日晨分減之餘為距中分以三百六十六度二十五分七十五秒乘之如日周而一所得為距中度用減一百八十三度一十二分八十七秒半倍之五除為更差度及分求昏明五更中星置距中度以其日午中赤道日度加而命之即昏中星所臨宿次命為初更中星以更差度纍加之滿赤道宿次去之為逐更及曉中星宿度及分秒其九服所在晝夜刻分及中星諸率並凖隨處北極出地度數推之已上諸率與晷漏所推自相符契求九服所在漏刻各於所在以儀測驗或下水漏以定其處冬至或夏至夜刻與五十刻相減餘為至差刻置所求日黃道去赤道內外度及分以至差刻乘之進一位如二百三十九而一所得內減外加五十刻即所求夜刻以減百刻餘為晝刻其日出入辰刻及更點等率依術求之步交會交終分二十七萬二千一百二十二分二十四秒交終二十七日二千一百二十二分二十四秒交中十三日六千六十一分一十二秒交差二日三千一百八十三分六十九秒交望十四日七千六百五十二分九十六秒半交應二十六萬一百八十七分八十六秒交終三百六十三度七十九分三十四秒交中一百八十一度八十九分六十七秒正交三百五十七度六十四分中交一百八十八度五分日食陽厯限六度定法六十隂厯限八度定法八十月食限十三度五分定法八十七推天正經朔入交置中積加交應減閏餘滿交終分去之不盡以日周約之為日不滿為分秒即天正經朔入交泛日及分秒上考者中積內加所求閏餘減交應滿交終去之不盡以減交終餘如上求次朔望入交置天正經朔入交泛日及分秒以交望纍加之滿交終日去之即為次朔望入交泛日及分秒求定朔望及每日夜半入交各置入交泛日及分秒減去經朔望小餘即為定朔望夜半入交若定日有增損者亦如之否則因經為定大月加二日小月加一日餘皆加七千八百七十七分七十六秒即次朔夜半入交纍加一日滿交終日去之即每日夜半入交泛日及分秒求定朔望加時入交置經朔望入交泛日及分秒以定朔望加減差加減之即定朔望加時入交日及分秒求交常交定度置經朔望入交泛日及分秒以月平行度乘之為交常度以盈縮差盈加縮減之為交定度求日月食甚定分日食視定朔分在半日周已下去減半周為中前已上減去半周為中後與半周相減相乘退二位如九十六而一為時差中前以減中後以加皆加減定朔分為食甚定分以中前後分各加時差為距午定分月食視定望分在日周四分之一已下為卯前已上覆減半周為卯後在四分之三已下減去半周為酉前已上覆減日周為酉後以卯酉前後分自乘退二位如四百七十八而一為時差子前以減子後以加皆加減定望分為食甚定分以發斂求之各得辰刻求日月食甚入盈縮厯及日行定度置經朔望入盈縮厯日及分以食甚日及定分加之以經朔望日及分減之即為食甚入盈縮厯依日躔術求盈縮差盈加縮減之為食甚入盈縮厯定度求南北差視日食甚入盈縮厯定度在象限已下為初限已上用減半歲周為末限以初末限度自相乘如一千八百七十而一為度不滿退除為分秒用減四度四十六分餘為南北泛差以距午定分乘之以半晝分除之所得以減泛差為定差泛差不及減者反減之為定差應加者減之應減者加之在盈初縮末者正交減中交加在縮初盈末正交加中交減求東西差視日食甚入盈縮厯定度與半歲周相減相乘如一千八百七十而一為度不滿退除為分秒為東西泛差以距午定分乘之以日周四分之一除之為定差若在泛差已上者倍泛差減之餘為定差依其加減在盈厯者正交中前減中後加中交中前加中後減在縮厯者正交中前加中後減中交中前減中後加求日食正交中交限度置正交中交度以南北東西差加減之為正交中交限度及分秒求日食入隂陽厯去交前後度視交定度在中交限已下以減中交限為陽厯交前度已上減去中交限為隂厯交後度在正交限已下以減正交限為隂厯交前度已上減去正交限為陽厯交後度求月食入隂陽厯去交前後度視交定度在交中度已下為陽厯已上減去交中為隂厯視入隂陽厯在後凖十五度半已下為交後度前凖一百六十六度三十九分六十八秒已上覆減交中餘為交前度及分求日食分秒視去交前後度各減隂陽厯食限不及減者不食餘如定法而一各為日食之分秒求月食分秒視去交前後度不用南北東西差者用減食限不及減者不食餘如定法而一為月食之分秒求日食定用及三限辰刻置日食分秒與二十分相減相乘平方開之所得以五千七百四十乘之如入定限行度而一為定用分以減食甚定分為初虧加食甚定分為復圓依發斂求之為日食三限辰刻求月食定用及三限五限辰刻置月食分秒與三十分相減相乘平方開之所得以四千九百二十乘之如入定限行度而一為定用分以減食甚定分為初虧加食甚定分為復圓依發斂求之即月食三限辰刻月食既者以既內分與一十分相減相乘平方開之所得以四千九百二十乘之如入定限行度而一為既內分用減定用分為既外分以定用分減食甚定分為初虧加既外為食既又加既內為食甚再加既內為生光復加既外為復圓依發斂求之即月食五限辰刻求月食入更點置食甚所入日晨分倍之五約為更法又五約更法為點法乃置初末諸分昏分已上減去昏分晨分已下加晨分以更法除之為更數不滿以點法收之為點數其更點數命初更初點算外各得所入更點求日食所起食在陽厯初起西南甚於正南復於東南食在隂厯初起西北甚於正北復於東北食八分已上初起正西復於正東此據午地而論之求月食所起食在陽厯初起東北甚於正北復於西北食在隂厯初起東南甚於正南復於西南食八分已上初起正東復於正西此亦據午地而論之求日月出入帶食所見分數視其日月出入分在初虧已上食甚已下者為帶食各以食甚分與日出入分相減餘為帶食差以乘所食之分滿定用分而一如月食既者以既內分減帶食差餘進一位如既外分而一所得以減既分即月帶食出入所見之分不及減者為𢃄食既出入以減所食分即日月出入帶食所見之分其食甚在晝晨為漸進昏為已退其食甚在夜晨為已退昏為漸進求日月食甚宿次置日月食甚入盈縮厯定度在盈便為定積在縮加半歲周為定積望即更加半周天度以天正冬至加時黃道日度加而命之各得日月食甚宿次及分秒古今律厯考卷三十七
