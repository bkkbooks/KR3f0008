body:
  text: 古今律厯考卷六十四明邢雲路撰厯議五厯議白道交周赤道當二極南北之中黃道出入赤道內外而白道則又出入黃道內外者也古人隨方立名分為八行於日道獨謂之黃而月謂之青朱白黑各二月之行也以四序離為八節立春春分行東陸青道二出黃道東立夏夏至行南陸朱道二出黃道南不曰赤而曰朱者别天中赤道之名也立秋秋分行西陸白道二出黃道西立冬冬至行北陸黑道二出黃道北并黃道為九道究而言之實一道也故元人一之名為白道出入黃道內外兩相交值而為一周其為數也日道距赤道之逺為度二十有四月道出入日道不距六度其距赤道也逺不過三十度近不下十八度由天首正交出黃道外為陽厯由天尾中交入黃道內為隂厯出入各十三日有竒隂陽一周分為四象月當黃道為正交出黃道外六度為半交復當黃道為中交入黃道內六度為半交是為四象象别七日各行九十一度四象周厯是為一交之終以日計之得二十七日二十一刻二十二分二十四秒計羅計每一交退天一度百六十分度之五十九凡二百四十九交退天一周終而復始正交在春正半交出黃道外六度在赤道內十八度正交在秋正半交出黃道外六度在赤道外三十度中交在春正半交入黃道內六度在赤道內三十度中交在秋正半交入黃道內六度在赤道外十八度月道與赤道正交距春秋二正黃赤道正交宿度東西不及十四度三分度之二夏至在隂厯內冬至在陽厯外月道與赤道所差者多夏至在陽厯外冬至在隂厯內月道與赤道所差者少蓋白道二交有斜有直隂陽二厯有內有外直者密而狹斜者踈而闊其差亦從而異元以前厯家求月道者皆自黃道推之元人改從赤道立象置法求之差數多者不過三度五十分少者不下一度三十分是為月道與赤道多少之差其平行也以白道一周退天一度四六四一之數以減周天餘三百六十三度七九三四以白道周即交終而一得十三度三六八七五為月平行度即十三度十九分度之七六二五為十九年中閏生之數也古法十三度十九分度之七所得十三度三六八四二一有竒為踈後易為十三度百六十分度之五十九即十三度十九分度之七六二五乃得十三度三六八七五至今司天氏遵而用之視古似密然用之嵗久微覺有差會須另測以定交食交食者日月同度相合對度相衝而其交道適相值焉則食矣古云同經同緯則食同經不同緯則不食是也然厯法疏密驗在交食其加時有早晚食分有淺深推演加時必本於躔離朓朒考求食分必本於距交逺近茍入氣盈縮入轉遲疾未得其正則合朔或失之先或失之後虧食時刻不得其真蓋日月俱東行而日遲月疾以月追日其交值之道有出陽入隂交會之期有中前中後此食分多寡之所以難定也必也合朔密合使加時無早晚之差氣刻適中使食分無強弱之失乃為得之古今論交食惟漢時最疏前漢志五行謂虙羲畫八卦大禹陳洪範箕子敘九疇初一曰五行文王演周易孔子述春秋漢董仲舒治公羊春秋始推隂陽為儒者宗劉向治榖梁春秋數其禍福傳以洪範子歆治左氏傳以傅春秋著於篇詳諸子所論五行咎徴某行某事某徴某應不啻説之詳矣使果一一如響也豈不上接群聖之統然而非也諸子論災罰立見為日月五行之顯應而尤著於交食􅍦奈何食非其算算失其食諸子俱一一以事應當之豈不謬戾孔子作春秋不言事應殆有深意諸子專言事應而事應皆非如桓公十七年十月朔日食榖梁曰言朔不言日食二日也董仲舒以為言朔不言日惡魯桓且有夫人之禍將不終日也厥後魯夫人淫失於齊殺桓公以法布算是年十月不食乃十一月庚午朔未時日食夫既非十月亦非二日又非言朔不言日與魯夫人淫殺桓公之應何關莊公十八年三月日食榖梁曰夜食也公羊曰食晦也劉向以為夜食者隂因日明之衰而奪其光象周天子不明齊桓將奪其威其後九合諸侯此其效也董仲舒劉歆皆以為宿在東壁魯分後公子慶父叔牙果通於夫人以弒公以法布算是年三月不入食限夜亦不食乃五月壬子朔申時日食夫既非三月亦非夜食又非宿在東壁魯分與齊桓公奪周天子威并公子慶父通夫人弒公之應何預諸如此類皆望風捉影無端説夢也占日若此則其占五行五事可知然則董仲舒劉向春秋五行之傳可盡信乎至今司天家遵為筮蔡其亦不思也矣積年日法厯代以來造厯者必推求往古七政同會於子位之始謂之演紀上元立元正然後步積年定日法而厯數生焉第其世代綿逺馴積其數至踰億萬後人厭其布算繁多互相推考斷截其數而增損日法以為得改憲之術此歷代積年日法所以不同也然行之未逺浸復差失至授時則以至元辛巳為厯元所用之數一本諸天秒而分分而刻刻而日皆以百為率不用積年日法一以測驗實數為準為得自然至今從之是矣但積年日法固不必用而法久數更則宜修改如氣閏轉交與五緯諸應俱有舛錯而司天氏株守故常一無所改以致隂陽愆伏璣衡抵牾則吾不知其可也五星二五之精各有行度日由黃道月由白道五緯則不由黃道亦不由白道而出入黃道內外各自有其道月不因日為遲疾五緯則因日而有遲疾順逆也近日而疾逺日而遲伏後而疾而遲而留皆順行留而退而又留皆逆行留而復順行而遲而疾而伏而為一周合後見於東方曰晨段合後見於西方曰夕段北齊張子信悟五緯有盈縮之變而加減常數以求其逐日之躔始為親密也若七曜之髙下則星入月中月體自若而星居月上為星食月入之而星隱不見為月食星星入日中則為黑子然則五緯於月髙下無定惟下於日而已如測五星髙下之數則各以勾股測天之術求而得四餘七政之外又有四隱曜紫氣月孛羅㬋計都星家以之占命謂之四餘共七政為十一曜是也相傳出於西域天竺梵蓋西域康居城都賴聿斯經即波羅門術也羅㬋計都皆梵語自李淳風有推月孛法至唐貞元初李弼乾乃婆羅門俊士始推十一星行厯鮑該曹士薦皆業之士薦又作羅計二隱曜立成厯起元和元年五代王朴作欽天厯以羅計為蝕神首尾行之民間小厯又考氣生於閏孛生於月羅生於天首計生於天尾氣孛皆有度數無光象與羅計同四餘其行皆均平無遲疾但氣孛以順行入羅計以逆行入耳紫氣者舊説即景星亦曰德星史記注狀如半月生於晦朔助月為明王者德至於天則見李淳風曰景星生於晦朔或出於西北天門之上或入月二三日或出月二十七八日狀如星大而中空如魚星而不明或青赤白三氣聚如星如半月狀出而不行必於四時旺相日見星家謂之天乙之貴步紫氣起於閏法二十八年十閏而氣行一周天月孛者彗星之屬光芒偏掃為彗光芒四出為孛孛星數見於春秋或見大辰或入北斗見則必凶星家謂之淫氣孛之所在其行最遲月行遲處與之同躔淳風步月孛六十二日行七度六十二年而七周天羅㬋計都者即交道所退之餘處也蓋日月交蝕處如兩環相交首一處曰天首中一處曰天尾首為羅尾為計星家號為蝕神步羅計從交周每退一度四十六分有竒求之十八年一周天今躔度載在大統厯中古今律厯考卷六十四
