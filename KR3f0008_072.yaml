  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0008_WYG_072-1a, image: WYG0787/WYG0787-0751a.png}
body:
  text: 古今律厯考卷七十二明邢雲路撰厯原六厯原日月食限以半交差一日一十五刻九一八四五加減交終及交中併二交為六限隂陽各三限加為後限減為前限陽後限月食日不食隂前限月食日不食以交差之半半之得五十七刻九五九二二五加減交終及交中為日食界限逢此界限日月俱食天首五限前限二十六日五刻三三九五已上日月俱食食已下日月俱不二十六日六十三刻二六三一七五日月俱食中限二十七日二十一刻二二二四日月俱食後限五十七刻九五九二二五已下日月俱食食已上月食日不一日一十五刻九一八四五已下月食日不食已上日月俱不食天尾五限前限一十二日四十四刻六九二七五已上月食日不食已下日月俱不食一十三日二刻六五一九七五已上日月俱食食已下月食日不中限一十三日六十刻六一一二日月俱食後限一十四日一十五刻七四二五已下日月俱食食已上月食日不一十四日七十六刻五二九六五已下月食日不食已上日月俱不食交終度三百六十三度七十九分三十四秒者以月平行度乘交終也正交三百五十七度六十四分者以月平行度乘正交限二十六日七五一九也中交一百八十八度五分者以月半行度乘中交限十四日六六四也南北泛差四度四十六分者周天象限自之以定法一千八百七十度而一也月食限者以隂八度陽六度併之得十四度半之得七度為腹寛之數為法除周天象限得十三度五分弱所推就整為月食限度日食定法九十六者一時八刻也二十五刻者一百刻四分之一也不及為卯前過為卯後七十五刻者四分之三也不及為酉前過為酉後月食定法八十七者以十五分歸月食限十三度五分也後準十五度五十分者以月平行度乘天首後限一日一十五刻九一八四五所得已下為交後度已上月不食前準一百六十六度三十九分六十八秒者以月平行度乗天尾前限一十二日四十四刻六九二七五所得已上月食已下月不食日體大月體小月小於日三分之一日髙月下故日食十分月食則入暗虛行一度又半故月食十五分計日去天月去日以幾千里計而地去月則以幾萬里計日大月以千百里計而地大月則以幾萬里計此何以知之以勾股測天及日出入分知之乃南齊書曰日月當子午正隔於地猶為暗氣所食以天體大而地形小故也此言一倡人遂議日月與地三者形體大小相似地體止當天一度半而天周當地徑二百四十餘倍日月相衝為地所蔽有景在天其大如日日光不照名曰暗虛月望行黄道則入暗虛值暗虛有表裏深淺故月食有南北多少其説非也盖古人雖有暗虛之説乃月行日度自隠其光與月掩日同非指為地景也且如春秋二分食於卯酉之正日月相望其平如衡地猶在下烏能蔽之况以法布筭地大於月數十倍乎宋濂不知作楚客對亦言月食為地景所隔皆南齊之説􅪥之也日食九服視之分數各不同者在地南北東西之故在天交前後隂陽厯之故也日食在隂厯月北日南自人視之北方見食多南方見食少在陽厯月南日北自人視之南方見食多北方見食少日食在交前西方見食少東方見食多在交後東方見食少西方見食多日食當交之中無論隂陽厯東西俱見食既隂厯北方見食既陽厯南方見食既月道交日道出入於六度而信不爽五星去而復留留而又退而伏而期無失何也太陽為萬象之宗居君父之位掌發歛之權星月借其光辰宿宣其炁故諸數壹稟於太陽而星月之往來皆太陽一氣之牽繫也故日至一正而月之閏交轉五星之率皆由是出焉此日為月與五星之原也同異乘除測七政術術七政各以測到晷至圭面丈尺寸分或前或後相連日以二日相減餘為法以最髙前丈尺寸分與最髙後丈尺寸分近同者相減餘為實如法而一得加減差最髙前丈尺寸分多為加差少為減差以加減最髙前距後日命為刻半之加半日刻月五星減最髙前夜半後漏刻加最髙後夜半後漏刻半之七政皆以最髙前日筭外各得七政最髙日餘以發歛収之得時刻如測七政最低亦然惟加減差反是應加作減應減作加或問日月固有景可測矣而五星無景且測星之法無傳奈何余曰有二術焉以簡儀距其四正而至午有度去極有度漏下有刻以法歩之其術一以圭表據午位人目以小表望大表以上射五星下識圭刻以漏記之以法歩之其術二或又曰金水當天暗於離照日沉西見何以施測余曰是無難可一言蔽之以緯距經正於午位十字之準兩望相牽則凡星皆可代金水也乃自金水所留之舍以次日日歩之易知簡能於測金水乎何有或又曰測四餘如之何余曰羅計稟於交食測月交即測羅計前術有之矣若炁生於十閏月生於月遲古有此説然二皆隱曜孛星間見於史乘則宜取古一孛見宿度日時刻距今一孛見宿度日時刻用距積年月日時刻以月孛周天之數而一或可得也至於紫炁則古來所見者少亦須候其前後兩見依求月孛術步之亦得然所見既少俟見而測知何時姑立法可也大都炁孛二隱曜星命家言之於歴數無關所關厯數者七政也七政之數原本於測驗而七政之差則由於測驗之法失其傳不見今司天氏之所為測騐者乎今司天亦測日晷每節氣闔監官向圭表測日景畢各畫一押既而上疏入告曰測矣試問其晷長若干作何布筭皆曰不知也既不知則不如不測測日景且不知又安望其測月與五星夫人病無法耳今余法既立且纖悉備至有法可循即無難可致若疇人於此而猶泄泄然諉之曰我不能也則吾不知之矣於戲余累累千萬言於厯數不啻詳矣而有難者未易言也葢天動物也消息至微安必其永久而不變如今之日躔六十六年差一度及百年消長各一之説其間畸零多少乃在冥濛間疇其覺之可執為定乎以推之七政皆然况天道間有失行雖則旋復其常而既有失行是即天運之難定也故僧一行云乾度盈虛與時消息告譴於經數之表變常於潛遯之中則聖人且猶不質非籌厯之所能及矣曰然則如之何無已則郭太史所謂隨時推測是已世病無推測之法余法既立即不妨隨時觀象依法推測合則從變則改亡論消長暗移失行旋復之故壹是皆以澤火之革旋正之即用之億萬斯年與天地無彊可也此又原之原也古今律厯考卷七十二
