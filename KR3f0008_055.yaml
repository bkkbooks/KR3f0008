body:
  text: 古今律厯考卷五十五明邢雲路撰厯法二十厯法水星合伏前合伏一百九日三一一二後合伏六日五六四八中星一十一度二九六縮初厯二十四日五八六七五加分三分五一六九七四積度度八九八五一七七六減差一度一九一五三定積五日五四五六四七定日四十七日六二五二四七加時定星八度二三三一四一入月數空月數空入本月入月已來日二十八日九四七九七八十一月經朔一十八日六七七二六九順減差一度三四七九七晨前夜半定星六度八八五二三四十一月辛亥日夜半水星度箕六度八八五二是日申初初刻水星合伏箕八度二十三分三十一秒夕疾中積二十四日三一四八中星四十五度五四六縮初厯五十三日六六六七五加分二分四三四五八積度一度七八四七八五八減差一度八三一九定積二十二日五一四四八一定日四日五九四八一加時定星四十度一三九六四三入月數四十五日九一六一二月數一入本年十二月入月已來日一十六日三八六二一九十二月經朔四十八日二七八六二順減差一度一一二五七晨前夜半定星三十九度一二八三八六十二月戊辰日夜半水星度牛五度六八三是日未正一刻水星夕疾牛六度七分九十六秒夕遲中積三十九日三一四八中星六十六度九二六縮初厯七十一日八二六七五加分一分四八八八積度二度一三八八七七減差二度一五四八一定積三十七日一六四三一九定日一十九日二四三九一九加時定星六十度四六九一五七入月數六十日五六六六五月數二入己亥年正月入月已來日一日五五四六四正月經朔一十七日七三八四五五順減差度二十七分九八二三晨前夜半定星六十度一八九三三四正月癸未日夜半水星度危初度一一八是日卯初三刻水星夕遲危初度三十八分一十六秒夕留中積五十一日三一四八中星七十七度四六縮初厯八十日四一六七五加分七十八秒七二五四積度二度二四一一二減差二度二四四四一定積四十九日七三九九定日三十一日一四九九九九加時定星七十度三七三九七入月數七十二日四七二七三月數二入正月入月已來日一十三日四一一五四四順減差度一十七分二六九晨前夜半定星七十度一三五三二八正月乙未日夜半水星度危一十度四七八是日寅初二刻水星夕留危十度二十一分九十八秒夕退伏中積五十三日三一四八定積五十一日七三九九定日三十三日一四九九九九入月數七十四日四七二七三月數二入正月入月已來日一十五日四一一五四四正月丁酉日寅初二刻水星夕退伏危十度二十一分九十八秒合退伏中積六十四日五二八中星六十九日二二八六縮初厯八十二日五二四七五加分六十五秒六九六積度二度二五六一三六五二減差二度二五九五五一定積六十二日二四三二四九定日四十四日三二二八四九加時定星六十二度四四九九四七入月數八十五日六四五五八月數二入正月入月已來日二十六日五八四三九四退加差度三十三分四一九晨前夜半定星六十二度七八三九六六正月戊申日夜半水星退危二度六九六四是日辰初三刻水星合退伏危二度三十六分二十四秒大統誤作己酉晨留中積七十五日六九八中星六十一日四一六六縮初厯八十四日六三二七五加分四十九秒七五四積度二度二六八二四九六減差二度二七一三五四定積七十三日四一九四四六定日五十五日四九九四六加時定星五十四度六二五三八入月數九十六日八二一七七七月數三入二月入月已來日八日二二九九九八二月經朔四十七日二六九四八退加差度五十一分六三一四晨前夜半定星五十五度一一八八五二二月己未日夜半水星退虛四度三八八是日午初四刻水星晨留虛三度五十二分二十五秒晨遲中積七十七日六九八定積七十五日四一九四四六定日五十七日四九九四六入月數九十八日八二一七七七月數三入二月入月已來日一十日二二九九九八二月辛酉日午初四刻水星晨遲虛三度五十二分二十五秒晨疾中積八十九日六九八中星七十一度五三六六縮厯九十三日二二二七五縮末厯八十九日四六加分一十秒一九四積度二度二八五三四六減差二度二八五四四五定積八十七日四五三五五定日九日四八四九五五加時定星六十四度六八二六五入月數一百一十日八七六八六月數三入二月入月已來日二十二日二一五九七順減差度五十五分六二四晨前夜半定星六十四度一二四二五二月癸酉日夜半水星度危四度三六五是日未初二刻水星晨疾危四度五十九分二十七秒晨伏中積一百四日六九八中星九十二度九一六六縮厯一百一十一日三八二七五縮末厯七十一日二四六加分一分四四八八八積度二度一三八八七七八四減差二度一四二三三四定積一百二日五四八四六六定日二十四日六二八六六加時定星八十六度四八八五九八入月數一百二十五日九五七九七月數四入三月入月已來日七日八二八四二五三月經朔一十六日七九九六四一順減差一度六九八四七晨前夜半定星八十五度四一八七五一三月戊子日夜半水星度危九度三八一二是日申初初刻水星晨伏危十度四十五分一十秒右五星依授時算有誤應改者見厯原古今律厯考卷五十五
