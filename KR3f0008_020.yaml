body:
  text: 古今律厯考卷二十明邢雲路撰歴代日食一歴代日食厯西漢漢史載漢髙帝三年丁酉嵗十月甲戌晦日食在斗二十度十一月癸夘晦日食在虛三度置所求距筭以授時嵗實乘之得五十四萬二千二十一日九十四刻七十六分為中積以氣應減中積滿旬周去之不盡以減旬周餘一十三日一十一刻二十四分為冬至置中積減閏應餘五十四日三千一日七十四刻二十六分滿朔實去之不盡以減朔實餘二日七十六刻一十三分二十二秒為閏餘即縮厯置冬至減閏餘餘一十日三十五刻一十日七十八秒為經朔置中積減轉應加閏餘滿轉終去之不盡以減轉終餘一十四日八十四刻八十一分七十八秒以轉中去之餘一日七刻八分七十八秒為遲厯以縮遲二厯推得加差一十一刻五十一分加入經朔得一十日四十六刻為定朔是甲戌日午初刻合朔置中積減交應加閏餘滿交終去之不盡以減交終餘一十四日四十刻為天正交泛分入食限置中積減周應滿周天去之不盡以減周天餘三百三十五度二八九九以虚六度筭外得斗二十二度為冬至赤道度查天正閏餘二日有竒減回二度有竒則朔日在斗二十度漢史合宿度既合以後不復推是十一月甲戌朔午時日食非十月甲戌晦食亦無十一月癸卯晦之比食也盖漢初厯久失次未置厯官不知是年冬至之前應閏八月而未置閏故以十月為十一月及過此見天星漸移方補一閏始悟十月乃十一月也其原紀十月甲戌晦遂改為十一月甲戌晦然又恐未的也乃併十月晦兩存之前月既繫以戌則次之應癸酉者不得不繫之卯併繫之虚吁亦大勞矣實十月晦即十一月朔食為是而前後月皆不入交不應食也後修史者見漢厯兩存其食遂目為比食不知六月一交萬無比食之理而日食即朔亦無晦食之説也綱目書法云自癸丑書日食至是四十五年然後復書秦政代立以來至於國亡乃皆未嘗日食豈秦之德有以勝妖歟日君象也秦閏位也其不足以當天審矣綱目書日食三百六十七而一歲再食者二十五其間連月而食者二而已是年漢文帝三年一歲三食者不與焉此言皆非也從古未有四十餘年不日食者秦日官失之故不書或秦暴厭天災而不書也一歲再食正六月一交之應食也連月之食厯官交載而兩存之非其實也至又疑以一歲三食之説耶何不併其一歲四食五食而疑之高帝九年癸卯歲六月乙未晦日食置所求距筭以歲實乗之得二千一百九十一日四六三四為中積分加氣應滿旬周去之餘四十四日五七五八為冬至置中積加閏應滿朔實去之餘八日九六八為天正閏餘置冬至減閏餘餘三十五日六一四九為天正經朔置中積加交應減閏餘滿交終去之餘二十二日六九三四為天正交泛置中積加轉應減閏餘滿轉終去之以減轉中餘九日五二一三為天正遲厯置天正經朔加八朔實滿紀法去之餘三十一日八五九七為七月經朔置天正交泛加八朔實滿交終去之餘一十四日二為七月交泛入食限置八朔實減閏餘以減半歲周餘四十四日六六為七月朔縮初厯置天正遲厯加八轉差滿轉中去之餘一十一日五五為七月朔疾厯以縮疾二厯法推得三十八刻七九為減差以減經朔餘三十一日四七一八為定朔筭得七月乙未朔午初刻合朔以後從此推得止具交朔二條是七月乙未朔午時日食非六月乙未晦惠帝七年癸丑歲正月辛丑朔日食十二月交得一十三日一五入食限十二月朔得七日三九辛未巳時合朔推得是年十一月閏餘分二十九日有竒是月二十九日冬至即閏十一月漢厯失一閏遂以十二月朔誤作次年正月朔然實是惠帝六年壬子歲十二月辛未朔日食也以法推十二月初一辛未合朔非辛丑前而閏十一月朔辛丑交泛十日有竒後而正月朔庚子交泛一十五日有竒皆不入食限漢厯誤推正月日食過此見天星漸移覺失一閏方補一閏既補矣若曰前所誤之正月乃十二月也十二月朔宜辛未既移一月則宜改辛未為辛丑是已誤而又誤矣夫以六年季冬之朔日為七年春正之元旦三朝享獻誤行典禮履端序愆已屬謬戾漢史載谷永占歲首正月朔日是為三朝尊者惡之綱目書法云日食三朝大變也書正月朔日食始此綱目書正月朔日食二十八有應者二十可畏哉是年食八月大䘮其他李淳風等所纂乾坤變異錄觀象玩占等書俱云是年正月日食八月帝崩之應至今司天家祖述之豈知是蝕之非正旦也則占者又何取焉惠帝七年癸丑歲漢史書五月丁卯先晦一日日食綱目書五月日食不言晦朔六月交二十七日六入食限六月朔三日六四丁卯申時是六月丁卯朔申時日食漢厯誤以六月朔作五月晦之先一日綱目見其先朔二日也遂不書日劉向以為五月微隂始起而犯至陽其占重至其八月宫車晏駕有吕氏詐置嗣君之害京房易傳曰凢日食不以晦朔名曰薄人君誅將不以理或賊臣將暴起日月雖不同宿隂氣盛薄日光也夫曰日食召變誠是而劉向以五月微隂為言則非盖既非五月則微隂何取耶凢日食必朔以法推之即食晦亦無則豈有先晦一日之理漢厯誤推至隔二日已屬差誤乃京房遂以私意命名為薄食而斷之以事應何太謬也又云日月不同宿為隂氣盛薄日光豈知六月朔申刻日月同宿而食本自不忒何嘗先二日而薄食也夫天道談何容易堯曰欽若昊天敬授人時仲康征羲和不少貸京房等闇於厯數而妄談禍福以惑人書之史册遵為蓍蔡若不校讐訂正幾何而不誤萬世也高后二年乙卯歲六月丙戌晦日食法推七月朔不入食限前後月朔亦不入食限不宜食也想當時誤推在册至日見其未食且疑之故漢史但書丙戌食而不記其在何宿度其誤可知矣高后七年庚申歲正月己丑晦日食二月交二十六日六八入食限二月朔二十五日五己丑午時是二月己丑朔午時日食非正月己丑晦文帝二年癸亥歲十一月癸卯晦日食十二月交二十六日一九入食限十二月朔三十九日五五癸卯未時是十二月癸卯朔未時日食非十一月癸卯晦文帝三年甲子歲十月丁酉晦日食十一月丁卯晦又食十一月交二十六日八入食限十一月朔三十三日四四丁酉巳時是十一月丁酉朔巳時日食非十月丁酉晦亦無十一月丁卯晦之比食也盖冬至前應閏而漢厯失一閏故以十月為十一月及過此見天星漸移方補一閏始悟十一月乃十月也其原紀十一月丁酉晦遂改為十月丁酉晦然又恐未的也乃併十一月晦兩存之十月既繫以丁酉則十一月之應丁酉者不得不繫之以卯此與高帝三年比食之誤同是年文帝下詔罪已求言稱十一月晦豈知是朔非晦也文帝後四年辛巳歲四月丙辰晦日食六月交一十二日八五入食限六月朔二十一日五乙酉午時是六月乙酉朔午時日食非四月丙辰晦盖六月前不應閏而漢書豫置一閏過此覺其差也減去一閏遂改五月為四月五既為四則併其丙戌而移之丙辰矣不知實丙戌前一日六月乙酉朔日食也文帝後七年甲申嵗正月辛未朔日食法推是年正月朔交五日四十刻不入食限前後月皆不入食限日不應食漢史書七年正月辛未朔日食而不書其宿度此必厯官誤推是食既而見其不食也遂删其宿度通鑑綱目不書是食亦因漢史删之故修史者不載景帝三年丁亥歲二月壬午晦日食三月交一十四日一八入食限三月朔一十八日二三壬午卯時是三月壬午朔卯時日食非二月壬午晦漢史書二月壬午晦盖誤以三月朔為二月晦也綱目書正月壬午晦日食則非矣歩正月晦二月朔無壬午亦不入食限景帝四年戊子嵗十月晦日食推戊子嵗前丁亥嵗十一月朔交泛五日五十一刻不入食限推戊子嵗後十一月朔交泛八日四十四刻亦不入食限俱不應食是年漢史無日食而綱目書四年冬十月晦日食書於春夏之後且云太初以前皆以冬十月建亥為歲首此年及中四年皆先書春夏後書冬錯簡也班史同考漢史不書食而綱目書食夫事一本之史史無而綱目有從何處來也若以為歲首建亥天正在戊子前丁亥歲耶而丁亥不入食限若以為先書春夏後書冬天正在戊子冬耶而戊子冬亦不入食限無一可者綱目誤矣景帝七年辛卯歲十一月庚寅晦日食十二月交一十四日二九入食限十二月朔二十六日三八庚寅巳時是年閏餘二十九日二刻有竒即閏十一月歩至十二月初一得庚寅日巳時日食非十一月庚寅晦也漢史十一月上少一閏字景帝中元年壬辰歲十二月甲寅晦日食法推是年十二月晦併正月朔俱無甲寅亦不入食限漢厯不書宿度是誤推暗削之故通鑑綱目亦不載是食景帝中二年癸巳歲九月甲戌晦日食法推是年九月晦併十月朔無甲戌推在夜食亦非應食之日故漢厯不書宿度誤推暗削綱目不知亦誤書景帝中三年甲午歲九月戊戌晦日食幾盡十月交一十四日四一入食限十月朔三十四日六三戊戌申時是十月戊戌朔申時日食非九月戊戌晦也漢厯不載宿度者筭皆不食而此書食在尾且云食幾盡是彼時真見其食矣今筭之則果食不爽可見不書宿度者厯官誤推在册至期見其不食遂删其宿度而猶存其名交戰於胷中無可柰何之故也景帝中四年乙未嵗十月晦日食見綱目史無法推景帝中四年乙未嵗天正前十月十一月皆不入食限天正後十月十一月皆不入食限是厯官誤推暗削之故綱目不知書是年日食舊綱目書五年冬十月日食新綱目書四年冬十月日食且云夏蝗當在日食下又云五年當書夏蝗上夫事一本之史史無而綱目有從何來耶且兩書異年自相紊亂且不標晦朔其無據可知矣景帝中六年丁酉歲七月辛亥晦日食八月交一十三日九二入食限八月朔四十七日三六辛亥辰時是八月辛亥朔辰時日食非七月辛亥晦景帝後元年戊戌歲七月乙巳先晦一日日食八月交一十四日五三入食限八月朔四十一日六三乙巳申時是八月朔乙巳申時日食非七月先晦一日武帝建元二年壬寅歲二月丙戌朔日食推壬寅正月二月三月朔皆無丙戌皆不入食限漢厯之誤推也漢唐秘史載建元二年十月朔日食十月交二十六日二三入食限十月朔一十七日七辛巳申時推是年十月初一辛巳申時合朔去交分入食限日應食是食漢史不載通鑑綱目亦不載查漢唐秘史載二年十月朔日食且史曰秘其所紀多出於史鑑之外者必内府秘藏之實錄也所載日食斷非無因必彼時仰見天象有食而秘紀之者漢厯誤筭二月候之不食其十月之應食厯官失筭若輩詆日月為亂行未可知遂存其偽而去其真矣不然何以布法筭與秘史穏合不爽耶大都半載一交十月食則前此宜四月交又何惑乎二月之不交而食也漢厯二月朔食之誤無疑矣建元三年癸卯歲九月丙子晦日食十月交二十六日八四入食限十月朔一十二日三四丙子辰時是十月朔丙子辰時日食非九月丙子晦建元五年乙巳歲正月己巳朔日食推是年正月朔不入食限漢史不書宿度暗削之故通鑑綱目亦不書是食元光元年丁未歲二月丙辰晦日食七月癸未先晦一日日食日中時食從東北過半晡時復推是年三月朔不入食限漢史不書宿度暗削之故通鑑綱目亦不書是食七月經朔二十日八刻九三減差五十三刻九三七月朔交二十六日九十五刻入食限七月定朔一十九日五十五刻癸未日未時推是年七月初一癸未日合朔日食非七月癸未先晦一日也盖是年閏三月漢厯失一閏故誤以七月朔為七月晦且云先晦一日益謬矣盖漢厯止慿張蒼等約以章蔀大槩歩厯一平朔且猶未定即有平朔而無加減多差至七十刻况無平朔乎且漢厯朔實過分每以朔加之次月一二日則無恠其晦食之多也即是食之經朔在甲申日丑時以縮疾之七度有竒減回五十餘刻便食於癸未日未時矣此不彰明較著者乎綱目見其先晦一日遂不書晦朔豈知七月朔日月同度而食時刻不爽何嘗先晦一日食也未時合朔則從日中時食過半晡時復良是其云從東北過則非盖月自西來從西而東過無從東過之理也即此七月朔食則前此連閏應二月朔交非二月盡之三月初也其二月晦食之誤益見元朔二年甲寅歲二月乙巳晦日食三月交二十六日五七入食限三月朔四十一日五三乙巳午時是三月乙巳朔午時日食非二月乙巳晦漢史書二月晦盖誤以三月朔為二月晦也綱目書三月晦則非矣元朔六年戊午歲十一月癸丑晦日食推是年十一月晦併十二月朔無癸丑亦不入食限漢史書食而不記其宿度亦誤推暗删之故所以綱目不書是食元狩元年己未歲五月乙巳晦日食六月交一十三日九九入食限六月朔四十一日四四乙巳巳時是六月乙巳朔巳時日食非五月晦京房易傳推以為是時日食從旁右法曰君失臣明年丞相公孫𢎞薨日食從旁左者亦君失臣不知凡日食俱從旁右無從旁左之理元鼎五年己巳歲冬十一月朔冬至親郊見法推是年冬至一十五日五五經朔四十六日六三次月經朔一十六日一六疾度四度三八推得是年閏十月初一日庚戌十一月初一日己卯未時冬至戌時合朔盖是年冬至之次日經縮一十六日一十六刻在庚辰丑時而以疾度之四度三十八分減囘則在己卯日戌時合朔而冬至適與朔㑹矣然前月無中氣宜閏十月也通鑑綱目書十一月朔冬至合元鼎五年己巳歲四月丁丑晦日食五月交二十七日三五入食限五月朔一十三日五七丁丑未時是五月丁丑朔未時日食非四月晦元封四年甲戌歲六月己酉朔日食法推是年六月朔無己酉亦不入食限漢史不書宿度誤推暗削故綱目亦不書是食太初元年丁丑歲冬十一月甲子朔旦冬至祀明堂冬至五十七日五三閏餘二十七日三六經朔三十日一六減差四十三刻七定朔二十九日七二癸巳日酉時合朔十二月經朔五十九日六九減差三十八刻八定朔五十九日三五癸亥日辰時合朔法推太初元年十一月甲午日寅時經朔以減差減之得癸巳日酉時合朔是十一月癸巳朔也以歩至二十九日辛酉午時冬至再推十二月癸亥日辰時合朔是十二月癸亥朔也次日則甲子矣漢太初鄧平唐都落下閎等未經測驗止慿章蔀大畧之術以求氣朔且是年閏餘二十七日三十六刻應閏二月天正之前不應閏而平等誤置一閏遂以十二月為十一月而曰十一月甲子朔冬至無餘分為厯元不知十一月癸巳朔非甲子也十一月二十九日辛酉冬至非朔旦也十二月癸亥朔非十一月朔甲子也十二月二日甲子非朔日也漢厯誤以前月二十九之冬至而加於後月之朔以後月二日之甲子而加於天正之朔舛也甚矣盖漢厯推歩失之後天故氣過二三日尚不覺所以日食多在晦也漢厯日食之晦余推皆朔明甚兹豈口説之滕胥乃實詣之數此可與司天氏持籌道之也綱目書法云元鼎五年書十一月朔冬至親郊見矣不書某甲子於是祀明堂則書甲子朔旦何重厯紀也至朔同日常也甲子朔旦冬至非常也故特書之夫以非常之厯紀舉非常之祀典且以氣朔同日定千古厯元斯豈細事而豈知是朔之非甲子也以此明堂事天天神享之乎元鼎五年朔旦冬至實是己卯親郊禮也去兹才八年鄧平等首出治厯而反違至二三日則嗣是先時後時朔悉為晦無論欽天曷以授時厯元云乎哉太始元年乙酉歲正月乙巳晦日食二月交一十四日一九入食限二月朔四十二日三三丙午辰時推得是年二月丙午朔辰時日食非正月乙巳晦也漢厯誤推正月乙巳晦日食至日候之見其不食至次日方食與巳所推宿度不合遂削其宿度不書故綱目通鑑亦不書是食而不知丙午之朔食為是也太始四年戊子嵗十月甲寅晦日食十一月交一十四日三入食限十一月朔五十日四九甲寅午時是十一月甲寅朔午時日食非十月晦征和四年壬辰歲八月辛酉晦日食不盡如鉤在亢二度晡時食從西北日下晡時復九月交一十四日四二入食限九月朔五十七日五八辛酉未時定用五刻五三初虧未初二刻正西食甚未正三刻復圓申正初刻正東推得是年九月辛酉朔日食九分九十餘秒非八月辛酉晦是日食甚日躔黄道角十度夫漢史食亢二而法推角十盖角末去亢初不逺或古時距星稍異不害其為同也未初初虧申正復圓食九分九十秒正晡時食日下復不盡如鉤也第云從西北則非葢漢人自東向西望日故目為西北而不知從北極望之則食從正西過正東也是年載日食云晡時至日下不盡如鉤詳矣盖目覩記之也余推不爽則其他又何疑昭帝始元三年丁酉歲十月壬辰朔日食十一月交二十六日七三入食限十一月朔二十八日四一壬辰巳時法推是年十一月壬辰朔巳時日食漢史合元鳯元年辛丑歲七月己亥晦日食八月交二十六日八四入食限八月朔三十五日五五己亥未時是八月己亥朔未時日食非七月晦地節元年壬子歲十二月癸亥晦日食正月交二十七日一九入食限正月朔五十九日六二癸亥申時是地節二年癸丑歲正月癸亥朔申時日食非元年壬子十二月晦食也夫正月元旦是為三朝况漢帝改元以正月為嵗首則朝賀享獻履端為慶是日日食誠大變也孔子吉月必朝服而朝矧曰元旦古人有元旦日食不受賀者正以吉期值大變耳谷永誤占惠帝六年季冬之朔以為七年元旦而曰三朝尊者惡之者實是日也漢厯誤推以元旦之日食加於年前之窮歲以正月之二日謬為元旦之三朝日食而不知為大變且除夕於履端行朝祭大典於朔二此之所關豈細欲神道人道能休鬯乎百工庻績能釐熈乎政典曰先時者殺無赦不及時者殺無赦然則𦙍侯之征不少貸而鄧平等當之矣五鳯元年甲子歲十二月乙酉朔日食十二月交一十四日二三入食限十二月朔二十一日二三乙酉卯時是十二月乙酉朔卯時日食漢厯合五鳯四年丁卯歲四月辛丑朔日食是為正月朔慝未作左氏以為重異四月交二十七日四入食限四月朔三十七日五五辛丑未時是四月辛丑朔未時日食漢厯合夫四月純陽用事為正陽之月隂為慝五月一隂生之隂氣未動乃慝未作隂侵陽重左氏之説是也元帝永光二年乙卯歲三月壬戌朔日食三月交一十四日八入食限三月朔五十八日三四壬戌辰時是三月壬戌朔辰時日食漢厯合元帝永光四年辛巳歲六月戊寅晦日食七月交二十六日八九入食限七月朔一十四日六五戊寅申時是七月戊寅朔申時日食非六月晦建昭五年丁亥歲六月壬申晦日食不盡如鉤因入推是年六月晦七月朔無壬申亦不入食限日不應食漢史不書在某宿度却書因入二字想誤推應食見其不食也遂刪其宿度添因入二字若曰日入地矣文其過也建始三年辛卯歲十二月戊申朔日食十二月交二十六日六二入食限十二月朔四十四日五二戊申午時是十二月戊申朔午正二刻日食漢史合考杜欽對成帝曰日以戊申食時加未戊未土也宫中之部必此嫡妾將有争寵相害而為患者即此見是日之食在未時也法推午正二刻合朔午正二刻午將末矣其未正食甚復圓之時合河平元年癸巳歲四月己亥晦日食不盡如鉤五月交一十三日九三入食限五月朔三十五日三六己亥辰時是五月己亥朔辰時日食非四月晦按劉向云日蚤食時從西南起此必當時厯官親見其食從蚤食時西南起也法推辰正三刻合朔則初虧必辰初正蚤食時也其云從西南起則非何則日食不盡如鉤是食旣也食既則食起從正西復圓正東豈有起從西南之理盖視日以北極為凖辰時日食日在東北向西南斜上月在西南向東北斜下相掩而食漢人向東視之若從西南者然而不知是正西之向正東也夫以千三百餘年之逺當時親見天象日食辰初者而余所歩不爽則其地何有不合漢厯以朔為晦并不應食而誤推為食者其差謬又奚疑河平三年乙未歲八月乙卯晦日食十月交二十六日七四入食限十月朔五十一日五一乙卯午時是十月乙卯朔午時日食非八月晦盖是年十月前不應閏而漢厯誤置一閏遂以九月為八月而曰乙卯晦日食非也河平四年丙申歲三月癸丑朔日食三月交一十三日四三入食限三月朔四十九日六三癸丑申時是三月癸丑朔申時日食漢厯合陽朔元年丁酉歲二月丁未晦日食三月交一十四刻入食限三月朔四十三日六三丁未申時是三月丁未朔申時日食非二月晦永始元年乙巳歲九月丁酉晦日食法推是年九月晦十月朔無丁酉亦不入食限漢厯誤推暗削己自知其差矣谷永不知而乃以京房易占對帝曰九月日蝕酒亡節之所致也獨使京師知之四國不見者禍在内也夫曰京師知之何不曰京師見之曰四國不見則真不見也盖當時厯官誤推先已傳布谷永遂據以為言豈知厯官覺差業已削其宿度而况兼以四國皆未見乎既非日食則易占又何取焉永始二年丙午歲二月乙酉晦日食三月交二十六日四六入食限三月朔二十一日四二乙酉巳時是三月乙酉朔巳時日食非二月晦谷永以易占對帝曰二月日食賦重民愁之所致也所以使四方皆見京師隂蔽者禍在外也夫曰四方皆見則真見曰京師隂蔽則隂雲掩之耳厯官因四方皆見而京師不見遂亦疑之而削其宿度殊不知是日日應食非差也從古有雲掩而不目為日食乎民愁禍外之占奚取焉永始三年丁未歲正月己卯晦日食二月交二十七日八入食限二月朔一十五日六一己卯未時是二月己卯朔未時日食非正月晦永始四年戊申歲七月辛未晦日食八月交一十四日三九入食限八月朔七日四辛未巳時是八月辛未朔巳時日食非七月晦鄭興上疏言日月交㑹數應在朔而頃年日食多在於晦先時而合皆月行疾也日君象月臣象君亢急則臣下促廹故行疾也以余考之日食何嘗在晦何嘗先時而合月何嘗行疾漢厯誤推而鄭興即以月行疾誤日月且持以告君無知妄言將誰欺欺天乎欺君乎元延元年己酉歲正月己亥朔日食正月交二十五日九八入食限正月朔三十五日三一己亥辰時是正月己亥朔辰時日食漢厯合哀帝元壽元年己未歲正月辛丑朔日食與惠帝七年同日月正月交一十四日一四入食限正月朔三十七日三二辛丑辰時是正月辛丑朔辰時日食漢厯合然云與惠帝七年同月日則非盖是年實正月朔日食為三朝大變而惠帝七年之正月朔則六年十二月之朔也不可同年而語矣元壽二年庚申歲三月壬辰晦日食推是年三月晦四月朔無壬辰亦不入食限漢厯誤推見其不食故不書宿度平帝元始元年辛酉歲五月丁巳朔日食五月交二十六日九三入食限五月朔五十三日五丁巳午時是五月丁巳朔午時日食漢史合元始二年壬戌歲九月戊申晦日食既推是年九月晦十月朔無戊申亦不入食限漢厯誤推見其不食故不書宿度班固前漢書云凢漢著紀十二世二百一十二年日食五十三朔十四晦三十六先晦一日三京房易傳曰晦而月見西方謂之晀朔而月見東方謂之仄慝仄慝則侯王其肅晀則侯王其舒孟康註晀者月行疾在日前故早見仄慝者行遲在日後當没而更見劉向以為晀者疾也君舒緩則臣驕慢故日行遲而月行疾也仄慝者不進之意君肅急則臣恐懼故日行疾而月行遲不敢廹近君也不舒不急以正失之者食朔日劉歆以為舒者侯王展意顓事臣下促急故月行疾也肅者侯王縮朒不任事臣下弛縱故月行遲也當春秋時侯王率多縮朒不任事故食二日仄慝者十八食晦日晀者一此其效也考之漢家食晦晀者三十六終亡二日仄慝者歆説信矣此皆謂日月亂行者也吁嗟有是哉晦日尚未合朔豈有月已疾行於日前而見西方之理朔日月方合朔豈有月反遲退於日後而見東方之理漢人布筭無術求天不得而遂以已意命名曰晀曰仄慝而繫之以事應曰肅曰舒變異因之使果如其言豈不前知如神而抑知其非然也余以法推春秋暨西漢日凢九十餘食内不應食而漢厯誤推為食及置閏失所者亡論若其食晦與二日及晦先一日者則無一不食朔也且併其方位時刻分數若合符節不爽矣乃京房等妄名晀仄而猶駕言以欺人曰此其效也歆説信矣日月亂行者也夫從古以來月何嘗有一晀仄日何嘗有一非朔食以一無所有之事而加之日月詆為亂行諸君却自誇為效為信果孰信耶效耶亂行耶日月不亂行而若等亂道其何傷於日月乎多見其不知量也按文獻通考載成帝元延元年劉向上疏言臣向前數年言日當食今連三年比食自建始以來二十歲間而八食率二歲六月而一食古今䍐有易曰觀乎天文以察時變昔孔子對魯哀公並言夏桀殷紂暴虐天下故歴失則攝提失方孟陬無紀此皆易姓之變也夫向言日食召變誠是而云前知日食則未也漢史紀成帝建始以來二十年間日凢十食以余推之建始三年十二月朔河平四年三月朔元延元年正月朔皆是而河平元年四月晦陽朔元年二月晦永始二年二月晦三年正月晦四年七月晦皆非則皆次月朔食也河平三年之八月晦則十月朔盖漢厯誤置一閏之故永始元年之九月晦則不應食即彼時四國不見矣劉向上疏告君自謂臣前數年言日當食而今果然是前知如神也何乃食朔而以為晦誤置閏而不知不應食而不改豈數年前知而後復昏耄耶一晦朔且未辯而尚敢言前知孔子曰知之為知之不知為不知是知也則向不免强不知以為知矣又考秘史漢宣帝甘露三年帝命劉向校書天祿閣夜有黄衣老人植青藜杖進吹杖端忽燃火曰我太乙之精也天帝聞下界有卯金之子博學能文令我下觀老人見几上有化胡書曰書内䓗嶺一字是其山出蓯蓉故名以為䓗誤矣嶺北乃老子化胡成佛之所可改作蓯復見几上有列仙傳曰老子即老𣆀在堯時為務成子至今猶存太上老君乃太始之初人今人以為即老聃非也籛鏗堯時人堯封為彭城君得不死藥至今見存人謂彭年八百非也語畢老人乃出玉牒天文書授之劉向自是文學異常夫太乙之神道之祖也天文之書厯之源也老人知太始之老君記成佛之蓯嶺老聃彭鏗皆識其人豈非至神且以上帝之天文授向則向也厯象之事宜精而庻徴之術宜驗矣何乃課日不效以朔為晦晀仄不經事應無據夫以化胡書一䓗字且令亟改而况日月晦朔所關之大有所不知乎厯懸於昊天而天授無明效太乙真宰之謂何然則老人者無乃非真太乙而天文非真書耶抑劉向欲已天文五行之書傳於天下而故假為天神以駭世耶且也劉向以如斯妄誕之徒歴代以來從祀孔子廟庭至國朝嘉靖間張璁引程敏政議劉向初以獻賦進喜誦神仙方術嘗上言黄金可成鑄作不驗下吏當死其兄陽城侯救之獲免所著洪範五行傳最為舛駁使箕子經世之微言流為隂陽術家之小技宜罷祀從之夫敏政所云仙丹隂陽之舛即青藜玉牒之詐也若非我國朝罷祀則宫牆美富之中㡬何而不乆為一偽學所玷古今律厯考卷二十
