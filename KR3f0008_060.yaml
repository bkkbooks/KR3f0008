body:
  text: 古今律厯考卷六十明邢雲路撰厯議一厯議天體天體至圓天包地外地在天中地平當天之半天體半見地上半隠地下東西轉運自東而徂西南北斜倚北髙而南下自天地之中言之北極出地三十六度南極入地三十六度二極持其兩端猶門之樞車之軸也中分為赤道斜倚於南横絡天腹天周三百六十五度有竒赤道去極九十一度有竒周天之星二十八宿而星之辰均分十二次辰之度三十有竒十二辰之度合三百六十五度有竒輻輳於腰圍名曰赤道其度在赤道者正得一度之廣去赤道則漸逺而漸狹天體圓故也各度以二十八宿之距星紀數謂之經度東西分經則南北分緯各四分之皆相距九十一度有竒然東西雖曰斜倚而其中道兩傍則固在卯酉之位矣星辰循天左旋日月五星遡天右轉日月五星亦隨天行而曰右者七曜實東而天牽之以西若蟻行磨上之譬云爾日日行一度一嵗一周天所行之路謂之黄道與赤道相交半出赤道外半入赤道内冬至之日黄道出赤道外二十四度去極逺日出辰入申晝短而夜長故時寒夏至之日黄道入赤道内二十四度去極近日出寅入戌晝長而夜短故時暑春秋二分黄道與赤道平去極中日出卯入酉晝夜均月日行十三度有竒行有遲疾二十七日有竒一周天所行之路謂之白道循黄道内外而東與黄道相交出入不過六度黄道内曰隂厯其外曰陽厯分而言之日行黄道月行九道青道二出黄道東朱道二出黄道南白道二出黄道西黑道二出黄道北併黄道為九行其實一道也日陽精火為君象月隂精水為臣象火則發光於外水則含影於内君令乎臣臣承乎君故月光生於日之所照魄生於日之所不照當日則光明就日則光盡日之行也舒月之行也速與日同度而合謂之朔舒先速後近一逺三謂之弦相與為衝分天之中謂之望以速及舒光盡體魄謂之晦黄白道相結謂之交日月體相遇為之㑹當交㑹而相盪者食也日食於朔月體掩日光也月食於望月體侵入暗虚不受日光也日月之行氣朔生焉日月之蝕吉凶生焉夫星有經有緯經星者三垣二十八舍也三垣者紫微垣太微垣天市垣二十八舍者東方七宿角亢氐房心尾箕為蒼龍之體北方七宿斗牛女虚危室壁為𤣥武之體西方七宿奎婁胃昴畢觜參為白虎之體南方七宿井鬼栁星張翼軫為朱雀之體中外官星總計二百八十三座常明者百有二十可明者三百二十為星二千五百微星之數萬有一千五百二十其星在朝象官如左輔右弼上次将相三台九卿執法騎官幸臣従官之類是也在野象物如螣蛇雞豕狗狼魚龍龜鼈之類是也在人象事如天廟離宫閣道華蓋五車天船大陵之類是也經星附天轉運各有常位譬如百官萬民各守其職業而聴命於七政七政所至或失度或愆期下照分野則其應驗可占而知矣緯星者五行之精也木曰嵗星火曰熒惑土曰填星金曰太白水曰辰星併日月為七政五星有盈縮遲疾嵗星行四千三百三十一日有竒凡十二嵗一周天熒惑行六百八十七日弱凡二嵗一周天填星行一萬七百四十八日弱凡二十八嵗一周天太白行三百六十五日有竒凡嵗一周天辰星與太白同此其率也五緯之外又有四餘四餘者天之隠曜也行無遲疾紫氣木之餘氣也隱而不見見為有道謂之景星其行一萬二百二十七日有竒凡二十八嵗一周天月孛水之餘氣也隱而不見見則妖孽謂之彗孛其行三千二百三十二日弱凡八嵗十月一周天羅㬋火之餘氣計都土之餘氣常隠不見是為天首天尾従交㑹之蝕限計之其行六千七百九十三日有竒凡十八嵗七月一周天但紫氣月孛以順行左旋布羅㬋計都以逆行右旋布耳若夫天漢乃氣之英水之精也氣發而升精華上浮宛轉若流名曰天河起於尾箕經龜魚傅説天江糠星天籥斜行上連箕斗天弁河鼓左右旗倒分一𣲖西映天市之吳越自坤抵艮至宗星宗人而止其大勢上絡天津而至車府造父螣蛇王良附路閣道大陵天船漸下而東南行厯卷舌五車諸王天關司怪水府而入東井過四瀆闕丘天狗弧矢之墟在社稷七星南而沒此天漢有光之脉絡天所以為東西南北襟帶之限而天下河漢之源出於此也其上北斗七星在紫微宫自一至四為魁自五至七為杓第一星名天樞第五星名天衡第七星名揺光此三星謂之斗綱乃七政之樞機四時之斟酌隨所指以運元化者也如今寅月雨水後日躔入亥宮則斗杓昏刻指寅斗衡夜半指寅斗魁平旦指寅以次卯月春分後日躔入戌宮則斗杓昏刻指卯斗衡夜半指卯斗魁平旦指卯以推餘月皆然是其隨所指以運元化如此至於天運漸移至卯月日躔入亥宫則斗杓昏刻又轉而指丑矣獨不見今之立春至雨水後六日巳皆入丑乎久之斗杓厯十二月皆可指寅一寅月斗杓皆可指十二辰葢約二千年轉一宮二萬餘年轉十二宮一周天而復始此推歩之術萬世可知者也若人不察而見今之寅月斗適指寅遂認為一定不易之辰則惑矣星經星官之書自黄帝始重黎羲和之後夏有昆吾殷有巫咸周有史佚魏有石氏齊有甘公皆能言天文察微變至三國時陳卓始列甘徳石申巫咸三家星官著於圖録二百五十四官一千二百八十三星并二十八宿及輔官附坐二百八十二星總二百八十三官一千五百六十五星宋元嘉太史令錢樂之所鑄渾天銅儀以朱黑白三色用殊三家出於石者赤出於甘者黑出於巫者黄其大凡也按甘氏星經曰日一星在房之西氐之東日陽精為雞三足雞在日中而其精為星以司太陽之行度日生於東故於是在焉月一星在昴畢間故昴畢之間為天街黄道之所經也月隂精為兔四足兔在月中而其精為星以司太隂之行度月生於西故於是在焉日精在氐房月精在畢昴自司其行度而氐房昴畢乃黄道之所經不得而司之范育曰日出於卯卯之屬為兔而兔之宅乃在月中月出於酉酉之屬為雞而雞之宅乃在日中是謂隂陽之精互藏其宅石氏星經曰東宫青帝其精蒼龍為七宿其象有角有亢有氐有房有心有尾有箕氐胷房腹箕所糞也司春司木司東嶽司東方司鱗蟲三百六十北方黑帝其精𤣥武為七宿斗有龍蛇蟠結之象牛蛇象女龜象虚危壁室龜蛇蟠蚪之象司冬司水司北嶽司北方司介蟲三百六十西方白帝其精白虎為七宿奎象白虎婁胃昴虎三子也畢象虎觜參象麟觜首參身也司秋司金司西嶽司西海司西方司毛蟲三百六十南方赤帝其精朱鳥為七宿井首鬼目栁喙星頸張嗉翼翮軫尾司夏司火司南嶽司南海司南方司羽蟲三百六十中宫黄帝其精黄龍為軒轅首枕星張尾掛栁井體映三台司四季司中嶽司中土司河江漢淮濟之水司黄帝之子孫司倮蟲三百六十夫世之言星者惟知四獸而不知黄龍亦猶民俗惟知四時而不知夏之後有土位素問所謂長夏月令所謂中央五時取火季夏取槐檀之火也軒轅本天市垣之星在張宿之分野分為土徳寄王鶉火焉斯又天星之精義也儀象璣衡之来尚矣史謂起於帝嚳或謂作於宓犧又謂羲和舊器非舜創為也漢落下閎造太初厯用渾儀馬融謂即古璿璣玉衡之制吳王蕃之論亦云渾儀之制置天梁地平以定天體為四游儀以綴赤道者璣也置望筩横簫於游儀中以窺七曜之行而知其躔離之次者衡也若六合儀三辰儀與四游儀竝列為三重者唐李淳風所作而黄道儀者一行所增也如張衡祖落下閎耿夀昌之法别為渾象寘諸密室用漏水轉之以合璿璣所加星度則渾儀之外又有渾象唐李淳風梁令瓚祖之始與渾儀竝用太平興國中張思訓造於禁中詔置文明殿下其制起樓髙丈餘機隠於内規天矩地下設地輪地足又為横輪側輪斜輪定身闗中關小關天柱七直神左揺鈴右扣鐘中擊鼔以定刻數每一晝夜周而復始又以木為十二神各直一時至其時則自執辰牌循環而出隨刻數以定晝夜短長上有天頂天牙天關天指天抱天束天條布三百六十五度為日月五星紫㣲宮列宿斗建黄赤道以日行度定寒暑進退開元遺法運轉以水冬則凝凍至是代以水銀則無差失又舊法日月晝夜行度皆人所運新制成於自然尤為精妙真宗時司天冬官正韓顯符造銅候儀其制九曰雙規曰游規曰直規曰窺管曰平準曰黄道曰赤道曰龍柱曰水臬俱本淳風遺法嗣後沈括蘇頌等造儀象浮漏亦臻竒巧自靖康之亂儀象之器盡歸於金元都燕其初襲用金舊而規環不協難復施行乃命左丞許衡領其事與太史令邢臺郭守敬唐縣王恂率南北日官分掌測驗守敬首言厯之本在於測驗而測驗之器莫先儀表今司天渾儀宋皇祐中汴京所造不與大都尺度相符比量南北二極約差四度表石年深亦復欹側守敬乃盡考其失而移置之既又别圗髙爽地以木為重棚創作簡儀髙表用相比覆又以為天樞附極而動昔人嘗展管望之未得其的作候極儀極辰既位天體斯正作渾天象象雖形似莫適所用作玲瓏儀以表之矩方測天之正圜莫若以圜求圜作仰儀古有經緯結而不動守敬易之作立運儀日有中道月有九行守敬一之作證理儀表髙景虚㒺象非真作景符月雖有明察景則難作闚几以測月併星厯法之驗在於交㑹作日月食儀天有赤道輪以當之兩極低昂標以指之作星晷定時儀以識漏刻作大明燈漏又作正方案九表懸正儀座正儀為四方行測者所用又作仰規覆矩圖異方渾盖圖日出入永短圗與上諸儀互相參攷謂昔人以管窺天宿度餘分約為太半少未得其的乃用二線推測於餘分纖微皆有可考以測日二線與日相對其下值時刻則晝刻也夜則以星定之測日月五星出沒俱有成法以上諸儀之制詳見元史中又以九服日月交食分數時刻不同晝夜長短不同日月星辰去天髙下不同乃遣監候官一十四員分道而出東至髙麗西極滇池南踰朱崖北盡鐵勒四海測驗凡二十七所越五年而厯成従古儀象測驗之精無能出其右者至今簡儀仰儀圭表影符等器在觀象臺猶存第嵗久儀有欹澀器有殘缺兼之舊法失傳疇人膠柱至併其察璣測晷不知作何狀也則夫及時修改變而通之神而明之者存乎其人耳古今律厯考卷六十
