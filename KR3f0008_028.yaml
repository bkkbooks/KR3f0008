body:
  text: 古今律厯考卷二十八明邢雲路撰藏經考佛藏佛説東南西北各八天中須彌山頂一天共三十三天自四大天王天至大梵天各有千天有千三十三天是名小千世界乃至二千三千百億日月一佛有百億四天下是名三千大千世界閻浮境十萬八千須彌四面各廣長三四十萬里頂上忉利天上釋提桓各廣長二三百萬里四天王居須彌四埵皆髙四萬二千由旬以人間五十嵗為天一日亦以三十日為月十二月為嵗五百嵗即人間九百萬嵗觀世音菩薩現身長八十萬億那由他由旬以須彌之髙廣納芥子中無増減須彌山本相如故以四大海水入一毛孔不嬈大海本相如故演七日以為一刼促一刼以為七日十方日月星宿見於一毛孔中此皆佛之寓言也説閻浮境界十萬八千里比人有十萬八千塵勞夢想其實本來面目一無所有故説須彌納一芥曠刼入一息猶中國言詩大言小言之譬言道大無外小無内之意非謂真有百億天百億日月也風輪能持水輪水輪能持大地令不壊散是故説地輪依水輪水輪依風輪風輪依虚空虛空無所依雖無所依能令三千大千世界而得安住此亦佛之寓言也言地水火風乃人之四大風之所以鼓動即火故説火風水輪持大地非謂天地五行合如此也佛説四大洲所謂東勝身洲即弗婆提南贍部洲即閻浮提西俱耶尼洲即瞿陀尼北俱盧洲即鬱單越四洲遶蘇迷山即須彌山閻浮提日中時東方弗婆提便㝠西方瞿陀尼則初出北方鬱單越則夜半瞿陀尼日中閻浮提即㝠鬱單越初出弗婆提夜半也鬱單越弗婆提日中餘出没亦然是言須彌山高日明於此隠於彼比人原是一心積為三界乍明忽滅如為須彌四面遮蔽然須轉輪無礙乃得解脱皆寓言也非謂天地之中真有須彌日之行度真在須彌四圍環繞四方出没四視平等之致文始傳云天去地四十萬九千里日月直度各三千里周迴去千里天地午子相去九千萬萬里濟苦經云崑崙山高一萬五千里文始傳又云日月周圍六千里徑三千里夫文始云天去地四十萬九千里則子午徑宜八十一萬八千里而乃云相去九千萬萬里多八千九百九十九萬九千九百一十八萬二千里矣云日月直度各三千里則周迴宜九千里乃止云一千里少八千里矣又云日月周圍六千里則徑止宜二千里而乃云三千里多一千里矣均之文始傳也一曰日周千里又曰日周六千里何自相背也化胡云崑崙山九重重相去九千里山有四面面有一天故四九三十六天第一重帝釋居之今據濟苦崑崙高一萬五千里化胡崑崙九重重高九千則高八萬一千而言萬五千者少六萬五千里矣亡論諸經所説之乖舛將使天地日月之高下宜何從焉佛道經假作者多此其假者也竺乾書説阿耨山即崑崙也一名須彌訛呼蘇迷在于闐國西一千三百餘里東南接西凉酒泉地逺山則香山雪山也佛生遊履雪山中國在崑崙東南天竺諸國在正南黄河在崑崙東南即佛經無熱地東有銀牛口出殑伽河即恒河山頂有阿耨大池其水分流四面去入中國者為黄河入東海其三面各入南西北海如弱水黒水之類大抵地之形如饅頭其撚尖則崑崙也此言是佛諸國篇云五印度之境周九萬餘里三垂大海北背雪山北廣南狹形如半月劃野區分七十餘國時特暑熱地多泉濕成光子曰中天竺國東至震旦五萬八千里南至金地國西至阿拘遮國北至小香山阿耨達亦各五萬八千里約天上一寸地下千里僧慧嚴入中國何承天問曰佛國用何厯答曰天竺夏至之日日正中時竪晷無影所謂天中於五行土徳色尚黄數尚五八寸為尺十兩當此土十二兩建辰之月為嵗首及計覈分至推效薄蝕顧步光影其法甚詳宿度章紀咸有條例後婆利國人來果同嚴説夫云夏至竪晷無影中國衡嶽竪晷無影則天竺與衡嶽東西正相對也衡嶽北極出地二十五度夏至晝五十六刻夜四十四刻嶽臺北極出地三十五度夏至晷景一尺四寸八分晝六十刻夜四十刻衡嶽北嶽臺北極低十度晷景差一尺四寸八分而晝至短四刻是去極二度半短一刻晷影三寸七分短一刻也雖割圓高下分釐稍有不齊而大約分數則無差也天竺與衡嶽對其晷刻亦猶是矣此説天竺四至各以幾萬里計而晷與中國畧同可較是可破諸經天日須彌億萬里之妄稻稗經言月去地四萬二千由旬一由旬四十里共一百六十八萬里文始言天去地四十萬九千里則月不反髙於天一百一十九萬里之多耶唐不空三藏翻譯文殊菩薩及諸仙所説吉凶時日善惡宿曜經言天地初建寒暑之精化為日月分宿設宫管標羣品日理陽位從星宿順行取張翼軫角亢氐房心尾箕斗牛女等一十三宿迄至虛宿之家恰當子地之中分為六宫也但日月天子俱以五星臣佐而日光熖猛以陽獸獅子為宫神月光清涼以隂蟲巨蟹為宫神日與月各以神宫均賜五星以速至遲即辰星太白熒惑嵗鎮排為次第緩急於斯彰焉凡十二宫即七曜之躔次各有神形一切庶類相感月廣五十由旬日廣五十一由旬太白廣十由旬嵗星廣九由旬辰星廣八由旬熒惑廣七由旬土星廣六由旬星最小者廣一俱盧舎第一星四足張四足翼一足在午太陽位焉其神如獅子故名獅子宫第二翼三足軫四足角二足在己辰星位焉其神如女故名雙女宫第三角二足亢四足氐三足在辰太白位焉其神如秤故名天秤宫第四氐一足房四足心四足在夘熒惑位焉其神如蝎故名天蝎宫第五尾四足箕四足斗一足在寅嵗星位焉其神如弓故名人馬宫第六斗三足女四足虛二足在丑鎮星位焉其神如摩羯故名摩羯宫已上六位屬太陽分已下六位屬太隂分第七虛二足危四足室三足在子鎮星位焉其神如瓶故名寶瓶宫第八室一足壁四足奎四足在亥嵗星位焉其神如魚故名雙魚宫第九婁四足胃四足昴一足在戌熒惑位焉其神如羊故名白羊宫第十昴三足畢四足觜二足在酉太白位焉其神如牛故名金牛宫第十一觜二足參四足井三足在申辰星位焉其神如夫妻故名隂陽宫第十二井一足鬼四足栁四足在未太隂位焉其神如蟹故曰巨蟹宫昴六星畢五星觜三星參一星井二星鬼三星栁六星星六星張二星翼二星軫五星角二星亢一星氐四星房四星心三星尾二星箕四星斗四星牛三星女三星虛四星危一星室二星壁二星奎三十二星婁三星胃三星二月為角月三月為氐月四月為心月五月為箕月六月為女月七月為室月八月為婁月九月為昴月十月為觜月十一月為鬼月十二月為星月正月為翼月此其十二宫分與中國皆同但其星數與中國有多少之異五星遲速與中國亦同二月為角月云云者以斗指夘位之辰亦與中國同至於所占星直月日與人命之吉凶則與中國異盖其方俗之殊也夫周天二十八宿既與中國皆同而又曰虚宿恰當子地之中則虚為正北也曰日廣五十一由旬一由旬四十里則日廣凡二千餘里也中國視虚為正北量日約亦千餘里皆合矣此佛説之經宛然一渾天儀即中國之厯也而乃謂有幾千天百萬億日月高廣幾十萬億里東方日中西方初出諸説均之佛説也而自相背若是則千天萬日等説非寓言而何大方等大集經雪山光味仙人白世尊佛言二十八宿日月隨行一切衆生日月年嵗皆悉繫屬瞿曇東方七宿謂角亢氐房心尾箕若人生日屬角宿者口闊額高多財多智多有妻子夀八十四長子不夀屬亢星者聰明富貴樂欲出家夀六十四指有瘡瘢其氐房心尾箕若南方井鬼栁星張翼軫西方奎婁胃昴畢觜參北方斗牛女虛危室壁各宿生人者其相貌夀夭吉凶各有不同若通達如是相書到於彼岸瞿曇佛言衆生亦有同屬一星生者而有富貴貧賤參差是故我知是不定法是世尊之言是而光味之言非也大乘大方等日藏經言星宿數與形狀多與厯不合吉凶避忌亦無的據日午脚跡之影亦無圭表之數五緯所主之月亦不合厯行度虛胎所載宿曜亦差大方等大集月藏分中星宿攝受品四天王等白佛言諸宿曜各有所主一者角宿主於衆鳥二者元宿主於出家求聖道者氐房至翼軫通二十八宿各有所主不同尒時佛吿梵王等言于摩國陁樓等國共十二國角宿攝護阿羅荼等共十國亢宿攝護氐房至翼軫通二十八宿所攝國數多少不一此佛國以彼中之天步彼中分野與中國不同佛國日月熒惑辰星嵗星太白鎮星是為七曜嵗星者於十二嵗始一周天鎮星者二十八嵗乃一周天太白嵗半始一周天熒惑二嵗始一周天辰星一嵗乃一周天凡嵗三百六十五日日一周天月三十日乃一周天此是七曜周天數法大畧與中國同惟太白亦嵗一周天而佛以為嵗半非大唐西域記三藏法師𤣥奘譯言夫數量之稱謂踰繕那古聖王一日軍行也即一由旬四十里印度國俗乃三十里聖教所載唯十六里窮微之數分一踰繕那為八拘盧舎拘盧舎者謂大牛鳴聲所極聞一拘盧舎為五百弓分二拘盧舎名一聲為千弓分一弓為四肘分一肘為二十四指十二指名毗多悉提分一指節為七宿麥乃至一虱一蟣一牛毛一羊毛一兔毫一塵一細塵次第七分以至一極細塵極細塵者不可復㭊㭊即歸空故曰極微也若乃隂陽厯運日月次舎稱謂雖殊時候無異隨其星建以標月名時極短者謂刹那也百二十刹那為一呾刹那六十呾刹那為一臘縛三十臘縛為一牟呼栗多五牟呼栗多為一時六時合成一日一夜晝三夜三居俗日夜分為八時晝四夜四一時各有四分月初一盈至十五滿謂之白月分月十六虧至月盡晦謂之黒月分或十四日十五日月有小大故也遇小月謂之減夜減一日也黒前白後合為一月六箇月共合為一行日遊在内北行也日遊在外南行也摠此二行合為一嵗又分一嵗以為六時正月十六日至三月十五日漸熱也三月十六日至五月十五日盛熱也五月十六日至七月十五日雨時也七月十六日至九月十五日茂時也九月十六日至十一月十五日漸寒也十一月十六日至正月十五日盛寒也如來聖教嵗為三時正月十六日至五月十五日熱時也五月十六日至九月十五日雨時也九月十六日至正月十五日寒時也或為四時春夏秋冬也春三月謂制呾邏月吠舎佉月逝瑟吒月當此從正月十六日至四月十五日夏三月謂頞沙荼月室羅伐挐月婆達羅鉢陀月當此從四月十六日至七月十五日秋三月謂頞濕縛庾闍月迦刺底迦月末伽始羅月當此從七月十六日至十月十五日冬三月謂報沙月磨袪月頗勒窶挐月當此從十月十六日至正月十五日故印度僧徒依佛聖教坐兩安居或前三月或後三月前三月當此從五月十六日至八月十五日後三月當此從六月十六日至九月十五日中國節氣與印度遞爭半月中國以二十九三十為大小盡即印度以十四十五為大小盡中國之十六日乃印度初一日也昔人嘗記結夏之制宜如西域用四月十六日盖四月十六日乃印度之四月盡也其數皆明大智度論日月嵗節者日名從旦至旦初分中分後分夜亦三分一日一夜有三十時春秋分時十五時屬晝十五時屬夜餘時六増六減五月至晝十八時夜十二時十一月至夜十八時晝十二時一月或三十日或三十日半或二十九日或二十七日半有四種月一者日月二者世間月三者月月四者星宿月日月者三十日半世間月者三十日月月者二十九日加六十二分之三十星宿月者二十七日加六十七分之二十一閏月者從日月世間月二事中出是名十三月或十二月或十三月名一嵗是嵗三百六十六日周而復始菩薩知日中分時前分已過後分未至中分中無住處無相可取日分空無所有到三十日時二十九已滅和合成月和合而為嵗故佛菩薩能知世間日月嵗和能知破散無所有是名巧分别是名菩薩摩訶薩夫佛國每日三十時即中國十二時春秋分晝夜各十五時六月一増減五月十一月晝夜各長短三分之一即中國之二分二至也日月三十日半中國之正氣也世間月三十日中國盈虛之中也月月二十九日加六十二分之三十中國之月䇿也星宿月二十七日加六十七分之二十一中國之交終也閏月從日月世間月出中國之氣盈朔虛積而為閏也中分無住處和合成月中國之無中氣為閏月也六十二分之三十為四十八刻三十八分七十秒以加於二十九日下共二十九日四十八刻三十八分七十秒為佛國月䇿較中國月䇿少四刻有奇六十七分之二十一為三十一刻三十四分三十二秒以加於二十七日下共二十七日三十一刻三十四分三十二秒為佛國交終較中國交終多十刻有奇中西地里不同而厯之小異者止在刻數其大約則皆同佛國之天猶中國之天也明矣九執厯出西域唐開元六年詔太史監瞿曇悉達譯之斷取近距以開元二年二月朔為嵗首西域首夘取隂陽交之始也度法六十月有二十九日餘七百三分日之三百七十三厯首有朔虚百二十六周天三百六十度無餘分日去没分九百分度之十三三十度為相十二相而周天望前曰白博義望後曰黒博義其算皆以字書不用籌䇿九執朔虛没分與中國不同氣朔不同故也九執月䇿餘七百三分日之三百七十三為五十三刻五分八十三秒以加於二十九日下共二十九日五十三刻五分八十三秒與中國月䇿近宻以視大智度論月䇿二十九日四十八刻三十八分七十秒則大智度月䇿為疎西域星經月孛紫炁羅㬋計都星家謂之四餘計生於天尾羅生於天首孛生於月炁生於閏盖日月行道如兩環相交一處曰天首一處曰天尾天尾為計天首為羅月之行遲速有常度遲之處即孛也炁生於閏二十八年十閏而炁行一周炁孛皆有度數無光象故與計羅同謂之四餘今中國皆用之泥洹經佛吿迦葉言人間六月一蝕衆星晝日不見其實不没又言月天子欲瞰日天子佛説羅㬋羅疾放月云六月一蝕即天首至交中至天尾各六月之謂云星晝不見日光所射故也羅㬋瞰日即日食於天首佛云疾放即中國救日之義佛運統紀周昭王二十四年甲寅嵗四月八日中天竺國淨梵王妃摩耶氏生太子悉達多至年十九壬申嵗二月八日夜半出家成釋迦牟尼佛東晉沙門法顯嘗至天竺摩竭提國見城邑人民以建夘月八日華香供養請佛周以子月為正月四月是建夘之二月也二月則建丑之十二月今人以夏正四月為佛生日非宿曜經黒月白月皆以一日三日五日七日九日十一日十三日為吉祥日所向皆成就是知佛國之尚奇日也僧史畧佛法本傳西域十二月三十日為正月望謂之大神變日漢明帝令是日燒燈表佛法大明無味佛國正五九月天帝釋鏡照南贍部洲故禁刑罰今中國官員於此三月内不到任無味國朝洪武初收元圖籍命西域人海荅兒等擇天文隂陽厯象譯之譯出回回厯以西域阿刺必年即開皇十九年己未嵗為元至洪武甲子計積七百八十六算周天十二宫每宫三十度共三百六十度十二宫日數不同共三百六十五日為不動的月若遇宫分有閏之年於亥宫又添一日十二月單月大雙月小共三百五十四日為動的月若遇月分有閏之年於十二月内又添一日凡三十年閏十有一月厯千九百四十二年而宫月甲子再㑹其術欽天監見存有回回科習之所步日食與中華厯分數不同夫以中西之逺而以法相校交蝕只是分數不同非大相徑庭也而佛經乃言南方日中西方方日出東方則日没故以此可證其言之非白羊戌宫三十一日金牛酉宫三十一日隂陽申宫三十一日巨蟹未宫三十二日獅子午宫三十一日雙女巳宫三十一日天秤辰宫三十日天蝎夘宫三十日人馬寅宫二十九日磨羯丑宫二十九日寶瓶子宫三十日雙魚亥宫三十日第一月大名法而幹而丁第二月小名阿而的必喜世第三月大名虎而達第四月小名提而第五月大名木而達第六月小名沙合列幹而第七月大名列黒而第八月小名阿班第九月大名阿咱而第十月小名答亦第十一月大名八哈慢第十二月小名亦思番達而麻的佛家天樂等類乃化境也於律不協故不錄道藏道經上列三清下分五太三清在三十六天之上玉清聖境元始所居上清真境太上道君所居太清仙境老君所居五太者太質界内有天地𤣥黄之色太質之外太空太空之外太無太無之外太虛併天地𤣥黄為五太豈天果有是三五之所皆寓言也盖三清以比人之三田上田心火中田脾土肺金肝木下田腎水五太亦以比人之五行云高上太霄琅書瓊文帝章經云九天元始號第一天名鬱單无量天去第二天二十四里第二天無量夀天去第三天四千六百萬里第三梵監天去第四五六七八天以至第九大梵天各㡬千百萬里不等去下共五百億二十萬里此九天是始氣之精衆真帝皇所治其天别置三天三天者皆是九天之别號三九二十七併九天共三十六天也此與佛經諸天大半相同皆荒唐之言道言太上靈寶先天地而生然後有天地數起於一立於三成於五盛於七極於九故天去地九萬里崑崙為地柱氣上通崑崙者地之中崑崙直東西南北各一億萬餘里日月徑止千里周三千里洞真放品經曰地有九壘第一地去天九十億萬里第九地去天五百三十億萬里洞真黄氣陽精經日縱廣二千四十里月縱廣千九百里靈寶天尊云日圍千里月圍一千二百里夫既曰天去地九萬里則東西南北亦皆九萬里而崑崙四直則皆一億萬餘里何以相容又謂第一地去天九十億萬里第九地去天五百三十億萬里不太懸絶乎既曰日徑千里周三千里似矣而何以又曰日縱廣二千四十里日圍千里也既曰月縱廣千九百里則圍宜二千七百里而何以曰月圍千二百里也夫均此天也此日月也均之天尊所説也忽然而多忽然而少此是則彼非乃天尊言天亦有非耶天尊不知天何以為天尊洞𤣥靈寶諸天世界造化經道言我在𤣥化之前故有太上號見彼崑崙山王以金銀琉璃水精作之上髙三百三十六萬里下有大海圍之深亦三百三十六萬里廣亦三百三十六萬里地深二十億萬里次下有地亦深二十億萬里次下有粟金二十億萬里次下有剛鐵二十億萬里次下有水深八十億萬里次下有大風深厚五百二十億萬里以是大風持地不使有墮落地浮水上水浮風上其下大空此言非也天體周圍不過數十萬里此可以表測而得者非懸空之説也天周數十萬而地與崑崙在天内乃上下有㡬百億萬里則何以相容無乃道君未嘗到𤣥化前不曽見崑崙王耶若曽見不應有此説道言元始天尊召來天真時諸天日月星宿琁璣玉衡一時停輪豈有天行健也而乃停輪盖寓言也謂人心為琁衡兩目為日月天尊説法則人心目俱定萬化停閒耳天尊曰正北位居中一炁生水萬物皆因水而生故北斗居中天第一貪狼星第三祿存星為東斗主算第二巨門星第四文曲星為西斗記名第六武曲星正居本位為北斗落死第五廉貞星為南斗上生第七破軍星正居中位為中斗大魁總監衆靈周回指十二辰又度人經言五斗東斗角亢氐房心尾箕北斗斗牛女虛危室壁西斗奎婁胃昴畢觜參南斗井鬼栁星張翼軫中斗貪巨祿文廉武破其言二十八宿即天四圍經星云指十二辰則厯家斗柄指十二節之説也經言九統者初以始青之光炁開始青之天凝太霄之宫於東北次以太青之光炁開太青之天凝青霄之宫於東方次以始丹之光炁開始丹之天凝碧霄之宫於東南次以太丹之光炁開太丹之天凝絳霄之宫於南方次以始素之光炁開始素之天凝景霄之宫於西南次以太素之光炁開太素之天凝玉霄之宫於西方次以始𤣥之光炁開始𤣥之天凝琅霄之宫於西北次以太𤣥之光炁開太𤣥之天凝紫霄之宫於北方太梵之天神霄之宫則其居中也西北為天門東南為地戸西南為人門東北為鬼路是其四方之氣東青南赤西白北黒按四方之色也天門地户人門鬼路之説則出先天乾鑿度文道藏載夜半換日出及晦朔換月符呪敕令皆持有法是乃佐軍中變幻之用者則史載日夜出等變或係幻術所致未可知也厯世真僊體道通鑑載陶𢎞景推漢熹平二年丁丑冬至加時在日中而先天實以乙亥冬至加時在夜半凡差三十八刻是漢厯後天二日十二刻也以授時推熹平二年冬至分一十日三十九刻五十分得甲戌日巳初二刻冬至陶𢎞景推乙亥夜半三十八刻乃乙亥日巳初初刻冬至後天一日漢厯丁丑日日中冬至後天二日餘矣所以是年漢厯推十二月癸酉晦日食而不知實是熹平三年正月朔日食也道經比佛經偽書尤多如張道陵等所撰諸經多屬偽作且大半抄謄佛經改換頭面以此言天宜乎不合道言龍漢元年為開天之始古來無年號至漢武帝始有年號然則龍漢元年是誰記之耶道經載律厯諸數多係抄錄儒書者故不必議古今律厯考卷二十八
