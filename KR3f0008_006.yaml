  - {type: page-break, offset: 0, content: '', id: KR3f0008_WYG_006-1a, image: WYG0787/WYG0787-0066a.png}
body:
  text: 古今律厯考卷六明邢雲路撰經六春秋考文公元年春二月癸亥日有食之左傳不書朔官失之公羊有朔字薑氏云二月甲午朔無癸亥三月癸亥朔入食限大衍亦以為然以授時推是年乙未距元辛巳中積六十九萬六千一百五十五日八十二刻步至三月定朔五十九日四十八刻癸亥日午時合朔交泛二十六日五十九刻入食限春秋書二月錯也若二月朔癸亥則三月癸巳四月癸亥至二十五無丁巳矣經何以曰四月丁巳葬僖公夏四月丁巳葬我君僖公左傳云閏三月非禮也先王之正時也履端於始序則不愆舉正於中民則不惑歸餘於終事則不悖謂先王履步厯之初始以為術厯之端四序則不愆過舉中氣以正月民則不疑惑歸其餘日於終以置閏則時事不悖亂是年春秋閏三月非禮也法推前閏月當在僖公三十二年至文公元年十二月方再閏元年四月經朔二十九日二十四刻癸巳日合朔至二十五日丁巳是葬僖公之日春秋於僖公三十二年失閏至文公元年三月方置閏故左傳以為非禮惟三月補閏所以四月朔得癸巳之常而月內有丁巳也孔穎達謂春秋之世厯法錯失所置閏月或先或後不與常同積而成多以失弦望朔晦則不得不改憲以順之者以此十有五年六月辛丑朔日有食之鼓用牲于社左傳云非禮也言猶莊公之非也以授時推是年己酉中積六十九萬一千四十二日四十刻六月定朔三十七日三十二刻辛丑日辰時合朔交泛二十六日四十四刻入食限宣公八年秋七月甲子日有食之既杜氏云七月三十日食薑氏云十月甲子朔食大衍同授時推是年庚申中積六十八萬七千二十四日五十二刻步至秋七月朔不入食限十月定朔五十六刻甲子日未時合朔交泛二十六日七十九刻日食九分有竒日食九分以上亦為食既經書七月元史云蓋十誤為七也十年夏四月丙辰日有食之左氏云不書朔官失之范氏云食晦以授時推是年壬戌中積六十八萬六千二百九十四日三刻步至四月定朔五十二日三十五刻丙辰日辰時合朔交泛一十四日九刻入食限合范謂食晦非十有七年夏六月癸卯日有食之左氏云不書朔官失之薑氏云六月甲辰朔不應食大衍云是年五月在交限六月甲辰朔交分已過食限蓋誤以授時推是年己巳中積六十八萬三千七百三十七日三十二刻步至五月定朔一十一日七十四刻乙亥日酉時合朔交泛四十刻入食限若六月甲辰朔交二日已過食限大衍為是蓋春秋失一閏誤以五月為六月也然郭守敬亦不明言加時在晝蓋疑七十四刻酉時恐入夜故如僖公十五年夜月食不明言加時晝夜殊不知酉時合朔食甚則初虧在申可知是加時在晝合矣成公十有六年夏六月丙寅朔日有食之以授時推是年丙戌中積六十七萬七千五百二十八日一十七刻六月定朔二日六十一刻丙寅日未時合朔交泛二十六日九十八刻入食限合是月日食乃為正陽之月慝未作隂侵陽伐鼓用幣為宜十有七年冬十有二月丁巳朔日有食之薑氏云十二月戊午朔無丁巳似失閏大衍推十一月丁巳朔交分入食限授時推是年丁亥中積六十七萬七千一百六十二日九十三刻步至十一月定朔五十三日四十八刻丁巳日午時合朔交泛一十四日二十八刻入食限與大衍同蓋春秋時失一閏誤以十一月為十二月也襄公十有四年春二月乙未朔日有食之授時推是年壬寅中積六十七萬一千六百七十六日二十六刻二月定朔三十一日五十四刻乙未日未時合朔交泛一十四日一十三刻入食限合十有五年秋八月丁巳日有食之杜氏云八月無丁巳丁巳七月一日也薑氏云七月丁已朔食失閏也大衍同授時推是年癸卯中積六十七萬一千三百一十一日二刻步至七月定朔五十三日三十一刻丁巳日辰時合朔交泛二十六日三十三刻入食限是七月朔食非八月二十年冬十月丙辰朔日有食之授時推是年戊申中積六十六萬九千四百九十二日八十刻十月定朔五十二日六十三刻丙辰日申時合朔交泛一十三日七十六刻入食限合二十有一年秋九月庚戌朔日有食之冬十月庚辰朔日有食之榖梁釋此年與二十四年皆頻月日食據厯無頻食之理但古或有之薑氏謂比月而食非大衍亦以為然授時推是年己酉中積六十六萬九千一百二十七日五十五刻步至九月定朔四十六日六十五刻庚戌日申時合朔交泛一十四日三十六刻入食限是也步至冬十月庚辰朔已過交限不應頻食薑説為是蓋厯推日食凡一百七十三日一交一年止二交交在望前朔則日食望則月食交在望後望則月食後月朔則日食交正在朔則日食既前後望不食交正在望則月食既前後朔不食蓋前後不出陽八度隂六度日月交有一定豈有比月頻食之理劉炫云漢末以來八百餘載都無頻月日食之事蓋多歷世代傳寫失真先儒因循莫敢改易也入春秋惟是年九月十月又二十四年七月八月兩書頻食考二十一年閏在夏前二十四年閏在春初想當時日官算失一閏誤以二十一年之九月作十月朔日食以二十四年之七月作八月朔日食已書之史矣既而見其失閏不合也乃於二年各補足一閏書為二十一年九月朔日食二十四年七月朔日食此兩册俱存而後之修史者遂併收録之然比食之説則千古所無不必辨者二十有三年春王二月癸酉朔日有食之授時推是年辛亥中積六十六萬八千三百九十七日六刻二月定朔九日三十七刻癸酉日辰時合朔交泛二十六日五十六刻入食限合二十有四年秋七月甲子朔日有食之既八月癸巳朔日有食之大衍云不應頻食在誤條授時推是年中積六十六萬八千三十一日八十二刻四十七分步至七月定朔五十七刻甲子日未時合朔交泛一十三日八十七刻入食限日食九分有竒為食既是也步至八月朔立分不叶不應食猶之二十一年無比食之理二十有七年冬十有二月乙亥朔日有食之左氏書經十二月乙卯朔日有食之傳十一月乙亥朔日有食之辰在申司厯過也再失閏矣經十二月乙卯非傳十一月乙亥是左云辰在申再失閏者謂從子至亥十二謂之辰斗柄在天指角亢之宿在大角攝提謂之建星日昏時斗柄所指於十二辰在焉周十一月夏九月也九月斗當建戌而辰指在申申與戌差兩月是司厯再失閏兩月未閏也厯法十九年為一章章有七閏自文公十一年至襄公十三年凡五十七年已成三章當有二十一閏又從襄十四年至二十七年凡十四年又當有五閏通計七十一年應有二十六閏而長厯推得二十四閏計少兩閏故云司厯過也薑氏云十一月乙亥朔交分入食限大衍同以授時推是年乙卯中積六十六萬六千九百三十六日九刻十一月定朔一十一日二十四刻乙亥日卯時合朔交泛七刻入食限若推十二月朔無乙亥亦不入食限然斗柄所指九月宜戌昔時則然久之十二辰皆可指非一定也二十有八年春無冰左傳云梓愼曰今兹宋鄭其飢乎歲在星紀而淫於玄枵以有時災隂不堪陽蛇乘龍龍宋鄭之星也宋鄭必飢玄枵虛中也枵耗名也土虛而民耗不飢何為禆竈曰今兹周王及楚子皆將死歲棄其次而旅於明年之次以害鳥帑周楚惡之注疏謂梓愼魯大夫歲歲星也星紀在丑斗牛之次孫炎曰星紀日月五星之所終始也故謂之星紀玄枵在子虛危之次虛在正北北方色玄故曰玄枵枵之言耗虛之意也九年傳稱晉侯問公生歲乃云十二年矣是謂一終一星終也言歲星十二年一周天也十八年晉董叔曰天道多在西北是言其年歲星在亥也歲星右行於天至此十一年行未及周當在星紀明年乃當在玄枵今年已在玄枵是淫行失次也時災無冰也盛隂用事而溫無冰是隂不勝陽地氣發泄也蟲獸在地而有象在天二十八宿分在四方方有七宿共成一象東方為青龍之象西方為白虎之象皆南首北尾也南方為朱鳥之象北方為玄武之象皆西首東尾也龜蛇二蟲共為玄武故蛇是玄武之宿虛危之星也龍歲星木也木為青龍乃天之貴神福德之星今失次出虛危下龍在下蛇在上為蛇所乘也歲星本位在東方東方卯為大火房心宋之分野辰為壽星角亢鄭之分野龍為宋鄭之星故飢玄枵虛星在中地氣發泄而春溫無冰是土虛不實而人民耗損不飢何為禆竈鄭大夫言歲星棄其所居星紀之次乃客旅於明年玄枵之次歲星所在其國有福失次於北禍衝在南南為朱鳥帑者細弱之名於人則妻子為帑於鳥則鳥尾為帑天之分野鶉火周分鶉尾楚分歲星之衝當此周楚之分故周王楚子受其咎也歲星客在玄枵惟衝鶉火而鶉尾亦有咎者蓋以歲星漸西衝則漸東故衝其鳥身而及其尾也是年天王崩楚子卒明年鄭飢宋亦飢皆驗夫一歲星淫也梓愼禆竈所占不同其事俱驗丘明兩載之以示占卜之驗惟人所在耳以授時推春秋歲星皆先天一宫益疏逺蓋授時步氣朔近密於五星則仍舊未改其數故疏須測驗更正乃得其真余測法詳見别簡昭公七年夏四月甲辰朔日有食之授時推是年丙寅中積六十六萬二千九百一十八日四十刻四月定朔四十日五十二刻甲辰日午時合朔交泛二十七日二刻入食限合考之左傳云是日日食晉侯問於士文伯曰誰將當日食對曰魯衛惡之衛大魯小公曰何故對曰去衛地如魯地於是有災魯實受之其大咎其衛君乎魯將上卿注云亥娵訾衛地也戌降婁魯地也娵訾之次一名豕韋日食於豕韋之末及降婁之始乃息故禍在衛大在魯小言災發於衛而魯受其餘禍也八月衛侯惡卒十一月魯季孫宿卒驗矣授時推是朔日躔由亥入戌十餘度則已過其界似與春秋不協但古今宫界之分或有不同不可考耳九年夏四月陳災天火曰災陳已滅矣此何以書公榖皆云存陳也不與楚滅也左傳鄭禆竈曰五年陳將復封封五十二年而遂亡子産問其故對曰陳水屬也火水妃也而楚所相也今火出而火陳逐楚而建陳也妃以五成故曰五年歲五及鶉火而後陳卒亡楚克有之天之道也故曰五十二年注陳顓頊之後為水屬火畏水為之妃以丁為壬妃也楚之先祝融為高辛氏火正主治火事火心星也火出於周為五月而以四月出者長厯推閏當在此年五月後而前年已閏八月故四月得火見火星見而天火適災於陳陳水也水得妃而興陳興則楚衰故曰逐楚而建陳五行各相配合得五而成故五年陳復封天數以五為紀故五及鶉火也歲星天之貴神所在之國必昌歲在鶉火火得歲星之助火盛則水衰陳封四歲及鶉火後四周四十八歲凡五及鶉火楚復滅陳故曰五十二年授時推是年戊辰中積六十六萬二千一百八十七日九十一刻步至三月朔日甲子二十九日壬午得中氣閏三月朔日癸未無中氣四月朔日壬子得中氣是是年閏三月也既閏三月則四月朔日日躔婁三度戌宫之盡將退入酉昏後火出於東固其宜也長厯推前年閏八月此年閏五月皆非十有五年六月丁巳朔日有食之大衍推五月丁巳朔食失一閏授時推是歲甲戌中積六十五萬九千九百九十六日四十五刻五月定朔五十三日五十五刻丁巳日未時合朔交泛一十三日九十五刻二十九分入食限經云六月非十有七年夏六月甲戌朔日有食之左傳祝史請所用幣昭子曰日有食之天子不舉伐鼓於社諸侯用幣於社伐鼓於朝平子禦之曰止也唯正月朔慝未作日有食之於是乎有伐鼓用幣禮也其餘則否太史曰在此月也注疏謂此年六月日食是夏之四月正陽之月也禮正陽之月日食當用幣故魯之祝史請之昭子謂日食天子不舉盛饌伐鼓於社以責羣隂諸侯用幣於社請上公以救日伐鼓於朝退而自責禮也平子禁禦之曰止也惟四月純陽用事為正陽之月五月一隂生之隂氣未動隂為慝乃慝未作此朔日食隂侵陽重於是乎伐鼓用幣禮也餘月則否蓋平子以六月非四月不知周之六月夏之四月也四月建巳正是純陽五月一隂未生之月故太史曰在此月也薑氏云是年六月乙巳朔交分不叶不應食當誤大衍云在九月朔六月不應食薑氏是也授時推是年丙子中積六十五萬九千二百六十五日九十六刻步至六月朔不入食限九月定朔一十日一十八刻甲戌日寅時合朔交泛二十六日七十六刻入食限夫日食既非六月則於慝未作正陽之月無取矣秋郯子來朝左傳郯子來朝公與之宴昭子問焉曰少皥氏鳥名官何故也郯子對曰吾祖也我知之矣昔者黃帝氏以雲紀故為雲師而雲名炎帝氏以火紀故為火師而火名共工氏以水紀故為水師而水名太昊氏以龍紀故為龍師而龍名我高祖少皥摰之立也鳯鳥適至故紀於鳥為鳥師而鳥名鳯鳥氏厯正也玄鳥氏司分者也伯趙氏司至者也靑鳥氏司啓者也丹鳥氏司閉者也仲尼聞之見於郯子而學之考郯子少皥之後少皥金天氏黃帝之子也少昊受黃帝黃帝受炎帝炎帝受共工共工受太昊故先言黃帝上及太昊稽之於易炮犧神農黃帝相繼之世可知鳯鳥知天時故以名厯正之官玄鳥燕也以春分來秋分去伯趙伯勞也以夏至鳴冬至止靑鳥鶬鷃也以立春鳴立夏止丹鳥鷩雉也以立秋來立冬去故分至啓閉以鳥名官以鳯凰氏為之長夫天時鳥且不違而况於人乎冬有星孛於大辰孛彗星也左傳冬有星孛於大辰西及漢申須曰彗所以除舊布新也今出於火必布焉諸侯其有火災乎梓愼曰火出於夏為三月於商為四月於周為五月夏數得天若火作其四國當之在宋衛陳鄭乎宋大辰之虛也陳大皥之虛也鄭祝融之虛也皆火房也星孛及漢漢水祥也衛顓頊之虛也故為帝丘其星為大水水火之牡也其以丙子若壬午作乎水火所以合也若火入而伏必以壬午不過其見之月鄭禆竈言於子産曰宋衛陳鄭將同日火若我用瓘斝玉瓉鄭必不火子産弗與注疏謂冬夏之八月也月令仲秋日在角昏牽牛中大辰房心尾也天漢在箕斗間於是時大辰見天漢之西今有孛於大辰之西而尾東指光芒厯辰星而東及於天漢也申須魯大夫布布新也火出謂昏見也夏三月見商四月見周五月見夏數得天時之正也虛者舊居之處謂先王先公嘗居此地也大辰大火宋分野大皥居陳木火所自出祝融髙辛氏之火正居鄭火房火舍也衛地昔帝顓頊居之內有顓頊冢故為帝丘天漢為水衛營室星水也隂陽有五行嫁娶之法水畏火故以丁為壬妃是水為火之牡牡雄也丙是火日午是火位壬是水日子是水位丙子壬午水火合而相薄必行其意但慧在大辰為多及漢為少水少火多故水不勝火火行其意水必助之故此丙子壬午之日當有火災火入而伏謂火災畢而伏也壬午即明年四國火災之日不過其見之月謂明年五月火見也瓘玉圭斝玉爵玉瓉於圭頭為器可以挹鬯祼祭者禆竈欲用此三物以禳火而子産弗從以為天災流行非禳所息故也次年夏五月壬午宋衛陳鄭災是五月心星昏始見壬午同日四國皆火禆竈曰不用吾言鄭又將火子産不從亦不復火是又有驗不驗矣二十年春左傳二十年春王二月己丑日南至注疏謂是正月己丑朔日南至當是年前閏月史官失閏故書為二月嗣後八月方補一閏傳於八月書閏月戊辰殺宣薑是也夫二月為夏正建亥之月亥月固無冬至之理而是歲正月亦非己丑之朔授時推周景王二十三年即魯昭公二十年己卯歲中積六十五萬八千一百七十日二十二刻天正冬至戊子八十三刻閏餘二十七日八十三刻經朔五十六日九十九刻是歲正月庚申日合朔越二十九日戊子日八十三刻日南至二月朔日己丑尚未宜閏故也春秋誤矣夫戊子南至而梓愼以己丑望氛應驗亦可取焉二十有一年秋七月壬午朔日有食之左傳梓愼曰二至二分日有食之不為災分同道也至相過也其他月則為災陽不克也故常為水於是叔輒哭日食昭子曰子叔將死非所哭也八月叔輒卒注疏冬夏二至長短極則相過春秋二分晝夜等則同道以為日月之交理必相侵不為災今秋七月夏五月為夏至不為災也其他非分至之月則為災日食是隂侵陽陽不勝也故日食常為水災不知日月之行一百七十三日有竒而一交交數滿則同道相過非分至之説也梓愼妄矣詩云十月之交朔日辛卯日有食之亦孔之醜周十月乃夏八月秋分之月也而甚可醜惡是不為災乎莊二十五年七月日食秋大水是日食水災固有之此二十四年五月日食梓愼曰將水昭子曰旱也其年八月大雩旱矣亦不常為水也日食之變所關至重恐亦與叔輒之哭不哭無涉授時推是年庚辰歲中積六十五萬七千八百四日九十八刻七月定朔一十八日四十二刻壬午日巳時合朔交泛二十六日八十七刻入食限二十有二年冬十有二月癸酉朔日有食之杜預以長厯推十二月朔與明年正月朔中有一閏此十二月當為癸卯朔經書癸酉朔是誤非也授時推是年辛巳歲中積六十五萬七千四百三十九日七十四刻十二月定朔九日三十六刻癸酉日辰時合朔交泛一十四日一十八刻入食限與春秋合二十有四年夏五月乙未朔日有食之授時推是年癸未歲中積六十五萬六千七百九日七刻五月定朔三十一日三十七刻乙未日巳時合朔交泛二十六日三十八刻入食限三十有一年十有二月辛亥朔日有食之左傳是夜也趙簡子夢童子裸而轉以歌旦占諸史墨曰吾夢如是今而日食何也對曰六年及此月也吳其入郢乎終亦弗克入郢必以庚辰日月在辰尾庚午之日日始有謫火勝金故弗克注疏謂轉宛轉也史墨知夢非日食之應故釋日食之咎而不釋其夢是年至定公四年為六年定公四年十一月庚辰吳入郢是其言之驗也孔疏云周十二月夏之十月日食在龍尾謂為尾宿謫變也謂日食雖在辛亥然變起於十月十九日庚午午南方楚位也午火庚金火勝金故吳雖入郢楚亦不亡以授時推是年庚寅歲中積六十五萬四千一百五十二日三十六刻十二月定朔四十七日三十三刻辛亥日辰時合朔交泛二十六日六十二刻入食限推日躔是年天正冬至赤道斗二十三度有竒加時黃道斗二十一度有奇十二月朔辛亥黃道積度三百一十四度有奇是日日躔黃道亢四度九十一分蓋東方七宿角亢屬辰為龍亢在辰宫將末故為龍尾孔氏謂尾宿非也言十一月入郢則十二月尚在郢故曰及此月定公五年春王三月辛亥朔日有食之公羊作正月食非是授時推是年丙申歲中積六十五萬一千五百六十日八十九刻三月定朔四十七日五十六刻辛亥日未時合朔交泛十四日三刻入食限十有二年十有一月丙寅朔日有食之授時推是年癸卯歲中積六十四萬九千四百四日一十八刻十月定朔二日五十二刻丙寅日午時合朔交泛一十四日二十六刻入食限蓋春秋時失一閏誤以十月作十一月也十有五年八月庚辰朔日有食之授時推是年丙午歲中積六十四萬八千三百八日四十五刻八月定朔一十六日五十刻庚辰日午時合朔交泛一十三日七十六刻入食限哀公十有二年冬十二月螽左傳季孫問諸仲尼仲尼曰丘聞之火伏而後蟄者畢今火猶西流司厯過也注疏謂周十二月夏之十月火心星也九月昏火星見於西南漸而下流十月之昏則伏今十月火猶西流是厯官失一閏以九月為十月也長厯推是年失一閏十二月實夏之九月九月尚溫故得有螽仲尼雖言季孫未改明年十二月復螽始悟十四年春乃置閏授時推哀公十一年丁卯歲中積六十四萬四千二百九十日九十四刻冬至四十四日一十一刻閏餘二十七日七十三刻步至二月朔日己酉大盡三十日戊寅為二月申閏二月己卯日合朔無中氣哀公十三年己巳歲中積六十四萬三千五百六十日四十五刻冬至五十四日六十刻閏餘一十九日九十六刻步至十一月朔日甲午小盡二十九日壬戌為十一月中閏十一月癸亥日合朔無中氣是哀公十一年閏二月十三年閏十一月春秋失之故十二月兩書螽仲尼覺之以為司厯過也長厯謂十二年當有閏非是十有四年夏五月庚申朔日有食之授時推是年庚申歲中積六十四萬三千一百九十五日三刻五月定朔五十六日五十五刻庚申日未時合朔交泛二十六日九十一刻入食限春秋隱三年二月桓三年七月十八年三月二十五年六月三十年九月僖十二年三月五月十五年五月文元年二月宣八年七月十七年六月成十七年十二月襄十五年八月二十一年十月二十四年八月二十七年十二月昭十七年六月定十二年十一月之朔食皆非其月也桓十七年十月二日二十六年十月二日皆非其日也而董仲舒劉向皆繫之以事應夫既非其月日矣則事應復何關且舉其一二商之如桓公十七年十月朔日食榖梁云言朔不言日食二日也董仲舒遂以為言朔不言日惡魯桓公且有夫人之禍不終日也豈知是年實是十一月庚午朔未時日食既非十月亦非二日仲舒夫人禍不終日之説將置之何地屬之誰何耶莊公十八年三月日食榖梁曰不言日不言朔夜食也劉向遂以為夜食隂因日明之衰而奪其光象周天子不明齊桓將奪其威權會諸侯而行霸道其後遂糾合諸侯天子使世子會之此其效也豈知是年三月不入食限夜亦不食實是五月壬子朔申時日食既非三月又非夜食劉向隂奪日光天子會齊之占曰此其效也果效耶非耶襄公二十四年七月甲子朔日食八月癸巳朔比食董仲舒以為比食又既象陽將絶夷狄主上國之象也後六君弒楚子果從諸侯滅舒鳩魯往朝之卒主中國伐吳討慶封遂滅賴又殺蔡侯滅陳蔡而縣之豈知是年七月既食無八月比食之理既不比食又何與於篡弒之説而曰楚子果從戰伐應占如響也吁嗟劉向亡論已以仲舒稱漢醇儒乃無端説夢著為典籍使後世司天家從古及今視此占驗無敢違越豈不誣哉余故謂仲舒之洪範災異等傳宜亟火其書也向子歆讀父書治厯亦用其父四分之一斗分為法妄推隱三年二月桓二十五年六月二十六年十二月宣八年七月成十六年六月襄十五年八月二十三年二月昭十七年六月二十一年七月二十四年五月三十一年十二月定五年三月十二年十一月哀十四年五月之朔皆步為二日於桓十八年三月朔宣十七年六月朔皆步為晦朓則皆不知歲差與盈縮遲疾之故非其厯也考春秋二百四十二年間日食三十七事若僖十五僖二十五並無比食之理亡論已凡三十五事其合者十八莊二十六僖五文十五宣十成十六襄十四襄二十襄二十一襄二十三襄二十四昭七昭二十一昭二十二昭二十四昭三十一定五定十五哀十四是也莊十八僖十二誤五為三丈元誤三為二宣八誤十為七昭十七誤九為六此五事皆記載之誤也隱三桓三桓十七莊二十五莊三十此六事皆以後月作前月不應閏而閏先時也宣十七成十七襄十五襄二十七昭十五定十二此六事皆以前月作後月應閏而不閏後時也或記載之誤或置閏之差然正之則皆是蓋其食限之入干支之合有足徴耳惟僖十五年五月之交宜在四月然乃亥時月食益誤且何以曰朔日月食則交交則朔未有不交而朔不朔而食者春秋時周衰天子不頒朔魯厯不正置閏不得其月月大小不得其度日食言朔而實非朔或不言朔而實朔或脫不書朔與日皆官失之也既差而覺覺而補閏所以有合有不合以授時推之春秋之食晦與朔二則皆朔無爽矣公羊榖梁不知而亦以為食晦食既朔京房等不知而言日食不以朔日曰薄食為變之大皆非也古今律厯考卷六
