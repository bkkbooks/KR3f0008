body:
  text: 古今律厯考卷六十三明邢雲路撰厯議四厯議驗氣程子曰厯法主於日日一事正則其餘可推此格言也故古之造厯者惟候日晷進退以驗隂陽消息之機是為厯本舊法擇地平衍設水準繩墨植表其中以度中晷然表短促尺寸之下所為分秒太少之數未易分别表長則分寸稍長所不便者景虛而淡難得實景前人欲就虛景之中考求真實或設望筒或置小表或以木為規皆取表端日光下徹圭面元郭守敬以銅為表髙三十六尺端挾以二龍舉一橫梁下至圭面共四十尺是為八尺之表五圭表刻為尺寸舊寸一至是申而為五釐毫差易分别創為景符以取實景其制以銅葉博二寸長加博之二中穿一竅若針芥然以方􅂒為趺一端設為機軸令可開闔榰其一端使其勢斜倚北髙南下往來遷就於虛景之中竅達日光僅如米許隱然見橫梁於其中舊法以表端測晷所得者日體上邊之景兹以橫梁取之實得中景不容有毫末之差地中八尺表景冬至長一丈三尺有竒夏至尺有五寸元京師長表冬至之景七丈九尺八寸有竒在八尺表則一丈五尺九寸六分夏至之景一丈一尺七寸有竒在八尺表則二尺三寸四分雖晷景長短所在不同而其景長為冬至景短為夏至則一也惟是氣至時刻考求不易蓋至日氣正則一嵗氣節從而正矣劉宋祖沖之嘗取至前後二十三四日間晷景折取其中定為冬至且以日差比課推定時刻宋皇祐間周琮則取立冬立春二日之景以為去至既逺日差頗多易為推考紀元以後諸厯為法加詳大抵不出沖之之法守敬積日絫月實測中晷自逺日以及近日取前後日率相埒者參考同異以取數多者日差分寸定擬二至時刻最為詳密嵗餘嵗差天周之度嵗周之日皆三百六十有五而又有餘分自今嵗冬至距來嵗冬至厯三百六十五日而日行一周凡四周積千四百六十則餘一日析而四之則四分之一也然天之分常有餘嵗之分常不足其數有不能齊者惟其所差至微前人初未覺知逮漢末劉洪始覺冬至後天謂嵗周餘分太強乃作乾象厯以嵗餘二十五刻命為二千五百分而減為二千四百六十一分有竒至晉虞喜宋何承天祖沖之謂嵗當有差因立嵗差之法其法損嵗餘益天周其損益大率在二千四百四十分上下強弱相減因得日躔嵗退之差授時自劉宋大明壬寅以來凡測景驗氣得冬至時刻真數者有六取相距積日時刻以相距之年除之各得其時所用嵗餘復自大明壬寅距至元戊寅積日時刻以相距之年除之得每嵗三百六十五日二十四分二十五秒比大明厯減去一十一秒定為方今所用嵗餘餘七十五秒用益所謂四分之一共為三百六十五度二十五分七十五秒定為天周餘分強弱相減餘一分五十秒用除全度得六十六年有竒日却一度以六十六年除全度適得一分五十秒定為嵗差復以堯典中星考之其時冬至日在女虛之交及考之前史漢元和二年冬至日在斗二十一度晉太元九年退在斗十七度宋元嘉十年在斗十四度末梁大同十年在斗十二度隋開皇十八年猶在斗十二度唐開元十二年在斗九度半今退在箕十度取其距今之年距今之度較之多者七十餘年少者不下五十年輒差一度宋慶元間改統天厯取大衍嵗差率八十二年及開元所距之差五十五年折取其中得六十七年為日却行一度之差然古今厯法合於今則不能通於古密於古又不能驗於今惟授時厯以之考古則增嵗餘而損嵗差以之推來則增嵗差而損嵗餘上推春秋以來冬至往往皆合仍以大衍宣明紀元統天大明并授時六厯考驗春秋以來冬至疏密凡四十九事獨授時合十之七八其中有不合者或前代史官依時厯以書者多非候景所得併間有日度失行之故也我國初洪武十七年欽天監博士元統上言一代之興必有一代之厯今厯雖以大統為名而積分猶踵授時之數非所以重始敬正也况授時厯法以至元辛巳為厯元至洪武甲子積一百四年以厯法推之得三億七千六百一十九萬九千七百七十五分經云大約七十年而差一度每嵗差一分五十秒辛巳至今年逺數盈漸差天度擬合修改臣今以洪武甲子嵗前冬至為大統厯厯元推演得授時厯辛巳閏準分二十四萬二千五十分洪武甲子閏準分一十八萬二千七十分一十八秒授時厯辛巳氣準分五十五萬六百分洪武甲子氣準分五十五萬三百七十五分授時厯辛巳轉準分一十三萬二百五分洪武甲子轉準分二十萬九千六百九十分授時厯辛巳交準分二十六萬二百八十八分洪武甲子交準分一十一萬五千一百五分八秒上考下推不用消長之法以合天道蓋天道無端惟數可以推其機天道至妙因數可以明其理是理因數顯數從理出故理數可相倚而不可相違也書奏擢統為監正而監副李德芳上疏駁之言至元辛巳為厯元上推往古每百年長一日下驗將來每百年消一日永久不可易也今監正元統改作洪武甲子厯元不用消長之法考得春秋魯獻公十五年戊寅嵗距至元辛巳二千一百六十三年以辛巳為厯元依授時法推得天正冬至在甲寅日夜子初三刻與當時實測數相合若以洪武甲子元上距獻公戊寅嵗二千二百六十一年依大統法推得天正冬至在丁巳日午正三刻比辛巳為元差四日六時五刻當用至元辛巳為元及消長之法方合天道疏奏元統復上疏爭言臣所推甲子厯元實與舊法相合略無差謬上曰二統皆難憑只驗七政交會行度無差者為是自是欽天監造厯以元統洪武甲子為厯元仍依舊法推算不用捷法夫二統之論不同如此以余推之獻公在春秋之前非春秋時也其十五年戊寅嵗正月朔甲寅日冬至以授時法推冬至分五十日九十九刻得甲寅日夜子初三刻冬至以大統法推冬至分五十五日五十三刻得己未日午正三刻冬至計甲寅時刻與己未時刻相較大統後天四日五十四刻是差四日六時李德芳之言為是但查記載李德芳言上下每百年消長一日又言大統推獻公丁巳日冬至夫以余推獻公己未冬至非丁巳百年消長一分非一日何德芳之異也曰德芳以消長法推二統時刻皆合豈不辨丁巳與日字之誤此必修史者誤書己未為丁巳併分字為日字也夫元統上言昭代之厯不宜襲舊宜修改敬正明理推數以合天道且上疏復爭自謂略無差謬乃其所改之厯所推之數閏氣轉交四準則皆授時之數接年續之一無所改者也但去其消長之法而一無所改乃謂隨時修改以合天道將誰欺乎甚矣元統之謬妄也考古厯代嵗差之數晉虞喜以天體為三百六十五度二十六分乃四分之一有餘嵗策為三百六十五日二十四分乃四分之一不足五十年差一度宋何承天以嵗差太速改周天為三百六十五度二十五分半周嵗為三百六十五日二十四分半百年差一度祖沖之以四十五年差一度隋劉焯以七十五年差一度唐傅仁均以五十五年差一度僧一行以八十三年差一度自後諸厯各不同宋厯多在七十五年上下元授時以周天三百六十五度二十五分七十五秒周嵗三百六十五日二十四分二十五秒百年差一度半然則授時之法乃六十六年三分年之二差一度元統謂授時七十年差一度亦非日躔日一麗天列宿俱熄古人欲測躔度所在必以昏旦夜半中星衡考其所距從考其所當然昏旦夜半時刻未易得真晉薑岌首以月食衡檢知日度所在紀元厯復以太白志其相距逺近於昏後明前驗定星度因得日躔授時用至元丁丑四月癸酉望月食既推求得冬至日躔赤道箕宿十度黃道九度有竒仍自其年正月至己卯嵗終三年之間日測太隂及嵗星太白相距度定驗參考皆躔箕宿適與月食所衝允合以金趙知微所修大明厯法推之冬至猶躔斗初度三十六分六十四秒比新測實差七十六分六十四秒蓋箕本度十度四十分箕末接斗初分數日躔乃自斗而退於箕者在大明猶躔斗初度三十六分六十四秒在至元丁丑則退在箕十度巳過箕之所零四十分矣以箕四十分合斗初度三十六分六十四秒共七十六分六十四秒是大明厯較至元丁丑新測實差之數也日行盈縮天本無度以日行一度為天一度然日雖日行一度而往來於黃道狹闊之間損益有不同者則盈縮生焉冬至日行一度強出赤道二十四度弱自此日軌漸北積八十八日九十一分當春分前三日交在赤道實行九十一度三十一分而適平自後其盈日損復行九十三日七十一分當夏至之日入赤道內二十四度弱實行九十一度三十一分日行一度弱向之盈分盡損而無餘自此日軌漸南積九十三日七十一分當秋分後三日交在赤道實行九十一度三十一分而復平自後其縮日損行八十八日九十一分出赤道外二十四度弱實行九十一度三十一分復當冬至向之縮分盡損而無餘盈縮均有損益初為益末為損自冬至以及春分春分以及夏至日躔自北陸轉而西西而南於盈為益益極而損損至於無餘而縮自夏至以及秋分秋分以及冬至日躔自南陸轉而東東而北於縮為益益極而損損至於無餘而復盈盈初縮末俱八十八日九十一分而行一象縮初盈末俱九十三日七十一分而行一象盈縮極差皆二度四十分斯乃大都測晷所得之數也若在天中則無極差矣晝夜刻日晝夜百刻以十二辰分之每辰得八刻三分刻之一無間南北所在皆同春秋二分日當赤道出入之中晝夜各五十刻自春分以及夏至日入赤道內去極近夜短而晝長自秋分以及冬至日出赤道外去極逺晝短而夜長以地中揆之長不過六十刻短不過四十刻地中以南夏至去日出入之所為逺其長有不及六十刻者冬至去日出入之所為近其短有不止四十刻者地中以北夏至去日出入之所為近其長有不止六十刻者冬至去日出入之所為逺其短有不及四十刻者授時大都偏北冬至日出辰初二刻日入申正二刻故晝刻三十八夜刻六十二夏至日出寅正二刻日入戌初二刻故晝刻六十二夜刻三十八蓋地有南北極有髙下日出入有早晏所以九服皆不同耳漏刻之法挈壺氏掌之其法以百刻分於晝夜置箭壺內刻以為節而浮之水水漏而刻下以紀晝夜昏明之數日未出二刻半天先明為晨分日巳入二刻半天方暗為昏分晝有朝有禺有中有晡有夕夜有甲乙丙丁戊昏旦有星中每箭各有其數所以分時代守各隨其時而易其箭刻乃定焉若子半之交則前四刻三分刻之一屬前日後四刻三分刻之一屬當日舊每時以初刻三分刻之一為初初刻而初一初二初三初四之四整刻繼之以正刻三分刻之一為正初初刻而正一正二正三正四之整刻繼之至授時則百刻總分為九十六刻凡八刻為一時而初初正初雖有其名乃在空界有無間亦覺簡便月行遲疾日大月小日上月下而以下小掩上大圓徑適相同故日大月小皆一度日日行一度月日行十三度有竒然月之行道有逺近出入之異於此得疾徐之理則遲疾生焉厯法以入轉一周之日為遲疾二厯各立初末二限初為益末為損在疾初遲末其行度率過於平行遲初疾末率不及於平行自入轉初日行十四度半強從是漸殺厯七日適及平行度謂之疾初限其積度比平行餘五度四十二分自是其疾日損又厯七日行十二度微強向之益者盡損而無餘謂之疾末限自是復行遲度又厯七日適及平行度謂之遲初限其積度比平行不及五度四十二分自此其遲日損行度漸增又厯七日復行十四度半強向之益者亦損而無餘謂之遲末限入轉一周實二十七日五十五刻四十六分遲疾極差皆五度四十二分舊厯日為一限皆用二十八限授時定驗得轉分進退時各不同分日為十二共三百三十六限半之為半周限析而四之為象限亦大都實測之數也考爾雅邢昺疏引厯象之説則月一日至於四日行最疾日行十四度餘自五日至八日行次疾日行十三度餘自九日至十九日行則遲日行十二度餘自二十日至二十三日又小疾日行十三度餘自二十四日至於晦行又最疾日行十四度餘此謂近日而疾逺日而遲之説然而非也蓋月道不繫於朔其入朔之初非月之初一乃轉之初日也月二十七日有竒一周天無日不可入轉者與月策二十九日有竒何相關故初日至三日疾行十四度餘四日至七日疾行十三度餘八日至十八日疾而又遲皆行十二度餘十九日至二十二日遲行十三度餘二十三日至二十七日遲行十四度餘為一周此其數也邢疏所論近日疾逺日遲之數而且謂為月一日至晦日謬也甚矣定朔日平行一度月平行十三度十九分度之七一晝夜之間月先日十二度有竒厯二十九日五十三刻有竒復追及日與之同度是謂經朔經朔云者謂經行泛常之數也日有盈縮月有遲疾以盈縮遲疾之數損益之始為定朔古人立法未密初用平朔一大一小故日食有在晦及朔二月食有在望前後者漢張衡以月行遲疾分為九道宋何承天以日行盈縮推定小餘故月有三大二小隋劉孝孫劉焯欲遵用其法時議排抵以為迂怪卒不能行唐傅仁均始采用之至貞觀十九年九月後四月頻大復用平朔李淳風麟德甲子元厯方行定朔之法淳風又以晦月頻見故立進朔之法謂朔日小餘在日法四分之三已上者虛進一日後代皆循用之然虞􅒠嘗曰朔在會同茍躔次既合何疑於頻大日月相離何拘於間小一行亦曰天事誠密但取辰集時刻所在之日以為定朔朔雖小餘在進限亦不可進其言皆是也蓋盈加而定朔在經朔後名曰朒縮減而定朔在經朔前名曰朓定弦定望亦如之即今厯求盈縮遲疾加減差之謂也然朔不復進而弦望猶退凡月帶食於日出時雖屬次日只以其夜言望故日出分之前應退一日以其便於推步耳古今律厯考卷六十三
