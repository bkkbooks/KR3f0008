body:
  text: 古今律厯考巻十九明邢雲路撰歴代十一歴代考宋史南渡髙宗時中原既失星翁離散紀元厯亡紹興二年髙宗重搆得之乃命常州布衣陳得一改造統元厯賜得一通微處士厯雖頒行有司不善用之暗用紀元法推歩推得乾道三年丁亥歳十一月甲子朔裴伯夀陳統元法當進作乙丑於是依紀元正之光州士人劉孝榮言是年四月戊辰朔日食一分日官言食二分旣而精明不食是年孝宗命劉孝榮治厯孝榮言統元厯差采五代民間萬分厯作三萬分以為日法造乾道厯時談天者各以技術相髙互相詆毁紛紛不已至淳熙三年因推太陽不合仍命孝榮改造新厯賜名淳熙淳熙末驗合朔差光宗紹熙二年詔改新厯仍命孝榮為之賜名會元四年布衣王孝禮言今年十一月冬至日景表當在十九日壬午會元歷註乃在二十日癸未係差一日崇天歷癸未日冬至加時在酉初七十六分紀元歷在丑初一刻六十七分統元歷在丑初二刻二分會元歷在丑初一刻三百四十分陳得一造統天歷劉孝榮造乾道淳熈㑹元三歷皆未嘗測景茍弗立表測景莫識其差乞遣官以銅表同孝禮測驗朝廷雖從未暇改作慶元四年會元歷占候多差日官草澤互有異同舊歷後天十一刻詔楊忠輔造新歷五年歷成賜名統天是年六月乙酉朔推日食不驗嘉泰二年五月甲辰朔日食草澤趙大猷言午初三刻日食詔太史與草澤聚驗於朝太陽午初一刻起虧未初刻復滿大猷言然統天歷先天一辰有半迺罷楊忠輔詔草澤有通歷者應聘修治開禧三年大理評事鮑澣之言統天歷氣朔五星皆立虚加虚減之數氣朔積分乃有泛積定積之繁其餘差漏不可備言楊忠輔今見統天歷舛私成新歷容臣與太史草澤諸人所著歷參攷之檢討曾漸亦言乾道淳熈慶元三歷皆出劉孝榮一人之手後為楊忠輔所勝乆之亦差願以諸歷下本省參攷以最近者頒用於是改定新歷成歷名開禧詔以戊辰年權附統天歷頒之於是開禧附統天行於世四十五年嘉定十一年太史局推測七月朔日食一分驗之不食淳祐十一年侍御史陳垓言淳祐十年冬頒十一年歷稱成永祥等依開禧新厯推筭辛亥嵗十二月十七日立春在酉正一刻今所頒厯乃相師堯等依淳祐新厯推筭到壬子嵗立春日在申三刻質諸前歷乃差六刻以此頒行天下豈不貽笑四方且開禧舊歷僅差一二刻而李徳卿造淳祐新歷差六刻餘與今前後兩歷俱差六刻十二年秘書省言李徳卿歷與譚玉進會天歷各有得失請商確推筭合衆長而為一然後賜名頒行十二年歷成賜名會天寳祐元年行之史闕其法咸淳六年十一月三十日冬至至後為閏十一月旣已頒歷浙江安撫司準備差遣臧元震言十九歳為一章至朔同日謂之章月今以十一月三十日為冬至又以冬至後為閏十一月自淳熙壬子至淳熙庚午凡十九年是為章歳以十九年七閏推之則閏月當在冬至前不當在冬至後以至朔同日論之則冬至當在十一月初一日不當在三十日震儒者豈欲與厯官較勝負既知其失安得黙而不言耶於是朝廷下之有司遣官偕元震與太史局辯正而太史之詞窮元震轉一官判太史局鄧宗文譚玉等各降官有差因更造厯六年成七年頒行即成天厯也徳祐之後陸秀夫擁立益王走海上命鄧光等作厯賜名本天厯今亡統元乾道淳熙㑹元四厯史合為一册統元厯陳得一造演紀上元甲子距髙宗紹興五年乙卯積九千四百二十五萬一千五百九十一元法六千九百三十歳周二百五十三萬一千一百三十八朔實二十萬四千六百四十七轉周分一十九萬九百五十三秒二千五百六十三交終分一十八萬八千五百八十秒六千四百五十以元法除嵗周得三百六十五日二十四刻三五七八為嵗實除朔實得二十九日五十三刻五九一為月䇿除轉周分得二十七日五十五刻四五八五為轉終除交終分得二十七日二十一刻二二一四為交終以歩五星以元法除終率得周日木終率二百七十六萬四千二百三十八秒三十二火五百四十萬四千八百四十六秒三十九土二百六十二萬九十四秒三十三金四百四萬六千四百九十六秒三十三水八十萬三千四十八秒八十三木周日三百九十八日八十八刻七九火七百七十九日九十二刻一土三百七十八日七刻九九金五百八十三日九十一刻水一百一十五日八十八刻乾道歷劉孝榮造演紀上元甲子距孝宗乾道三年丁亥積九千一百六十四萬五千八百二十三元法三萬朞實一千九十五萬七千三百八朔實八十八萬五千九百一十七秒七千六轉周分八十二萬六千六百三十七秒七千三百九十五交終分八十一萬六千三百六十六秒六千三十四以元法除朞實得三百六十五日二十四刻三六為嵗實除朔實得二十九日五十三刻五九二為月䇿除轉周分得二十七日五十五刻四五九為轉終除交終分得二十七日二十一刻二二二為交終以歩五星以元法除終率得周日木終率一千一百九十六萬六千五百八十一火二千三百三十九萬一千九百八土一千一百三十四萬二千七百四十六金一千七百五十一萬六千八百七十二水三百四十七萬六千二百八十四木周日三百九十八日八十八刻六火七百七十九日七十三刻二土三百七十八日九刻一五金五百八十三日八十九刻五七水一百一十五日八十七刻六一淳熈歷劉孝榮造演紀上元甲子距孝宗淳熈三年丙申積五千二百四十二萬一千九百七十二元法五千六百四十嵗實二百五萬九千九百七十四朔實一十六萬六千五百五十二秒五十六轉周分一十五萬五千四百七秒九千七百四十交實一十五萬三千四百七十六秒九千五百四十六以元法除嵗實得三百六十五日二十四刻三六一七卽嵗實除朔實得二十九日五十三刻五九五為月䇿除轉周分得二十七日五十五刻四六為轉終除交實得二十七日二十一刻二二二六為交終以歩五星以元法除周實得周日木周實二百二十四萬九千七百一十五秒六十五火四百三十九萬八千八百一秒六千五土二百一十三萬二千四百二十八秒六金三百二十九萬三千二百七十秒五十水六十五萬三千五百四十五秒五十三木周日三百九十八日八十八刻五六火七百七十九日九十二刻九三土三百七十八日九刻金五百八十三日九十一刻三一水一百一十五日八十七刻六七會元厯劉孝榮造演紀上元甲子距光宗紹熈二年辛亥積二千五百四十九萬四千七百六十七統率三萬八千七百氣率一千四百一十三萬四千九百三十二朔率一百一十四萬二千八百三十四轉率一百六萬六千五百六十一秒七千三百一十交率一百五萬三千一百一十二秒二千一百四十以統率除氣率得三百六十五日二十四刻三七二為嵗實除朔實得二十九日五十三刻五九四為月策除轉率得二十七日五十五刻四五六六為轉終除交率得二十七日二十一刻二二二為交終以歩五星以元法除周率得周日木周率一千五百四十三萬六千八百三十四秒九十八火三千一十八萬三千二百六十八秒八十七土一千四百六十三萬二千一百四十七秒七十一金二千二百五十九萬七千三十九秒三十七水四百四十八萬四千四百四秒四十三木周日三百九十八日八十八刻四六火七百七十九日九十二刻九四土三百七十八日九刻一六金五百八十三日九十一刻三三水一百一十五日八十七刻六統天開禧成天三厯史合為一冊統天厯楊忠輔造演紀上元甲子距寧宗慶元五年己未積三千八百三十五䇿法一萬二千嵗分四百三十八萬二千九百一十餘六萬二千九百一十朔實三十五萬四千三百六十八轉實三十三萬六百五十五交實三十二萬六千五百四十七以䇿法除嵗分得三百六十五日二十四刻二五為嵗實除朔實得二十九日五十三刻六六六為月䇿除轉實得二十七日五十五刻四五八三為轉終除交實得二十七日二十一刻二二五為交終木星周日三百九十八日八十八刻四九火七百七十九日九十二刻九六土三百七十八日九刻一六金五百八十三日九十刻二七水一百一十五日八十七刻六二開禧厯鮑澣之造演紀上元甲子距寧宗開禧三年丁卯積七百八十四萬八千一百八十三日法一萬六千九百嵗率六百一十七萬二千六百八朔率四十九萬九千六十七轉率四十六萬五千六百七十一杪五千三百九十六交率四十五萬九千八百八十六秒四千八百二十五以日法除嵗率得三百六十五日二十四刻三七六為嵗實除朔實得二十九日五十三刻五九二為月策除轉率得二十七日五十五刻四五八八為轉終除交率得二十七日二十一刻二二一七為交終以歩五星木星周日三百九十八日八十八刻六火七百七十九日九十二刻九二土三百七十八日九刻一六金五百八十三日九十刻二七水一百一十五日八十七刻六成天歷臧元震造演紀上元甲子距度宗咸淳七年辛未積七千一百七十五萬八千一百四十七日法七千四百二十嵗率二百七十一萬一百一朔率二十一萬九千一百一十七轉周分二十萬四千四百五十五秒二千四百六十交終分二十萬一千九百一十四秒七千五十一以日法除嵗率得三百六十五日二十四刻三九三五為嵗實除朔實得二十九日五十三刻五九三為月䇿除轉周分得二十七日五十五刻四六三一為轉終除交終分得二十七日二十一刻二二三為交終以歩五星木星周日三百九十八日八十八刻五七火七百七十九日九十二刻九土三百七十八日九刻一六金五百八十三日九十刻二六水一百一十五日八十七刻五九史稱孝宗乾道三年丁亥嵗有司不善用統元厯暗用紀元法推是年十一月甲子朔裴伯壽陳統元法進作乙丑朔於是依統元正之以授時推是年冬至二日六十四刻閏餘二日三刻經朔日六十一刻加差一十六刻定朔日七十七刻是十一月朔甲子酉正一刻合朔冬至非乙丑朔也葢由陳得一所立嵗實餘分强轉終餘分弱以積九千餘年用之遂加轉刻數嬴長進作乙丑日矣有司用紀元為是卽此見紀元愈於統元豈有司不善用耶劉孝榮言是年四月朔日食一分日官言食二分旣而精明不食以授時推是年四月朔交泛十三日九十九刻入食限定朔四日六十七刻得戊辰日申時日食是年卽金大定七年金史書是日日食金主避正殿減膳伐鼓應天門内百官各於本司庭立明復乃止夫曰庭立明復乃止則眞見其食與復圓也然則宋何以不食葢宋臨安偏南金偏北月食在隂厯故金見其食而宋不見也所推一分二分歩筭少差耳授時乃燕京治厯益偏東北故推當食職此故也亦何異之有諸人考校氣朔晷刻交食分秒黃赤星躔多少參差連篇累牘甲乙不決互相詆毁不知皆由地里南北不一諸人所用歷術不齊或偶中者溷正旋改者射覆競取功名互相下石如是而已劉孝榮采五代民間萬分歷作三萬分為日法乃三因萬分小歷作三萬分以隱萬分之名其實三萬分歷卽萬分歷朝四暮三之說也緣朔餘太强孝榮遂減其分乃增入秒曰秒七千六從古朔餘有秒數乎紹熈四年布衣王孝禮言十一月日景表當在十九日壬午會元注在二十日癸未崇天在癸未酉初刻七十六分紀元在丑初一刻六十七分統元在丑初二刻二分會元在丑初一刻三百四十分以授時推是年冬至分一十八日九十五刻得壬午日亥時正三刻冬至夫以孝禮親測晷景壬午日食非臆說也而授時適與之合崇天等歷則皆以未嘗測景之故未嘗測景而謬定嵗實所以皆失之後天皆加至次日此授時從測景来所以獨優也史稱慶元五年六月乙酉朔推日食不驗以授時推是年正月朔交泛二十七日一十刻定朔二十九日六十四刻得癸巳朔申時日食以歩至六月經朔五十七日五十四刻得辛酉無乙酉六月交泛一十一日四十刻不入食限七月經朔二十七日七刻得辛卯無乙酉七月交泛一十四日八入食限六月七月俱無乙酉七月入限而又非其日無一可者何食之有楊忠輔之誤推也史稱嘉泰二年五月甲辰朔日食草澤趙大猷言午初三刻日食驗之午初一刻起未初刻復滿大猷言然統天先天一辰有半乃罷楊忠輔以授時推是年五月朔交泛一十三日三十刻入食限定朔四十日四十九刻得甲辰日午初三刻合朔日甚則起虧午初復滿未初與大猷所言天行所至若合符節楊忠輔其何說之辭史稱嘉定十一年七月朔日食一分驗之不食以授時推是年七月朔交泛一十四日三十刻入食限定朔六日四十九刻得庚午朔午時日食然食止一分臨安偏南不見其食亦不為差史言淳祐十一年十二月十七日立春開禧厯筭酉正一刻淳祐等歷筭申三刻謂相差六刻有竒以授時筭是日立春分八日六十八刻得壬申日申正一刻立春則淳祐為近開禧為遠也葢授時較宋時測驗日晷無差則依授時為宻咸淳六年會天歷推冬至至後為閏十一月旣已頒歷臧元震歷辯以章月至朔同日論之應冬至前閏十月不應冬至後閏十一月應以十一月初一日為冬至不應以十一月三十日為冬至與太史局辯正而太史之詞窮以授時推咸淳六年嵗前天正閏餘一十八日六十九刻應閏十月至十一月朔日閏月已過閏餘止四刻餘是日冬至分二日六十三刻得丙寅申初初刻冬至經朔二日五十九加差一十九刻五十分以加經朔為定朔二日七十八刻得丙寅日酉正三刻合朔乃是十一月丙寅朔申時冬至酉時合朔正為章月至朔同日臧元震之言是也㑹天誤矣然後知宋厯之多差而授時為宻也元史元初承用金大明歷庚辰嵗太宗西征五月望月蝕不效二月五月朔微月見於西方南中書令耶律楚材以大明歷後天乃更撰歷推上元庚午七政同會虚宿六度以應太祖受命之符又以西域中原地里殊遠創為里差遂題其名曰西征庚午元歷表上之然不果頒用至元四年西域扎瑪里迪音撰進萬年歷世祖稍頒行之萬年法未傳庚午元歷演紀上元庚午距太宗庚辰積二千二十七萬五千二百七十筭日法五千二百三十嵗實一百九十一萬二百二十四朔實一十五萬四千四百四十五周天度三百六十五度二十五分六十七秒轉終分一十四萬四千一百一十秒六千二十交終分一十四萬二千三百一十五秒九千三百以日法除嵗實得三百六十五日二十四刻三五九四卽嵗實除朔實得二十九日五十三刻五九二七為月策除轉終分得二十七日五十五刻四六八為轉終除交終分得二十七日二十一刻二二二四為交終木星周日三百九十八日八十八刻火七百七十九日九十三刻一六土三百七十八日九刻二金五百八十三日九十刻一四水一百一十五日八十七刻六史云楚材損節氣之分然嵗實仍舊未嘗損也其餘諸率雖微有增減其實皆大明歷之舊亡異術耳至元十三年元世祖詔中書左丞許衡太子贊善王恂都水少監郭守敬改治新厯衡等以為金雖改厯止以宋紀元厯㣲加増益實未嘗測驗於天乃與南北日官參考累代厯法測候日月星辰消息運行之變叅别同異酌取中數以為厯本十七年冬至厯成賜名授時十八年頒行天下自古及今其推驗之術獨此為宻近者後元順帝亡併其厯官厯術俱没入沙漠中我朝存其餘法而失其本源洪武初遭元統改易溷亂其術遂使至今疇人布筭多所舛錯余乃因元史之舊編稽前代之故實繹其端緒驗諸象緯以詳著於篇至其郭守敬之術所未備併所差失者余悉補葺訂正厯乃完矣詳見後古今律厯考卷十九
